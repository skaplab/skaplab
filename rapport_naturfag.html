<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naturfag - Kompetanserapport - SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--bg2:#0b0d18;--border:rgba(255,255,255,.08);--text:#e0e8ff;--dim:rgba(255,255,255,.45);
  --gron:#34d399;--gul:#fbbf24;--rod:#f87171;--bla:#60a5fa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
#vt{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
#vt h1{font-family:var(--font-h);font-size:1rem;font-weight:800;color:var(--bla);}
.spacer{flex:1;}
.vl{font-size:.8rem;color:var(--dim);display:flex;align-items:center;gap:6px;}
.vl input{accent-color:var(--bla);}
.pdf-btn{padding:9px 20px;background:var(--bla);color:#000;border:none;border-radius:9px;
  font-family:var(--font-h);font-size:.88rem;font-weight:800;cursor:pointer;}
.tilbake{color:var(--dim);text-decoration:none;font-size:.82rem;}
#rapport{max-width:720px;margin:28px auto;padding:0 20px;}
.rhdr{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:22px 26px;margin-bottom:22px;}
.rtit{font-family:var(--font-h);font-size:1.4rem;font-weight:900;}
.rmeta{font-size:.82rem;color:var(--dim);margin-top:6px;line-height:1.7;}
.rmeta strong{color:var(--text);}
.kk{border-radius:12px;padding:14px 16px;margin-bottom:9px;border-left:4px solid;}
.kk.hoy{background:rgba(52,211,153,.08);border-color:var(--gron);}
.kk.middels{background:rgba(251,191,36,.07);border-color:var(--gul);}
.kk.lav{background:rgba(248,113,113,.08);border-color:var(--rod);}
.kk.ikke_gjort{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);}
.kk-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.kk-tit{font-family:var(--font-h);font-size:.92rem;font-weight:700;}
.kk-lk{font-size:.66rem;color:var(--dim);background:rgba(255,255,255,.06);
  padding:2px 6px;border-radius:4px;margin-left:auto;font-family:monospace;}
.kk-b{font-size:.84rem;line-height:1.65;color:rgba(255,255,255,.75);}
.kk-tips{font-size:.8rem;line-height:1.6;padding:7px 10px;
  background:rgba(255,255,255,.04);border-radius:6px;color:rgba(255,255,255,.5);margin-top:5px;}
.karboks{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:18px 22px;margin-top:22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.kar-lbl{font-size:.82rem;color:var(--dim);}
.kar-vv{display:flex;gap:5px;}
.kb{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);
  background:transparent;color:var(--dim);font-family:var(--font-h);font-size:.95rem;
  font-weight:800;cursor:pointer;}
.kb.ak{background:var(--bla);border-color:var(--bla);color:#000;}
.kar-stor{font-family:var(--font-h);font-size:2.8rem;font-weight:900;color:var(--bla);
  min-width:55px;text-align:center;}
</style>
<style media="print">
@page{size:A4;margin:18mm 16mm;}
body{background:#fff!important;color:#111!important;font-size:10pt;}
#vt{display:none!important;}
#rapport{max-width:100%;margin:0;padding:0;}
.rhdr{background:#f8f8f8!important;border-color:#ddd!important;}
.rtit,.kk-tit{color:#111!important;}
.rmeta{color:#555!important;}.rmeta strong{color:#111!important;}
.kk.hoy{background:#f0fdf4!important;border-color:#22c55e!important;}
.kk.middels{background:#fffbeb!important;border-color:#f59e0b!important;}
.kk.lav{background:#fff1f2!important;border-color:#ef4444!important;}
.kk.ikke_gjort{background:#f9f9f9!important;border-color:#ccc!important;}
.kk-b{color:#333!important;}.kk-tips{background:#f5f5f5!important;color:#555!important;}
.kk-lk{color:#777!important;background:#f0f0f0!important;}
.karboks{background:#f8f8f8!important;border-color:#ddd!important;}
.kar-vv{display:none!important;}.kar-stor{color:#1d4ed8!important;}
</style>
</head>
<body>
<div id="vt">
  <a href="index.html" style="font-family:var(--font-h);font-size:.95rem;font-weight:800;color:var(--bla);text-decoration:none;">Skap<span style="opacity:.4;">Lab</span></a> <a href="javascript:history.back()" class="tilbake">← Tilbake</a>
  <h1>🔬 Naturfag - Kompetanserapport</h1>
  <div class="spacer"></div>
  <label class="vl"><input type="checkbox" id="vis-tall" checked>Vis tallkarakter</label>
  <button class="pdf-btn" onclick="skrivUt()">Lagre som PDF</button>
</div>
<div id="rapport">
  <div id="laster" style="padding:60px;text-align:center;color:rgba(255,255,255,.4);">Laster rapport...</div>
</div>
<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      sessionStorage.setItem(SESSION_NØKKEL, JSON.stringify(elev));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = sessionStorage.getItem(SESSION_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>
<script>
'use strict';
if(!SkapLab.erLaererInnlogget()){location.href='laerer_login.html';throw new Error();}
var laerer=SkapLab.hentLaerer(),token=laerer.access_token;
var lid=(laerer.user&&laerer.user.id)||laerer.id||'';
var params=new URLSearchParams(location.search);
var elevId=params.get('elev')||sessionStorage.getItem('skaplab_valgt_elev');
var vurd={};
try{vurd=JSON.parse(sessionStorage.getItem('skaplab_rapport_vurd')||'{}');}catch(e){}
var tallkar=null;

var KM_LISTE=[{"kode": "NAT-BIO", "tittel": "Biologi - kropp og helse", "lk": "NAT01-04/K2"}, {"kode": "NAT-KJE", "tittel": "Kjemi - stoffer og reaksjoner", "lk": "NAT01-04/K5"}, {"kode": "NAT-FYS", "tittel": "Fysikk - kraft og bevegelse", "lk": "NAT01-04/K5"}, {"kode": "NAT-ELE", "tittel": "Elektrisitet og teknologi", "lk": "NAT01-04/K3"}, {"kode": "NAT-GEN", "tittel": "Genetikk og arv", "lk": "NAT01-04/K2"}, {"kode": "NAT-OKO", "tittel": "Okologi og miljo", "lk": "NAT01-04/K4"}];
var BESKR={"NAT-BIO": {"hoy": "Viser god kunnskap om celler og kroppen.", "middels": "Forstår grunnleggende biologi, trenger mer på cellebiologi.", "lav": "Trenger grunnleggende opplæring i biologi.", "ikke_gjort": "Ikke vurdert ennå.", "tips": {"hoy": "Utforsk Mikroskoplaben på avansert nivå.", "middels": "Anbefalt: Mikroskoplaben og bio-flipcardene.", "lav": "Start med bio-flipcardene."}}, "NAT-KJE": {"hoy": "Forstår kjemiske reaksjoner og periodesystemet.", "middels": "Mestrer grunnleggende kjemi, trenger mer på reaksjonslikninger.", "lav": "Trenger grunnleggende kjemiopplæring.", "ikke_gjort": "Ikke vurdert ennå.", "tips": {"hoy": "Utforsk Kjemilaben på avansert nivå.", "middels": "Anbefalt: Kjemilaben og kjemikortene.", "lav": "Start med kjemikortene."}}, "NAT-FYS": {"hoy": "Behersker Newtons lover og energi.", "middels": "Forstår grunnleggende fysikk, trenger mer på formler.", "lav": "Trenger grunnleggende opplæring i fysikk.", "ikke_gjort": "Ikke vurdert ennå.", "tips": {"hoy": "Prøv avanserte oppgaver i Kraft og bevegelse.", "middels": "Anbefalt: Kraft og bevegelse og fysikkkortene.", "lav": "Start med fysikkkortene."}}, "NAT-ELE": {"hoy": "Forstår elektriske kretser og Ohms lov.", "middels": "Mestrer grunnleggende elektrisitet, trenger mer på kretser.", "lav": "Trenger grunnleggende opplæring.", "ikke_gjort": "Ikke vurdert ennå.", "tips": {"hoy": "Utforsk avanserte kretser i Strømlaben.", "middels": "Anbefalt: Strømlaben og elektrisitetskortene.", "lav": "Start med elektrisitetskortene."}}, "NAT-GEN": {"hoy": "Forstår arvemønstre og Punnett-firkant.", "middels": "Mestrer grunnleggende genetikk, trenger mer på arvemønstre.", "lav": "Trenger opplæring i genetikk.", "ikke_gjort": "Ikke vurdert ennå.", "tips": {"hoy": "Prøv Genetikklaben på spesialistnivå.", "middels": "Anbefalt: Genetikklaben og genetikkoppgaver.", "lav": "Start med Genetikklaben på studentnivå."}}, "NAT-OKO": {"hoy": "Forstår økosystemer og klimaproblematikk.", "middels": "Mestrer grunnleggende økologi, trenger mer på samspill.", "lav": "Trenger grunnleggende økologiopplæring.", "ikke_gjort": "Ikke vurdert ennå.", "tips": {"hoy": "Utforsk naturfagquiz (økologi).", "middels": "Anbefalt: oko-flipcardene.", "lav": "Start med oko-flipcardene."}}};

async function init(){
  if(!elevId){document.getElementById('rapport').innerHTML='<p style="padding:40px;text-align:center;">Ingen elev valgt.</p>';return;}
  var eR=await SkapLab._get('/elever?id=eq.'+elevId+'&select=fullt_navn,innloggingskode,klasser(navn,skoler(navn))',token);
  var elev=eR&&eR[0];if(!elev) return;
  if(Object.keys(vurd).length===0){
    var vR=await SkapLab._get('/vurderinger?elev_id=eq.'+elevId+'&laerer_id=eq.'+lid,token);
    if(Array.isArray(vR)) vR.forEach(function(v){vurd[v.km_kode]=v.nivaa;});
  }
  var kR=await SkapLab._get('/karakterer?elev_id=eq.'+elevId+'&laerer_id=eq.'+lid+'&fag=eq.'+encodeURIComponent('Naturfag'),token);
  if(kR&&kR[0]&&kR[0].tallkarakter) tallkar=kR[0].tallkarakter;
  byggRapport(elev);
  document.getElementById('laster').style.display='none';
}

function byggRapport(elev){
  var dato=new Date().toLocaleDateString('nb-NO',{year:'numeric',month:'long',day:'numeric'});
  var skole=(elev.klasser&&elev.klasser.skoler)?elev.klasser.skoler.navn:'';
  var klasse=elev.klasser?elev.klasser.navn:'';
  var html='<div class="rhdr"><div class="rtit">🔬 Naturfag - Kompetanserapport</div>'
    +'<div class="rmeta"><strong>'+elev.fullt_navn+'</strong>'
    +(klasse?' · '+klasse:'')+(skole?' · '+skole:'')+'<br>'+dato+'</div></div>';
  KM_LISTE.forEach(function(km){
    var n=vurd[km.kode]||'ikke_gjort';
    var b=BESKR[km.kode];
    var ikon=n==='hoy'?'🟢':n==='middels'?'🟡':n==='lav'?'🔴':'⚪';
    var nt=n==='hoy'?'Høy kompetanse':n==='middels'?'Middels kompetanse':n==='lav'?'Lav kompetanse':'Ikke vurdert';
    html+='<div class="kk '+n+'"><div class="kk-hdr"><span>'+ikon+'</span>'
      +'<span class="kk-tit">'+km.tittel+' — '+nt+'</span>'
      +'<span class="kk-lk">'+km.lk+'</span></div>';
    if(b&&b[n]) html+='<div class="kk-b">'+b[n]+'</div>';
    if(b&&n!=='ikke_gjort'&&b.tips&&b.tips[n]) html+='<div class="kk-tips"><strong>Anbefalt:</strong> '+b.tips[n]+'</div>';
    html+='</div>';
  });
  html+='<div class="karboks" id="kb"><div><div class="kar-lbl">Samlet karakter - Naturfag</div>'
    +'<div class="kar-vv">'
    +[1,2,3,4,5,6].map(function(t){return '<button class="kb'+(tallkar===t?' ak':'')+'" onclick="velgKar('+t+',this)">'+t+'</button>';}).join('')
    +'<button style="padding:0 10px;height:36px;background:transparent;border:1.5px solid var(--border);color:var(--dim);border-radius:8px;cursor:pointer;font-size:.74rem;margin-left:6px;" onclick="lagreKar()">Lagre</button>'
    +'</div></div><div class="kar-stor" id="ks">'+(tallkar||'—')+'</div></div>';
  document.getElementById('rapport').innerHTML=html;
}

function velgKar(t,el){tallkar=t;document.querySelectorAll('.kb').forEach(function(b){b.classList.remove('ak');});el.classList.add('ak');document.getElementById('ks').textContent=t;}

async function lagreKar(){
  if(!tallkar) return;
  await fetch(SkapLab.SUPABASE_URL+'/rest/v1/karakterer',{method:'POST',
    headers:Object.assign(SkapLab._hdr(token),{'Prefer':'resolution=merge-duplicates'}),
    body:JSON.stringify({elev_id:elevId,laerer_id:lid,fag:'Naturfag',tallkarakter:tallkar,vis_tall_i_pdf:document.getElementById('vis-tall').checked})
  });
  alert('Karakter '+tallkar+' lagret for Naturfag!');
}

function skrivUt(){
  var visTall=document.getElementById('vis-tall').checked;
  if(!visTall){var kb=document.getElementById('kb');if(kb) kb.style.display='none';}
  window.print();
  var kb=document.getElementById('kb');if(kb) kb.style.display='';
}
init();
</script>
