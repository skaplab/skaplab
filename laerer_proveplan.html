<style>
:root{--bg:#07090f;--bg2:#0b0d18;--bg3:#0e1120;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#e0e8ff;--dim:rgba(255,255,255,.42);--bla:#60a5fa;--gron:#34d399;--gul:#fbbf24;--rod:#f87171;--lilla:#a78bfa;--font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
nav.topnav{height:52px;display:flex;align-items:center;padding:0 20px;gap:10px;background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;}
.nav-logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);text-decoration:none;}.spacer{flex:1;}
.print-btn{padding:6px 14px;background:var(--bla);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-size:.78rem;font-weight:800;cursor:pointer;}

#laerer-nav{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  padding:16px 10px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;
  display:flex;flex-direction:column;gap:2px;}
.ln-logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;padding:4px 10px 12px;color:var(--bla);}
.ln-logo span{color:var(--lilla);}
.ln-sek{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding:10px 10px 4px;margin-top:4px;}
.ln-link{padding:7px 10px;border-radius:8px;font-size:.82rem;color:var(--dim);text-decoration:none;transition:all .15s;display:block;}
.ln-link:hover{background:rgba(255,255,255,.05);color:var(--text);}
.ln-link.ln-ak{background:rgba(96,165,250,.12);color:var(--bla);}
@media(max-width:800px){#laerer-nav{width:100%;position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:8px;border-right:none;border-bottom:1px solid var(--border);}
  .ln-sek{display:none;}.ln-logo{width:100%;padding-bottom:6px;}}

#page{display:flex;min-height:calc(100vh - 52px);}
#main{flex:1;padding:20px;display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start;}
#elev-bar{grid-column:1/-1;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;}
.ev-lbl{font-size:.8rem;color:var(--dim);}
#klasse-sel,#elev-sel{padding:7px 12px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:9px;color:var(--text);font-family:var(--font-b);font-size:.85rem;cursor:pointer;outline:none;min-width:160px;}
#laster{grid-column:1/-1;padding:40px;text-align:center;color:var(--dim);}
#km-velger{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;overflow-y:auto;max-height:70vh;}
.km-velger-hdr{font-family:var(--font-h);font-size:.88rem;font-weight:800;color:var(--bla);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.km-velger-ctrl{display:flex;gap:4px;}
.km-ctrl-btn{padding:3px 9px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--dim);font-size:.67rem;cursor:pointer;}
.km-sek{margin-bottom:12px;}
.km-sek-hdr{font-family:var(--font-h);font-size:.75rem;font-weight:800;color:var(--dim);padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:6px;}
.km-cb-label{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:.78rem;line-height:1.3;}
.km-cb-label:hover{background:rgba(255,255,255,.04);}
.km-cb-label input{width:14px;height:14px;flex-shrink:0;accent-color:var(--bla);}
.km-kort-tekst{color:var(--dim);font-size:.75rem;}
#prove-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.prove-panel-hdr{font-family:var(--font-h);font-size:.88rem;font-weight:800;color:var(--bla);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
#prove-antall{font-size:.78rem;color:var(--dim);}
.prove-dato-rad{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.prove-dato-lbl{font-size:.78rem;color:var(--dim);}
#prove-dato{padding:6px 10px;background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:.78rem;font-family:var(--font-b);}
#prove-dato::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer;}
.prove-tom{color:var(--dim);font-size:.82rem;padding:20px;text-align:center;}
.prove-rad{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.prove-rad-info{flex:1;}
.prove-km-tekst{font-size:.82rem;color:var(--dim);}
.prove-notat-felt{width:100%;padding:4px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.73rem;font-family:var(--font-b);margin-top:4px;outline:none;}
.prove-pdf-btn{margin-top:14px;padding:9px 20px;background:var(--bla);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-size:.8rem;font-weight:800;cursor:pointer;width:100%;}
.prove-dato-vis{font-family:var(--font-h);font-size:.95rem;font-weight:800;padding:10px 0 4px;border-bottom:2px solid var(--border2);margin-bottom:14px;}
@media(max-width:800px){#main{grid-template-columns:1fr;}#km-velger{max-height:300px;}}
</style>

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>

var ALLE_KM=KM_DATA.mat8.concat(KM_DATA.mat9).concat(KM_DATA.mat10).concat(KM_DATA.nat).concat(KM_DATA.prg);
var laerer=SkapLab.hentLaerer();var token=laerer?laerer.access_token:null;
var lid=laerer?((laerer.user&&laerer.user.id)||laerer.id||''):'';
if(!laerer){location.href='laerer_login.html';}
var klasser=[],elever=[],valgtKlasseId='',valgtElevId=new URLSearchParams(location.search).get('elev')||'';
var vurd={},merkander={},proveValgte=new Set();
async function init(){
  document.getElementById('laster').style.display='block';
  try{var kR=await SkapLab._get('/klasser?order=navn',token);klasser=Array.isArray(kR)?kR:[];}catch(e){}
  try{var eR=await SkapLab._get('/elever?aktiv=eq.true&order=fullt_navn&select=id,fullt_navn,klasse_id',token);elever=Array.isArray(eR)?eR:[];}catch(e){}
  byggKlasseVelger();
  if(valgtElevId){var el=elever.find(function(e){return e.id===valgtElevId;});if(el){valgtKlasseId=el.klasse_id;var ks=document.getElementById('klasse-sel');if(ks)ks.value=valgtKlasseId;byggElevVelger();}await lastElevData(valgtElevId);}
  document.getElementById('laster').style.display='none';
}
function byggKlasseVelger(){var sel=document.getElementById('klasse-sel');if(!sel)return;sel.innerHTML='<option value="">— Velg klasse —</option>';klasser.forEach(function(k){var o=document.createElement('option');o.value=k.id;o.textContent=k.navn;if(k.id===valgtKlasseId)o.selected=true;sel.appendChild(o);});}
function byttKlasse(id){valgtKlasseId=id;valgtElevId='';document.getElementById('prove-wrap').style.display='none';byggElevVelger();}
function byggElevVelger(){var sel=document.getElementById('elev-sel');if(!sel)return;var l=valgtKlasseId?elever.filter(function(e){return e.klasse_id===valgtKlasseId;}):[];sel.innerHTML=l.length?'<option value="">— Velg elev —</option>':'<option value="">— Velg klasse først —</option>';l.forEach(function(e){var o=document.createElement('option');o.value=e.id;o.textContent=e.fullt_navn;if(e.id===valgtElevId)o.selected=true;sel.appendChild(o);});sel.disabled=!l.length;}
async function byttElev(id){valgtElevId=id;if(!id){document.getElementById('prove-wrap').style.display='none';return;}vurd={};merkander={};proveValgte=new Set();document.getElementById('laster').style.display='block';await lastElevData(id);document.getElementById('laster').style.display='none';}
async function lastElevData(id){
  var vR=await SkapLab._get('/vurderinger?elev_id=eq.'+id+'&laerer_id=eq.'+lid+'&select=km_kode,nivaa',token);if(Array.isArray(vR))vR.forEach(function(v){if(v.nivaa)vurd[v.km_kode]=v.nivaa;});
  var eR=await SkapLab._get('/elever?id=eq.'+id+'&select=fullt_navn',token);var elev=eR&&eR[0];
  if(elev){document.getElementById('elev-navn').textContent=elev.fullt_navn||'—';}
  document.getElementById('km-velger').style.display='block';document.getElementById('prove-panel').style.display='block';
  document.getElementById('dato').textContent=new Date().toLocaleDateString('nb-NO',{year:'numeric',month:'long',day:'numeric'});
  byggKMVelger();
}
function byggKMVelger(){
  var el=document.getElementById('km-velger-innhold');el.innerHTML='';
  [{id:'mat8',t:'📐 Mat 8',km:KM_DATA.mat8},{id:'mat9',t:'📐 Mat 9',km:KM_DATA.mat9},{id:'mat10',t:'📐 Mat 10',km:KM_DATA.mat10},{id:'nat',t:'🔬 Naturfag',km:KM_DATA.nat},{id:'prg',t:'💻 Prog',km:KM_DATA.prg}].forEach(function(sek){
    var div=document.createElement('div');div.className='km-sek';
    div.innerHTML='<div class="km-sek-hdr">'+sek.t+'</div>';
    sek.km.forEach(function(km){
      var n=vurd[km[0]]||'';
      var nF=n==='hoy'?'#34d399':n==='middels'?'#fbbf24':n==='lav'?'#f87171':'rgba(255,255,255,.2)';
      var label=document.createElement('label');label.className='km-cb-label';
      label.innerHTML='<input type="checkbox" class="km-prove-cb" data-km="'+km[0]+'" '+(proveValgte.has(km[0])?'checked ':'')+' onchange="toggleKM(this)">'
        +'<code class="km-kod" style="color:'+nF+'">'+km[0]+'</code>'
        +'<span class="km-kort-tekst">'+km[1].substring(0,65)+'</span>';
      div.appendChild(label);
    });
    el.appendChild(div);
  });
}
function toggleKM(cb){var km=cb.dataset.km;if(cb.checked)proveValgte.add(km);else proveValgte.delete(km);oppdaterProveListe();}
function velgAlle(pa){document.querySelectorAll('.km-prove-cb').forEach(function(cb){cb.checked=pa;if(pa)proveValgte.add(cb.dataset.km);else proveValgte.delete(cb.dataset.km);});oppdaterProveListe();}
function oppdaterProveListe(){
  var el=document.getElementById('prove-liste');if(!el)return;
  var teller=document.getElementById('prove-antall');if(teller)teller.textContent=proveValgte.size+' KM valgt';
  if(!proveValgte.size){el.innerHTML='<div class="prove-tom">Huk av kompetansemål i listen til venstre.</div>';return;}
  var html='';
  proveValgte.forEach(function(km){
    var info=ALLE_KM.find(function(k){return k[0]===km;});
    html+='<div class="prove-rad"><code class="km-kod">'+km+'</code>'
      +'<div class="prove-rad-info"><div class="prove-km-tekst">'+(info?info[1]:km)+'</div>'
      +'<input type="text" class="prove-notat-felt" placeholder="Notat…" value="'+(merkander[km]||'').replace(/"/g,'&quot;')+'" data-km="'+km+'" oninput="merkander[this.dataset.km]=this.value">'
      +'</div></div>';
  });
  el.innerHTML=html;
}
function skrivUtProve(){
  if(!proveValgte.size){alert('Velg kompetansemål til prøven først.');return;}
  var dato=document.getElementById('prove-dato');
  var el=document.getElementById('prove-dato-vis');
  if(!el){el=document.createElement('div');el.id='prove-dato-vis';el.className='prove-dato-vis';var pw=document.getElementById('prove-wrap');if(pw)pw.insertBefore(el,pw.firstChild);}
  if(dato&&dato.value){var d=new Date(dato.value);el.textContent='Prøvedato: '+d.toLocaleDateString('nb-NO',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
  setTimeout(function(){window.print();},100);
}
init();
