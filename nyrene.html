<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a0e;--surface:#0c1018;--border:rgba(125,211,252,.07);
  --text:#e8eaf0;--dim:#4a5568;
  --accent:#7dd3fc;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 55% at 50% 40%,rgba(125,211,252,.025) 0%,transparent 65%);}
nav{position:sticky;top:0;z-index:300;background:rgba(6,10,14,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:12px;}
.nav-lnk{font-size:.82rem;font-weight:500;color:var(--dim);text-decoration:none}
.nav-lnk:hover{color:var(--text)}.nav-sep{color:var(--border)}
.nav-tittel{font-family:var(--font-d);font-size:.9rem;color:var(--accent)}
.layout{position:relative;z-index:1;display:grid;grid-template-columns:220px 1fr 220px;
  max-width:1260px;margin:0 auto;padding:0 16px 60px;gap:0 20px;}
.header{grid-column:1/-1;text-align:center;padding:32px 20px 20px;}
.header h1{font-family:var(--font-d);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:700;margin-bottom:6px;}
.header h1 em{font-style:italic;color:var(--accent)}
.header-sub{font-size:.85rem;color:var(--dim);letter-spacing:.03em}
.side-panel{padding:16px 0;display:flex;flex-direction:column;gap:7px;align-self:start;position:sticky;top:65px;}
.side-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:8px 4px 4px;font-weight:600}
.organ-knapp{font-family:var(--font-b);font-size:.78rem;font-weight:500;padding:8px 12px;border-radius:10px;
  border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--dim);cursor:pointer;text-align:left;
  transition:all .2s;display:flex;align-items:center;gap:8px;}
.organ-knapp:hover{border-color:rgba(125,211,252,.3);color:var(--text);background:rgba(125,211,252,.04)}
.organ-knapp.aktiv{border-color:var(--farge,var(--accent));color:var(--farge,var(--accent));background:rgba(125,211,252,.06);}
.organ-knapp .dot{width:7px;height:7px;border-radius:50%;background:var(--farge,var(--accent));flex-shrink:0;opacity:.65}
.organ-knapp.aktiv .dot{opacity:1;box-shadow:0 0 6px var(--farge,var(--accent))}
.senter{display:flex;flex-direction:column;align-items:center;gap:16px}
.nyresvg{width:100%;max-width:560px;height:auto;display:block}
.info-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:24px;width:100%;max-width:560px;min-height:160px;position:relative;overflow:hidden;transition:all .3s;}
.info-panel::before{content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,var(--pglow,rgba(125,211,252,.04)),transparent);pointer-events:none;}
.info-tom{display:flex;align-items:center;justify-content:center;height:120px;color:var(--dim);font-size:.85rem;letter-spacing:.04em;text-transform:uppercase;}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.info-emoji{font-size:2rem}
.info-navn{font-family:var(--font-d);font-size:1.35rem;font-weight:700;color:var(--organ-farge,var(--accent))}
.info-latin{font-size:.78rem;color:var(--dim);font-style:italic;margin-top:1px}
.info-divider{height:1px;background:var(--border);margin:0 0 14px}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.info-kort{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.info-kort-label{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.info-kort-verdi{font-size:.8rem;font-weight:500;color:var(--text);line-height:1.4}
.info-tekst{font-size:.83rem;line-height:1.7;color:rgba(232,234,240,.8)}
.info-fakta{margin-top:12px;padding:10px 13px;background:rgba(255,255,255,.02);
  border-left:3px solid var(--organ-farge,var(--accent));border-radius:0 8px 8px 0;font-size:.8rem;line-height:1.6;color:var(--dim);}
.hotspot{cursor:pointer;transition:all .2s}
.hotspot:hover .hf{filter:brightness(1.4) saturate(1.3);}
.hotspot.aktiv .hf{filter:brightness(1.6) saturate(1.6);}
.tooltip{position:absolute;background:rgba(6,10,14,.95);border:1px solid rgba(125,211,252,.15);border-radius:8px;
  padding:5px 10px;font-size:.75rem;color:var(--text);pointer-events:none;white-space:nowrap;
  transform:translate(-50%,-100%) translateY(-8px);z-index:10;transition:opacity .15s;}
@media(max-width:900px){.layout{grid-template-columns:1fr}.side-panel{flex-direction:row;flex-wrap:wrap;position:static}}
</style>
</head>

<script>

// ── SKAPLAB SPORING ──────────────────────────────────────────────
(function() {
  try {
    var _elev = null;
    try { _elev = JSON.parse(localStorage.getItem('skaplab_elev')); } catch(e) {}
    window._skaplab_logg = function(ressurs, km_kode, score_pst, antall, riktige, fullfort_ant, totalt_ant) {
      if (!_elev || !_elev.id) return;
      fetch('https://cqzmzsqhuawpsvnjjzse.supabase.co/rest/v1/aktivitet', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j',
          'Authorization': 'Bearer sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j'
        },
        body: JSON.stringify({
          elev_id: _elev.id,
          ressurs: ressurs,
          km_kode: km_kode,
          score_pst: Math.round(score_pst || 0),
          antall_oppgaver: antall || null,
          riktige: riktige || null,
          fullfort_antall: fullfort_ant || null,
          totalt_antall: totalt_ant || null
        })
      }).catch(function() {});
    };
  } catch(e) {}
})();
// ─────────────────────────────────────────────────────────────────
const DATA = {
  bark: {navn:'Nyrebarken', latin:'Cortex renalis', emoji:'🫘',
    fakta:[{l:'Tykkelse',v:'~1 cm'},{l:'Farge',v:'Rødbrunt'},{l:'Innhold',v:'Glomeruli + tubuli'},{l:'Funksjon',v:'Filtrering'}],
    tekst:'Nyrebarken er det ytre laget av nyreparenkymet og inneholder alle glomeruli (kapillærknuter) og de proksimale og distale tubuli. Her begynner filtreringen av blodet. Barken har rik blodforsyning – nyrene mottar 20–25% av hjertets minuttvolum.',
    morsomt:'Til tross for at nyrene bare utgjør 0,5% av kroppsvekten, mottar de 25% av alt blod hjertet pumper ut – mer enn hjernen per gram vev.'},
  marg: {navn:'Nyremarg', latin:'Medulla renalis', emoji:'🫘',
    fakta:[{l:'Struktur',v:'8–12 pyramider'},{l:'Innhold',v:'Henles slynge + samlerør'},{l:'Konsentrasjon',v:'Høy osmolaritet'},{l:'Funksjon',v:'Konsentrering'}],
    tekst:'Nyremedulla består av 8–12 nyrpyramider og inneholder Henles slynge og samlerørene. Her skjer konsentreringen av urinen – osmolariteten øker fra ~300 mOsm i barken til ~1200 mOsm i innerste marg. ADH-hormonet styrer vannreabsorpsjonen i samlerørene.',
    morsomt:'Nyremargen kan konsentrere urin til 4× blodsaltinnholdet – nødvendig for å spare vann. Ørkenlevende dyr (kenguruspringmus) kan konsentrere til 25× blodnivå!'},
  bekken: {navn:'Nyrebekkenet', latin:'Pelvis renalis', emoji:'🫘',
    fakta:[{l:'Volum',v:'~8 ml'},{l:'Kobler til',v:'Ureter'},{l:'Inneholder',v:'Nyrekalker'},{l:'Funksjon',v:'Samler urin'}],
    tekst:'Nyrebekkenet er hulrommet i indre del av nyrene som samler urin fra alle samlerørene via nyralkene (calyces). Herfra ledes urinen ned gjennom urinlederen (ureter) til urinblæren. Nyresten kan blokkere dette systemet og gi intense kolikksmerter.',
    morsomt:'Nyrekolikk – smerten av en nyresten som beveger seg ned i ureter – beskrives ofte som den verste smerten et menneske kan oppleve, verre enn fødselsveer.'},
  ureter: {navn:'Urinlederen', latin:'Ureter', emoji:'🔴',
    fakta:[{l:'Lengde',v:'25–30 cm'},{l:'Diameter',v:'3–4 mm'},{l:'Bevegelse',v:'Peristaltikk'},{l:'Til',v:'Urinblæren'}],
    tekst:'Urinlederen er et muskelrør som fører urin fra nyrebekkenet til urinblæren via peristaltiske bølgebevegelser. Den har tre naturlige innsnevringer der nyresten kan sette seg fast: ved nyrbekkenet, der den krysser bekkeninnløpet, og ved innmunningen i blæren.',
    morsomt:'Urinlederen er bare 3–4 mm bred på det smaleste – en nyresten på 4 mm vil neppe passere på egen hånd og krever ofte behandling med sjokkbølger (litotripsi).'},
  kapsel: {navn:'Nyrens kapsel', latin:'Capsula fibrosa', emoji:'🫘',
    fakta:[{l:'Type',v:'Fibrøs kapsel'},{l:'Funksjon',v:'Beskyttelse'},{l:'Rundt',v:'Fettkapsel'},{l:'Klinisk',v:'Blokkerer hevelse'}],
    tekst:'Nyrene er omgitt av en tett fibrøs kapsel som gir mekanisk beskyttelse. Rundt kapselen ligger en fettkapsel (capsula adiposa) som gir støt-demping og holder nyrene på plass. Ved nyrebetennelse (pyelonefritt) kan hevelse mot kapselen gi intense smerter i ryggen.',
    morsomt:'Nyrene er retroperitoneale – de ligger bak bukhinnen, ikke inne i bukhulen. Høyre nyre ligger litt lavere enn venstre fordi leveren presser den ned.'},
  nefron: {navn:'Nefronet', latin:'Nephron', emoji:'🔬',
    fakta:[{l:'Antall',v:'~1 million/nyre'},{l:'Lengde',v:'~55 mm'},{l:'Filtrat/dag',v:'180 liter'},{l:'Urin/dag',v:'1–2 liter'}],
    tekst:'Nefronet er nyrets funksjonelle enhet. Hvert nefron består av glomerulus (filtreringsknute), Bowmans kapsel, proksimal tubulus, Henles slynge, distal tubulus og samlerør. 99% av filtrat reabsorberes – bare 1% blir til urin. Antall nefron reduseres med alderen.',

let aktivStruktur = null;
const tooltip = document.getElementById('tooltip');
const svg = document.getElementById('nyre-svg');

function velg(id) {
  const data = DATA[id];
  if (!data) return;
  aktivStruktur = id;
  document.querySelectorAll('.organ-knapp').forEach(b =>
    b.classList.toggle('aktiv', b.getAttribute('onclick') === `velg('${id}')`));
  document.querySelectorAll('.hotspot').forEach(el =>
    el.classList.toggle('aktiv', el.id === 'hot-' + id));
  document.getElementById('info-tom').style.display = 'none';
  const innhold = document.getElementById('info-innhold');
  innhold.style.display = 'block';
  const farge = document.querySelector(`.organ-knapp[onclick="velg('${id}')"]`)?.style.getPropertyValue('--farge') || '#7dd3fc';
  document.getElementById('info-panel').style.setProperty('--organ-farge', farge);
  document.getElementById('info-panel').style.setProperty('--pglow', farge + '22');
  const kortHTML = (data.fakta||[]).map(f => `
    <div class="info-kort"><div class="info-kort-label">${f.l}</div><div class="info-kort-verdi">${f.v}</div></div>`).join('');
  innhold.innerHTML = `
    <div class="info-header">
      <span class="info-emoji">${data.emoji}</span>
      <div><div class="info-navn">${data.navn}</div><div class="info-latin">${data.latin}</div></div>
    </div>
    <div class="info-divider"></div>
    <div class="info-grid">${kortHTML}</div>
    <p class="info-tekst">${data.tekst}</p>
    <div class="info-fakta">💡 <strong>Visste du?</strong> ${data.morsomt}</div>`;
  if (window.innerWidth < 900)
    document.getElementById('info-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

document.querySelectorAll('.hotspot').forEach(el => {
  const id = el.id.replace('hot-', '');
  const data = DATA[id];
  if (!data) return;
  el.addEventListener('mouseenter', () => { tooltip.textContent = data.navn; tooltip.style.opacity = '1'; });
  el.addEventListener('mousemove', e => {
    const r = svg.getBoundingClientRect();
    tooltip.style.left = (e.clientX - r.left) + 'px';
    tooltip.style.top = (e.clientY - r.top) + 'px';
  });
  el.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });
});

// Spor fullfoering ved scroll til bunn
(function() {
  var _sporet = false;
  function sjekkScroll() {
    if (_sporet) return;
    if (window.scrollY + window.innerHeight >= document.body.scrollHeight - 100) {
      _sporet = true;
      window._skaplab_logg('nyrene', 'NAT-14', 100, 1, 1, 1, 1);
      window.removeEventListener('scroll', sjekkScroll);
    }
  }
  window.addEventListener('scroll', sjekkScroll);
  setTimeout(function() {
    if (!_sporet) { _sporet=true; window._skaplab_logg('nyrene', 'NAT-14', 80, 1, 1, 1, 1); }
  }, 60000);
})();
