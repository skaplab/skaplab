<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min side - SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg2:#0b0d18;--bg3:#0e1120;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e0e8ff;--dim:rgba(255,255,255,.45);
  --bla:#60a5fa;--gron:#34d399;--gul:#fbbf24;--rod:#f87171;--lilla:#a78bfa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}

#topbar{height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;}
.logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);}
.logo span{opacity:.4;}
.spacer{flex:1;}
#elev-chip{font-size:.8rem;color:var(--dim);}
.tbtn{padding:5px 12px;border:1px solid var(--border);background:transparent;
  color:var(--dim);border-radius:7px;cursor:pointer;font-size:.76rem;}

#innhold{max-width:1000px;margin:0 auto;padding:20px 20px 40px;}

/* Velkomst */
.velkomst{background:linear-gradient(135deg,rgba(96,165,250,.1),rgba(167,139,250,.07));
  border:1px solid rgba(96,165,250,.18);border-radius:14px;
  padding:20px 24px;margin-bottom:22px;
  display:flex;align-items:center;gap:16px;}
.velk-avatar{width:46px;height:46px;border-radius:12px;
  background:rgba(96,165,250,.15);display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;flex-shrink:0;}
.velk-info h2{font-family:var(--font-h);font-size:1.2rem;font-weight:800;}
.velk-info p{font-size:.83rem;color:var(--dim);margin-top:3px;}

/* Tildelte oppgaver */
.sek{margin-bottom:24px;}
.sek-tittel{font-family:var(--font-h);font-size:.95rem;font-weight:800;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sek-ant{font-size:.7rem;background:rgba(255,255,255,.08);padding:2px 9px;
  border-radius:10px;color:var(--dim);font-family:var(--font-b);font-weight:400;}

.oppg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.oppg-kort{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:13px 15px;text-decoration:none;color:var(--text);
  transition:all .15s;display:flex;flex-direction:column;gap:7px;}
.oppg-kort:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.oppg-type-rad{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);}
.oppg-tittel{font-family:var(--font-h);font-size:.9rem;font-weight:700;}
.oppg-fremgang{display:flex;align-items:center;gap:8px;}
.fremgang-bar{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.fremgang-fill{height:100%;border-radius:3px;transition:width .3s;}
.fremgang-tekst{font-size:.7rem;color:var(--dim);font-family:var(--font-m);white-space:nowrap;}
.oppg-frist{font-size:.7rem;color:var(--gul);}

/* Fanelinje */
.faner{display:flex;gap:4px;margin-bottom:20px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:4px;}
.fane{flex:1;padding:9px 12px;border-radius:9px;cursor:pointer;
  font-size:.83rem;font-family:var(--font-h);font-weight:700;
  color:var(--dim);text-align:center;transition:all .15s;border:none;background:transparent;}
.fane:hover{color:var(--text);}
.fane.ak.matte{background:rgba(139,92,246,.2);color:#c4b5fd;}
.fane.ak.natur{background:rgba(52,211,153,.15);color:var(--gron);}
.fane.ak.prog{background:rgba(96,165,250,.15);color:var(--bla);}
.fane.ak.alle{background:rgba(255,255,255,.1);color:var(--text);}

/* Ressursgrid */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.res-gruppe{margin-bottom:20px;}
.res-gruppe-tittel{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;
  color:var(--dim);margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.res-kort{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;text-decoration:none;color:var(--text);
  display:flex;flex-direction:column;gap:5px;transition:all .15s;}
.res-kort:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.res-type-ikon{font-size:.85rem;}
.res-tittel{font-family:var(--font-h);font-size:.86rem;font-weight:700;line-height:1.3;}
.res-fremgang{display:flex;align-items:center;gap:6px;margin-top:3px;}
.res-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.res-fill{height:100%;border-radius:2px;}
.res-pst{font-size:.68rem;color:var(--dim);font-family:var(--font-m);}

/* Aktivitetsoversikt */
.akt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.akt-kort{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.akt-tittel{font-weight:600;font-size:.88rem;}
.akt-bar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.akt-fill{height:100%;border-radius:3px;}
.akt-meta{font-size:.7rem;color:var(--dim);font-family:var(--font-m);}
.tom{padding:28px;text-align:center;color:var(--dim);font-size:.86rem;
  background:var(--bg2);border:1px solid var(--border);border-radius:11px;}

    /* Velkomst */
    .velkomst{background:linear-gradient(135deg,rgba(96,165,250,.12),rgba(167,139,250,.08));border:1px solid rgba(96,165,250,.2);border-radius:14px;padding:22px 26px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .velk-avatar{width:52px;height:52px;border-radius:14px;background:rgba(96,165,250,.15);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
    .velk-info h2{font-family:var(--font-h);font-size:1.3rem;font-weight:900;}
    .velk-info p{font-size:.85rem;color:var(--dim);margin-top:4px;}
    .velk-stats{margin-left:auto;display:flex;gap:16px;flex-wrap:wrap;}
    .velk-stat{text-align:center;}
    .velk-stat-tall{font-family:var(--font-h);font-size:1.4rem;font-weight:900;color:var(--bla);}
    .velk-stat-lab{font-size:.68rem;color:var(--dim);}
    /* Karusell */
    .karusell-tittel{font-family:var(--font-h);font-size:.9rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .karusell-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:thin;margin-bottom:28px;}
    .karusell-kort{min-width:240px;max-width:280px;border-radius:12px;border:1.5px solid var(--border2);background:var(--bg2);padding:14px 16px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
    .karusell-kort.tildelt{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.05);}
    .karusell-kort.aktivitet{border-color:rgba(96,165,250,.2);background:rgba(96,165,250,.04);}
    .karusell-kort.anbefalt{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.05);}
    .kar-type{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);}
    .kar-tittel{font-family:var(--font-h);font-size:.92rem;font-weight:700;}
    .kar-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
    .kar-fill{height:100%;border-radius:2px;}
    .kar-meta{font-size:.72rem;color:var(--dim);font-family:var(--font-m);}
    .kar-btn{margin-top:4px;padding:7px 14px;border-radius:8px;border:none;font-family:var(--font-h);font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;text-align:center;}
    .kar-btn.gul{background:rgba(251,191,36,.2);color:var(--gul);}
    .kar-btn.bla{background:rgba(96,165,250,.15);color:var(--bla);}
    .kar-btn.gron{background:rgba(52,211,153,.15);color:var(--gron);}
    /* Lyspære */
    .lyspare-btn{background:transparent;border:1px solid rgba(251,191,36,.3);color:rgba(251,191,36,.6);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:.8rem;transition:all .15s;flex-shrink:0;}
    .lyspare-btn:hover,.lyspare-btn.aktiv{background:rgba(251,191,36,.15);color:var(--gul);border-color:rgba(251,191,36,.5);}
    /* Faner */
    .faner{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:4px;overflow-x:auto;}
    .fane{flex:1;min-width:90px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:.78rem;font-family:var(--font-h);font-weight:700;color:var(--dim);text-align:center;transition:all .15s;border:none;background:transparent;white-space:nowrap;}
    .fane:hover{color:var(--text);}
    .fane.ak.matte{background:rgba(139,92,246,.2);color:#c4b5fd;}
    .fane.ak.natur{background:rgba(52,211,153,.15);color:var(--gron);}
    .fane.ak.prog{background:rgba(96,165,250,.15);color:var(--bla);}
    .fane.ak.alle{background:rgba(255,255,255,.1);color:var(--text);}
    .fane.ak.vurder{background:rgba(251,191,36,.15);color:var(--gul);}
    /* Ressurser */
    .res-gruppe{margin-bottom:20px;}
    .res-gruppe-tittel{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border);}
    .res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;}
    .res-kort{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:5px;transition:all .15s;position:relative;}
    .res-kort:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
    .res-kort-hdr{display:flex;align-items:flex-start;gap:6px;}
    .res-type-ikon{font-size:.85rem;flex-shrink:0;}
    .res-tittel{font-family:var(--font-h);font-size:.86rem;font-weight:700;line-height:1.3;flex:1;}
    .res-fremgang{display:flex;align-items:center;gap:6px;margin-top:3px;}
    .res-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
    .res-fill{height:100%;border-radius:2px;}
    .res-pst{font-size:.68rem;color:var(--dim);font-family:var(--font-m);}
    /* Egenvurdering */
    .egenv-seksjon{margin-bottom:28px;}
    .egenv-fag{margin-bottom:20px;}
    .egenv-fag-tittel{font-family:var(--font-h);font-size:1rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .egenv-grid{display:flex;flex-direction:column;gap:10px;}
    .egenv-rad{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .egenv-km{flex:1;min-width:160px;}
    .egenv-km-kode{font-size:.68rem;font-family:var(--font-m);color:var(--dim);margin-bottom:2px;}
    .egenv-km-tittel{font-size:.88rem;font-weight:600;}
    .egenv-km-desc{font-size:.74rem;color:var(--dim);}
    .egenv-valg{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .egenv-btn{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;font-size:.78rem;font-family:var(--font-h);font-weight:700;transition:all .15s;}
    .egenv-btn:hover{color:var(--text);}
    .egenv-btn.lav.ak{background:rgba(248,113,113,.15);color:var(--rod);border-color:rgba(248,113,113,.4);}
    .egenv-btn.middels.ak{background:rgba(251,191,36,.15);color:var(--gul);border-color:rgba(251,191,36,.4);}
    .egenv-btn.hoy.ak{background:rgba(52,211,153,.15);color:var(--gron);border-color:rgba(52,211,153,.4);}
    .egenv-btn.vet_ikke.ak{background:rgba(255,255,255,.08);color:var(--dim);border-color:rgba(255,255,255,.2);}
    .egenv-lagret{font-size:.7rem;color:var(--gron);margin-left:4px;opacity:0;transition:opacity .3s;}
    /* Aktivitet */
    .akt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
    .akt-kort{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
    .akt-tittel{font-weight:600;font-size:.88rem;}
    .akt-bar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
    .akt-fill{height:100%;border-radius:3px;}
    .akt-meta{font-size:.7rem;color:var(--dim);font-family:var(--font-m);}
    .tom{padding:28px;text-align:center;color:var(--dim);font-size:.86rem;background:var(--bg2);border:1px solid var(--border);border-radius:11px;}

</style>
</head>
<body>

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

async function init() {
  // Hent aktivitet
  var aktResp = await fetch(
    SkapLab.SUPABASE_URL + '/rest/v1/aktivitet?elev_id=eq.' + elev.id +
    '&order=tidspunkt.desc&limit=200',
    { headers: { 'apikey': SkapLab.SUPABASE_KEY, 'Authorization': 'Bearer ' + SkapLab.SUPABASE_KEY }}
  ).then(function(r){return r.json();}).catch(function(){return [];});
  aktivitet = Array.isArray(aktResp) ? aktResp : [];

  // Hent tildelte oppgaver
  var tildelResp = await fetch(
    SkapLab.SUPABASE_URL + '/rest/v1/tildeling' +
    '?or=(elev_id.eq.' + elev.id + ',klasse_id.eq.' + (elev.klasse_id||'00000000-0000-0000-0000-000000000000') + ')' +
    '&select=id,frist,oppgaver(tittel,type,ressurs,url,fag)',
    { headers: { 'apikey': SkapLab.SUPABASE_KEY, 'Authorization': 'Bearer ' + SkapLab.SUPABASE_KEY }}
  ).then(function(r){return r.json();}).catch(function(){return [];});
  tildelte = Array.isArray(tildelResp) ? tildelResp : [];

  // Bygg aktivitets-map: ressurs → {snitt_score, siste_fullfort, siste_antall, siste_totalt}
  window._aktMap = {};
  aktivitet.forEach(function(a) {
    if (!_aktMap[a.ressurs]) _aktMap[a.ressurs] = {scorer:[], fullfort:a.fullfort_antall, totalt:a.totalt_antall};
    else {
      if (!_aktMap[a.ressurs].fullfort && a.fullfort_antall) _aktMap[a.ressurs].fullfort = a.fullfort_antall;
      if (!_aktMap[a.ressurs].totalt && a.totalt_antall) _aktMap[a.ressurs].totalt = a.totalt_antall;
    }
    if (a.score_pst !== null) _aktMap[a.ressurs].scorer.push(a.score_pst);
  });
  Object.keys(_aktMap).forEach(function(r) {
    var s = _aktMap[r].scorer;
    _aktMap[r].snitt = s.length ? Math.round(s.reduce(function(a,b){return a+b;},0)/s.length) : null;
    _aktMap[r].okter = s.length;
  });

  // Vis tildelte oppgaver
  if (tildelte.length > 0) {
    document.getElementById('sek-oppgaver').style.display = 'block';
    document.getElementById('oppg-ant').textContent = tildelte.length;
    var grid = document.getElementById('oppg-grid');
    tildelte.forEach(function(t) {
      if (!t.oppgaver) return;
      var o = t.oppgaver;
      var akt = _aktMap[o.ressurs];
      var kort = document.createElement('a');
      kort.href = o.url;
      kort.className = 'oppg-kort';
      var fremgangHtml = '';
      if (akt) {
        var pst = akt.snitt !== null ? akt.snitt : 0;
        var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
        var tekst = akt.fullfort && akt.totalt ?
          akt.fullfort+'/'+akt.totalt+' oppgaver' :
          (akt.okter+' økt'+(akt.okter>1?'er':''));
        fremgangHtml = '<div class="oppg-fremgang">'
          +'<div class="fremgang-bar"><div class="fremgang-fill" style="width:'+pst+'%;background:'+farge+'"></div></div>'
          +'<span class="fremgang-tekst">'+tekst+'</span></div>';
      }
      var typeIkon = o.type==='spill'?'🎮':o.type==='teorikort'?'🃏':o.type==='mengde'?'✏️':'📖';
      kort.innerHTML =
        '<div class="oppg-type-rad">'+typeIkon+' '+o.type+(o.fag?' · '+o.fag:'')+'</div>'+
        '<div class="oppg-tittel">'+o.tittel+'</div>'+
        fremgangHtml+
        (t.frist?'<div class="oppg-frist">⏰ Frist: '+t.frist+'</div>':'');
      grid.appendChild(kort);
    });
  }

  // Bygg alle ressursgrids
  byggAlleGrids();

  // Vis siste aktivitet
  byggAktivitet();

  document.getElementById('laster').style.display = 'none';
  document.getElementById('portal').style.display = 'block';
}

function lagResKort(res) {
  var a = document.createElement('a');
  a.href = res.u;
  a.className = 'res-kort';
  var akt = _aktMap[res.r];
  var fremgangHtml = '';
  if (akt) {
    var pst = akt.snitt !== null ? akt.snitt : 0;
    var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
    var tekst = akt.fullfort && akt.totalt ?
      akt.fullfort+'/'+akt.totalt :
      pst+'%';
    fremgangHtml = '<div class="res-fremgang">'
      +'<div class="res-bar"><div class="res-fill" style="width:'+pst+'%;background:'+farge+'"></div></div>'
      +'<span class="res-pst">'+tekst+'</span></div>';
  }
  a.innerHTML = '<div class="res-type-ikon">'+res.i+'</div>'
    +'<div class="res-tittel">'+res.t+'</div>'
    +fremgangHtml;
  return a;
}

function byggAlleGrids() {
  Object.keys(RESSURSER).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    RESSURSER[id].forEach(function(res) { el.appendChild(lagResKort(res)); });
  });
}

function byggAktivitet() {
  var grid = document.getElementById('akt-grid');
  var res_sett = {};
  aktivitet.forEach(function(a) {
    if (!res_sett[a.ressurs]) res_sett[a.ressurs] = a;
  });
  var siste = Object.values(res_sett).slice(0, 8);
  if (siste.length === 0) {
    grid.innerHTML = '<div class="tom" style="grid-column:1/-1;">Ingen aktivitet ennå — velg et fag og start!</div>';
    return;
  }
  siste.forEach(function(a) {
    var pst = a.score_pst || 0;
    var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
    var dato = new Date(a.tidspunkt).toLocaleDateString('nb-NO');
    var fremgTekst = (a.fullfort_antall && a.totalt_antall) ?
      a.fullfort_antall+'/'+a.totalt_antall+' · '+dato :
      pst+'% · '+dato;
    var k = document.createElement('div');
    k.className = 'akt-kort';
    k.innerHTML = '<div class="akt-tittel">'+a.ressurs.replace(/_/g,' ')+'</div>'
      +'<div class="akt-bar"><div class="akt-fill" style="width:'+pst+'%;background:'+farge+'"></div></div>'
      +'<div class="akt-meta">'+fremgTekst+'</div>';
    grid.appendChild(k);
  });
}

function visFane(fane, el) {
  // Deaktiver alle faner
  document.querySelectorAll('.fane').forEach(function(f){f.classList.remove('ak');});

async function init() {
  var aktResp = await fetch(SUPABASE_URL+'/rest/v1/aktivitet?elev_id=eq.'+elev.id+'&order=tidspunkt.desc&limit=200',
    {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();}).catch(function(){return [];});
  aktivitet = Array.isArray(aktResp) ? aktResp : [];

  var tildelResp = await fetch(
    SUPABASE_URL+'/rest/v1/tildeling?or=(elev_id.eq.'+elev.id+',klasse_id.eq.'+(elev.klasse_id||'00000000-0000-0000-0000-000000000000')+')&select=id,frist,oppgaver(tittel,type,ressurs,url,fag)',
    {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();}).catch(function(){return [];});
  tildelte = Array.isArray(tildelResp) ? tildelResp : [];

  var egResp = await fetch(SUPABASE_URL+'/rest/v1/elev_egenvurdering?elev_id=eq.'+elev.id,
    {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();}).catch(function(){return [];});
  if (Array.isArray(egResp)) egResp.forEach(function(e){ egenvurdering[e.km_kode] = e.nivaa; });

  lyspareAktiv = !!(elev.trenger_hjelp);
  if (lyspareAktiv) document.getElementById('global-lyspare').classList.add('aktiv');

  window._aktMap = {};
  aktivitet.forEach(function(a) {
    if (!_aktMap[a.ressurs]) _aktMap[a.ressurs] = {scorer:[], fullfort:a.fullfort_antall, totalt:a.totalt_antall};
    else {
      if (!_aktMap[a.ressurs].fullfort && a.fullfort_antall) _aktMap[a.ressurs].fullfort = a.fullfort_antall;
      if (!_aktMap[a.ressurs].totalt  && a.totalt_antall)   _aktMap[a.ressurs].totalt   = a.totalt_antall;
    }
    if (a.score_pst !== null) _aktMap[a.ressurs].scorer.push(a.score_pst);
  });
  Object.keys(_aktMap).forEach(function(r) {
    var s = _aktMap[r].scorer;
    _aktMap[r].snitt = s.length ? Math.round(s.reduce(function(a,b){return a+b;},0)/s.length) : null;
    _aktMap[r].okter = s.length;
  });

  var allScorer = aktivitet.filter(function(a){return a.score_pst!==null;}).map(function(a){return a.score_pst;});
  document.getElementById('stat-okter').textContent = aktivitet.length;
  document.getElementById('stat-snitt').textContent = allScorer.length ? Math.round(allScorer.reduce(function(a,b){return a+b;},0)/allScorer.length)+'%' : '–';

  byggKarusell();
  byggAlleGrids();
  byggEgenvurdering();
  byggAktivitet();

  document.getElementById('laster').style.display = 'none';
  document.getElementById('portal').style.display  = 'block';

  // ── PERSONALISERT VELKOMSTTEKST ──────────────────────────────────
  (function() {
    var sub = document.getElementById('velk-sub');
    if (!sub) return;
    var n = aktivitet.length;
    if (n === 0) {
      sub.textContent = 'Velkommen! Velg et fag og start din første økt. 🚀';
    } else if (n < 5) {
      sub.textContent = 'Bra start! Du har fullført '+n+' aktiviteter. Fortsett!';
    } else {
      var allScorer = aktivitet.filter(function(a){return a.score_pst!==null;}).map(function(a){return a.score_pst;});
      var snitt = allScorer.length ? Math.round(allScorer.reduce(function(a,b){return a+b;},0)/allScorer.length) : 0;
      sub.textContent = snitt>=80 ? 'Imponerende! Snitt '+snitt+'% 🏆' :
                        snitt>=60 ? 'Bra jobbet! Snitt '+snitt+'% — fortsett å øve 💪' :
                        'Du er på vei! Snitt '+snitt+'% — øv mer for å nå målet 📈';
    }
  })();
}

/* ── KARUSELL ────────────────────────────────────────────────── */
function byggKarusell() {
  var kar = document.getElementById('karusell');
  kar.innerHTML = '';

  tildelte.slice(0,3).forEach(function(t) {
    if (!t.oppgaver) return;
    var o = t.oppgaver;
    var akt = _aktMap[o.ressurs];
    var pst = akt && akt.snitt !== null ? akt.snitt : 0;
    var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#60a5fa';
    var k = document.createElement('div');
    k.className = 'karusell-kort tildelt';
    k.innerHTML = '<div class="kar-type">📋 Tildelt oppgave</div>'
      +'<div class="kar-tittel">'+o.tittel+'</div>'
      +(pst>0?'<div class="kar-bar"><div class="kar-fill" style="width:'+pst+'%;background:'+farge+'"></div></div><div class="kar-meta">'+pst+'% fullfort</div>':'<div class="kar-meta">Ikke startet</div>')
      +(t.frist?'<div class="kar-meta">⏰ Frist: '+t.frist+'</div>':'')
      +'<a href="'+o.url+'" class="kar-btn gul">Ga til oppgaven →</a>';
    kar.appendChild(k);
  });

  var settSett = {};
  aktivitet.filter(function(a){if(settSett[a.ressurs])return false;settSett[a.ressurs]=true;return true;}).slice(0,3).forEach(function(a) {
    var pst = a.score_pst||0;
    var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
    var dato = new Date(a.tidspunkt).toLocaleDateString('nb-NO');
    var k = document.createElement('div');
    k.className = 'karusell-kort aktivitet';
    k.innerHTML = '<div class="kar-type">📊 Siste aktivitet</div>'
      +'<div class="kar-tittel">'+a.ressurs.replace(/_/g,' ')+'</div>'
      +'<div class="kar-bar"><div class="kar-fill" style="width:'+pst+'%;background:'+farge+'"></div></div>'
      +'<div class="kar-meta">'+pst+'% · '+dato+'</div>';
    kar.appendChild(k);
  });

  // ── SMART ANBEFALINGSMOTOR ──────────────────────────────────────
  var anbefalinger = genererAnbefalinger();
  anbefalinger.slice(0, 2).forEach(function(a) {
    var k = document.createElement('div');
    k.className = 'karusell-kort anbefalt';
    k.innerHTML = '<div class="kar-type">'+a.ikon+' '+a.type+'</div>'
      +'<div class="kar-tittel">'+a.tittel+'</div>'
      +'<div class="kar-meta">'+a.grunn+'</div>'
      +'<a href="'+a.url+'" class="kar-btn gron">'+a.knappTekst+' →</a>';
    kar.appendChild(k);
  });

  if (kar.children.length === 0)
    kar.innerHTML = '<div class="tom" style="min-width:260px;">Ingen aktivitet ennå — velg et fag og start!</div>';
}

/* ── RESSURSKORT ─────────────────────────────────────────────── */
function lagResKort(res) {
  var a = document.createElement('a');
  a.href = res.u; a.className = 'res-kort';
  var akt = _aktMap[res.r];
  var fremgHtml = '';
  if (akt) {
    var pst = akt.snitt !== null ? akt.snitt : 0;
    var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
    var tekst = akt.fullfort && akt.totalt ? akt.fullfort+'/'+akt.totalt : pst+'%';
    fremgHtml = '<div class="res-fremgang"><div class="res-bar"><div class="res-fill" style="width:'+pst+'%;background:'+farge+'"></div></div><span class="res-pst">'+tekst+'</span></div>';
  }
  var hdr = document.createElement('div');
  hdr.className = 'res-kort-hdr';
  hdr.innerHTML = '<span class="res-type-ikon">'+res.i+'</span><span class="res-tittel">'+res.t+'</span>';
  a.appendChild(hdr);
  if (fremgHtml) { var fd = document.createElement('div'); fd.innerHTML = fremgHtml; a.appendChild(fd.firstChild); }


  return a;
}

function byggAlleGrids() {
  Object.keys(RESSURSER).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    RESSURSER[id].forEach(function(res){ el.appendChild(lagResKort(res)); });
  });
}

/* ── EGENVURDERING ───────────────────────────────────────────── */
function byggEgenvurdering() {
  var innhold = document.getElementById('egenv-innhold');
  innhold.innerHTML = '';
  Object.keys(KM_DATA).forEach(function(fag) {
    var fagIkon = fag==='Matematikk'?'📐':fag==='Naturfag'?'🔬':'💻';
    var fagDiv = document.createElement('div');
    fagDiv.className = 'egenv-fag';
    var tittelEl = document.createElement('div');
    tittelEl.className = 'egenv-fag-tittel';
    tittelEl.textContent = fagIkon+' '+fag;
    fagDiv.appendChild(tittelEl);
    var grid = document.createElement('div');
    grid.className = 'egenv-grid';

    KM_DATA[fag].forEach(function(km) {
      var gjeldende = egenvurdering[km.kode] || '';
      var rad = document.createElement('div');
      rad.className = 'egenv-rad';
      rad.id = 'egenv-rad-'+km.kode;

      var kmDiv = document.createElement('div');
      kmDiv.className = 'egenv-km';
      kmDiv.innerHTML = '<div class="egenv-km-kode">'+km.kode+'</div>'
        +'<div class="egenv-km-tittel">'+km.ikon+' '+km.tittel+'</div>'
        +'<div class="egenv-km-desc">'+km.desc+'</div>';
      rad.appendChild(kmDiv);

      var valgDiv = document.createElement('div');
      valgDiv.className = 'egenv-valg';

      ['lav','middels','hoy','vet_ikke'].forEach(function(n) {
        var label = n==='hoy'?'Høy':n==='vet_ikke'?'Vet ikke':n.charAt(0).toUpperCase()+n.slice(1);
        var btn = document.createElement('button');
        btn.className = 'egenv-btn '+n+(gjeldende===n?' ak':'');
        btn.textContent = label;
        btn.dataset.km    = km.kode;
        btn.dataset.nivaa = n;
        btn.addEventListener('click', function() { velgEgenvurdering(km.kode, n, btn); });
        valgDiv.appendChild(btn);
      });

      var lagretEl = document.createElement('span');
      lagretEl.className = 'egenv-lagret';
      lagretEl.id = 'egenv-lagret-'+km.kode;
      lagretEl.textContent = '✓ Lagret';
      valgDiv.appendChild(lagretEl);
      rad.appendChild(valgDiv);
      grid.appendChild(rad);
    });
    fagDiv.appendChild(grid);
    innhold.appendChild(fagDiv);
  });
}

async function velgEgenvurdering(kmKode, nivaa, el) {
  document.querySelectorAll('#egenv-valg-'+kmKode+' .egenv-btn, .egenv-rad#egenv-rad-'+kmKode+' .egenv-btn').forEach(function(b){b.classList.remove('ak');});
  el.classList.add('ak');
  egenvurdering[kmKode] = nivaa;
  try {
    await fetch(SUPABASE_URL+'/rest/v1/elev_egenvurdering', {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({elev_id:elev.id, km_kode:kmKode, nivaa:nivaa})
    });
    var lagret = document.getElementById('egenv-lagret-'+kmKode);
    if (lagret) { lagret.style.opacity='1'; setTimeout(function(){lagret.style.opacity='0';},2000); }
  } catch(e) {}
}

  lyspareAktiv = !lyspareAktiv;
  oppdaterLyspareFloater();
  try {
    await fetch(SUPABASE_URL+'/rest/v1/elever?id=eq.'+elev.id, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'},
      body: JSON.stringify({trenger_hjelp: lyspareAktiv})
    });
  } catch(e) {}
}

async function sendLyspare(emne) {
  lyspareAktiv = true;
  document.getElementById('global-lyspare').classList.add('aktiv');
  try {
    await fetch(SUPABASE_URL+'/rest/v1/elever?id=eq.'+elev.id, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'},
      body: JSON.stringify({trenger_hjelp:true, hjelp_emne:emne})
    });
  } catch(e) {}
}

/* ── AKTIVITET ───────────────────────────────────────────────── */
function byggAktivitet() {
  var grid = document.getElementById('akt-grid');
  var res_sett = {};
  aktivitet.forEach(function(a){ if(!res_sett[a.ressurs]) res_sett[a.ressurs]=a; });
  var siste = Object.values(res_sett).slice(0,8);
  if (!siste.length) { grid.innerHTML='<div class="tom" style="grid-column:1/-1;">Ingen aktivitet ennå — velg et fag og start!</div>'; return; }
  siste.forEach(function(a) {
    var pst = a.score_pst||0;
    var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
    var dato  = new Date(a.tidspunkt).toLocaleDateString('nb-NO');
    var tekst = (a.fullfort_antall&&a.totalt_antall)?a.fullfort_antall+'/'+a.totalt_antall+' · '+dato:pst+'% · '+dato;
    var k = document.createElement('div'); k.className='akt-kort';
    k.innerHTML='<div class="akt-tittel">'+a.ressurs.replace(/_/g,' ')+'</div>'
      +'<div class="akt-bar"><div class="akt-fill" style="width:'+pst+'%;background:'+farge+'"></div></div>'
      +'<div class="akt-meta">'+tekst+'</div>';
    grid.appendChild(k);
  });
}

/* ── FANER ───────────────────────────────────────────────────── */
function visFane(fane, el) {
  document.querySelectorAll('.fane').forEach(function(f){f.classList.remove('ak');});
  el.classList.add('ak');
  ['matte','natur','prog','alle','vurder'].forEach(function(f) {
    var p = document.getElementById('fane-'+f);
    if (p) p.style.display = f===fane ? 'block' : 'none';
  });
}

/* ── ANBEFALINGSMOTOR ────────────────────────────────────────────── */
function genererAnbefalinger() {
  var anb = [];

  // KM-dekning: finn KM med lav score eller ingen aktivitet
  var KM_RESSURS = {
    'MAT8-1': ['matte_mengde_tall_potenser','matte_tall_potenser'],
    'MAT8-2': ['matte_mengde_hoderegning'],
    'MAT8-3': ['matte_mengde_tall_primtall','matte_mengde_brøk_regning'],
    'MAT8-4': ['matte_mengde_algebra_uttrykk','matte_mengde_algebra_parenteser'],
    'MAT8-5': ['matte_mengde_monstre'],
    'MAT8-6': ['matte_mengde_mål_enheter'],
    'MAT8-7': ['matte_mengde_regneuttrykk'],
    'MAT8-8': ['matte_mengde_likninger_linja','matte_mengde_likninger_ulikheter'],
    'MAT8-9': ['grafer'],
    'MAT8-10':['matte_mengde_funk_lineær','matte_mengde_funk_lineær_graf'],
    'MAT8-11':['algoritmedetektiven','pseudokode'],
    'MAT9-1': ['matte_mengde_geometriske_monstre'],
    'MAT9-2': ['matte_mengde_geo_formlikskap'],
    'MAT9-3': ['matte_mengde_geo_pythagoras','matte_mengde_geo_trigonometri'],
    'MAT9-4': ['matte_mengde_geo_koordinater','geometri'],
    'MAT9-5': ['matte_mengde_geo_areal','matte_mengde_geo_volum'],
    'MAT9-6': ['matte_mengde_stat_diagrammer','statistikk'],
    'MAT9-7': ['matte_mengde_stat_sentralmål','matte_mengde_stat_boksplott'],
    'MAT9-8': ['matte_mengde_statistikk_argument'],
    'MAT9-9': ['matte_mengde_sann_grunnleggende','sannsynlighet'],
    'MAT9-10':['matte_mengde_prog_simulering'],
    'MAT10-1':['matte_mengde_algebra_polynomer'],
    'MAT10-3':['matte_mengde_liknsystem_innsetting'],
    'MAT10-5':['matte_mengde_prosent_vekst'],
    'MAT10-8':['eksamenstrener'],
    'NAT-1':  ['naturfagquiz','forsok'],
    'NAT-8':  ['kjemi','kjemiske_reaksjoner'],
    'NAT-9':  ['periodesystem','atom'],
    'NAT-14': ['celle','mikroskop'],
    'PRG-1':  ['prg_mengde_datamaskiner'],
    'PRG-3':  ['pseudokode','labyrint_kode'],
    'PRG-6':  ['debugrommet'],
  };

  var TITTEL = {
    'matte_mengde_tall_potenser':'Potenser', 'matte_mengde_hoderegning':'Hoderegning',
    'matte_mengde_brøk_regning':'Brøkregning', 'matte_mengde_algebra_uttrykk':'Algebraiske uttrykk',
    'matte_mengde_monstre':'Mønstre', 'matte_mengde_regneuttrykk':'Regneuttrykk',
    'matte_mengde_likninger_linja':'Lineære likninger', 'grafer':'Grafer og funksjoner',
    'matte_mengde_funk_lineær':'Lineære funksjoner', 'algoritmedetektiven':'Algoritmedetektiven',
    'pseudokode':'Pseudokode-byggeren', 'matte_mengde_geometriske_monstre':'Geometriske mønstre',
    'matte_mengde_geo_pythagoras':'Pythagoras', 'matte_mengde_stat_diagrammer':'Statistikk',
    'matte_mengde_statistikk_argument':'Statistikk som argument',
    'matte_mengde_sann_grunnleggende':'Sannsynlighet', 'eksamenstrener':'Eksamenstrener',
    'naturfagquiz':'Naturfagquiz', 'forsok':'Forsøkslære', 'kjemi':'Kjemilaben',
    'kjemiske_reaksjoner':'Kjemiske reaksjoner', 'periodesystem':'Periodesystemet',
    'atom':'Atomteori', 'celle':'Cellens anatomi', 'mikroskop':'Mikroskoplaben',
    'prg_mengde_datamaskiner':'Datamaskiner og kode', 'labyrint_kode':'Labyrintkoden',
    'debugrommet':'Debug-rommet', 'statistikk':'Statistikk',
    'matte_mengde_geo_areal':'Areal', 'sannsynlighet':'Sannsynlighet',
    'matte_mengde_algebra_polynomer':'Polynomer',
    'matte_mengde_liknsystem_innsetting':'Likningssystemer',
  };

  // 1. Finn KM med lav score (< 50%) eller ikke prøvd
  var svakeKM = [];
  Object.keys(KM_RESSURS).forEach(function(km) {
    var ressurser = KM_RESSURS[km];
    var scorer = [];
    ressurser.forEach(function(r) {
      if (_aktMap[r] && _aktMap[r].snitt !== null) scorer.push(_aktMap[r].snitt);
    });
    var snitt = scorer.length ? scorer.reduce(function(a,b){return a+b;},0)/scorer.length : null;
    var ikkePrøvd = ressurser.every(function(r) { return !_aktMap[r]; });
    svakeKM.push({ km: km, snitt: snitt, ikkePrøvd: ikkePrøvd, ressurser: ressurser });
  });

  // Sorter: lavest score først, ikke-prøvde sist
  svakeKM.sort(function(a, b) {
    if (a.snitt === null && b.snitt === null) return 0;
    if (a.snitt === null) return 1;
    if (b.snitt === null) return -1;
    return a.snitt - b.snitt;
  });

  // 2. Anbefal basert på score
  var sett = new Set();
  svakeKM.forEach(function(item) {
    if (anb.length >= 3) return;
    var res = item.ressurser[0];
    if (sett.has(res)) return;
    sett.add(res);
    var tittel = TITTEL[res] || res.replace(/_/g,' ');
    if (item.snitt !== null && item.snitt < 50) {
      anb.push({
        ikon: '📈', type: 'Øv mer',
        tittel: tittel,
        grunn: 'Score: '+Math.round(item.snitt)+'% — du er på vei!',
        url: res+'.html',
        knappTekst: 'Øv igjen'
      });
    } else if (item.ikkePrøvd) {
      anb.push({
        ikon: '✨', type: 'Nytt emne',
        tittel: tittel,
        grunn: 'Du har ikke prøvd dette ennå',
        url: res+'.html',
        knappTekst: 'Start nå'
      });
    }
  });

  // 3. Fallback: repetisjons-anbefaling (noe med god score som bør vedlikeholdes)
  if (anb.length < 2) {
    var allRes2 = Object.values(RESSURSER).reduce(function(a,v){return a.concat(v);}, []);
    var kanRepetere = allRes2.filter(function(r) {
      var a = _aktMap[r.r];
      return a && a.snitt !== null && a.snitt >= 70;
    });
    if (kanRepetere.length) {
      var rep = kanRepetere[Math.floor(Math.random()*Math.min(kanRepetere.length, 5))];
      anb.push({
        ikon: '🔁', type: 'Repetisjon',
        tittel: rep.t,
        grunn: 'Hold kunnskapen ved like',
        url: rep.u,
        knappTekst: 'Repeter'
      });
    }
  }

  return anb;
}
