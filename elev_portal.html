<!DOCTYPE html>
<html lang="no"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min side · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>

:root{--bg:#07090f;--bg2:#0b0d18;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e0e8ff;--dim:rgba(255,255,255,.45);--dimmer:rgba(255,255,255,.2);
  --gron:#34d399;--gul:#fbbf24;--rod:#f87171;--bla:#60a5fa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
#topbar{height:52px;display:flex;align-items:center;gap:16px;padding:0 20px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;backdrop-filter:blur(8px);}
.logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);}
.logo span{color:var(--text);opacity:.4;}.spacer{flex:1;}
.tbtn{padding:6px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;
  border:1px solid var(--border2);background:transparent;color:var(--dim);transition:all .15s;}
.tbtn:hover{color:var(--text);}

#innhold{max-width:900px;margin:0 auto;padding:28px 20px;}
.velkomst{background:linear-gradient(135deg,rgba(96,165,250,.1),rgba(167,139,250,.08));
  border:1px solid rgba(96,165,250,.2);border-radius:14px;padding:24px 28px;margin-bottom:28px;}
.velkomst h2{font-family:var(--font-h);font-size:1.3rem;font-weight:800;}
.velkomst p{font-size:.88rem;color:var(--dim);margin-top:6px;line-height:1.6;}
.sek-tittel{font-family:var(--font-h);font-size:1rem;font-weight:800;margin-bottom:14px;}
.akt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:32px;}
.akt-kort{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:8px;}
.akt-spill{font-weight:600;font-size:.92rem;}
.akt-km{font-size:.72rem;color:var(--dim);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:6px;align-self:flex-start;}
.akt-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.akt-fill{height:100%;border-radius:3px;}
.akt-meta{font-size:.74rem;color:var(--dim);font-family:var(--font-m);}
.hub-link{display:inline-flex;align-items:center;gap:8px;margin-top:20px;
  padding:12px 24px;background:var(--bla);color:#000;border-radius:10px;
  font-family:var(--font-h);font-size:.9rem;font-weight:800;text-decoration:none;}
</style></head><body>
<div id="topbar">
  <div class="logo">Skap<span>Lab</span></div>
  <div class="spacer"></div>
  <span id="elev-info" style="font-size:.82rem;color:var(--dim);"></span>
  <button class="tbtn" onclick="SkapLab.elevLoggUt();location.href='elev_login.html'">Logg ut</button>
</div>
<div id="innhold">
  <div id="laster" style="padding:60px;text-align:center;color:var(--dim);">Laster...</div>
  <div id="portal" style="display:none">
    <div class="velkomst">
      <h2 id="hei">Hei!</h2>
      <p id="sub">Her ser du hva du har jobbet med pa SkapLab.</p>
    </div>
    <div class="sek-tittel">Din aktivitet</div>
    <div class="akt-grid" id="akt-grid"></div>
    <div class="sek-tittel">Fortsett a laere</div>
    <a href="spill_hub.html" class="hub-link">Ga til spillhubben</a>
  </div>
</div>
<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      sessionStorage.setItem(SESSION_NØKKEL, JSON.stringify(elev));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = sessionStorage.getItem(SESSION_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });
      if (resp.error) return { ok: false, feil: resp.error.message };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    return hentLaerer() !== null;
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>
<script>
'use strict';
if(!SkapLab.erElevInnlogget()){location.href='elev_login.html';throw new Error('Ikke innlogget');}
var elev=SkapLab.hentElev();
document.getElementById('elev-info').textContent=elev.fullt_navn||'Elev';
document.getElementById('hei').textContent='Hei, '+(elev.fullt_navn?elev.fullt_navn.split(' ')[0]:'der')+'!';

async function init(){
  var aResp=await fetch(SkapLab.SUPABASE_URL+'/rest/v1/aktivitet?elev_id=eq.'+elev.id+'&order=tidspunkt.desc&limit=50',
    {headers:{'apikey':SkapLab.SUPABASE_KEY,'Authorization':'Bearer '+SkapLab.SUPABASE_KEY}}).then(function(r){return r.json();});
  var akt=Array.isArray(aResp)?aResp:[];
  var grid=document.getElementById('akt-grid');
  if(akt.length===0){
    grid.innerHTML='<div style="grid-column:1/-1;padding:30px;text-align:center;color:var(--dim);">Ingen aktivitet ennå. Gå til spillhubben!</div>';
  }else{
    var gr={};
    akt.forEach(function(a){if(!gr[a.ressurs]) gr[a.ressurs]=[];gr[a.ressurs].push(a);});
    Object.keys(gr).forEach(function(r){
      var ok=gr[r],siste=ok[0];
      var snitt=Math.round(ok.reduce(function(s,a){return s+(a.score_pst||0);},0)/ok.length);
      var dato=new Date(siste.tidspunkt).toLocaleDateString('nb-NO');
      var farge=snitt>=70?'#34d399':snitt>=45?'#fbbf24':'#f87171';
      var k=document.createElement('div');k.className='akt-kort';
      k.innerHTML='<div class="akt-spill">'+r.replace(/_/g,' ')+'</div>'
        +(siste.km_kode?'<div class="akt-km">'+siste.km_kode+'</div>':'')
        +'<div class="akt-bar"><div class="akt-fill" style="width:'+snitt+'%;background:'+farge+'"></div></div>'
        +'<div class="akt-meta">Snitt: '+snitt+'% · '+ok.length+' økt'+(ok.length>1?'er':'')+'· '+dato+'</div>';
      grid.appendChild(k);
    });
  }
  document.getElementById('laster').style.display='none';
  document.getElementById('portal').style.display='block';
}
init();
</script>
</body></html>
