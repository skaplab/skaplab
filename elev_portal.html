<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min side - SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg2:#0b0d18;--bg3:#0e1120;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e0e8ff;--dim:rgba(255,255,255,.45);
  --bla:#60a5fa;--gron:#34d399;--gul:#fbbf24;--rod:#f87171;--lilla:#a78bfa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}

#topbar{height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;}
.logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);}
.logo span{opacity:.4;}
.spacer{flex:1;}
#elev-chip{font-size:.8rem;color:var(--dim);}
.tbtn{padding:5px 12px;border:1px solid var(--border);background:transparent;
  color:var(--dim);border-radius:7px;cursor:pointer;font-size:.76rem;}

#innhold{max-width:1000px;margin:0 auto;padding:20px 20px 40px;}

/* Velkomst */
.velkomst{background:linear-gradient(135deg,rgba(96,165,250,.1),rgba(167,139,250,.07));
  border:1px solid rgba(96,165,250,.18);border-radius:14px;
  padding:20px 24px;margin-bottom:22px;
  display:flex;align-items:center;gap:16px;}
.velk-avatar{width:46px;height:46px;border-radius:12px;
  background:rgba(96,165,250,.15);display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;flex-shrink:0;}
.velk-info h2{font-family:var(--font-h);font-size:1.2rem;font-weight:800;}
.velk-info p{font-size:.83rem;color:var(--dim);margin-top:3px;}

/* Tildelte oppgaver */
.sek{margin-bottom:24px;}
.sek-tittel{font-family:var(--font-h);font-size:.95rem;font-weight:800;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sek-ant{font-size:.7rem;background:rgba(255,255,255,.08);padding:2px 9px;
  border-radius:10px;color:var(--dim);font-family:var(--font-b);font-weight:400;}

.oppg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.oppg-kort{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:13px 15px;text-decoration:none;color:var(--text);
  transition:all .15s;display:flex;flex-direction:column;gap:7px;}
.oppg-kort:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.oppg-type-rad{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);}
.oppg-tittel{font-family:var(--font-h);font-size:.9rem;font-weight:700;}
.oppg-fremgang{display:flex;align-items:center;gap:8px;}
.fremgang-bar{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.fremgang-fill{height:100%;border-radius:3px;transition:width .3s;}
.fremgang-tekst{font-size:.7rem;color:var(--dim);font-family:var(--font-m);white-space:nowrap;}
.oppg-frist{font-size:.7rem;color:var(--gul);}

/* Fanelinje */
.faner{display:flex;gap:4px;margin-bottom:20px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:4px;}
.fane{flex:1;padding:9px 12px;border-radius:9px;cursor:pointer;
  font-size:.83rem;font-family:var(--font-h);font-weight:700;
  color:var(--dim);text-align:center;transition:all .15s;border:none;background:transparent;}
.fane:hover{color:var(--text);}
.fane.ak.matte{background:rgba(139,92,246,.2);color:#c4b5fd;}
.fane.ak.natur{background:rgba(52,211,153,.15);color:var(--gron);}
.fane.ak.prog{background:rgba(96,165,250,.15);color:var(--bla);}
.fane.ak.alle{background:rgba(255,255,255,.1);color:var(--text);}

/* Ressursgrid */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.res-gruppe{margin-bottom:20px;}
.res-gruppe-tittel{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;
  color:var(--dim);margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.res-kort{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;text-decoration:none;color:var(--text);
  display:flex;flex-direction:column;gap:5px;transition:all .15s;}
.res-kort:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.res-type-ikon{font-size:.85rem;}
.res-tittel{font-family:var(--font-h);font-size:.86rem;font-weight:700;line-height:1.3;}
.res-fremgang{display:flex;align-items:center;gap:6px;margin-top:3px;}
.res-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.res-fill{height:100%;border-radius:2px;}
.res-pst{font-size:.68rem;color:var(--dim);font-family:var(--font-m);}

/* Aktivitetsoversikt */
.akt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.akt-kort{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.akt-tittel{font-weight:600;font-size:.88rem;}
.akt-bar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.akt-fill{height:100%;border-radius:3px;}
.akt-meta{font-size:.7rem;color:var(--dim);font-family:var(--font-m);}
.tom{padding:28px;text-align:center;color:var(--dim);font-size:.86rem;
  background:var(--bg2);border:1px solid var(--border);border-radius:11px;}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">Skap<span>Lab</span></div>
  <div class="spacer"></div>
  <span id="elev-chip"></span>
  <button class="tbtn" onclick="loggUt()">Logg ut</button>
</div>

<div id="innhold">
  <div id="laster" style="padding:60px;text-align:center;color:var(--dim);">Laster...</div>
  <div id="portal" style="display:none;">

    <div class="velkomst">
      <div class="velk-avatar">🎓</div>
      <div class="velk-info">
        <h2 id="hei">Hei!</h2>
        <p id="velk-sub">Klar for å lære noe nytt i dag?</p>
      </div>
    </div>

    <!-- Tildelte oppgaver -->
    <div class="sek" id="sek-oppgaver" style="display:none;">
      <div class="sek-tittel">

        <span class="sek-ant" id="oppg-ant">0</span>

    <!-- Fanelinje -->
    <div class="faner">

      <button class="fane natur" onclick="visFane('natur',this)">🔬 Naturfag</button>
      <button class="fane prog" onclick="visFane('prog',this)">💻 Programmering</button>
      <button class="fane alle" onclick="visFane('alle',this)">🎮 Alle spill</button>
    </div>

    <!-- Matematikk -->
    <div id="fane-matte">

        <div class="res-gruppe-tittel">🎮 Spill</div>
        <div class="res-grid" id="matte-spill"></div>
      </div>
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">🃏 Teorikort</div>
        <div class="res-grid" id="matte-teorikort"></div>
      </div>
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">📖 Leksjoner</div>
        <div class="res-grid" id="matte-leksjon"></div>
      </div>
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">✏️ Mengdetrening</div>

      </div>
    </div>

    <!-- Naturfag -->
    <div id="fane-natur" style="display:none;">
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">🎮 Spill og lab</div>
        <div class="res-grid" id="natur-spill"></div>
      </div>
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">🃏 Teorikort</div>
        <div class="res-grid" id="natur-teorikort"></div>
      </div>
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">📖 Leksjoner</div>
        <div class="res-grid" id="natur-leksjon"></div>
      </div>
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">🧪 Quiz</div>
        <div class="res-grid" id="natur-quiz"></div>
      </div>
    </div>

    <!-- Programmering -->
    <div id="fane-prog" style="display:none;">
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">🎮 Spill</div>
        <div class="res-grid" id="prog-spill"></div>
      </div>
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">📖 Leksjoner</div>
        <div class="res-grid" id="prog-leksjon"></div>
      </div>
    </div>

    <!-- Alle spill -->
    <div id="fane-alle" style="display:none;">
      <div class="res-gruppe">
        <div class="res-gruppe-tittel">Alle spill</div>
        <div class="res-grid" id="alle-spill"></div>
      </div>
    </div>

    <!-- Siste aktivitet -->
    <div class="sek" style="margin-top:28px;">
      <div class="sek-tittel">📊 Siste aktivitet</div>
      <div class="akt-grid" id="akt-grid"></div>
    </div>

  </div>
</div>

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();


</script>

var aktivitet = [];
var tildelte = [];
var aktiveFane = 'matte';

async function init() {
  // Hent aktivitet
  var aktResp = await fetch(
    SkapLab.SUPABASE_URL + '/rest/v1/aktivitet?elev_id=eq.' + elev.id +
    '&order=tidspunkt.desc&limit=200',
    { headers: { 'apikey': SkapLab.SUPABASE_KEY, 'Authorization': 'Bearer ' + SkapLab.SUPABASE_KEY }}
  ).then(function(r){return r.json();}).catch(function(){return [];});
  aktivitet = Array.isArray(aktResp) ? aktResp : [];

  // Hent tildelte oppgaver
  var tildelResp = await fetch(
    SkapLab.SUPABASE_URL + '/rest/v1/tildeling' +
    '?or=(elev_id.eq.' + elev.id + ',klasse_id.eq.' + (elev.klasse_id||'00000000-0000-0000-0000-000000000000') + ')' +
    '&select=id,frist,oppgaver(tittel,type,ressurs,url,fag)',
    { headers: { 'apikey': SkapLab.SUPABASE_KEY, 'Authorization': 'Bearer ' + SkapLab.SUPABASE_KEY }}
  ).then(function(r){return r.json();}).catch(function(){return [];});
  tildelte = Array.isArray(tildelResp) ? tildelResp : [];

  // Bygg aktivitets-map: ressurs → {snitt_score, siste_fullfort, siste_antall, siste_totalt}
  window._aktMap = {};
  aktivitet.forEach(function(a) {
    if (!_aktMap[a.ressurs]) _aktMap[a.ressurs] = {scorer:[], fullfort:a.fullfort_antall, totalt:a.totalt_antall};
    else {
      if (!_aktMap[a.ressurs].fullfort && a.fullfort_antall) _aktMap[a.ressurs].fullfort = a.fullfort_antall;
      if (!_aktMap[a.ressurs].totalt && a.totalt_antall) _aktMap[a.ressurs].totalt = a.totalt_antall;
    }
    if (a.score_pst !== null) _aktMap[a.ressurs].scorer.push(a.score_pst);
  });
  Object.keys(_aktMap).forEach(function(r) {
    var s = _aktMap[r].scorer;
    _aktMap[r].snitt = s.length ? Math.round(s.reduce(function(a,b){return a+b;},0)/s.length) : null;
    _aktMap[r].okter = s.length;
  });

  // Vis tildelte oppgaver
  if (tildelte.length > 0) {
    document.getElementById('sek-oppgaver').style.display = 'block';
    document.getElementById('oppg-ant').textContent = tildelte.length;
    var grid = document.getElementById('oppg-grid');
    tildelte.forEach(function(t) {
      if (!t.oppgaver) return;
      var o = t.oppgaver;
      var akt = _aktMap[o.ressurs];
      var kort = document.createElement('a');
      kort.href = o.url;
      kort.className = 'oppg-kort';
      var fremgangHtml = '';
      if (akt) {
        var pst = akt.snitt !== null ? akt.snitt : 0;
        var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
        var tekst = akt.fullfort && akt.totalt ?
          akt.fullfort+'/'+akt.totalt+' oppgaver' :
          (akt.okter+' økt'+(akt.okter>1?'er':''));
        fremgangHtml = '<div class="oppg-fremgang">'
          +'<div class="fremgang-bar"><div class="fremgang-fill" style="width:'+pst+'%;background:'+farge+'"></div></div>'
          +'<span class="fremgang-tekst">'+tekst+'</span></div>';
      }
      var typeIkon = o.type==='spill'?'🎮':o.type==='teorikort'?'🃏':o.type==='mengde'?'✏️':'📖';
      kort.innerHTML =
        '<div class="oppg-type-rad">'+typeIkon+' '+o.type+(o.fag?' · '+o.fag:'')+'</div>'+
        '<div class="oppg-tittel">'+o.tittel+'</div>'+
        fremgangHtml+
        (t.frist?'<div class="oppg-frist">⏰ Frist: '+t.frist+'</div>':'');
      grid.appendChild(kort);
    });
  }

  // Bygg alle ressursgrids
  byggAlleGrids();

  // Vis siste aktivitet
  byggAktivitet();

  document.getElementById('laster').style.display = 'none';
  document.getElementById('portal').style.display = 'block';
}

function lagResKort(res) {
  var a = document.createElement('a');
  a.href = res.u;
  a.className = 'res-kort';
  var akt = _aktMap[res.r];
  var fremgangHtml = '';
  if (akt) {
    var pst = akt.snitt !== null ? akt.snitt : 0;
    var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
    var tekst = akt.fullfort && akt.totalt ?
      akt.fullfort+'/'+akt.totalt :
      pst+'%';
    fremgangHtml = '<div class="res-fremgang">'
      +'<div class="res-bar"><div class="res-fill" style="width:'+pst+'%;background:'+farge+'"></div></div>'
      +'<span class="res-pst">'+tekst+'</span></div>';
  }
  a.innerHTML = '<div class="res-type-ikon">'+res.i+'</div>'
    +'<div class="res-tittel">'+res.t+'</div>'
    +fremgangHtml;
  return a;
}

function byggAlleGrids() {
  Object.keys(RESSURSER).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    RESSURSER[id].forEach(function(res) { el.appendChild(lagResKort(res)); });
  });
}

function byggAktivitet() {
  var grid = document.getElementById('akt-grid');
  var res_sett = {};
  aktivitet.forEach(function(a) {
    if (!res_sett[a.ressurs]) res_sett[a.ressurs] = a;
  });
  var siste = Object.values(res_sett).slice(0, 8);
  if (siste.length === 0) {
    grid.innerHTML = '<div class="tom" style="grid-column:1/-1;">Ingen aktivitet ennå — velg et fag og start!</div>';
    return;
  }
  siste.forEach(function(a) {
    var pst = a.score_pst || 0;
    var farge = pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
    var dato = new Date(a.tidspunkt).toLocaleDateString('nb-NO');
    var fremgTekst = (a.fullfort_antall && a.totalt_antall) ?
      a.fullfort_antall+'/'+a.totalt_antall+' · '+dato :
      pst+'% · '+dato;
    var k = document.createElement('div');
    k.className = 'akt-kort';
    k.innerHTML = '<div class="akt-tittel">'+a.ressurs.replace(/_/g,' ')+'</div>'
      +'<div class="akt-bar"><div class="akt-fill" style="width:'+pst+'%;background:'+farge+'"></div></div>'
      +'<div class="akt-meta">'+fremgTekst+'</div>';
    grid.appendChild(k);
  });
}

function visFane(fane, el) {
  // Deaktiver alle faner
  document.querySelectorAll('.fane').forEach(function(f){f.classList.remove('ak');});
  el.classList.add('ak');
  // Vis riktig panel
  ['matte','natur','prog','alle'].forEach(function(f){
    var p = document.getElementById('fane-'+f);
    if (p) p.style.display = f===fane ? 'block' : 'none';
  });
  aktiveFane = fane;
}

function loggUt() { SkapLab.elevLoggUt(); location.href = 'elev_login.html'; }
init();
