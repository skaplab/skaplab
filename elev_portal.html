<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
/* Velkomst */
.velkomst { background:linear-gradient(135deg,rgba(96,165,250,.08),rgba(167,139,250,.06)); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:22px 24px; margin-bottom:18px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.velkomst-navn { font-family:var(--font-h); font-size:1.35rem; font-weight:900; flex:1; min-width:160px; }
.velkomst-stats { display:flex; gap:20px; }
.vstat { text-align:center; }
.vstat-tall { font-family:var(--font-h); font-size:1.6rem; font-weight:900; color:var(--gul); line-height:1; }
.vstat-lbl { font-size:.68rem; color:var(--dim); margin-top:2px; }

/* Fagkort-grid */
.fagkort-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; }
.fk-a { display:block; padding:14px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); text-decoration:none; color:var(--text); transition:all var(--t-fast); }
.fk-a:hover { border-color:var(--border2); background:var(--bg3); transform:translateY(-1px); text-decoration:none; }
.fk-ikon { font-size:1.5rem; margin-bottom:7px; }
.fk-tittel { font-size:.82rem; font-weight:600; }

/* Oppgave-kort */
.oppg-a { display:block; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:8px; text-decoration:none; color:var(--text); transition:all var(--t-fast); }
.oppg-a:hover { border-color:var(--border2); text-decoration:none; }
.oppg-tittel { font-weight:600; font-size:.87rem; margin-bottom:3px; }
.oppg-meta { font-size:.74rem; color:var(--dim); }
.oppg-frist-passert { color:var(--rod); }

/* Quiz */
.quiz-sporsmal { font-family:var(--font-h); font-size:1.05rem; font-weight:700; line-height:1.55; margin-bottom:18px; }
.quiz-alts { display:flex; flex-direction:column; gap:8px; }
.quiz-alt { padding:11px 15px; background:var(--bg2); border:1.5px solid var(--border2); border-radius:var(--radius); font-size:.88rem; cursor:pointer; text-align:left; color:var(--text); transition:all var(--t-fast); font-family:var(--font-b); }
.quiz-alt:hover:not(:disabled) { border-color:var(--bla); background:var(--bla-dim); }
.quiz-alt.riktig { border-color:var(--gron); background:var(--gron-dim); color:var(--gron); }
.quiz-alt.feil   { border-color:var(--rod);  background:var(--rod-dim);  color:var(--rod);  }
.quiz-fork { margin-top:12px; padding:11px 13px; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); font-size:.83rem; color:var(--dim); line-height:1.6; }
.quiz-input-rad { display:flex; gap:8px; align-items:flex-end; }
.quiz-input-rad input { max-width:220px; }

/* Nivå-bar */
.niv-rad { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.niv-lbl { font-size:.76rem; color:var(--dim); min-width:70px; }
.niv-bar-y { flex:1; height:8px; background:rgba(255,255,255,.08); border-radius:100px; overflow:hidden; }
.niv-bar-fill { height:100%; background:var(--bla); border-radius:100px; transition:width .4s ease; }

/* Adaptiv profil */
.at-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }
.at-kort { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; }
.at-kort.sterk { background:rgba(52,211,153,.07); border-color:rgba(52,211,153,.2); }
.at-kort.svak  { background:rgba(248,113,113,.06); border-color:rgba(248,113,113,.18); }
.at-emne { font-size:.73rem; font-weight:700; margin-bottom:4px; }
.at-niv  { font-family:var(--font-h); font-size:1.3rem; font-weight:900; }
.at-xp   { font-size:.66rem; color:var(--dim); margin-top:2px; }

/* Portal-topnav */
.portal-nav { height:var(--topnav-h); display:flex; align-items:center; gap:12px; padding:0 16px; background:rgba(7,9,15,.97); border-bottom:1px solid var(--border); position:fixed; top:0;left:0;right:0; z-index:200; backdrop-filter:blur(8px); }
.portal-body { margin-top:var(--topnav-h); padding:20px; max-width:1000px; }

/* Årsplan */
.ep-uke { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.ep-uke-nr { font-weight:900; font-size:.85rem; color:var(--bla); min-width:62px; flex-shrink:0; }
.ep-uke-body { flex:1; }
.ep-uke-tema { font-size:.85rem; font-weight:600; margin-bottom:3px; }
.ep-okt-lbl { font-size:.76rem; color:var(--dim); }

@media(max-width:600px){ .fagkort-grid{grid-template-columns:1fr 1fr;} .portal-body{padding:12px;} }
</style>
</head>

<script>
'use strict';

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let _elev = null;
let _prog = [];
let _bank = null;

// Quiz-state
const Q = {
  emne:null, nivaa:1, streak:0, xp:0, oppgave:null, besvart:false,
  tilNivaaOpp:5, /* riktige på rad */
};

/* ══════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════ */
const $id = id => document.getElementById(id);

function snack(tekst, type='ok') {
  const div=document.createElement('div');
  div.className=`snack snack-${type}`;
  div.textContent=tekst;
  $id('snack-kontainer').appendChild(div);
  setTimeout(()=>{div.style.opacity='0';div.style.transition='opacity .3s';setTimeout(()=>div.remove(),320);},3500);
}

function datoStr(iso) {
  if(!iso)return'—';
  return new Date(iso).toLocaleDateString('nb-NO',{day:'2-digit',month:'short'});
}

function loggUt() { Auth.elev.loggUt(); location.replace('elev_login.html'); }

// Direkte Supabase-kall (elever trenger ikke JWT)
async function sb(sti, opts={}) {
  const {url,key}=window.SKAPLAB_CONFIG;
  const r=await fetch(`${url}/rest/v1${sti}`,{
    ...opts,
    headers:{'apikey':key,'Content-Type':'application/json',...opts.headers},
  });
  if(!r.ok&&r.status!==204) throw new Error(`HTTP ${r.status}`);
  if(r.status===204) return null;
  return r.json();
}

/* ══════════════════════════════════════════════════════════
   FANE-NAVIGASJON
══════════════════════════════════════════════════════════ */
const _lastet = {};

document.querySelectorAll('[data-fane]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-fane]').forEach(b=>b.classList.remove('ak'));
    document.querySelectorAll('.fane-innhold').forEach(f=>f.classList.remove('ak'));
    btn.classList.add('ak');
    $id(`fane-${btn.dataset.fane}`).classList.add('ak');
    if (!_lastet[btn.dataset.fane]) { _lastet[btn.dataset.fane]=true; lastFane(btn.dataset.fane); }
  });
});

// Matte-under-faner
document.querySelectorAll('[data-m]').forEach(btn => {
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-m]').forEach(b=>b.classList.remove('ak'));
    document.querySelectorAll('.m-grid').forEach(g=>g.style.display='none');
    btn.classList.add('ak'); $id(`m-${btn.dataset.m}`).style.display='grid';
  });
});
// Naturfag-under-faner
document.querySelectorAll('[data-n]').forEach(btn => {
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-n]').forEach(b=>b.classList.remove('ak'));
    document.querySelectorAll('.n-grid').forEach(g=>g.style.display='none');
    btn.classList.add('ak'); $id(`n-${btn.dataset.n}`).style.display='grid';
  });
});

async function lastFane(fane) {
  if(fane==='oppgaver')  await lastOppgaver();
  if(fane==='meldinger') await lastMeldinger();
  if(fane==='vurdering') await lastVurdering();
  if(fane==='adaptiv')   await lastProgresjon();
  if(fane==='aarsplan')  lastAarsplan();
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
async function init() {
  try { _elev=Auth.elev.hent(); } catch { location.replace('elev_login.html'); return; }

  const navn=_elev.kallenavn||_elev.fullt_navn;
  const klasseNavn=_elev.klasser?.navn||'';
  const skoleNavn=_elev.klasser?.skoler?.navn||'';
  $id('ep-velkomst').textContent=`Hei, ${navn}!`;
  $id('ep-navn').textContent=_elev.fullt_navn;
  $id('ep-klasse').textContent=klasseNavn;
  $id('ep-skole').textContent=[klasseNavn,skoleNavn].filter(Boolean).join(' · ');

  byggFagkort();
  _lastet['oppgaver']=true; lastOppgaver();
  lastXp();
  if (!localStorage.getItem('skaplab_onb_elev')) visOnboarding();
}

/* ══════════════════════════════════════════════════════════
   XP-OPPDATERING
══════════════════════════════════════════════════════════ */
async function lastXp() {
  try {
    // Hent xp og streak_riktig (bruker sb direkte - ingen auth nødvendig)
    const data=await sb(`/adaptiv_progresjon?elev_id=eq.${_elev.id}&select=xp,streak_riktig,emne,nivaa,beste_nivaa`);
    _prog=data||[];
    const xp=_prog.reduce((s,r)=>s+(r.xp||0),0);
    const streak=_prog.length?Math.max(..._prog.map(r=>r.streak_riktig||0)):0;
    $id('stat-xp').textContent=xp;
    $id('stat-streak').textContent=streak;
    // Tel uleste meldinger
    const meld=await sb(`/meldinger?mottaker_id=eq.${_elev.id}&lest=eq.false&select=id`);
    $id('stat-uleste').textContent=(meld||[]).length||0;
  } catch { /* still */ }
}

/* ══════════════════════════════════════════════════════════
   OPPGAVER
   NB: Bruker tildeling-tabellen, elev_id og klasse_id
══════════════════════════════════════════════════════════ */
async function lastOppgaver() {
  const el=$id('oppg-liste');
  try {
    // Hent tildeling for elev og for elevens klasse
    const klasseId=_elev.klasse_id||'00000000-0000-0000-0000-000000000000';
    const data=await sb(`/tildeling?or=(elev_id.eq.${_elev.id},klasse_id.eq.${klasseId})&order=frist.asc&select=*`);
    if(!data?.length){el.innerHTML='<div class="tom-tilstand">Ingen oppgaver tildelt ennå.</div>';return;}
    const now=Date.now();
    el.innerHTML=data.map(t=>{
      const fristDato=t.frist?new Date(t.frist):null;
      const passert=fristDato&&fristDato<now;
      return`<a class="oppg-a" href="${t.ressurs}.html" target="_blank" rel="noopener">
        <div class="oppg-tittel">${t.ressurs||'Ressurs'}</div>
        <div class="oppg-meta">${fristDato?`<span class="${passert?'oppg-frist-passert':''}">Frist: ${datoStr(t.frist)}${passert?' (utgått)':''}</span>`:'Ingen frist'}</div>
      </a>`;
    }).join('');
  } catch(e){el.innerHTML=`<div class="tom-tilstand">Feil: ${e.message}</div>`;}
}

/* ══════════════════════════════════════════════════════════
   ÅRSPLAN
   Henter fra DB (aarsplan_matte_X kolonnen) + localStorage fallback
══════════════════════════════════════════════════════════ */
async function lastAarsplan() {
  const el=$id('aarsplan-innhold');
  const klasseId=_elev.klasse_id;
  if(!klasseId){el.innerHTML='<div class="tom-tilstand">Ikke tilknyttet en klasse.</div>';return;}

  // Prøv å hente trinn fra klasse-data
  const trinn=_elev.klasser?.trinn||10;
  const fag='matte';
  const nøkkel=`skaplab_aarsplan_${klasseId}_${fag}_${trinn}`;

  // 1. Prøv localStorage (raskt)
  let raa=localStorage.getItem(nøkkel);

  // 2. Prøv DB
  if(!raa){
    try{
      const {url,key}=window.SKAPLAB_CONFIG;
      const r=await fetch(`${url}/rest/v1/klasser?id=eq.${klasseId}&select=aarsplan_${fag}_${trinn}`,{headers:{apikey:key,Authorization:`Bearer ${key}`}});
      if(r.ok){
        const d=await r.json();
        const planFelt=d?.[0]?.[`aarsplan_${fag}_${trinn}`];
        if(planFelt){raa=typeof planFelt==='string'?planFelt:JSON.stringify(planFelt);localStorage.setItem(nøkkel,raa);}
      }
    }catch{}
  }

  if(!raa){el.innerHTML='<div class="tom-tilstand">Årsplan er ikke delt av læreren ennå.</div>';return;}

  try{
    const plan=JSON.parse(raa);
    const uker=plan.uker||[];
    if(!uker.length){el.innerHTML='<div class="tom-tilstand">Ingen uker i planen.</div>';return;}
    el.innerHTML=uker.map(u=>`
      <div class="ep-uke">
        <div class="ep-uke-nr">Uke ${u.kalUke}</div>
        <div class="ep-uke-body">
          <div class="ep-uke-tema">${u.tema||'—'}</div>
          ${(u.okter||[]).map(o=>`<div class="ep-okt-lbl">${o.tittel}</div>`).join('')}
        </div>
      </div>`).join('');
  }catch{el.innerHTML='<div class="tom-tilstand">Feil i årsplandata.</div>';}
}

    _prog=data||[];

    el.innerHTML=`<div class="at-grid">
      ${[..._prog].sort((a,b)=>(b.xp||0)-(a.xp||0)).slice(0,12).map(p=>{
        const niv=p.beste_nivaa??p.nivaa??0;

          <div class="at-emne">${p.emne}</div>

$id('at-start-btn').addEventListener('click', async()=>{
  const emne=$id('at-emne').value;
  if(!emne)return;
  // Last oppgavebank om ikke lastet
  if(!_bank){
    try{const r=await fetch('core/oppgaver-matte.json');if(r.ok)_bank=await r.json();else _bank={};}
    catch{_bank={};}
  }
  const p=_prog.find(p=>p.emne===emne);
  Q.emne=emne; Q.nivaa=Math.min(10,Math.max(1,(p?.beste_nivaa??p?.nivaa??0)+1));
  Q.streak=p?.streak_riktig??0; Q.xp=p?.xp??0; Q.besvart=false;
  $id('at-velger').style.display='none';
  $id('at-prog-kort').style.display='none';
  $id('quiz-kort').style.display='block';
  $id('quiz-emne-vis').textContent=emne;
  oppdaterQuizUI();
  visNesteOppgave();
});

function oppdaterQuizUI() {
  $id('quiz-niv-vis').textContent=Q.nivaa;
  $id('quiz-xp-vis').textContent=`${Q.xp} XP`;
  $id('quiz-streak-vis').textContent=`${Q.streak} riktig`;
  $id('quiz-prog').style.width=`${(Q.nivaa/10)*100}%`;
}

function visNesteOppgave() {
  Q.besvart=false;
  const oppgaver=_bank?.[Q.emne]?.[String(Q.nivaa)];
  if(!oppgaver?.length){
    $id('quiz-innhold').innerHTML=`<div class="tom-tilstand" style="padding:20px 0"><div style="font-size:2rem;margin-bottom:8px">🎉</div>Ingen oppgaver for dette emnet/nivå ennå.</div>`;
    $id('quiz-knapper').innerHTML=`<button class="btn btn-sek" onclick="avsluttQuiz()">← Tilbake</button>`;
    return;
  }
  Q.oppgave=oppgaver[Math.floor(Math.random()*oppgaver.length)];
  renderOppgave();
}

function renderOppgave() {
  const o=Q.oppgave;
  const inn=$id('quiz-innhold');
  if(o.type==='mc'){
    inn.innerHTML=`<div class="quiz-sporsmal">${o.oppgave}</div><div class="quiz-alts">
      ${o.alts.map((a,i)=>`<button class="quiz-alt" data-i="${i}">${a}</button>`).join('')}
    </div>`;
    inn.querySelectorAll('.quiz-alt').forEach(btn=>btn.addEventListener('click',()=>{if(!Q.besvart)svarMc(parseInt(btn.dataset.i));}));
  }else{
    inn.innerHTML=`<div class="quiz-sporsmal">${o.oppgave}</div>
      <div class="quiz-input-rad">
        <input type="text" id="quiz-inp" placeholder="Ditt svar…" autocomplete="off">
        <button class="btn btn-prim" id="quiz-sjekk">Sjekk</button>
      </div>`;
    $id('quiz-sjekk').addEventListener('click',()=>{if(!Q.besvart)svarInput();});
    $id('quiz-inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!Q.besvart)svarInput();});
    setTimeout(()=>$id('quiz-inp')?.focus(),40);
  }
  $id('quiz-knapper').innerHTML=`<button class="btn btn-ghost btn-sm" onclick="avsluttQuiz()">← Avslutt</button>`;
}

function svarMc(idx) {
  if(Q.besvart)return;
  const riktig=idx===Q.oppgave.riktig;
  Q.besvart=true;
  document.querySelectorAll('.quiz-alt').forEach((b,i)=>{
    b.disabled=true;
    if(i===Q.oppgave.riktig)b.classList.add('riktig');
    else if(i===idx&&!riktig)b.classList.add('feil');
  });
  behandleSvar(riktig);
}

function svarInput() {
  if(Q.besvart)return;
  const inp=$id('quiz-inp');
  if(!inp)return;
  const svar=inp.value.trim().toLowerCase().replace(/\s/g,'');
  const aksept=(Q.oppgave.aksepter||[Q.oppgave.svar]).map(a=>a.toString().toLowerCase().replace(/\s/g,''));
  const riktig=aksept.includes(svar);
  Q.besvart=true;
  inp.disabled=true; $id('quiz-sjekk').disabled=true;
  inp.style.borderColor=riktig?'var(--gron)':'var(--rod)';
  if(!riktig&&Q.oppgave.svar) inp.value+='  → Riktig: '+Q.oppgave.svar;
  behandleSvar(riktig);
}

function behandleSvar(riktig) {
  if(Q.oppgave.fork){
    $id('quiz-innhold').insertAdjacentHTML('beforeend',`<div class="quiz-fork">${riktig?'✅ ':'❌ '}${Q.oppgave.fork}</div>`);
  }
  if(riktig){
    Q.streak++; Q.xp+=Q.nivaa*10;
    snack(`+${Q.nivaa*10} XP! ${Q.streak} riktige på rad 🎉`);
    if(Q.streak>=Q.tilNivaaOpp&&Q.nivaa<10){Q.nivaa++;Q.streak=0;snack(`Nivå opp! Nå på nivå ${Q.nivaa} 🚀`,'info');}
  }else{
    Q.streak=0;
    if(Q.nivaa>1)Q.nivaa--;
  }
  oppdaterQuizUI();
  lagreProgresjon();
  $id('quiz-knapper').innerHTML=`
    <button class="btn btn-ghost btn-sm" onclick="avsluttQuiz()">← Avslutt</button>
    <button class="btn btn-prim" onclick="visNesteOppgave()">Neste →</button>`;
}

async function lagreProgresjon() {
  const body={xp:Q.xp,nivaa:Q.nivaa,streak_riktig:Q.streak};
  if(Q.nivaa>((_prog.find(p=>p.emne===Q.emne)?.beste_nivaa)||0)) body.beste_nivaa=Q.nivaa;
  try{
    // Prøv PATCH
    await sb(`/adaptiv_progresjon?elev_id=eq.${_elev.id}&emne=eq.${Q.emne}`,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify(body)});
    const idx=_prog.findIndex(p=>p.emne===Q.emne);
    if(idx>=0) _prog[idx]={..._prog[idx],...body,emne:Q.emne};
    else _prog.push({emne:Q.emne,...body});
    $id('stat-xp').textContent=_prog.reduce((s,r)=>s+(r.xp||0),0);
  }catch{
    // INSERT om rad ikke finnes
    try{ await sb('/adaptiv_progresjon',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify({elev_id:_elev.id,emne:Q.emne,...body})}); }
    catch{}
  }
}

function avsluttQuiz() {
  $id('quiz-kort').style.display='none';
  $id('at-velger').style.display='';
  $id('at-prog-kort').style.display='';
  lastProgresjon();
}

const ONB=[
  {ikon:'📚',tittel:'Velkommen til SkapLab!',tekst:'Her finner du fagkort, oppgaver fra læreren, og den adaptive treneren.'},
  {ikon:'📋',tittel:'Mine oppgaver',tekst:'Under «Mine oppgaver» ser du fagkort læreren har tildelt deg, med eventuelle frister.'},
  {ikon:'📊',tittel:'Adaptiv trener',tekst:'Tren matte og naturfag med oppgaver tilpasset ditt nivå. Du tjener XP og klatrer i nivå automatisk!'},
  {ikon:'💬',tittel:'Meldinger og vurdering',tekst:'Send og motta meldinger fra læreren. Under «Vurdering» ser du tilbakemeldinger per kompetansemål.'},
];
let _onbSteg=0;
function visOnboarding(){_onbSteg=0;$id('onb-overlay').style.display='flex';oppdaterOnb();}
function oppdaterOnb(){
  const s=ONB[_onbSteg];
  $id('onb-innhold').innerHTML=`<div class="onb-ikon">${s.ikon}</div><div class="onb-tittel">${s.tittel}</div><div class="onb-tekst">${s.tekst}</div>`;
  $id('onb-prikker').innerHTML=ONB.map((_,i)=>`<div class="onb-prikk ${i===_onbSteg?'ak':''}"></div>`).join('');
  $id('onb-forrige').disabled=_onbSteg===0;
  $id('onb-neste').textContent=_onbSteg===ONB.length-1?'Kom i gang!':'Neste →';
}
$id('onb-neste').addEventListener('click',()=>{ if(_onbSteg>=ONB.length-1)lukkOnb(); else{_onbSteg++;oppdaterOnb();} });
$id('onb-forrige').addEventListener('click',()=>{ if(_onbSteg>0){_onbSteg--;oppdaterOnb();} });
$id('onb-hopp').addEventListener('click',lukkOnb);
function lukkOnb(){localStorage.setItem('skaplab_onb_elev','1');$id('onb-overlay').style.display='none';}
$id('hjelp-knapp').addEventListener('click',visOnboarding);
