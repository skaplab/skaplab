<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Cellens anatomi (organeller)</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f7f4;--surface:#ffffff;--card:#f7faf9;
  --border:#ddeee8;--text:#1a2e26;--dim:#6a8c7e;
  --accent:#2d9e6b;--accent2:#1a6b48;
  --font-d:'Lora',serif;--font-b:'Mulish',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 35% 40%,rgba(45,158,107,.06),transparent),
             radial-gradient(ellipse 50% 40% at 80% 70%,rgba(26,107,72,.04),transparent);}

nav{position:sticky;top:0;z-index:300;background:rgba(240,247,244,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-lnk{font-size:.78rem;font-weight:600;color:var(--dim);text-decoration:none}
.nav-lnk:hover{color:var(--text)}.nav-sep{color:var(--border)}
.nav-tittel{font-family:var(--font-d);font-size:.95rem;color:var(--accent);font-weight:600}
.cellebytte{display:flex;gap:4px}
.ctab{font-size:.72rem;font-weight:600;padding:5px 14px;border-radius:20px;
  border:1.5px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;transition:all .18s}
.ctab:hover{border-color:var(--accent);color:var(--text)}
.ctab.on{background:rgba(45,158,107,.12);border-color:var(--accent);color:var(--accent2)}

.layout{position:relative;z-index:1;display:grid;grid-template-columns:180px 1fr 300px;
  height:calc(100vh - 44px);overflow:hidden}

/* Venstre knappepanel */
.side-panel{padding:14px 0;display:flex;flex-direction:column;gap:5px;
  border-right:1px solid var(--border);background:rgba(255,255,255,.6);overflow-y:auto}
.side-panel::-webkit-scrollbar{width:3px}
.side-panel::-webkit-scrollbar-thumb{background:var(--border)}
.side-label{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--dim);padding:10px 14px 4px}
.del-knapp{font-family:var(--font-b);font-size:.76rem;font-weight:600;
  padding:7px 14px;border:none;background:transparent;color:var(--dim);
  cursor:pointer;text-align:left;transition:all .18s;
  display:flex;align-items:center;gap:8px;border-radius:0;}
.del-knapp:hover{background:rgba(45,158,107,.07);color:var(--text)}
.del-knapp.aktiv{background:rgba(45,158,107,.12);color:var(--accent2);font-weight:700}
.del-knapp .dot{width:7px;height:7px;border-radius:50%;background:var(--farge,var(--accent));flex-shrink:0}
.del-knapp.aktiv .dot{box-shadow:0 0 5px var(--farge,var(--accent))}

/* SVG-senter */
.celle-wrap{position:relative;display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:var(--bg);}
.celle-svg{width:100%;height:100%;max-width:600px;max-height:600px}
.hotspot{cursor:pointer;transition:all .2s}
.hotspot:hover .hs-el{filter:brightness(1.3) saturate(1.2)}
.hotspot.aktiv .hs-el{filter:brightness(1.5) saturate(1.4)}

/* Tooltip */
.tooltip{position:absolute;background:rgba(26,46,38,.92);border:1px solid rgba(45,158,107,.3);
  border-radius:8px;padding:5px 11px;font-size:.75rem;color:#e8f5f0;
  pointer-events:none;white-space:nowrap;transform:translate(-50%,-110%);z-index:10;
  transition:opacity .15s}

/* Info panel */
.info-panel{border-left:1px solid var(--border);background:var(--surface);
  display:flex;flex-direction:column;overflow-y:auto}
.info-panel::-webkit-scrollbar{width:3px}
.info-panel::-webkit-scrollbar-thumb{background:var(--border)}
.info-tom{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--dim);text-align:center;padding:28px;gap:10px}
.info-tom-ikon{font-size:2.5rem;opacity:.3}
.info-tom-tekst{font-size:.75rem;color:var(--dim);line-height:1.6}
.info-header{padding:22px 22px 14px;border-bottom:1px solid var(--border);
  position:relative;overflow:hidden}
.info-header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,var(--pglow,rgba(45,158,107,.06)),transparent);
  pointer-events:none}
.del-emoji{font-size:2rem;display:block;margin-bottom:6px}
.del-navn{font-family:var(--font-d);font-size:1.4rem;font-weight:700;color:var(--farge,var(--accent));line-height:1}
.del-latinsk{font-size:.74rem;color:var(--dim);font-style:italic;margin-top:2px;font-family:var(--font-d)}
.info-body{padding:16px 22px;display:flex;flex-direction:column;gap:12px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.info-boks{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px}
.info-boks-label{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
.info-boks-verdi{font-size:.78rem;font-weight:600;color:var(--text);line-height:1.4}
.del-seksjontittel{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.del-tekst{font-size:.81rem;line-height:1.7;color:rgba(26,46,38,.75)}
.visste-boks{background:rgba(45,158,107,.06);border:1px solid rgba(45,158,107,.18);
  border-radius:9px;padding:11px 13px;border-left:3px solid var(--accent)}
.visste-boks p{font-size:.78rem;line-height:1.65;color:rgba(26,46,38,.75)}

/* Animasjoner */
@keyframes celle-puls{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes mitokondrie-puls{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes flagell{0%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}100%{transform:rotate(-8deg)}}
@keyframes ribosom-blink{0%,100%{opacity:.5}50%{opacity:1}}
.ar-celle{animation:celle-puls 3s ease-in-out infinite}
.ar-mitokondrie{animation:mitokondrie-puls 2s ease-in-out infinite}

@media(max-width:960px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  .side-panel{flex-direction:row;flex-wrap:wrap;overflow-x:auto;border-right:none;
    border-bottom:1px solid var(--border);padding:8px;height:auto}
  .side-label{display:none}.del-knapp{font-size:.68rem;padding:5px 10px}
  .info-panel{height:280px;border-left:none;border-top:1px solid var(--border)}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="naturfag_hub.html" class="nav-lnk">🔬 Naturfag</a>
    <span class="nav-sep">/</span>
    <span class="nav-tittel">Cellens anatomi</span>
  </div>
  <div class="cellebytte">
    <button class="ctab on" onclick="byttCelle('dyre',this)">🐭 Dyrецelle</button>
    <button class="ctab" onclick="byttCelle('plante',this)">🌿 Plantecelle</button>
  </div>
</nav>

<div class="layout">
  <!-- Venstre panel -->
  <div class="side-panel" id="side-panel"></div>

  <!-- SVG celle -->
  <div class="celle-wrap" id="celle-wrap">
    <svg class="celle-svg" id="celle-svg" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="tooltip" id="tooltip" style="opacity:0;left:0;top:0"></div>
  </div>

  <!-- Info panel -->
  <div class="info-panel" id="info-panel">
    <div class="info-tom" id="info-tom">
      <div class="info-tom-ikon">🔬</div>
      <div class="info-tom-tekst">Klikk på en celledelene<br>for å lære mer</div>
    </div>
    <div id="info-innhold" style="display:none"></div>
  </div>
</div>

<script>

//  CELLEDATA
// ═══════════════════════════════════════════
const CELLE_DELER = {

     morsomt:'Cellemembranen er så tynn at du ville trenge 10 000 slike lag for å nå tykkelsen på ett papirark!'},

     morsomt:'Hvis du strakk ut alt DNA-et i én enkelt menneskecelle, ville tråden bli ca. 2 meter lang!'},

let aktivCelle = 'dyre';

function byttCelle(type, btn){
  aktivCelle = type;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  // Reset info
  document.getElementById('info-tom').style.display='flex';
  document.getElementById('info-innhold').style.display='none';
  // Render SVG og panel
  renderCelle();
}

function renderCelle(){
  const svg = document.getElementById('celle-svg');
  svg.innerHTML = aktivCelle==='dyre' ? SVG_DYRE : SVG_PLANTE;
  // Bind tooltip
  svg.querySelectorAll('.hotspot').forEach(el=>{
    const id = el.dataset.id;
    const deler = CELLE_DELER[aktivCelle];
    const del = deler.find(d=>d.id===id);
    if(!del) return;
    const tt = document.getElementById('tooltip');
    el.addEventListener('mouseenter', ()=>{ tt.textContent=del.navn; tt.style.opacity='1'; });
    el.addEventListener('mousemove', e=>{
      const r = document.getElementById('celle-wrap').getBoundingClientRect();
      tt.style.left=(e.clientX-r.left)+'px';
      tt.style.top=(e.clientY-r.top)+'px';
    });
    el.addEventListener('mouseleave', ()=>{ tt.style.opacity='0'; });
  });

  // Sideknapper
  const sp = document.getElementById('side-panel');
  const deler = CELLE_DELER[aktivCelle];
  const sett = new Set();
  sp.innerHTML = `<div class="side-label">${aktivCelle==='dyre'?'Dyrecelle':'Plantecelle'}</div>` +
    deler.filter(d=>{ if(sett.has(d.id)) return false; sett.add(d.id); return true; })
    .map(d=>`<button class="del-knapp" id="kb-${d.id}" style="--farge:${d.farge}" onclick="velg('${d.id}','${aktivCelle}')">
      <span class="dot"></span>${d.navn}
    </button>`).join('');
}

function velg(id, celleType){
  const deler = CELLE_DELER[celleType];
  const del = deler.find(d=>d.id===id);
  if(!del) return;

  document.querySelectorAll('.hotspot').forEach(h=>h.classList.toggle('aktiv', h.dataset.id===id));
  document.querySelectorAll('.del-knapp').forEach(b=>b.classList.toggle('aktiv', b.id==='kb-'+id));

  document.getElementById('info-tom').style.display='none';
  const innhold = document.getElementById('info-innhold');
  innhold.style.display='block';

  innhold.innerHTML = `
    <div class="info-header" style="--pglow:${del.farge}18">
      <span class="del-emoji">${del.emoji}</span>
      <div class="del-navn" style="color:${del.farge}">${del.navn}</div>
      <div class="del-latinsk">${del.latin}</div>
    </div>
    <div class="info-body">
      <div>
        <div class="del-seksjontittel">Nøkkeltall</div>
        <div class="info-grid">
          ${del.fakta.map(f=>`<div class="info-boks">
            <div class="info-boks-label">${f.l}</div>
            <div class="info-boks-verdi">${f.v}</div>
          </div>`).join('')}
        </div>
      </div>
      <div>
        <div class="del-seksjontittel">Funksjon og oppbygging</div>
        <p class="del-tekst">${del.tekst}</p>
      </div>
      <div class="visste-boks">
        <div class="del-seksjontittel" style="color:var(--accent)">💡 Visste du?</div>
        <p>${del.morsomt}</p>
      </div>
    </div>`;
  if(window.innerWidth<960) document.getElementById('info-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// Init
renderCelle();
