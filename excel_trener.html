<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel-trener · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f14;--bg2:#16161e;--bg3:#1e1e2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#e8e8f0;--dim:#888899;
  --accent:#5bc98e;--accent2:#5b8dd9;--gold:#e8b84b;
  --red:#e05c6e;--orange:#e8874b;
  --font-d:'Playfair Display',serif;
  --font-b:'Source Sans 3',sans-serif;
  --font-m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:16px;}

/* ── HEADER ── */
#header{background:linear-gradient(135deg,#16161e,#1a1e2a);border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:12px;}
.logo{font-family:var(--font-d);font-size:1.4rem;font-weight:900;color:var(--accent);}
.undertittel{font-size:.78rem;color:var(--dim);}
.spacer{flex:1;}
.header-stat{font-size:.82rem;color:var(--dim);}
.header-stat b{color:var(--gold);}
a.tilbake{font-size:.78rem;color:var(--dim);text-decoration:none;}
a.tilbake:hover{color:var(--text);}

/* ── PROGRESS ── */
#prog-wrap{padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;}
#prog-bar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .4s;}
#prog-tekst{font-size:.76rem;color:var(--dim);white-space:nowrap;}

/* ── LAYOUT ── */
#app{display:grid;grid-template-columns:200px 1fr 240px;min-height:calc(100vh - 98px);}

/* ── SIDEBAR ── */
#sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:10px 6px;overflow-y:auto;}
.grp-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--dim);padding:10px 8px 4px;}
.oppg-knapp{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;
  border-radius:7px;background:transparent;border:1px solid transparent;
  color:var(--dim);cursor:pointer;font-size:.8rem;font-family:var(--font-b);text-align:left;transition:all .12s;}
.oppg-knapp:hover{background:rgba(255,255,255,.04);color:var(--text);}
.oppg-knapp.aktiv{background:rgba(91,201,142,.07);border-color:rgba(91,201,142,.2);color:var(--accent);}
.oppg-knapp.fullfort{background:rgba(91,201,142,.06);border-color:rgba(91,201,142,.15);color:var(--accent);}
.oppg-knapp.feil{background:rgba(224,92,110,.06);border-color:rgba(224,92,110,.15);color:var(--red);}
.merking-lavt{font-size:.6rem;padding:1px 5px;border-radius:5px;margin-left:auto;
  background:rgba(91,201,142,.15);color:var(--accent);}
.merking-viktig{font-size:.6rem;padding:1px 5px;border-radius:5px;margin-left:auto;
  background:rgba(232,184,75,.15);color:var(--gold);}

/* ── HOVED-PANEL ── */
#panel{padding:24px 28px;overflow-y:auto;max-width:900px;}
.oppg-header{margin-bottom:16px;}
.oppg-gruppe{font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;
  color:var(--accent2);font-weight:700;margin-bottom:4px;}
.oppg-tittel{font-family:var(--font-d);font-size:1.5rem;font-weight:700;line-height:1.2;}
.oppg-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.meta-tag{font-size:.72rem;padding:3px 10px;border-radius:10px;
  border:1px solid rgba(255,255,255,.1);color:var(--dim);}
.meta-poeng{background:rgba(232,184,75,.08);border-color:rgba(232,184,75,.25);color:var(--gold);}

.intro-boks{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;margin-bottom:14px;font-size:.9rem;line-height:1.6;}
.mål-boks{background:rgba(91,133,217,.08);border:1px solid rgba(91,133,217,.2);
  border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:.85rem;
  color:var(--accent2);line-height:1.5;}

/* ── REGNEARK ── */
#regneark-wrap{overflow-x:auto;margin-bottom:16px;}
table.regneark{border-collapse:collapse;font-size:.82rem;min-width:100%;}
table.regneark th{background:rgba(255,255,255,.06);color:var(--dim);font-weight:600;
  padding:5px 10px;border:1px solid var(--border2);font-size:.75rem;
  text-align:center;min-width:32px;}
table.regneark td{border:1px solid rgba(255,255,255,.06);padding:0;min-width:80px;}
table.regneark td.rad-header{background:rgba(255,255,255,.04);color:var(--dim);
  font-size:.72rem;text-align:center;padding:4px 6px;min-width:32px;font-family:var(--font-m);}
table.regneark td.låst{background:rgba(255,255,255,.02);color:var(--text);
  padding:5px 8px;font-size:.83rem;}
table.regneark td.låst.tall{text-align:right;font-family:var(--font-m);color:#a0d8ff;}
table.regneark td.låst.tom{background:transparent;}
table.regneark td.input-celle{padding:0;}
table.regneark td.input-celle input{
  width:100%;border:none;outline:none;background:rgba(91,133,217,.08);
  color:var(--text);font-family:var(--font-m);font-size:.82rem;
  padding:5px 7px;transition:background .12s;
}
table.regneark td.input-celle input:focus{background:rgba(91,133,217,.18);}
table.regneark td.input-celle input.riktig{background:rgba(91,201,142,.12);color:var(--accent);}
table.regneark td.input-celle input.galt{background:rgba(224,92,110,.1);color:var(--red);}
table.regneark td.input-celle input.nesten{background:rgba(232,184,75,.08);color:var(--gold);}
.celle-label{font-size:.62rem;color:var(--dim);padding:2px 6px;
  background:rgba(91,133,217,.05);border-bottom:1px solid rgba(255,255,255,.05);}

/* Formel-visning over regnearket */
#formel-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:8px;margin-bottom:8px;font-size:.82rem;}
#formel-celle-id{font-family:var(--font-m);color:var(--gold);min-width:32px;font-size:.78rem;}
#formel-innhold{font-family:var(--font-m);color:var(--accent2);flex:1;}

/* ── KNAPPER ── */
.knapp-rad{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.sjekk-btn{padding:11px 26px;font-family:var(--font-d);font-size:.95rem;font-weight:700;
  background:var(--accent);color:#000;border:none;border-radius:9px;cursor:pointer;transition:filter .15s;}
.sjekk-btn:hover{filter:brightness(1.08);}
.sjekk-btn:disabled{opacity:.3;cursor:default;}
.neste-btn{padding:11px 22px;font-family:var(--font-d);font-size:.9rem;font-weight:700;
  background:var(--accent2);color:#fff;border:none;border-radius:9px;cursor:pointer;display:none;}
.neste-btn:hover{filter:brightness(1.1);}
.reset-btn{padding:11px 18px;font-size:.85rem;font-family:var(--font-b);
  background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.1);
  border-radius:9px;cursor:pointer;}
.reset-btn:hover{color:var(--text);}

/* Feedback */
.fb{padding:12px 16px;border-radius:9px;font-size:.86rem;line-height:1.5;
  display:none;margin-top:12px;}
.fb.riktig{background:rgba(91,201,142,.1);border:1px solid rgba(91,201,142,.3);color:var(--accent);display:block;}
.fb.delvis{background:rgba(232,184,75,.08);border:1px solid rgba(232,184,75,.25);color:var(--gold);display:block;}
.fb.feil{background:rgba(224,92,110,.1);border:1px solid rgba(224,92,110,.3);color:var(--red);display:block;}
.fasit-boks{background:var(--bg3);border:1px solid rgba(91,201,142,.15);border-radius:9px;
  padding:12px 16px;margin-top:10px;font-size:.84rem;line-height:1.6;display:none;}
.fasit-boks.vis{display:block;}
.fasit-tittel{color:var(--accent);font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;}
.fasit-formel{font-family:var(--font-m);color:var(--accent2);font-size:.83rem;}

/* ── HINT-PANEL ── */
#hint-panel{
  background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:20px 14px;gap:0;
  position:sticky;top:0;height:calc(100vh - 98px);overflow-y:auto;
}
.svar-display-skjult{display:none;}
.svar-display-synlig{
  display:flex;flex-direction:column;align-items:center;
  width:100%;margin:16px 0 0;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border2);border-radius:12px;
  padding:14px 12px;gap:6px;
}
.sd-celle-id{
  font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:var(--dim);
}
.sd-formel{
  font-family:var(--font-m);font-size:.8rem;color:var(--accent2);
  word-break:break-all;text-align:center;line-height:1.4;
}
.sd-verdi{
  font-family:var(--font-d);font-size:1.8rem;font-weight:700;
  color:var(--accent);line-height:1.1;
}
#hint-innhold{width:100%;margin-top:16px;}
#hint-innhold.hint-skjult{display:none;}
#hint-innhold.hint-synlig{display:block;}
#hint-knapp{
  background:none;border:none;cursor:pointer;
  font-size:2.4rem;line-height:1;padding:8px;
  border-radius:50%;transition:transform .15s, background .15s;
  display:flex;align-items:center;justify-content:center;
  width:60px;height:60px;flex-shrink:0;
}
#hint-knapp:hover{background:rgba(255,255,255,.07);transform:scale(1.08);}
#hint-knapp.aktiv{background:rgba(232,184,75,.12);}
#hint-knapp.aktiv #hint-pære{filter:brightness(1.3);}
#hint-innhold{
  width:100%;margin-top:14px;
}
#hint-innhold.hint-skjult{display:none;}
#hint-innhold.hint-synlig{display:block;}
.hint-steg{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.hint-nr{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:rgba(91,133,217,.2);
  color:var(--accent2);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
.hint-tekst{font-size:.8rem;color:var(--dim);line-height:1.5;font-family:var(--font-m);}
.hint-tekst.formel{color:var(--accent2);}

.excel-info{margin-top:20px;padding:12px;background:rgba(232,135,75,.06);
  border:1px solid rgba(232,135,75,.15);border-radius:8px;}
.excel-info-tittel{font-size:.7rem;color:var(--orange);font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;}
.excel-info-tekst{font-size:.78rem;color:var(--dim);line-height:1.5;}
.excel-info-tekst code{font-family:var(--font-m);color:var(--accent2);font-size:.82rem;}

/* ── RESULTAT ── */
#resultat{display:none;padding:40px;max-width:620px;}
.res-tittel{font-family:var(--font-d);font-size:2.2rem;font-weight:900;margin-bottom:8px;}
.res-score{font-family:var(--font-d);font-size:3.5rem;font-weight:900;color:var(--accent);line-height:1;margin:14px 0;}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.res-kort{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.res-tall{font-family:var(--font-d);font-size:1.5rem;font-weight:700;color:var(--accent2);}
.res-label{font-size:.76rem;color:var(--dim);margin-top:2px;}
.ny-btn{padding:13px 30px;font-family:var(--font-d);font-size:.95rem;font-weight:700;
  background:var(--accent);color:#000;border:none;border-radius:9px;cursor:pointer;}

.fv-seksjon{margin:14px 0;padding:14px 0 0;}
.fv-tittel{font-size:.88rem;color:var(--text);margin-bottom:10px;line-height:1.4;}
.fv-grid{display:flex;flex-direction:column;gap:6px;}
.fv-alt{display:block;width:100%;padding:10px 14px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:8px;
  color:var(--text);cursor:pointer;text-align:left;
  font-family:var(--font-b);font-size:.86rem;transition:all .12s;}
.fv-alt:hover{background:rgba(255,255,255,.08);}
.fv-alt.fv-valgt{background:rgba(232,184,75,.08);border-color:rgba(232,184,75,.3);color:var(--gold);}
.fv-alt.fv-riktig{background:rgba(91,201,142,.1);border-color:rgba(91,201,142,.4);color:var(--accent);}
.fv-alt.fv-galt{background:rgba(224,92,110,.08);border-color:rgba(224,92,110,.3);color:var(--red);}
.fv-tekst{display:block;font-weight:600;margin-bottom:0;}
.fv-begr{font-size:.78rem;color:var(--dim);margin-top:5px;line-height:1.5;font-weight:400;}
.fv-alt.fv-riktig .fv-begr{color:rgba(91,201,142,.8);}
.fv-alt.fv-galt .fv-begr{color:rgba(224,92,110,.7);}
</style>
</head>
<body>
<div id="header">
  <a href="index.html" class="tilbake">← SkapLab</a>
  <div>
    <div class="logo">📊 Excel-trener</div>
    <div class="undertittel">Statistikk og økonomi · LK20</div>
  </div>
  <div class="spacer"></div>
  <div class="header-stat">✅ <b id="st-poeng">0</b> poeng · <b id="st-fullfort">0</b>/8 fullført</div>
</div>
<div id="prog-wrap">
  <span id="prog-tekst" style="font-size:.76rem;color:var(--dim)">Velg en oppgave</span>
  <div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
</div>
<div id="app">
  <div id="sidebar"></div>
  <div id="panel"><div style="padding:40px;color:var(--dim);text-align:center">
    <div style="font-size:3rem;margin-bottom:16px">📊</div>
    <div style="font-family:var(--font-d);font-size:1.4rem;color:var(--text);margin-bottom:8px">Velg en oppgave til venstre</div>
    <div style="font-size:.88rem">Skriv Excel-formler direkte i cellene og trykk Sjekk for å se om du har riktig.</div>
  </div></div>
  <div id="hint-panel">
    <button id="hint-knapp" onclick="toggleHint()" title="Vis fremgangsmåte">
      <span id="hint-pære">💡</span>
    </button>
    <div id="svar-display" class="svar-display-skjult">
      <div class="sd-celle-id" id="sd-celle"></div>
      <div class="sd-formel" id="sd-formel"></div>
      <div class="sd-verdi" id="sd-verdi"></div>
    </div>
    <div id="hint-innhold" class="hint-skjult"></div>
  </div>
</div>
<div id="resultat">
  <div class="res-tittel">Ferdig! 🎉</div>
  <div class="res-score" id="res-score">0 / 0</div>
  <div class="res-grid">
    <div class="res-kort"><div class="res-tall" id="res-stat">0/0</div><div class="res-label">Statistikk</div></div>
    <div class="res-kort"><div class="res-tall" id="res-ok">0/0</div><div class="res-label">Økonomi</div></div>
    <div class="res-kort"><div class="res-tall" id="res-ganger">1</div><div class="res-label">Besøk</div></div>
    <div class="res-kort"><div class="res-tall" id="res-pst">0%</div><div class="res-label">Poengprosent</div></div>
  </div>
  <button class="ny-btn" onclick="nyRunde()">🔄 Prøv igjen</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// FORMEL-PARSER FOR PSEUDO-REGNEARK
// Støtter norsk og engelsk Excel-syntaks
// ══════════════════════════════════════════════════════════════════

function ExcelFormelParser(getCelle) {
  // getCelle(kolonne, rad) → numerisk verdi eller null
  // kolonne: 'A','B','C'... rad: 1,2,3...

  function kolTilIdx(k) {
    k = k.toUpperCase().replace('$','');
    var idx = 0;
    for (var i=0;i<k.length;i++) idx = idx*26 + (k.charCodeAt(i)-64);
    return idx; // A=1, B=2...
  }

  function parseRef(ref) {
    // '$B$3' → {kol:'B', rad:3}
    ref = ref.replace(/\$/g,'');
    var m = ref.match(/^([A-Za-z]+)(\d+)$/);
    if (!m) return null;
    return { kol: m[1].toUpperCase(), rad: parseInt(m[2]) };
  }

  function parseRange(range) {
    // 'B2:B11' → array av {kol,rad}
    range = range.replace(/\$/g,'');
    var parts = range.split(':');
    if (parts.length !== 2) return [];
    var fra = parseRef(parts[0]);
    var til = parseRef(parts[1]);
    if (!fra||!til) return [];
    var celler = [];
    var fraCIdx = kolTilIdx(fra.kol);
    var tilCIdx = kolTilIdx(til.kol);
    for (var r=fra.rad; r<=til.rad; r++) {
      for (var c=fraCIdx; c<=tilCIdx; c++) {
        var kolNavn = String.fromCharCode(64+c);
        celler.push({kol:kolNavn, rad:r});
      }
    }
    return celler;
  }

  function hentVerdier(range) {
    return parseRange(range)
      .map(function(c){ return getCelle(c.kol, c.rad); })
      .filter(function(v){ return v !== null && !isNaN(v); });
  }

  function evaluerFunksjon(navn, arg) {
    navn = navn.toUpperCase();
    // Sjekk om arg er range eller kommaseparert
    var verdier;
    if (arg.includes(':')) {
      verdier = hentVerdier(arg);
    } else {
      // Kommaseparert liste av refs/tall
      verdier = arg.split(/[;,]/).map(function(a){
        a = a.trim();
        if (/^-?\d+([.,]\d+)?$/.test(a)) return parseFloat(a.replace(',','.'));
        var ref = parseRef(a);
        if (ref) return getCelle(ref.kol, ref.rad);
        return null;
      }).filter(function(v){ return v !== null && !isNaN(v); });
    }
    if (!verdier.length) return null;

    switch(navn) {
      case 'SUM': return verdier.reduce(function(a,b){return a+b;},0);
      case 'GJENNOMSNITT': case 'AVERAGE':
        return verdier.reduce(function(a,b){return a+b;},0)/verdier.length;
      case 'MEDIAN':
        var s=[].concat(verdier).sort(function(a,b){return a-b;});
        var n=s.length;
        return n%2===0?(s[n/2-1]+s[n/2])/2:s[Math.floor(n/2)];
      case 'MAKS': case 'MAX': return Math.max.apply(null,verdier);
      case 'MIN': return Math.min.apply(null,verdier);
      case 'ANTALL': case 'COUNT': return verdier.length;
      case 'ANTALL.HVIS': case 'COUNTIF':
        // Forenklet: teller verdier lik en gitt verdi
        return verdier.length; // placeholder
      default: return null;
    }
  }

  function evaluerUttrykk(uttr) {
    // Fjern mellomrom
    uttr = uttr.trim().replace(/,/g, '.');

    // Tall
    if (/^-?\d+(\.\d+)?$/.test(uttr)) return parseFloat(uttr);

    // Funksjonskall: NAVN(arg)
    var fnMatch = uttr.match(/^([A-ZÆØÅ\.]+)\((.+)\)$/i);
    if (fnMatch) return evaluerFunksjon(fnMatch[1], fnMatch[2]);

    // Cellereferanse
    var ref = parseRef(uttr);
    if (ref) return getCelle(ref.kol, ref.rad);

    // Aritmetikk: splitt på + - * /
    // Prioriter: finn siste + eller - (lavest prioritet) utenfor parentes
    var parenDybde = 0;
    var sisteAddSub = -1;
    var sisteMulDiv = -1;
    for (var i=uttr.length-1;i>=0;i--) {
      var c = uttr[i];
      if (c===')') parenDybde++;
      if (c==='(') parenDybde--;
      if (parenDybde===0) {
        if ((c==='+'||c==='-') && i>0 && sisteAddSub===-1) sisteAddSub=i;
        if ((c==='*'||c==='/') && sisteMulDiv===-1) sisteMulDiv=i;
      }
    }

    if (sisteAddSub>0) {
      var L = evaluerUttrykk(uttr.slice(0,sisteAddSub));
      var R = evaluerUttrykk(uttr.slice(sisteAddSub+1));
      if (L===null||R===null) return null;
      return uttr[sisteAddSub]==='+'?L+R:L-R;
    }
    if (sisteMulDiv>0) {
      var L2 = evaluerUttrykk(uttr.slice(0,sisteMulDiv));
      var R2 = evaluerUttrykk(uttr.slice(sisteMulDiv+1));
      if (L2===null||R2===null) return null;
      return uttr[sisteMulDiv]==='*'?L2*R2:(R2!==0?L2/R2:null);
    }
    // Potens ^
    var pIdx = uttr.lastIndexOf('^');
    if (pIdx>0) {
      var Lp = evaluerUttrykk(uttr.slice(0,pIdx));
      var Rp = evaluerUttrykk(uttr.slice(pIdx+1));
      if (Lp===null||Rp===null) return null;
      return Math.pow(Lp, Rp);
    }

    // Parentes
    if (uttr.startsWith('(')&&uttr.endsWith(')')) {
      return evaluerUttrykk(uttr.slice(1,-1));
    }

    return null;
  }

  return {
    evaluer: function(formel) {
      if (!formel || typeof formel !== 'string') return null;
      formel = formel.trim();
      if (!formel.startsWith('=')) return isNaN(formel) ? null : parseFloat(formel.replace(',','.'));
      var uttr = formel.slice(1).trim();
      var result = evaluerUttrykk(uttr);
      if (result === null) return null;
      return Math.round(result * 10000) / 10000; // maks 4 desimaler
    }
  };
}

        : o.merking==='viktig'
        ? '<span class="merking-viktig">⭐</span>' : '';
      btn.innerHTML = '<span style="font-size:.72rem;width:18px">'+(sv?sv.status==='riktig'?'✓':sv.status==='delvis'?'~':'○':'○')+'</span>'
        + '<span>' + o.tittel + '</span>' + merk;
      btn.onclick = function(){ visOppgave(o.id); };
      sb.appendChild(btn);
    });
  });
}

// ── VIS OPPGAVE ───────────────────────────────────────────────────
function visOppgave(id) {
  state.gjeldende = id;
  var o = EXCEL_OPPGAVER.find(function(x){return x.id===id;});
  if (!o) return;

  // Generer data hvis ikke allerede gjort
  if (!state.data[id]) state.data[id] = o.data();
  if (!state.celleVerdier[id]) state.celleVerdier[id] = {};

  var alleredeSvart = !!state.svar[id];
  var panel = document.getElementById('panel');

  var merk = o.merking==='viktig'
    ? '<span class="meta-tag" style="background:rgba(232,184,75,.08);border-color:rgba(232,184,75,.25);color:var(--gold)">⭐ Viktig å mestre</span>'
    : o.merking==='lavt'
    ? '<span class="meta-tag" style="background:rgba(91,201,142,.08);border-color:rgba(91,201,142,.25);color:var(--accent)">🍎 Lavthengende frukt</span>' : '';

  panel.innerHTML =
    '<div class="oppg-header">'
      +'<div class="oppg-gruppe">' + o.gruppe + '</div>'
      +'<div class="oppg-tittel">' + o.tittel + '</div>'
      +'<div class="oppg-meta">'
        +'<span class="meta-tag meta-poeng">🏅 '+o.maxPoeng+' poeng</span>'
        + merk
      +'</div>'
    +'</div>'
    +'<div class="intro-boks">' + o.intro + '</div>'
    +'<div class="mål-boks">📌 ' + o.mål + '</div>'
    +'<div id="formel-bar"><span id="formel-celle-id">—</span><span style="color:var(--dim);margin:0 6px">fx</span><span id="formel-innhold"></span></div>'
    +'<div id="regneark-wrap"></div>'
    +(o.flervalg ? lagFlervalgHTML(o, alleredeSvart) : '')
  +'<div class="knapp-rad">'
      +'<button class="sjekk-btn" id="sjekk-btn" onclick="sjekkSvar()" '+(alleredeSvart?'disabled':'')+'>✓ Sjekk svar</button>'
      +'<button class="reset-btn" onclick="nullstillOppgave()">↩ Nullstill</button>'
      +'<button class="neste-btn" id="neste-btn" onclick="nesteOppgave()" '+(alleredeSvart?'style="display:block"':'')+'> Neste ▶</button>'
    +'</div>'
    +'<div class="fb" id="fb"></div>'
    +(alleredeSvart ? lagFasitBoks(o) : '');

  byggRegneark(o, alleredeSvart);
  visHint(o);
  byggSidebar();
  oppdaterProgress(o);
}

// ── BYGG REGNEARK ─────────────────────────────────────────────────
function byggRegneark(o, låst) {
  var data = state.data[o.id];
  var låsteC = o.låsteCeller(data);
  var celleV = state.celleVerdier[o.id];

  // Finn maks rad og kolonne
  var alleRefs = Object.keys(låsteC).concat(o.inputCeller || []);
  var maksRad = 1, maxKolIdx = 1;
  alleRefs.forEach(function(ref) {
    var m = ref.match(/^([A-Z]+)(\d+)$/);
    if (m) {
      maksRad = Math.max(maksRad, parseInt(m[2]));
      maxKolIdx = Math.max(maxKolIdx, m[1].charCodeAt(0)-64);
    }
  });

  var tabell = '<table class="regneark"><tr><th></th>';
  for (var k=1; k<=maxKolIdx; k++) tabell += '<th>' + String.fromCharCode(64+k) + '</th>';
  tabell += '</tr>';

  for (var r=1; r<=maksRad; r++) {
    tabell += '<tr><td class="rad-header">' + r + '</td>';
    for (var k=1; k<=maxKolIdx; k++) {
      var kNavn = String.fromCharCode(64+k);
      var ref = kNavn + r;
      var erInput = o.inputCeller && o.inputCeller.indexOf(ref) >= 0;
      var erLåst = låsteC.hasOwnProperty(ref);

      if (erInput) {
        var lagretVerdi = celleV[ref] !== undefined ? celleV[ref] : '';
        var cssKlasse = '';
        if (låst && state.svar[o.id]) {
          var tol = (o.tol && o.tol[ref] !== undefined) ? o.tol[ref] : 0.5;
          var fasit = o.fasit(data);
          if (fasit[ref] !== undefined) {
            var evalV = evaluerCelle(ref, o.id);
            cssKlasse = (evalV !== null && Math.abs(evalV - fasit[ref]) <= tol) ? ' riktig' : ' galt';
          }
        }
        tabell += '<td class="input-celle">';
        if (o.cellLabels && o.cellLabels[ref]) {
          tabell += '<div class="celle-label">' + o.cellLabels[ref] + '</div>';
        }
        tabell += '<input type="text" id="celle-'+ref+'" value="'+escHtml(lagretVerdi)+'"'
          + ' class="'+cssKlasse.trim()+'"'
          + (låst?' readonly':'')
          + ' onfocus="oppdaterFormelBar(\''+ref+'\')"'
          + ' oninput="celleEndret(\''+ref+'\',\''+o.id+'\')"'
          + ' onkeydown="celleTab(event,\''+ref+'\',\''+o.id+'\')"'
          + '></td>';
      } else if (erLåst) {
        var verdi = låsteC[ref];
        var erTall = typeof verdi === 'number';
        tabell += '<td class="låst' + (erTall?' tall':verdi===''?' tom':'') + '">'
          + (erTall ? formaterTall(verdi) : escHtml(verdi||'')) + '</td>';
      } else {
        tabell += '<td class="låst tom"></td>';
      }
    }
    tabell += '</tr>';
  }
  tabell += '</table>';
  document.getElementById('regneark-wrap').innerHTML = tabell;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formaterTall(v) {
  if (v === null || v === undefined) return '';
  return typeof v === 'number' ? v.toLocaleString('no') : String(v);
}

// ── FORMEL-EVALUERING ─────────────────────────────────────────────
function evaluerCelle(ref, oppgId) {
  var celleV = state.celleVerdier[oppgId] || {};
  var o = EXCEL_OPPGAVER.find(function(x){return x.id===oppgId;});
  if (!o) return null;
  var data = state.data[oppgId];
  var låsteC = o.låsteCeller(data);

  function getCelle(kol, rad) {
    var r = kol + rad;
    if (celleV[r] !== undefined && celleV[r] !== '') {
      var parser2 = ExcelFormelParser(function(k2,r2){ return låsteC[k2+r2] !== undefined ? parseFloat(låsteC[k2+r2]) : null; });
      var v = parser2.evaluer(celleV[r]);
      return v;
    }
    if (låsteC[r] !== undefined) return typeof låsteC[r]==='number' ? låsteC[r] : parseFloat(låsteC[r]);
    return null;
  }

  var parser = ExcelFormelParser(getCelle);
  var formel = celleV[ref] || '';
  return parser.evaluer(formel);
}

function celleEndret(ref, oppgId) {
  var el = document.getElementById('celle-'+ref);
  if (!el) return;
  var verdi = el.value;
  if (!state.celleVerdier[oppgId]) state.celleVerdier[oppgId] = {};
  state.celleVerdier[oppgId][ref] = verdi;

  // Vis beregnet verdi i formel-bar
  var evalV = evaluerCelle(ref, oppgId);
  document.getElementById('formel-celle-id').textContent = ref;
  document.getElementById('formel-innhold').textContent =
    verdi + (evalV !== null && verdi.startsWith('=') ? '  →  ' + formaterTall(evalV) : '');

  // Oppdater svar-display til høyre
  oppdaterSvarDisplay(ref, verdi, evalV);
}

function oppdaterSvarDisplay(ref, formel, evalV) {
  var sd = document.getElementById('svar-display');
  var sdCelle = document.getElementById('sd-celle');
  var sdFormel = document.getElementById('sd-formel');
  var sdVerdi = document.getElementById('sd-verdi');
  if (!sd || !sdCelle || !sdFormel || !sdVerdi) return;

  if (evalV !== null && formel && formel.startsWith('=')) {
    sd.className = 'svar-display-synlig';
    sdCelle.textContent = ref;
    sdFormel.textContent = formel;
    sdVerdi.textContent = formaterTall(evalV);
  } else if (!formel || formel === '') {
    // Tom celle - skjul display
    sd.className = 'svar-display-skjult';
  } else {
    // Tall-input uten formel
    sd.className = 'svar-display-synlig';
    sdCelle.textContent = ref;
    sdFormel.textContent = 'Verdi';
    sdVerdi.textContent = formel;
  }
}

function oppdaterFormelBar(ref) {
  var el = document.getElementById('celle-'+ref);
  document.getElementById('formel-celle-id').textContent = ref;
  document.getElementById('formel-innhold').textContent = el ? el.value : '';
}

function celleTab(e, ref, oppgId) {
  if (e.key === 'Tab' || e.key === 'Enter') {
    e.preventDefault();
    celleEndret(ref, oppgId);
    // Finn neste inputcelle
    var o = EXCEL_OPPGAVER.find(function(x){return x.id===oppgId;});
    if (!o || !o.inputCeller) return;
    var idx = o.inputCeller.indexOf(ref);
    var neste = o.inputCeller[idx+1];
    if (neste) {
      var el = document.getElementById('celle-'+neste);
      if (el) el.focus();
    }
  }
}

// ── SJEKK SVAR ────────────────────────────────────────────────────
function sjekkSvar() {
  var id = state.gjeldende;
  var o = EXCEL_OPPGAVER.find(function(x){return x.id===id;});
  if (!o) return;
  var data = state.data[id];
  var fasit = o.fasit(data);

  // Finn hvilke celler som sjekkes
  var sjekkC = o.sjekkCeller || o.inputCeller || [];

  var riktige = 0, totalt = sjekkC.length;
  var detaljer = [];

  sjekkC.forEach(function(ref) {
    if (fasit[ref] === undefined) { totalt--; return; }
    var evalV = evaluerCelle(ref, id);
    var tol = (o.tol && o.tol[ref] !== undefined) ? o.tol[ref] : 0.5;
    var ok = evalV !== null && Math.abs(evalV - fasit[ref]) <= Math.max(tol, Math.abs(fasit[ref])*0.02);
    if (ok) riktige++;
    var el = document.getElementById('celle-'+ref);
    if (el) el.className = ok ? 'riktig' : 'galt';
    detaljer.push({ref:ref, evalV:evalV, fasit:fasit[ref], ok:ok});
  });

  // Fargellegg alle inputceller
  (o.inputCeller||[]).forEach(function(ref) {
    if (sjekkC.indexOf(ref) >= 0) return; // allerede håndtert
    var evalV = evaluerCelle(ref, id);
    if (fasit[ref]!==undefined && evalV!==null) {
      var tol = (o.tol&&o.tol[ref]!==undefined)?o.tol[ref]:0.5;
      var ok2 = Math.abs(evalV-fasit[ref])<=Math.max(tol,Math.abs(fasit[ref])*0.02);
      var el2 = document.getElementById('celle-'+ref);
      if (el2) el2.className = ok2?'riktig':'galt';
    }
  });

  var poeng = totalt > 0 ? Math.round(riktige/totalt * o.maxPoeng) : 0;
  var status = riktige===totalt ? 'riktig' : riktige > 0 ? 'delvis' : 'feil';

  state.svar[id] = { poeng:poeng, maxPoeng:o.maxPoeng, status:status };

  // Lagre
  var fp = lastFremgang();
  fp.excel_svar = state.svar;
  lagreFremgang(fp);

  // Vis tilbakemelding
  var fb = document.getElementById('fb');
  var melding = '';
  if (status === 'riktig') {
    melding = '✓ Alle celler riktige! ' + poeng + ' / ' + o.maxPoeng + ' poeng.';
  } else if (status === 'delvis') {
    melding = riktige + ' av ' + totalt + ' celler riktige. ' + poeng + ' / ' + o.maxPoeng + ' poeng.';
    // Vis hvilke som er gale
    var feilInfo = detaljer.filter(function(d){return !d.ok;}).map(function(d){
      var fikkStr = d.evalV !== null ? formaterTall(d.evalV) : '(tom eller ugyldig formel)';
      return d.ref + ': fikk ' + fikkStr + ', fasit: ' + formaterTall(d.fasit);
    }).join('\n');
    if (feilInfo) melding += '\n' + feilInfo;
  } else {
    melding = 'Ingen riktige ennå. Se hint til høyre og prøv igjen.';
  }
  fb.className = 'fb ' + status;
  fb.textContent = melding;

  // Vis fasit-boks
  fb.insertAdjacentHTML('afterend', lagFasitBoks(o));

  // Sjekk flervalg
  if (o.flervalg) {
    var fvValgt = flervalgValg[o.id];
    var fvOk = fvValgt === o.flervalg.riktigIdx;
    if (fvOk) poeng++;
    // maxPoeng er allerede inkludert i o.maxPoeng
    // Oppdater visning - vis begrunnelse for alle alternativer
    var fvContainer = document.getElementById('fv-'+id);
    if (fvContainer) {
      var knapper = fvContainer.querySelectorAll('.fv-alt');
      knapper.forEach(function(btn, i) {
        var alt = o.flervalg.alternativer[i];
        btn.className = 'fv-alt' + (alt.riktig?' fv-riktig':(i===fvValgt?' fv-galt':''));
        btn.disabled = true;
        var begrEl = btn.querySelector('.fv-begr');
        if (begrEl) begrEl.remove();
        if (alt.riktig || i===fvValgt) {
          var begr = document.createElement('div');
          begr.className = 'fv-begr';
          begr.textContent = alt.begrunnelse;
          btn.appendChild(begr);
        }
      });
    }
    // Oppdater state
    if (state.svar[id]) state.svar[id].poeng = poeng;
  }

  document.getElementById('sjekk-btn').disabled = true;
  document.getElementById('neste-btn').style.display = 'block';

  oppdaterStats();
  byggSidebar();
}

function lagFasitBoks(o) {
  if (!o.fasitFormel) return '';
  var data = state.data[o.id];
  var fasitVerdier = data ? o.fasit(data) : {};
  var linjer = Object.keys(o.fasitFormel).map(function(k){return [k, o.fasitFormel[k]];});
  var html = '<div class="fasit-boks vis"><div class="fasit-tittel">📖 Fasit — formel og tallverdi</div>';
  linjer.forEach(function(kv) {
    var ref = kv[0], formel = kv[1];
    var tallverdi = fasitVerdier[ref] !== undefined ? formaterTall(fasitVerdier[ref]) : '';
    html += '<div class="fasit-formel" style="margin-bottom:6px;display:flex;align-items:baseline;gap:8px">'
      + '<span style="color:var(--gold);min-width:36px">'+ref+'</span>'
      + '<span style="color:var(--accent2)">'+formel+'</span>'
      + (tallverdi ? '<span style="color:var(--dim);font-size:.78rem;margin-left:auto">→ '+tallverdi+'</span>' : '')
      + '</div>';
  });
  if (o.forklaringFasit) html += '<div style="font-size:.83rem;color:var(--dim);margin-top:8px;line-height:1.5">'+o.forklaringFasit+'</div>';
  return html + '</div>';
}

// ── NAVIGASJON ────────────────────────────────────────────────────
function nesteOppgave() {
  var idx = EXCEL_OPPGAVER.findIndex(function(x){return x.id===state.gjeldende;});
  if (idx < EXCEL_OPPGAVER.length-1) {
    visOppgave(EXCEL_OPPGAVER[idx+1].id);
  } else {
    visResultat();
  }
}


// ── FLERVALG-TILSTAND ─────────────────────────────────────────────
var flervalgValg = {};

function lagFlervalgHTML(o, låst) {
  if (!o.flervalg) return '';
  var fv = o.flervalg;
  var valgt = flervalgValg[o.id];
  var html = '<div class="fv-seksjon" id="fv-'+o.id+'">'
    + '<div class="fv-tittel">'+fv.spørsmål+'</div>'
    + '<div class="fv-grid">';
  fv.alternativer.forEach(function(alt, i) {
    var klasse = 'fv-alt';
    if (låst) {
      klasse += alt.riktig ? ' fv-riktig' : (i === valgt ? ' fv-galt' : '');
    } else if (i === valgt) {
      klasse += ' fv-valgt';
    }
    var begrInfo = (låst || i === valgt) ? '<div class="fv-begr">' + alt.begrunnelse + '</div>' : '';
    html += '<button class="'+klasse+'" data-oppg="'+o.id+'" data-idx="'+i+'" '+(låst?'disabled':'')+' onclick="velgFlervalg(this.dataset.oppg,+this.dataset.idx)">';
      + '<span class="fv-tekst">'+alt.tekst+'</span>'
      + begrInfo
      + '</button>';
  });
  return html + '</div></div>';
}

function velgFlervalg(oppgId, idx) {
  flervalgValg[oppgId] = idx;
  var o = EXCEL_OPPGAVER.find(function(x){return x.id===oppgId;});
  if (!o || !o.flervalg) return;
  // Oppdater knapper
  var fv = o.flervalg;
  var container = document.getElementById('fv-'+oppgId);
  if (!container) return;
  var knapper = container.querySelectorAll('.fv-alt');
  knapper.forEach(function(btn, i) {
    btn.className = 'fv-alt' + (i===idx?' fv-valgt':'');
    // Vis begrunnelse for valgt alternativ
    var begrEl = btn.querySelector('.fv-begr');
    if (begrEl) {
      begrEl.remove();
    }
    if (i===idx) {
      var begr = document.createElement('div');
      begr.className = 'fv-begr';
      begr.textContent = fv.alternativer[i].begrunnelse;
      btn.appendChild(begr);
    }
  });
}
function nullstillOppgave() {
  var id = state.gjeldende;
  state.celleVerdier[id] = {};
  delete state.svar[id];
  delete state.data[id];
  delete flervalgValg[id];
  var oNull = EXCEL_OPPGAVER.find(function(x){return x.id===id;});
  if (oNull && oNull._start) { delete oNull._start; delete oNull._rente; }
  var fp = lastFremgang();
  fp.excel_svar = state.svar;
  lagreFremgang(fp);
  visOppgave(id);
}

function nyRunde() {
  state.svar = {};
  state.celleVerdier = {};
  state.data = {};
  var fp = lastFremgang();
  fp.excel_svar = {};
  lagreFremgang(fp);
  document.getElementById('resultat').style.display = 'none';
  document.getElementById('app').style.display = 'grid';
  document.getElementById('prog-wrap').style.display = 'flex';
  byggSidebar();
  visOppgave(EXCEL_OPPGAVER[0].id);
}

// ── HINT-PANEL ────────────────────────────────────────────────────
var hintSynlig = false;

function toggleHint() {
  hintSynlig = !hintSynlig;
  var innhold = document.getElementById('hint-innhold');
  var knapp = document.getElementById('hint-knapp');
  innhold.className = hintSynlig ? 'hint-synlig' : 'hint-skjult';
  knapp.className = hintSynlig ? 'aktiv' : '';
}

function visHint(o) {
  hintSynlig = false;
  var knapp = document.getElementById('hint-knapp');
  var innhold = document.getElementById('hint-innhold');
  if (knapp) knapp.className = '';
  if (!innhold) return;
  innhold.className = 'hint-skjult';
  // Nullstill svar-display
  var sd = document.getElementById('svar-display');
  if (sd) sd.className = 'svar-display-skjult';

  var html = '<div class="hint-tittel" style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:10px">Slik gjør du det i Excel</div>';

  if (o.hint) {
    o.hint.forEach(function(h, i) {
      var erFormel = h.match(/^[A-Z][0-9]+:/);
      html += '<div class="hint-steg">'
        + '<div class="hint-nr">'+(i+1)+'</div>'
        + '<div class="hint-tekst'+(erFormel?' formel':'')+'">'+h+'</div>'
        + '</div>';
    });
  }

  html += '<div class="excel-info" style="margin-top:20px">'
    + '<div class="excel-info-tittel">📌 Excel-tips</div>'
    + '<div class="excel-info-tekst">'
    + 'Formler starter alltid med <code>=</code><br>'
    + 'Celleområde: <code>B2:B11</code><br>'
    + 'Absolutt ref: <code>$B$2</code><br>'
    + 'Potens: <code>A2^2</code> = A2²<br>'
    + 'Norsk decimal: <code>1,04</code>'
    + '</div></div>';

  innhold.innerHTML = html;
}

// ── STATISTIKK ────────────────────────────────────────────────────
function oppdaterStats() {
  var totPoeng = 0, totMax = 0, fullfort = 0;
  var statPoeng = 0, statMax = 0, okPoeng = 0, okMax = 0;
  EXCEL_OPPGAVER.forEach(function(o) {
    totMax += o.maxPoeng;
    if (o.gruppe==='Statistikk') statMax += o.maxPoeng;
    else okMax += o.maxPoeng;
    var sv = state.svar[o.id];
    if (sv) {
      totPoeng += sv.poeng;
      fullfort++;
      if (o.gruppe==='Statistikk') statPoeng += sv.poeng;
      else okPoeng += sv.poeng;
    }
  });
  document.getElementById('st-poeng').textContent = totPoeng;
  document.getElementById('st-fullfort').textContent = fullfort;
  document.getElementById('res-score').textContent = totPoeng+' / '+totMax;
  document.getElementById('res-stat').textContent = statPoeng+'/'+statMax;
  document.getElementById('res-ok').textContent = okPoeng+'/'+okMax;
  document.getElementById('res-pst').textContent = totMax>0 ? Math.round(totPoeng/totMax*100)+'%' : '0%';
}

function oppdaterProgress(o) {
  var idx = EXCEL_OPPGAVER.findIndex(function(x){return x.id===o.id;});
  var fullfort = Object.keys(state.svar).length;
  var pst = Math.round(fullfort/EXCEL_OPPGAVER.length*100);
  document.getElementById('prog-tekst').textContent = 'Oppgave '+(idx+1)+' av '+EXCEL_OPPGAVER.length;
  document.getElementById('prog-fill').style.width = pst+'%';
}

function visResultat() {
  oppdaterStats();
  document.getElementById('app').style.display = 'none';
  document.getElementById('prog-wrap').style.display = 'none';
  document.getElementById('resultat').style.display = 'block';
}

</script>
