<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Lærerpålogging</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#0f1117;color:#e2e8f0;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:16px;
}
.kort{
  background:#1a1f2e;border:1px solid #2d3748;
  border-radius:16px;padding:32px 28px;
  width:100%;max-width:390px;
}
.logo{font-size:1.4rem;font-weight:700;color:#60a5fa;margin-bottom:4px}
.undertittel{font-size:.82rem;color:#64748b;margin-bottom:24px}
.faner{display:flex;margin-bottom:24px;border-bottom:2px solid #2d3748}
.fane{
  flex:1;padding:10px;text-align:center;font-size:.85rem;
  cursor:pointer;color:#64748b;border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:color .15s,border-color .15s;
}
.fane.aktiv{color:#60a5fa;border-bottom-color:#60a5fa;font-weight:600}
.panel{display:none}
.panel.aktiv{display:block}
.felt{margin-bottom:14px}
.felt label{display:block;font-size:.78rem;color:#94a3b8;margin-bottom:5px;font-weight:500}
.felt input{
  width:100%;padding:10px 12px;border-radius:9px;
  border:1px solid #2d3748;background:#0f1117;
  color:#e2e8f0;font-size:.88rem;outline:none;
  transition:border-color .15s;
}
.felt input:focus{border-color:#60a5fa}
.btn{
  width:100%;padding:11px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;
  font-family:inherit;margin-top:4px;transition:opacity .15s;
}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.gron{background:linear-gradient(135deg,#10b981,#059669)}
.melding{font-size:.82rem;min-height:20px;margin-top:10px;line-height:1.5}
.melding.feil{color:#f87171}
.melding.ok{color:#34d399}
.laster{display:none;text-align:center;color:#64748b;font-size:.82rem;margin-top:8px}
.elev-link{margin-top:20px;text-align:center;font-size:.8rem;color:#64748b}
.elev-link a{color:#60a5fa;text-decoration:none}
</style>
</head>
<body>
<div class="kort">
  <div class="logo">&#x1F9EA; SkapLab</div>
  <div class="undertittel">Lærerportal – pålogging</div>

  <div class="faner">
    <div class="fane aktiv" id="fane-inn" onclick="byttFane('inn')">Logg inn</div>
    <div class="fane" id="fane-reg" onclick="byttFane('reg')">Ny konto</div>
  </div>

  <!-- INNLOGGING -->
  <div class="panel aktiv" id="panel-inn">
    <div class="felt">
      <label>E-post</label>
      <input type="email" id="inn-epost" placeholder="laerer@skole.no" autocomplete="username"
        onkeydown="if(event.key==='Enter')loggInn()">
    </div>
    <div class="felt">
      <label>Passord</label>
      <input type="password" id="inn-passord" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')loggInn()">
    </div>
    <button class="btn" id="inn-btn" onclick="loggInn()">Logg inn</button>
    <div class="laster" id="inn-laster">Logger inn…</div>
    <div class="melding feil" id="inn-melding"></div>
  </div>

  <!-- REGISTRERING -->
  <div class="panel" id="panel-reg">
    <div class="felt">
      <label>Fullt navn</label>
      <input type="text" id="reg-navn" placeholder="Fornavn Etternavn" autocomplete="name">
    </div>
    <div class="felt">
      <label>E-post</label>
      <input type="email" id="reg-epost" placeholder="laerer@skole.no" autocomplete="username">
    </div>
    <div class="felt">
      <label>Passord (minst 6 tegn)</label>
      <input type="password" id="reg-passord" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="felt">
      <label>Bekreft passord</label>
      <input type="password" id="reg-passord2" placeholder="Gjenta passord" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')registrer()">
    </div>
    <button class="btn gron" id="reg-btn" onclick="registrer()">Opprett konto</button>
    <div class="laster" id="reg-laster">Oppretter konto…</div>
    <div class="melding" id="reg-melding"></div>
  </div>

  <div class="elev-link">Er du elev? <a href="elev_login.html">Gå til elevpålogging &#8594;</a></div>
</div>

<script>
var SURL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
var SKEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
var LNOKKEL = 'skaplab_laerer_v2';

// Sjekk om allerede innlogget
(function() {
  try {
    var d = localStorage.getItem(LNOKKEL);
    if (!d) return;
    var p = JSON.parse(d);
    if (p && p.access_token && !p.error && !p.error_code) {
      location.href = 'laerer_app.html';
    }
  } catch(e) {}
})();

function byttFane(id) {
  ['inn','reg'].forEach(function(x) {
    document.getElementById('fane-'+x).classList.toggle('aktiv', x===id);
    document.getElementById('panel-'+x).classList.toggle('aktiv', x===id);
  });
}

async function loggInn() {
  var epost   = (document.getElementById('inn-epost').value || '').trim();
  var passord = document.getElementById('inn-passord').value;
  var meld    = document.getElementById('inn-melding');
  var btn     = document.getElementById('inn-btn');
  var laster  = document.getElementById('inn-laster');

  meld.textContent = '';
  if (!epost || !passord) { meld.textContent = 'Fyll inn e-post og passord.'; return; }

  btn.disabled = true; laster.style.display = 'block';

  try {
    var resp = await fetch(SURL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SKEY },
      body: JSON.stringify({ email: epost, password: passord })
    });
    var data = await resp.json();

    if (!data.access_token || data.error || data.error_code) {
      var feil = data.error_description || data.msg || data.error || 'Feil e-post eller passord.';
      if (feil.toLowerCase().indexOf('invalid') >= 0 || feil.toLowerCase().indexOf('credentials') >= 0) {
        feil = 'Feil e-post eller passord.';
      } else if (feil.toLowerCase().indexOf('email') >= 0 && feil.toLowerCase().indexOf('confirm') >= 0) {
        feil = 'E-postadressen er ikke bekreftet ennå. Sjekk innboksen din.';
      }
      meld.textContent = feil;
      btn.disabled = false; laster.style.display = 'none';
      return;
    }

    // Hent laerer-rad
    var laererNavn = epost.split('@')[0];
    var laererId = null;
    try {
      var r2 = await fetch(SURL + '/rest/v1/laerere?select=id,fullt_navn,epost&limit=1', {
        headers: { 'apikey': SKEY, 'Authorization': 'Bearer ' + data.access_token }
      });
      var laerere = await r2.json();
      if (Array.isArray(laerere) && laerere.length > 0) {
        laererId = laerere[0].id;
        laererNavn = laerere[0].fullt_navn || laererNavn;
      }
    } catch(e2) {}

    var sesjon = Object.assign({}, data);
    sesjon.fullt_navn = laererNavn;
    sesjon.epost = epost;
    if (laererId) sesjon.laerer_id = laererId;
    localStorage.setItem(LNOKKEL, JSON.stringify(sesjon));
    location.href = 'laerer_app.html';

  } catch(e) {
    meld.textContent = 'Nettverksfeil: ' + e.message;
    btn.disabled = false; laster.style.display = 'none';
  }
}

async function registrer() {
  var navn   = (document.getElementById('reg-navn').value || '').trim();
  var epost  = (document.getElementById('reg-epost').value || '').trim();
  var pass1  = document.getElementById('reg-passord').value;
  var pass2  = document.getElementById('reg-passord2').value;
  var meld   = document.getElementById('reg-melding');
  var btn    = document.getElementById('reg-btn');
  var laster = document.getElementById('reg-laster');

  meld.className = 'melding';
  meld.textContent = '';

  if (!navn)  { meld.textContent = 'Skriv inn fullt navn.'; return; }
  if (!epost || epost.indexOf('@') < 0) { meld.textContent = 'Ugyldig e-postadresse.'; return; }
  if (pass1.length < 6) { meld.textContent = 'Passordet må ha minst 6 tegn.'; return; }
  if (pass1 !== pass2)  { meld.textContent = 'Passordene stemmer ikke overens.'; return; }

  btn.disabled = true; laster.style.display = 'block';

  try {
    // Steg 1: Opprett Supabase Auth-bruker
    var r1 = await fetch(SURL + '/auth/v1/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SKEY },
      body: JSON.stringify({ email: epost, password: pass1, data: { fullt_navn: navn } })
    });
    var d1 = await r1.json();

    // Detekter feil
    if (d1.error || d1.error_code || d1.msg) {
      var feilTekst = d1.error_description || d1.msg || d1.message || d1.error || 'Registrering feilet';
      var feilLow = feilTekst.toLowerCase();
      if (feilLow.indexOf('already') >= 0) {
        feilTekst = 'Denne e-postadressen er allerede registrert. Prøv å logge inn i stedet.';
      } else if (feilLow.indexOf('invalid email') >= 0) {
        feilTekst = 'Ugyldig e-postadresse.';
      } else if (feilLow.indexOf('password') >= 0) {
        feilTekst = 'Passordet oppfyller ikke kravene (minst 6 tegn, ingen mellomrom).';
      } else if (feilLow.indexOf('signup') >= 0 && feilLow.indexOf('disabled') >= 0) {
        feilTekst = 'Ny brukerregistrering er for øyeblikket deaktivert. Kontakt administrator.';
      }
      meld.className = 'melding feil';
      meld.textContent = feilTekst;
      btn.disabled = false; laster.style.display = 'none';
      return;
    }

    // Sjekk om vi fikk access_token (e-postbekreftelse AV) eller bare user (bekreftelse PÅ)
    var userId = (d1.user && d1.user.id) ? d1.user.id : d1.id;
    var accessToken = d1.access_token || null;

    if (!userId && !accessToken) {
      // Supabase v2 med e-postbekreftelse returnerer tomt user-objekt
      meld.className = 'melding ok';
      meld.textContent = '✅ Konto opprettet! Sjekk e-posten til ' + epost + ' og klikk bekreftelseslenken.';
      btn.disabled = false; laster.style.display = 'none';
      return;
    }

    // Steg 2: Opprett laerer-rad
    var authHeader = accessToken ? ('Bearer ' + accessToken) : ('Bearer ' + SKEY);
    try {
      var r2 = await fetch(SURL + '/rest/v1/laerere', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SKEY,
          'Authorization': authHeader,
          'Prefer': 'return=representation'
        },
        body: JSON.stringify({ fullt_navn: navn, epost: epost })
      });
    } catch(e2) {
      // Laerer-rad feilet, men Auth-bruker er opprettet — OK
    }

    if (accessToken) {
      // Logg inn direkte
      var laererId = null;
      try {
        var laererResp = await fetch(SURL + '/rest/v1/laerere?select=id&limit=1', {
          headers: { 'apikey': SKEY, 'Authorization': 'Bearer ' + accessToken }
        });
        var laererData = await laererResp.json();
        if (Array.isArray(laererData) && laererData.length > 0) laererId = laererData[0].id;
      } catch(e3) {}

      var sesjon = Object.assign({}, d1);
      sesjon.fullt_navn = navn;
      sesjon.epost = epost;
      if (laererId) sesjon.laerer_id = laererId;
      localStorage.setItem(LNOKKEL, JSON.stringify(sesjon));

      meld.className = 'melding ok';
      meld.textContent = '✅ Konto opprettet! Videresender…';
      setTimeout(function() { location.href = 'laerer_app.html'; }, 1200);
    } else {
      // E-postbekreftelse er aktivert i Supabase
      meld.className = 'melding ok';
      meld.textContent = '✅ Konto opprettet! Sjekk e-posten til ' + epost + ' og klikk bekreftelseslenken for å aktivere kontoen.';
    }

    btn.disabled = false; laster.style.display = 'none';

  } catch(e) {
    meld.className = 'melding feil';
    meld.textContent = 'Nettverksfeil: ' + e.message;
    btn.disabled = false; laster.style.display = 'none';
  }
}
</script>
</body>
</html>
