<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Logg inn</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="core/design.css">
<style>
  .login-fane-rad {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .login-fane-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--dim);
    font-family: var(--font-h);
    font-size: .85rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: -1px;
    transition: all .15s;
  }
  .login-fane-btn.ak {
    color: var(--bla);
    border-bottom-color: var(--bla);
  }
  .login-fane-innhold { display: none; }
  .login-fane-innhold.ak { display: block; }

  .skole-ny-knapp {
    font-size: .75rem;
    color: var(--bla);
    background: none;
    border: none;
    padding: 2px 0;
    cursor: pointer;
    text-align: left;
    margin-top: 4px;
  }
  .skole-ny-knapp:hover { text-decoration: underline; }

  .spinner-knapp {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-boks">
    <div class="login-logo">Skap<span>Lab</span></div>
    <div class="login-sub">Lærerportal</div>

    <div class="login-fane-rad">
      <button class="login-fane-btn ak" data-fane="logginn">Logg inn</button>
      <button class="login-fane-btn"    data-fane="nykonto">Ny konto</button>
    </div>

    <!-- ── LOGG INN ── -->
    <div class="login-fane-innhold ak" id="fane-logginn">
      <div class="login-feil" id="feil-logginn"></div>
      <div class="felt">
        <label class="felt-lbl" for="li-epost">E-post</label>
        <input type="email" id="li-epost" placeholder="din@epost.no" autocomplete="email">
      </div>
      <div class="felt">
        <label class="felt-lbl" for="li-passord">Passord</label>
        <input type="password" id="li-passord" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-prim" id="li-btn" style="width:100%;margin-top:8px">
        <span>Logg inn</span>
        <div class="spinner-knapp" id="li-spinner"></div>
      </button>
    </div>

    <!-- ── NY KONTO ── -->
    <div class="login-fane-innhold" id="fane-nykonto">
      <div class="login-feil" id="feil-nykonto"></div>
      <div class="felt">
        <label class="felt-lbl" for="nk-navn">Fullt navn</label>
        <input type="text" id="nk-navn" placeholder="Ola Nordmann" autocomplete="name">
      </div>
      <div class="felt">
        <label class="felt-lbl" for="nk-epost">E-post</label>
        <input type="email" id="nk-epost" placeholder="din@skole.no" autocomplete="email">
      </div>
      <div class="felt">
        <label class="felt-lbl" for="nk-passord">Passord</label>
        <input type="password" id="nk-passord" placeholder="Minst 8 tegn" autocomplete="new-password">
      </div>
      <div class="felt">
        <label class="felt-lbl" for="nk-skole">Skole</label>
        <select id="nk-skole">
          <option value="">Laster skoler…</option>
        </select>
        <button class="skole-ny-knapp" id="vis-ny-skole-btn">+ Legg til ny skole</button>
      </div>

      <!-- Ny skole (skjult som standard) -->
      <div id="ny-skole-seksjon" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px">
        <div style="font-size:.75rem;font-weight:700;color:var(--dim);margin-bottom:8px;font-family:var(--font-h)">NY SKOLE</div>
        <div class="felt" style="margin-bottom:8px">
          <input type="text" id="ny-skole-navn" placeholder="Skolenavn">
        </div>
        <div class="rad">
          <div class="felt">
            <input type="text" id="ny-skole-kommune" placeholder="Kommune">
          </div>
          <div class="felt">
            <input type="text" id="ny-skole-fylke" placeholder="Fylke">
          </div>
        </div>
        <button class="btn btn-gron btn-sm" id="lagre-ny-skole-btn">Lagre skole</button>
      </div>

      <button class="btn btn-prim" id="nk-btn" style="width:100%;margin-top:8px">
        <span>Opprett konto</span>
        <div class="spinner-knapp" id="nk-spinner"></div>
      </button>
    </div>

  </div><!-- /login-boks -->
</div><!-- /login-wrap -->

<div id="snack-kontainer"></div>

<!-- Config -->
<script>
  window.SKAPLAB_CONFIG = {
    url: 'https://cqzmzsqhuawpsvnjjzse.supabase.co',
    key: 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j',
  };
</script>
<script src="core/auth.js"></script>
<script src="core/api.js"></script>
<script>
'use strict';

/* ── Redirect om allerede innlogget ─────────────────────── */
if (Auth.laerer.erInnlogget()) {
  location.replace('laerer_app.html');
}

/* ── Snack ───────────────────────────────────────────────── */
function snack(tekst, type = 'ok') {
  const kont = document.getElementById('snack-kontainer');
  const div = document.createElement('div');
  div.className = `snack snack-${type}`;
  div.textContent = tekst;
  kont.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity .3s'; setTimeout(() => div.remove(), 320); }, 3500);
}

/* ── Fane-navigasjon ─────────────────────────────────────── */
document.querySelectorAll('.login-fane-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.login-fane-btn').forEach(b => b.classList.remove('ak'));
    document.querySelectorAll('.login-fane-innhold').forEach(f => f.classList.remove('ak'));
    btn.classList.add('ak');
    document.getElementById(`fane-${btn.dataset.fane}`).classList.add('ak');
    document.querySelectorAll('.login-feil').forEach(f => { f.textContent = ''; f.classList.remove('vis'); });
  });
});

/* ── Enter-tast ──────────────────────────────────────────── */
['li-epost', 'li-passord'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') loggInn(); })
);
['nk-navn', 'nk-epost', 'nk-passord'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') opprettKonto(); })
);

/* ── Vis/skjul feil ──────────────────────────────────────── */
function visFeil(id, tekst) {
  const el = document.getElementById(id);
  el.textContent = tekst;
  el.classList.add('vis');
}

/* ── Spinner ─────────────────────────────────────────────── */
function settLaster(btnId, spinnerId, ja) {
  const btn = document.getElementById(btnId);
  const sp  = document.getElementById(spinnerId);
  btn.disabled = ja;
  sp.style.display = ja ? 'block' : 'none';
}

/* ── LOGG INN ────────────────────────────────────────────── */
async function loggInn() {
  const feilEl = document.getElementById('feil-logginn');
  feilEl.classList.remove('vis');
  const epost   = document.getElementById('li-epost').value.trim();
  const passord = document.getElementById('li-passord').value;

  if (!epost || !passord) { visFeil('feil-logginn', 'Fyll inn e-post og passord.'); return; }

  settLaster('li-btn', 'li-spinner', true);
  try {
    await Auth.laerer.loggInn(epost, passord);
    location.replace('laerer_app.html');
  } catch (err) {
    visFeil('feil-logginn', err.message || 'Innlogging feilet. Sjekk e-post og passord.');
    settLaster('li-btn', 'li-spinner', false);
  }
}

document.getElementById('li-btn').addEventListener('click', loggInn);

/* ── Last skoler ─────────────────────────────────────────── */
async function lastSkoler(velgId) {
  try {
    const data = await Api.skoler.hentAlle();
    const sel = document.getElementById('nk-skole');
    sel.innerHTML = '<option value="">Velg skole…</option>';
    (data || []).forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = `${s.navn} (${s.kommune})`;
      if (s.id === velgId) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch {
    snack('Kunne ikke laste skoler.', 'warn');
  }
}

lastSkoler();

/* ── Ny skole ────────────────────────────────────────────── */
document.getElementById('vis-ny-skole-btn').addEventListener('click', () => {
  const sek = document.getElementById('ny-skole-seksjon');
  sek.style.display = sek.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('lagre-ny-skole-btn').addEventListener('click', async () => {
  const navn     = document.getElementById('ny-skole-navn').value.trim();
  const kommune  = document.getElementById('ny-skole-kommune').value.trim();
  const fylke    = document.getElementById('ny-skole-fylke').value.trim();

  if (!navn || !kommune) { snack('Fyll inn skolenavn og kommune.', 'warn'); return; }

  try {
    const ny = await Api.skoler.opprett({ navn, kommune, fylke, aktiv: true });
    snack(`Skolen «${navn}» er opprettet.`);
    document.getElementById('ny-skole-seksjon').style.display = 'none';
    await lastSkoler(ny?.[0]?.id);
  } catch (err) {
    snack(err.message || 'Kunne ikke opprette skole.', 'err');
  }
});

/* ── OPPRETT KONTO ───────────────────────────────────────── */
async function opprettKonto() {
  document.getElementById('feil-nykonto').classList.remove('vis');

  const navn   = document.getElementById('nk-navn').value.trim();
  const epost  = document.getElementById('nk-epost').value.trim();
  const passord = document.getElementById('nk-passord').value;
  const skoleId = document.getElementById('nk-skole').value;

  if (!navn)    { visFeil('feil-nykonto', 'Fyll inn fullt navn.'); return; }
  if (!epost)   { visFeil('feil-nykonto', 'Fyll inn e-post.'); return; }
  if (passord.length < 8) { visFeil('feil-nykonto', 'Passordet må være minst 8 tegn.'); return; }
  if (!skoleId) { visFeil('feil-nykonto', 'Velg eller opprett en skole.'); return; }

  settLaster('nk-btn', 'nk-spinner', true);
  try {
    await Auth.laerer.registrer(epost, passord, navn, skoleId);
    snack('Konto opprettet! Du kan nå logge inn.');
    // Bytt til logg-inn-fanen
    document.querySelector('[data-fane="logginn"]').click();
    document.getElementById('li-epost').value = epost;
  } catch (err) {
    visFeil('feil-nykonto', err.message || 'Registrering feilet.');
    settLaster('nk-btn', 'nk-spinner', false);
  }
}

document.getElementById('nk-btn').addEventListener('click', opprettKonto);
</script>
</body>
</html>
