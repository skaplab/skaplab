<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Lærerpålogging</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bla:#60a5fa;--gron:#34d399;--rod:#f87171;--lilla:#a78bfa;--bg:#0f1117;--card:#1a1f2e;--border:#2d3748;--dim:#64748b;--text:#e2e8f0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.kort{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:400px}
.logo{font-size:1.4rem;font-weight:700;color:var(--bla);margin-bottom:4px}
.sub{font-size:.82rem;color:var(--dim);margin-bottom:24px}
.tabs{display:flex;margin-bottom:24px;border-bottom:2px solid var(--border)}
.tab-btn{flex:1;padding:10px;text-align:center;font-size:.85rem;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab-btn.ak{color:var(--bla);border-bottom-color:var(--bla);font-weight:600}
.panel{display:none}.panel.ak{display:block}
.felt{margin-bottom:14px}
.felt label{display:block;font-size:.78rem;color:#94a3b8;margin-bottom:5px;font-weight:500}
.felt input,.felt select{width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.88rem;outline:none;transition:border-color .15s;font-family:inherit}
.felt input:focus,.felt select:focus{border-color:var(--bla)}
.felt select option{background:var(--card)}
.skole-rad{display:flex;gap:8px;align-items:flex-end}
.skole-felt{flex:1}
.btn-ny{padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-size:.78rem;cursor:pointer;white-space:nowrap;font-family:inherit;height:42px}
.btn-ny:hover{border-color:var(--bla);color:var(--bla)}
.ny-panel{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:14px;margin-top:8px;display:none}
.ny-tittel{font-size:.78rem;font-weight:600;color:var(--lilla);margin-bottom:10px}
.btn{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.gron{background:linear-gradient(135deg,#10b981,#059669)}
.btn.liten{padding:8px 14px;font-size:.8rem;width:auto;margin-top:8px}
.melding{font-size:.82rem;min-height:18px;margin-top:10px;line-height:1.5}
.feil{color:var(--rod)}.ok{color:var(--gron)}
.laster{display:none;text-align:center;color:var(--dim);font-size:.82rem;margin-top:8px}
.elev-link{margin-top:20px;text-align:center;font-size:.8rem;color:var(--dim)}
.elev-link a{color:var(--bla);text-decoration:none}
</style>
</head>
<body>
<div class="kort">
  <div class="logo">&#x1F9EA; SkapLab</div>
  <div class="sub">Lærerportal</div>
  <div class="tabs">
    <button class="tab-btn ak" id="tab-inn" onclick="byttPanel('inn')">Logg inn</button>
    <button class="tab-btn" id="tab-reg" onclick="byttPanel('reg')">Ny konto</button>
  </div>
  <div class="panel ak" id="panel-inn">
    <div class="felt"><label>E-post</label><input type="email" id="inn-epost" placeholder="laerer@skole.no" autocomplete="username" onkeydown="if(event.key==='Enter')loggInn()"></div>
    <div class="felt"><label>Passord</label><input type="password" id="inn-passord" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')loggInn()"></div>
    <button class="btn" id="inn-btn" onclick="loggInn()">Logg inn</button>
    <div class="laster" id="inn-laster">Logger inn…</div>
    <div class="melding feil" id="inn-melding"></div>
  </div>
  <div class="panel" id="panel-reg">
    <div class="felt"><label>Fullt navn</label><input type="text" id="reg-navn" placeholder="Fornavn Etternavn" autocomplete="name"></div>
    <div class="felt"><label>E-post</label><input type="email" id="reg-epost" placeholder="laerer@skole.no" autocomplete="username"></div>
    <div class="felt">
      <label>Skole</label>
      <div class="skole-rad">
        <div class="skole-felt"><select id="reg-skole"><option value="">Laster skoler…</option></select></div>
        <button class="btn-ny" id="ny-skole-btn" onclick="toggleNySkole()">+ Ny</button>
      </div>
    </div>
    <div class="ny-panel" id="ny-skole-panel">
      <div class="ny-tittel">Legg til ny skole</div>
      <div class="felt"><label>Skolenavn</label><input type="text" id="ny-skole-navn" placeholder="f.eks. Bjørneby ungdomsskole"></div>
      <div class="felt"><label>Kommune (valgfritt)</label><input type="text" id="ny-skole-kommune" placeholder="f.eks. Oslo"></div>
      <button class="btn liten gron" id="ny-skole-opprett" onclick="opprettSkole()">Opprett skole</button>
      <div class="melding" id="ny-skole-melding"></div>
    </div>
    <div class="felt" style="margin-top:12px"><label>Passord (minst 8 tegn)</label><input type="password" id="reg-passord" placeholder="••••••••" autocomplete="new-password"></div>
    <div class="felt"><label>Bekreft passord</label><input type="password" id="reg-passord2" placeholder="Gjenta passord" autocomplete="new-password" onkeydown="if(event.key==='Enter')registrer()"></div>
    <button class="btn gron" id="reg-btn" onclick="registrer()">Opprett konto</button>
    <div class="laster" id="reg-laster">Oppretter konto…</div>
    <div class="melding" id="reg-melding"></div>
  </div>
  <div class="elev-link">Er du elev? <a href="elev_login.html">Gå til elevpålogging &#8594;</a></div>
</div>
<script>
var SURL='https://cqzmzsqhuawpsvnjjzse.supabase.co';
var SKEY='sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
var LNOKKEL='skaplab_laerer_v2';
(function(){
  try{var d=localStorage.getItem(LNOKKEL);if(!d)return;var p=JSON.parse(d);if(p&&p.access_token&&!p.error&&!p.error_code)location.href='laerer_app.html';}catch(e){}
})();
function byttPanel(id){
  ['inn','reg'].forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('ak',x===id);
    document.getElementById('panel-'+x).classList.toggle('ak',x===id);
  });
}
async function lastSkoler(){
  try{
    var r=await fetch(SURL+'/rest/v1/skoler?aktiv=eq.true&order=navn&select=id,navn',{headers:{'apikey':SKEY}});
    var data=await r.json();
    var sel=document.getElementById('reg-skole');
    if(Array.isArray(data)&&data.length){
      sel.innerHTML='<option value="">— Velg skole —</option>'+data.map(function(s){return '<option value="'+s.id+'">'+s.navn+'</option>';}).join('');
    }else{
      sel.innerHTML='<option value="">Ingen skoler – opprett en nedenfor</option>';
    }
  }catch(e){document.getElementById('reg-skole').innerHTML='<option value="">Feil ved lasting</option>';}
}
function toggleNySkole(){
  var p=document.getElementById('ny-skole-panel');
  var b=document.getElementById('ny-skole-btn');
  var vis=p.style.display!=='block';
  p.style.display=vis?'block':'none';
  b.textContent=vis?'✕ Lukk':'+ Ny';
  if(vis)document.getElementById('ny-skole-navn').focus();
}
async function opprettSkole(){
  var navn=document.getElementById('ny-skole-navn').value.trim();
  var kommune=document.getElementById('ny-skole-kommune').value.trim();
  var btn=document.getElementById('ny-skole-opprett');
  var meld=document.getElementById('ny-skole-melding');
  if(!navn){meld.className='melding feil';meld.textContent='Skriv inn skolenavn.';return;}
  btn.disabled=true;btn.textContent='Oppretter…';meld.textContent='';
  try{
    var r=await fetch(SURL+'/rest/v1/skoler',{method:'POST',headers:{'apikey':SKEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({navn:navn,kommune:kommune||null,aktiv:true})});
    var data=await r.json();
    if(!r.ok)throw new Error((Array.isArray(data)?data[0]:data).message||JSON.stringify(data).slice(0,80));
    var ny=Array.isArray(data)?data[0]:data;
    if(!ny||!ny.id)throw new Error('Ingen ID i respons');
    var sel=document.getElementById('reg-skole');
    var opt=document.createElement('option');opt.value=ny.id;opt.textContent=ny.navn;
    sel.appendChild(opt);sel.value=ny.id;
    meld.className='melding ok';meld.textContent='✅ Skolen er opprettet!';
    setTimeout(function(){toggleNySkole();document.getElementById('ny-skole-navn').value='';document.getElementById('ny-skole-kommune').value='';meld.textContent='';},1200);
  }catch(e){meld.className='melding feil';meld.textContent='Feil: '+e.message;}
  btn.disabled=false;btn.textContent='Opprett skole';
}
async function loggInn(){
  var epost=(document.getElementById('inn-epost').value||'').trim();
  var passord=document.getElementById('inn-passord').value;
  var meld=document.getElementById('inn-melding');
  var btn=document.getElementById('inn-btn');
  var laster=document.getElementById('inn-laster');
  meld.textContent='';
  if(!epost||!passord){meld.textContent='Fyll inn e-post og passord.';return;}
  btn.disabled=true;laster.style.display='block';
  try{
    var r=await fetch(SURL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'Content-Type':'application/json','apikey':SKEY},body:JSON.stringify({email:epost,password:passord})});
    var d=await r.json();
    if(!d.access_token||d.error||d.error_code){
      var feil=d.error_description||d.msg||d.error||'Feil e-post eller passord.';
      if(feil.toLowerCase().indexOf('invalid')>=0||feil.toLowerCase().indexOf('credentials')>=0)feil='Feil e-post eller passord.';
      else if(feil.toLowerCase().indexOf('confirm')>=0)feil='E-posten er ikke bekreftet. Sjekk innboksen din.';
      meld.textContent=feil;btn.disabled=false;laster.style.display='none';return;
    }
    if(d.expires_in&&!d.expires_at){d.expires_at=Math.floor(Date.now()/1000)+d.expires_in;}
    localStorage.setItem(LNOKKEL,JSON.stringify(d));
    location.href='laerer_app.html';
  }catch(e){meld.textContent='Nettverksfeil: '+e.message;btn.disabled=false;laster.style.display='none';}
}
async function registrer(){
  var navn=(document.getElementById('reg-navn').value||'').trim();
  var epost=(document.getElementById('reg-epost').value||'').trim();
  var skoleId=document.getElementById('reg-skole').value;
  var pass1=document.getElementById('reg-passord').value;
  var pass2=document.getElementById('reg-passord2').value;
  var meld=document.getElementById('reg-melding');
  var btn=document.getElementById('reg-btn');
  var laster=document.getElementById('reg-laster');
  meld.className='melding';meld.textContent='';
  if(!navn){meld.textContent='Skriv inn fullt navn.';return;}
  if(!epost||epost.indexOf('@')<0){meld.textContent='Ugyldig e-postadresse.';return;}
  if(!skoleId){meld.textContent='Velg skole (eller opprett en ovenfor).';return;}
  if(pass1.length<8){meld.textContent='Passordet må ha minst 8 tegn.';return;}
  if(pass1!==pass2){meld.textContent='Passordene stemmer ikke overens.';return;}
  btn.disabled=true;laster.style.display='block';
  try{
    var r1=await fetch(SURL+'/auth/v1/signup',{method:'POST',headers:{'Content-Type':'application/json','apikey':SKEY},body:JSON.stringify({email:epost,password:pass1,data:{fullt_navn:navn,skole_id:skoleId}})});
    var d1=await r1.json();
    if(d1.error||d1.error_code){
      var feil=d1.error_description||d1.msg||d1.message||d1.error||'Registrering feilet';
      if(feil.toLowerCase().indexOf('already')>=0)feil='Denne e-postadressen er allerede registrert. Prøv å logge inn.';
      else if(feil.toLowerCase().indexOf('password')>=0)feil='Passordet oppfyller ikke kravene (minst 8 tegn).';
      meld.className='melding feil';meld.textContent=feil;
      btn.disabled=false;laster.style.display='none';return;
    }
    var userId=(d1.user&&d1.user.id)||d1.id||null;
    var accessToken=d1.access_token||null;
    if(!userId&&!accessToken){
      meld.className='melding ok';meld.textContent='✅ Konto opprettet! Sjekk e-posten din og klikk bekreftelseslenken.';
      btn.disabled=false;laster.style.display='none';return;
    }
    var authHeader=accessToken?('Bearer '+accessToken):('Bearer '+SKEY);
    try{
      await fetch(SURL+'/rest/v1/laerere',{method:'POST',headers:{'Content-Type':'application/json','apikey':SKEY,'Authorization':authHeader,'Prefer':'return=minimal'},body:JSON.stringify({fullt_navn:navn,epost:epost,skole_id:skoleId})});
    }catch(e2){}
    if(accessToken){
      if(d1.expires_in&&!d1.expires_at){d1.expires_at=Math.floor(Date.now()/1000)+d1.expires_in;}
      localStorage.setItem(LNOKKEL,JSON.stringify(d1));
      meld.className='melding ok';meld.textContent='✅ Konto opprettet! Videresender…';
      setTimeout(function(){location.href='laerer_app.html';},1000);
    }else{
      meld.className='melding ok';meld.textContent='✅ Konto opprettet! Du kan nå logge inn.';
      setTimeout(function(){byttPanel('inn');document.getElementById('inn-epost').value=epost;},2000);
    }
    btn.disabled=false;laster.style.display='none';
  }catch(e){meld.className='melding feil';meld.textContent='Nettverksfeil: '+e.message;btn.disabled=false;laster.style.display='none';}
}
lastSkoler();
</script>
</body>
</html>
