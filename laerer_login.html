<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>SkapLab – Lærerpålogging</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;
  --bg2:#0b0d18;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.15);
  --text:#e0e8ff;
  --dim:rgba(255,255,255,.45);
  --bla:#60a5fa;
  --gron:#34d399;
  --rod:#f87171;
  --font-h:'Syne',sans-serif;
  --font-b:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

.kort{
  width:100%;max-width:400px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:36px 32px;
}
.logo{
  font-family:var(--font-h);font-size:1.6rem;font-weight:900;
  color:var(--bla);text-align:center;margin-bottom:4px;
}
.logo span{color:#a78bfa;}
.undertittel{
  text-align:center;font-size:.82rem;color:var(--dim);
  margin-bottom:28px;
}
.tab-rad{display:flex;gap:4px;margin-bottom:24px;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;}
.tab-btn{
  flex:1;padding:8px;border:none;border-radius:8px;background:none;
  color:var(--dim);font-family:var(--font-h);font-size:.78rem;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.tab-btn.ak{background:rgba(96,165,250,.15);color:var(--bla);}
.panel{display:none;}
.panel.ak{display:block;}

label{display:block;font-size:.72rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-family:var(--font-h);}
input{
  width:100%;padding:10px 14px;
  background:rgba(255,255,255,.05);
  border:1.5px solid var(--border2);
  border-radius:9px;color:var(--text);
  font-family:var(--font-b);font-size:.9rem;
  outline:none;transition:border-color .15s;
  margin-bottom:14px;
}
input:focus{border-color:var(--bla);background:rgba(96,165,250,.04);}
input::placeholder{color:rgba(255,255,255,.2);}
select{
  width:100%;padding:10px 14px;
  background:rgba(255,255,255,.05);
  border:1.5px solid var(--border2);
  border-radius:9px;color:var(--text);
  font-family:var(--font-b);font-size:.9rem;
  outline:none;margin-bottom:14px;cursor:pointer;
}
select option{background:#0b0d18;}
.felt{margin-bottom:2px;}
.btn-hoved{
  width:100%;padding:11px;
  background:var(--bla);color:#000;
  border:none;border-radius:9px;
  font-family:var(--font-h);font-size:.85rem;font-weight:800;
  cursor:pointer;transition:opacity .15s;margin-top:4px;
}
.btn-hoved:hover{opacity:.88;}
.btn-hoved:disabled{opacity:.4;cursor:not-allowed;}
.btn-hoved.gron{background:var(--gron);}
.melding{min-height:20px;font-size:.8rem;margin-top:10px;text-align:center;}
.melding.feil{color:var(--rod);}
.melding.ok{color:var(--gron);}
.elev-link{text-align:center;margin-top:20px;font-size:.78rem;color:var(--dim);}
.elev-link a{color:var(--bla);text-decoration:none;}
.elev-link a:hover{text-decoration:underline;}

/* Ny skole */
.ny-skole-boks{
  background:rgba(52,211,153,.05);
  border:1px solid rgba(52,211,153,.2);
  border-radius:10px;padding:14px;margin-bottom:14px;
}
.ny-skole-boks label{color:rgba(52,211,153,.7);}
.skole-rad{display:flex;gap:6px;align-items:center;margin-bottom:14px;}
.skole-rad select{margin-bottom:0;flex:1;}
.btn-ny-skole{
  padding:9px 12px;border-radius:9px;
  border:1px dashed rgba(52,211,153,.4);
  background:transparent;color:var(--gron);
  font-size:.78rem;font-family:var(--font-h);font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.btn-ny-skole:hover{background:rgba(52,211,153,.08);}
.par{display:flex;gap:8px;}
.par .felt{flex:1;}
.par input{width:100%;}
</style>
</head>
<body>
<div class="kort">
  <div class="logo">Skap<span>Lab</span></div>
  <div class="undertittel">Lærertilgang</div>

  <div class="tab-rad">
    <button class="tab-btn ak" id="tab-inn" onclick="byttPanel('inn')">Logg inn</button>
    <button class="tab-btn" id="tab-reg" onclick="byttPanel('reg')">Opprett konto</button>
  </div>

  <!-- LOGG INN -->
  <div class="panel ak" id="panel-inn">
    <div class="felt"><label>E-post</label>
      <input type="email" id="inn-epost" placeholder="laerer@skole.no" autocomplete="username"></div>
    <div class="felt"><label>Passord</label>
      <input type="password" id="inn-passord" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')loggInn()"></div>
    <button class="btn-hoved" id="inn-btn" onclick="loggInn()">Logg inn</button>
    <div class="melding feil" id="inn-melding"></div>
  </div>

  <!-- REGISTRERING -->
  <div class="panel" id="panel-reg">
    <div class="felt"><label>Fullt navn</label>
      <input type="text" id="reg-navn" placeholder="Fornavn Etternavn"></div>
    <div class="felt"><label>E-post</label>
      <input type="email" id="reg-epost" placeholder="laerer@skole.no"></div>
    <div class="felt"><label>Skole</label>
      <div class="skole-rad">
        <select id="reg-skole"><option value="">Laster skoler…</option></select>
        <button class="btn-ny-skole" id="ny-skole-knapp" onclick="toggleNySkole()">+ Ny</button>
      </div>
    </div>
    <div class="ny-skole-boks" id="ny-skole-panel" style="display:none">
      <div class="felt"><label>Skolenavn</label>
        <input type="text" id="ny-skole-navn" placeholder="f.eks. Gressvik ungdomsskole"></div>
      <div class="par">
        <div class="felt"><label>Kommune</label>
          <input type="text" id="ny-skole-kommune" placeholder="f.eks. Fredrikstad"></div>
        <div class="felt"><label>Fylke</label>
          <input type="text" id="ny-skole-fylke" placeholder="f.eks. Østfold"></div>
      </div>
      <button class="btn-hoved gron" onclick="opprettSkole()" id="ny-skole-btn" style="margin-top:0">Opprett skole</button>
      <div class="melding" id="ny-skole-melding"></div>
    </div>
    <div class="felt"><label>Passord</label>
      <input type="password" id="reg-passord" placeholder="Minst 8 tegn"></div>
    <div class="felt"><label>Bekreft passord</label>
      <input type="password" id="reg-passord2" placeholder="Gjenta passord"
        onkeydown="if(event.key==='Enter')registrer()"></div>
    <button class="btn-hoved gron" id="reg-btn" onclick="registrer()">Opprett konto</button>
    <div class="melding" id="reg-melding"></div>
  </div>

  <div class="elev-link">Er du elev? <a href="elev_login.html">Gå til elevpålogging →</a></div>
</div>

<script>
var SURL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
var SKEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
var LNOKKEL = 'skaplab_laerer_v2';

/* ── HJELPEFUNKSJONER ──────────────────────────────────────────── */
function $(id){ return document.getElementById(id); }

function hentLaerer() {
  try {
    var d = localStorage.getItem(LNOKKEL);
    if (!d) return null;
    var p = JSON.parse(d);
    if (!p || !p.access_token) return null;
    if (p.error_code || p.error) return null;
    return p;
  } catch(e){ return null; }
}

function laererLoggInn(epost, passord) {
  return fetch(SURL+'/auth/v1/token?grant_type=password', {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SKEY},
    body: JSON.stringify({email:epost, password:passord})
  }).then(function(r){ return r.json(); }).then(function(resp){
    if (resp.error) return {ok:false, feil:resp.error_description||resp.error};
    if (!resp.access_token) return {ok:false, feil:'Ingen token i respons'};
    localStorage.setItem(LNOKKEL, JSON.stringify(resp));
    return {ok:true};
  }).catch(function(e){ return {ok:false, feil:'Tilkoblingsfeil: '+e.message}; });
}

/* ── PANEL-BYTTE ───────────────────────────────────────────────── */
function byttPanel(id) {
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('ak');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('ak');});
  $('panel-'+id).classList.add('ak');
  $('tab-'+id).classList.add('ak');
}

/* ── INNLOGGING ────────────────────────────────────────────────── */
async function loggInn() {
  var epost   = $('inn-epost').value.trim();
  var passord = $('inn-passord').value;
  var btn     = $('inn-btn');
  var meld    = $('inn-melding');
  if (!epost || !passord) { meld.textContent = 'Fyll inn e-post og passord.'; return; }
  btn.disabled = true; btn.textContent = 'Logger inn…'; meld.textContent = '';
  var res = await laererLoggInn(epost, passord);
  if (res.ok) {
    location.href = 'laerer_app.html';
  } else {
    meld.textContent = res.feil || 'Pålogging feilet.';
    btn.disabled = false; btn.textContent = 'Logg inn';
  }
}

/* ── REGISTRERING ──────────────────────────────────────────────── */
async function lastSkoler() {
  try {
    var r = await fetch(SURL+'/rest/v1/skoler?aktiv=eq.true&order=navn&select=id,navn',
      {headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});
    var data = await r.json();
    var sel = $('reg-skole');
    if (Array.isArray(data) && data.length) {
      sel.innerHTML = '<option value="">— Velg skole —</option>'
        + data.map(function(s){return '<option value="'+s.id+'">'+s.navn+'</option>';}).join('');
    } else {
      sel.innerHTML = '<option value="">Ingen skoler – opprett en</option>';
    }
  } catch(e) { $('reg-skole').innerHTML = '<option value="">Feil ved lasting</option>'; }
}

async function registrer() {
  var navn   = $('reg-navn').value.trim();
  var epost  = $('reg-epost').value.trim();
  var skole  = $('reg-skole').value;
  var pass1  = $('reg-passord').value;
  var pass2  = $('reg-passord2').value;
  var btn    = $('reg-btn');
  var meld   = $('reg-melding');
  meld.className = 'melding feil';
  if (!navn)            { meld.textContent = 'Skriv inn navn.'; return; }
  if (!epost)           { meld.textContent = 'Skriv inn e-post.'; return; }
  if (!skole)           { meld.textContent = 'Velg skole.'; return; }
  if (pass1.length < 8) { meld.textContent = 'Passordet må være minst 8 tegn.'; return; }
  if (pass1 !== pass2)  { meld.textContent = 'Passordene er ikke like.'; return; }

  btn.disabled = true; btn.textContent = 'Oppretter konto…'; meld.textContent = '';
  try {
    var r1 = await fetch(SURL+'/auth/v1/signup', {
      method:'POST',
      headers:{'apikey':SKEY,'Content-Type':'application/json'},
      body: JSON.stringify({email:epost, password:pass1, data:{fullt_navn:navn}})
    });
    var d1 = await r1.json();
    if (d1.error||d1.error_code) throw new Error(d1.error_description||d1.message||d1.error||'Registrering feilet');
    var userId = (d1.user&&d1.user.id) || d1.id;
    if (!userId) throw new Error('Ingen bruker-ID i respons');

    var r2 = await fetch(SURL+'/rest/v1/laerere', {
      method:'POST',
      headers:{'apikey':SKEY,'Content-Type':'application/json','Prefer':'return=minimal',
               'Authorization':'Bearer '+SKEY},
      body: JSON.stringify({id:userId, fullt_navn:navn, epost:epost, skole_id:skole})
    });
    if (!r2.ok) {
      var d2 = await r2.json().catch(function(){return {};});
      throw new Error((d2.message||JSON.stringify(d2)).substring(0,100));
    }
    meld.className = 'melding ok';
    meld.textContent = '✅ Konto opprettet! Du kan nå logge inn.';
    btn.disabled = false; btn.textContent = 'Opprett konto';
    setTimeout(function(){
      byttPanel('inn');
      $('inn-epost').value = epost;
    }, 2000);
  } catch(e) {
    meld.textContent = 'Feil: ' + e.message;
    btn.disabled = false; btn.textContent = 'Opprett konto';
  }
}

function toggleNySkole() {
  var p = $('ny-skole-panel');
  var vis = p.style.display==='none';
  p.style.display = vis ? '' : 'none';
  $('ny-skole-knapp').textContent = vis ? '✕ Lukk' : '+ Ny';
}

async function opprettSkole() {
  var navn   = $('ny-skole-navn').value.trim();
  var komm   = $('ny-skole-kommune').value.trim();
  var fylke  = $('ny-skole-fylke').value.trim();
  var btn    = $('ny-skole-btn');
  var meld   = $('ny-skole-melding');
  if (!navn) { meld.style.color='var(--rod)'; meld.textContent='Skriv inn skolenavn.'; return; }
  btn.disabled=true; btn.textContent='Oppretter…'; meld.textContent='';
  try {
    var r = await fetch(SURL+'/rest/v1/skoler', {
      method:'POST',
      headers:{'apikey':SKEY,'Content-Type':'application/json','Prefer':'return=representation',
               'Authorization':'Bearer '+SKEY},
      body: JSON.stringify({navn:navn, kommune:komm||null, fylke:fylke||null, aktiv:true})
    });
    var data = await r.json();
    if (!r.ok) throw new Error((Array.isArray(data)?data[0]:data).message||JSON.stringify(data).substring(0,80));
    var ny = Array.isArray(data) ? data[0] : data;
    if (!ny||!ny.id) throw new Error('Ingen ID i respons');
    var sel = $('reg-skole');
    var opt = document.createElement('option');
    opt.value = ny.id; opt.textContent = ny.navn;
    sel.appendChild(opt); sel.value = ny.id;
    meld.style.color='var(--gron)'; meld.textContent='✅ Skolen er opprettet!';
    setTimeout(function(){
      toggleNySkole();
      $('ny-skole-navn').value=''; $('ny-skole-kommune').value=''; $('ny-skole-fylke').value='';
      meld.textContent='';
    }, 1500);
  } catch(e) {
    meld.style.color='var(--rod)'; meld.textContent='Feil: '+e.message;
  }
  btn.disabled=false; btn.textContent='Opprett skole';
}

/* ── INIT ──────────────────────────────────────────────────────── */
if (hentLaerer()) {
  location.href = 'laerer_app.html';
} else {
  lastSkoler();
}
</script>
</body>
</html>
