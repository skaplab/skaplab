<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Lærerpålogging</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--bg2:#0b0d18;--border:rgba(255,255,255,.1);--text:#e0e8ff;--dim:rgba(255,255,255,.45);--bla:#60a5fa;--gron:#34d399;--rod:#f87171;--lilla:#a78bfa;--font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.kort{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px 32px;}
.logo{font-family:var(--font-h);font-size:1.6rem;font-weight:900;color:var(--bla);text-align:center;margin-bottom:6px;}
.logo span{color:var(--lilla);}
.under-tittel{text-align:center;color:var(--dim);font-size:.85rem;margin-bottom:24px;}
/* TABS */
.tab-rad{display:flex;background:rgba(255,255,255,.05);border-radius:9px;padding:3px;margin-bottom:22px;gap:2px;}
.tab-btn{flex:1;padding:7px;border-radius:7px;border:none;background:transparent;color:var(--dim);font-family:var(--font-h);font-size:.82rem;font-weight:800;cursor:pointer;transition:all .15s;}
.tab-btn.ak{background:var(--bla);color:#000;}
/* FORM */
label{font-size:.72rem;color:var(--dim);font-family:var(--font-h);font-weight:700;text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:5px;}
input{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font-b);font-size:.92rem;outline:none;transition:border-color .15s;}
input:focus{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.04);}
.felt{margin-bottom:14px;}
.btn-hoved{width:100%;padding:12px;background:var(--bla);color:#000;border:none;border-radius:9px;font-family:var(--font-h);font-size:.95rem;font-weight:800;cursor:pointer;margin-top:6px;transition:opacity .15s;}
.btn-hoved:hover{opacity:.9;}
.btn-hoved:disabled{opacity:.5;cursor:not-allowed;}
.btn-hoved.gron{background:var(--gron);}
.melding{font-size:.82rem;margin-top:10px;text-align:center;min-height:20px;}
.melding.feil{color:var(--rod);}
.melding.ok{color:var(--gron);}
.elev-link{text-align:center;margin-top:20px;font-size:.8rem;color:var(--dim);}
.elev-link a{color:var(--bla);text-decoration:none;}
.elev-link a:hover{text-decoration:underline;}
.panel{display:none;}
.panel.ak{display:block;}
select{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font-b);font-size:.92rem;outline:none;}
select option{background:#0b0d18;}
</style>
</head>
<body>
<div class="kort">
  <div class="logo">Skap<span>Lab</span></div>
  <div class="under-tittel">Lærertilgang</div>

  <div class="tab-rad">
    <button class="tab-btn ak" id="tab-inn" onclick="byttPanel('inn')">Logg inn</button>
    <button class="tab-btn" id="tab-reg" onclick="byttPanel('reg')">Opprett konto</button>
  </div>

  <!-- LOGG INN -->
  <div class="panel ak" id="panel-inn">
    <div class="felt"><label>E-post</label>
      <input type="email" id="inn-epost" placeholder="laerer@skole.no" autocomplete="username"></div>
    <div class="felt"><label>Passord</label>
      <input type="password" id="inn-passord" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')loggInn()"></div>
    <button class="btn-hoved" id="inn-btn" onclick="loggInn()">Logg inn</button>
    <div class="melding feil" id="inn-melding"></div>
  </div>

  <!-- REGISTRERING -->
  <div class="panel" id="panel-reg">
    <div class="felt"><label>Fullt navn</label>
      <input type="text" id="reg-navn" placeholder="Fornavn Etternavn" autocomplete="name"></div>
    <div class="felt"><label>E-post</label>
      <input type="email" id="reg-epost" placeholder="laerer@skole.no" autocomplete="username"></div>
    <div class="felt">
      <label>Skole</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <select id="reg-skole" style="flex:1;"><option value="">Laster skoler…</option></select>
        <button type="button" onclick="toggleNySkole()" style="padding:9px 12px;border-radius:9px;border:1px dashed rgba(52,211,153,.4);background:transparent;color:var(--gron);font-size:.82rem;font-family:var(--font-h);font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;" id="ny-skole-toggle-btn">+ Ny</button>
      </div>
    </div>
    <div id="ny-skole-panel" style="display:none;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-family:var(--font-h);font-size:.75rem;font-weight:800;color:var(--gron);margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px;">Ny skole</div>
      <div class="felt"><label>Skolenavn</label>
        <input type="text" id="ny-skole-navn" placeholder="f.eks. Gressvik ungdomsskole"></div>
      <div style="display:flex;gap:8px;">
        <div class="felt" style="flex:1;margin-bottom:0;"><label>Kommune</label>
          <input type="text" id="ny-skole-kommune" placeholder="f.eks. Fredrikstad"></div>
        <div class="felt" style="flex:1;margin-bottom:0;"><label>Fylke</label>
          <input type="text" id="ny-skole-fylke" placeholder="f.eks. Østfold"></div>
      </div>
      <button type="button" onclick="opprettSkole()" style="width:100%;padding:9px;background:var(--gron);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-size:.82rem;font-weight:800;cursor:pointer;margin-top:10px;" id="ny-skole-btn">Opprett skole</button>
      <div id="ny-skole-melding" style="font-size:.78rem;margin-top:6px;min-height:16px;"></div>
    </div>
    <div class="felt"><label>Passord</label>
      <input type="password" id="reg-passord" placeholder="Minst 8 tegn" autocomplete="new-password"></div>
    <div class="felt"><label>Bekreft passord</label>
      <input type="password" id="reg-passord2" placeholder="Gjenta passord" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')registrer()"></div>
    <button class="btn-hoved gron" id="reg-btn" onclick="registrer()">Opprett konto</button>
    <div class="melding" id="reg-melding"></div>
  </div>

  <div class="elev-link">Er du elev? <a href="elev_login.html">Gå til elevpålogging →</a></div>
</div>

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';
  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,trenger_hjelp,hjelp_emne,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      localStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    localStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = localStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      if (!parsed || !parsed.access_token) return null;
      if (parsed.error_code || parsed.error) return null;
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _delete: function(sti,tok){return fetch(API+sti,{method:'DELETE',headers:hdr(tok)}).then(function(r){return r.ok;});},
    _rpc: function(fn,params,tok){return fetch(API+'/rpc/'+fn,{method:'POST',headers:Object.assign(hdr(tok),{'Content-Type':'application/json'}),body:JSON.stringify(params)}).then(function(r){return r.json();});},
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

var SBASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
var SBASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';

function byttPanel(id) {
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('ak');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('ak');});
  document.getElementById('panel-'+id).classList.add('ak');
  document.getElementById('tab-'+id).classList.add('ak');
}

// Last skoler for registrering
async function lastSkoler() {
  try {
    var r = await fetch(SBASE_URL+'/rest/v1/skoler?aktiv=eq.true&order=navn&select=id,navn',
      {headers:{'apikey':SBASE_KEY}});
    var data = await r.json();
    var sel = document.getElementById('reg-skole');
    if (Array.isArray(data) && data.length) {
      sel.innerHTML = '<option value="">— Velg skole —</option>'
        + data.map(function(s){return '<option value="'+s.id+'">'+s.navn+'</option>';}).join('');
    } else {
      sel.innerHTML = '<option value="">Ingen skoler registrert</option>';
    }
  } catch(e) {
    document.getElementById('reg-skole').innerHTML = '<option value="">Feil ved lasting</option>';
  }
}

async function loggInn() {
  var epost   = document.getElementById('inn-epost').value.trim();
  var passord = document.getElementById('inn-passord').value;
  var btn     = document.getElementById('inn-btn');
  var feilEl  = document.getElementById('inn-melding');
  if (!epost || !passord) { feilEl.textContent = 'Fyll inn e-post og passord.'; return; }
  btn.disabled = true; btn.textContent = 'Logger inn…'; feilEl.textContent = '';
  var res = await SkapLab.laererLoggInn(epost, passord);
  if (res.ok) {
    location.href = 'laerer_app.html';
  } else {
    feilEl.textContent = res.feil || 'Pålogging feilet.';
    btn.disabled = false; btn.textContent = 'Logg inn';
  }
}

async function registrer() {
  var navn    = document.getElementById('reg-navn').value.trim();
  var epost   = document.getElementById('reg-epost').value.trim();
  var skoleId = document.getElementById('reg-skole').value;
  var pass1   = document.getElementById('reg-passord').value;
  var pass2   = document.getElementById('reg-passord2').value;
  var btn     = document.getElementById('reg-btn');
  var meldEl  = document.getElementById('reg-melding');
  meldEl.className = 'melding feil';

  if (!navn)           { meldEl.textContent = 'Skriv inn fullt navn.'; return; }
  if (!epost)          { meldEl.textContent = 'Skriv inn e-post.'; return; }
  if (!skoleId)        { meldEl.textContent = 'Velg skole.'; return; }
  if (pass1.length < 8){ meldEl.textContent = 'Passordet må være minst 8 tegn.'; return; }
  if (pass1 !== pass2) { meldEl.textContent = 'Passordene er ikke like.'; return; }

  btn.disabled = true; btn.textContent = 'Oppretter konto…'; meldEl.textContent = '';

  try {
    // 1. Opprett Supabase Auth-bruker
    var r1 = await fetch(SBASE_URL+'/auth/v1/signup', {
      method: 'POST',
      headers: {'apikey': SBASE_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({email: epost, password: pass1, data: {fullt_navn: navn}})
    });
    var d1 = await r1.json();
    if (d1.error || d1.error_code) throw new Error(d1.error_description || d1.message || d1.error || 'Registrering feilet');
    if (!d1.id && !(d1.user && d1.user.id)) throw new Error('Ingen bruker-ID i respons');

    var userId = d1.id || d1.user.id;

    // 2. Opprett rad i laerere-tabellen (med anon-key — krever INSERT-policy)
    var r2 = await fetch(SBASE_URL+'/rest/v1/laerere', {
      method: 'POST',
      headers: {'apikey': SBASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation'},
      body: JSON.stringify({id: userId, fullt_navn: navn, epost: epost, skole_id: skoleId})
    });
    var d2 = await r2.json();
    if (!r2.ok) throw new Error(JSON.stringify(d2).substring(0,100));

    meldEl.className = 'melding ok';
    meldEl.textContent = '✅ Konto opprettet! Du kan nå logge inn.';
    btn.disabled = false; btn.textContent = 'Opprett konto';

    // Bytt til innloggings-panel etter 2 sekunder
    setTimeout(function() {
      byttPanel('inn');
      document.getElementById('inn-epost').value = epost;
    }, 2000);

  } catch(e) {
    meldEl.textContent = 'Feil: ' + e.message;
    btn.disabled = false; btn.textContent = 'Opprett konto';
  }
}


function toggleNySkole() {
  var panel = document.getElementById('ny-skole-panel');
  var btn   = document.getElementById('ny-skole-toggle-btn');
  var vis   = panel.style.display === 'none';
  panel.style.display = vis ? '' : 'none';
  btn.textContent = vis ? '✕ Lukk' : '+ Ny';
  if (vis) document.getElementById('ny-skole-navn').focus();
}

async function opprettSkole() {
  var navn    = document.getElementById('ny-skole-navn').value.trim();
  var kommune = document.getElementById('ny-skole-kommune').value.trim();
  var fylke   = document.getElementById('ny-skole-fylke').value.trim();
  var btn     = document.getElementById('ny-skole-btn');
  var meld    = document.getElementById('ny-skole-melding');

  if (!navn) { meld.style.color = 'var(--rod)'; meld.textContent = 'Skriv inn skolenavn.'; return; }

  btn.disabled = true; btn.textContent = 'Oppretter…'; meld.textContent = '';

  try {
    var r = await fetch(SBASE_URL + '/rest/v1/skoler', {
      method: 'POST',
      headers: {
        'apikey': SBASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({ navn: navn, kommune: kommune || null, fylke: fylke || null, aktiv: true })
    });
    var data = await r.json();
    if (!r.ok) throw new Error((Array.isArray(data) ? data[0] : data).message || JSON.stringify(data).substring(0,80));
    var ny = Array.isArray(data) ? data[0] : data;
    if (!ny || !ny.id) throw new Error('Ingen ID i respons');

    // Legg til i dropdown og velg den
    var sel = document.getElementById('reg-skole');
    var opt = document.createElement('option');
    opt.value = ny.id;
    opt.textContent = ny.navn;
    sel.appendChild(opt);
    sel.value = ny.id;

    // Skjul skjema og tilbakestill
    meld.style.color = 'var(--gron)'; meld.textContent = '✅ Skolen er opprettet!';
    setTimeout(function() {
      toggleNySkole();
      document.getElementById('ny-skole-navn').value = '';
      document.getElementById('ny-skole-kommune').value = '';
      document.getElementById('ny-skole-fylke').value = '';
      meld.textContent = '';
    }, 1200);

  } catch(e) {
    meld.style.color = 'var(--rod)';
    meld.textContent = 'Feil: ' + e.message;
  }
  btn.disabled = false; btn.textContent = 'Opprett skole';
}

if (SkapLab.hentLaerer()) { location.href = 'laerer_app.html'; }
lastSkoler();
