<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spilltest</title>
<style>
  body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; color: #fff; }
  canvas { border: 2px solid #0f0; display: block; }
  #status { margin-top: 10px; font-size: 1rem; color: #0f0; }
</style>
</head>
<body>
<h2>Spilltest – beveg den blå firkanten</h2>
<canvas id="c" width="600" height="400"></canvas>
<div id="status">Bruk piltastene ELLER knappene under</div>

<!-- D-PAD -->
<div style="display:grid;grid-template-columns:repeat(3,60px);gap:6px;margin-top:16px">
  <div></div>
  <button onpointerdown="move('up',true)" onpointerup="move('up',false)" onpointerleave="move('up',false)" style="height:60px;font-size:1.5rem;background:#222;color:#0f0;border:2px solid #0f0;border-radius:8px;cursor:pointer">▲</button>
  <div></div>
  <button onpointerdown="move('left',true)" onpointerup="move('left',false)" onpointerleave="move('left',false)" style="height:60px;font-size:1.5rem;background:#222;color:#0f0;border:2px solid #0f0;border-radius:8px;cursor:pointer">◀</button>
  <div></div>
  <button onpointerdown="move('right',true)" onpointerup="move('right',false)" onpointerleave="move('right',false)" style="height:60px;font-size:1.5rem;background:#222;color:#0f0;border:2px solid #0f0;border-radius:8px;cursor:pointer">▶</button>
  <div></div>
  <button onpointerdown="move('down',true)" onpointerup="move('down',false)" onpointerleave="move('down',false)" style="height:60px;font-size:1.5rem;background:#222;color:#0f0;border:2px solid #0f0;border-radius:8px;cursor:pointer">▼</button>
  <div></div>
</div>

<script>

// ── SKAPLAB SPORING ──────────────────────────────────────────────
(function() {
  try {
    var _elev = null;
    try { _elev = JSON.parse(localStorage.getItem('skaplab_elev')); } catch(e) {}
    window._skaplab_logg = function(ressurs, km_kode, score_pst, antall, riktige, fullfort_ant, totalt_ant) {
      if (!_elev || !_elev.id) return;
      fetch('https://cqzmzsqhuawpsvnjjzse.supabase.co/rest/v1/aktivitet', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j',
          'Authorization': 'Bearer sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j'
        },
        body: JSON.stringify({
          elev_id: _elev.id,
          ressurs: ressurs,
          km_kode: km_kode,
          score_pst: Math.round(score_pst || 0),
          antall_oppgaver: antall || null,
          riktige: riktige || null,
          fullfort_antall: fullfort_ant || null,
          totalt_antall: totalt_ant || null
        })
      }).catch(function() {});
    };
  } catch(e) {}
})();
// ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let x = 300, y = 200;
const spd = 4;
const keys = { up: false, down: false, left: false, right: false };

// D-pad handler
function move(dir, pressed) {
  keys[dir] = pressed;
  status.textContent = pressed ? '🎮 D-pad: ' + dir : 'Knapp sluppet';
}

// Keyboard handler
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp'    || e.key === 'w') { keys.up    = true; status.textContent = '⌨️ Tast: ' + e.key; }
  if (e.key === 'ArrowDown'  || e.key === 's') { keys.down  = true; status.textContent = '⌨️ Tast: ' + e.key; }
  if (e.key === 'ArrowLeft'  || e.key === 'a') { keys.left  = true; status.textContent = '⌨️ Tast: ' + e.key; }
  if (e.key === 'ArrowRight' || e.key === 'd') { keys.right = true; status.textContent = '⌨️ Tast: ' + e.key; }
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp'    || e.key === 'w') keys.up    = false;
  if (e.key === 'ArrowDown'  || e.key === 's') keys.down  = false;
  if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// Game loop
setInterval(() => {
  if (keys.up)    y -= spd;
  if (keys.down)  y += spd;
  if (keys.left)  x -= spd;
  if (keys.right) x += spd;
  x = Math.max(20, Math.min(580, x));
  y = Math.max(20, Math.min(380, y));

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, 600, 400);
  ctx.fillStyle = '#00e5ff';
  ctx.fillRect(x - 20, y - 20, 40, 40);
  ctx.fillStyle = '#fff';
  ctx.font = '12px sans-serif';
  ctx.fillText(`x:${Math.round(x)} y:${Math.round(y)}`, 10, 20);
}, 1000/60);

// Spor fullfoering ved scroll til bunn
(function() {
  var _sporet = false;
  function sjekkScroll() {
    if (_sporet) return;
    if (window.scrollY + window.innerHeight >= document.body.scrollHeight - 100) {
      _sporet = true;
      window._skaplab_logg('spilltest', 'NAT-1', 100, 1, 1, 1, 1);
      window.removeEventListener('scroll', sjekkScroll);
    }
  }
  window.addEventListener('scroll', sjekkScroll);
  setTimeout(function() {
    if (!_sporet) { _sporet=true; window._skaplab_logg('spilltest', 'NAT-1', 80, 1, 1, 1, 1); }
  }, 60000);
})();

</script>
</body>
</html>
