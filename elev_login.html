<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Elevinnlogging</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="core/design.css">
<style>
  .kode-rad {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 24px 0;
  }
  .kode-siffer {
    width: 48px;
    height: 60px;
    text-align: center;
    font-family: var(--font-h);
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0;
    padding: 0;
    border-radius: var(--radius);
    border: 2px solid var(--border2);
    background: rgba(255,255,255,.05);
    color: var(--text);
    transition: border-color .15s;
    caret-color: transparent;
  }
  .kode-siffer:focus {
    border-color: var(--bla);
    background: rgba(96,165,250,.08);
    outline: none;
  }
  .kode-siffer.utfylt {
    border-color: rgba(96,165,250,.4);
  }
  .login-ikon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .spinner-stor {
    width: 24px; height: 24px;
    border: 2.5px solid rgba(0,0,0,.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hjelp-tekst {
    font-size: .78rem;
    color: var(--dim);
    margin-top: 16px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-boks" style="text-align:center;max-width:380px">
    <div class="login-ikon">📚</div>
    <div class="login-logo">Skap<span>Lab</span></div>
    <div class="login-sub" style="margin-bottom:4px">Skriv inn din 6-sifrede kode</div>

    <div class="login-feil" id="feil-elev"></div>

    <div class="kode-rad" id="kode-rad">
      <input class="kode-siffer" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      <input class="kode-siffer" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      <input class="kode-siffer" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      <input class="kode-siffer" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      <input class="kode-siffer" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
      <input class="kode-siffer" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
    </div>

    <button class="btn btn-prim btn-lg" id="innlogg-btn" style="width:100%" disabled>
      <span id="innlogg-tekst">Skriv inn kode</span>
      <div class="spinner-stor" id="innlogg-spinner"></div>
    </button>

    <p class="hjelp-tekst">
      Koden din finner du hos læreren din.<br>
      Sesjonen varer i 8 timer.
    </p>
  </div>
</div>

<script>
  window.SKAPLAB_CONFIG = {
    url: 'https://cqzmzsqhuawpsvnjjzse.supabase.co',
    key: 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j',
  };
</script>
<script src="core/auth.js"></script>
<script>
'use strict';

/* ── Redirect om allerede innlogget ─────────────────────── */
if (Auth.elev.erInnlogget()) {
  location.replace('elev_portal.html');
}

const siffer = Array.from(document.querySelectorAll('.kode-siffer'));
const btn    = document.getElementById('innlogg-btn');
const tekst  = document.getElementById('innlogg-tekst');
const spinn  = document.getElementById('innlogg-spinner');
const feilEl = document.getElementById('feil-elev');

/* ── Fokus og navigasjon ─────────────────────────────────── */
siffer.forEach((inp, i) => {
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) {
      siffer[i - 1].focus();
      siffer[i - 1].value = '';
      siffer[i - 1].classList.remove('utfylt');
    }
  });

  inp.addEventListener('input', e => {
    const val = e.data || inp.value;
    // Kun sifre
    if (!/[0-9]/.test(val)) { inp.value = ''; return; }
    inp.value = val.slice(-1);
    inp.classList.toggle('utfylt', !!inp.value);

    // Neste felt
    if (inp.value && i < siffer.length - 1) {
      siffer[i + 1].focus();
    }

    // Sjekk om alle er utfylt
    oppdaterKnapp();

    // Auto-logg inn om komplett
    if (siffer.every(s => s.value)) {
      setTimeout(loggInn, 80);
    }
  });

  // Paste-støtte: sett inn siffer i rekkefølge
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    txt.split('').slice(0, 6).forEach((c, j) => {
      if (siffer[i + j]) {
        siffer[i + j].value = c;
        siffer[i + j].classList.add('utfylt');
      }
    });
    const neste = Math.min(i + txt.length, 5);
    siffer[neste].focus();
    oppdaterKnapp();
    if (siffer.every(s => s.value)) setTimeout(loggInn, 80);
  });
});

siffer[0].focus();

function hentKode() {
  return siffer.map(s => s.value).join('');
}

function oppdaterKnapp() {
  const kode = hentKode();
  const ferdig = kode.length === 6;
  btn.disabled = !ferdig;
  tekst.textContent = ferdig ? 'Logg inn' : 'Skriv inn kode';
}

function settLaster(ja) {
  btn.disabled = ja;
  tekst.style.display = ja ? 'none' : 'inline';
  spinn.style.display  = ja ? 'block' : 'none';
}

async function loggInn() {
  const kode = hentKode();
  if (kode.length !== 6) return;
  feilEl.classList.remove('vis');
  settLaster(true);
  try {
    await Auth.elev.loggInn(kode);
    location.replace('elev_portal.html');
  } catch (err) {
    feilEl.textContent = err.message || 'Ukjent kode. Prøv igjen.';
    feilEl.classList.add('vis');
    // Tøm alle felt
    siffer.forEach(s => { s.value = ''; s.classList.remove('utfylt'); });
    siffer[0].focus();
    settLaster(false);
    oppdaterKnapp();
  }
}

btn.addEventListener('click', loggInn);
</script>
</body>
</html>
