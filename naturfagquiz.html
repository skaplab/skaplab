<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naturfagquiz · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --aksent:#34d399;
  --bg:linear-gradient(160deg,#071510 0%,#0c2218 100%);
  --kort-bg:rgba(255,255,255,0.06);
  --kort-border:rgba(255,255,255,0.12);
  --text:#f0f4ff;--dim:rgba(255,255,255,0.5);
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
  --font-m:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);overflow:hidden;}

/* TOPBAR */
#topbar{height:48px;display:flex;align-items:center;padding:0 20px;gap:12px;
  position:fixed;top:0;left:0;right:0;z-index:20;
  background:rgba(0,0,0,0.25);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.08);}
.logo{font-family:var(--font-h);font-size:.95rem;font-weight:800;letter-spacing:.5px;}
.logo-aksent{color:var(--aksent);}
#opp-teller-top{font-size:.7rem;color:var(--dim);font-family:var(--font-m);}
.spacer{flex:1;}
.tbtn{font-size:.7rem;color:var(--dim);text-decoration:none;
  padding:5px 11px;border:1px solid rgba(255,255,255,0.15);border-radius:20px;
  transition:all .15s;}
.tbtn:hover{color:var(--text);border-color:rgba(255,255,255,0.35);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:28px;text-align:center;}

.i-merke{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--aksent);background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);padding:5px 16px;border-radius:20px;}
.i-ikon{font-size:3.5rem;margin:4px 0;}
.i-tittel{font-family:var(--font-h);font-size:2.2rem;font-weight:900;line-height:1.1;}
.i-tittel span{color:var(--aksent);}
.i-sub{font-size:.92rem;color:var(--dim);max-width:420px;line-height:1.7;}

.antall-rad{display:flex;gap:8px;align-items:center;margin-top:4px;}
.antall-label{font-size:.8rem;color:var(--dim);}
.n-btn{padding:7px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.2);
  background:transparent;color:var(--text);cursor:pointer;
  font-family:var(--font-h);font-size:.82rem;font-weight:700;transition:all .15s;}
.n-btn:hover,.n-btn.ak{background:var(--aksent);border-color:var(--aksent);color:#fff;}

.start-knapp{padding:14px 52px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--font-h);font-size:1.1rem;font-weight:900;
  background:var(--aksent);color:#fff;letter-spacing:.3px;
  box-shadow:0 8px 32px rgba(0,0,0,0.35);transition:all .18s;}
.start-knapp:hover{filter:brightness(1.15);transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,.4);}

/* SPILLSKJERM */
#spill{position:fixed;inset:0;top:48px;display:none;flex-direction:column;}

/* Progresjonsbjelke */
#prog-wrap{height:4px;background:rgba(255,255,255,0.1);flex-shrink:0;}
#prog-bar{height:100%;background:var(--aksent);transition:width .15s linear;}

/* Timer og poeng */
#meta-rad{display:flex;align-items:center;gap:14px;padding:10px 20px;
  flex-shrink:0;background:rgba(0,0,0,0.15);}
#tid-sirkel-wrap{position:relative;width:42px;height:42px;flex-shrink:0;}
#tid-sirkel{transform:rotate(-90deg);}
#tid-ring{transition:stroke-dashoffset .1s linear;}
#tid-tall{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-m);font-size:.85rem;font-weight:500;}
.meta-spacer{flex:1;}
#poeng-boks{font-family:var(--font-h);font-size:1rem;font-weight:800;
  background:rgba(255,255,255,0.1);padding:5px 14px;border-radius:20px;}

/* Spørsmål */
#spm-wrap{flex:1;display:flex;align-items:center;justify-content:center;
  padding:16px 24px 8px;overflow:hidden;}
#spm-inner{max-width:720px;width:100%;}
#spm-kat-linje{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
#spm-kat{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;
  color:var(--aksent);font-weight:700;}
#spm-tekst{font-family:var(--font-h);font-size:clamp(1.05rem,2.6vw,1.6rem);
  font-weight:700;line-height:1.5;color:var(--text);}

/* Svar — horisontal liste, ikke 2x2 grid ─────────────────────── */
#svar-liste{display:flex;flex-direction:column;gap:8px;
  padding:8px 20px 16px;flex-shrink:0;}
.svar-kort{display:flex;align-items:center;gap:14px;
  background:var(--kort-bg);border:1.5px solid var(--kort-border);
  border-radius:10px;padding:12px 16px;cursor:pointer;
  transition:all .15s;text-align:left;}
.svar-kort:hover:not(:disabled){background:rgba(255,255,255,0.12);
  border-color:rgba(255,255,255,0.3);transform:translateX(4px);}
.svar-kort:disabled{cursor:default;}
.svar-nummer{font-family:var(--font-m);font-size:.78rem;
  min-width:24px;height:24px;border-radius:6px;
  background:rgba(255,255,255,0.12);display:flex;align-items:center;
  justify-content:center;color:var(--dim);font-weight:500;flex-shrink:0;}
.svar-tekst{font-family:var(--font-h);font-size:clamp(.82rem,1.8vw,1rem);
  font-weight:700;line-height:1.35;color:var(--text);}
.svar-kort.rett{background:rgba(52,211,153,0.2);border-color:#34d399;}
.svar-kort.rett .svar-nummer{background:#34d399;color:#000;}
.svar-kort.feil{opacity:0.35;}
.svar-kort.valgt-feil{background:rgba(248,113,113,0.15);border-color:#f87171;opacity:1;}
.svar-kort.valgt-feil .svar-nummer{background:#f87171;color:#fff;}

/* Feedback-stripe */
#fb-stripe{height:0;overflow:hidden;transition:height .2s;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-h);font-size:.88rem;font-weight:700;flex-shrink:0;}
#fb-stripe.vis{height:38px;}
#fb-stripe.ok{background:rgba(52,211,153,0.15);color:#34d399;}
#fb-stripe.feil{background:rgba(248,113,113,0.12);color:#f87171;}

/* Sluttskjerm */
#slutt{display:none;position:fixed;inset:0;z-index:50;
  background:var(--bg);flex-direction:column;align-items:center;
  justify-content:center;gap:14px;text-align:center;padding:24px;}
.slutt-emoji{font-size:4rem;}
.slutt-tittel{font-family:var(--font-h);font-size:2rem;font-weight:900;}
.slutt-sub{font-size:.92rem;color:var(--dim);}
#toppliste{max-width:360px;width:100%;margin:4px 0;}
.tr{display:flex;align-items:center;gap:12px;padding:9px 13px;
  background:rgba(255,255,255,.07);border-radius:9px;margin-bottom:5px;
  border:1px solid rgba(255,255,255,.08);font-size:.86rem;}
.tr-p{font-family:var(--font-h);font-weight:800;width:22px;color:var(--dim);}
.tr-i{flex:1;color:var(--dim);font-size:.78rem;}
.tr-s{font-family:var(--font-h);font-weight:800;color:var(--aksent);}
.slutt-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.s-btn{padding:12px 28px;border-radius:10px;border:none;cursor:pointer;
  font-family:var(--font-h);font-size:.9rem;font-weight:800;transition:all .15s;}
.s-btn.hoved{background:var(--aksent);color:#fff;}
.s-btn.sekundær{background:rgba(255,255,255,.1);color:var(--text);
  border:1.5px solid rgba(255,255,255,.2);}
.s-btn:hover{filter:brightness(1.12);}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo"><span class="logo-aksent">🔬 </span>Naturfagquiz</div>
  <span id="opp-teller-top"></span>
  <div class="spacer"></div>
  <a href="spill_hub.html" class="tbtn">← Hub</a>
</div>

<div id="intro">
  <div class="i-merke">🔬 Naturfag · SkapLab</div>
  <div class="i-ikon">🔬</div>
  <h1 class="i-tittel"><span>Naturf</span>agquiz</h1>
  <p class="i-sub">Les beskrivelsen og velg riktig begrep eller vitenskapsperson. Jo raskere du svarer, jo mer poeng!</p>
  <div class="antall-rad">
    <span class="antall-label">Antall spørsmål:</span>
    <button class="n-btn" onclick="velgN(10,this)">10</button>
    <button class="n-btn ak" onclick="velgN(20,this)">20</button>
    <button class="n-btn" onclick="velgN(30,this)">30</button>
  </div>
  <button class="start-knapp" onclick="startSpill()">Start quiz ▶</button>
</div>

<div id="spill">
  <div id="prog-wrap"><div id="prog-bar" style="width:100%"></div></div>
  <div id="meta-rad">
    <div id="tid-sirkel-wrap">
      <svg id="tid-sirkel" width="42" height="42" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="17" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
        <circle id="tid-ring" cx="21" cy="21" r="17" fill="none"
          stroke="#34d399" stroke-width="3"
          stroke-dasharray="107" stroke-dashoffset="0"
          stroke-linecap="round"/>
      </svg>
      <div id="tid-tall">15</div>
    </div>
    <span id="spm-kat"></span>
    <div class="meta-spacer"></div>
    <div id="poeng-boks">⭐ 0</div>
  </div>
  <div id="spm-wrap">
    <div id="spm-inner">
      <div id="spm-tekst"></div>
    </div>
  </div>
  <div id="fb-stripe"></div>
  <div id="svar-liste">
    <button class="svar-kort" onclick="svar(0)" id="sk0">
      <span class="svar-nummer">A</span>
      <span class="svar-tekst" id="a0"></span>
    </button>
    <button class="svar-kort" onclick="svar(1)" id="sk1">
      <span class="svar-nummer">B</span>
      <span class="svar-tekst" id="a1"></span>
    </button>
    <button class="svar-kort" onclick="svar(2)" id="sk2">
      <span class="svar-nummer">C</span>
      <span class="svar-tekst" id="a2"></span>
    </button>
    <button class="svar-kort" onclick="svar(3)" id="sk3">
      <span class="svar-nummer">D</span>
      <span class="svar-tekst" id="a3"></span>
    </button>
  </div>
</div>

<div id="slutt">
  <div class="slutt-emoji" id="slutt-emoji"></div>
  <div class="slutt-tittel" id="slutt-tittel"></div>
  <div class="slutt-sub" id="slutt-sub"></div>
  <div id="toppliste"></div>
  <div class="slutt-btns">
    <button class="s-btn hoved" onclick="startSpill()">🔄 Spill igjen</button>
    <button class="s-btn sekundær" onclick="location.href='spill_hub.html'">🏠 Hub</button>
  </div>
</div>

var antall=20, spørsmål=[], spmNr=0, poeng=0;
var tidGjenstår=15, MAX_TID=15, timerInt=null, harSvart=false, autoTim=null;
var LS_NØKKEL='skaplab_naturfagquiz';

function velgN(n,el){antall=n;document.querySelectorAll('.n-btn').forEach(function(b){b.classList.remove('ak');});el.classList.add('ak');}

function startSpill(){
  spørsmål=DATA.slice().sort(function(){return Math.random()-.5;}).slice(0,Math.min(antall,DATA.length));
  spmNr=0;poeng=0;
  document.getElementById('poeng-boks').textContent='⭐ 0';
  document.getElementById('intro').style.display='none';
  document.getElementById('slutt').style.display='none';
  document.getElementById('spill').style.display='flex';
  visSpørsmål();
}

function visSpørsmål(){
  if(spmNr>=spørsmål.length){visSlutt();return;}
  harSvart=false;
  var q=spørsmål[spmNr];
  var alts=lagAlts(q);

  document.getElementById('spm-tekst').textContent=q.d;
  document.getElementById('spm-kat').textContent=q.kat;
  document.getElementById('opp-teller-top').textContent=(spmNr+1)+' / '+spørsmål.length;

  var prog=(spmNr/spørsmål.length)*100;
  document.getElementById('prog-bar').style.width=prog+'%';

  var fb=document.getElementById('fb-stripe');
  fb.className='';fb.textContent='';

  for(var i=0;i<4;i++){
    var sk=document.getElementById('sk'+i);
    sk.disabled=false;
    sk.className='svar-kort';
    document.getElementById('a'+i).textContent=alts[i].t;
    sk.dataset.r=alts[i].riktig?'1':'0';
  }
  startTimer();
}

function lagAlts(q){
  var samme=DATA.filter(function(k){return k.t!==q.t&&k.kat===q.kat;}).sort(function(){return Math.random()-.5;}).slice(0,3);
  var gale=samme;
  if(gale.length<3) gale=gale.concat(DATA.filter(function(k){return k.t!==q.t&&k.kat!==q.kat;}).sort(function(){return Math.random()-.5;}).slice(0,3-gale.length));
  var res=gale.map(function(k){return {t:k.t,riktig:false};}); 
  res.splice(Math.floor(Math.random()*4),0,{t:q.t,riktig:true});
  return res;
}

function startTimer(){
  tidGjenstår=MAX_TID;
  if(timerInt) clearInterval(timerInt);
  timerInt=setInterval(function(){
    tidGjenstår=Math.max(0,tidGjenstår-0.1);
    var pst=tidGjenstår/MAX_TID;
    var omfang=107;
    document.getElementById('tid-ring').style.strokeDashoffset=(omfang*(1-pst));
    var farge=pst>.5?'#34d399':pst>.25?'#fbbf24':'#f87171';
    document.getElementById('tid-ring').style.stroke=farge;
    document.getElementById('tid-tall').textContent=Math.ceil(tidGjenstår);
    if(tidGjenstår<=0){clearInterval(timerInt);if(!harSvart) tidUtløpt();}
  },100);
}

function svar(idx){
  if(harSvart) return;
  harSvart=true;
  clearInterval(timerInt);
  if(autoTim) clearTimeout(autoTim);
  var sk=document.getElementById('sk'+idx);
  var riktig=sk.dataset.r==='1';
  var bonus=Math.round((tidGjenstår/MAX_TID)*800);
  var opptjent=riktig?200+bonus:0;
  poeng+=opptjent;
  document.getElementById('poeng-boks').textContent='⭐ '+poeng;
  visResultat(riktig,opptjent,idx);
}

function tidUtløpt(){
  harSvart=true;
  merkSvar(-1);
  visFbStripe(false,'⏱ Tiden er ute — '+spørsmål[spmNr].t);
  autoTim=setTimeout(function(){spmNr++;visSpørsmål();},2200);
}

function visResultat(riktig,opptjent,idx){
  merkSvar(idx);
  var q=spørsmål[spmNr];
  if(riktig){
    visFbStripe(true,'✓ Riktig! +'+opptjent+' poeng');
  } else {
    visFbStripe(false,'✗ Feil — riktig svar: '+q.t);
  }
  autoTim=setTimeout(function(){spmNr++;visSpørsmål();},2200);
}

function merkSvar(valgtIdx){
  for(var i=0;i<4;i++){
    var sk=document.getElementById('sk'+i);
    sk.disabled=true;
    if(sk.dataset.r==='1'){sk.classList.add('rett');}
    else if(i===valgtIdx){sk.classList.add('valgt-feil');}
    else{sk.classList.add('feil');}
  }
}

function visFbStripe(ok,tekst){
  var fb=document.getElementById('fb-stripe');
  fb.textContent=tekst;
  fb.className='vis '+(ok?'ok':'feil');
}

function visSlutt(){
  clearInterval(timerInt);
  document.getElementById('spill').style.display='none';
  document.getElementById('slutt').style.display='flex';
  document.getElementById('prog-bar').style.width='100%';
  var maks=spørsmål.length*1000;
  var pst=maks>0?Math.round((poeng/maks)*100):0;
  var e=pst>=80?'🏆':pst>=50?'🎉':'💪';
  document.getElementById('slutt-emoji').textContent=e;
  document.getElementById('slutt-tittel').textContent=pst>=80?'Strålende!':pst>=50?'Bra jobbet!':'Øv mer!';
  document.getElementById('slutt-sub').textContent=poeng+' poeng · '+spørsmål.length+' spørsmål';
  try{
    var lagret=JSON.parse(localStorage.getItem(LS_NØKKEL)||'[]');
    lagret.push({p:poeng,n:spørsmål.length,d:new Date().toLocaleDateString('nb-NO')});
    lagret.sort(function(a,b){return b.p-a.p;}).splice(5);
    localStorage.setItem(LS_NØKKEL,JSON.stringify(lagret));
    var tl=document.getElementById('toppliste');
    tl.innerHTML='<div style="font-size:.68rem;opacity:.4;margin-bottom:8px;">Beste resultater</div>';
    lagret.forEach(function(r,i){
      tl.innerHTML+='<div class="tr"><span class="tr-p">'+(i+1)+'.</span>'
        +'<span class="tr-i">'+r.n+' spm · '+r.d+'</span>'
        +'<span class="tr-s">'+r.p+' p</span></div>';
    });
  }catch(e){}

  // Spor per kategori
  (function() {
    try {
      var katAntall = {};
      spørsmål.forEach(function(q) {
        var kat = q.kat || 'Ukjent';
        if (!katAntall[kat]) katAntall[kat] = 0;
        katAntall[kat]++;
      });
      var kmMap = {'Biologi':'NAT-BIO','Kjemi':'NAT-KJE','Fysikk':'NAT-FYS',
                  'Elektrisitet':'NAT-ELE','Okologi':'NAT-OKO','Teknologi':'NAT-ELE',
                  'Vitenskapsperson':'NAT-BIO'};
