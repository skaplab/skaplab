<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kjemiske reaksjoner – Øving · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#06101e;--surface:#0d1e30;--card:#131f35;--accent:#34d399;--text:#e8f0ff;--dim:#7a90b0;--green:#4ade80;--red:#f87171;--font-h:'Fredoka One',cursive;--font-b:'Nunito',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;padding-bottom:40px;}
nav{display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(255,255,255,0.07);font-size:.82rem;}
nav a{color:var(--dim);text-decoration:none;}nav a:hover{color:var(--text);}
nav span{color:rgba(255,255,255,.2);}
.hero{text-align:center;padding:28px 20px 16px;}
.hero h1{font-family:var(--font-h);font-size:1.7rem;color:var(--accent);margin-bottom:6px;}
.hero p{color:var(--dim);font-size:.88rem;}
.kontroll{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;padding:0 20px 16px;}
.vbtn{padding:5px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--dim);cursor:pointer;font-size:.78rem;font-family:var(--font-b);transition:all .15s;}
.vbtn.aktiv{background:rgba(255,255,255,.08);border-color:var(--accent);color:var(--accent);}
.main{max-width:600px;margin:0 auto;padding:0 16px;}
.oppg-kort{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:22px 24px;margin-bottom:14px;}
.oppg-type{font-size:.72rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.oppg-spm{font-size:1rem;line-height:1.6;margin-bottom:16px;}
.oppg-spm strong{color:var(--accent);}
.svar-rad{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.svar-prefix{font-size:.9rem;color:var(--dim);min-width:20px;}
.svar-input{height:36px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-family:var(--font-h);font-size:1rem;text-align:center;outline:none;padding:0 10px;width:120px;transition:border-color .15s;}
.svar-input:focus{border-color:var(--accent);}
.svar-input.riktig{border-color:var(--green);background:rgba(74,222,128,.08);}
.svar-input.feil{border-color:var(--red);background:rgba(248,113,113,.08);}
.svar-enhet{font-size:.85rem;color:var(--dim);}
.sjekk-btn{padding:7px 20px;background:var(--accent);border:none;border-radius:8px;color:#000;font-weight:700;cursor:pointer;font-family:var(--font-b);font-size:.88rem;margin-top:4px;transition:filter .15s;}
.sjekk-btn:hover{filter:brightness(1.1);}
.sjekk-btn:disabled{opacity:.4;cursor:default;}
.fb{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:.84rem;line-height:1.5;display:none;}
.fb.riktig{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);display:block;}
.fb.feil{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);display:block;}
.ny-btn{margin-top:8px;padding:6px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--dim);cursor:pointer;font-size:.82rem;font-family:var(--font-b);display:none;}
.ny-btn:hover{background:rgba(255,255,255,.12);}
.stats{display:flex;gap:16px;justify-content:center;margin-bottom:16px;font-size:.82rem;}
.stat{text-align:center;}
.stat-n{font-family:var(--font-h);font-size:1.3rem;color:var(--accent);}
.stat-l{color:var(--dim);font-size:.72rem;}
</style>
</head>
<body>
<nav>
  <a href="naturfag_hub.html">🔬 Naturfag</a>
  <span>/</span>
  <a href="kjemiske_reaksjoner.html">Kjemiske reaksjoner</a>
  <span>/</span>
  <span style="color:var(--text)">Øving</span>
</nav>
<div class="hero">
  <h1>⚗️ Kjemiske reaksjoner – Øving</h1>
  <p>Tren på talloppgaver. Ny oppgave for hvert forsøk!</p>
</div>
<div class="kontroll">
  <button class="vbtn aktiv" onclick="settVanskel(1,this)">🟢 Lett</button>
  <button class="vbtn" onclick="settVanskel(2,this)">🟡 Middels</button>
  <button class="vbtn" onclick="settVanskel(3,this)">🔴 Vanskelig</button>
</div>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="st-r">0</div><div class="stat-l">Riktige</div></div>
    <div class="stat"><div class="stat-n" id="st-t">0</div><div class="stat-l">Forsøk</div></div>
    <div class="stat"><div class="stat-n" id="st-p">–</div><div class="stat-l">Nøyaktighet</div></div>
  </div>
  <div id="oppg-wrap"></div>
</div>
<script>

// ── SKAPLAB SPORING ──────────────────────────────────────────────
(function() {
  try {
    var _elev = null;
    try { _elev = JSON.parse(localStorage.getItem('skaplab_elev')); } catch(e) {}
    window._skaplab_logg = function(ressurs, km_kode, score_pst, antall, riktige, fullfort_ant, totalt_ant) {
      if (!_elev || !_elev.id) return;
      fetch('https://cqzmzsqhuawpsvnjjzse.supabase.co/rest/v1/aktivitet', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j',
          'Authorization': 'Bearer sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j'
        },
        body: JSON.stringify({
          elev_id: _elev.id,
          ressurs: ressurs,
          km_kode: km_kode,
          score_pst: Math.round(score_pst || 0),
          antall_oppgaver: antall || null,
          riktige: riktige || null,
          fullfort_antall: fullfort_ant || null,
          totalt_antall: totalt_ant || null
        })
      }).catch(function() {});
    };
  } catch(e) {}
})();
// ─────────────────────────────────────────────────────────────────
var vanskel=1,riktige=0,totalt=0;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function fmt(n){return Number.isInteger(n)?String(n):n.toFixed(2).replace('.',',');}


function lagOppgave() {
  var typer = vanskel===1 ? ['koeff_enkel','mol_enkel'] :
              vanskel===2 ? ['koeff_enkel','mol_enkel','molvekt','mol_beregn'] :
                            ['koeff_enkel','mol_enkel','molvekt','mol_beregn','masse_fra_mol'];
  var type = typer[rnd(0,typer.length-1)];
  var REAKSJONER = [
    {ligning:'2 H₂ + O₂ → 2 H₂O', sp:'O₂', koeff:1, steg:'Koeffisient foran O₂ er 1 (uskrevet = 1)'},
    {ligning:'N₂ + 3 H₂ → 2 NH₃', sp:'H₂', koeff:3, steg:'Koeffisient foran H₂ er 3'},
    {ligning:'CH₄ + 2 O₂ → CO₂ + 2 H₂O', sp:'O₂', koeff:2, steg:'Koeffisient foran O₂ er 2'},
    {ligning:'2 Na + 2 H₂O → 2 NaOH + H₂', sp:'Na', koeff:2, steg:'Koeffisient foran Na er 2'},
    {ligning:'2 HCl + Ca → CaCl₂ + H₂', sp:'HCl', koeff:2, steg:'Koeffisient foran HCl er 2'},
    {ligning:'4 Fe + 3 O₂ → 2 Fe₂O₃', sp:'O₂', koeff:3, steg:'Koeffisient foran O₂ er 3'},
  ];
  var MOLVEKTER = [
    {stoff:'H₂O', mv:18, steg:'H₂O: 2×1 + 16 = 18 g/mol'},
    {stoff:'CO₂', mv:44, steg:'CO₂: 12 + 2×16 = 44 g/mol'},
    {stoff:'NaCl', mv:58, steg:'NaCl: 23 + 35 = 58 g/mol'},
    {stoff:'NH₃', mv:17, steg:'NH₃: 14 + 3×1 = 17 g/mol'},
    {stoff:'O₂', mv:32, steg:'O₂: 2×16 = 32 g/mol'},
    {stoff:'H₂', mv:2, steg:'H₂: 2×1 = 2 g/mol'},
    {stoff:'HCl', mv:36, steg:'HCl: 1 + 35 = 36 g/mol'},
    {stoff:'CaCO₃', mv:100, steg:'CaCO₃: 40 + 12 + 3×16 = 100 g/mol'},
  ];
  if (type==='koeff_enkel') {
    var r = REAKSJONER[rnd(0,REAKSJONER.length-1)];
    return {
      type:'Koeffisienter', enhet:'',
      spm:'I reaksjonen <strong>'+r.ligning+'</strong>, hva er koeffisienten foran <strong>'+r.sp+'</strong>?',
      fasit:r.koeff, steg:r.steg
    };
  }
  if (type==='mol_enkel') {
    var mol = rnd(1,5);
    var m = MOLVEKTER[rnd(0,MOLVEKTER.length-1)];
    return {
      type:'Mol → gram', enhet:'g',
      spm:'Molvekten til <strong>'+m.stoff+'</strong> er '+m.mv+' g/mol. Hva veier <strong>'+mol+' mol</strong>?',
      fasit:mol*m.mv, steg:mol+' mol × '+m.mv+' g/mol = '+(mol*m.mv)+' g'
    };
  }
  if (type==='molvekt') {
    var m2 = MOLVEKTER[rnd(0,MOLVEKTER.length-1)];
    return {
      type:'Molvekt', enhet:'g/mol',
      spm:'Hva er molvekten til <strong>'+m2.stoff+'</strong>?',
      fasit:m2.mv, steg:m2.steg
    };
  }
  if (type==='mol_beregn') {
    var masse = rnd(1,10);
    var m3 = MOLVEKTER[rnd(0,MOLVEKTER.length-1)];
    var mol2 = masse*m3.mv;
    return {
      type:'Gram → mol', enhet:'g/mol · mol = g',
      spm:'Molvekten til '+m3.stoff+' er '+m3.mv+' g/mol. Hvor mange gram er <strong>'+masse+' mol</strong>?',
      fasit:mol2, steg:masse+' × '+m3.mv+' = '+mol2+' g'
    };
  }
  // masse_fra_mol
  var m4 = MOLVEKTER[rnd(0,3)];
  var gram = m4.mv * rnd(1,3);
  var mol3 = gram/m4.mv;
  return {
    type:'Gram → mol', enhet:'mol',
    spm:'Molvekten til <strong>'+m4.stoff+'</strong> er '+m4.mv+' g/mol. Hvor mange mol er <strong>'+gram+' g</strong>?',
    fasit:mol3, toleranse:0.01, steg:gram+' g ÷ '+m4.mv+' g/mol = '+mol3+' mol'
  };
}

function settVanskel(v,btn){
  vanskel=v;
  document.querySelectorAll('.vbtn').forEach(function(b){b.classList.remove('aktiv');});
  btn.classList.add('aktiv');
  nyOppgave();
}

function nyOppgave(){
  var o=lagOppgave();
  var wrap=document.getElementById('oppg-wrap');
  wrap.innerHTML='';
  var div=document.createElement('div');
  div.className='oppg-kort';
  var fasitStr=fmt(o.fasit);
  div.innerHTML=
    '<div class="oppg-type">'+o.type+'</div>'+
    '<div class="oppg-spm">'+o.spm+'</div>'+
    '<div class="svar-rad">'+
    (o.prefix?'<span class="svar-prefix">'+o.prefix+'</span>':'')+
    '<input class="svar-input" id="inp" type="text" placeholder="?" autocomplete="off">'+
    (o.enhet?'<span class="svar-enhet">'+o.enhet+'</span>':'')+
    '</div>'+
    '<button class="sjekk-btn" id="sjekk-btn" onclick="sjekk()">Sjekk svar</button>'+
    '<div class="fb" id="fb"></div>'+
    '<button class="ny-btn" id="ny-btn" onclick="nyOppgave()">🎲 Ny oppgave</button>';
  wrap.appendChild(div);
  document.getElementById('inp').focus();
  document.getElementById('inp').onkeydown=function(e){if(e.key==='Enter')sjekk();};
  wrap._oppg=o;
}

function sjekk(){
  var o=wrap._oppg; if(!o)return;
  var wrap=document.getElementById('oppg-wrap');
  var inp=document.getElementById('inp');
  var fb=document.getElementById('fb');
  var v=inp.value.trim().replace(',','.');
  var fasit=o.fasit;
  var fasitNum=parseFloat(String(fasit).replace(',','.'));
  var ok;
  if(!isNaN(fasitNum)){
    var tol=o.toleranse||0.05;
    var vNum=parseFloat(v);
    ok=!isNaN(vNum)&&Math.abs(vNum-fasitNum)<=Math.max(tol,Math.abs(fasitNum)*0.01);
  }else{
    ok=v.toLowerCase()===String(fasit).toLowerCase();
  }
  totalt++;
  if(ok) riktige++;
  inp.className='svar-input '+(ok?'riktig':'feil');
  inp.disabled=true;
  document.getElementById('sjekk-btn').disabled=true;
  fb.className='fb '+(ok?'riktig':'feil');
  fb.innerHTML=ok?('✓ Riktig! '+fmt(fasit)+(o.enhet?' '+o.enhet:'')+'<br><span style="font-size:.8rem;opacity:.8">'+o.steg+'</span>'):('✗ Fasit: <strong>'+fmt(fasit)+(o.enhet?' '+o.enhet:'')+'</strong><br><span style="font-size:.8rem;opacity:.8">'+o.steg+'</span>');
  document.getElementById('ny-btn').style.display='inline-block';
  oppdaterStats();
  wrap._oppg=o;
}

function oppdaterStats(){
  document.getElementById('st-r').textContent=riktige;
  document.getElementById('st-t').textContent=totalt;
  document.getElementById('st-p').textContent=totalt>0?Math.round(riktige/totalt*100)+'%':'–';
}

window.onload=function(){nyOppgave();};
</script>
</body>
</html>
