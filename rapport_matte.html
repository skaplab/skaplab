<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>

async function init() {
  if (!elevId) { document.getElementById('rapport').innerHTML='<p style="padding:40px;text-align:center;">Ingen elev valgt.</p>'; return; }

  // Hent elev
  var eR = await SkapLab._get('/elever?id=eq.'+elevId+'&select=fullt_navn,innloggingskode,klasser(navn,skoler(navn))', token);
  var elev = eR && eR[0];
  if (!elev) return;

  // Les vurderinger fra sessionStorage (satt av elev_detalj) + Supabase
  try {
    var cached = JSON.parse(sessionStorage.getItem('skaplab_rapport_vurd') || 'null');
    var cachedMerk = JSON.parse(sessionStorage.getItem('skaplab_rapport_merk') || 'null');
    if (cachedMerk && typeof cachedMerk === 'object') Object.assign(merkander, cachedMerk);
    if (cached && typeof cached === 'object') {
      Object.assign(vurd, cached);
      console.log('Vurderinger fra cache:', Object.keys(vurd).length);
    }
  } catch(e) {}

  // Hent fra Supabase (oppdaterer med lagrede verdier)
  try {
    var vR = await SkapLab._get(
      '/vurderinger?elev_id=eq.'+elevId+'&laerer_id=eq.'+lid+'&select=km_kode,nivaa,merknad',
      token);
    console.log('Vurderinger fra Supabase:', Array.isArray(vR) ? vR.length : 'feil', vR);
    if (Array.isArray(vR)) vR.forEach(function(v) {
      if (v.nivaa)   vurd[v.km_kode]     = v.nivaa;
      if (v.merknad) merkander[v.km_kode] = v.merknad;
    });
  } catch(e) { console.warn('Supabase-henting feilet:', e); }

  // Hent karakter
  var kR = await SkapLab._get('/karakterer?elev_id=eq.'+elevId+'&laerer_id=eq.'+lid+'&fag=eq.Matematikk', token);
  if (kR && kR[0] && kR[0].tallkarakter) tallkar = kR[0].tallkarakter;

  byggRapport(elev);
  document.getElementById('laster').style.display = 'none';
  oppdaterTeller();
}

function byggRapport(elev) {
  var dato = new Date().toLocaleDateString('nb-NO', {year:'numeric',month:'long',day:'numeric'});
  var skole = elev.klasser&&elev.klasser.skoler ? elev.klasser.skoler.navn : '';
  var klasse = elev.klasser ? elev.klasser.navn : '';

  var html = '<div class="rhdr">'
    +'<div class="rtit">📐 Matematikk – Kompetanserapport</div>'
    +'<div class="rmeta"><strong>'+elev.fullt_navn+'</strong>'
    +(klasse?' · '+klasse:'')+(skole?' · '+skole:'')+'<br>'+dato+'</div>'
    +'</div>';

  ['8','9','10'].forEach(function(trinn) {
    html += '<div class="trinn-seksjon" id="trinn-sek-'+trinn+'">';
    html += '<div class="trinn-tittel">'+trinn+'. trinn</div>';

    var kategoriSett = {};
    KMF_MAT[trinn].forEach(function(km) {
      if (!kategoriSett[km[1]]) kategoriSett[km[1]] = [];
      kategoriSett[km[1]].push(km);
    });

    Object.keys(kategoriSett).forEach(function(kat) {
      html += '<div class="kat-tittel">'+kat.charAt(0).toUpperCase()+kat.slice(1)+'</div>';
      kategoriSett[kat].forEach(function(km) {
        var n = vurd[km[0]] || 'ikke_gjort';
        var ikon = n==='hoy'?'🟢':n==='middels'?'🟡':n==='lav'?'🔴':'⚪';
        var nvLabel = n==='hoy'?'Høy kompetanse':n==='middels'?'Middels kompetanse':n==='lav'?'Lav kompetanse':'Ikke vurdert';
        var tips = TIPS[km[0]]&&TIPS[km[0]][n] ? TIPS[km[0]][n] : '';
        var merk = merkander[km[0]] || '';

        html += '<div class="kk '+n+(n!=="ikke_gjort"?"":" skjult")+" id=\"kk-"+km[0]+"\">"
          +'<div class="kk-velger">'
          +'<input type="checkbox" class="kk-check" '+(n!=="ikke_gjort"?"checked":"")+' onchange="toggleKM(this)" data-kode="'+km[0]+'" title="Ta med i utskrift">'
          +'<div style="flex:1">'
          +'<div class="kk-hdr"><span class="kk-kode">'+km[0]+'</span>'
          +'<span class="kk-tekst">Eleven skal kunne '+km[2]+'</span>'
          +'<span class="kk-nivaa" style="color:'+(n==='hoy'?'var(--gron)':n==='middels'?'var(--gul)':n==='lav'?'var(--rod)':'var(--dim)')+'">'  +ikon+' '+nvLabel+'</span>'
          +'</div>'
          +(tips?'<div class="kk-tips kk-tips-vis">Anbefalt: '+tips+'</div>':'')
          +(merk?'<div class="kk-fritekst-label">Laerers tilbakemelding</div><div class="kk-fritekst">'+merk+'</div>':'')
          +'</div></div></div>';
      });
    });
    html += '</div>';
  });

  // Karakter
  html += '<div class="karboks" id="kb">'
    +'<div><div class="kar-lbl">Samlet karakter – Matematikk</div>'
    +'<div class="kar-vv">'
    +[1,2,3,4,5,6].map(function(t){return '<button class="kb'+(tallkar===t?' ak':'')+'" onclick="velgKar('+t+',this)">'+t+'</button>';}).join('')
    +'<button style="padding:0 10px;height:34px;background:transparent;border:1.5px solid var(--border);color:var(--dim);border-radius:7px;cursor:pointer;font-size:.74rem;margin-left:6px;" onclick="lagreKar()">Lagre</button>'
    +'</div></div>'
    +'<div class="kar-stor" id="ks">'+(tallkar||'—')+'</div>'
    +'</div>';

  document.getElementById('rapport').innerHTML = html;
}

function visTrinn(trinn, el) {
  aktivTrinn = trinn;
  document.querySelectorAll('.trinn-btn').forEach(function(b){b.classList.remove('ak');});
  el.classList.add('ak');
  ['8','9','10'].forEach(function(t) {
    var d = document.getElementById('trinn-sek-'+t);
    if (d) d.style.display = (trinn==='alle'||trinn===t) ? 'block' : 'none';
  });
}

function velgKar(t, el) {
  tallkar = t;
  document.querySelectorAll('.kb').forEach(function(b){b.classList.remove('ak');});
  el.classList.add('ak');
  document.getElementById('ks').textContent = t;
}

async function lagreKar() {
  if (!tallkar) return;
  await fetch(SkapLab.SUPABASE_URL+'/rest/v1/karakterer', {
    method:'POST',
    headers:Object.assign(SkapLab._hdr(token),{'Prefer':'resolution=merge-duplicates'}),
    body: JSON.stringify({elev_id:elevId,laerer_id:lid,fag:'Matematikk',tallkarakter:tallkar})
  });
  var ks = document.getElementById('ks');
  if (ks) { ks.style.color='var(--gron)'; setTimeout(function(){ks.style.color='';},1500); }
}


function toggleKM(kode, vis) {
  var el = document.getElementById('kk-'+kode);
  if (!el) return;
  if (vis) el.classList.remove('skjult');
  else     el.classList.add('skjult');
  oppdaterTeller();
}

function velgAlle(vis) {
  document.querySelectorAll('.kk-check').forEach(function(cb) {
    cb.checked = vis;
    var kode = cb.closest('.kk') && cb.closest('.kk').id.replace('kk-','');
    if (kode) toggleKM(kode, vis);
  });
}

function oppdaterTeller() {
  var alle  = document.querySelectorAll('.kk').length;
  var synlig = document.querySelectorAll('.kk:not(.skjult)').length;
  var el = document.getElementById('km-teller');
  if (el) el.textContent = synlig + '/' + alle + ' KM';
}
