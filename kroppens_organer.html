<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Kroppens organer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080d;--surface:#0c1018;--border:rgba(255,255,255,.07);
  --text:#e8eaf0;--dim:#5a6070;
  --accent:#7dd3fc;--warm:#fbbf24;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
html{height:100%}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-b);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 80% at 50% 50%, rgba(125,211,252,.025) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 15% 20%, rgba(251,191,36,.015) 0%, transparent 55%);
}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:300;
  background:rgba(6,8,13,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 28px;display:flex;align-items:center;gap:12px;
}
.nav-lnk{font-family:var(--font-b);font-size:.82rem;font-weight:500;color:var(--dim);text-decoration:none;letter-spacing:.02em}
.nav-lnk:hover{color:var(--text)}.nav-sep{color:var(--border)}
.nav-tittel{font-family:var(--font-d);font-size:.9rem;color:var(--accent)}

/* ── LAYOUT ── */
.layout{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:1fr minmax(300px,420px) 1fr;
  grid-template-rows:auto 1fr;
  min-height:calc(100vh - 49px);
  max-width:1400px;margin:0 auto;
  padding:0 20px 60px;
  gap:0 24px;
}

/* ── HEADER ── */
.header{
  grid-column:1/-1;
  text-align:center;
  padding:36px 20px 24px;
}
.header h1{
  font-family:var(--font-d);
  font-size:clamp(1.8rem,3.5vw,2.8rem);
  font-weight:700;letter-spacing:-.02em;
  margin-bottom:8px;
}
.header h1 em{font-style:italic;color:var(--accent)}
.header-sub{font-size:.88rem;color:var(--dim);letter-spacing:.02em}

/* ── SIDEPANELER ── */
.side-panel{
  padding:20px 0;
  display:flex;flex-direction:column;gap:8px;
  align-self:start;
  position:sticky;top:70px;
}
.organ-knapp{
  font-family:var(--font-b);font-size:.78rem;font-weight:500;
  padding:8px 14px;border-radius:10px;
  border:1px solid var(--border);background:rgba(255,255,255,.02);
  color:var(--dim);cursor:pointer;text-align:left;
  transition:all .2s;letter-spacing:.01em;
  display:flex;align-items:center;gap:8px;
}
.organ-knapp:hover{border-color:rgba(125,211,252,.3);color:var(--text);background:rgba(125,211,252,.04)}
.organ-knapp.aktiv{border-color:var(--farge,var(--accent));color:var(--farge,var(--accent));background:rgba(125,211,252,.06)}
.organ-knapp .dot{width:7px;height:7px;border-radius:50%;background:var(--farge,var(--accent));flex-shrink:0;opacity:.7}
.organ-knapp.aktiv .dot{opacity:1;box-shadow:0 0 6px var(--farge,var(--accent))}

/* ── KROPP-SEKSJON ── */
.kropp-seksjon{
  display:flex;flex-direction:column;align-items:center;gap:0;
}

/* ── INFO-PANEL ── */
.info-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:24px;
  width:100%;
  max-width:420px;
  margin-top:16px;
  transition:all .3s;
  min-height:160px;
  position:relative;overflow:hidden;
}
.info-panel::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,var(--panel-glow,rgba(125,211,252,.04)),transparent);
  pointer-events:none;
}
.info-panel-tom{
  display:flex;align-items:center;justify-content:center;
  height:120px;color:var(--dim);font-size:.85rem;letter-spacing:.04em;
  text-transform:uppercase;
}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.info-emoji{font-size:2.2rem;line-height:1}
.info-navn{font-family:var(--font-d);font-size:1.4rem;font-weight:700;color:var(--organ-farge,var(--accent))}
.info-latin{font-size:.78rem;color:var(--dim);font-style:italic;margin-top:1px}
.info-divider{height:1px;background:var(--border);margin:0 0 16px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.info-kort{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:12px;padding:11px 13px;
}
.info-kort-label{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.info-kort-verdi{font-size:.82rem;font-weight:500;color:var(--text);line-height:1.4}
.info-tekst{font-size:.83rem;line-height:1.7;color:rgba(232,234,240,.8)}
.info-fakta{
  margin-top:12px;padding:10px 13px;
  background:rgba(255,255,255,.02);border-left:3px solid var(--organ-farge,var(--accent));
  border-radius:0 8px 8px 0;font-size:.8rem;line-height:1.6;color:var(--dim);
}

/* ── SVG KROPP ── */
.kropp-svg-wrap{
  position:relative;
  width:100%;max-width:380px;
}
.kropp-svg{width:100%;height:auto;display:block}

/* Organ-klikk-flater */
.organ-hotspot{
  cursor:pointer;
  transition:all .25s;
}
.organ-hotspot:hover .organ-fill{
  filter:brightness(1.4) saturate(1.3);
}
.organ-hotspot.aktiv .organ-fill{
  filter:brightness(1.6) saturate(1.5) drop-shadow(0 0 8px currentColor);
}

/* Pulserende animasjoner */
@keyframes puls-hjerte{
  0%,100%{transform:scale(1)}
  15%{transform:scale(1.06)}
  30%{transform:scale(1)}
  45%{transform:scale(1.04)}
  60%{transform:scale(1)}
}
@keyframes puls-lunge{
  0%,100%{transform:scaleX(1) scaleY(1)}
  50%{transform:scaleX(1.04) scaleY(1.05)}
}
@keyframes glow-fade{
  0%,100%{opacity:.5}50%{opacity:.9}
}
.puls-hjerte{
  transform-origin:50% 50%;
  animation:puls-hjerte 1.0s ease-in-out infinite;
}
.puls-lunge{
  transform-origin:50% 50%;
  animation:puls-lunge 3.2s ease-in-out infinite;
}
.glow{animation:glow-fade 3s ease-in-out infinite}

/* Etikett-linjer */
.etikett-linje{stroke:rgba(255,255,255,.12);stroke-width:1;stroke-dasharray:3 4}
.etikett-tekst{font-family:'DM Sans',sans-serif;font-size:10px;fill:rgba(255,255,255,.35);font-weight:500}

/* Tooltip */
.tooltip{
  position:absolute;
  background:rgba(12,16,24,.95);
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:6px 10px;
  font-size:.75rem;color:var(--text);
  pointer-events:none;white-space:nowrap;
  transform:translate(-50%,-100%) translateY(-8px);
  transition:opacity .15s;
  z-index:10;
}

@media(max-width:900px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto}
  .side-panel{flex-direction:row;flex-wrap:wrap;position:static;padding:0 0 8px}
  .organ-knapp{padding:6px 10px;font-size:.72rem}
  .header{padding:24px 12px 16px}
  .kropp-svg-wrap{max-width:300px}
}
</style>
</head>

let aktivOrgan = null;

function velgOrgan(id){
  aktivOrgan = id;
  const data = ORGANER[id];
  if(!data) return;

  // Oppdater alle knapper
  document.querySelectorAll('.organ-knapp').forEach(b=>{
    const onclick = b.getAttribute('onclick');
    if(onclick && onclick.includes(`'${id}'`)){
      b.classList.add('aktiv');
    } else {
      b.classList.remove('aktiv');
    }
  });

  // Oppdater SVG-glød
  document.querySelectorAll('.organ-hotspot').forEach(g=>{
    g.classList.remove('aktiv');
  });
  // Finn alle hotspots for dette organet
  ['hot-'+id].forEach(hid=>{
    const el = document.getElementById(hid);
    if(el) el.classList.add('aktiv');
  });
  // Håndter special cases (to nyrer, to lunger)
  if(id==='nyre_v'||id==='nyre_h'){
    document.querySelectorAll('[id^="hot-nyre"]').forEach(el=>el.classList.add('aktiv'));
  }
  if(id==='lunge_v'||id==='lunge_h'){
    document.querySelectorAll('[id^="hot-lunge"]').forEach(el=>el.classList.add('aktiv'));
  }

  // Flytt aktiv-ring
  const ringPosisjoner = {
    øye:       {cx:145,cy:62,r:16},
    hjerne:    {cx:160,cy:48,r:42},
    spiserør:  {cx:160,cy:112,r:18},
    hjerte:    {cx:152,cy:206,r:24},
    lunge_v:   {cx:122,cy:200,r:32},
    lunge_h:   {cx:198,cy:200,r:32},
    lever:     {cx:194,cy:264,r:30},
    mage:      {cx:138,cy:272,r:24},
    milt:      {cx:114,cy:278,r:20},
    nyre_v:    {cx:112,cy:322,r:18},
    nyre_h:    {cx:208,cy:322,r:18},
    tynntarm:  {cx:156,cy:322,r:32},
    tykktarm:  {cx:160,cy:318,r:55},
    bukspytt:  {cx:155,cy:298,r:20},
    blære:     {cx:160,cy:420,r:28},
  };
  const pos = ringPosisjoner[id]||{cx:160,cy:300,r:30};
  const ring = document.getElementById('aktiv-ring');
  ring.setAttribute('cx',pos.cx);ring.setAttribute('cy',pos.cy);ring.setAttribute('r',pos.r);
  ring.querySelector('animateTransform').setAttribute('from',`0 ${pos.cx} ${pos.cy}`);
  ring.querySelector('animateTransform').setAttribute('to',`360 ${pos.cx} ${pos.cy}`);
  ring.setAttribute('stroke', data.farge);
  ring.setAttribute('opacity','0.6');

  // Bygg info-panel
  document.getElementById('info-tom').style.display='none';
  document.getElementById('info-innhold').style.display='block';
  document.getElementById('info-panel').style.setProperty('--panel-glow', data.farge+'18');
  document.getElementById('info-panel').style.setProperty('--organ-farge', data.farge);

  const kortHTML = data.fakta.map(f=>`
    <div class="info-kort">
      <div class="info-kort-label">${f.label}</div>
      <div class="info-kort-verdi">${f.verdi}</div>
    </div>`).join('');

  document.getElementById('info-innhold').innerHTML = `
    <div class="info-header">
      <span class="info-emoji">${data.emoji}</span>
      <div>
        <div class="info-navn">${data.navn}</div>
        <div class="info-latin">${data.latin}</div>
      </div>
    </div>
    <div class="info-divider"></div>
    <div class="info-grid">${kortHTML}</div>
    <p class="info-tekst">${data.tekst}</p>
    <div class="info-fakta">💡 <strong>Visste du?</strong> ${data.morsomt}</div>
    ${data.utforsk ? `<a href="${data.utforsk}" style="display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:9px 16px;background:rgba(125,211,252,.08);border:1px solid rgba(125,211,252,.25);border-radius:10px;color:#60a5fa;font-size:.78rem;font-weight:600;text-decoration:none;letter-spacing:.04em;transition:all .18s" onmouseover="this.style.background='rgba(125,211,252,.15)'" onmouseout="this.style.background='rgba(125,211,252,.08)'">🔬 Utforsk ${data.navn} i detalj →</a>` : ''}
  `;

  // Scroll til info-panel på mobil
  if(window.innerWidth < 900){
    document.getElementById('info-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

// Tooltip ved hover
document.querySelectorAll('.organ-hotspot').forEach(el=>{
  const id = el.getAttribute('data-organ');
  if(!id) return;
  const data = ORGANER[id];
  if(!data) return;
  const tt = document.getElementById('tooltip');

  el.addEventListener('mouseenter', e=>{
    tt.textContent = data.navn;
    tt.style.opacity = '1';
  });
  el.addEventListener('mousemove', e=>{
    const wrap = document.getElementById('svg-wrap');
    const rect = wrap.getBoundingClientRect();
    tt.style.left = (e.clientX - rect.left) + 'px';
    tt.style.top  = (e.clientY - rect.top) + 'px';
  });
  el.addEventListener('mouseleave', ()=>{
    tt.style.opacity = '0';
  });
});

// Start med hjerte valgt
velgOrgan('hjerte');

// Spor fullfoering ved scroll til bunn
(function() {
  var _sporet = false;
  function sjekkScroll() {
    if (_sporet) return;
    if (window.scrollY + window.innerHeight >= document.body.scrollHeight - 100) {
      _sporet = true;
      window._skaplab_logg('kroppens_organer', 'NAT-BIO', 100, 1, 1, 1, 1);
      window.removeEventListener('scroll', sjekkScroll);
    }
  }
  window.addEventListener('scroll', sjekkScroll);
  setTimeout(function() {
    if (!_sporet) { _sporet=true; window._skaplab_logg('kroppens_organer', 'NAT-BIO', 80, 1, 1, 1, 1); }
  }, 60000);
})();
