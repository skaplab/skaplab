<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      sessionStorage.setItem(SESSION_NØKKEL, JSON.stringify(elev));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = sessionStorage.getItem(SESSION_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });
      if (resp.error) return { ok: false, feil: resp.error.message };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null om det er en feilrespons fra Supabase
      if (parsed && (parsed.error_code || parsed.code === 'invalid_credentials' || !parsed.access_token)) {
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>

async function init(){
  console.log('INIT START, elevId='+elevId+', lid='+lid+', token='+(token?'OK':'MANGLER'));
  try {
    console.log('Steg 1: henter elev...');
    var eR=await SkapLab._get(
      '/elever?id=eq.'+elevId+'&select=fullt_navn,innloggingskode,trenger_hjelp,hjelp_emne,klasser(navn)',token);
    console.log('Steg 1 OK, elev:', eR&&eR[0]?eR[0].fullt_navn:'IKKE FUNNET');
    var elev=eR&&eR[0];
    if(!elev){location.href='laerer_dashboard.html';return;}

    document.getElementById('en').textContent=elev.fullt_navn;
    document.getElementById('ek').textContent=elev.klasser?elev.klasser.navn:'';
    document.getElementById('ekode').textContent='Kode: '+elev.innloggingskode;
    trengerHjelp = window.trengerHjelp = !!(elev.trenger_hjelp);
    hjelpEmne = window.hjelpEmne = elev.hjelp_emne||'';

    console.log('Steg 2: henter aktivitet...');
    var aR=await SkapLab._get('/aktivitet?elev_id=eq.'+elevId+'&order=tidspunkt.desc&limit=100',token);
    console.log('Steg 2 OK, aktiviteter:', Array.isArray(aR)?aR.length:'FEIL');
    akt=Array.isArray(aR)?aR:[];
    akt.forEach(function(a){
      if(!a.km_kode||a.score_pst===null) return;
      if(!kmSc[a.km_kode]) kmSc[a.km_kode]={sum:0,ant:0};
      kmSc[a.km_kode].sum+=a.score_pst; kmSc[a.km_kode].ant++;
    });

    console.log('Steg 3: henter vurderinger...');
    var vR=await SkapLab._get('/vurderinger?elev_id=eq.'+elevId+'&laerer_id=eq.'+lid,token);
    console.log('Steg 3 OK, vurderinger:', Array.isArray(vR)?vR.length:'FEIL');
    if(Array.isArray(vR)) vR.forEach(function(v){vurd[v.km_kode]=v.nivaa;});

    console.log('Steg 4: henter egenvurdering...');
    try {
      var egR=await SkapLab._get('/elev_egenvurdering?elev_id=eq.'+elevId,token);
      console.log('Steg 4 OK');
      if(Array.isArray(egR)) egR.forEach(function(e){egenvurd[e.km_kode]=e.nivaa;});
    } catch(egFeil){ console.warn('Steg 4 feilet (OK):', egFeil.message); }

    console.log('Steg 5: lastMerkander...');
    await lastMerkander();
    console.log('Steg 5 OK');

    console.log('Steg 6: bygger side...');
    byggKM();
    byggAkt();
    await byggTildelt();
    console.log('Steg 6 OK');

    if(trengerHjelp){
      var b=document.getElementById('lys-badge');
      if(b){ b.style.display='inline-flex';
             b.title='Trenger hjelp'+(hjelpEmne?' med: '+hjelpEmne:''); }
    }

    document.getElementById('laster').style.display='none';
    document.getElementById('ei').style.display='block';
    console.log('INIT FERDIG');

  } catch(err) {

  }
}

async function byggTildelt(){
  var tR=await fetch(
    SkapLab.SUPABASE_URL+'/rest/v1/tildeling?elev_id=eq.'+elevId+
    '&select=id,frist,oppgaver(tittel,type,ressurs,url,fag)',
    {headers:{'apikey':SkapLab.SUPABASE_KEY,'Authorization':'Bearer '+token}}
  ).then(function(r){return r.json();}).catch(function(){return [];});
  var tildelt=Array.isArray(tR)?tR:[];
  
  // Finn også klasse-tildelinger
  var eInfo=await SkapLab._get('/elever?id=eq.'+elevId+'&select=klasse_id',token);
  var klasseId=eInfo&&eInfo[0]&&eInfo[0].klasse_id;
  if(klasseId){
    var kR=await fetch(
      SkapLab.SUPABASE_URL+'/rest/v1/tildeling?klasse_id=eq.'+klasseId+
      '&select=id,frist,oppgaver(tittel,type,ressurs,url,fag)',
      {headers:{'apikey':SkapLab.SUPABASE_KEY,'Authorization':'Bearer '+token}}
    ).then(function(r){return r.json();}).catch(function(){return [];});
    if(Array.isArray(kR)) tildelt=tildelt.concat(kR);
  }

  var el=document.getElementById('tildelt-log');
  if(!tildelt.length){
    el.innerHTML='<div style="padding:30px;text-align:center;color:var(--dim);">Ingen tildelte oppgaver.</div>';
    return;
  }

  // Sjekk hvilke er fullfort
  var fullforte=new Set(akt.map(function(a){return a.ressurs;}));

  el.innerHTML='<div style="display:flex;flex-direction:column;gap:10px;">'+
    tildelt.map(function(t){
      if(!t.oppgaver) return '';
      var o=t.oppgaver;
      var info=lesbarRessurs(o.ressurs||o.tittel||'');
      var er_fullfort=fullforte.has(o.ressurs);
      // Finn siste aktivitet for denne ressursen
      var siste_akt=akt.find(function(a){return a.ressurs===o.ressurs;});
      var fremgang='';
      if(siste_akt){
        var pst=siste_akt.score_pst||0;
        var farge=pst>=70?'#34d399':pst>=45?'#fbbf24':'#f87171';
        if(siste_akt.fullfort_antall&&siste_akt.totalt_antall){
          fremgang='<div style="margin-top:6px;display:flex;align-items:center;gap:8px;">'+
            '<div style="flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;">'+
            '<div style="width:'+Math.round(siste_akt.fullfort_antall/siste_akt.totalt_antall*100)+'%;height:100%;background:'+farge+';border-radius:3px;"></div></div>'+
            '<span style="font-size:.72rem;color:var(--dim);font-family:var(--font-m);">'+
            siste_akt.fullfort_antall+'/'+siste_akt.totalt_antall+'</span></div>';
        } else {
          fremgang='<div style="margin-top:6px;display:flex;align-items:center;gap:8px;">'+
            '<div style="flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;">'+
            '<div style="width:'+pst+'%;height:100%;background:'+farge+';border-radius:3px;"></div></div>'+
            '<span style="font-size:.72rem;color:var(--dim);">'+pst+'%</span></div>';
        }
      }
      return '<div style="background:var(--bg2);border:1px solid '+(er_fullfort?'rgba(52,211,153,.3)':'var(--border)')+
        ';border-radius:10px;padding:13px 16px;">'+
        '<div style="display:flex;align-items:center;gap:10px;">'+
          '<div style="flex:1;">'+
            '<div style="font-weight:600;font-size:.9rem;">'+o.tittel+'</div>'+
            '<div style="font-size:.72rem;color:var(--dim);margin-top:2px;">'+info.t+(o.fag?' · '+o.fag:'')+'</div>'+
          '</div>'+
          '<div style="font-size:.78rem;font-weight:600;color:'+(er_fullfort?'#34d399':'rgba(255,255,255,.3)')+';">'+
            (er_fullfort?'✓ Gjort':'Ikke startet')+'</div>'+
          '<a href="'+o.url+'" style="padding:5px 12px;background:var(--bla);color:#000;border-radius:7px;font-size:.76rem;font-family:var(--font-h);font-weight:700;text-decoration:none;">Åpne</a>'+
        '</div>'+
        (t.frist?'<div style="font-size:.72rem;color:var(--gul);margin-top:6px;">⏰ Frist: '+t.frist+'</div>':'')+
        fremgang+
      '</div>';
    }).join('')+
  '</div>';
}

function byggKM() {
  var g = document.getElementById('vurdering-innhold');
  if (!g) return;
  g.innerHTML = '';

  // FAG-FANER
  var fagFaner = document.createElement('div');
  fagFaner.className = 'fag-faner';
  fagFaner.innerHTML =
    '<button class="fag-fane ak mat-fane" onclick="visFagFane(\'mat\',this)">📐 Matematikk</button>' +
    '<button class="fag-fane nat-fane" onclick="visFagFane(\'nat\',this)">🔬 Naturfag</button>' +
    '<button class="fag-fane prg-fane" onclick="visFagFane(\'prg\',this)">💻 Programmering</button>';
  g.appendChild(fagFaner);

  // ── MATEMATIKK ─────────────────────────────────────────────────
  var matDiv = document.createElement('div');
  matDiv.id = 'fag-mat';

  // Trinn-velger
  var trinnVelger = document.createElement('div');
  trinnVelger.className = 'trinn-velger';
  trinnVelger.innerHTML =
    '<button class="trinn-btn ak" onclick="visTrinn(\'8\',this)">8. trinn</button>' +
    '<button class="trinn-btn" onclick="visTrinn(\'9\',this)">9. trinn</button>' +
    '<button class="trinn-btn" onclick="visTrinn(\'10\',this)">10. trinn</button>';
  matDiv.appendChild(trinnVelger);

  ['8','9','10'].forEach(function(trinn) {
    var trinnDiv = document.createElement('div');
    trinnDiv.id = 'trinn-' + trinn;
    trinnDiv.style.display = trinn === '8' ? 'block' : 'none';

    var kategoriSett = {};
    KMF.mat[trinn].forEach(function(km) {
      if (!kategoriSett[km[1]]) kategoriSett[km[1]] = [];
      kategoriSett[km[1]].push(km);
    });

    Object.keys(kategoriSett).forEach(function(kat) {
      var sek = document.createElement('div');
      sek.className = 'km-seksjon';
      var katTittel = document.createElement('div');
      katTittel.className = 'km-kat-tittel';
      katTittel.textContent = kat.charAt(0).toUpperCase() + kat.slice(1);
      sek.appendChild(katTittel);

      kategoriSett[kat].forEach(function(km) {
        sek.appendChild(lagKMRad(km));
      });
      trinnDiv.appendChild(sek);
    });
    matDiv.appendChild(trinnDiv);
  });
  g.appendChild(matDiv);

  // ── NATURFAG ───────────────────────────────────────────────────
  var natDiv = document.createElement('div');
  natDiv.id = 'fag-nat';
  natDiv.style.display = 'none';

  var natKat = {};
  KMF.nat.forEach(function(km) {
    if (!natKat[km[1]]) natKat[km[1]] = [];
    natKat[km[1]].push(km);
  });
  Object.keys(natKat).forEach(function(kat) {
    var sek = document.createElement('div');
    sek.className = 'km-seksjon';
    var katTittel = document.createElement('div');
    katTittel.className = 'km-kat-tittel';
    katTittel.textContent = kat.charAt(0).toUpperCase() + kat.slice(1);
    sek.appendChild(katTittel);
    natKat[kat].forEach(function(km) { sek.appendChild(lagKMRad(km)); });
    natDiv.appendChild(sek);
  });
  g.appendChild(natDiv);

  // ── PROGRAMMERING ──────────────────────────────────────────────
  var prgDiv = document.createElement('div');
  prgDiv.id = 'fag-prg';
  prgDiv.style.display = 'none';

  var prgKat = {};
  KMF.prg.forEach(function(km) {
    if (!prgKat[km[1]]) prgKat[km[1]] = [];
    prgKat[km[1]].push(km);
  });
  Object.keys(prgKat).forEach(function(kat) {
    var sek = document.createElement('div');
    sek.className = 'km-seksjon';
    var katTittel = document.createElement('div');
    katTittel.className = 'km-kat-tittel';
    katTittel.textContent = kat.charAt(0).toUpperCase() + kat.slice(1);
    sek.appendChild(katTittel);
    prgKat[kat].forEach(function(km) { sek.appendChild(lagKMRad(km)); });
    prgDiv.appendChild(sek);
  });
  g.appendChild(prgDiv);
}

function lagKMRad(km) {
  var kmKode = km[0];
  var valgt = vurd[kmKode] || '';
  var egV   = egenvurd[kmKode] || '';
  var merk  = merkander[kmKode] || '';
  var tips  = TIPS[kmKode] || {};
  var tipsText = valgt && tips[valgt] ? tips[valgt] : '';

  var egLabel = egV==='hoy'?'Høy':egV==='middels'?'Middels':egV==='lav'?'Lav':egV==='vet_ikke'?'Vet ikke':'';
  var egFarge = egV==='hoy'?'var(--gron)':egV==='middels'?'var(--gul)':egV==='lav'?'var(--rod)':'var(--dim)';

  var rad = document.createElement('div');
  rad.className = 'km-rad';
  rad.id = 'kmrad-' + kmKode;

  // KM-tekst + egenvurdering
  var hdr = document.createElement('div');
  hdr.className = 'km-rad-hdr';
  hdr.innerHTML =
    '<div class="km-info">' +
      '<span class="km-kode-chip">' + kmKode + '</span>' +
      '<span class="km-tekst">Eleven skal kunne ' + km[2] + '</span>' +
    '</div>' +
    (egLabel ? '<span class="egenv-pill-liten" style="color:'+egFarge+';border-color:'+egFarge+'">👤 ' + egLabel + '</span>' : '');
  rad.appendChild(hdr);

  // Vurderingsknapper
  var valgDiv = document.createElement('div');
  valgDiv.className = 'km-valg';
  ['ikke_gjort','lav','middels','hoy'].forEach(function(n) {
    var label = n==='ikke_gjort'?'Ikke gjort':n==='hoy'?'Høy':n.charAt(0).toUpperCase()+n.slice(1);
    var btn = document.createElement('button');
    btn.className = 'nb ' + n + (valgt===n?' ak':'');
    btn.textContent = label;
    btn.dataset.km = kmKode;
    btn.dataset.n  = n;
    btn.onclick = function() { velg(this); };
    valgDiv.appendChild(btn);
  });
  rad.appendChild(valgDiv);

  // Tips-tekst
  if (tipsText) {
    var tipsEl = document.createElement('div');
    tipsEl.className = 'km-tips';
    tipsEl.id = 'tips-' + kmKode;
    tipsEl.textContent = '💡 ' + tipsText;
    rad.appendChild(tipsEl);
  }

  // Fritekst
  var ta = document.createElement('textarea');
  ta.className = 'km-fritekst';
  ta.dataset.km = kmKode;
  ta.placeholder = 'Fritekst til eleven om dette kompetansemålet...';
  ta.value = merk;
  ta.onchange = function() { lagreMerknad(this); };
  rad.appendChild(ta);

  return rad;
}

  document.querySelectorAll('.fag-fane').forEach(function(b){b.classList.remove('ak');});
  el.classList.add('ak');

    var d = document.getElementById(id);

function velg(el){
  var km=el.dataset.km,n=el.dataset.n;
  vurd[km]=n;
  // Oppdater tips
  var tipsEl=document.getElementById('tips-'+km);
  if(tipsEl){
    var t=TIPS[km]&&TIPS[km][n]?TIPS[km][n]:'';
    tipsEl.textContent = t ? '💡 '+t : '';
    tipsEl.style.display = t ? 'block' : 'none';
  } else if(TIPS[km]&&TIPS[km][n]) {
    var newTips=document.createElement('div');
    newTips.className='km-tips';newTips.id='tips-'+km;
    newTips.textContent='💡 '+TIPS[km][n];
    var rad=document.getElementById('kmrad-'+km);
    if(rad){var ta=rad.querySelector('textarea');if(ta)rad.insertBefore(newTips,ta);}
  }
  document.querySelectorAll('#vv-'+km+' .nb').forEach(function(b){b.classList.toggle('ak',b.dataset.n===n);});
}

// Oversett mengdetrening-ressursnavn til lesbart format
function lesbarRessurs(ressurs) {
  if (RESSURS_INFO[ressurs]) return RESSURS_INFO[ressurs];
  // Mengdetrening: matte_mengde_geo_areal → Mengdetrening: Areal
  if (ressurs.startsWith('matte_mengde_')) {
    var rest = ressurs.replace('matte_mengde_','').replace(/_/g,' ');
    // Gjor første bokstav stor
    rest = rest.charAt(0).toUpperCase() + rest.slice(1);
    return {n: rest, t: '✏️ Øvingsoppgaver'};
  }
  // Fallback: erstatt understreker og gjor lesbart
  var n = ressurs.replace(/_/g,' ');
  n = n.charAt(0).toUpperCase() + n.slice(1);
  return {n: n, t: '📄 Aktivitet'};
}

function byggAkt(){
  var el=document.getElementById('akt-log');
  if(!akt.length){
    el.innerHTML='<div style="padding:30px;text-align:center;color:var(--dim);">Ingen aktivitet ennå.</div>';
    return;
  }
  el.innerHTML=akt.map(function(a){
    var d=new Date(a.tidspunkt).toLocaleDateString('nb-NO');
    var kls=a.score_pst===null?'sc-u':a.score_pst>=70?'sc-h':a.score_pst>=45?'sc-m':'sc-l';
    var info=lesbarRessurs(a.ressurs||'');
    var fremgang='';
    if(a.fullfort_antall&&a.totalt_antall){
      fremgang='<span style="font-size:.7rem;color:var(--dim);margin-left:6px;">'+
        a.fullfort_antall+'/'+a.totalt_antall+'</span>';
    }
    return '<div class="ar">'+
      '<div style="display:flex;flex-direction:column;gap:2px;flex:1;">'+
        '<div class="ar-spill">'+info.n+'</div>'+
        '<div style="font-size:.7rem;color:var(--dim);">'+info.t+
          (a.km_kode?' · <span style="background:rgba(255,255,255,.06);padding:1px 6px;border-radius:4px;">'+a.km_kode+'</span>':'')+'</div>'+
      '</div>'+
      '<div class="ar-sc '+kls+'">'+(a.score_pst!==null?a.score_pst+'%':'—')+fremgang+'</div>'+
      '<div class="ar-d">'+d+'</div>'+
    '</div>';
  }).join('');
}

  var kmKode=el.dataset.km;

  merkander[kmKode]=tekst;
  try {
    await fetch(SkapLab.SUPABASE_URL+'/rest/v1/vurderinger',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY,

    setTimeout(function(){el.style.borderColor='';},2000);

}
