<!DOCTYPE html>
<html lang="no"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevvurdering · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>

:root{--bg:#07090f;--bg2:#0b0d18;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e0e8ff;--dim:rgba(255,255,255,.45);
  --gron:#34d399;--gul:#fbbf24;--rod:#f87171;--bla:#60a5fa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
#topbar{height:52px;display:flex;align-items:center;gap:14px;padding:0 20px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.logo{font-family:var(--font-h);font-size:1rem;font-weight:800;color:var(--bla);}
.logo span{opacity:.4;}.spacer{flex:1;}
.tbtn{padding:6px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--dim);}
.tbtn:hover{color:var(--text);}
.tilbake{color:var(--dim);text-decoration:none;font-size:.82rem;}

#innhold{max-width:980px;margin:0 auto;padding:24px;}
.ehdr{display:flex;align-items:center;gap:16px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:22px;}
.eavatar{width:44px;height:44px;border-radius:10px;background:rgba(96,165,250,.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.einfo h2{font-family:var(--font-h);font-size:1.1rem;}
.einfo p{font-size:.78rem;color:var(--dim);margin-top:2px;}
.kode{font-family:var(--font-m);font-size:.8rem;color:var(--bla);background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);padding:3px 10px;border-radius:7px;margin-left:auto;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:10px 18px;font-size:.85rem;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;}
.tab.ak{color:var(--bla);border-bottom-color:var(--bla);font-weight:600;}
.fag-hdr{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--dim);padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.km-rad{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.km-tit{font-size:.88rem;font-weight:600;}
.km-akt{font-size:.74rem;color:var(--dim);font-family:var(--font-m);}
.km-sc{font-size:.8rem;font-family:var(--font-m);text-align:right;}
.sc-h{color:var(--gron);}.sc-m{color:var(--gul);}.sc-l{color:var(--rod);}.sc-u{color:rgba(255,255,255,.2);}
.vv{display:flex;gap:5px;}
.nb{padding:5px 9px;border-radius:7px;border:1.5px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;font-size:.74rem;transition:all .15s;}
.nb:hover{border-color:rgba(255,255,255,.3);color:var(--text);}
.nb.hoy.ak{background:rgba(52,211,153,.2);border-color:var(--gron);color:var(--gron);}
.nb.middels.ak{background:rgba(251,191,36,.15);border-color:var(--gul);color:var(--gul);}
.nb.lav.ak{background:rgba(248,113,113,.15);border-color:var(--rod);color:var(--rod);}
.nb.ikke_gjort.ak{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.2);}
.ar{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.84rem;}
.ar-spill{flex:1;font-weight:500;}.ar-km{font-size:.72rem;color:var(--dim);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:6px;}
.ar-sc{font-family:var(--font-m);font-size:.8rem;width:55px;text-align:right;}
.ar-d{font-size:.72rem;color:rgba(255,255,255,.2);font-family:var(--font-m);width:88px;text-align:right;}
.lag-btn{padding:10px 24px;background:var(--bla);color:#000;border:none;border-radius:10px;font-family:var(--font-h);font-size:.86rem;font-weight:700;cursor:pointer;margin-top:16px;}
.rapp-btn{padding:10px 20px;background:rgba(167,139,250,.15);color:#a78bfa;border:1.5px solid rgba(167,139,250,.3);border-radius:10px;font-family:var(--font-h);font-size:.86rem;font-weight:700;cursor:pointer;margin-left:8px;}
.lag-st{font-size:.78rem;color:var(--gron);margin-left:10px;}
</style></head><body>
<div id="topbar">
  <div class="logo">Skap<span>Lab</span></div>
  <a href="laerer_dashboard.html" class="tilbake">Tilbake til klassen</a>
  <div class="spacer"></div>
  <button class="tbtn" onclick="apneRapport()">Generer rapport</button>
</div>
<div id="innhold">
  <div id="laster" style="padding:60px;text-align:center;color:var(--dim);">Laster...</div>
  <div id="ei" style="display:none">
    <div class="ehdr">
      <div class="eavatar">👤</div>
      <div class="einfo"><h2 id="en">-</h2><p id="ek">-</p></div>
      <div class="kode" id="ekode">-</div>
    </div>
    <div class="tabs">
      <div class="tab ak" onclick="visTab('v',this)">Vurdering</div>
      <div class="tab" onclick="visTab('a',this)">Aktivitetslogg</div>
    </div>
    <div id="tab-v"><div id="km-grid"></div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:12px;">
        <button class="lag-btn" onclick="lagreAlt()">Lagre vurderinger</button>
        <button class="rapp-btn" onclick="apneRapport()">Lag rapport</button>
        <span class="lag-st" id="lst"></span>
      </div>
    </div>
    <div id="tab-a" style="display:none"><div id="akt-log"></div></div>
  </div>
</div>
<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      sessionStorage.setItem(SESSION_NØKKEL, JSON.stringify(elev));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = sessionStorage.getItem(SESSION_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });
      if (resp.error) return { ok: false, feil: resp.error.message };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    return hentLaerer() !== null;
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>
<script>
'use strict';
if(!SkapLab.erLaererInnlogget()) location.href='laerer_login.html';
var laerer=SkapLab.hentLaerer(),token=laerer.access_token,lid=laerer.user&&laerer.user.id;
var elevId=sessionStorage.getItem('skaplab_valgt_elev');
if(!elevId) location.href='laerer_dashboard.html';

var KMF={
  'Matematikk':[['MAT-ALG','Algebra og tallforstaaelse'],['MAT-FUNK','Funksjoner'],['MAT-GEO','Geometri'],['MAT-STAT','Statistikk og sannsynlighet'],['MAT-OKO','Okonomi og prosent']],
  'Naturfag':[['NAT-BIO','Biologi - kropp og helse'],['NAT-KJE','Kjemi - stoffer og reaksjoner'],['NAT-FYS','Fysikk - kraft og bevegelse'],['NAT-ELE','Elektrisitet og teknologi'],['NAT-GEN','Genetikk og arv'],['NAT-OKO','Okologi og miljo']],
  'Programmering':[['PRG-ALG','Algoritmer og pseudokode'],['PRG-DEBUG','Lese og feilsoke kode']]
};
var akt=[],vurd={},kmSc={};

async function init(){
  var eR=await SkapLab._get('/elever?id=eq.'+elevId+'&select=fullt_navn,innloggingskode,klasser(navn)',token);
  var elev=eR&&eR[0];
  if(!elev){location.href='laerer_dashboard.html';return;}
  document.getElementById('en').textContent=elev.fullt_navn;
  document.getElementById('ek').textContent=elev.klasser?elev.klasser.navn:'';
  document.getElementById('ekode').textContent='Kode: '+elev.innloggingskode;
  var aR=await SkapLab._get('/aktivitet?elev_id=eq.'+elevId+'&order=tidspunkt.desc&limit=100',token);
  akt=Array.isArray(aR)?aR:[];
  akt.forEach(function(a){
    if(!a.km_kode||a.score_pst===null) return;
    if(!kmSc[a.km_kode]) kmSc[a.km_kode]={sum:0,ant:0};
    kmSc[a.km_kode].sum+=a.score_pst;kmSc[a.km_kode].ant++;
  });
  var vR=await SkapLab._get('/vurderinger?elev_id=eq.'+elevId+'&laerer_id=eq.'+lid,token);
  if(Array.isArray(vR)) vR.forEach(function(v){vurd[v.km_kode]=v.nivaa;});
  byggKM();byggAkt();
  document.getElementById('laster').style.display='none';
  document.getElementById('ei').style.display='block';
}

function snittTilVeil(s){if(s===null) return null;if(s>=70) return 'hoy';if(s>=45) return 'middels';return 'lav';}

function byggKM(){
  var g=document.getElementById('km-grid');g.innerHTML='';
  Object.keys(KMF).forEach(function(fag){
    var sek=document.createElement('div');sek.style.marginBottom='18px';
    sek.innerHTML='<div class="fag-hdr">'+fag+'</div>';
    KMF[fag].forEach(function(km){
      var sc=kmSc[km[0]];
      var snitt=sc?Math.round(sc.sum/sc.ant):null;
      var ant=sc?sc.ant:0;
      var veil=snittTilVeil(snitt);
      var valgt=vurd[km[0]]||'';
      var sKls=snitt===null?'sc-u':snitt>=70?'sc-h':snitt>=45?'sc-m':'sc-l';
      var rad=document.createElement('div');rad.className='km-rad';
      rad.innerHTML='<div><div class="km-tit">'+km[1]+'</div>'
        +'<div class="km-akt">'+(ant>0?ant+' okt'+(ant>1?'er':''):'Ingen aktivitet')+'</div></div>'
        +'<div class="km-sc '+sKls+'">'+(snitt!==null?snitt+'%':'—')
        +(veil?'<div style="font-size:.66rem;color:var(--dim);">veil: '+veil+'</div>':'')+'</div>'
        +'<div class="vv" id="vv-'+km[0]+'">'
        +['hoy','middels','lav','ikke_gjort'].map(function(n){
          var l=n==='hoy'?'Hoy':n==='middels'?'Middels':n==='lav'?'Lav':'Ikke gjort';
          return '<button class="nb '+n+(valgt===n?' ak':'')+'" data-km="'+km[0]+'" data-n="'+n+'" onclick="velg(this)">'+l+'</button>';
        }).join('')+'</div>';
      sek.appendChild(rad);
    });
    g.appendChild(sek);
  });
}

function velg(el){
  var km=el.dataset.km,n=el.dataset.n;
  vurd[km]=n;
  document.querySelectorAll('#vv-'+km+' .nb').forEach(function(b){b.classList.toggle('ak',b.dataset.n===n);});
}

async function lagreAlt(){
  document.getElementById('lst').textContent='Lagrer...';
  var P=Object.keys(vurd).map(function(km){
    return fetch(SkapLab._api+'/vurderinger',{method:'POST',
      headers:Object.assign(SkapLab._hdr(token),{'Prefer':'resolution=merge-duplicates'}),
      body:JSON.stringify({elev_id:elevId,km_kode:km,laerer_id:lid,nivaa:vurd[km],dato:new Date().toISOString()})
    });
  });
  await Promise.all(P);
  document.getElementById('lst').textContent='Lagret!';
  setTimeout(function(){document.getElementById('lst').textContent='';},3000);
}

function byggAkt(){
  var el=document.getElementById('akt-log');
  if(!akt.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--dim);">Ingen aktivitet ennå.</div>';return;}
  el.innerHTML=akt.map(function(a){
    var d=new Date(a.tidspunkt).toLocaleDateString('nb-NO');
    var kls=a.score_pst===null?'sc-u':a.score_pst>=70?'sc-h':a.score_pst>=45?'sc-m':'sc-l';
    return '<div class="ar"><div class="ar-spill">'+(a.ressurs||'-')+'</div>'
      +(a.km_kode?'<div class="ar-km">'+a.km_kode+'</div>':'')
      +'<div class="ar-sc '+kls+'">'+(a.score_pst!==null?a.score_pst+'%':'—')+'</div>'
      +'<div class="ar-d">'+d+'</div></div>';
  }).join('');
}

function visTab(id,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('ak');});
  document.querySelectorAll('[id^=tab-]').forEach(function(t){t.style.display='none';});
  el.classList.add('ak');
  document.getElementById('tab-'+id).style.display='block';
}

function apneRapport(){
  sessionStorage.setItem('skaplab_rapport_vurd',JSON.stringify(vurd));
  window.open('rapport.html?elev='+elevId);
}
init();
</script>
</body></html>
