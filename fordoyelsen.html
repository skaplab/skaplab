<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Fordøyelsessystemet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0806;--surface:#14100a;--border:rgba(251,191,36,.07);
  --text:#f4ece0;--dim:#4a3818;
  --accent:#fbbf24;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 55% at 50% 40%,rgba(251,191,36,.025),transparent)}
nav{position:sticky;top:0;z-index:300;background:rgba(10,8,6,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:12px}
.nav-lnk{font-size:.82rem;font-weight:500;color:var(--dim);text-decoration:none}
.nav-lnk:hover{color:var(--text)}.nav-sep{color:var(--border)}
.nav-tittel{font-family:var(--font-d);font-size:.9rem;color:var(--accent)}
.layout{position:relative;z-index:1;display:grid;grid-template-columns:220px 1fr 220px;
  max-width:1260px;margin:0 auto;padding:0 16px 60px;gap:0 20px}
.header{grid-column:1/-1;text-align:center;padding:32px 20px 20px}
.header h1{font-family:var(--font-d);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:700;margin-bottom:6px}
.header h1 em{font-style:italic;color:var(--accent)}
.header-sub{font-size:.85rem;color:var(--dim);letter-spacing:.03em}
.side-panel{padding:16px 0;display:flex;flex-direction:column;gap:7px;align-self:start;position:sticky;top:65px}
.side-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:8px 4px 4px;font-weight:600}
.organ-knapp{font-family:var(--font-b);font-size:.78rem;font-weight:500;padding:8px 12px;border-radius:10px;
  border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--dim);cursor:pointer;text-align:left;
  transition:all .2s;display:flex;align-items:center;gap:8px}
.organ-knapp:hover{border-color:rgba(251,191,36,.3);color:var(--text);background:rgba(251,191,36,.04)}
.organ-knapp.aktiv{border-color:var(--farge,var(--accent));color:var(--farge,var(--accent));background:rgba(251,191,36,.06)}
.organ-knapp .dot{width:7px;height:7px;border-radius:50%;background:var(--farge,var(--accent));flex-shrink:0;opacity:.65}
.organ-knapp.aktiv .dot{opacity:1;box-shadow:0 0 6px var(--farge,var(--accent))}
.senter{display:flex;flex-direction:column;align-items:center;gap:16px}
.fordsvg{width:100%;max-width:500px;height:auto;display:block}
.info-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:24px;width:100%;max-width:500px;min-height:160px;position:relative;overflow:hidden;transition:all .3s}
.info-panel::before{content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,var(--pglow,rgba(251,191,36,.04)),transparent);pointer-events:none}
.info-tom{display:flex;align-items:center;justify-content:center;height:120px;color:var(--dim);font-size:.85rem;letter-spacing:.04em;text-transform:uppercase}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.info-emoji{font-size:2rem}
.info-navn{font-family:var(--font-d);font-size:1.35rem;font-weight:700;color:var(--organ-farge,var(--accent))}
.info-latin{font-size:.78rem;color:var(--dim);font-style:italic;margin-top:1px}
.info-divider{height:1px;background:var(--border);margin:0 0 14px}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.info-kort{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.info-kort-label{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.info-kort-verdi{font-size:.8rem;font-weight:500;color:var(--text);line-height:1.4}
.info-tekst{font-size:.83rem;line-height:1.7;color:rgba(244,236,224,.8)}
.info-fakta{margin-top:12px;padding:10px 13px;background:rgba(255,255,255,.02);
  border-left:3px solid var(--organ-farge,var(--accent));border-radius:0 8px 8px 0;font-size:.8rem;line-height:1.6;color:var(--dim)}
.hotspot{cursor:pointer;transition:all .2s}
.hotspot:hover .hf{filter:brightness(1.4) saturate(1.3)}
.hotspot.aktiv .hf{filter:brightness(1.6) saturate(1.6)}
.tooltip{position:absolute;background:rgba(10,8,6,.95);border:1px solid rgba(251,191,36,.2);border-radius:8px;
  padding:5px 10px;font-size:.75rem;color:var(--text);pointer-events:none;white-space:nowrap;
  transform:translate(-50%,-100%) translateY(-8px);transition:opacity .15s;z-index:10}
@keyframes peristaltikk{0%,100%{stroke-dashoffset:0}50%{stroke-dashoffset:20}}
.peri{stroke-dasharray:8 4;animation:peristaltikk 2s linear infinite}
@media(max-width:900px){.layout{grid-template-columns:1fr}.side-panel{flex-direction:row;flex-wrap:wrap;position:static}}
</style>
</head>

<script>
const DATA = {
  munn:{navn:'Munn og spyttkjertler',latin:'Cavitas oris / gll. salivales',emoji:'👄',
    fakta:[{l:'Spytt/dag',v:'~1.5 liter'},{l:'Enzymer',v:'Amylase (stivelse)'},{l:'pH spytt',v:'6.2–7.4'},{l:'Tygging',v:'Mekanisk nedbrytning'}],
    tekst:'Fordøyelsen starter i munnen. Tennene knuser maten mekanisk, tungen blander og spyttet fukter. Spyttkjertelene (parotis, submandibulær, sublingual) produserer ~1,5 L spytt per dag. Amylase i spyttet starter kjemisk nedbrytning av stivelse til maltose allerede i munnen.',
    morsomt:'Matbiten din er omtrent ferdig bearbeidet i munnen etter bare 30 sekunder med tygging – men amylase fortsetter å virke i magen i 20–30 minutter til pH faller og enzymet deaktiveres.'},
  spiserøret:{navn:'Spiserøret',latin:'Oesophagus',emoji:'🫁',
    fakta:[{l:'Lengde',v:'25–30 cm'},{l:'Diameter',v:'2–3 cm'},{l:'Tid',v:'8–10 sek til magen'},{l:'Bevegelse',v:'Peristaltikk'}],
    tekst:'Spiserøret er et muskelrør som transporterer mat fra svelget til magen via peristaltikk – rytmiske bølgebevegelser i muskelveggen. Det har ingen fordøyelsesfunksjon. Den nedre lukkemuskelen (kardiasfinkter) hindrer magesyre fra å komme opp. Halsbrenner oppstår når denne svikter.',
    morsomt:'Peristaltikk er så kraftig at du kan svelge mat selv stående på hodet. Astronauter kan spise normalt i vektløshet – maten faller ikke ned, muskler dytter den.'},
  magen:{navn:'Magen',latin:'Gaster / Ventriculus',emoji:'🫙',
    fakta:[{l:'Volum',v:'1–4 liter'},{l:'pH magesaft',v:'1.5–3.5'},{l:'Opphold',v:'2–4 timer'},{l:'HCl',v:'Saltsyre dreper bakterier'}],
    tekst:'Magen er en muskelsekksom blander mat med magesaft via kraglebevegelser. Parietalcellene produserer saltsyre (HCl, pH 1,5–3,5) som dreper bakterier og aktiverer pepsinogen til pepsin. Pepsin spalter proteiner. Chief cells lager pepsinogen. Slimceller beskytter mageveggen fra syren. Chymus (halvflytende grøt) forlater magen porsjonsvis gjennom pylorus.',
    morsomt:'Magesyren er sterk nok til å løse opp sink. Mageveggen fornyer seg fullstendig hvert 3.–5. døgn fordi cellene ellers ville blitt fordøyd av sin egen syre.'},
  tolvfingertarm:{navn:'Tolvfingertarmen',latin:'Duodenum',emoji:'〰️',
    fakta:[{l:'Lengde',v:'25–30 cm (~12 fingre)'},{l:'pH',v:'Heves til 7–8 med NaHCO₃'},{l:'Mottar fra',v:'Mage, lever, bukspytt'},{l:'Enzymer',v:'Lipase, amylase, protease'}],
    tekst:'Tolvfingertarmen er den første og viktigste delen av tynntarmen for kjemisk fordøyelse. Den mottar sur chymus fra magen, galle fra lever/galleblære og bukspytt fra pankreas. Bikarbonatet i bukspyttet nøytraliserer syren. Her skjer mesteparten av den kjemiske nedbrytningen av alle de tre makronæringsstoffene.',
    morsomt:'Tolvfingertarmen ble navngitt fordi den er omtrent 12 fingre bred lang (duodenum = tolv på latin). Hos et voksent menneske er det omtrent 25–30 cm.'},
  lever:{navn:'Lever',latin:'Hepar',emoji:'🟤',
    fakta:[{l:'Vekt',v:'1.2–1.5 kg'},{l:'Galle/dag',v:'~1 liter'},{l:'Funksjoner',v:'500+'},  {l:'Regenerasjon',v:'Kan regenerere'}],
    tekst:'Leveren er kroppens største indre organ og kjemiske fabrikk. Den produserer galle (emulgerer fett), lagrer glykogen (blodsukkerregulering), detoksifiserer giftstoffer og alkohol, produserer plasmaproteiner (albumin, koagulasjonsfaktorer), metaboliserer hormoner og lagrer vitaminer (A, D, B12) og jern.',
    morsomt:'Leveren er det eneste indre organet som kan regenerere seg selv. Selv om 75% blir fjernet kirurgisk, kan den vokse tilbake til full størrelse på 8–12 uker. Grunnlaget for levende donasjon av leversegmenter.'},
  galleblære:{navn:'Galleblære',latin:'Vesica biliaris',emoji:'🟢',
    fakta:[{l:'Volum',v:'~50 ml'},{l:'Innhold',v:'Konsentrert galle'},{l:'Tømmes ved',v:'Fettrikt måltid'},{l:'Gallestein',v:'Vanlig sykdom'}],

    morsomt:'Kroppen kan lagre ~2000 kcal som glykogen i lever og muskler (energi for ~90 min hard trening), men så å si ubegrenset som fett. En gjennomsnittlig voksen har ~100 000 kcal lagret som fett.'},

function velg(id) {
  const data = DATA[id];
  if (!data) return;
  document.querySelectorAll('.organ-knapp').forEach(b =>
    b.classList.toggle('aktiv', b.getAttribute('onclick') === `velg('${id}')`));
  document.querySelectorAll('.hotspot').forEach(el =>
    el.classList.toggle('aktiv', el.id === 'hot-' + id));
  document.getElementById('info-tom').style.display = 'none';
  const innhold = document.getElementById('info-innhold');
  innhold.style.display = 'block';
  const farge = document.querySelector(`.organ-knapp[onclick="velg('${id}')"]`)?.style.getPropertyValue('--farge') || '#fbbf24';
  document.getElementById('info-panel').style.setProperty('--organ-farge', farge);
  document.getElementById('info-panel').style.setProperty('--pglow', farge + '22');
  const kortHTML = (data.fakta || []).map(f => `
    <div class="info-kort"><div class="info-kort-label">${f.l}</div>
    <div class="info-kort-verdi">${f.v}</div></div>`).join('');
  innhold.innerHTML = `
    <div class="info-header">
      <span class="info-emoji">${data.emoji}</span>
      <div><div class="info-navn">${data.navn}</div>
      <div class="info-latin">${data.latin}</div></div>
    </div>
    <div class="info-divider"></div>
    <div class="info-grid">${kortHTML}</div>
    <p class="info-tekst">${data.tekst}</p>
    <div class="info-fakta">💡 <strong>Visste du?</strong> ${data.morsomt}</div>`;
  if (window.innerWidth < 900)
    document.getElementById('info-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

const svg = document.getElementById('ford-svg');
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.hotspot').forEach(el => {
  const id = el.id.replace('hot-', '');
  const data = DATA[id];
  if (!data) return;
  el.addEventListener('mouseenter', () => { tooltip.textContent = data.navn; tooltip.style.opacity = '1'; });
  el.addEventListener('mousemove', e => {
    const rect = svg.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left) + 'px';
    tooltip.style.top = (e.clientY - rect.top) + 'px';
  });
  el.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });
});
</script>
