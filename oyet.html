<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Øyet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090e;--surface:#0c1018;--border:rgba(255,255,255,.07);
  --text:#e8eaf0;--dim:#4a5568;
  --accent:#7dd3fc;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 55% at 50% 40%,rgba(125,211,252,.025) 0%,transparent 65%),
             radial-gradient(ellipse 40% 40% at 80% 15%,rgba(251,191,36,.012) 0%,transparent 55%);}
nav{position:sticky;top:0;z-index:300;background:rgba(6,9,14,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:12px;}
.nav-lnk{font-size:.82rem;font-weight:500;color:var(--dim);text-decoration:none;letter-spacing:.02em}
.nav-lnk:hover{color:var(--text)}.nav-sep{color:var(--border)}
.nav-tittel{font-family:var(--font-d);font-size:.9rem;color:var(--accent)}

.layout{position:relative;z-index:1;display:grid;grid-template-columns:220px 1fr 220px;
  max-width:1260px;margin:0 auto;padding:0 16px 60px;gap:0 20px;}
.header{grid-column:1/-1;text-align:center;padding:32px 20px 20px;}
.header h1{font-family:var(--font-d);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:700;letter-spacing:-.02em;margin-bottom:6px;}
.header h1 em{font-style:italic;color:var(--accent)}
.header-sub{font-size:.85rem;color:var(--dim);letter-spacing:.03em}

.side-panel{padding:16px 0;display:flex;flex-direction:column;gap:7px;align-self:start;position:sticky;top:65px;}
.side-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:8px 4px 4px;font-weight:600}
.organ-knapp{font-family:var(--font-b);font-size:.78rem;font-weight:500;padding:8px 12px;border-radius:10px;
  border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--dim);cursor:pointer;text-align:left;
  transition:all .2s;letter-spacing:.01em;display:flex;align-items:center;gap:8px;}
.organ-knapp:hover{border-color:rgba(125,211,252,.3);color:var(--text);background:rgba(125,211,252,.04)}
.organ-knapp.aktiv{border-color:var(--farge,var(--accent));color:var(--farge,var(--accent));background:rgba(125,211,252,.06);}
.organ-knapp .dot{width:7px;height:7px;border-radius:50%;background:var(--farge,var(--accent));flex-shrink:0;opacity:.65}
.organ-knapp.aktiv .dot{opacity:1;box-shadow:0 0 6px var(--farge,var(--accent))}

.senter{display:flex;flex-direction:column;align-items:center;gap:16px}
.svg-wrap{position:relative;width:100%;max-width:560px}
.oye-svg{width:100%;height:auto;display:block}

.info-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:24px;width:100%;max-width:560px;min-height:160px;position:relative;overflow:hidden;transition:all .3s;}
.info-panel::before{content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,var(--pglow,rgba(125,211,252,.04)),transparent);pointer-events:none;}
.info-tom{display:flex;align-items:center;justify-content:center;height:120px;color:var(--dim);font-size:.85rem;letter-spacing:.04em;text-transform:uppercase;}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.info-emoji{font-size:2rem;line-height:1}
.info-navn{font-family:var(--font-d);font-size:1.35rem;font-weight:700;color:var(--organ-farge,var(--accent))}
.info-latin{font-size:.78rem;color:var(--dim);font-style:italic;margin-top:1px}
.info-divider{height:1px;background:var(--border);margin:0 0 14px}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.info-kort{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.info-kort-label{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.info-kort-verdi{font-size:.8rem;font-weight:500;color:var(--text);line-height:1.4}
.info-tekst{font-size:.83rem;line-height:1.7;color:rgba(232,234,240,.8)}
.info-fakta{margin-top:12px;padding:10px 13px;background:rgba(255,255,255,.02);
  border-left:3px solid var(--organ-farge,var(--accent));border-radius:0 8px 8px 0;font-size:.8rem;line-height:1.6;color:var(--dim);}

.hotspot{cursor:pointer;transition:all .2s}
.hotspot:hover .hf{filter:brightness(1.35) saturate(1.2);}
.hotspot.aktiv .hf{filter:brightness(1.55) saturate(1.5);}
.el{stroke:rgba(255,255,255,.12);stroke-width:.8;fill:none;stroke-dasharray:3 4}
.et{font-family:'DM Sans',sans-serif;font-size:10px;fill:rgba(255,255,255,.3);font-weight:500}
.et.hl{fill:rgba(255,255,255,.85)}

.tooltip{position:absolute;background:rgba(6,9,14,.95);border:1px solid rgba(255,255,255,.1);border-radius:8px;
  padding:5px 10px;font-size:.75rem;color:var(--text);pointer-events:none;white-space:nowrap;
  transform:translate(-50%,-100%) translateY(-8px);transition:opacity .15s;z-index:10;}

@keyframes pulser{0%,100%{opacity:.55}50%{opacity:1}}
.ar{animation:pulser 2.2s ease-in-out infinite}
@keyframes iris-puls{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
.iris-anim{transform-origin:280px 215px;animation:iris-puls 3.5s ease-in-out infinite}
@keyframes pupil-puls{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.pupil-anim{transform-origin:280px 215px;animation:pupil-puls 3.5s ease-in-out infinite}

@media(max-width:960px){
  .layout{grid-template-columns:1fr}
  .side-panel{flex-direction:row;flex-wrap:wrap;position:static;padding:0 0 8px}
  .organ-knapp{font-size:.72rem;padding:6px 10px}.side-label{display:none}
  .info-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<nav>
  <a href="naturfag_hub.html" class="nav-lnk">🔬 Naturfag</a>
  <span class="nav-sep">/</span>
  <a href="kroppens_organer.html" class="nav-lnk">🫀 Organer</a>
  <span class="nav-sep">/</span>
  <span class="nav-tittel">Øyet</span>
</nav>

<div class="layout">
  <div class="header">
    <h1>Øyets <em>anatomi</em></h1>
    <p class="header-sub">Klikk på en del for å lære mer – tverrsnitt</p>
  </div>

  <!-- VENSTRE PANEL -->
  <div class="side-panel">
    <div class="side-label">Fremre del</div>
    <button class="organ-knapp" style="--farge:#f1f5f9" onclick="velg('cornea')"><span class="dot"></span>Hornhinnen</button>
    <button class="organ-knapp" style="--farge:#bfdbfe" onclick="velg('iris')"><span class="dot"></span>Iris (regnbuehinnen)</button>
    <button class="organ-knapp" style="--farge:#1e293b" onclick="velg('pupil')"><span class="dot"></span>Pupillen</button>
    <button class="organ-knapp" style="--farge:#e0f2fe" onclick="velg('linse')"><span class="dot"></span>Linsen</button>
    <button class="organ-knapp" style="--farge:#7dd3fc" onclick="velg('kammerv')"><span class="dot"></span>Kammervæske</button>
    <div class="side-label" style="margin-top:6px">Ytre lag</div>
    <button class="organ-knapp" style="--farge:#fde68a" onclick="velg('sclera')"><span class="dot"></span>Senehinna (sclera)</button>
    <button class="organ-knapp" style="--farge:#f9a8d4" onclick="velg('koroid')"><span class="dot"></span>Årehinnen</button>
  </div>

  <!-- SENTER -->
  <div class="senter">
    <div class="svg-wrap" id="svg-wrap">

      <!-- ØYE SVG – tverrsnitt, ca 560×430 -->
      <svg class="oye-svg" viewBox="0 0 560 430" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Glødfiltre -->
          <filter id="gf" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="gfs" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Gradienter -->
          <!-- Sclera – hvit/gulaktig -->
          <radialGradient id="g-sclera" cx="38%" cy="38%" r="65%">
            <stop offset="0%" stop-color="#f0ede0"/>
            <stop offset="70%" stop-color="#d4cfb8"/>
            <stop offset="100%" stop-color="#a89f82"/>
          </radialGradient>
          <!-- Årehinne (koroid) – mørk rød/brun -->
          <radialGradient id="g-koroid" cx="40%" cy="40%" r="65%">
            <stop offset="0%" stop-color="#c2385a"/>
            <stop offset="100%" stop-color="#7b1d32"/>
          </radialGradient>
          <!-- Netthinne – lys rosa/orange -->
          <radialGradient id="g-netthinne" cx="42%" cy="40%" r="65%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#c2410c"/>
          </radialGradient>
          <!-- Glasslegeme – blålig transparent -->
          <radialGradient id="g-glass" cx="45%" cy="42%" r="65%">
            <stop offset="0%" stop-color="#bfdbfe" stop-opacity=".55"/>
            <stop offset="100%" stop-color="#1d4ed8" stop-opacity=".18"/>
          </radialGradient>
          <!-- Iris – blå/grønn med tekstur -->
          <radialGradient id="g-iris" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1e40af"/>
            <stop offset="45%" stop-color="#2563eb"/>
            <stop offset="75%" stop-color="#1d4ed8"/>
            <stop offset="100%" stop-color="#1e3a8a"/>
          </radialGradient>
          <!-- Pupill -->
          <radialGradient id="g-pupil" cx="40%" cy="38%" r="60%">
            <stop offset="0%" stop-color="#0d0f14"/>
            <stop offset="100%" stop-color="#000"/>
          </radialGradient>
          <!-- Cornea -->
          <linearGradient id="g-cornea" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e2f0ff" stop-opacity=".85"/>
            <stop offset="100%" stop-color="#93c5fd" stop-opacity=".4"/>
          </linearGradient>
          <!-- Linse -->
          <radialGradient id="g-linse" cx="42%" cy="38%" r="62%">
            <stop offset="0%" stop-color="#e0f7ff"/>
            <stop offset="60%" stop-color="#bae6fd"/>
            <stop offset="100%" stop-color="#7dd3fc"/>
          </radialGradient>
          <!-- Kammervæske -->
          <radialGradient id="g-kammer" cx="50%" cy="50%" r="65%">
            <stop offset="0%" stop-color="#bfdbfe" stop-opacity=".55"/>
            <stop offset="100%" stop-color="#3b82f6" stop-opacity=".15"/>
          </radialGradient>
          <!-- Synsnerve -->
          <linearGradient id="g-nerve" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#92400e"/>
          </linearGradient>
          <!-- Gule flekk -->
          <radialGradient id="g-macula" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fde68a"/>
            <stop offset="100%" stop-color="#f59e0b"/>
          </radialGradient>
          <!-- Blinde flekk -->
          <radialGradient id="g-blind" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#6b7280"/>
            <stop offset="100%" stop-color="#374151"/>
          </radialGradient>
          <!-- Lys-refleks -->
          <radialGradient id="g-refleks" cx="35%" cy="35%" r="60%">
            <stop offset="0%" stop-color="white" stop-opacity=".8"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </radialGradient>
          <!-- Blodkar-mønster -->
          <pattern id="pat-blodkar" x="0" y="0" width="1" height="1" patternUnits="objectBoundingBox">
            <path d="M.1,.3 Q.3,.1 .5,.4 Q.7,.1 .9,.3" fill="none" stroke="rgba(180,30,50,.3)" stroke-width="1.2"/>
            <path d="M.05,.6 Q.2,.4 .4,.6 Q.6,.4 .8,.6 Q.9,.5 .95,.6" fill="none" stroke="rgba(180,30,50,.25)" stroke-width="1"/>
          </pattern>
          <!-- Iris-linjer (radiære fibre) -->
          <pattern id="pat-iris" x="0" y="0" width="1" height="1" patternUnits="objectBoundingBox">
            <line x1="50%" y1="0" x2="50%" y2="100%" stroke="rgba(255,255,255,.06)" stroke-width=".8"/>
            <line x1="0" y1="50%" x2="100%" y2="50%" stroke="rgba(255,255,255,.06)" stroke-width=".8"/>
            <line x1="14%" y1="14%" x2="86%" y2="86%" stroke="rgba(255,255,255,.05)" stroke-width=".7"/>
            <line x1="86%" y1="14%" x2="14%" y2="86%" stroke="rgba(255,255,255,.05)" stroke-width=".7"/>
          </pattern>
        </defs>

        <!-- Atmosfære glow -->
        <ellipse cx="280" cy="215" rx="240" ry="200" fill="rgba(125,211,252,.012)"/>

        <!-- ══ SCLERA (senehinna) – ytre hvit lag ══ -->
        <g class="hotspot" id="hot-sclera" data-id="sclera" onclick="velg('sclera')">
          <ellipse class="hf" cx="280" cy="215" rx="195" ry="185" fill="url(#g-sclera)" opacity=".92"/>
          <!-- Blodkar-tekstur på sclera -->
          <ellipse cx="280" cy="215" rx="195" ry="185" fill="url(#pat-blodkar)" opacity=".5"/>
          <ellipse cx="280" cy="215" rx="201" ry="191" fill="transparent"/>
        </g>

        <!-- ══ ÅREHINNE (koroid) ══ -->
        <g class="hotspot" id="hot-koroid" data-id="koroid" onclick="velg('koroid')">
          <ellipse class="hf" cx="280" cy="215" rx="182" ry="172" fill="url(#g-koroid)" opacity=".88"/>
          <ellipse cx="280" cy="215" rx="188" ry="178" fill="transparent"/>
        </g>

        <!-- ══ NETTHINNE (retina) ══ -->
        <g class="hotspot" id="hot-netthinne" data-id="netthinne" onclick="velg('netthinne')">
          <ellipse class="hf" cx="280" cy="215" rx="170" ry="160" fill="url(#g-netthinne)" opacity=".78"/>
          <ellipse cx="280" cy="215" rx="176" ry="166" fill="transparent"/>
        </g>

        <!-- ══ GLASSLEGEME (vitreous) ══ -->
        <g class="hotspot" id="hot-glasslegeme" data-id="glasslegeme" onclick="velg('glasslegeme')">
          <!-- Glasslegemet fyller det meste av det indre -->
          <ellipse class="hf" cx="295" cy="218" rx="150" ry="145" fill="url(#g-glass)" opacity=".9"/>
          <ellipse cx="295" cy="218" rx="156" ry="151" fill="transparent"/>
        </g>

        <!-- ══ GULE FLEKK (macula / fovea) ══ -->
        <g class="hotspot" id="hot-macula" data-id="macula" onclick="velg('macula')">
          <ellipse class="hf" cx="220" cy="215" rx="22" ry="20" fill="url(#g-macula)" opacity=".9" filter="url(#gfs)"/>
          <!-- Fovea (sentrum) -->
          <ellipse cx="220" cy="215" rx="7" ry="7" fill="#fef9c3" opacity=".7"/>
          <ellipse cx="220" cy="215" rx="28" ry="26" fill="transparent"/>
        </g>

        <!-- ══ BLIND FLEKK (papilla) ══ -->
        <g class="hotspot" id="hot-blind" data-id="blind" onclick="velg('blind')">
          <ellipse class="hf" cx="365" cy="215" rx="18" ry="20" fill="url(#g-blind)" opacity=".85"/>
          <ellipse cx="365" cy="215" rx="24" ry="26" fill="transparent"/>
        </g>

        <!-- ══ SYNSNERVE (optic nerve) ══ -->
        <g class="hotspot" id="hot-nerve" data-id="nerve" onclick="velg('nerve')">
          <!-- Nervestamme ut av øyet -->
          <path class="hf" d="M374,197 Q400,200 430,205 Q460,208 490,210 L490,225 Q460,226 430,222 Q400,218 374,234 Z"
            fill="url(#g-nerve)" opacity=".9"/>
          <!-- Nervefibre-linjer -->
          <path d="M374,205 Q400,207 430,211 Q460,213 490,215" fill="none" stroke="rgba(251,191,36,.3)" stroke-width=".8"/>
          <path d="M374,210 Q400,212 430,215 Q460,217 490,218" fill="none" stroke="rgba(251,191,36,.25)" stroke-width=".6"/>
          <path d="M380,198 Q405,201 435,206" fill="none" stroke="rgba(251,191,36,.2)" stroke-width=".6"/>
          <path d="M380,230 Q405,227 435,224" fill="none" stroke="rgba(251,191,36,.2)" stroke-width=".6"/>
          <path d="M370,192 Q398,197 432,204 Q462,209 492,210 L492,228 Q462,229 432,228 Q398,225 370,238 Z" fill="transparent"/>
        </g>

        <!-- ══ KAMMERVÆSKE (aqueous humor) ══ -->
        <g class="hotspot" id="hot-kammerv" data-id="kammerv" onclick="velg('kammerv')">
          <!-- Fremre kammer mellom cornea og iris/linse -->
          <path class="hf" d="M108,215 Q112,170 140,148 Q160,136 175,140
                              L188,142 Q196,150 200,162 Q204,175 200,195
                              L200,235 Q204,255 196,268 Q188,278 175,280
                              L160,278 Q140,270 124,252 Q108,232 108,215 Z"
            fill="url(#g-kammer)" opacity=".82"/>
          <path d="M106,215 Q110,165 142,144 Q162,132 178,138 L202,160 Q208,178 202,215 Q208,252 178,292 L162,296 Q140,288 124,268 Q106,245 106,215 Z" fill="transparent"/>
        </g>

        <!-- ══ IRIS (regnbuehinnen) ══ -->
        <g class="hotspot iris-anim" id="hot-iris" data-id="iris" onclick="velg('iris')">
          <!-- Iris-ring -->
          <circle class="hf" cx="280" cy="215" r="80" fill="url(#g-iris)" opacity=".0"/>
          <!-- Iris som ring (donut) -->
          <path class="hf" d="M280,135 A80,80 0 1,1 279.9,135 Z M280,170 A45,45 0 1,0 280.1,170 Z"
            fill="url(#g-iris)" fill-rule="evenodd" opacity=".92"/>
          <!-- Iris-mønster (radiære linjer) -->
          <path d="M280,135 A80,80 0 1,1 279.9,135 Z M280,170 A45,45 0 1,0 280.1,170 Z"
            fill="url(#pat-iris)" fill-rule="evenodd" opacity=".6"/>
          <!-- Iris detaljer – noen streker -->
          <circle cx="280" cy="215" r="80" fill="none" stroke="rgba(147,197,253,.15)" stroke-width="1"/>
          <circle cx="280" cy="215" r="70" fill="none" stroke="rgba(147,197,253,.1)" stroke-width=".7"/>
          <circle cx="280" cy="215" r="60" fill="none" stroke="rgba(147,197,253,.08)" stroke-width=".6"/>
          <!-- Klikk-flate (ring) -->
          <path d="M280,130 A85,85 0 1,1 279.9,130 Z M280,165 A50,50 0 1,0 280.1,165 Z"
            fill="transparent" fill-rule="evenodd"/>
        </g>

        <!-- ══ PUPILL ══ -->
        <g class="hotspot pupil-anim" id="hot-pupil" data-id="pupil" onclick="velg('pupil')">
          <circle class="hf" cx="280" cy="215" r="44" fill="url(#g-pupil)" opacity=".98"/>
          <!-- Refleksjonspunkt -->
          <ellipse cx="265" cy="202" rx="7" ry="5" fill="url(#g-refleks)" opacity=".6"/>
          <circle cx="280" cy="215" r="48" fill="transparent"/>
        </g>

        <!-- ══ LINSE ══ -->
        <g class="hotspot" id="hot-linse" data-id="linse" onclick="velg('linse')">
          <!-- Linsen sitter rett bak pupillen/iris -->
          <ellipse class="hf" cx="280" cy="215" rx="38" ry="50" fill="url(#g-linse)" opacity=".88"/>
          <!-- Linseflater (krumning) -->
          <path d="M242,215 Q260,200 280,197 Q300,200 318,215" fill="none" stroke="rgba(224,242,254,.4)" stroke-width="1"/>
          <path d="M242,215 Q260,230 280,233 Q300,230 318,215" fill="none" stroke="rgba(224,242,254,.3)" stroke-width="1"/>
          <!-- Sonula-tråder -->
          <path d="M280,165 L280,175" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
          <path d="M280,265 L280,255" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
          <ellipse cx="280" cy="215" rx="42" ry="54" fill="transparent"/>
        </g>

        <!-- ══ HORNHINNE (cornea) – fremst ══ -->
        <g class="hotspot" id="hot-cornea" data-id="cornea" onclick="velg('cornea')">
          <!-- Fremre buet overflate -->
          <path class="hf" d="M108,215 Q112,168 140,146 Q158,134 172,136
                              Q186,138 196,152 Q205,166 205,215
                              Q205,264 196,278 Q186,292 172,294
                              Q158,296 140,284 Q112,262 108,215 Z"
            fill="url(#g-cornea)" opacity=".75"/>
          <!-- Ytre kant av cornea – markert linje -->
          <path d="M108,215 Q112,168 140,146 Q158,134 172,136 Q186,138 196,152 Q205,166 205,215 Q205,264 196,278 Q186,292 172,294 Q158,296 140,284 Q112,262 108,215 Z"
            fill="none" stroke="rgba(147,210,255,.5)" stroke-width="1.2"/>
          <!-- Reflekslinjer på hornhinnen -->
          <path d="M120,185 Q130,168 148,158" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1" stroke-linecap="round"/>
          <path d="M116,200 Q124,182 138,170" fill="none" stroke="rgba(255,255,255,.12)" stroke-width=".8" stroke-linecap="round"/>
          <path d="M106,215 Q110,165 142,142 Q162,130 175,132 L207,155 Q216,172 216,215 Q216,258 207,275 L175,298 Q162,300 142,288 Q110,265 106,215 Z" fill="transparent"/>
        </g>

        <!-- ══ SILIKARE LEGEMER / ZONULA ══ -->
        <!-- Ciliærkropp hint -->
        <g>

const DATA = {

    tekst:'Hornhinnen er den gjennomsiktige, buede fremre delen av øyet. Den bryter lys og er ansvarlig for omtrent 65–75 % av øyets totale lysbrytningsevne. Den er avascular – den har ingen blodkar – og får næring fra tårevæske og kammervæske. Hornhinnen er rik på nerveender og ekstremt følsom for berøring.',

    fakta:[
      {label:'Størrelse (mørkt)',verdi:'4–8 mm'},
      {label:'Størrelse (lys)',verdi:'1.5–2 mm'},
      {label:'Reaksjonstid',verdi:'< 0.3 sekunder'},
      {label:'Hva det er',verdi:'Et hull – ikke vev!'},
    ],
    tekst:'Pupillen er ikke et stoff eller vev – det er et hull i irisen som slipper lys inn til linsen og netthinnen. Størrelsen reguleres refleksivt av irismunklene: i mørke utvides pupillen (mydriasis) for å slippe inn mer lys, i sterkt lys innsnevres den (miosis). Pupillrefleksen brukes klinisk for å vurdere hjernefunksjonen.',

      {label:'Tykkelse',verdi:'~4 mm (hvile), 6 mm (nær)'},
      {label:'Diameter',verdi:'~10 mm'},
      {label:'Brytkraft',verdi:'~18–20 dioptrier'},
      {label:'Vekst',verdi:'Vokser hele livet'},
    ],
    tekst:'Linsen er en gjennomsiktig, elastisk bikonveks linse som sitter bak irisen og er festet til ciliærmuskelen via sonula-tråder (zonula). Den fine-fokuserer lyset på netthinnen ved å endre form – dette kalles akkommodasjon. Nær-fokus krever en tykkere, rundere linse. Med alder mister linsen elastisitet (alderssynhet). Grå stær er uklarhet i linsen.',

      {label:'Funksjon',verdi:'Næring + trykk'},

    tekst:'Kammervæsken er en klar, vannaktig væske som fyller det fremre og bakre kammeret (mellom cornea og linsen). Den produseres av ciliærlegemet, strømmer gjennom pupillen til det fremre kammeret og dreneres ut via trabekelnettet. Den gir næring til hornhinnen og linsen (som ikke har blodkar) og opprettholder intraokulærtrykket. Grønn stær skyldes økt trykk.',

    tekst:'Sclera er det ytre, harde, hvite laget av øyet – det vi ser som "det hvite i øyet". Den er laget av tett, uregelmessig bindevevs­kollagen som gir øyeeplet sin form og beskytter de indre strukturene. De seks ytre øyemusklene fester seg til sclera. Bakre del av sclera har en åpning (lamina cribrosa) der synsnerven forlater øyet.',

  glasslegeme:{

let aktivId=null;

function velg(id){
  aktivId=id;const d=DATA[id];if(!d)return;
  document.querySelectorAll('.organ-knapp').forEach(b=>{
    b.classList.toggle('aktiv',b.getAttribute('onclick')?.includes("'"+id+"'"));
  });
  document.querySelectorAll('.hotspot').forEach(g=>g.classList.toggle('aktiv',g.dataset.id===id));

  const pos={
    cornea:       {cx:155,cy:215,rx:55,ry:80},
    iris:         {cx:280,cy:215,rx:86,ry:86},
    pupil:        {cx:280,cy:215,rx:50,ry:50},
    linse:        {cx:280,cy:215,rx:44,ry:58},
    kammerv:      {cx:178,cy:215,rx:36,ry:80},
    sclera:       {cx:280,cy:215,rx:200,ry:190},
    koroid:       {cx:320,cy:215,rx:155,ry:145},
    netthinne:    {cx:310,cy:215,rx:142,ry:132},
    macula:       {cx:220,cy:215,rx:28,ry:26},
    blind:        {cx:365,cy:215,rx:24,ry:26},
    nerve:        {cx:440,cy:215,rx:55,ry:22},
    glasslegeme:  {cx:310,cy:215,rx:152,ry:148},
  };
  const p=pos[id]||{cx:280,cy:215,rx:40,ry:40};
  const ring=document.getElementById('aktiv-ring');
  ring.setAttribute('cx',p.cx);ring.setAttribute('cy',p.cy);
  ring.setAttribute('rx',p.rx);ring.setAttribute('ry',p.ry);
  ring.setAttribute('stroke',d.farge);ring.setAttribute('opacity','0.55');
  const at=ring.querySelector('animateTransform');
  at.setAttribute('from','0 '+p.cx+' '+p.cy);at.setAttribute('to','360 '+p.cx+' '+p.cy);

  document.querySelectorAll('.et').forEach(t=>t.classList.remove('hl'));
  const et=document.getElementById('et-'+id);if(et)et.classList.add('hl');

  document.getElementById('info-tom').style.display='none';
  document.getElementById('info-innhold').style.display='block';
  document.getElementById('info-panel').style.setProperty('--pglow',d.farge+'18');
  document.getElementById('info-panel').style.setProperty('--organ-farge',d.farge);

  document.getElementById('info-innhold').innerHTML=
    '<div class="info-header"><span class="info-emoji">'+d.emoji+'</span><div>'+
    '<div class="info-navn">'+d.navn+'</div>'+
    '<div class="info-latin">'+d.latin+'</div></div></div>'+
    '<div class="info-divider"></div>'+
    '<div class="info-grid">'+d.fakta.map(f=>'<div class="info-kort"><div class="info-kort-label">'+f.label+'</div><div class="info-kort-verdi">'+f.verdi+'</div></div>').join('')+'</div>'+
    '<p class="info-tekst">'+d.tekst+'</p>'+
    '<div class="info-fakta">💡 <strong>Visste du?</strong> '+d.morsomt+'</div>';

  if(window.innerWidth<960)document.getElementById('info-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

document.querySelectorAll('.hotspot').forEach(el=>{
  const id=el.dataset.id;if(!id)return;const d=DATA[id];if(!d)return;
  const tt=document.getElementById('tooltip');
  el.addEventListener('mouseenter',()=>{tt.textContent=d.navn;tt.style.opacity='1';});
  el.addEventListener('mousemove',e=>{
    const r=document.getElementById('svg-wrap').getBoundingClientRect();
    tt.style.left=(e.clientX-r.left)+'px';tt.style.top=(e.clientY-r.top)+'px';
  });
  el.addEventListener('mouseleave',()=>{tt.style.opacity='0';});
});

velg('cornea');
