<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoGebra – Geometri · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
<style>:root{
  --bg:#06101e;--card:#131f35;--border:rgba(255,255,255,.08);
  --accent:#ffd700;--green:#4ade80;--red:#f87171;--dim:#7a90b0;
  --text:#e8f0ff;--font-h:'Fredoka One',cursive;--font-b:'Nunito',sans-serif;
  --nav-h:40px;--grp-h:30px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-b);}

/* TOPBAR */
#topbar{
  height:var(--nav-h);display:flex;align-items:center;gap:8px;
  padding:0 14px;background:rgba(6,16,30,.97);
  border-bottom:1px solid var(--border);font-size:.8rem;flex-shrink:0;z-index:10;
}
#topbar a{color:var(--dim);text-decoration:none;}
#topbar a:hover{color:var(--text);}
.sep{color:rgba(255,255,255,.2);}
.tittel{color:var(--text);font-weight:600;}
.spacer{flex:1;}
.topbar-stats{display:flex;gap:10px;font-size:.76rem;color:var(--dim);}
.topbar-stats b{color:var(--accent);font-family:var(--font-h);}

/* GRUPPE-TABS */
.grp-tabs{
  height:var(--grp-h);display:flex;align-items:center;
  gap:3px;padding:0 10px;
  background:rgba(0,0,0,.25);border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;
}
.grp-tab{
  padding:2px 10px;border-radius:10px;
  border:1px solid rgba(255,255,255,.08);background:transparent;
  color:var(--dim);cursor:pointer;font-size:.71rem;
  font-family:var(--font-b);white-space:nowrap;transition:all .15s;
}
.grp-tab.aktiv{background:rgba(255,215,0,.1);border-color:var(--accent);color:var(--accent);}

/* === TRE-KOLONNE LAYOUT === */
#app{
  display:grid;
  grid-template-columns:260px 1fr 220px;
  grid-template-rows:1fr;
  grid-template-areas:"venstre ggb meny";
  height:calc(100vh - var(--nav-h) - var(--grp-h));
  overflow:hidden;
}

/* VENSTRE KOLONNE: oppgave + svar */
#venstre{
  grid-area:venstre;
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  background:var(--bg);
  overflow-y:auto;
  min-height:0;
}
.oppg-hode{padding:14px 14px 8px;flex-shrink:0;}
.oppg-label{
  font-size:.64rem;color:var(--accent);font-weight:700;
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;
}
.oppg-tekst{font-size:.88rem;line-height:1.55;color:var(--text);}
.oppg-tekst strong{color:var(--accent);}
.hint-toggle{
  font-size:.71rem;color:var(--dim);background:none;border:none;
  cursor:pointer;padding:5px 0 0;display:block;
}
.hint-toggle:hover{color:var(--accent);}
.oppg-hint{
  display:none;font-size:.72rem;color:var(--dim);
  line-height:1.45;background:rgba(255,255,255,.04);
  border-radius:6px;padding:7px 9px;margin-top:6px;
}
.oppg-hint.vis{display:block;}

/* SVAR-SEKSJON */
.svar-seksjon{
  padding:10px 14px 14px;
  display:flex;flex-direction:column;
  gap:8px;flex-shrink:0;
}
.svar-label{font-size:.74rem;color:var(--dim);margin-bottom:2px;}

/* Input */
.koeff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.koeff-grid.to{grid-template-columns:1fr 1fr;}
.koeff-felt{display:flex;flex-direction:column;gap:3px;}
.koeff-felt label{font-size:.7rem;color:var(--dim);text-align:center;}
.koeff-input{
  height:46px;background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.2);
  border-radius:8px;color:var(--text);
  font-family:var(--font-h);font-size:1.15rem;
  text-align:center;outline:none;
  transition:border-color .15s;width:100%;
}
.koeff-input:focus{border-color:var(--accent);}
.koeff-input.ok{border-color:var(--green);background:rgba(74,222,128,.07);}
.koeff-input.feil{border-color:var(--red);background:rgba(248,113,113,.07);}

/* Sliders */
.slider-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sval{background:rgba(255,255,255,.06);border-radius:8px;padding:8px;text-align:center;}
.sval-n{font-family:var(--font-h);font-size:1.4rem;color:var(--accent);}
.sval-l{font-size:.68rem;color:var(--dim);margin-top:2px;}

/* Knapper */
.sjekk-btn{
  width:100%;padding:12px;font-family:var(--font-h);font-size:1rem;
  background:var(--accent);color:#000;border:none;border-radius:9px;
  cursor:pointer;transition:filter .15s;
}
.sjekk-btn:hover{filter:brightness(1.08);}
.sjekk-btn:disabled{opacity:.35;cursor:default;}
.fb{padding:9px 11px;border-radius:8px;font-size:.82rem;line-height:1.5;display:none;}
.fb.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);display:block;}
.fb.feil{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);display:block;}
.fb.nesten{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);color:var(--accent);display:block;}
.neste-btn{
  width:100%;padding:9px;font-family:var(--font-h);font-size:.9rem;
  background:var(--green);color:#000;border:none;border-radius:8px;
  cursor:pointer;display:none;
}

/* MIDTRE KOLONNE: GeoGebra */
#ggb-wrap{grid-area:ggb;background:#fff;min-width:0;min-height:0;}
#ggb-container{width:100%;height:100%;}

/* HØYRE KOLONNE: meny */
#meny{
  grid-area:meny;
  display:flex;flex-direction:column;
  border-left:1px solid var(--border);
  background:rgba(0,0,0,.18);
  overflow-y:auto;
  min-height:0;
}
.meny-hode{
  padding:8px 10px 4px;font-size:.64rem;color:var(--dim);
  font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  flex-shrink:0;position:sticky;top:0;
  background:rgba(6,16,30,.95);border-bottom:1px solid var(--border);
}
.grp-header{
  font-size:.66rem;color:var(--dim);font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;
  padding:8px 10px 3px;flex-shrink:0;
}
.oknapp{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:6px;
  border:1px solid transparent;background:transparent;
  color:var(--dim);cursor:pointer;font-size:.79rem;
  font-family:var(--font-b);text-align:left;
  width:calc(100% - 8px);margin:1px 4px;
  transition:all .12s;
}
.oknapp:hover{background:rgba(255,255,255,.05);color:var(--text);}
.oknapp.aktiv{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.2);color:var(--accent);}
.oknapp.løst{background:rgba(74,222,128,.06);border-color:rgba(74,222,128,.15);color:var(--green);}
.ok-nr{font-size:.68rem;color:var(--dim);width:16px;flex-shrink:0;font-family:var(--font-h);}
.ok-ikon{font-size:.78rem;width:14px;flex-shrink:0;}
.fremdrift{display:none;}
.reg-info{font-size:.76rem;color:var(--dim);line-height:1.5;background:rgba(255,255,255,.04);border-radius:6px;padding:7px 10px;margin-bottom:8px;}
.ny-runde-btn{
  width:100%;padding:9px;font-family:var(--font-h);font-size:.9rem;
  background:rgba(255,255,255,.07);color:var(--dim);
  border:none;border-radius:8px;
  cursor:pointer;display:none;margin-top:6px;
}
.ny-runde-btn:hover{background:rgba(255,255,255,.12);color:var(--text);}
.ny-oppg-btn{
  width:100%;padding:9px;font-family:var(--font-h);font-size:.9rem;
  background:rgba(96,165,250,.25);color:#bfdbfe;
  border:none;border-radius:8px;
  cursor:pointer;display:none;margin-top:6px;
}
.ny-oppg-btn:hover{background:rgba(96,165,250,.38);}

/* MOBIL */
@media(max-width:800px){
  html,body{overflow:auto;}
  #app{
    grid-template-columns:1fr;
    grid-template-rows:50vw auto auto;
    grid-template-areas:"ggb" "venstre" "meny";
    height:auto;
  }
  #meny{max-height:200px;border-left:none;border-top:1px solid var(--border);}
  #venstre{border-right:none;border-bottom:1px solid var(--border);}
}</style>
</head>
<body>
<div id="header" style="display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border)">
  <a href="index.html" style="color:var(--dim);text-decoration:none;font-size:.82rem">← SkapLab</a>
  <div style="font-family:var(--font-h);font-size:1.3rem;color:var(--accent)">📐 GeoGebra – Geometri</div>
  <div style="font-size:.75rem;color:var(--dim);margin-left:4px">Tegn geometriske figurer med gitte startpunkter · LK20</div>
  <div style="flex:1"></div>
  <div id="header-stat" style="font-size:.82rem;color:var(--dim)"></div>
</div>
<div id="app-wrap" style="display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 50px)">
  <div id="sidebar" style="background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:8px 6px"></div>
  <div id="main" style="display:flex;flex-direction:column">
    <div id="ggb-wrap"><div id="ggb-container"></div></div>
    <div id="oppg-panel" style="padding:16px 20px;overflow-y:auto;flex:1">
      <div style="color:var(--dim);padding:40px;text-align:center">
        <div style="font-size:2.5rem;margin-bottom:12px">📐</div>
        <div style="font-family:var(--font-h);font-size:1.2rem;color:var(--text);margin-bottom:6px">Velg en oppgave til venstre</div>
        <div style="font-size:.88rem;line-height:1.6">Tegn geometriske figurer med gitte startpunkter · LK20</div>
      </div>
    </div>
  </div>
</div>
<script>

// ══════════════════════════════════════════════════════════════════
// HJELPEFUNKSJONER FOR DYNAMISKE OPPGAVER
// ══════════════════════════════════════════════════════════════════

function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function rndIkkeNull(a, b) { var v; do { v = rnd(a, b); } while (v === 0); return v; }
function pluss(n) { return n >= 0 ? '+' + n : '\u2212' + Math.abs(n); }
function vis(n)   { return n < 0 ? '(' + n + ')' : String(n); }
function fmt(n)   { return Number.isInteger(n) ? String(n) : n.toFixed(2).replace('.', ','); }

// Tegnsetting for ax²+bx+c
function lagPolynom(a, b, c) {
  var s = '';
  if (a === 1) s += 'x\u00b2';
  else if (a === -1) s += '\u2212x\u00b2';
  else s += a + 'x\u00b2';
  if (b > 0)  s += ' + ' + b + 'x';
  else if (b < 0) s += ' \u2212 ' + Math.abs(b) + 'x';
  if (c > 0)  s += ' + ' + c;
  else if (c < 0) s += ' \u2212 ' + Math.abs(c);
  return s;
}
function lagLinear(a, b) {
  var s = '';
  if (a === 1) s = 'x'; else if (a === -1) s = '\u2212x'; else s = a + 'x';
  if (b > 0) s += ' + ' + b; else if (b < 0) s += ' \u2212 ' + Math.abs(b);
  return s;
}
function lagEksp(a, b) {
  return (a === 1 ? '' : a + ' \u00b7 ') + b + '\u02e3';
}

// GeoGebra-uttrykk (bruker * og ^ i stedet for · og ˣ)
function ggbPolynom(a, b, c) {
  return a + '*x^2 + ' + b + '*x + ' + c;
}
function ggbLinear(a, b) { return a + '*x + ' + b; }
function ggbEksp(a, b)   { return a + ' * ' + b + '^x'; }

// ══════════════════════════════════════════════════════════════════
// GENERATORER — én per oppgave-ID
// ══════════════════════════════════════════════════════════════════

var GENERATORER = {

// ── 1. Avgrense parabel ──────────────────────────────────────────
'avg1': function() {
  var fns = [
    { uttrykk: 'x^2',       visning: 'x\u00b2',      farge: 'Blue'   },
    { uttrykk: 'x^2 - 4',   visning: 'x\u00b2 \u2212 4', farge: 'Blue' },
    { uttrykk: '2*x^2',     visning: '2x\u00b2',      farge: 'Blue'   },
    { uttrykk: 'x^2 + 1',   visning: 'x\u00b2 + 1',   farge: 'Blue'   },
  ];
  var fn = fns[rnd(0, fns.length - 1)];
  var a = rnd(-4, -1);
  var b = rnd(2, 5);
  return {
    fn: fn, a: a, b: b,
    tekst: 'Bruk sliderne <strong>a</strong> og <strong>b</strong> til \u00e5 avgrense grafen <strong>f(x) = ' + fn.visning + '</strong> slik at den bare vises for <strong>' + a + ' \u2264 x \u2264 ' + b + '</strong>.',
    hint: 'Dra slider a til ' + a + ' og slider b til ' + b + '.',
    cmds: [
      'ZoomIn(' + (a-2) + ', -2, ' + (b+2) + ', 15)',
      'a = Slider(-6, 0, 0.5)', 'b = Slider(0, 8, 0.5)',
      'SetValue(a, ' + (a-1) + ')', 'SetValue(b, ' + (b+1) + ')',
      'bakgrunn(x) = ' + fn.uttrykk,
      'SetColor(bakgrunn, "LightGray")', 'SetLineStyle(bakgrunn, 1)',
      'f(x) = If(x >= a && x <= b, ' + fn.uttrykk + ')',
      'SetColor(f, "' + fn.farge + '")', 'SetLineThickness(f, 3)',
    ],
    fasitA: a, fasitB: b,
  };
},

// ── 2. Avgrense eksponentiell ─────────────────────────────────────
'avg2': function() {
  var basar = [2, 3];
  var base = basar[rnd(0, 1)];
  var a = rnd(-3, -1);
  var b = rnd(2, 4);
  return {
    a: a, b: b,
    tekst: 'Avgrens grafen <strong>f(x) = ' + base + '\u02e3</strong> slik at den bare vises for <strong>' + a + ' \u2264 x \u2264 ' + b + '</strong>.',
    hint: 'Dra slider a til ' + a + ' og slider b til ' + b + '.',
    cmds: [
      'ZoomIn(' + (a-2) + ', -1, ' + (b+2) + ', 20)',
      'a = Slider(-5, 0, 0.5)', 'b = Slider(0, 6, 0.5)',
      'SetValue(a, ' + (a-1) + ')', 'SetValue(b, ' + (b+1) + ')',
      'bakgrunn(x) = ' + base + '^x',
      'SetColor(bakgrunn, "LightGray")', 'SetLineStyle(bakgrunn, 1)',
      'f(x) = If(x >= a && x <= b, ' + base + '^x)',
      'SetColor(f, "Purple")', 'SetLineThickness(f, 3)',
    ],
    fasitA: a, fasitB: b,
  };
},

// ── 3–4. Ekstremalpunkt parabel ───────────────────────────────────
'eks_parabel': function(retning) {
  // retning: 1=toppunkt (a<0), -1=bunnpunkt (a>0)
  var a = retning === 1 ? rnd(-3, -1) : rnd(1, 3);
  // Velg b,c slik at toppunkt-x er heltall: x0 = -b/(2a)
  var x0 = rnd(-3, 3);
  var b  = -2 * a * x0;          // b = -2ax0 → x0 = -b/2a ✓
  var c  = rnd(-5, 5);
  var y0 = a * x0 * x0 + b * x0 + c;
  var type = retning === 1 ? 'toppunkt' : 'bunnpunkt';
  return {
    a: a, b: b, c: c, x0: x0, y0: y0,
    tekst: 'Grafen viser <strong>f(x) = ' + lagPolynom(a, b, c) + '</strong>. Bruk GeoGebras <strong>ekstremalpunkt-verkt\u00f8y</strong> og finn ' + type + 'et. Skriv inn koordinatene.',
    hint: 'Beregning \u2192 Ekstremalpunkt, klikk p\u00e5 grafen. Eller: x = \u2212b/(2a) = ' + x0 + ', f(' + x0 + ') = ' + y0 + '.',
    cmds: [
      'ZoomIn(' + (x0-5) + ', ' + (y0 - (retning===1?2:6)) + ', ' + (x0+5) + ', ' + (y0 + (retning===1?6:2)) + ')',
      'f(x) = ' + ggbPolynom(a, b, c),
      'SetColor(f, "Blue")', 'SetLineThickness(f, 3)',
    ],
    fasitX: x0, fasitY: y0,
  };
},

// ── 5. Kubikk – lokalt maksimum ──────────────────────────────────
'eks3': function() {
  // f(x) = ax³ + bx med f'(x) = 3ax² + b = 0 → x = ±sqrt(-b/3a)
  // Enklest: f(x) = x³ - kx, f'= 3x²-k=0, x=±sqrt(k/3)
  // For å få pent svar: k=3 → x=±1
  var k = [3, 12, 27][rnd(0, 2)]; // gir x=±1, ±2, ±3
  var x0 = -Math.sqrt(k / 3); // lokalt maks (negativ x)
  var y0 = x0 * x0 * x0 - k * x0;
  return {
    k: k, x0: x0, y0: y0,
    tekst: 'Grafen viser <strong>f(x) = x\u00b3 \u2212 ' + k + 'x</strong>. Finn <strong>lokalt maksimum</strong> med GeoGebras verkt\u00f8y.',
    hint: 'Bruk Beregning \u2192 Ekstremalpunkt og klikk p\u00e5 det \u00f8verste punktet. x = \u2212' + Math.abs(x0) + '.',
    cmds: [
      'ZoomIn(' + (x0-3) + ', ' + (y0-2) + ', ' + (-x0+3) + ', ' + (y0+2) + ')',
      'f(x) = x^3 - ' + k + '*x',
      'SetColor(f, "Blue")', 'SetLineThickness(f, 3)',
    ],
    fasitX: x0, fasitY: y0,
  };
},

// ── 6. Toppunkt med desimaler ────────────────────────────────────
'eks4': function() {
  // a < 0, b odd → x0 = -b/(2a) har .5-desimal
  var a = rnd(-3, -1);
  var b = [1, 3, 5, -1, -3, -5][rnd(0, 5)]; // odd
  var c = rnd(-3, 3);
  var x0 = -b / (2 * a);            // .5-desimal
  var y0 = a * x0 * x0 + b * x0 + c;
  y0 = Math.round(y0 * 100) / 100;  // rund til 2 des
  return {
    a: a, b: b, c: c, x0: x0, y0: y0,
    tekst: 'Grafen viser <strong>f(x) = ' + lagPolynom(a, b, c) + '</strong>. Finn toppunktet. Rund av til to desimaler.',
    hint: 'GeoGebra viser koordinatene n\u00e5r du klikker med ekstremalpunkt-verkt\u00f8yet. x = ' + fmt(x0) + ', y \u2248 ' + fmt(y0) + '.',
    cmds: [
      'ZoomIn(' + (x0-5) + ', ' + (y0-4) + ', ' + (x0+5) + ', ' + (y0+4) + ')',
      'f(x) = ' + ggbPolynom(a, b, c),
      'SetColor(f, "Blue")', 'SetLineThickness(f, 3)',
    ],
    fasitX: x0, fasitY: y0,
  };
},

// ── 7. To x ved gitt y ────────────────────────────────────────────
'xy1': function() {
  // f(x) = x²-c, y=k → x=±sqrt(k+c), velg c,k slik at k+c er kvadrattall
  var x0 = rnd(1, 4);  // fasit x = ±x0
  var c  = rnd(0, 5);
  var k  = x0 * x0 - c; // k+c = x0² → x=±x0
  return {
    x0: x0, c: c, k: k,
    tekst: 'Grafen viser <strong>f(x) = x\u00b2 \u2212 ' + c + '</strong> og linjen <strong>y\u00a0=\u00a0' + k + '</strong>. Bruk GeoGebras <strong>skj\u00e6ringspunkt-verkt\u00f8y</strong> og finn de to x-verdiene.',
    hint: 'Beregning \u2192 Skj\u00e6ring, klikk p\u00e5 grafen og den r\u00f8de linjen. x\u00b2\u2212' + c + '=' + k + ' \u2192 x=\u00b1' + x0 + '.',
    cmds: [
      'ZoomIn(' + (-x0-3) + ', ' + (k-4) + ', ' + (x0+3) + ', ' + (k+4) + ')',
      'f(x) = x^2 - ' + c,
      'SetColor(f, "Blue")', 'SetLineThickness(f, 3)',
      'yLinje: y = ' + k,
      'SetColor(yLinje, "Red")', 'SetLineStyle(yLinje, 1)',
    ],
    fasit1: -x0, fasit2: x0,
  };
},

// ── 8. En x ved gitt y (lineær) ──────────────────────────────────
'xy2': function() {
  var a = rndIkkeNull(-3, 3);
  var b = rnd(-5, 5);
  var x0 = rnd(-3, 3);
  var k  = a * x0 + b;
  return {
    a: a, b: b, x0: x0, k: k,
    tekst: 'Grafen viser <strong>f(x) = ' + lagLinear(a, b) + '</strong> og linjen <strong>y\u00a0=\u00a0' + k + '</strong>. Bruk GeoGebras skj\u00e6ringspunkt-verkt\u00f8y og finn x-verdien.',
    hint: 'Beregning \u2192 Skj\u00e6ring. ' + a + 'x' + (b>=0?'+':'')+b+'='+k+' \u2192 x='+x0+'.',
    cmds: [
      'ZoomIn(' + (x0-4) + ', ' + (k-6) + ', ' + (x0+4) + ', ' + (k+6) + ')',
      'f(x) = ' + ggbLinear(a, b),

// ── 11. Skjæring: linje møter parabel ────────────────────────────
'skj1': function() {
  // x² = mx + n → x² - mx - n = 0 → x = (m ± sqrt(m²+4n))/2
  // Velg heltallsrøtter x1,x2: (x-x1)(x-x2)=0 → x²-(x1+x2)x+x1·x2=0
  // f(x)=x², g(x)=mx+n: skjæring der x²=mx+n → m=x1+x2, n=-x1*x2
  var x1 = rnd(-3, 0), x2 = rnd(1, 3);
  while (x1 === x2) { x1 = rnd(-3, 0); }
  var m = x1 + x2, n = -x1 * x2;
  var y1 = x1 * x1, y2 = x2 * x2;
  return {
    x1: x1, x2: x2, m: m, n: n,
    tekst: 'Grafen viser <strong>f(x) = x\u00b2</strong> og <strong>g(x) = ' + lagLinear(m, n) + '</strong>. Bruk skj\u00e6ringspunkt-verkt\u00f8yet og finn de to x-verdiene der grafene m\u00f8tes.',
    hint: 'Beregning \u2192 Skj\u00e6ring, klikk p\u00e5 begge grafene. x\u00b2=' + lagLinear(m, n) + ' \u2192 x=' + x1 + ' og x=' + x2 + '.',
    cmds: [
      'ZoomIn(' + (x1-2) + ', -1, ' + (x2+2) + ', ' + (y2+3) + ')',
      'f(x) = x^2',
      'g(x) = ' + ggbLinear(m, n),
      'SetColor(f, "Blue")', 'SetColor(g, "Red")',
      'SetLineThickness(f, 3)', 'SetLineThickness(g, 2)',
    ],
    fasit1: x1, fasit2: x2,
  };
},

// ── 12. Skjæring: to linjer ───────────────────────────────────────
'skj2': function() {
  // f=a1*x+b1, g=a2*x+b2, a1≠a2 → x=(b2-b1)/(a1-a2) heltall
  var a1 = rndIkkeNull(-3, 3);
  var a2; do { a2 = rndIkkeNull(-3, 3); } while (a2 === a1);
  var x0 = rnd(-2, 3);
  var b1 = rnd(-4, 4);
  var y0 = a1 * x0 + b1;
  var b2 = y0 - a2 * x0;
  return {
    a1: a1, b1: b1, a2: a2, b2: b2, x0: x0, y0: y0,
    tekst: 'Grafen viser <strong>f(x) = ' + lagLinear(a1, b1) + '</strong> og <strong>g(x) = ' + lagLinear(a2, b2) + '</strong>. Bruk skj\u00e6ringspunkt-verkt\u00f8yet og finn skj\u00e6ringspunktet.',
    hint: 'Beregning \u2192 Skj\u00e6ring. Sett ' + lagLinear(a1, b1) + ' = ' + lagLinear(a2, b2) + ' \u2192 x=' + x0 + ', y=' + y0 + '.',
    cmds: [
      'ZoomIn(' + (x0-4) + ', ' + (y0-5) + ', ' + (x0+4) + ', ' + (y0+5) + ')',
      'f(x) = ' + ggbLinear(a1, b1),
      'g(x) = ' + ggbLinear(a2, b2),
      'SetColor(f, "Blue")', 'SetColor(g, "Red")',
      'SetLineThickness(f, 3)', 'SetLineThickness(g, 3)',
    ],
    fasitX: x0, fasitY: y0,
  };
},

// ── 14. Skriv inn parabel ────────────────────────────────────────
'inp2': function() {
  // Bruk røtter: f(x) = (x-r1)(x-r2) = x² - (r1+r2)x + r1*r2
  var r1 = rnd(-3, -1), r2 = rnd(1, 3);
  var b = -(r1 + r2), c = r1 * r2;
  var xTopp = (r1 + r2) / 2;
  var yTopp = xTopp * xTopp + b * xTopp + c;
  return {
    b: b, c: c, r1: r1, r2: r2, xTopp: xTopp, yTopp: yTopp,
    tekst: 'Skriv inn parabelen <strong>f(x) = ' + lagPolynom(1, b, c) + '</strong> i algebrafeltet. Grafen skal skj\u00e6re x-aksen i x\u00a0=\u00a0' + r1 + ' og x\u00a0=\u00a0' + r2 + '.',
    hint: 'Skriv: f(x) = x^2 + ' + b + '*x + ' + c + '. Sjekk at f(' + r1 + ') = 0 og f(' + r2 + ') = 0.',
    cmds: [
      'ZoomIn(' + (r1-2) + ', ' + (yTopp-2) + ', ' + (r2+2) + ', 4)',

      'ShowLabel(N1, true)', 'ShowLabel(N2, true)',
    ],
    testX: [r1, r2, xTopp], testY: [0, 0, yTopp],
  };
},

function byggGeometriOppgaver() {
  function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function fmt(n){ return Number.isInteger(n)?String(n):n.toFixed(2); }

  // ── Sjekk-hjelpere ────────────────────────────────────────────

  // Sjekk vinkel via GeoGebra evalCommand + getValue
  function hentVinkelGrader(ggb, p1, toppunkt, p2) {
    try {
      var navn = 'v_tmp_';
      ggb.evalCommand(navn + '=Angle('+p1+','+toppunkt+','+p2+')');
      var rad = ggb.getValue(navn);
      ggb.deleteObject(navn);
      return rad * 180 / Math.PI;
    } catch(e) { return null; }
  }

  // Sjekk avstand mellom to punkt
  function hentAvstand(ggb, p1, p2) {
    try {
      var navn = 'd_tmp_';
      ggb.evalCommand(navn + '=Distance('+p1+','+p2+')');
      var d = ggb.getValue(navn);
      ggb.deleteObject(navn);
      return d;
    } catch(e) { return null; }
  }

  // Sjekk at punkt P eksisterer og er plassert rimelig fritt
  function punktEksisterer(ggb, navn) {
    var navnene = ggb.getAllObjectNames();
    return navnene.indexOf(navn) >= 0 && ggb.getObjectType(navn) === 'point';
  }

  // Tallsvar-sjekk fra inputfelt
  function sjekkTall(fasit, tol, feltId) {
    feltId = feltId || 'inp-tall';
    return function(ggb) {
      var el = document.getElementById(feltId);
      var v = parseFloat((el?el.value:'').replace(',','.'));
      if (isNaN(v)) return {ok:false,nesten:false,melding:'Skriv inn svaret ditt.'};
      var ok  = Math.abs(v-fasit) <= tol;
      var nst = Math.abs(v-fasit) <= tol*4;
      return { ok:ok, nesten:!ok&&nst,
        melding: ok ? '✓ Riktig! Svaret er '+fmt(fasit)+'.'
                    : 'Fasit: '+fmt(fasit)+'. Du svarte '+fmt(v)+'.' };
    };
  }

  // ── OPPGAVE 1: Rettvinklet trekant ───────────────────────────
  var ab1 = rnd(3,8);
  var ac1 = rnd(3,8);
  var areal1 = ab1 * ac1 / 2;
  var hyp1 = Math.round(Math.sqrt(ab1*ab1 + ac1*ac1) * 100) / 100;

  OPPGAVER.push({
    id:'geo1', gruppe:'Geometri', tittel:'1 · Rettvinklet trekant',
    tekst:'To punkt er allerede plassert: <b>A = (0, 0)</b> og <b>B = ('+ab1+', 0)</b>.<br><br>'
      +'Plasser punkt <b>C</b> slik at trekant ABC er <b>rettvinklet i A</b> '
      +'(AC ⊥ AB) og AC = '+ac1+'.<br><br>'
      +'Tips: C skal ligge rett opp fra A, altså ved x = 0.<br><br>'
      +'<b>a) Hva er arealet av trekanten?</b><br>'
      +'<input id="inp-areal" type="number" step="0.5" placeholder="0" '
      +'style="width:120px;padding:8px 12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:#e8f0ff;font-size:1rem;margin:4px 0"><br><br>'
      +'<b>b) Hva er hypotenusen BC?</b><br>'
      +'<input id="inp-hyp" type="number" step="0.01" placeholder="0.00" '
      +'style="width:120px;padding:8px 12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:#e8f0ff;font-size:1rem;margin-top:4px">',
    hint:'C har koordinater (0, '+ac1+'). Rettvinklet i A betyr vinkel CAB = 90°. Areal = ½ · AB · AC = ½ · '+ab1+' · '+ac1+'. Hypotenuse: Pytagoras → √(AB²+AC²).',
    ggbKommandoer:[
      'A=(0,0)', 'B=('+ab1+',0)',
      'SetColor(A,"#ffd700")', 'SetColor(B,"#ffd700")',
      'SetPointSize(A,5)', 'SetPointSize(B,5)',
      'ZoomIn(-1,'+(ab1+2)+',-1,'+(ac1+3)+')'
    ],
    sjekk: function(ggb) {
      if (!punktEksisterer(ggb,'C')) return {ok:false,nesten:false,melding:'Plasser punkt C i koordinatsystemet.'};
      var vinkel = hentVinkelGrader(ggb,'B','A','C');
      var vinkelOk = vinkel !== null && Math.abs(vinkel-90) <= 2;
      var avstand = hentAvstand(ggb,'A','C');
      var avstandOk = avstand !== null && Math.abs(avstand-ac1) <= 0.15;
      if (!vinkelOk) return {ok:false,nesten:avstandOk,
        melding:'Vinkel i A = '+( vinkel?Math.round(vinkel)+'°':'ukjent')+'. Skal være 90°. Plasser C rett over A.'};
      if (!avstandOk) return {ok:false,nesten:vinkelOk,
        melding:'C er rettvinklet ✓, men AC = '+(avstand?avstand.toFixed(1):'?')+', skal være '+ac1+'.'};
      // Sjekk tallsvar
      var arealSvar = sjekkTall(areal1, 0.5, 'inp-areal')(ggb);
      var hypSvar   = sjekkTall(hyp1, 0.1, 'inp-hyp')(ggb);
      if (!arealSvar.ok) return {ok:false,nesten:true,melding:'C er riktig ✓! '+arealSvar.melding};
      if (!hypSvar.ok)   return {ok:false,nesten:true,melding:'Areal riktig ✓! '+hypSvar.melding};
      return {ok:true,nesten:false,melding:'✓ Perfekt! Vinkel, areal og hypotenuse er alle riktige.'};
    }
  });

  // ── OPPGAVE 2: Likesidet trekant ─────────────────────────────
  var s2alts=[3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8];
  var side2 = s2alts[rnd(0,s2alts.length-1)];
  var h2 = Math.round(side2 * Math.sqrt(3)/2 * 100)/100;
  var areal2 = Math.round(Math.sqrt(3)/4 * side2*side2 * 100)/100;
  var cx2 = side2/2, cy2 = Math.round(Math.sqrt(3)/2*side2*100)/100;

  OPPGAVER.push({
    id:'geo2', gruppe:'Geometri', tittel:'2 · Likesidet trekant',
    tekst:'Punkt <b>A = (0, 0)</b> og <b>B = ('+side2+', 0)</b> er gitt.<br><br>'
      +'Plasser punkt <b>C</b> slik at trekant ABC er <b>likesidet</b> '
      +'(alle sider = '+side2+').<br><br>'
      +'Tips: C ligger midt over AB, på høyde h = side · √3/2 ≈ '+h2+'.<br><br>'
      +'<b>Hva er arealet av trekanten?</b> (rund av til 2 desimaler)<br>'
      +'<input id="inp-tall" type="number" step="0.01" placeholder="0.00" '
      +'style="width:130px;padding:8px 12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:#e8f0ff;font-size:1rem;margin-top:4px">',
    hint:'C = ('+cx2+', '+h2+'). For likesidet trekant: alle vinkler = 60°. Areal = √3/4 · side² ≈ '+areal2+'.',
    ggbKommandoer:[
      'A=(0,0)', 'B=('+side2+',0)',
      'SetColor(A,"#ffd700")', 'SetColor(B,"#ffd700")',
      'SetPointSize(A,5)', 'SetPointSize(B,5)',
      'ZoomIn(-1,'+(side2+1)+',-1,'+(h2+2)+')'
    ],
    sjekk: function(ggb) {
      if (!punktEksisterer(ggb,'C')) return {ok:false,nesten:false,melding:'Plasser punkt C.'};
      var ac = hentAvstand(ggb,'A','C');
      var bc = hentAvstand(ggb,'B','C');
      var ab = hentAvstand(ggb,'A','B');
      var tol2 = 0.2;
      var likeOk = ac!==null && bc!==null && ab!==null
        && Math.abs(ac-side2)<=tol2 && Math.abs(bc-side2)<=tol2;
      if (!likeOk) return {ok:false, nesten: ac!==null && Math.abs(ac-side2)<=0.5,
        melding:'Sidelengder: AC≈'+(ac?ac.toFixed(2):'?')+', BC≈'+(bc?bc.toFixed(2):'?')+', AB≈'+(ab?ab.toFixed(2):'?')+'. Alle skal være '+side2+'.'};
      var tallSjekk = sjekkTall(areal2, 0.3, 'inp-tall')(ggb);
      if (!tallSjekk.ok) return {ok:false,nesten:true,melding:'C er riktig ✓! '+tallSjekk.melding};
      return {ok:true,nesten:false,melding:'✓ Likesidet trekant og riktig areal!'};
    }
  });

  // ── OPPGAVE 3: Rektangel ─────────────────────────────────────
  var b3 = rnd(4,8), h3 = rnd(2,5);
  var areal3 = b3*h3, omk3 = 2*(b3+h3);

  OPPGAVER.push({
    id:'geo3', gruppe:'Geometri', tittel:'3 · Rektangel',
    tekst:'Punkt <b>A = (0, 0)</b> og <b>B = ('+b3+', 0)</b> er gitt.<br><br>'
      +'Plasser punkt <b>C</b> og <b>D</b> slik at ABCD er et <b>rektangel</b> '
      +'med høyde '+h3+'.<br><br>'
      +'Tips: C = ('+b3+', '+h3+') og D = (0, '+h3+').<br><br>'
      +'<b>a) Areal:</b> <input id="inp-areal" type="number" step="1" placeholder="0" '
      +'style="width:100px;padding:8px 10px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:#e8f0ff;font-size:1rem"> '
      +'<b style="margin-left:12px">b) Omkrets:</b> '
      +'<input id="inp-omk" type="number" step="1" placeholder="0" '
      +'style="width:100px;padding:8px 10px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:#e8f0ff;font-size:1rem">',
    hint:'C=('+b3+','+h3+'), D=(0,'+h3+'). Tegn gjerne Polygon(A,B,C,D). Areal = '+b3+' · '+h3+' = '+areal3+'. Omkrets = 2·('+b3+'+'+h3+') = '+omk3+'.',
    ggbKommandoer:[
      'A=(0,0)','B=('+b3+',0)',
      'SetColor(A,"#ffd700")','SetColor(B,"#ffd700")',
      'SetPointSize(A,5)','SetPointSize(B,5)',
      'ZoomIn(-1,'+(b3+2)+',-1,'+(h3+3)+')'
    ],
    sjekk: function(ggb) {
      // Robust: scan alle punkt, finn fire hjørner uavhengig av navn
      var tol = 0.25;
      var hjørner = [
        [0,0],[b3,0],[b3,h3],[0,h3]
      ];
      var navnene = ggb.getAllObjectNames();
      var funnet = hjørner.map(function(hj) {
        return navnene.some(function(n) {
          if (ggb.getObjectType(n)!=='point') return false;
          return Math.abs(ggb.getXcoord(n)-hj[0])<=tol
              && Math.abs(ggb.getYcoord(n)-hj[1])<=tol;
        });
      });
      // A og B er forhåndsplassert — de to første hjørnene er der allerede
      var mangler = funnet.filter(function(f){return !f;}).length;
      if (mangler > 0) {
        var funnetAntall = funnet.filter(function(f){return f;}).length;
        return {ok:false, nesten: funnetAntall>=3,
          melding:'Fant '+funnetAntall+'/4 hjørnepunkter. Mangler: '
            +hjørner.filter(function(_,i){return !funnet[i];})
              .map(function(hj){return '('+hj[0]+','+hj[1]+')';}).join(', ')+'.'};
      }
      var arealSjekk = sjekkTall(areal3,0,'inp-areal')(ggb);
      var omkSjekk   = sjekkTall(omk3,0,'inp-omk')(ggb);
      if (!arealSjekk.ok) return {ok:false,nesten:true,melding:'Alle hjørner riktige ✓! '+arealSjekk.melding};
      if (!omkSjekk.ok)   return {ok:false,nesten:true,melding:'Areal riktig ✓! '+omkSjekk.melding};
      return {ok:true,nesten:false,melding:'✓ Rektangel, areal og omkrets er alle riktige!'};
    }
  });

  // ── OPPGAVE 4: Sirkel ────────────────────────────────────────
  var r4 = rnd(2,5);
  var mx4 = rnd(1,4), my4 = rnd(1,4);
  var areal4 = Math.round(Math.PI*r4*r4*100)/100;
  var omk4   = Math.round(2*Math.PI*r4*100)/100;

  OPPGAVER.push({
    id:'geo4', gruppe:'Geometri', tittel:'4 · Sirkel',
    tekst:'Sentrum <b>M = ('+mx4+', '+my4+')</b> er gitt.<br><br>'
      +'Tegn en sirkel med sentrum M og radius <b>r = '+r4+'</b>.<br><br>'
      +'Skriv kommandoen i inndatalinjen: <code style="background:rgba(255,255,255,.08);padding:2px 8px;border-radius:4px">Circle(M, '+r4+')</code><br><br>'
      +'<b>a) Areal</b> (π·r², rund til 2 desimaler):<br>'
      +'<input id="inp-areal" type="number" step="0.01" placeholder="0.00" '
      +'style="width:130px;padding:8px 12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:#e8f0ff;font-size:1rem;margin:4px 0"><br><br>'
      +'<b>b) Omkrets</b> (2·π·r, rund til 2 desimaler):<br>'
      +'<input id="inp-omk" type="number" step="0.01" placeholder="0.00" '
      +'style="width:130px;padding:8px 12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:#e8f0ff;font-size:1rem;margin-top:4px">',
    hint:'Skriv Circle(M, '+r4+') i inndatalinjen. Areal = π·'+r4+'² ≈ '+areal4+'. Omkrets = 2·π·'+r4+' ≈ '+omk4+'.',
    ggbKommandoer:[
      'M=('+mx4+','+my4+')',
      'SetColor(M,"#ffd700")','SetPointSize(M,5)',
      'ZoomIn('+(mx4-r4-2)+','+(mx4+r4+2)+','+(my4-r4-2)+','+(my4+r4+2)+')'
    ],
    sjekk: function(ggb) {
      // Finn sirkel-objekt
      var navnene = ggb.getAllObjectNames();
      var sirkler = navnene.filter(function(n){
        var t = ggb.getObjectType(n);
        return t==='conic'||t==='circle';
      });
      if (!sirkler.length) return {ok:false,nesten:false,melding:'Ingen sirkel funnet. Skriv Circle(M, '+r4+') i inndatalinjen.'};
      // Sjekk radius via evalCommand
      var riktigR = sirkler.some(function(s){
        try {
          var tmp = 'r_tmp_';
          ggb.evalCommand(tmp+'=Radius('+s+')');
          var rad = ggb.getValue(tmp);
          ggb.deleteObject(tmp);
          return Math.abs(rad-r4) <= 0.1;
        } catch(e){ return false; }
      });
      if (!riktigR) return {ok:false,nesten:true,melding:'Sirkel funnet, men radius er feil. Skal være r = '+r4+'.'};
      var arealSjekk = sjekkTall(areal4,0.05,'inp-areal')(ggb);
      var omkSjekk   = sjekkTall(omk4,0.05,'inp-omk')(ggb);
      if (!arealSjekk.ok) return {ok:false,nesten:true,melding:'Sirkel riktig ✓! '+arealSjekk.melding};
      if (!omkSjekk.ok)   return {ok:false,nesten:true,melding:'Areal riktig ✓! '+omkSjekk.melding};
      return {ok:true,nesten:false,melding:'✓ Sirkel, areal og omkrets er alle riktige!'};
    }
  });


  // GEO5
  var s45alts=[3,4,5,6,7,8];
  var s45 = s45alts[rnd(0,s45alts.length-1)];
  var hyp45 = Math.round(s45*Math.sqrt(2)*100)/100;

  OPPGAVER.push({
    id:'geo5', gruppe:'Geometri', tittel:'5 \u00b7 Likebeint rettvinklet (45-45-90)',
    tekst:'<b>A=(0,0)</b> og <b>B=('+s45+',0)</b> er gitt. Likebeint og rettvinklet i A. Plasser C=(0,'+s45+').<br><br>'
      +'<b>a) Katet AC</b>: <input id="inp-katet" type="number" step="1" placeholder="0" style="width:100px;padding:6px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:7px;color:#e8f0ff"><br><br>'
      +'<b>b) Hypotenus</b> = katet\u00b7\u221a2 (2 des.): <input id="inp-hyp" type="number" step="0.01" placeholder="0.00" style="width:110px;padding:6px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:7px;color:#e8f0ff"><br><br>'
      +'<b>c) Vinkel ABC</b> (grader): <input id="inp-vinkel" type="number" step="1" placeholder="0" style="width:100px;padding:6px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:7px;color:#e8f0ff">',
    hint:'C=(0,'+s45+'). Katet='+s45+', hypotenus='+s45+'\u00b7\u221a2\u2248'+hyp45+'. Vinkel ABC=45\u00b0.',
    ggbKommandoer:['A=(0,0)','B=('+s45+',0)','SetColor(A,"#ffd700")','SetColor(B,"#ffd700")','SetPointSize(A,5)','SetPointSize(B,5)','ZoomIn(-1,'+(s45+2)+',-1,'+(s45+3)+')'],
    sjekk: function(ggb) {
      if (!punktEksisterer(ggb,'C')) return {ok:false,nesten:false,melding:'Plasser C.'};
      var ac=hentAvstand(ggb,'A','C'), vA=hentVinkelGrader(ggb,'B','A','C');
      if (!ac||Math.abs(ac-s45)>0.2) return {ok:false,nesten:false,melding:'AC='+(ac?ac.toFixed(2):'?')+', skal='+s45+'.'};
      if (!vA||Math.abs(vA-90)>2)    return {ok:false,nesten:true, melding:'Vinkel A='+(vA?Math.round(vA)+'\u00b0':'?')+', skal 90\u00b0.'};
      var kS=sjekkTall(s45,0.05,'inp-katet')(ggb);
      var hS=sjekkTall(hyp45,0.05,'inp-hyp')(ggb);
      var vS=sjekkTall(45,1,'inp-vinkel')(ggb);
      if (!kS.ok) return {ok:false,nesten:true,melding:'C \u2713! a) '+kS.melding};
      if (!hS.ok) return {ok:false,nesten:true,melding:'Katet \u2713! b) '+hS.melding};
      if (!vS.ok) return {ok:false,nesten:true,melding:'Hypotenus \u2713! c) '+vS.melding};
      return {ok:true,nesten:false,melding:'\u2713 45-45-90: katet, hypotenus og vinkel riktige!'};
    }
  });



    // GEO6
  var s30alts=[2,3,4,5,6];
  var s30=s30alts[rnd(0,s30alts.length-1)];
  var lang30=Math.round(s30*Math.sqrt(3)*100)/100;
  var kort30=s30, hyp30=s30*2, cx30=lang30, cy30=s30;

  OPPGAVER.push({
    id:'geo6', gruppe:'Geometri', tittel:'6 \u00b7 30-60-90 trekant',
    tekst:'<b>A=(0,0)</b> og <b>B=('+lang30+',0)</b> er gitt (lang katet). Plasser C=('+lang30+','+cy30+'). 90\u00b0 i B, 30\u00b0 i A.<br>'
      +'Forholdet 1:\u221a3:2 = '+kort30+':'+lang30+':'+hyp30+'<br><br>'
      +'<b>a) Kort katet</b>: <input id="inp-kort" type="number" step="1" placeholder="0" style="width:100px;padding:6px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:7px;color:#e8f0ff"><br><br>'
      +'<b>b) Lang katet</b> (2 des.): <input id="inp-lang" type="number" step="0.01" placeholder="0.00" style="width:110px;padding:6px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:7px;color:#e8f0ff"><br><br>'
      +'<b>c) Hypotenus</b>: <input id="inp-hyp" type="number" step="1" placeholder="0" style="width:100px;padding:6px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:7px;color:#e8f0ff">',
    hint:'C=('+lang30+','+cy30+'). Kort='+kort30+', lang='+lang30+' (\u2248'+kort30+'\u00b7\u221a3), hyp='+hyp30+' (=2\u00b7'+kort30+'). 90\u00b0 i B.',
    ggbKommandoer:['A=(0,0)','B=('+lang30+',0)','SetColor(A,"#ffd700")','SetColor(B,"#ffd700")','SetPointSize(A,5)','SetPointSize(B,5)','ZoomIn(-1,'+(lang30+2)+',-1,'+(cy30+3)+')'],
    sjekk: function(ggb) {
      if (!punktEksisterer(ggb,'C')) return {ok:false,nesten:false,melding:'Plasser C.'};
      var vB=hentVinkelGrader(ggb,'A','B','C'), vA=hentVinkelGrader(ggb,'B','A','C');
      if (!vB||Math.abs(vB-90)>2) return {ok:false,nesten:false,melding:'Vinkel B='+(vB?Math.round(vB)+'\u00b0':'?')+', skal 90\u00b0. C=('+lang30+','+cy30+').'};
      if (!vA||Math.abs(vA-30)>2) return {ok:false,nesten:true, melding:'90\u00b0 i B \u2713, men A='+(vA?Math.round(vA)+'\u00b0':'?')+', skal 30\u00b0.'};
      var kS=sjekkTall(kort30,0.1,'inp-kort')(ggb);
      var lS=sjekkTall(lang30,0.05,'inp-lang')(ggb);
      var hS=sjekkTall(hyp30,0.1,'inp-hyp')(ggb);
      if (!kS.ok) return {ok:false,nesten:true,melding:'Trekant \u2713! a) '+kS.melding};
      if (!lS.ok) return {ok:false,nesten:true,melding:'Kort \u2713! b) '+lS.melding};
      if (!hS.ok) return {ok:false,nesten:true,melding:'Lang \u2713! c) '+hS.melding};
      return {ok:true,nesten:false,melding:'\u2713 30-60-90: kort, lang og hypotenus riktige!'};
    }
  });



  // ── GEO7: Formlikhet ─────────────────────────────────────────
  // Original: A=(0,0), B=(a7,0), C=(cx7,cy7)
  var a7alts = [3,4,5];
  var a7 = a7alts[rnd(0,a7alts.length-1)];
  var cx7 = rnd(1, a7-1);
  var cy7 = rnd(2, 4);
  var kalts = [2,3];
  var k7 = kalts[rnd(0,kalts.length-1)];

  // Originale sidelengder
  var ab7 = a7;
  var bc7 = Math.round(Math.sqrt(Math.pow(a7-cx7,2)+Math.pow(cy7,2))*100)/100;
  var ac7 = Math.round(Math.sqrt(Math.pow(cx7,2)+Math.pow(cy7,2))*100)/100;

  // Formlik trekant — skalert med k7
  var Da7=[0,0], Ea7=[a7*k7,0], Fa7=[cx7*k7,cy7*k7];

  OPPGAVER.push({
    id:'geo7', gruppe:'Geometri', tittel:'7 · Formlikhet',
    tekst:'Den gule trekanten ABC er allerede tegnet:<br>'
      +'A=(0,0), B=('+a7+',0), C=('+cx7+','+cy7+')<br><br>'
      +'Tegn en <b>formlik trekant DEF</b> med <b>forholdstall k = '+k7+'</b>:<br>'
      +'• Alle sider skal være '+k7+' ganger så lange<br>'
      +'• Alle vinkler skal være like<br><br>'
      +'Start med D=(0,0), E=('+Ea7[0]+',0), og finn F.<br><br>'
      +'<b>Hva er forholdet mellom arealene?</b><br>'
      +'Areal DEF / Areal ABC = <input id="inp-k2" type="number" step="1" placeholder="0" '
      +'style="width:100px;padding:8px 12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;color:#e8f0ff;font-size:1rem;margin-top:4px">',
    hint:'F = ('+Fa7[0]+', '+Fa7[1]+'). Formlik: alle sider multiplisert med k='+k7+'. Areal-forholdet = k² = '+k7+'² = '+(k7*k7)+'.',
    ggbKommandoer:[
      'A=(0,0)','B=('+a7+',0)','C=('+cx7+','+cy7+')',
      'SetColor(A,"#ffd700")','SetColor(B,"#ffd700")','SetColor(C,"#ffd700")',
      'SetPointSize(A,5)','SetPointSize(B,5)','SetPointSize(C,5)',
      'poly_orig=Polygon(A,B,C)',
      'SetColor(poly_orig,"#ffd700")','SetFillingStyle(poly_orig,0.08)',
      'ZoomIn(-1,'+(Fa7[0]+2)+',-1,'+(Fa7[1]+3)+')'
    ],
    sjekk: function(ggb) {
      // Finn tre punkt som matcher D, E, F uavhengig av navn
      var navnene = ggb.getAllObjectNames();
      var mål = [[0,0],[a7*k7,0],[cx7*k7,cy7*k7]];
      var tol7 = 0.3;
      var funnet = mål.map(function(m) {
        return navnene.some(function(n){
          if (ggb.getObjectType(n)!=='point') return false;
          return Math.abs(ggb.getXcoord(n)-m[0])<=tol7
              && Math.abs(ggb.getYcoord(n)-m[1])<=tol7;
        });
      });
      var antallFunnet = funnet.filter(Boolean).length;
      if (antallFunnet < 3) {
        var mangler7 = mål.filter(function(_,i){return !funnet[i];})
          .map(function(m){return '('+m[0]+','+m[1]+')';});
        return {ok:false, nesten: antallFunnet>=2,
          melding:'Fant '+antallFunnet+'/3 punkt. Mangler: '+mangler7.join(', ')+'.'};
      }
      // Sjekk areal-forholdet
      var k2svar = sjekkTall(k7*k7,0,'inp-k2')(ggb);
      if (!k2svar.ok) return {ok:false,nesten:true,
        melding:'Alle tre punkt riktige ✓! Areal-forholdet: '+k2svar.melding};
      return {ok:true,nesten:false,
        melding:'✓ Formlik trekant med k='+k7+' og areal-forhold k²='+(k7*k7)+' er riktige!'};
    }
  });
}



function initGGB() {

  var containerHeight = wrap.offsetHeight || Math.round(window.innerHeight - 44) || 600;
  var params = {
    appName: 'graphing',
    width: containerWidth,
    height: containerHeight,
    showToolBar: true,
    showAlgebraInput: true,
    showMenuBar: true,
    enableRightClick: true,
    enableShiftDragZoom: true,
    showZoomButtons: true,
    enableFileFeatures: false,
    enableUndoRedo: true,
    language: 'no',
    appletOnLoad: function(api) {
      ggbAPI = api;
      lastOppgave(gjeldende);

  };
  try {

    // Rut ugyldige evalCommand-strenger til JS API

    if (svMatch) { ggb.setVisible(svMatch[1].trim(), svMatch[2]==='true'); return; }

    try { ggb.evalCommand(cmd); } catch(e) { console.warn('GGB cmd:', cmd, e.message||e); }

var pollingTimer = null;
function startSliderPolling(vars) {
  vars = vars || ['a','b'];
  clearInterval(pollingTimer);
  pollingTimer = setInterval(function() {
    var ggb = getGGB();
    if (!ggb) return;
    try {
      vars.forEach(function(v) {
        var val = ggb.getValue(v);
        var el = document.getElementById('vis-'+v);
        if (el) el.textContent = isNaN(val) ? '–' : val.toFixed(2);
      });
    } catch(e) {}
  }, 300);
}

function sjekk() {
  var ggb = getGGB();
  if (!ggb) return;
  var o = OPPGAVER[gjeldende];
  forsøk++;
  oppdaterStats();
  var res = o.sjekk(ggb);
  if (res.ok) {
    løste[gjeldende] = true;
    oppdaterFB('ok', res.melding);
    document.getElementById('sjekk-btn').disabled = true;
    document.getElementById('neste-btn').style.display = 'block';
    var nyBtn=document.getElementById('ny-oppg-btn'); if(nyBtn) nyBtn.style.display='block';
    var nrBtn=document.getElementById('ny-runde-btn'); if(nrBtn) nrBtn.style.display='block';
    oppdaterFremdrift();
    oppdaterStats();
    clearInterval(pollingTimer);
    var tab=document.getElementById('tab-'+gjeldende);
    if(tab)tab.className='oknapp løst';
    var ikon=document.getElementById('ikon-'+gjeldende);
    if(ikon)ikon.textContent='✓';
  } else if (res.nesten) {
    oppdaterFB('nesten', res.melding);
  } else {
    oppdaterFB('feil', res.melding);
  }
}

function oppdaterFB(type, tekst) {
  var fb = document.getElementById('fb');
  if (!fb) return;
  if (!type) { fb.className='fb'; fb.innerHTML=''; return; }
  fb.className = 'fb '+type;
  fb.innerHTML = tekst;
}

function gåTilOppgave(idx) {
  clearInterval(pollingTimer);
  gjeldende = idx;
  // Oppdater knapper i listen
  OPPGAVER.forEach(function(o,i){
    var btn=document.getElementById('tab-'+i);
    if(!btn)return;
    btn.className='oknapp'+(løste[i]?' løst':'')+(i===idx?' aktiv':'');
    var ikon=document.getElementById('ikon-'+i);
    if(ikon)ikon.textContent=løste[i]?'✓':i===idx?'▶':'○';
  });
  lastOppgave(idx);
}

function nesteOppgave() {
  var neste = gjeldende+1;
  if (neste < OPPGAVER.length) gåTilOppgave(neste);
}

function oppdaterFremdrift() {
  var fp = document.getElementById('fremdrift');
  if (!fp) return;
  fp.innerHTML='';
  OPPGAVER.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='fp'+(løste[i]?' løst':i===gjeldende?' aktiv':'');
    fp.appendChild(d);
  });
}

function nyOppgave() {
  // Regenerer kun gjeldende oppgave med nye tall
  clearInterval(pollingTimer);
  var id = OPPGAVER[gjeldende].id;
  var gen = GENERATORER[id] || GENERATORER[id.replace(/\d+$/,'')];
  // Finn riktig generator basert på ID
  var genKey = null;
  if (id === 'avg1') genKey = 'avg1';
  else if (id === 'avg2') genKey = 'avg2';
  else if (id === 'eks1') genKey = 'eks_parabel';
  else if (id === 'eks2') genKey = 'eks_parabel';
  else if (id === 'eks3') genKey = 'eks3';
  else if (id === 'eks4') genKey = 'eks4';
  else if (id === 'xy1') genKey = 'xy1';
  else if (id === 'xy2') genKey = 'xy2';
  else if (id === 'yx1') genKey = 'yx1';
  else if (id === 'yx2') genKey = 'yx2';
  else if (id === 'skj1') genKey = 'skj1';
  else if (id === 'skj2') genKey = 'skj2';
  else if (id === 'inp1') genKey = 'inp1';
  else if (id === 'inp2') genKey = 'inp2';
  else if (id === 'inp3') genKey = 'inp3';
  else if (id === 'reg1') genKey = 'reg_lin';
  else if (id === 'reg2') genKey = 'reg_poly';
  else if (id === 'reg3') genKey = 'reg_eksp';
  else if (id === 'teg1') genKey = 'teg_proporsjonal';
  else if (id === 'teg2') genKey = 'teg_lineaer';
  else if (id === 'teg3') genKey = 'teg_kvadratisk';
  else if (id === 'teg4') genKey = 'teg_omvendt';
  else if (id === 'teg5') genKey = 'teg_eksponentiell';
  if (!genKey) { lastOppgave(gjeldende); return; }
  // Generer ny data
  var retning = (id === 'eks1') ? 1 : (id === 'eks2') ? -1 : null;
  var nyData = retning !== null ? GENERATORER[genKey](retning) : GENERATORER[genKey]();
  // Oppdater oppgave-objektet med nye verdier
  var o = OPPGAVER[gjeldende];
  o.tekst = nyData.tekst;
  o.hint  = nyData.hint;
  o.ggbKommandoer = nyData.cmds;
  // Oppdater sjekk-funksjon med ny fasit
  if (nyData.fasitA !== undefined) {
    o.sjekk = (function(fa,fb){ return function(ggb){
      var a=ggb.getValue('a'),b=ggb.getValue('b');
      var ok=Math.abs(a-fa)<=0.3&&Math.abs(b-fb)<=0.3;
      return {ok:ok,nesten:!ok&&(Math.abs(a-fa)<=0.8||Math.abs(b-fb)<=0.8),
        melding:ok?'✓ Riktig! a='+fa+', b='+fb+'.':'a='+a.toFixed(1)+' (skal være '+fa+'), b='+b.toFixed(1)+' (skal være '+fb+').'};
    };})(nyData.fasitA, nyData.fasitB);
  } else if (nyData.fasitX !== undefined && nyData.fasitY !== undefined) {
    o.sjekk = (function(fx,fy){ return function(ggb){
      var x=parseFloat(document.getElementById('inp-x').value.replace(',','.')),y=parseFloat(document.getElementById('inp-y').value.replace(',','.'));
      if(isNaN(x)||isNaN(y)) return {ok:false,nesten:false,melding:'Fyll inn både x og y.'};
      var ok=Math.abs(x-fx)<=0.055&&Math.abs(y-fy)<=0.055;
      return {ok:ok,nesten:!ok&&Math.abs(x-fx)<=0.3&&Math.abs(y-fy)<=0.3,
        melding:ok?'✓ Riktig! ('+fmt(fx)+', '+fmt(fy)+').':'Fasit: ('+fmt(fx)+', '+fmt(fy)+'). Du svarte ('+x.toFixed(2)+', '+y.toFixed(2)+')'};
    };})(nyData.fasitX, nyData.fasitY);
  } else if (nyData.fasit1 !== undefined) {
    o.sjekk = (function(f1,f2){ return function(ggb){
      var x1=parseFloat(document.getElementById('inp-x1').value.replace(',','.')),x2=parseFloat(document.getElementById('inp-x2').value.replace(',','.'));
      if(isNaN(x1)||isNaN(x2)) return {ok:false,nesten:false,melding:'Fyll inn begge x-verdiene.'};
      var s=[x1,x2].sort(function(a,b){return a-b;});
      var ok=Math.abs(s[0]-f1)<=0.055&&Math.abs(s[1]-f2)<=0.055;
      return {ok:ok,nesten:!ok&&Math.abs(s[0]-f1)<=0.3&&Math.abs(s[1]-f2)<=0.3,
        melding:ok?'✓ Riktig! x='+fmt(f1)+' og x='+fmt(f2)+'.':'Fasit: '+fmt(f1)+' og '+fmt(f2)+'. Du svarte '+x1.toFixed(2)+' og '+x2.toFixed(2)+'.'};
    };})(nyData.fasit1, nyData.fasit2);
  } else if (nyData.fasit !== undefined) {
    o.sjekk = (function(fv){ return function(ggb){
      var el=document.getElementById('inp-x1')||document.getElementById('inp-y1');
      if(!el) return {ok:false,nesten:false,melding:'Fyll inn verdien.'};
      var v=parseFloat(el.value.replace(',','.'));
      if(isNaN(v)) return {ok:false,nesten:false,melding:'Fyll inn verdien.'};
      var ok=Math.abs(v-fv)<=0.5;
      return {ok:ok,nesten:!ok&&Math.abs(v-fv)<=1,
        melding:ok?'✓ Riktig! '+fmt(fv)+'.':'Fasit: '+fmt(fv)+'. Du svarte '+v.toFixed(2)+'.'};
    };})(nyData.fasit);
  } else if (nyData.testX !== undefined) {
    o.sjekk = (function(tx,ty){ return function(ggb){
      if(!ggb.isDefined('f')) return {ok:false,nesten:false,melding:'Skriv inn funksjonen f(x) = ... i algebrafeltet og trykk Enter.'};
      var feil=[];
      for(var i=0;i<tx.length;i++){var fv=ggb.getValue('f('+tx[i]+')');if(Math.abs(fv-ty[i])>0.1)feil.push('f('+tx[i]+')='+fv.toFixed(2)+' (skal være '+ty[i]+')');}
      return {ok:feil.length===0,nesten:false,melding:feil.length===0?'✓ Riktig! Grafen treffer alle punktene.':feil[0]+'. Sjekk uttrykket.'};
    };})(nyData.testX, nyData.testY);
  }
  // Last oppgaven på nytt
  lastOppgave(gjeldende);
}

  document.getElementById('st-forsøk').textContent=forsøk;
}

function byggTabs() {
  if (!løste.length) løste=new Array(OPPGAVER.length).fill(false);
  var wrap=document.getElementById('oppg-liste-wrap');
  if (!wrap) return;
  // Grupper oppgavene
  var grupper=[];
  OPPGAVER.forEach(function(o){if(grupper.indexOf(o.gruppe)<0)grupper.push(o.gruppe);});
  var html='';
  grupper.forEach(function(g){
    html+='<div class="grp-header">'+g+'</div>';
    OPPGAVER.forEach(function(o,i){
      if(o.gruppe!==g)return;
      html+='<button id="tab-'+i+'" class="oknapp" onclick="gåTilOppgave('+i+')">'
        +'<span class="ok-nr">'+(i+1)+'</span>'
        +'<span class="ok-ikon" id="ikon-'+i+'">○</span>'
        +'<span>'+o.tittel.replace(/^\d+ · /,'')+'</span>'
        +'</button>';
    });
  });
  wrap.innerHTML=html;
}

function byggGruppeTabs() {
  var grupper=[];
  OPPGAVER.forEach(function(o){if(grupper.indexOf(o.gruppe)<0)grupper.push(o.gruppe);});
  var el=document.getElementById('grp-tabs');
  if(!el)return;
  var allBtn=document.createElement('button');
  allBtn.className='grp-tab aktiv';allBtn.textContent='Alle ('+OPPGAVER.length+')';
  allBtn.onclick=function(){filtrerGruppe(null,allBtn);};
  el.appendChild(allBtn);
  grupper.forEach(function(g){
    var n=OPPGAVER.filter(function(o){return o.gruppe===g;}).length;
    var btn=document.createElement('button');
    btn.className='grp-tab';btn.textContent=g+' ('+n+')';
    btn.onclick=(function(grp,b){return function(){filtrerGruppe(grp,b);};})(g,btn);
    el.appendChild(btn);
  });
}

function filtrerGruppe(grp,btn){
  document.querySelectorAll('.grp-tab').forEach(function(b){b.classList.remove('aktiv');});
  btn.classList.add('aktiv');
  for(var i=0;i<OPPGAVER.length;i++){if(!grp||OPPGAVER[i].gruppe===grp){gåTilOppgave(i);return;}}
  

}

function startApp(){byggOppgaver();løste=new Array(OPPGAVER.length).fill(false);byggTabs();byggGruppeTabs();oppdaterFremdrift();initGGB();}
window.addEventListener('DOMContentLoaded', startApp);


</script>
</body>
