<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Periodesystemet</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080f;
  --surface:#090d18;
  --card:#0d1220;
  --border:rgba(255,255,255,.06);
  --text:#dde4f0;
  --dim:#4a5568;
  --bright:#f0f4ff;

  /* Kategorifargekoder */
  --c-alkali:#ff6b6b;
  --c-alkaliearth:#ff9f43;
  --c-transition:#feca57;
  --c-postrans:#a8e063;
  --c-metalloid:#54a0ff;
  --c-nonmetal:#5f27cd;
  --c-halogen:#00d2d3;
  --c-nobelgas:#ff6348;
  --c-lanthanide:#c8a8e9;
  --c-actinide:#f8a5c2;

  --font-d:'Syne',sans-serif;
  --font-m:'JetBrains Mono',monospace;
}

html{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-d);
  min-height:100vh;
  overflow-x:hidden;
}

/* Scanline overlay */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.03) 2px,
    rgba(0,0,0,.03) 4px
  );
  pointer-events:none;z-index:9999;
}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(4,8,15,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:10px 24px;display:flex;align-items:center;gap:10px;
}
.nav-lnk{font-family:var(--font-d);font-size:.8rem;font-weight:600;color:var(--dim);text-decoration:none;letter-spacing:.04em}
.nav-lnk:hover{color:var(--text)}.nav-sep{color:var(--border)}
.nav-tittel{font-family:var(--font-d);font-size:.85rem;font-weight:700;color:#54a0ff;letter-spacing:.04em}

/* ── SCOREBAR ── */
.scorebar{
  display:flex;align-items:center;justify-content:center;gap:32px;
  padding:14px 24px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.score-item{text-align:center}
.score-val{
  font-family:var(--font-m);font-size:1.6rem;font-weight:700;line-height:1;
  color:var(--bright);
}
.score-val.streak{color:#feca57}
.score-val.poeng{color:#a8e063}
.score-val.feil{color:#ff6b6b}
.score-lbl{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:3px}

/* Streak-animasjon */
@keyframes streak-pop{
  0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.9)}100%{transform:scale(1)}
}
.streak-pop{animation:streak-pop .4s ease-out}

/* ── SPØRSMÅLS-PANEL ── */
.sporsmal-wrap{
  display:flex;justify-content:center;
  padding:20px 16px 12px;
}
.sporsmal-boks{
  background:var(--card);
  border:1px solid rgba(84,160,255,.25);
  border-radius:16px;
  padding:20px 28px;
  max-width:700px;width:100%;
  text-align:center;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 40px rgba(84,160,255,.06);
}
.sporsmal-boks::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--hint-farge,#54a0ff),transparent);
}
.sporsmal-kategori{
  font-family:var(--font-m);font-size:.65rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--hint-farge,#54a0ff);margin-bottom:8px;
}
.sporsmal-tekst{
  font-family:var(--font-d);font-size:1.25rem;font-weight:700;
  color:var(--bright);line-height:1.4;
}
.sporsmal-hint{
  margin-top:10px;font-size:.8rem;color:var(--dim);
  font-family:var(--font-m);letter-spacing:.02em;
}

/* Feedback-overlay */
.feedback{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:500;
  font-family:var(--font-d);font-size:2.5rem;font-weight:800;
  pointer-events:none;opacity:0;
  text-shadow:0 0 40px currentColor;
}
@keyframes fb-anim{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-60%) scale(1)}
}
.feedback.show{animation:fb-anim .9s ease-out forwards}
.feedback.riktig{color:#a8e063}
.feedback.feil{color:#ff6b6b}

/* ── PERIODESYSTEM ── */
.ps-wrap{
  padding:8px 8px 24px;
  overflow-x:auto;
}
.ps-grid{
  display:grid;
  grid-template-columns:repeat(18,1fr);
  gap:3px;
  min-width:900px;
  max-width:1200px;
  margin:0 auto;
}

/* Element-kort */
.el{
  aspect-ratio:1;
  border-radius:6px;
  border:1px solid transparent;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  transition:transform .12s,box-shadow .12s,border-color .15s;
  padding:2px;
  user-select:none;
}
.el:hover{
  transform:scale(1.08);
  z-index:10;
  box-shadow:0 0 18px rgba(255,255,255,.12);
}
.el.aktiv-maal{
  border-color:rgba(255,255,255,.5)!important;
  box-shadow:0 0 20px rgba(255,255,255,.2),inset 0 0 10px rgba(255,255,255,.04);
  animation:puls-maal 1.2s ease-in-out infinite;
}
@keyframes puls-maal{
  0%,100%{box-shadow:0 0 16px rgba(255,255,255,.15)}
  50%{box-shadow:0 0 28px rgba(255,255,255,.3)}
}
.el.riktig-flash{
  animation:riktig-flash .5s ease-out;
}
@keyframes riktig-flash{
  0%{transform:scale(1.2);box-shadow:0 0 30px #a8e063}
  100%{transform:scale(1);box-shadow:none}
}
.el.feil-flash{
  animation:feil-flash .4s ease-out;
}
@keyframes feil-flash{
  0%,50%{transform:translateX(-4px);box-shadow:0 0 20px #ff6b6b}
  25%,75%{transform:translateX(4px)}
  100%{transform:translateX(0)}
}
.el.blokkert{
  opacity:.35;cursor:default;pointer-events:none;
}
.el .anum{
  font-family:var(--font-m);font-size:.5rem;font-weight:700;
  color:rgba(255,255,255,.5);line-height:1;
  position:absolute;top:3px;left:4px;
}
.el .sym{
  font-family:var(--font-d);font-size:1rem;font-weight:800;
  color:rgba(255,255,255,.95);line-height:1;margin-top:2px;
}
.el .navn-kort{
  font-family:var(--font-m);font-size:.38rem;
  color:rgba(255,255,255,.5);margin-top:1px;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:90%;text-align:center;
}
.el .masse-kort{
  font-family:var(--font-m);font-size:.35rem;
  color:rgba(255,255,255,.35);line-height:1;
}

/* Kategoribakgrunner */
.k-alkali      {background:linear-gradient(135deg,rgba(255,107,107,.22),rgba(255,107,107,.1));border-color:rgba(255,107,107,.2)}
.k-alkaliearth {background:linear-gradient(135deg,rgba(255,159,67,.22),rgba(255,159,67,.1));border-color:rgba(255,159,67,.2)}
.k-transition  {background:linear-gradient(135deg,rgba(254,202,87,.18),rgba(254,202,87,.08));border-color:rgba(254,202,87,.18)}
.k-postrans    {background:linear-gradient(135deg,rgba(168,224,99,.2),rgba(168,224,99,.09));border-color:rgba(168,224,99,.18)}
.k-metalloid   {background:linear-gradient(135deg,rgba(84,160,255,.2),rgba(84,160,255,.09));border-color:rgba(84,160,255,.18)}
.k-nonmetal    {background:linear-gradient(135deg,rgba(95,39,205,.28),rgba(95,39,205,.14));border-color:rgba(95,39,205,.22)}
.k-halogen     {background:linear-gradient(135deg,rgba(0,210,211,.2),rgba(0,210,211,.09));border-color:rgba(0,210,211,.18)}
.k-nobelgas    {background:linear-gradient(135deg,rgba(255,99,72,.22),rgba(255,99,72,.1));border-color:rgba(255,99,72,.2)}
.k-lanthanide  {background:linear-gradient(135deg,rgba(200,168,233,.2),rgba(200,168,233,.09));border-color:rgba(200,168,233,.18)}
.k-actinide    {background:linear-gradient(135deg,rgba(248,165,194,.2),rgba(248,165,194,.09));border-color:rgba(248,165,194,.18)}
.k-tom         {background:transparent;border-color:transparent;pointer-events:none;cursor:default}

/* Lanthanideserie-rad-etiketter */
.serie-etikett{
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-m);font-size:.5rem;font-weight:700;
  letter-spacing:.06em;color:var(--dim);
  border-radius:6px;border:1px solid var(--border);
  background:rgba(255,255,255,.02);
}

/* ── FORKLARING KATEGORIER ── */
.forklaring{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  padding:8px 16px 16px;max-width:1200px;margin:0 auto;
}
.fk{
  display:flex;align-items:center;gap:5px;
  font-size:.65rem;font-family:var(--font-m);letter-spacing:.04em;
  color:var(--dim);
}
.fk-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── TOOLTIP ── */
.tt{
  position:fixed;z-index:200;
  background:#0d1220;
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:12px 16px;
  pointer-events:none;
  opacity:0;transition:opacity .15s;
  min-width:180px;
}
.tt.vis{opacity:1}
.tt-sym{font-family:var(--font-d);font-size:1.8rem;font-weight:800;color:var(--bright);line-height:1}
.tt-navn{font-size:.8rem;font-weight:600;color:var(--text);margin-top:2px}
.tt-rader{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.tt-r{font-family:var(--font-m);font-size:.65rem}
.tt-lbl{color:var(--dim)}
.tt-val{color:var(--bright);font-weight:700}

/* ── NESTE SPORSMAL KNAPP ── */
.neste-btn{
  display:block;margin:0 auto 20px;
  font-family:var(--font-d);font-size:.82rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  padding:10px 28px;border-radius:10px;
  border:1px solid rgba(84,160,255,.35);
  background:rgba(84,160,255,.08);color:#54a0ff;
  cursor:pointer;transition:all .2s;display:none;
}
.neste-btn:hover{background:rgba(84,160,255,.18);border-color:rgba(84,160,255,.6)}
</style>
</head>

// ══ BYGG GRID ══
function byggGrid(){
  const grid = document.getElementById('ps-grid');
  // 10 rader × 18 kolonner
  const celle = Array.from({length:10}, ()=>Array(18).fill(null));

  EL.forEach(e=>{
    if(e.row>=1 && e.row<=10 && e.col>=1 && e.col<=18){
      celle[e.row-1][e.col-1] = e;
    }
  });

  // Tom-celler spesialhåndtering
  // Rad 1: kol 2-17 tomme
  // Rad 2-3: kol 3-12 tomme
  // Rad 6 kol 3: lanthanide-plass, rad 7 kol 3: actinide-plass
  // Rad 8: separator (tom), rad 9: lanthanider, rad 10: aktinider

  for(let r=0;r<10;r++){
    for(let c=0;c<18;c++){
      const el = celle[r][c];
      const div = document.createElement('div');

      if(r===7){
        // Separator-rad: tomme
        div.className='el k-tom';
        grid.appendChild(div);
        continue;
      }

      // Etikett-celler
      if(r===8 && c===0){
        div.className='el serie-etikett k-tom';div.style.fontSize='.42rem';div.style.color='var(--c-lanthanide)';
        div.textContent='57–71';grid.appendChild(div);continue;
      }
      if(r===8 && c===1){
        div.className='el serie-etikett k-tom';div.style.fontSize='.38rem';div.style.color='var(--c-lanthanide)';
        div.textContent='Lant.';grid.appendChild(div);continue;
      }
      if(r===8 && c===2){
        div.className='el k-tom';grid.appendChild(div);continue;
      }
      if(r===9 && c===0){
        div.className='el serie-etikett k-tom';div.style.fontSize='.42rem';div.style.color='var(--c-actinide)';
        div.textContent='89–103';grid.appendChild(div);continue;
      }
      if(r===9 && c===1){
        div.className='el serie-etikett k-tom';div.style.fontSize='.38rem';div.style.color='var(--c-actinide)';
        div.textContent='Akti.';grid.appendChild(div);continue;
      }
      if(r===9 && c===2){
        div.className='el k-tom';grid.appendChild(div);continue;
      }

      // Lanthanide/actinide-rad placeholder (rad 5=idx, kol 2=idx)
      if((r===5||r===6) && c===2){
        div.className='el k-tom';
        const ser = r===5 ? 'La–Lu' : 'Ac–Lr';
        div.style.fontSize='.4rem';div.style.color='var(--dim)';div.style.display='flex';div.style.alignItems='center';div.style.justifyContent='center';
        // gjøres tom
        grid.appendChild(div);continue;
      }

      if(!el){
        div.className='el k-tom';
        grid.appendChild(div);
        continue;
      }

      div.className=`el ${KATFARGE[el.kat]||'k-tom'}`;
      div.dataset.z=el.z;
      div.innerHTML=`
        <span class="anum">${el.z}</span>
        <span class="sym">${el.sym}</span>
        <span class="navn-kort">${el.navn}</span>
        <span class="masse-kort">${Number.isInteger(el.masse)?el.masse:el.masse.toFixed(1)}</span>
      `;
      div.addEventListener('click',()=>klikk(el));
      div.addEventListener('mouseenter',e=>visTooltip(el,e));
      div.addEventListener('mousemove',e=>flyttTooltip(e));
      div.addEventListener('mouseleave',skjulTooltip);
      grid.appendChild(div);
    }
  }
}

// ══ TOOLTIP ══
const tt = document.getElementById('tt');
function visTooltip(el,e){
  tt.innerHTML=`
    <div class="tt-sym" style="color:${KATFARGECSS[el.kat]||'white'}">${el.sym}</div>
    <div class="tt-navn">${el.navn}</div>
    <div class="tt-rader">
      <div class="tt-r"><span class="tt-lbl">Atomnr: </span><span class="tt-val">${el.z}</span></div>
      <div class="tt-r"><span class="tt-lbl">Masse: </span><span class="tt-val">${el.masse}</span></div>
      <div class="tt-r"><span class="tt-lbl">Periode: </span><span class="tt-val">${el.per}</span></div>
      <div class="tt-r"><span class="tt-lbl">Gruppe: </span><span class="tt-val">${el.gr}</span></div>
      <div class="tt-r"><span class="tt-lbl">Skall: </span><span class="tt-val">${el.skall}</span></div>
      <div class="tt-r"><span class="tt-lbl">Kategori: </span><span class="tt-val">${KATNAVN[el.kat]||el.kat}</span></div>
    </div>
  `;
  tt.classList.add('vis');
  flyttTooltip(e);
}
function flyttTooltip(e){
  let x=e.clientX+14,y=e.clientY-10;
  if(x+200>window.innerWidth)x=e.clientX-210;
  if(y+160>window.innerHeight)y=e.clientY-160;
  tt.style.left=x+'px';tt.style.top=y+'px';
}
function skjulTooltip(){tt.classList.remove('vis')}

    const facts={
      1:'Jeg er det letteste og mest tallrike grunnstoffet i universet. Jeg danner vann med oksygen.',
      2:'Jeg er den nest letteste edelgassen og brukes i ballonger som ikke er brennbare.',
      6:'Jeg er grunnlaget for alt liv. Alle organiske molekyler inneholder meg.',
      7:'Jeg utgjør 78% av atmosfæren og er viktig i proteiner og DNA.',
      8:'Jeg trengs for forbrenning og celleånding. Jeg utgjør 21% av luften.',
      11:'Jeg er et mykt sølvhvitt alkalimetall som reagerer voldsomt med vann.',
      17:'Jeg er en gul-grønn giftig gass og brukes til å desinfisere drikkevann.',
      26:'Jeg er det vanligste overgangsmetallet og brukes til å lage stål.',
      47:'Jeg er et edelt, skinnende metall som er best til å lede elektrisitet.',
      79:'Jeg er et edelt gult metall og har vært brukt som valuta i tusenvis av år.',
      80:'Jeg er det eneste metallet som er flytende ved romtemperatur.',
    };
    if(facts[e.z])return{tekst:facts[e.z],kat:'Kjemiske egenskaper',farge:'#00d2d3'};
    return null;
  },
  // Reaksjon med vann/andre stoffer
  e=>{
    const reaksjoner={
      1:'2 av meg + 1 oksygen → vann (H₂O).',
      8:'2 hydrogen + 1 av meg → vann (H₂O).',
      11:'Meg + vann → natronlut + hydrogengass. Jeg er et alkalimetall.',
      19:'Jeg reagerer enda kraftigere med vann enn natrium og sender gnister.',
      17:'Meg + natrium → bordsalt (NaCl).',
      2:'Jeg er en edelgass – jeg reagerer ikke med noe som helst under normale forhold.',
      10:'Jeg er en edelgass – kjemisk fullstendig inert. Jeg reagerer ikke.',
      18:'Jeg er en edelgass brukt i sveiselys og neonlamper – uten kjemiske reaksjoner.',
    };
    if(reaksjoner[e.z])return{tekst:reaksjoner[e.z],kat:'Kjemisk reaktivitet',farge:'#ff6b6b'};
    return null;
  },
  // Oksidationstall
  e=>{
    if(!e.oks||e.oks.length===0)return null;
    if(e.oks[0]===0)return{tekst:`Jeg er en edelgass med oksidationstall 0 – jeg reagerer ikke.`,kat:'Oksidationstall',farge:'#ff6348'};
    const o=e.oks.join(' eller +').replace('-','-');
    return{tekst:`Mitt vanligste oksidationstall er ${e.oks[0]>0?'+':''}${e.oks[0]}.`,kat:'Oksidationstall',farge:'#c8a8e9'};
  },
  // Atomvekt
  e=>({tekst:`Min relative atommasse er omtrent ${Math.round(e.masse)}.`,kat:'Atommasse',farge:'#f8a5c2'}),
  // Gruppe (kolonne)
  e=>{
    if(e.kat==='lanthanide'||e.kat==='actinide')return null;
    return{tekst:`Jeg er i gruppe ${e.gr} i periodesystemet.`,kat:'Gruppe',farge:'#fb923c'};
  },
  // Kategoribeskrivelse
  e=>{
    const ktxt={
      alkali:`Jeg er et alkalimetall – mykt, sølvfarget og reaktivt. Jeg har én valenselektron.`,
      alkaliearth:`Jeg er et jordalkalimetall med to valenselektroner og oksidationstall +2.`,
      transition:`Jeg er et overgangsmetall – typisk hardt, skinnende og leder godt elektrisitet.`,
      postrans:`Jeg er et ettovergangsmetall, plassert etter overgangsmetallene i periodesystemet.`,
      metalloid:`Jeg er et halvmetall – med egenskaper mellom metaller og ikke-metaller.`,
      nonmetal:`Jeg er et ikke-metall – dårlig leder av varme og elektrisitet.`,
      halogen:`Jeg er et halogen – en svært reaktiv ikke-metall i gruppe 17.`,
      nobelgas:`Jeg er en edelgass – fullstendig inertt og reagerer nesten ikke med andre stoffer.`,
      lanthanide:`Jeg er en lanthanide – et sjeldent jordmetall brukt i magneter og lasere.`,
      actinide:`Jeg er en aktinide – et radioaktivt grunnstoff.`,
    };
    const t=ktxt[e.kat];if(!t)return null;
    return{tekst:t,kat:`Kategori: ${KATNAVN[e.kat]||e.kat}`,farge:KATFARGECSS[e.kat]||'#54a0ff'};
  },
  // Aggregattilstand
  e=>{
    const aggregat={
      80:'Jeg er det eneste metallet som er flytende ved romtemperatur (25°C).',
      35:'Jeg er det eneste ikke-metallet som er flytende ved romtemperatur.',
      1:'Jeg er en gass ved romtemperatur og det letteste av alle grunnstoffer.',
      2:'Jeg er en fargeløs, luktfri edelgass ved romtemperatur.',
      8:'Jeg er en fargeløs gass vi puster inn – livsnødvendig for celleåndingen.',
    };
    if(aggregat[e.z])return{tekst:aggregat[e.z],kat:'Aggregattilstand',farge:'#54a0ff'};
    return null;
  },
];

// ══ QUIZ-LOGIKK ══
function velgMaal(){
  // Prioriter H–Rn (z 1–86) for mer kjent innhold
  const pool = EL.filter(e=>e.z<=86);
  // Finn tilfeldig element
  let kandidat;
  let forsok=0;
  do{
    kandidat = pool[Math.floor(Math.random()*pool.length)];
    forsok++;
  } while(brukteSpm.includes(kandidat.z) && forsok<50);

  brukteSpm.push(kandidat.z);
  if(brukteSpm.length>30) brukteSpm.shift();
  return kandidat;
}

function genererSporsmal(el){
  // Bland generatorene, prøv inntil vi finner ett som ikke returnerer null
  const shuffled = [...GENERATORS].sort(()=>Math.random()-.5);
  for(const gen of shuffled){
    const res = gen(el);
    if(res) return res;
  }
  // fallback
  return {tekst:`Mitt atomnummer er ${el.z}.`, kat:'Atomnummer', farge:'#54a0ff'};
}

function nesteSporsmal(){
  // Nullstill blokkering
  document.querySelectorAll('.el.blokkert').forEach(d=>d.classList.remove('blokkert'));
  document.getElementById('neste-btn').style.display='none';
  sporsmalAktivt=true;

  const maal = velgMaal();
  maalsZ = maal.z;
  const spm = genererSporsmal(maal);

  // Oppdater spørsmål-panel
  document.getElementById('sp-kategori').textContent = '⚗️ ' + spm.kat;
  document.getElementById('sp-tekst').textContent = spm.tekst;
  document.getElementById('sp-hint').textContent = 'Klikk på riktig grunnstoff i periodesystemet';
  document.getElementById('sporsmal-boks').style.setProperty('--hint-farge', spm.farge);

  // Marker mål-element visuelt? Nei, for at det skal være en quiz.
  // Men marker IKKE – eleven skal finne det selv.
}

function klikk(el){
  if(!sporsmalAktivt){
    // Ikke startet ennå: start quiz
    nesteSporsmal();
    return;
  }

  const div = document.querySelector(`.el[data-z="${el.z}"]`);
  totalt++;
  document.getElementById('sTotal').textContent=totalt;

  if(el.z===maalsZ){
    // RIKTIG!
    poeng+=10+Math.max(0,streak*2);
    streak++;
    document.getElementById('sPoeng').textContent=poeng;
    document.getElementById('sStreak').textContent='🔥 '+streak;
    const sv=document.getElementById('sStreak');
    sv.classList.remove('streak-pop');void sv.offsetWidth;sv.classList.add('streak-pop');

    if(div){div.classList.add('riktig-flash');setTimeout(()=>div.classList.remove('riktig-flash'),600);}
    visFeedback(streak>=3?`🔥 ${streak}x STREAK!`:'✓ Riktig!', 'riktig');
    sporsmalAktivt=false;
    document.getElementById('neste-btn').style.display='block';
    document.getElementById('sp-hint').textContent='✓ '+el.navn+' ('+el.sym+', z='+el.z+') – Trykk "Neste spørsmål"';

  } else {
    // FEIL
    feil++;streak=0;
    document.getElementById('sFeil').textContent=feil;
    document.getElementById('sStreak').textContent='🔥 0';

    if(div){div.classList.add('feil-flash');setTimeout(()=>div.classList.remove('feil-flash'),500);}
    // Blokkér dette elementet (kan ikke klikkes igjen samme runde)
    if(div){div.classList.add('blokkert');}
    visFeedback('✗ Feil – prøv igjen','feil');
    document.getElementById('sp-hint').textContent='Det er ikke '+el.navn+' – prøv igjen!';
  }
}

function visFeedback(tekst, type){
  const fb=document.getElementById('feedback');
  fb.textContent=tekst;fb.className='feedback '+type;
  void fb.offsetWidth;fb.classList.add('show');
  setTimeout(()=>fb.classList.remove('show'),900);
}
