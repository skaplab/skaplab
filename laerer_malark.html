<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Målark</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--bg2:#0b0d18;--bg3:#0e1120;--border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);--text:#e0e8ff;--dim:rgba(255,255,255,.42);
  --bla:#60a5fa;--gron:#34d399;--gul:#fbbf24;--rod:#f87171;--lilla:#a78bfa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}

nav{height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.nav-logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);text-decoration:none;}
.nav-sep,.nav-lnk{color:var(--dim);text-decoration:none;font-size:.82rem;}
.spacer{flex:1;}
.print-btn{padding:6px 14px;background:var(--bla);color:#000;border:none;
  border-radius:8px;font-family:var(--font-h);font-size:.78rem;font-weight:800;cursor:pointer;margin-left:4px;}

/* ELEVVELGER */
#elev-velger-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.ev-label{font-size:.82rem;color:var(--dim);white-space:nowrap;}
#elev-sel{padding:8px 12px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:9px;
  color:var(--text);font-family:var(--font-b);font-size:.88rem;min-width:260px;cursor:pointer;outline:none;}
#elev-sel:focus{border-color:rgba(96,165,250,.5);}

/* FAGFILTER */
#sek-filter{display:flex;gap:6px;padding:12px 20px;background:var(--bg);
  border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sek-filter-label{font-size:.75rem;color:var(--dim);align-self:center;margin-right:4px;}
.sek-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;
  color:var(--dim);font-family:var(--font-h);font-size:.75rem;font-weight:700;cursor:pointer;}
.sek-btn.ak{color:var(--text);border-color:var(--border2);background:rgba(255,255,255,.07);}
.sek-btn#sek-btn-mat8.ak,.sek-btn#sek-btn-mat9.ak,.sek-btn#sek-btn-mat10.ak{color:var(--lilla);border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.1);}
.sek-btn#sek-btn-nat.ak{color:var(--gron);border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.08);}
.sek-btn#sek-btn-prg.ak{color:var(--bla);border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.08);}

#laster{padding:60px;text-align:center;color:var(--dim);}
#app{max-width:1120px;margin:0 auto;padding:20px 20px 80px;}

/* ELEVHDR */
.elev-hdr{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.elev-avatar{width:44px;height:44px;border-radius:10px;background:rgba(96,165,250,.15);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.elev-info h2{font-family:var(--font-h);font-size:1.1rem;font-weight:900;}
.elev-info p{font-size:.8rem;color:var(--dim);margin-top:2px;}
.elev-dato{margin-left:auto;font-size:.75rem;color:var(--dim);text-align:right;}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);
  border:1px solid var(--border);border-radius:10px;padding:3px;}
.tab-btn{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;
  font-family:var(--font-h);font-size:.8rem;font-weight:700;color:var(--dim);background:transparent;}
.tab-btn.ak{background:rgba(96,165,250,.15);color:var(--bla);}

/* SEKSJON */
.ma-seksjon{margin-bottom:28px;}
.ma-sek-tittel{font-family:var(--font-h);font-size:.92rem;font-weight:800;
  padding:8px 14px;border-left:4px solid;border-radius:0 8px 8px 0;
  margin-bottom:10px;background:rgba(255,255,255,.03);
  display:flex;align-items:center;gap:8px;}
.sek-alle-btn{padding:3px 9px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--dim);font-size:.68rem;cursor:pointer;margin-left:4px;}
.sek-alle-btn:hover{color:var(--text);}

/* TABELL */
.ma-tabell{width:100%;border-collapse:collapse;font-size:.81rem;}
.ma-tabell th{padding:7px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);
  font-family:var(--font-h);font-size:.65rem;text-transform:uppercase;letter-spacing:.8px;
  color:var(--dim);white-space:nowrap;}
.ma-tabell td{padding:7px 10px;border:1px solid var(--border);vertical-align:middle;}
.ma-tabell tr:hover td{background:rgba(255,255,255,.02);}
.ma-tabell tr.km-inaktiv td{opacity:.3;}
.col-huk{width:32px;text-align:center;}
.col-akt,.col-eg,.col-laer,.col-prove{width:72px;}
.km-huk{width:15px;height:15px;cursor:pointer;accent-color:var(--bla);}
.km-kod{font-family:var(--font-m);font-size:.68rem;background:rgba(255,255,255,.07);
  padding:2px 7px;border-radius:5px;}
.km-txt-celle{display:flex;flex-direction:column;gap:5px;}
.km-txt{font-size:.8rem;line-height:1.4;}
.km-notat-felt{width:100%;padding:4px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:.75rem;font-family:var(--font-b);outline:none;}
.km-notat-felt:focus{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.04);}
.eg-chip{font-family:var(--font-h);font-weight:700;font-size:.78rem;}
.eg-kode{font-size:.6rem;color:var(--dim);font-family:var(--font-m);margin-top:2px;}
.niv-chip{font-size:.7rem;padding:2px 8px;border-radius:5px;border:1px solid;
  font-family:var(--font-h);font-weight:700;}
.prove-cb{width:16px;height:16px;cursor:pointer;accent-color:var(--bla);}

/* PRØVEPLANLEGGER */
#tab-prove{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;}
.prove-hdr{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.prove-tittel{font-family:var(--font-h);font-size:1rem;font-weight:800;color:var(--bla);}
.prove-dato-wrap{display:flex;align-items:center;gap:8px;}
.prove-dato-label{font-size:.78rem;color:var(--dim);}
.prove-dato-input{padding:5px 10px;background:rgba(255,255,255,.06);border:1px solid var(--border2);
  border-radius:7px;color:var(--text);font-size:.78rem;font-family:var(--font-b);}
.prove-dato-input::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer;}
.prove-dato-vis{font-family:var(--font-h);font-size:.95rem;font-weight:800;color:var(--bla);
  padding:10px 0 4px;border-bottom:2px solid var(--border2);margin-bottom:14px;}
.prove-tom{color:var(--dim);font-size:.85rem;text-align:center;padding:30px;}
.prove-rad{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.prove-rad-innhold{flex:1;}
.prove-km-tekst{font-size:.83rem;color:var(--dim);}
.prove-notat{font-size:.75rem;color:var(--gul);margin-top:3px;font-style:italic;}
.prove-pdf-btn{margin-top:16px;padding:9px 20px;background:var(--bla);color:#000;border:none;
  border-radius:8px;font-family:var(--font-h);font-size:.8rem;font-weight:800;cursor:pointer;}

@media (max-width:700px){
  .col-akt,.col-prove{display:none;}
  .ma-tabell{font-size:.74rem;}
  #sek-filter{gap:4px;}
}
</style>
<style media="print">
@page{size:A4;margin:14mm 12mm;}
nav,#elev-velger-wrap,#sek-filter,.tabs,#tab-prove,
.col-huk,.km-huk,.prove-cb,.col-prove,.sek-alle-btn{display:none!important;}
body,html,#app{background:#fff!important;color:#111!important;max-width:100%;padding:0;}
.elev-hdr{background:#f8f8f8!important;border-color:#ccc!important;}
.elev-info h2,.elev-info p,.elev-dato{color:#111!important;}
.ma-sek-tittel{background:#f0f0f0!important;color:#111!important;}
.ma-tabell th{background:#e8e8e8!important;color:#444!important;border-color:#bbb!important;}
.ma-tabell td{border-color:#bbb!important;color:#111!important;}
.km-kod{background:#eee!important;color:#222!important;}
.km-notat-felt{border:1px solid #ccc!important;background:#fff!important;color:#111!important;}
.ma-tabell tr.km-inaktiv{display:none!important;}
.niv-chip{border:1px solid #aaa!important;}
</style>

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>
<script>

var laerer = SkapLab.hentLaerer();
var token  = laerer ? laerer.access_token : null;
var lid    = laerer ? ((laerer.user&&laerer.user.id)||laerer.id||'') : null;
if (!laerer) { location.href = 'laerer_login.html'; }

// ── KM → Egenvurderingskode-mapping ──────────────────────────────
var EG_KART = {
  'MAT8-1':'MAT-ALG','MAT8-2':'MAT-ALG','MAT8-3':'MAT-ALG','MAT8-4':'MAT-ALG',
  'MAT8-5':'MAT-ALG','MAT8-6':'MAT-ALG','MAT8-7':'MAT-ALG','MAT8-8':'MAT-ALG',
  'MAT8-9':'MAT-FUNK','MAT8-10':'MAT-FUNK','MAT8-11':'PRG-ALG',
  'MAT9-1':'MAT-GEO','MAT9-2':'MAT-GEO','MAT9-3':'MAT-GEO','MAT9-4':'MAT-GEO',

};

// ── STATE ─────────────────────────────────────────────────────────
var elever     = [];
var valgtElevId = new URLSearchParams(location.search).get('elev') || '';
var vurd        = {};
var egenvurd    = {};
var aktivitet   = {};
var merkander   = {};
var proveValgte = new Set();
// Hvilke KM som er huket av per seksjon (default: alle på)
var kmAktive    = {};

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
  vis('laster', true);

  // Hent elever læreren har tilgang til
  var klR = await SkapLab._get('/klasser?laerer_id=eq.'+lid+'&select=id,navn,elever(id,fullt_navn)', token);
  if (Array.isArray(klR)) {
    klR.forEach(function(kl) {
      if (Array.isArray(kl.elever)) kl.elever.forEach(function(e) {
        elever.push({ id: e.id, navn: e.fullt_navn, klasse: kl.navn });
      });
    });
  }

  byggElevvelger();

  if (valgtElevId) {
    await lastElevData(valgtElevId);
  }

  vis('laster', false);
}

function vis(id, show) {
  var el = document.getElementById(id);
  if (el) el.style.display = show ? 'block' : 'none';
}

// ── ELEVVELGER ────────────────────────────────────────────────────
function byggElevvelger() {
  var sel = document.getElementById('elev-sel');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Velg elev —</option>';
  elever.forEach(function(e) {
    var opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = e.navn + ' (' + e.klasse + ')';
    if (e.id === valgtElevId) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function byttElev(id) {
  valgtElevId = id;
  if (!id) {
    document.getElementById('malark-wrap').style.display = 'none';
    return;
  }
  vurd = {}; egenvurd = {}; aktivitet = {}; merkander = {}; proveValgte = new Set();
  vis('laster', true);
  await lastElevData(id);
  vis('laster', false);
}

async function lastElevData(id) {
  // Elevinfo
  var eR = await SkapLab._get('/elever?id=eq.'+id+'&select=fullt_navn,klasser(navn,skoler(navn))', token);
  var elev = eR && eR[0];
  if (elev) {
    document.getElementById('elev-navn').textContent  = elev.fullt_navn || '—';
    document.getElementById('elev-klasse').textContent = elev.klasser ? elev.klasser.navn : '—';
    if (elev.klasser && elev.klasser.skoler)
      document.getElementById('elev-skole').textContent = elev.klasser.skoler.navn;
  }

  // SkapLab-aktivitet
  var aR = await SkapLab._get('/aktivitet?elev_id=eq.'+id+'&order=tidspunkt.desc&limit=300', token);
  if (Array.isArray(aR)) aR.forEach(function(a) {
    if (a.km_kode && a.score_pst !== null && !aktivitet[a.km_kode])
      aktivitet[a.km_kode] = a.score_pst;
  });

  // Lærers vurdering
  var vR = await SkapLab._get('/vurderinger?elev_id=eq.'+id+'&laerer_id=eq.'+lid+'&select=km_kode,nivaa,merknad', token);
  if (Array.isArray(vR)) vR.forEach(function(v) {
    if (v.nivaa) vurd[v.km_kode] = v.nivaa;
    if (v.merknad) merkander[v.km_kode] = v.merknad;
  });

  // Elevens egenvurdering
  var egR = await SkapLab._get('/elev_egenvurdering?elev_id=eq.'+id, token);
  if (Array.isArray(egR)) egR.forEach(function(e) { egenvurd[e.km_kode] = e.nivaa; });

  document.getElementById('malark-wrap').style.display = 'block';
  document.getElementById('dato').textContent = new Date().toLocaleDateString('nb-NO',{year:'numeric',month:'long',day:'numeric'});
  byggMalark();
}

// ── FAGVELGER/SEKSJONSFILTER ──────────────────────────────────────
var aktiveSeksjoner = {mat8:true, mat9:true, mat10:true, nat:true, prg:true};

function toggleSeksjon(sek) {
  aktiveSeksjoner[sek] = !aktiveSeksjoner[sek];
  var btn = document.getElementById('sek-btn-'+sek);
  if (btn) btn.classList.toggle('ak', aktiveSeksjoner[sek]);
  var el = document.getElementById('sek-'+sek);
  if (el) el.style.display = aktiveSeksjoner[sek] ? '' : 'none';
}

// ── BYGG MALARK ───────────────────────────────────────────────────
function byggMalark() {
  var el = document.getElementById('malark-innhold');
  el.innerHTML = '';

  var seksjoner = [
    { id:'mat8',  tittel:'📐 Matematikk 8. trinn',  farge:'rgba(139,92,246,.3)',  km:KM_DATA.mat8  },
    { id:'mat9',  tittel:'📐 Matematikk 9. trinn',  farge:'rgba(139,92,246,.2)',  km:KM_DATA.mat9  },
    { id:'mat10', tittel:'📐 Matematikk 10. trinn', farge:'rgba(139,92,246,.15)', km:KM_DATA.mat10 },
    { id:'nat',   tittel:'🔬 Naturfag',             farge:'rgba(52,211,153,.25)', km:KM_DATA.nat   },
    { id:'prg',   tittel:'💻 Programmering',        farge:'rgba(96,165,250,.25)', km:KM_DATA.prg   },
  ];

  seksjoner.forEach(function(sek) {
    if (!aktiveSeksjoner[sek.id]) return;
    if (!kmAktive[sek.id]) {
      kmAktive[sek.id] = {};
      sek.km.forEach(function(km) { kmAktive[sek.id][km[0]] = true; });
    }

    var seksjonEl = document.createElement('div');
    seksjonEl.className = 'ma-seksjon';
    seksjonEl.id = 'sek-'+sek.id;

    // Seksjonstittel med "alle av/på"
    seksjonEl.innerHTML = '<div class="ma-sek-tittel" style="border-color:'+sek.farge+'">'
      +sek.tittel
      +'<button class="sek-alle-btn" onclick="alleKM(\''+sek.id+'\',true)">Alle</button>'
      +'<button class="sek-alle-btn" onclick="alleKM(\''+sek.id+'\',false)">Ingen</button>'
      +'</div>';

    var tabell = document.createElement('table');
    tabell.className = 'ma-tabell';
    tabell.innerHTML = '<thead><tr>'
      +'<th class="col-huk">☑</th>'
      +'<th>KM</th><th>Kompetansemål og notat</th>'
      +'<th class="col-akt">SkapLab</th>'
      +'<th class="col-eg">Egenvurd.</th>'
      +'<th class="col-laer">Lærers vurdering</th>'
      +'<th class="col-prove">Prøve</th>'
      +'</tr></thead>';

    var tbody = document.createElement('tbody');
    sek.km.forEach(function(km) {
      var aktiv = kmAktive[sek.id][km[0]];
      var n     = vurd[km[0]]     || '';
      var akt   = aktivitet[km[0]];
      var egKode = EG_KART[km[0]] || '';
      var eg    = egKode ? (egenvurd[egKode] || '') : '';
      var notat = merkander[km[0]] || '';

      var nivaaFarge = n==='hoy'?'#34d399':n==='middels'?'#fbbf24':n==='lav'?'#f87171':'rgba(255,255,255,.2)';
      var nivaaLabel = n==='hoy'?'Høy':n==='middels'?'Middels':n==='lav'?'Lav':'–';
      var egFarge    = eg==='hoy'?'#34d399':eg==='middels'?'#fbbf24':eg==='lav'?'#f87171':'var(--dim)';
      var egLabel    = eg==='hoy'?'Høy':eg==='middels'?'Mid':eg==='lav'?'Lav':eg==='vet_ikke'?'?':'–';
      var aktFarge   = akt>=70?'#34d399':akt>=45?'#fbbf24':'#f87171';

      var tr = document.createElement('tr');
      if (!aktiv) tr.className = 'km-inaktiv';
      tr.innerHTML =
        '<td class="col-huk"><input type="checkbox" class="km-huk" '+(aktiv?'checked':'')
          +' onchange="toggleKM(\''+sek.id+'\',\''+km[0]+'\',this)">'
        +'</td>'
        +'<td><code class="km-kod">'+km[0]+'</code></td>'
        +'<td class="km-txt-celle">'
          +'<div class="km-txt">'+km[1]+'</div>'
          +'<input type="text" class="km-notat-felt" placeholder="Fritekst / notat…" '
            +'data-km="'+km[0]+'" value="">'
        +'</td>'
        +'<td class="col-akt" style="text-align:center">'
          +(akt!==undefined?'<span style="color:'+aktFarge+'">'+akt+'%</span>':'–')
        +'</td>'
        +'<td class="col-eg">'
          +'<span class="eg-chip" style="color:'+egFarge+'">'+egLabel+'</span>'
          +(egKode?'<div class="eg-kode">'+egKode+'</div>':'')
        +'</td>'
        +'<td class="col-laer" style="text-align:center">'
          +'<span class="niv-chip" style="background:'+nivaaFarge+'20;color:'+nivaaFarge+';border-color:'+nivaaFarge+'40">'+nivaaLabel+'</span>'
        +'</td>'
        +'<td class="col-prove" style="text-align:center">'
          +'<input type="checkbox" class="prove-cb" data-km="'+km[0]+'" '
          +(proveValgte.has(km[0])?'checked ':'')+' onchange="toggleProve(this)">'
        +'</td>';

      tbody.appendChild(tr);
      // Sett notat etter DOM-insert
      var felt = tr.querySelector('.km-notat-felt');
      if (felt && notat) felt.value = notat;
      felt.addEventListener('input', function() { oppdaterNotat(felt); });
    });

    tabell.appendChild(tbody);
    seksjonEl.appendChild(tabell);
    el.appendChild(seksjonEl);
  });
}

// ── KM-KONTROLL ───────────────────────────────────────────────────
function toggleKM(sekId, km, cb) {
  if (!kmAktive[sekId]) kmAktive[sekId] = {};
  kmAktive[sekId][km] = cb.checked;
  var tr = cb.closest('tr');
  if (tr) tr.className = cb.checked ? '' : 'km-inaktiv';
}

function alleKM(sekId, på) {
  if (!kmAktive[sekId]) kmAktive[sekId] = {};
  var sek = document.getElementById('sek-'+sekId);
  if (!sek) return;
  sek.querySelectorAll('.km-huk').forEach(function(cb) {
    cb.checked = på;
    var km = cb.closest('tr').querySelector('.km-kod').textContent;
    kmAktive[sekId][km] = på;
    var tr = cb.closest('tr');
    if (tr) tr.className = på ? '' : 'km-inaktiv';
  });
}

function oppdaterNotat(felt) {
  merkander[felt.dataset.km] = felt.value;
  if (proveValgte.has(felt.dataset.km)) oppdaterProveListe();
}

function toggleProve(cb) {
  var km = cb.dataset.km;
  if (cb.checked) proveValgte.add(km);
  else proveValgte.delete(km);
  oppdaterProveListe();
}

// ── PRØVEPLANLEGGER ───────────────────────────────────────────────
function oppdaterProveListe() {
  var el = document.getElementById('prove-liste');
  if (!el) return;
  if (!proveValgte.size) {
    el.innerHTML = '<div class="prove-tom">Huk av kompetansemål i tabellen for å planlegge prøve.</div>';
    return;
  }
  var html = '<div class="prove-hdr">'
    +'<div class="prove-tittel">Prøveplan: '+proveValgte.size+' KM valgt</div>'
    +'<div class="prove-dato-wrap">'
      +'<label class="prove-dato-label">Prøvedato:</label>'
      +'<input type="date" id="prove-dato-global" class="prove-dato-input" value="'
      +new Date(Date.now()+7*86400000).toISOString().slice(0,10)+'">'
    +'</div></div>';

  proveValgte.forEach(function(km) {
    var info  = ALLE_KM.find(function(k){return k[0]===km;});
    var notat = merkander[km] || '';
    html += '<div class="prove-rad">'
      +'<code class="km-kod">'+km+'</code>'
      +'<div class="prove-rad-innhold">'
        +'<div class="prove-km-tekst">'+(info?info[1]:km)+'</div>'
        +(notat?'<div class="prove-notat">'+notat+'</div>':'')
      +'</div>'
      +'</div>';
  });
  html += '<button class="prove-pdf-btn" onclick="skrivUtProve()">🖨️ Skriv ut prøveplan</button>';
  el.innerHTML = html;
}

function visTab(tab) {
  ['tab-malark','tab-prove'].forEach(function(t) {
    var el=document.getElementById(t); if(el) el.style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('ak',b.dataset.tab===tab);});
}

function skrivUtMalark() { window.print(); }

function skrivUtProve() {
  var dato = document.getElementById('prove-dato-global');
  var datoStr = dato ? dato.value : '';
  if (datoStr) {
    var el = document.getElementById('prove-dato-vis');
    if (!el) {
      el = document.createElement('div');
      el.id = 'prove-dato-vis';
      el.className = 'prove-dato-vis';
      var prove = document.getElementById('tab-prove');
      if (prove) prove.insertBefore(el, prove.firstChild);
    }
    var d = new Date(datoStr);
    el.textContent = 'Prøvedato: '+d.toLocaleDateString('nb-NO',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  }
  document.getElementById('tab-malark').style.display='none';
  document.getElementById('tab-prove').style.display='block';
  setTimeout(function(){ window.print(); }, 200);
}

init();

</script>
