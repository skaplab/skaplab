<style>
:root{--bg:#07090f;--bg2:#0b0d18;--bg3:#0e1120;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#e0e8ff;--dim:rgba(255,255,255,.42);--bla:#60a5fa;--gron:#34d399;--gul:#fbbf24;--rod:#f87171;--lilla:#a78bfa;--font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
nav.topnav{height:52px;display:flex;align-items:center;padding:0 20px;gap:10px;background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;}
.nav-logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);text-decoration:none;}.spacer{flex:1;}
.print-btn{padding:6px 14px;background:var(--bla);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-size:.78rem;font-weight:800;cursor:pointer;}

#laerer-nav{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  padding:16px 10px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;
  display:flex;flex-direction:column;gap:2px;}
.ln-logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;padding:4px 10px 12px;color:var(--bla);}
.ln-logo span{color:var(--lilla);}
.ln-sek{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding:10px 10px 4px;margin-top:4px;}
.ln-link{padding:7px 10px;border-radius:8px;font-size:.82rem;color:var(--dim);text-decoration:none;transition:all .15s;display:block;}
.ln-link:hover{background:rgba(255,255,255,.05);color:var(--text);}
.ln-link.ln-ak{background:rgba(96,165,250,.12);color:var(--bla);}
@media(max-width:800px){#laerer-nav{width:100%;position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:8px;border-right:none;border-bottom:1px solid var(--border);}
  .ln-sek{display:none;}.ln-logo{width:100%;padding-bottom:6px;}}

#page{display:flex;min-height:calc(100vh - 52px);}
#main{flex:1;overflow-y:auto;padding:20px;}
#elev-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:14px;}
.ev-lbl{font-size:.8rem;color:var(--dim);}
#klasse-sel,#elev-sel{padding:7px 12px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:9px;color:var(--text);font-family:var(--font-b);font-size:.85rem;cursor:pointer;outline:none;min-width:160px;}
#sek-filter{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.sek-lbl{font-size:.75rem;color:var(--dim);margin-right:4px;}
.sek-btn{padding:5px 11px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;color:var(--dim);font-family:var(--font-h);font-size:.73rem;font-weight:700;cursor:pointer;transition:all .15s;}
#sek-btn-mat8.ak,#sek-btn-mat9.ak,#sek-btn-mat10.ak{color:var(--lilla);border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.1);}
#sek-btn-nat.ak{color:var(--gron);border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.08);}
#sek-btn-prg.ak{color:var(--bla);border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.08);}
#laster{padding:40px;text-align:center;color:var(--dim);}
.elev-hdr{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.elev-avatar{width:40px;height:40px;border-radius:9px;background:rgba(96,165,250,.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.elev-info h2{font-family:var(--font-h);font-size:1rem;font-weight:900;}.elev-info p{font-size:.78rem;color:var(--dim);margin-top:1px;}
.elev-dato{margin-left:auto;font-size:.74rem;color:var(--dim);}
.ma-seksjon{margin-bottom:24px;}
.ma-sek-tittel{font-family:var(--font-h);font-size:.88rem;font-weight:800;padding:8px 14px;border-left:4px solid;border-radius:0 8px 8px 0;margin-bottom:8px;background:rgba(255,255,255,.03);display:flex;align-items:center;gap:6px;}
.sek-alle-btn{padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--dim);font-size:.64rem;cursor:pointer;margin-left:4px;}
.ma-tabell{width:100%;border-collapse:collapse;font-size:.79rem;}
.ma-tabell th{padding:6px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-family:var(--font-h);font-size:.62rem;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);white-space:nowrap;}
.ma-tabell td{padding:7px 10px;border:1px solid var(--border);vertical-align:middle;}
.ma-tabell tr:hover td{background:rgba(255,255,255,.02);}.ma-tabell tr.km-inaktiv{opacity:.25;}
.col-huk{width:28px;text-align:center;}.col-akt,.col-eg,.col-laer{width:76px;}
.km-huk{width:15px;height:15px;cursor:pointer;accent-color:var(--bla);}
.km-kod{font-family:var(--font-m);font-size:.67rem;background:rgba(255,255,255,.07);padding:2px 7px;border-radius:5px;}
.km-txt-celle{display:flex;flex-direction:column;gap:4px;}.km-txt{font-size:.79rem;line-height:1.4;}
.km-notat-felt{width:100%;padding:4px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.73rem;font-family:var(--font-b);outline:none;}
.km-notat-felt:focus{border-color:rgba(96,165,250,.4);}
.eg-chip{font-family:var(--font-h);font-weight:700;font-size:.77rem;}
.eg-kode{font-size:.58rem;color:var(--dim);font-family:var(--font-m);margin-top:2px;}
.niv-chip{font-size:.69rem;padding:2px 8px;border-radius:5px;border:1px solid;font-family:var(--font-h);font-weight:700;}
@media(max-width:700px){.col-akt{display:none;}.ma-tabell{font-size:.73rem;}}
</style>

<script>// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,trenger_hjelp,hjelp_emne,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _delete: function(sti,tok){return fetch(API+sti,{method:'DELETE',headers:hdr(tok)}).then(function(r){return r.ok;});},
    _rpc: function(fn,params,tok){return fetch(API+'/rpc/'+fn,{method:'POST',headers:Object.assign(hdr(tok),{'Content-Type':'application/json'}),body:JSON.stringify(params)}).then(function(r){return r.json();});},
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();
</script>

        +'<td><code class="km-kod">'+km[0]+'</code></td>'
        +'<td class="km-txt-celle"><div class="km-txt">'+km[1]+'</div><input type="text" class="km-notat-felt" placeholder="Fritekst…" data-km="'+km[0]+'" value=""></td>'
        +'<td class="col-akt" style="text-align:center">'+(akt!==undefined?'<span style="color:'+(akt>=70?'#34d399':akt>=45?'#fbbf24':'#f87171')+'">'+akt+'%</span>':'–')+'</td>'
        +'<td class="col-eg"><span class="eg-chip" style="color:'+eF+'">'+eL+'</span>'+(egK?'<div class="eg-kode">'+egK+'</div>':'')+'</td>'
        +'<td class="col-laer" style="text-align:center"><span class="niv-chip" style="background:'+nF+'20;color:'+nF+';border-color:'+nF+'40">'+nL+'</span></td>';
      tbody.appendChild(tr);
      var felt=tr.querySelector('.km-notat-felt');if(felt){felt.value=notat;felt.addEventListener('input',function(){merkander[felt.dataset.km]=felt.value;});}
    });
    tb.appendChild(tbody);div.appendChild(tb);el.appendChild(div);
  });
}
function toggleKM(cb){var s=cb.dataset.sek,km=cb.dataset.km;if(!kmAktive[s])kmAktive[s]={};kmAktive[s][km]=cb.checked;var tr=cb.closest('tr');if(tr)tr.className=cb.checked?'':'km-inaktiv';}
function alleKM(sid,pa){if(!kmAktive[sid])kmAktive[sid]={};var sek=document.getElementById('sek-'+sid);if(!sek)return;sek.querySelectorAll('.km-huk').forEach(function(cb){cb.checked=pa;kmAktive[sid][cb.dataset.km]=pa;var tr=cb.closest('tr');if(tr)tr.className=pa?'':'km-inaktiv';});}
function skrivUtMalark(){window.print();}
init();

</script>
