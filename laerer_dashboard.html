<!DOCTYPE html>
<html lang="no"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>

:root{--bg:#07090f;--bg2:#0b0d18;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e0e8ff;--dim:rgba(255,255,255,.45);
  --gron:#34d399;--gul:#fbbf24;--rod:#f87171;--bla:#60a5fa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
#topbar{height:52px;display:flex;align-items:center;gap:16px;padding:0 20px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;}
.logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);}
.logo span{opacity:.4;}.spacer{flex:1;}
.tbtn{padding:6px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;
  border:1px solid var(--border2);background:transparent;color:var(--dim);}
.tbtn:hover{color:var(--text);}

#layout{display:flex;min-height:calc(100vh - 52px);}
#sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:12px;}
#innhold{flex:1;padding:24px;max-width:1000px;}
.side-sek{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.2);padding:10px 8px 4px;}
.side-link{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;font-size:.84rem;color:var(--dim);cursor:pointer;text-decoration:none;}
.side-link:hover,.side-link.ak{background:rgba(96,165,250,.1);color:var(--bla);}
.ant{margin-left:auto;font-size:.68rem;background:rgba(255,255,255,.08);padding:1px 7px;border-radius:10px;}
.side-tittel{font-family:var(--font-h);font-size:1.4rem;font-weight:800;margin-bottom:6px;}
.side-sub{font-size:.85rem;color:var(--dim);margin-bottom:24px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-t{font-family:var(--font-h);font-size:1.8rem;font-weight:900;}
.stat-l{font-size:.75rem;color:var(--dim);margin-top:4px;}
.sek-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.sek-tittel{font-family:var(--font-h);font-size:1.1rem;font-weight:800;}
.ny-btn{padding:7px 14px;background:var(--bla);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-size:.78rem;font-weight:700;cursor:pointer;margin-left:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.86rem;vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
.enavn{font-weight:600;cursor:pointer;color:var(--text);}
.enavn:hover{color:var(--bla);}
.chip{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;font-size:.7rem;font-weight:700;}
.ch-h{background:rgba(52,211,153,.2);color:var(--gron);}
.ch-m{background:rgba(251,191,36,.15);color:var(--gul);}
.ch-l{background:rgba(248,113,113,.15);color:var(--rod);}
.ch-u{background:rgba(255,255,255,.06);color:rgba(255,255,255,.2);}
.modal-bg{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.modal-bg.vis{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:28px 32px;max-width:420px;width:92%;}
.modal h3{font-family:var(--font-h);font-size:1.1rem;margin-bottom:16px;}
.fr{margin-bottom:12px;}
.fr label{display:block;font-size:.74rem;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.fr input,.fr select{width:100%;padding:10px 12px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;}
.fr input:focus{border-color:var(--bla);}
.modal-btns{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.avb{padding:8px 16px;background:transparent;border:1px solid var(--border2);color:var(--dim);border-radius:8px;cursor:pointer;font-size:.84rem;}
.lag{padding:8px 20px;background:var(--bla);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-weight:700;cursor:pointer;}
#laster-msg{padding:40px;text-align:center;color:var(--dim);}
</style></head><body>
<div id="topbar">
  <div class="logo">Skap<span>Lab</span></div>
  <div class="spacer"></div>
  <span id="lnavn" style="font-size:.82rem;color:var(--dim);"></span>
  <button class="tbtn" onclick="window.open('index.html')">Til SkapLab</button>
  <button class="tbtn" onclick="loggUt()">Logg ut</button>
</div>
<div id="layout">
  <div id="sidebar">
    <div class="side-sek">Oversikt</div>
    <a class="side-link ak" onclick="visKlasse()">Klassen min</a>
    <div class="side-sek">Klasser</div>
    <div id="klasse-liste"></div>
    <div class="side-sek">Verktoy</div>
    <a class="side-link" onclick="visNyKlasse()">+ Ny klasse</a>
    <a class="side-link" onclick="loggUt()">Logg ut</a>
  </div>
  <div id="innhold">
    <div id="laster-msg">Laster...</div>
    <div id="side-klasse" style="display:none"></div>
    <div id="side-nyklasse" style="display:none"></div>
  </div>
</div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Legg til elev</h3>
    <div class="fr"><label>Fullt navn</label><input type="text" id="ny-navn" placeholder="Ola Nordmann"></div>
    <div class="fr"><label>Klasse</label><select id="ny-klasse-sel"></select></div>
    <div style="font-size:.76rem;color:var(--dim);background:rgba(255,255,255,.04);padding:10px;border-radius:8px;">
      Innloggingskoden genereres automatisk.
    </div>
    <div class="modal-btns">
      <button class="avb" onclick="lukkModal()">Avbryt</button>
      <button class="lag" onclick="opprettElev()">Legg til</button>
    </div>
    <div id="modal-feil" style="color:var(--rod);font-size:.8rem;margin-top:8px;"></div>
  </div>
</div>
<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      sessionStorage.setItem(SESSION_NØKKEL, JSON.stringify(elev));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = sessionStorage.getItem(SESSION_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });
      if (resp.error) return { ok: false, feil: resp.error.message };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    return hentLaerer() !== null;
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>
<script>




'use strict';

// Hjelpefunksjon for å hente epost fra Supabase Auth-objekt
function hentEpost(sess) {
  if (!sess) return '';
  // Prøv ulike steder eposten kan ligge
  if (sess.user && sess.user.email) return sess.user.email;
  if (sess.email) return sess.email;
  if (sess.user && sess.user.user_metadata && sess.user.user_metadata.email) 
    return sess.user.user_metadata.email;
  return '';
}

function hentNavn(sess) {
  if (!sess) return 'Laerer';
  if (sess.user && sess.user.user_metadata && sess.user.user_metadata.fullt_navn)
    return sess.user.user_metadata.fullt_navn;
  if (sess.user && sess.user.email) return sess.user.email;
  if (sess.email) return sess.email;
  return 'Laerer';
}

// Sett opp knapper via addEventListener (ikke inline onclick)
document.addEventListener('DOMContentLoaded', function() {
  // Modal-knapper koblet via JS for ekstra sikkerhet
  var avbBtn = document.querySelector('.avb');
  var lagBtn = document.querySelector('.lag');
  if (avbBtn) avbBtn.addEventListener('click', lukkModal);
  if (lagBtn) lagBtn.addEventListener('click', opprettElev);

  // Start dashboardet
  init();
});


if(!SkapLab.erLaererInnlogget()){location.href='laerer_login.html';throw new Error('Ikke innlogget');}
var laerer=SkapLab.hentLaerer();
var token=laerer.access_token;
var lid=(laerer.user&&laerer.user.id)||laerer.id||'';
var klasser=[], elever=[], aktivKlasse=null;
var KM=[['MAT-ALG','Alg'],['MAT-FUNK','Fun'],['MAT-GEO','Geo'],['NAT-BIO','Bio'],['NAT-KJE','Kje'],['PRG-ALG','Prg']];

async function init(){
  // Vis navn fra Auth-token uansett
  var bruker=laerer.user;
  var visNavn=hentNavn(laerer);
  document.getElementById('lnavn').textContent=visNavn;

  // Hent laerer-navn fra DB (ikke kritisk om det feiler)
  try{
    var lR=await SkapLab._get('/laerere?id=eq.'+lid+'&select=fullt_navn',token);
    if(lR&&lR[0]&&lR[0].fullt_navn) document.getElementById('lnavn').textContent=lR[0].fullt_navn;
  }catch(e){}

  // Hent klasser (ikke kritisk om det feiler - vis tom side)
  try{
    var kR=await SkapLab._get('/klasser?order=navn',token);
    klasser=Array.isArray(kR)?kR:[];
  }catch(e){ klasser=[]; }

  // Hent elever (ikke kritisk)
  try{
    var eR=await SkapLab._get('/elever?aktiv=eq.true&order=fullt_navn',token);
    elever=Array.isArray(eR)?eR:[];
  }catch(e){ elever=[]; }

  // Vis alltid noe - aldri heng
  byggSidebar();
  document.getElementById('laster-msg').style.display='none';
  if(klasser.length>0){aktivKlasse=klasser[0].id;visKlasse();}
  else visNyKlasse();
}

function byggSidebar(){
  var el=document.getElementById('klasse-liste');el.innerHTML='';
  klasser.forEach(function(k){
    var ant=elever.filter(function(e){return e.klasse_id===k.id;}).length;
    var a=document.createElement('a');a.className='side-link';
    a.innerHTML=k.navn+(k.trinn?' ('+k.trinn+'.)':'')+' <span class="ant">'+ant+'</span>';
    a.onclick=function(){aktivKlasse=k.id;visKlasse();};
    el.appendChild(a);
  });
}

async function visKlasse(){
  document.querySelectorAll('[id^=side-]').forEach(function(e){e.style.display='none';});
  document.getElementById('side-klasse').style.display='block';
  var e2=elever.filter(function(e){return e.klasse_id===aktivKlasse;});
  var k=klasser.find(function(k){return k.id===aktivKlasse;});
  var vR=e2.length?await SkapLab._get('/vurderinger?elev_id=in.('+e2.map(function(e){return e.id;}).join(',')+')',token):[];
  var vrd=Array.isArray(vR)?vR:[];
  var s=document.getElementById('side-klasse');s.innerHTML='';
  s.innerHTML='<div class="side-tittel">'+(k?k.navn:'Klasse')+'</div>'
    +'<div class="side-sub">'+e2.length+' elever</div>'
    +'<div class="stats-grid">'
    +'<div class="stat"><div class="stat-t">'+e2.length+'</div><div class="stat-l">Elever</div></div>'
    +'<div class="stat"><div class="stat-t">'+vrd.length+'</div><div class="stat-l">Vurderinger</div></div>'
    +'</div>'
    +'<div class="sek-hdr"><div class="sek-tittel">Elever</div>'
    +'<button class="ny-btn" id="ny-elev-btn">+ Ny elev</button></div>'
    +'<table><thead><tr><th>Elev</th><th>Kode</th>'
    +KM.map(function(k){return '<th>'+k[1]+'</th>';}).join('')
    +'<th></th></tr></thead>'
    +'<tbody id="elev-tbody"></tbody></table>';
  var tbody=document.getElementById('elev-tbody');
  if(e2.length===0){
    tbody.innerHTML='<tr><td colspan="'+(KM.length+3)+'" style="text-align:center;padding:30px;color:var(--dim);">Ingen elever. Klikk "+ Ny elev".</td></tr>';
  }
  e2.forEach(function(elev){
    var ev=vrd.filter(function(v){return v.elev_id===elev.id;});
    var tr=document.createElement('tr');

    // Navn-celle med klikk via data-attributt
    var tdNavn=document.createElement('td');
    var span=document.createElement('span');
    span.className='enavn';
    span.textContent=elev.fullt_navn;
    span.dataset.id=elev.id;
    span.onclick=function(){apneElev(this.dataset.id);};
    tdNavn.appendChild(span);
    tr.appendChild(tdNavn);

    // Kode-celle
    var tdKode=document.createElement('td');
    var kode=document.createElement('code');
    kode.style.cssText='font-family:var(--font-m);color:var(--bla);font-size:.8rem;';
    kode.textContent=elev.innloggingskode;
    tdKode.appendChild(kode);
    tr.appendChild(tdKode);

    // KM-celler
    KM.forEach(function(km){
      var v=ev.find(function(v){return v.km_kode===km[0];});
      var td=document.createElement('td');
      var chip=document.createElement('span');
      chip.className='chip';
      if(!v){chip.className+=' ch-u';chip.textContent='-';}
      else{
        var kls=v.nivaa==='hoy'?'ch-h':v.nivaa==='middels'?'ch-m':v.nivaa==='lav'?'ch-l':'ch-u';
        var sym=v.nivaa==='hoy'?'H':v.nivaa==='middels'?'M':v.nivaa==='lav'?'L':'-';
        chip.className+=' '+kls;chip.textContent=sym;
      }
      td.appendChild(chip);tr.appendChild(td);
    });

    // Vurder-knapp
    var tdBtn=document.createElement('td');
    var btn=document.createElement('button');
    btn.textContent='Vurder';
    btn.style.cssText='padding:4px 10px;background:transparent;border:1px solid var(--border2);color:var(--dim);border-radius:6px;cursor:pointer;font-size:.74rem;';
    btn.dataset.id=elev.id;
    btn.onclick=function(){apneElev(this.dataset.id);};
    tdBtn.appendChild(btn);tr.appendChild(tdBtn);

    tbody.appendChild(tr);
  });
  // Legg til eventlistener på knappen etter at DOM er bygget
  var nyBtn = document.getElementById('ny-elev-btn');
  if (nyBtn) nyBtn.addEventListener('click', apneModal);
}

function visNyKlasse(){
  document.querySelectorAll('[id^=side-]').forEach(function(e){e.style.display='none';});
  document.getElementById('side-nyklasse').style.display='block';
  document.getElementById('side-nyklasse').innerHTML='<div class="side-tittel">Opprett klasse</div>'
    +'<div style="max-width:360px;">'
    +'<div class="fr"><label>Klassenavn</label><input type="text" id="kl-navn" placeholder="9A"></div>'
    +'<div class="fr"><label>Trinn</label><select id="kl-trinn"><option value="8">8. trinn</option><option value="9">9. trinn</option><option value="10">10. trinn</option></select></div>'
    +'<button id="kl-btn" style="margin-top:8px;padding:8px 20px;background:var(--bla);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-weight:700;cursor:pointer;">Opprett</button>'
    +'<div id="kl-feil" style="color:var(--rod);font-size:.8rem;margin-top:8px;"></div></div>';
  document.getElementById('kl-btn').addEventListener('click', opprettKlasse);
}

async function opprettKlasse(){
  var navn=document.getElementById('kl-navn').value.trim();
  var trinn=document.getElementById('kl-trinn').value;
  var feilEl=document.getElementById('kl-feil');
  if(!navn){feilEl.textContent='Skriv inn klassenavn.';return;}

  var btn=document.getElementById('kl-btn');
  btn.disabled=true; btn.textContent='Oppretter...';
  feilEl.textContent='';

  try{
    // Hent eller opprett skole_id
    var skoleId=null;
    var lInfo=await SkapLab._get('/laerere?id=eq.'+lid+'&select=skole_id',token);
    if(lInfo&&lInfo[0]&&lInfo[0].skole_id){
      skoleId=lInfo[0].skole_id;
    } else {
      // Laerer-profil mangler - opprett skole og profil naa
      var visNavn=hentNavn(laerer);
      var skoleResp=await SkapLab._post('/skoler',{navn:'Min skole',kommune:''},token);
      skoleId=Array.isArray(skoleResp)?skoleResp[0].id:skoleResp.id;
      if(skoleId){
        await SkapLab._post('/laerere',{id:lid,skole_id:skoleId,fullt_navn:visNavn,epost:hentEpost(laerer)},token);
      }
    }

    if(!skoleId){feilEl.textContent='Feil: kunne ikke hente skole-ID.';btn.disabled=false;btn.textContent='Opprett';return;}

    var resp=await SkapLab._post('/klasser',{navn:navn,trinn:parseInt(trinn),skole_id:skoleId},token);
    var ny=Array.isArray(resp)?resp[0]:resp;

    if(ny&&ny.id){
      await SkapLab._post('/laerer_klasse',{laerer_id:lid,klasse_id:ny.id},token);
      klasser.push(ny);aktivKlasse=ny.id;byggSidebar();visKlasse();
    } else {
      feilEl.textContent='Feil ved oppretting: '+(ny&&ny.message?ny.message:'ukjent feil');
      btn.disabled=false; btn.textContent='Opprett';
    }
  } catch(e){
    feilEl.textContent='Teknisk feil: '+e.message;
    btn.disabled=false; btn.textContent='Opprett';
  }
}

function apneModal(){
  var sel=document.getElementById('ny-klasse-sel');
  sel.innerHTML=klasser.map(function(k){return '<option value="'+k.id+'">'+k.navn+'</option>';}).join('');
  if(aktivKlasse) sel.value=aktivKlasse;
  document.getElementById('modal').classList.add('vis');
}
function lukkModal(){document.getElementById('modal').classList.remove('vis');}

async function opprettElev(){
  var navn=document.getElementById('ny-navn').value.trim();
  var klasseId=document.getElementById('ny-klasse-sel').value;
  var feil=document.getElementById('modal-feil');
  if(!navn){feil.textContent='Skriv inn navn.';return;}
  var kode=String(Math.floor(100000+Math.random()*900000));
  var resp=await SkapLab._post('/elever',{fullt_navn:navn,klasse_id:klasseId,innloggingskode:kode},token);
  var ny=Array.isArray(resp)?resp[0]:resp;
  if(ny&&ny.id){
    elever.push(ny);lukkModal();
    document.getElementById('ny-navn').value='';
    alert(navn+' er lagt til.\n\nInnloggingskode: '+kode+'\n\nDel denne med eleven.');
    visKlasse();
  }else{feil.textContent='Feil. Prøv igjen.';}
}

function apneElev(id){sessionStorage.setItem('skaplab_valgt_elev',id);location.href='elev_detalj.html';}
function loggUt(){sessionStorage.clear();location.href='laerer_login.html';}




</script>
