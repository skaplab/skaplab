<style>

:root{--bg:#07090f;--bg2:#0b0d18;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e0e8ff;--dim:rgba(255,255,255,.45);
  --gron:#34d399;--gul:#fbbf24;--rod:#f87171;--bla:#60a5fa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
#topbar{height:52px;display:flex;align-items:center;gap:16px;padding:0 20px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;}
.logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);}
.logo span{opacity:.4;}.spacer{flex:1;}
.tbtn{padding:6px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;
  border:1px solid var(--border2);background:transparent;color:var(--dim);}
.tbtn:hover{color:var(--text);}

#layout{display:flex;min-height:calc(100vh - 52px);align-items:flex-start;}
#sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:12px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;}
#innhold{flex:1;padding:24px;max-width:1000px;}
.side-sek{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.2);padding:10px 8px 4px;}
.side-link{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;font-size:.84rem;color:var(--dim);cursor:pointer;text-decoration:none;}
.side-link:hover,.side-link.ak{background:rgba(96,165,250,.1);color:var(--bla);}
.ant{margin-left:auto;font-size:.68rem;background:rgba(255,255,255,.08);padding:1px 7px;border-radius:10px;}
.side-tittel{font-family:var(--font-h);font-size:1.4rem;font-weight:800;margin-bottom:6px;}
.side-sub{font-size:.85rem;color:var(--dim);margin-bottom:24px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-t{font-family:var(--font-h);font-size:1.8rem;font-weight:900;}
.stat-l{font-size:.75rem;color:var(--dim);margin-top:4px;}
.sek-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.sek-tittel{font-family:var(--font-h);font-size:1.1rem;font-weight:800;}
.ny-btn{padding:7px 14px;background:var(--bla);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-size:.78rem;font-weight:700;cursor:pointer;margin-left:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.86rem;vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
.enavn{font-weight:600;cursor:pointer;color:var(--text);}
.enavn:hover{color:var(--bla);}
.chip{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;font-size:.7rem;font-weight:700;}
.ch-h{background:rgba(52,211,153,.2);color:var(--gron);}
.ch-m{background:rgba(251,191,36,.15);color:var(--gul);}
.ch-l{background:rgba(248,113,113,.15);color:var(--rod);}
.ch-u{background:rgba(255,255,255,.06);color:rgba(255,255,255,.2);}
.modal-bg{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.modal-bg.vis{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:28px 32px;max-width:420px;width:92%;}
.modal h3{font-family:var(--font-h);font-size:1.1rem;margin-bottom:16px;}
.fr{margin-bottom:12px;}
.fr label{display:block;font-size:.74rem;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.fr input,.fr select{width:100%;padding:10px 12px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;}
.fr input:focus{border-color:var(--bla);}
.modal-btns{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.avb{padding:8px 16px;background:transparent;border:1px solid var(--border2);color:var(--dim);border-radius:8px;cursor:pointer;font-size:.84rem;}
.lag{padding:8px 20px;background:var(--bla);color:#000;border:none;border-radius:8px;font-family:var(--font-h);font-weight:700;cursor:pointer;}
#laster-msg{padding:40px;text-align:center;color:var(--dim);}

@media (max-width: 700px) {
  .layout { flex-direction: column; }
  #sidebar { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding-bottom: 8px; overflow-y: visible; }
  .sidemeny-link { padding: 8px 14px; font-size: .82rem; }
  table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .modal-boks { width: calc(100vw - 32px); margin: 16px; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .side-tittel { font-size: 1.1rem; }
}

.rp-grid { display:flex; flex-direction:column; gap:6px; }
.rp-kort { display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:rgba(96,165,250,.06); border:1px solid rgba(96,165,250,.2);
  border-radius:10px; text-decoration:none; color:var(--text); transition:all .15s; }
.rp-kort:hover { background:rgba(96,165,250,.12); border-color:rgba(96,165,250,.35); }
.rp-nr { width:24px; height:24px; border-radius:6px; background:rgba(96,165,250,.2);
  color:var(--bla); font-family:var(--font-h); font-size:.78rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.rp-innhold { flex:1; min-width:0; }
.rp-tittel { font-size:.82rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rp-meta { font-size:.72rem; color:var(--dim); margin-top:2px; }
.rp-pil { color:var(--bla); font-size:.9rem; flex-shrink:0; }
.rp-tom { font-size:.82rem; color:var(--dim); padding:12px 0; }
.rp-mer { font-size:.72rem; color:var(--dim); padding:6px 0; text-align:right; }


.varsel-rad{display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);
  border-radius:8px;margin-bottom:5px;}
.varsel-ikon{font-size:1rem;flex-shrink:0;}
.varsel-tittel{font-size:.8rem;font-weight:600;}
.varsel-dato{font-size:.72rem;color:var(--dim);}


.admin-bruker-rad{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.admin-bruker-info{flex:1;min-width:0;}
.admin-bruker-navn{font-size:.82rem;font-weight:600;}
.admin-bruker-epost{font-size:.72rem;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.admin-slett-btn{padding:4px 9px;background:transparent;border:1px solid rgba(248,113,113,.3);color:var(--rod);border-radius:6px;cursor:pointer;font-size:.72rem;white-space:nowrap;flex-shrink:0;}
.admin-slett-btn:hover{background:rgba(248,113,113,.1);}

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,trenger_hjelp,hjelp_emne,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _delete: function(sti,tok){return fetch(API+sti,{method:'DELETE',headers:hdr(tok)}).then(function(r){return r.ok;});},
    _rpc: function(fn,params,tok){return fetch(API+'/rpc/'+fn,{method:'POST',headers:Object.assign(hdr(tok),{'Content-Type':'application/json'}),body:JSON.stringify(params)}).then(function(r){return r.json();});},
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>

'use strict';

// Hent bruker-ID fra Supabase auth-objekt (støtter ulike formater)
function hentLid(sess) {
  if (!sess) return '';
  if (sess.user && sess.user.id) return sess.user.id;
  if (sess.user && sess.user.sub) return sess.user.sub;
  if (sess.id) return sess.id;
  if (sess.sub) return sess.sub;
  return '';
}

// Hjelpefunksjon for å hente epost fra Supabase Auth-objekt
function hentEpost(sess) {
  if (!sess) return '';
  // Prøv ulike steder eposten kan ligge
  if (sess.user && sess.user.email) return sess.user.email;
  if (sess.email) return sess.email;
  if (sess.user && sess.user.user_metadata && sess.user.user_metadata.email) 
    return sess.user.user_metadata.email;
  return '';
}

function hentNavn(sess) {
  if (!sess) return 'Laerer';
  if (sess.user && sess.user.user_metadata && sess.user.user_metadata.fullt_navn)
    return sess.user.user_metadata.fullt_navn;
  if (sess.user && sess.user.email) return sess.user.email;
  if (sess.email) return sess.email;
  return 'Laerer';
}

if(!SkapLab.erLaererInnlogget()){location.href='laerer_login.html';throw new Error('Ikke innlogget');}

function hentLid(sess) {
  if (!sess) return '';

  if (sess.user && sess.user.id) return sess.user.id;
  // Prøv direkte id
  if (sess.id) return sess.id;
  // Decode JWT og hent sub
  try {
    var parts = sess.access_token.split('.');
    if (parts.length === 3) {
      var payload = JSON.parse(atob(parts[1]));
      if (payload.sub) return payload.sub;
    }
  } catch(e) {}

}

// Refresh token (støtter både JWT og nye sb_-tokens)
async function hentGyldigToken(){
  var sess=SkapLab.hentLaerer();
  if(!sess){sessionStorage.clear();location.href='laerer_login.html';return null;}
  
  // Sjekk expires_at om lagret (sekunder siden epoch)
  var utloept=false;
  if(sess.expires_at){
    utloept=(sess.expires_at*1000)<(Date.now()-30000);
  } else if(sess.access_token && sess.access_token.startsWith('eyJ')){
    // Vanlig JWT - decode og sjekk
    try{
      var p=JSON.parse(atob(sess.access_token.split('.')[1]));
      utloept=(p.exp*1000)<(Date.now()-30000);
    }catch(e){ utloept=false; }
  }
  // Nye sb_-tokens: stol på at de er gyldige inntil Supabase sier noe annet
  
  if(!utloept) return sess.access_token;
  
  // Prøv refresh
  if(!sess.refresh_token){sessionStorage.clear();location.href='laerer_login.html';return null;}
  var resp=await fetch(SkapLab.SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY},
    body:JSON.stringify({refresh_token:sess.refresh_token})
  }).then(function(r){return r.json();});
  if(resp.access_token){
    sessionStorage.setItem('skaplab_laerer',JSON.stringify(resp));
    laerer=resp; token=resp.access_token;
    lid=hentLid(resp);
    return resp.access_token;
  }
  sessionStorage.clear(); location.href='laerer_login.html'; return null;
}

async function opprettKlasse(){
  var navn=document.getElementById('kl-navn').value.trim();
  var trinn=document.getElementById('kl-trinn').value;
  var feilEl=document.getElementById('kl-feil');
  if(!navn){feilEl.textContent='Skriv inn klassenavn.';return;}

  var btn=document.getElementById('kl-btn');
  btn.disabled=true; btn.textContent='Oppretter...';
  feilEl.textContent='';

  try{
    // Hent ferskt token
    token=await hentGyldigToken();
    if(!token) return;
    lid=(laerer.user&&laerer.user.id)||laerer.id||'';

    // Hent eller opprett skole_id
    var skoleId=null;
    var lInfo=await SkapLab._get('/laerere?id=eq.'+lid+'&select=skole_id',token);
    if(lInfo&&lInfo[0]&&lInfo[0].skole_id){
      skoleId=lInfo[0].skole_id;
    } else {
      feilEl.textContent='Lærerprofil mangler. Logg ut og inn igjen.';
      btn.disabled=false; btn.textContent='Opprett'; return;
    }

    if(!skoleId){feilEl.textContent='Feil: kunne ikke hente skole-ID.';btn.disabled=false;btn.textContent='Opprett';return;}

    // Opprett klasse
    var klasseRaw=await fetch(SkapLab.SUPABASE_URL+'/rest/v1/klasser',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY,
        'Authorization':'Bearer '+token,'Prefer':'return=representation'},
      body:JSON.stringify({navn:navn,trinn:parseInt(trinn),skole_id:skoleId,laerer_id:lid})
    });
    var klasseJson=await klasseRaw.json().catch(function(){return null;});
    var nyKlasse=Array.isArray(klasseJson)?klasseJson[0]:klasseJson;

    // Godta 201 Created selv om body er tom
    if(!klasseRaw.ok && !(klasseRaw.status===201||klasseRaw.status===200)){
      feilEl.textContent='Feil ved oppretting av klasse ('+klasseRaw.status+'): '
        +(nyKlasse&&nyKlasse.message?nyKlasse.message:'ukjent feil');
      btn.disabled=false; btn.textContent='Opprett'; return;
    }

    var klasseId=nyKlasse&&nyKlasse.id;

    // Om vi ikke fikk ID i respons, hent siste klasse fra DB
    if(!klasseId){
      var siste=await SkapLab._get(
        '/klasser?navn=eq.'+encodeURIComponent(navn)+'&skole_id=eq.'+skoleId+'&order=opprettet.desc&limit=1',
        token);
      klasseId=siste&&siste[0]&&siste[0].id;
    }

    if(!klasseId){
      feilEl.textContent='Klasse ble opprettet men ID ikke funnet. Last siden på nytt.';
      btn.disabled=false; btn.textContent='Opprett'; return;
    }

    // Knytt lærer til klassen
    await fetch(SkapLab.SUPABASE_URL+'/rest/v1/laerer_klasse',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY,
        'Authorization':'Bearer '+token},
      body:JSON.stringify({laerer_id:lid,klasse_id:klasseId})
    });

    // Last alle data på nytt fra DB (ikke stol på lokal state)
    document.getElementById('kl-info').textContent='Laster klasse...';
    var kR=await SkapLab._get('/klasser?order=navn',token);
    klasser=Array.isArray(kR)?kR:[];
    var eR=await SkapLab._get('/elever?aktiv=eq.true&order=fullt_navn&select=id,fullt_navn,innloggingskode,klasse_id,trenger_hjelp,hjelp_emne',token);
    elever=Array.isArray(eR)?eR:[];
    aktivKlasse=klasseId;
    byggSidebar();
    await visKlasse();
  } catch(e){
    if(e.message&&e.message.includes('PGRST301')){
      feilEl.textContent='Sesjonen er utløpt. Logg ut og inn igjen.';
    } else {
      feilEl.textContent='Teknisk feil: '+e.message;
    }
    btn.disabled=false; btn.textContent='Opprett';
  }
}

  var resp=await SkapLab._post('/elever',{fullt_navn:navn,klasse_id:klasseId,innloggingskode:kode},token);
  var ny=Array.isArray(resp)?resp[0]:resp;

  if(ny&&ny.id){

    feil.textContent='Feil. Prøv igjen.';
    if(lagreBtn){lagreBtn.disabled=false;lagreBtn.textContent='Legg til';}
  }
  _oppretterElev=false;

    headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY,
      'Authorization':'Bearer '+token,'Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });

  if(resp.ok){
    feilEl.style.color='var(--gron)';
    feilEl.textContent='Oppgave tildelt!';
    setTimeout(function(){feilEl.textContent='';},3000);
  } else {
    feilEl.style.color='var(--rod)';
    feilEl.textContent='Feil ved tildeling. Prøv igjen.';
  }
}







// ── RESSURSPANEL FRA PLANLEGGER ──────────────────────────────────
function byggRessurspanel() {
  var el = document.getElementById('ressurspanel');
  if (!el) return;

  // Bruk klasse-spesifikk nøkkel (v2 + klasseId)
  var planKey = 'skaplab_plan_v2_' + (aktivKlasse || 'default');
  var plan = {};
  try { plan = JSON.parse(localStorage.getItem(planKey) || '{}'); } catch(e) {}

  var ukeNr = Math.ceil(((new Date()-new Date(new Date().getFullYear(),0,1))/86400000
    + new Date(new Date().getFullYear(),0,1).getDay()+1)/7);

  // Ny struktur: plan[uke][dag] = array av ressurser
  var alleRessurser = [];
  [ukeNr, ukeNr+1].forEach(function(u) {
    if (!plan[u]) return;
    Object.keys(plan[u]).forEach(function(dag) {
      var dagRes = plan[u][dag];
      if (!Array.isArray(dagRes)) return;
      dagRes.forEach(function(res) {
        alleRessurser.push({
          fil: res.fil, t: res.t, dag: dag, uke: u, km: res.km || ''
        });
      });
    });
  });

  // Sorter etter uke, deretter dag-rekkefølge
  var DAGER = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag'];
  alleRessurser.sort(function(a,b) {
    if (a.uke !== b.uke) return a.uke - b.uke;
    return DAGER.indexOf(a.dag) - DAGER.indexOf(b.dag);
  });

  if (!alleRessurser.length) {
    el.innerHTML = '<div class="rp-tom">Ingen ressurser planlagt for denne klassen. '
      + '<a href="laerer_planlegger.html" style="color:var(--bla);">Åpne planleggeren →</a></div>';
    return;
  }

  var html = '<div class="rp-grid">';
  alleRessurser.slice(0,6).forEach(function(res, i) {
    var dagLabel = res.dag === 'Mandag' || res.dag === 'Tirsdag' || res.dag === 'Onsdag'
      || res.dag === 'Torsdag' || res.dag === 'Fredag'
      ? res.dag + (res.uke===ukeNr ? '' : ' neste uke') : 'Uke '+(res.uke===ukeNr?'denne':'neste');
    html += '<a href="'+res.fil+'" class="rp-kort" target="_blank">'
      +'<div class="rp-nr">'+(i+1)+'</div>'
      +'<div class="rp-innhold">'
        +'<div class="rp-tittel">'+res.t+'</div>'
        +'<div class="rp-meta">'+dagLabel+(res.km?' · <code style="font-size:.6rem">'+res.km+'</code>':'')+'</div>'
      +'</div>'
      +'<div class="rp-pil">→</div>'
      +'</a>';
  });
  html += '</div>';
  if (alleRessurser.length > 6)
    html += '<div class="rp-mer">+' + (alleRessurser.length-6) + ' til — <a href="laerer_planlegger.html" style="color:var(--bla)">se alle</a></div>';
  el.innerHTML = html;
}

// ── HENT OG VIS PRØVEVARSLER ──────────────────────────────────────
async function visProveVarsler(klasseId) {
  var el = document.getElementById('prove-varsler');
  if (!el) return;
  var laerer2 = SkapLab.hentLaerer();
  var tok2 = laerer2 ? laerer2.access_token : null;
  if (!tok2) return;
  try {
    var tR = await SkapLab._get(
      '/tildeling?klasse_id=eq.'+klasseId+'&select=oppgave_id,frist,oppgaver(tittel,type)&order=frist.asc&limit=5',
      tok2
    );
    if (!Array.isArray(tR) || !tR.length) {
      el.innerHTML = '<div style="font-size:.78rem;color:var(--dim);padding:6px 0;">Ingen kommende prøver registrert.</div>';
      return;
    }
    var varsler = tR.filter(function(t){ return t.oppgaver && t.oppgaver.type==='provevarsel'; });
    if (!varsler.length) {
      el.innerHTML = '<div style="font-size:.78rem;color:var(--dim);padding:6px 0;">Ingen kommende prøver registrert.</div>';
      return;
    }
    el.innerHTML = varsler.map(function(v) {
      var frist = v.frist ? new Date(v.frist).toLocaleDateString('nb-NO',{weekday:'short',day:'numeric',month:'short'}) : '—';
      return '<div class="varsel-rad">'
        +'<span class="varsel-ikon">📝</span>'
        +'<div class="varsel-info"><div class="varsel-tittel">'+(v.oppgaver?v.oppgaver.tittel:'Prøve')+'</div>'
        +'<div class="varsel-dato">'+frist+'</div></div>'
        +'</div>';
    }).join('');
  } catch(e) {}
}

  try {
    var lR = await SkapLab._get('/laerere?select=id,fullt_navn,epost,er_admin,opprettet&order=opprettet.desc', token);
    if (!Array.isArray(lR) || !lR.length) {

async function slettBruker(id, epost) {
  if (id === lid) { alert('Du kan ikke slette deg selv.'); return; }
  if (!confirm('SLETT bruker «'+epost+'» permanent?\nDette sletter alle klasser, elever og data tilknyttet brukeren.')) return;
  try {
    var res = await SkapLab._rpc('slett_bruker', {p_bruker_id: id}, token);
    if (res === 'OK' || res === 'ok') {
      visAdmin(); // Oppdater listen
    } else {
      alert('Ikke tillatt eller databasefeil: '+JSON.stringify(res));
    }
  } catch(e) { alert('Feil: '+e.message); }
}

async function slettElev(id, navn) {
  if (!confirm('Slett elev «'+navn+'»? Dette sletter også all aktivitet og vurderinger.')) return;
  try {
    await SkapLab._delete('/elev_egenvurdering?elev_id=eq.'+id, token);

}

async function slettKlasse(id, navn) {
  if (!confirm('Slett klasse «'+navn+'»? Dette sletter alle elever og data i klassen.')) return;
  try {
    // Hent elever i klassen
    var eR = await SkapLab._get('/elever?klasse_id=eq.'+id+'&select=id', token);
    if (Array.isArray(eR)) {
      for (var i=0; i<eR.length; i++) {
        var eid = eR[i].id;
        await SkapLab._delete('/elev_egenvurdering?elev_id=eq.'+eid, token);
        await SkapLab._delete('/aktivitet?elev_id=eq.'+eid, token);
        await SkapLab._delete('/vurderinger?elev_id=eq.'+eid, token);
      }
      if (eR.length) {
        var ids = eR.map(function(e){return e.id;}).join(',');
        await SkapLab._delete('/elever?klasse_id=eq.'+id, token);
      }
    }
    await SkapLab._delete('/laerer_klasse?klasse_id=eq.'+id, token);
    await SkapLab._delete('/klasser?id=eq.'+id, token);
    klasser = klasser.filter(function(k){return k.id!==id;});
