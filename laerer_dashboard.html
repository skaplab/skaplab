th{font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}

tr:hover td{background:rgba(255,255,255,.02);}
.enavn{font-weight:600;cursor:pointer;color:var(--text);}

.ch-h{background:rgba(52,211,153,.2);color:var(--gron);}
.ch-m{background:rgba(251,191,36,.15);color:var(--gul);}

<script>// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      sessionStorage.setItem(SESSION_NØKKEL, JSON.stringify(elev));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = sessionStorage.getItem(SESSION_NØKKEL);
      return data ? JSON.parse(data) : null;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });
      console.log('LOGIN RESP KEYS:', JSON.stringify(Object.keys(resp||{})));
      console.log('HAS access_token:', !!resp.access_token);
      console.log('HAS error:', !!resp.error);
      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>

'use strict';

// Hent bruker-ID fra Supabase auth-objekt (støtter ulike formater)
function hentLid(sess) {
  if (!sess) return '';
  if (sess.user && sess.user.id) return sess.user.id;
  if (sess.user && sess.user.sub) return sess.user.sub;
  if (sess.id) return sess.id;
  if (sess.sub) return sess.sub;
  return '';
}

// Hjelpefunksjon for å hente epost fra Supabase Auth-objekt
function hentEpost(sess) {
  if (!sess) return '';
  // Prøv ulike steder eposten kan ligge
  if (sess.user && sess.user.email) return sess.user.email;
  if (sess.email) return sess.email;
  if (sess.user && sess.user.user_metadata && sess.user.user_metadata.email) 
    return sess.user.user_metadata.email;
  return '';
}

function hentNavn(sess) {
  if (!sess) return 'Laerer';
  if (sess.user && sess.user.user_metadata && sess.user.user_metadata.fullt_navn)
    return sess.user.user_metadata.fullt_navn;
  if (sess.user && sess.user.email) return sess.user.email;
  if (sess.email) return sess.email;
  return 'Laerer';
}

if(!SkapLab.erLaererInnlogget()){location.href='laerer_login.html';throw new Error('Ikke innlogget');}
var laerer=SkapLab.hentLaerer();
var token=laerer.access_token;

// Hent bruker-ID fra alle mulige steder i Auth-responsen
function hentLid(sess) {
  if (!sess) return '';
  // Prøv user.id først
  if (sess.user && sess.user.id) return sess.user.id;
  // Prøv direkte id
  if (sess.id) return sess.id;
  // Decode JWT og hent sub
  try {
    var parts = sess.access_token.split('.');
    if (parts.length === 3) {
      var payload = JSON.parse(atob(parts[1]));
      if (payload.sub) return payload.sub;
    }
  } catch(e) {}
  return '';
}

var lid = hentLid(laerer);

// Refresh token (støtter både JWT og nye sb_-tokens)
async function hentGyldigToken(){
  var sess=SkapLab.hentLaerer();
  if(!sess){sessionStorage.clear();location.href='laerer_login.html';return null;}
  
  // Sjekk expires_at om lagret (sekunder siden epoch)
  var utloept=false;
  if(sess.expires_at){
    utloept=(sess.expires_at*1000)<(Date.now()-30000);
  } else if(sess.access_token && sess.access_token.startsWith('eyJ')){
    // Vanlig JWT - decode og sjekk
    try{
      var p=JSON.parse(atob(sess.access_token.split('.')[1]));
      utloept=(p.exp*1000)<(Date.now()-30000);
    }catch(e){ utloept=false; }
  }
  // Nye sb_-tokens: stol på at de er gyldige inntil Supabase sier noe annet
  
  if(!utloept) return sess.access_token;
  
  // Prøv refresh
  if(!sess.refresh_token){sessionStorage.clear();location.href='laerer_login.html';return null;}
  var resp=await fetch(SkapLab.SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY},
    body:JSON.stringify({refresh_token:sess.refresh_token})
  }).then(function(r){return r.json();});
  if(resp.access_token){
    sessionStorage.setItem('skaplab_laerer',JSON.stringify(resp));
    laerer=resp; token=resp.access_token;
    lid=hentLid(resp);
    return resp.access_token;
  }
  sessionStorage.clear(); location.href='laerer_login.html'; return null;
}

  var vrd=Array.isArray(vR)?vR:[];

  s.innerHTML='<div class="side-tittel">'+(k?k.navn:'Klasse')+'</div>'
    +'<div class="side-sub">'+e2.length+' elever</div>'
    +'<div class="stats-grid">'
    +'<div class="stat"><div class="stat-t">'+e2.length+'</div><div class="stat-l">Elever</div></div>'
    +'<div class="stat"><div class="stat-t">'+vrd.length+'</div><div class="stat-l">Vurderinger</div></div>'
    +'</div>'
    +'<div class="sek-hdr"><div class="sek-tittel">Elever</div>'
    +'<button class="ny-btn" id="ny-elev-btn">+ Ny elev</button></div>'
    +'<table><thead><tr><th>Elev</th><th>Kode</th>'
    +KM.map(function(k){return '<th>'+k[1]+'</th>';}).join('')
    +'<th></th></tr></thead>'
    +'<tbody id="elev-tbody"></tbody></table>';
  var tbody=document.getElementById('elev-tbody');
  if(e2.length===0){
    tbody.innerHTML='<tr><td colspan="'+(KM.length+3)+'" style="text-align:center;padding:30px;color:var(--dim);">Ingen elever. Klikk "+ Ny elev".</td></tr>';
  }
  e2.forEach(function(elev){
    var ev=vrd.filter(function(v){return v.elev_id===elev.id;});
    var tr=document.createElement('tr');

    // Navn-celle med klikk via data-attributt
    var tdNavn=document.createElement('td');
    var span=document.createElement('span');
    span.className='enavn';
    span.textContent=elev.fullt_navn;
    span.dataset.id=elev.id;
    span.onclick=function(){apneElev(this.dataset.id);};
    tdNavn.appendChild(span);
    tr.appendChild(tdNavn);

    // Kode-celle
    var tdKode=document.createElement('td');
    var kode=document.createElement('code');
    kode.style.cssText='font-family:var(--font-m);color:var(--bla);font-size:.8rem;';
    kode.textContent=elev.innloggingskode;
    tdKode.appendChild(kode);
    tr.appendChild(tdKode);

    // KM-celler
    KM.forEach(function(km){
      var v=ev.find(function(v){return v.km_kode===km[0];});
      var td=document.createElement('td');
      var chip=document.createElement('span');
      chip.className='chip';
      if(!v){chip.className+=' ch-u';chip.textContent='-';}
      else{
        var kls=v.nivaa==='hoy'?'ch-h':v.nivaa==='middels'?'ch-m':v.nivaa==='lav'?'ch-l':'ch-u';
        var sym=v.nivaa==='hoy'?'H':v.nivaa==='middels'?'M':v.nivaa==='lav'?'L':'-';
        chip.className+=' '+kls;chip.textContent=sym;
      }
      td.appendChild(chip);tr.appendChild(td);
    });

    // Vurder-knapp
    var tdBtn=document.createElement('td');
    var btn=document.createElement('button');
    btn.textContent='Vurder';
    btn.style.cssText='padding:4px 10px;background:transparent;border:1px solid var(--border2);color:var(--dim);border-radius:6px;cursor:pointer;font-size:.74rem;';
    btn.dataset.id=elev.id;
    btn.onclick=function(){apneElev(this.dataset.id);};
    tdBtn.appendChild(btn);tr.appendChild(tdBtn);

    tbody.appendChild(tr);
  });
  // Legg til eventlistener på knappen etter at DOM er bygget
  var nyBtn = document.getElementById('ny-elev-btn');
  if (nyBtn) nyBtn.addEventListener('click', apneModal);
}

async function opprettKlasse(){
  var navn=document.getElementById('kl-navn').value.trim();
  var trinn=document.getElementById('kl-trinn').value;
  var feilEl=document.getElementById('kl-feil');
  if(!navn){feilEl.textContent='Skriv inn klassenavn.';return;}

  var btn=document.getElementById('kl-btn');
  btn.disabled=true; btn.textContent='Oppretter...';
  feilEl.textContent='';

  try{
    // Hent ferskt token
    token=await hentGyldigToken();
    if(!token) return;
    lid=(laerer.user&&laerer.user.id)||laerer.id||'';

    // Hent eller opprett skole_id
    var skoleId=null;
    var lInfo=await SkapLab._get('/laerere?id=eq.'+lid+'&select=skole_id',token);
    if(lInfo&&lInfo[0]&&lInfo[0].skole_id){
      skoleId=lInfo[0].skole_id;
    } else {
      feilEl.textContent='Lærerprofil mangler. Logg ut og inn igjen.';
      btn.disabled=false; btn.textContent='Opprett'; return;
    }

    if(!skoleId){feilEl.textContent='Feil: kunne ikke hente skole-ID.';btn.disabled=false;btn.textContent='Opprett';return;}

    // Opprett klasse
    var klasseRaw=await fetch(SkapLab.SUPABASE_URL+'/rest/v1/klasser',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY,
        'Authorization':'Bearer '+token,'Prefer':'return=representation'},
      body:JSON.stringify({navn:navn,trinn:parseInt(trinn),skole_id:skoleId})
    });
    var klasseJson=await klasseRaw.json().catch(function(){return null;});
    var nyKlasse=Array.isArray(klasseJson)?klasseJson[0]:klasseJson;

    // Godta 201 Created selv om body er tom
    if(!klasseRaw.ok && !(klasseRaw.status===201||klasseRaw.status===200)){
      feilEl.textContent='Feil ved oppretting av klasse ('+klasseRaw.status+'): '
        +(nyKlasse&&nyKlasse.message?nyKlasse.message:'ukjent feil');
      btn.disabled=false; btn.textContent='Opprett'; return;
    }

    var klasseId=nyKlasse&&nyKlasse.id;

    // Om vi ikke fikk ID i respons, hent siste klasse fra DB
    if(!klasseId){
      var siste=await SkapLab._get(
        '/klasser?navn=eq.'+encodeURIComponent(navn)+'&skole_id=eq.'+skoleId+'&order=opprettet.desc&limit=1',
        token);
      klasseId=siste&&siste[0]&&siste[0].id;
    }

    if(!klasseId){
      feilEl.textContent='Klasse ble opprettet men ID ikke funnet. Last siden på nytt.';
      btn.disabled=false; btn.textContent='Opprett'; return;
    }

    // Knytt lærer til klassen
    await fetch(SkapLab.SUPABASE_URL+'/rest/v1/laerer_klasse',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY,
        'Authorization':'Bearer '+token},
      body:JSON.stringify({laerer_id:lid,klasse_id:klasseId})
    });

    // Last alle data på nytt fra DB (ikke stol på lokal state)
    document.getElementById('kl-info').textContent='Laster klasse...';
    var kR=await SkapLab._get('/klasser?order=navn',token);
    klasser=Array.isArray(kR)?kR:[];
    var eR=await SkapLab._get('/elever?aktiv=eq.true&order=fullt_navn',token);
    elever=Array.isArray(eR)?eR:[];
    aktivKlasse=klasseId;
    byggSidebar();
    await visKlasse();
  } catch(e){
    if(e.message&&e.message.includes('PGRST301')){
      feilEl.textContent='Sesjonen er utløpt. Logg ut og inn igjen.';
    } else {
      feilEl.textContent='Teknisk feil: '+e.message;
    }
    btn.disabled=false; btn.textContent='Opprett';
  }
}

function apneModal(){
  var sel=document.getElementById('ny-klasse-sel');
  sel.innerHTML=klasser.map(function(k){return '<option value="'+k.id+'">'+k.navn+'</option>';}).join('');
  if(aktivKlasse) sel.value=aktivKlasse;
  document.getElementById('modal').classList.add('vis');
}
function lukkModal(){document.getElementById('modal').classList.remove('vis');}

var _oppretterElev = false;  // Guard mot dobbeltklikk

async function opprettElev(){
  if (_oppretterElev) return;  // Stopp om kall allerede pågår
  _oppretterElev = true;

  var navn=document.getElementById('ny-navn').value.trim();
  var klasseId=document.getElementById('ny-klasse-sel').value;
  var feil=document.getElementById('modal-feil');
  var lagreBtn=document.querySelector('.lag');

  if(!navn){feil.textContent='Skriv inn navn.';_oppretterElev=false;return;}

  // Deaktiver knappen umiddelbart
  if(lagreBtn){lagreBtn.disabled=true;lagreBtn.textContent='Legger til...';}
  feil.textContent='';

  var kode=String(Math.floor(100000+Math.random()*900000));
  var resp=await SkapLab._post('/elever',{fullt_navn:navn,klasse_id:klasseId,innloggingskode:kode},token);
  var ny=Array.isArray(resp)?resp[0]:resp;

  if(ny&&ny.id){
    elever.push(ny);
    lukkModal();
    document.getElementById('ny-navn').value='';
    alert(navn+' er lagt til.\n\nInnloggingskode: '+kode+'\n\nDel denne med eleven.');
    await visKlasse();
  }else{
    feil.textContent='Feil. Prøv igjen.';
    if(lagreBtn){lagreBtn.disabled=false;lagreBtn.textContent='Legg til';}
  }
  _oppretterElev=false;
}

function apneElev(id){sessionStorage.setItem('skaplab_valgt_elev',id);location.href='elev_detalj.html';}
function loggUt(){sessionStorage.clear();location.href='laerer_login.html';}



















async function visTildel(){
  document.querySelectorAll('[id^=side-]').forEach(function(e){e.style.display='none';});
  document.getElementById('side-tildel').style.display='block';
  
  // Hent alle oppgaver
  var oppgResp = await fetch(SkapLab.SUPABASE_URL+'/rest/v1/oppgaver?order=fag,tittel&select=id,tittel,type,ressurs,url,km_kode,fag',
    {headers:{'apikey':SkapLab.SUPABASE_KEY,'Authorization':'Bearer '+token}}).then(function(r){return r.json();}).catch(function(){return [];});
  var oppgaver = Array.isArray(oppgResp) ? oppgResp : [];

  var fagGrupper = {};
  oppgaver.forEach(function(o){
    if(!fagGrupper[o.fag]) fagGrupper[o.fag]=[];
    fagGrupper[o.fag].push(o);
  });

  var elevListe = elever.filter(function(e){return e.klasse_id===aktivKlasse;});
  var klasse = klasser.find(function(k){return k.id===aktivKlasse;});

  var s = document.getElementById('side-tildel');
  s.innerHTML = '<div class="side-tittel">Tildel oppgave</div>'
    +'<div style="max-width:600px;">'
    +'<div class="fr"><label>Til hvem</label>'
    +'<select id="til-hvem"><option value="klasse">Hele klassen ('+(klasse?klasse.navn:'')+')</option>'
    +elevListe.map(function(e){return '<option value="'+e.id+'">'+e.fullt_navn+'</option>';}).join('')
    +'</select></div>'
    +'<div class="fr"><label>Frist (valgfritt)</label>'
    +'<input type="date" id="til-frist"></div>'
    +'<div class="fr"><label>Velg oppgave</label></div>'
    +'<div id="oppg-fag-grid" style="display:flex;flex-direction:column;gap:16px;">';
  
  Object.keys(fagGrupper).forEach(function(fag){
    var feil_ikon = fag==='Matematikk'?'📐':fag==='Naturfag'?'🔬':'💻';
    s.innerHTML += '<div><div style="font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:8px;">'+feil_ikon+' '+fag+'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:8px;">'
      +fagGrupper[fag].map(function(o){
        var typeIkon=o.type==='spill'?'🎮':o.type==='flashcard'?'🃏':'📖';
        return '<button class="oppg-pill" data-id="'+o.id+'" onclick="velgOppgave(this)" '
          +'style="padding:7px 13px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:.8rem;transition:all .15s;">'
          +typeIkon+' '+o.tittel+'</button>';
      }).join('')
      +'</div></div>';
  });

  s.innerHTML += '</div>'
    +'<div id="valgt-oppg" style="margin-top:16px;font-size:.82rem;color:var(--bla);min-height:20px;"></div>'
    +'<button class="ny-btn" id="tildel-btn" onclick="bekreftTildel()" style="margin-top:12px;" disabled>Tildel oppgave</button>'
    +'<div id="tildel-feil" style="color:var(--rod);font-size:.8rem;margin-top:8px;"></div>'
    +'</div>';
}

var _valgtOppgaveId = null;
function velgOppgave(el){
  document.querySelectorAll('.oppg-pill').forEach(function(b){
    b.style.background='transparent';b.style.borderColor='var(--border2)';b.style.color='var(--text)';
  });
  el.style.background='rgba(96,165,250,.15)';
  el.style.borderColor='var(--bla)';
  el.style.color='var(--bla)';
  _valgtOppgaveId = el.dataset.id;
  document.getElementById('valgt-oppg').textContent='Valgt: '+el.textContent;
  document.getElementById('tildel-btn').disabled=false;
}

async function bekreftTildel(){
  if(!_valgtOppgaveId) return;
  var tilHvem = document.getElementById('til-hvem').value;
  var frist = document.getElementById('til-frist').value || null;
  var feilEl = document.getElementById('tildel-feil');
  feilEl.textContent='';

  var data = {oppgave_id: _valgtOppgaveId, laerer_id: lid};
  if(tilHvem === 'klasse'){
    data.klasse_id = aktivKlasse;
  } else {
    data.elev_id = tilHvem;
  }
  if(frist) data.frist = frist;

  var resp = await fetch(SkapLab.SUPABASE_URL+'/rest/v1/tildeling',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SkapLab.SUPABASE_KEY,
      'Authorization':'Bearer '+token,'Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });

  if(resp.ok){
    feilEl.style.color='var(--gron)';
    feilEl.textContent='Oppgave tildelt!';
    setTimeout(function(){feilEl.textContent='';},3000);
  } else {
    feilEl.style.color='var(--rod)';
    feilEl.textContent='Feil ved tildeling. Prøv igjen.';
  }
}

</script>
