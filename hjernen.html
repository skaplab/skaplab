<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Hjernen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080610;--surface:#0e0c18;--border:rgba(255,255,255,.07);
  --text:#e8eaf0;--dim:#5a6070;--accent:#c4b5fd;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(196,181,253,.03) 0%,transparent 65%),
             radial-gradient(ellipse 40% 50% at 80% 10%,rgba(251,191,36,.012) 0%,transparent 55%);}
nav{position:sticky;top:0;z-index:300;background:rgba(8,6,16,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:12px;}
.nav-lnk{font-size:.82rem;font-weight:500;color:var(--dim);text-decoration:none;letter-spacing:.02em}
.nav-lnk:hover{color:var(--text)}.nav-sep{color:var(--border)}
.nav-tittel{font-family:var(--font-d);font-size:.9rem;color:var(--accent)}
.layout{position:relative;z-index:1;display:grid;grid-template-columns:220px 1fr 220px;
  grid-template-rows:auto 1fr;max-width:1300px;margin:0 auto;padding:0 16px 60px;gap:0 20px;}
.header{grid-column:1/-1;text-align:center;padding:32px 20px 20px;}
.header h1{font-family:var(--font-d);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:700;letter-spacing:-.02em;margin-bottom:6px;}
.header h1 em{font-style:italic;color:var(--accent)}
.header-sub{font-size:.85rem;color:var(--dim);letter-spacing:.03em}
.side-panel{padding:16px 0;display:flex;flex-direction:column;gap:7px;align-self:start;position:sticky;top:65px;}
.side-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:8px 4px 4px;font-weight:600}
.organ-knapp{font-family:var(--font-b);font-size:.78rem;font-weight:500;padding:8px 12px;border-radius:10px;
  border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--dim);cursor:pointer;text-align:left;
  transition:all .2s;letter-spacing:.01em;display:flex;align-items:center;gap:8px;}
.organ-knapp:hover{border-color:rgba(196,181,253,.3);color:var(--text);background:rgba(196,181,253,.04)}
.organ-knapp.aktiv{border-color:var(--farge,var(--accent));color:var(--farge,var(--accent));background:rgba(196,181,253,.06);}
.organ-knapp .dot{width:7px;height:7px;border-radius:50%;background:var(--farge,var(--accent));flex-shrink:0;opacity:.65}
.organ-knapp.aktiv .dot{opacity:1;box-shadow:0 0 6px var(--farge,var(--accent))}
.senter{display:flex;flex-direction:column;align-items:center;gap:16px}
.svg-wrap{position:relative;width:100%;max-width:580px}
.hjerne-svg{width:100%;height:auto;display:block}
.info-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:24px;width:100%;max-width:580px;min-height:160px;position:relative;overflow:hidden;transition:all .3s;}
.info-panel::before{content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,var(--pglow,rgba(196,181,253,.04)),transparent);pointer-events:none;}
.info-tom{display:flex;align-items:center;justify-content:center;height:120px;color:var(--dim);font-size:.85rem;letter-spacing:.04em;text-transform:uppercase;}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.info-emoji{font-size:2rem;line-height:1}
.info-navn{font-family:var(--font-d);font-size:1.35rem;font-weight:700;color:var(--organ-farge,var(--accent))}
.info-latin{font-size:.78rem;color:var(--dim);font-style:italic;margin-top:1px}
.info-divider{height:1px;background:var(--border);margin:0 0 14px}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.info-kort{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.info-kort-label{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.info-kort-verdi{font-size:.8rem;font-weight:500;color:var(--text);line-height:1.4}
.info-tekst{font-size:.83rem;line-height:1.7;color:rgba(232,234,240,.8)}
.info-fakta{margin-top:12px;padding:10px 13px;background:rgba(255,255,255,.02);
  border-left:3px solid var(--organ-farge,var(--accent));border-radius:0 8px 8px 0;font-size:.8rem;line-height:1.6;color:var(--dim);}
.hotspot{cursor:pointer;transition:all .2s}
.hotspot:hover .hf{filter:brightness(1.35) saturate(1.2);}
.hotspot.aktiv .hf{filter:brightness(1.55) saturate(1.4);}
.el{stroke:rgba(255,255,255,.12);stroke-width:.8;stroke-dasharray:3 4;fill:none}
.et{font-family:'DM Sans',sans-serif;font-size:10px;fill:rgba(255,255,255,.3);font-weight:500}
.et.hl{fill:rgba(255,255,255,.85)}
.tooltip{position:absolute;background:rgba(8,6,16,.95);border:1px solid rgba(255,255,255,.1);border-radius:8px;
  padding:5px 10px;font-size:.75rem;color:var(--text);pointer-events:none;white-space:nowrap;
  transform:translate(-50%,-100%) translateY(-8px);transition:opacity .15s;z-index:10;}
@keyframes pulser{0%,100%{opacity:.6}50%{opacity:1}}
.ar{animation:pulser 2.2s ease-in-out infinite}
@media(max-width:960px){
  .layout{grid-template-columns:1fr}
  .side-panel{flex-direction:row;flex-wrap:wrap;position:static;padding:0 0 8px}
  .organ-knapp{font-size:.72rem;padding:6px 10px}.side-label{display:none}
  .info-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<script>
const DATA={
  pannelob:{navn:'Pannelappen',latin:'Lobus frontalis',emoji:'🧩',farge:'#f87171',
    fakta:[{label:'Størrelse',verdi:'~25% av cortex'},{label:'Modning',verdi:'Ferdig ~25 år'},{label:'Motorisk cortex',verdi:'Bakkant av lappen'},{label:'Unikt',verdi:'Størst hos mennesker'}],
    tekst:'Pannelappen er hjernens "leder" og sitter rett bak pannen. Den styrer planlegging, beslutningstaking, impulskontroll, personlighet og arbeidsminne. Motorisk cortex i bakkant av pannelappen styrer alle frivillige bevegelser. Brocas område (venstre side) er avgjørende for taleproduksjon – skade her gir ekspressiv afasi.',
    morsomt:'En tenårings pannelapp er ikke ferdig utviklet – det forklarer mange av de impulsive valgene man tar som ung!'},
  isselob:{navn:'Isselappen',latin:'Lobus parietalis',emoji:'🖐️',farge:'#fb923c',
    fakta:[{label:'Plassering',verdi:'Øverst/midtre'},{label:'Primær funksjon',verdi:'Sanseprosessering'},{label:'Spesialitet',verdi:'Romlig orientering'},{label:'Størrelse',verdi:'~19% av cortex'}],
    tekst:'Isselappen behandler sanseinformasjon fra kroppen – berøring, temperatur, smerte og propriosepsjon (kroppens posisjon i rommet). Somatosensorisk cortex er organisert som et "homunculus"-kart over kroppen. Isselappen integrerer sanser og er viktig for matematikk, lesing og romlig forståelse.',
    morsomt:'I somatosensorisk cortex tar hender, lepper og tunge enormt mye mer plass enn ryggen – de er langt mer følsomme!'},
  tinninglob:{navn:'Tinninglappen',latin:'Lobus temporalis',emoji:'👂',farge:'#facc15',
    fakta:[{label:'Plassering',verdi:'Sidene av hjernen'},{label:'Hørsel',verdi:'Primær auditiv cortex her'},{label:'Wernickes område',verdi:'Venstre tinninglapp'},{label:'Ansiktsgjenkj.',verdi:'Fusiform gyrus'}],
    tekst:'Tinninglappen prosesserer lyd og er ansvarlig for språkforståelse via Wernickes område. Den er tett knyttet til hukommelse (hippocampus ligger inne i tinninglappen) og ansiktsgjenkjenning. Skade kan gi problemer med å forstå talespråk (Wernickes afasi) eller gjenkjenne ansikter (prosopagnosi).',
    morsomt:'Deja vu – følelsen av å ha opplevd noe før – skyldes sannsynligvis kortvarige feilavlesninger i tinninglappen!'},
  nakkelob:{navn:'Nakkelappen',latin:'Lobus occipitalis',emoji:'👁️',farge:'#4ade80',
    fakta:[{label:'Plassering',verdi:'Bak i hodet'},{label:'Dedikert til',verdi:'100% synsbehandling'},{label:'Visuelle kart',verdi:'V1–V5'},{label:'Størrelse',verdi:'~12% av cortex'}],
    tekst:'Nakkelappen er hjernens visuelle senter, nesten utelukkende dedikert til å tolke synsinntrykk. Primær visuell cortex (V1) mottar rådata fra øynene via synsnerven og behandler kanter, kontraster og bevegelse. Videre prosessering skjer i V2–V5. Skade kan gi synsfeltutfall eller visuelle illusjoner selv med helt friske øyne.',
    morsomt:'Selv med lukkede øyne bruker hjernen nakkelappen aktivt under drømmer – du "ser" ting som ikke er der!'},
  lillehjerne:{navn:'Lillehjerne',latin:'Cerebellum',emoji:'🎯',farge:'#a78bfa',
    fakta:[{label:'Nevroner',verdi:'~69 mrd (80% av alle!)'},{label:'Vekt',verdi:'~150 g (10%)'},{label:'Deler',verdi:'To halvkuler + vermis'},{label:'Innganger',verdi:'40× flere enn utganger'}],
    tekst:'Lillehjernen koordinerer bevegelser, balanse og finmotorikk. Den mottar sanseinformasjon fra muskler, ledd og likevektsorganet og justerer motoriske kommandoer for å gjøre bevegelser glatte og presise. Uten lillehjernen ville man ikke klare å gå, skrive eller drikke av et glass. Nyere forskning viser at den også bidrar til kognisjon og læring.',
    morsomt:'Lillehjernen rommer 80% av alle hjernens nevroner – i kun 10% av volumet. Den er ekstremt tett pakket!'},
  hjernestamme:{navn:'Hjernestamme',latin:'Truncus cerebri',emoji:'🔋',farge:'#60a5fa',
    fakta:[{label:'Deler',verdi:'Mellomhjernen, pons, medulla'},{label:'Lengde',verdi:'~8 cm'},{label:'Inneholder',verdi:'10 av 12 hjernenerver'},{label:'Evolusjonsalder',verdi:'Den eldste hjernedelen'}],
    tekst:'Hjernestammen er den mest livsviktige delen av hjernen. Den styrer automatiske funksjoner som pust, hjerteslag, blodtrykk og søvn/våken-syklus – totalt uavhengig av bevisst kontroll. Den fungerer som "motorvei" mellom hjernen og ryggmargen. Skade på hjernestammen er oftest livstruende.',
    morsomt:'Hjernestammen er den eldste hjernedelen evolusjonsmessig – fisker, reptiler og alle pattedyr deler denne strukturen med oss!'},
  corpus:{navn:'Corpus callosum',latin:'Corpus callosum',emoji:'🌉',farge:'#e2e8f0',
    fakta:[{label:'Nervefibrer',verdi:'200–250 millioner'},{label:'Lengde',verdi:'~10 cm'},{label:'Funksjon',verdi:'Binder venstre og høyre'},{label:'Ferdig myelinisert',verdi:'~25 år'}],
    tekst:'Corpus callosum er hjernens største hvite substansstruktur – en tykk bunt med opp mot 250 millioner nervefibrer som kobler venstre og høyre hjernehalvdel. Den muliggjør koordinasjon mellom halvdelene slik at de jobber som én enhet. Uten den ville høyre og venstre hjerne ikke kommunisere effektivt.',
    morsomt:'Pasienter der corpus callosum er skåret over ("split-brain") kan ha to halvdeler som handler uavhengig – venstre hånd vet bokstavelig talt ikke hva høyre gjør!'},
  thalamus:{navn:'Thalamus',latin:'Thalamus',emoji:'🔀',farge:'#c084fc',
    fakta:[{label:'Plassering',verdi:'Senter av hjernen'},{label:'Form',verdi:'To egg-formede kjerner'},{label:'Rolle',verdi:'Sansenes reléstasjon'},{label:'Unntak',verdi:'Luktesansen bypasser'}],
    tekst:'Thalamus er hjernens sentralbord – nesten all sanseinformasjon (unntatt lukt) passerer gjennom thalamus på vei til hjernebarken. Den sorterer, filtrerer og videresender signaler til riktige hjerneregioner. Thalamus spiller også en viktig rolle i bevissthet, søvn og oppmerksomhet. Under generell anestesi er thalamus blant de første strukturene som "slås av".',
    morsomt:'Luktesansen er den eneste sansen som har direkte tilgang til hjernebarken – uten å stoppe innom thalamus. Derfor kan lukter utløse sterke minner øyeblikkelig!'},
  hippocampus:{navn:'Hippocampus',latin:'Hippocampus',emoji:'🐎',farge:'#f472b6',
    fakta:[{label:'Navn betyr',verdi:'Sjøhest (gresk)'},{label:'Plassering',verdi:'Inne i tinninglappen'},{label:'Funksjon',verdi:'Ny minnedannelse'},{label:'Neurogenese',verdi:'Et av få steder nye nerveceller dannes'},],
    tekst:'Hippocampus er avgjørende for å danne nye minner – spesielt episodiske minner (hva du har opplevd) og romlig navigasjon. Den konverterer korttidsminne til langtidsminne og lagrer det i hjernebarken. Pasienten H.M., som fikk fjernet begge hippocampus i 1953, kunne aldri danne nye minner igjen – et berømt tilfelle i nevrovitenskapen.',
    morsomt:'London-drosjesjåfører som må huske tusenvis av gater har en målbart større hippocampus enn folk flest – den vokser av trening!'},
  amygdala:{navn:'Amygdala',latin:'Corpus amygdaloideum',emoji:'😨',farge:'#ff6b9d',
    fakta:[{label:'Navn betyr',verdi:'Mandelkjerne (gresk)'},{label:'Størrelse',verdi:'~1,5 cm'},{label:'Primær rolle',verdi:'Frykt og emosjon'},{label:'Kobling',verdi:'Tett til hippocampus'}],
    tekst:'Amygdala er hjernens emosjonelle alarmsentral. Den gjenkjenner fare og utløser "fight or flight"-responsen via hypothalamus og stresshormonet kortisol. Den kobler emosjoner til minner og påvirker oppmerksomhet og sosial atferd. Angstlidelser er ofte knyttet til overaktiv amygdala.',
    morsomt:'Traumatiske minner er ekstra sterke fordi amygdala "stemplet" dem som viktige – det er et overlevelsesinstinkt fra evolusjonen!'},
};

let aktiv=null;
function velg(id){
  aktiv=id;const d=DATA[id];if(!d)return;
  document.querySelectorAll('.organ-knapp').forEach(b=>{b.classList.toggle('aktiv',b.getAttribute('onclick')?.includes("'"+id+"'"))});
  document.querySelectorAll('.hotspot').forEach(g=>{g.classList.toggle('aktiv',g.dataset.id===id)});
  const pos={
    pannelob:{cx:140,cy:162,rx:58,ry:74},
    isselob:{cx:274,cy:112,rx:84,ry:66},
    tinninglob:{cx:158,cy:264,rx:70,ry:66},
    nakkelob:{cx:382,cy:198,rx:62,ry:84},
    lillehjerne:{cx:340,cy:375,rx:82,ry:54},
    hjernestamme:{cx:244,cy:380,rx:28,ry:40},
    corpus:{cx:274,cy:186,rx:98,ry:15},
    thalamus:{cx:278,cy:238,rx:42,ry:33},
    hippocampus:{cx:232,cy:314,rx:32,ry:28},
    amygdala:{cx:202,cy:270,rx:24,ry:22},
  };
  const p=pos[id]||{cx:280,cy:210,rx:44,ry:34};
  const ring=document.getElementById('aktiv-ring');
  ring.setAttribute('cx',p.cx);ring.setAttribute('cy',p.cy);ring.setAttribute('rx',p.rx);ring.setAttribute('ry',p.ry);
  ring.setAttribute('stroke',d.farge);ring.setAttribute('opacity','0.55');
  const at=ring.querySelector('animateTransform');
  at.setAttribute('from','0 '+p.cx+' '+p.cy);at.setAttribute('to','360 '+p.cx+' '+p.cy);
  document.querySelectorAll('.et').forEach(t=>t.classList.remove('hl'));
  const et=document.getElementById('et-'+id);if(et)et.classList.add('hl');
  document.getElementById('info-tom').style.display='none';
  document.getElementById('info-innhold').style.display='block';
  document.getElementById('info-panel').style.setProperty('--pglow',d.farge+'18');
  document.getElementById('info-panel').style.setProperty('--organ-farge',d.farge);
  document.getElementById('info-innhold').innerHTML=
    '<div class="info-header"><span class="info-emoji">'+d.emoji+'</span><div><div class="info-navn">'+d.navn+'</div><div class="info-latin">'+d.latin+'</div></div></div>'+
    '<div class="info-divider"></div>'+
    '<div class="info-grid">'+d.fakta.map(f=>'<div class="info-kort"><div class="info-kort-label">'+f.label+'</div><div class="info-kort-verdi">'+f.verdi+'</div></div>').join('')+'</div>'+
    '<p class="info-tekst">'+d.tekst+'</p>'+
    '<div class="info-fakta">💡 <strong>Visste du?</strong> '+d.morsomt+'</div>';
  if(window.innerWidth<960)document.getElementById('info-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}
document.querySelectorAll('.hotspot').forEach(el=>{
  const id=el.dataset.id;if(!id)return;const d=DATA[id];if(!d)return;
  const tt=document.getElementById('tooltip');
  el.addEventListener('mouseenter',()=>{tt.textContent=d.navn;tt.style.opacity='1';});
  el.addEventListener('mousemove',e=>{const r=document.getElementById('svg-wrap').getBoundingClientRect();tt.style.left=(e.clientX-r.left)+'px';tt.style.top=(e.clientY-r.top)+'px';});
  el.addEventListener('mouseleave',()=>{tt.style.opacity='0';});
});
velg('pannelob');
</script>
