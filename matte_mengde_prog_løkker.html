<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Mengdetrening: Løkker og betingelser i matte</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f1a;--surface:#13152a;--card:#181b2e;--border:rgba(139,92,246,.12);--text:#eef0ff;--dim:rgba(238,240,255,.38);--accent:#a78bfa;--accent2:#38bdf8;--accent3:#34d399;--warn:#fbbf24;--correct:#10b981;--wrong:#ef4444;--font-d:'Lora',serif;--font-b:'DM Sans',sans-serif;}
html{height:100%}body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(139,92,246,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.025) 1px,transparent 1px);background-size:32px 32px;}
nav{position:sticky;top:0;z-index:500;background:rgba(13,15,26,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;}
.nav-lnk{font-size:.8rem;color:var(--dim);text-decoration:none}.nav-lnk:hover{color:var(--text)}.nav-sep{color:rgba(255,255,255,.12)}
.nav-tittel{font-family:var(--font-d);font-size:.88rem;color:var(--accent2)}
.nav-bk{margin-left:auto;padding:5px 12px;border-radius:8px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);color:var(--accent);font-size:.78rem;text-decoration:none;transition:all .18s;}
.nav-bk:hover{background:rgba(167,139,250,.2)}
.wrapper{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:28px 20px 80px;}
.stats-rad{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat-boks{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;text-align:center;}
.stat-tall{font-family:var(--font-d);font-size:1.6rem;font-weight:600;line-height:1;margin-bottom:3px}
.stat-tall.sc{color:var(--accent)}.stat-tall.ri{color:var(--accent3)}.stat-tall.st{color:var(--warn)}.stat-tall.to{color:var(--accent2)}
.stat-label{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.vr{display:flex;gap:8px;margin-bottom:20px;}
.vb{padding:7px 16px;border-radius:20px;font-size:.78rem;font-weight:600;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer;transition:all .18s;}
.vb.ak.en{border-color:var(--accent3);color:var(--accent3);background:rgba(52,211,153,.1)}
.vb.ak.mi{border-color:var(--warn);color:var(--warn);background:rgba(251,191,36,.08)}
.vb.ak.va{border-color:var(--wrong);color:var(--wrong);background:rgba(239,68,68,.08)}
.fp-wrap{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:20px;}
.fp{width:10px;height:10px;border-radius:3px;background:rgba(255,255,255,.07);transition:all .3s}
.fp.rfp{background:var(--correct)}.fp.ffp{background:var(--wrong)}.fp.afp{background:var(--accent);animation:puls .8s ease-in-out infinite}
@keyframes puls{0%,100%{opacity:1}50%{opacity:.4}}
.opp-kort{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 28px 24px;margin-bottom:16px;min-height:200px;position:relative;transition:border-color .3s;}
.opp-kort::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(139,92,246,.04),transparent);pointer-events:none;border-radius:20px;}
.opp-kort.rk{border-color:rgba(52,211,153,.35)}.opp-kort.fk{border-color:rgba(239,68,68,.3)}
.opp-nr-rad{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.type-badge{font-size:.62rem;padding:2px 8px;border-radius:8px;background:rgba(139,92,246,.1);color:var(--accent);border:1px solid rgba(139,92,246,.15);}
.sporsmal{font-family:var(--font-d);font-size:1.12rem;line-height:1.65;color:var(--text);margin-bottom:22px;}
.sporsmal .hl{color:var(--warn);font-weight:600}
.svar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.svar-prefix{font-family:var(--font-d);font-size:1.05rem;color:var(--dim);white-space:nowrap}
.svar-input{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.14);border-radius:10px;padding:10px 16px;font-family:var(--font-b);font-size:1rem;color:var(--text);width:160px;transition:border .2s;outline:none;}
.svar-input:focus{border-color:var(--accent)}.svar-input.ri{border-color:var(--correct);background:rgba(16,185,129,.08)}.svar-input.fe{border-color:var(--wrong);background:rgba(239,68,68,.07)}
.flervalg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.fv{padding:12px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--dim);font-family:var(--font-b);font-size:.9rem;cursor:pointer;text-align:left;transition:all .18s;}
.fv:hover:not(:disabled){border-color:rgba(139,92,246,.3);color:var(--text)}.fv.vl{border-color:var(--accent);background:rgba(139,92,246,.1);color:var(--accent)}
.fv.rv{border-color:var(--correct)!important;background:rgba(16,185,129,.1)!important;color:#6ee7b7!important}
.fv.fv2{border-color:var(--wrong)!important;background:rgba(239,68,68,.08)!important;color:#fca5a5!important}
.btn-rad{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sjekk{padding:11px 24px;border-radius:10px;background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(56,189,248,.15));border:1px solid rgba(139,92,246,.3);color:var(--text);font-family:var(--font-b);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;}
.sjekk:hover:not(:disabled){transform:translateY(-1px)}.sjekk:disabled{opacity:.35;cursor:default;transform:none}
.neste-b{padding:11px 24px;border-radius:10px;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.25);color:var(--accent3);font-family:var(--font-b);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:none;}
.neste-b.vis{display:flex;align-items:center;gap:6px}.neste-b:hover{background:rgba(52,211,153,.22)}
.fb{display:none;margin-top:14px}.fb.vis{display:block;animation:fi .25s}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fb-boks{padding:14px 18px;border-radius:12px;font-size:.88rem;line-height:1.65;}
.fb-boks.ri{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.fb-boks.fe{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:#fca5a5}
.steg{margin-top:10px;padding:12px 14px;background:rgba(255,255,255,.03);border-radius:8px;font-size:.82rem;line-height:1.75;color:rgba(238,240,255,.65);}
.steg strong{color:var(--text)}
.start-ov{position:fixed;inset:0;z-index:900;background:rgba(13,15,26,.97);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;}
.sk{background:var(--card);border:1px solid rgba(139,92,246,.2);border-radius:24px;padding:36px 40px;max-width:440px;width:90%;text-align:center;}
.sk h1{font-family:var(--font-d);font-size:1.6rem;color:var(--accent);margin-bottom:8px}
.sk p{font-size:.88rem;color:var(--dim);line-height:1.7;margin-bottom:24px}
.start-knapp{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(56,189,248,.2));border:1px solid rgba(139,92,246,.3);color:var(--text);font-family:var(--font-b);font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;}
.start-knapp:hover{transform:translateY(-2px)}
.slutt-ov{position:fixed;inset:0;z-index:900;background:rgba(13,15,26,.97);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;}
.slutt-ov.vis{display:flex}
.slk{background:var(--card);border:1px solid rgba(52,211,153,.2);border-radius:24px;padding:36px 40px;max-width:440px;width:90%;text-align:center;}
.slk .e{font-size:3rem;margin-bottom:12px}.slk .t{font-family:var(--font-d);font-size:1.5rem;color:var(--accent3);margin-bottom:8px}
.slk .s{font-size:.88rem;color:var(--dim);line-height:1.8;margin-bottom:20px}.slk .s strong{color:var(--text)}
.slk-knapper{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-r{padding:12px 22px;border-radius:10px;background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(56,189,248,.2));border:1px solid rgba(139,92,246,.3);color:var(--text);font-family:var(--font-b);font-size:.9rem;font-weight:600;cursor:pointer;}
.btn-t{padding:12px 22px;border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--dim);font-family:var(--font-b);font-size:.9rem;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-t:hover{border-color:rgba(139,92,246,.3);color:var(--text)}
@media(max-width:560px){.stats-rad{grid-template-columns:1fr 1fr}.flervalg{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="start-ov" id="startOv">
<div class="sk">
<div style="font-size:2.5rem;margin-bottom:14px">⚡</div>
<h1>Mengdetrening</h1>
<p><strong>Løkker og betingelser i matte</strong><br>
Øv med varierte oppgaver. Velg vanskelighetsgrad og se løsningssteg ved feil.</p>
<div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px">
<button class="vb en" id="sv1" onclick="settV(1,this)">🟢 Enkel</button>
<button class="vb" id="sv2" onclick="settV(2,this)">🟡 Middels</button>
<button class="vb" id="sv3" onclick="settV(3,this)">🔴 Vanskelig</button>
</div>
<button class="start-knapp" onclick="startOkt()">Start økt →</button>
</div>
</div>

<div class="slutt-ov" id="sluttOv">
<div class="slk">
<div class="e" id="slE">🏆</div>
<div class="t" id="slT">Ferdig!</div>
<div class="s" id="slS"></div>
<div class="slk-knapper">
<button class="btn-r" onclick="startOkt()">Ny økt</button>
<a class="btn-t" href="matte_prog_løkker.html">← Tilbake til teori</a>
</div>
</div>
</div>

<nav>
<a href="matte_hub.html" class="nav-lnk">📐 Matematikk</a>
<span class="nav-sep">/</span>
<a href="matte_prog_løkker.html" class="nav-lnk">Løkker og betingelser i matte</a>
<span class="nav-sep">/</span>
<span class="nav-tittel">⚡ Mengdetrening</span>
<a href="matte_prog_løkker.html" class="nav-bk">← Teori</a>
</nav>

<div class="wrapper">
<div class="vr" id="vr">
<button class="vb" id="vr1" onclick="byttV(1)">🟢 Enkel</button>
<button class="vb" id="vr2" onclick="byttV(2)">🟡 Middels</button>
<button class="vb" id="vr3" onclick="byttV(3)">🔴 Vanskelig</button>
</div>
<div class="stats-rad">
<div class="stat-boks"><div class="stat-tall sc" id="stP">0</div><div class="stat-label">Poeng</div></div>
<div class="stat-boks"><div class="stat-tall ri" id="stR">0</div><div class="stat-label">Riktige</div></div>
<div class="stat-boks"><div class="stat-tall st" id="stS">0</div><div class="stat-label">Streak 🔥</div></div>
<div class="stat-boks"><div class="stat-tall to" id="stT">0/10</div><div class="stat-label">Oppgaver</div></div>
</div>
<div class="fp-wrap" id="fpW"></div>

<div class="opp-kort" id="oppKort">
<div class="opp-nr-rad">
<span id="oppNr">Oppgave 1 av 10</span>
<span class="type-badge" id="oppType">–</span>
</div>
<p class="sporsmal" id="spm">Laster…</p>
<div id="svarOmr"></div>
<div class="btn-rad">
<button class="sjekk" id="sjekk" disabled>Sjekk svar</button>
<button class="neste-b" id="nesteB" onclick="nesteOpp()">Neste →</button>
</div>
<div class="fb" id="fb"></div>
</div>
</div>

<script>
var vanskel=1,OKT=10,akt=0,poeng=0,riktige=0,streak=0,maxStreak=0,tot=0,svart=false,fp=[],naa=null;


function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndNul(a,b){var v;do{v=rnd(a,b);}while(v===0);return v;}
function bland(a){return a.slice().sort(function(){return Math.random()-.5;});}
function fmt(n){if(Number.isInteger(n))return String(n);return n.toFixed(2).replace('.',',');}
function fmtBrok(t,n){if(n===1)return String(t);return t+'/'+n;}

function lagOppgave(){
  var typer=['range_output','range_sum','while_output','kode_lese'];
  var type=typer[rnd(0,vanskel===1?1:3)];
  if(type==='range_output'){
    var start=rnd(0,3),stopp=start+rnd(3,7),steg=rnd(0,1)?1:rnd(1,3);
    var utfall=[];for(var i=start;i<stopp;i+=steg)utfall.push(i);
    var siste=utfall[utfall.length-1];
    return{type:'range() output',input:'tall',
      spm:'Python: <code>for i in range('+start+', '+stopp+(steg>1?', '+steg:'')+'):</code><br>Hva er det siste tallet som skrives ut?',
      prefix:'=',fasit:siste,steg:'range gir: '+utfall.join(', ')+'. Sist: <strong>'+siste+'</strong>'};
  } else if(type==='range_sum'){
    var a=rnd(1,5),b=a+rnd(3,8);
    var sum=0;for(var i=a;i<=b;i++)sum+=i;
    return{type:'Sum med løkke',input:'tall',
      spm:'<code>sum=0; for i in range('+a+', '+(b+1)+'): sum+=i</code><br>Hva er sum til slutt?',
      prefix:'sum =',fasit:sum,steg:'Legger sammen '+a+'+...+'+b+' = <strong>'+sum+'</strong>'};
  } else if(type==='while_output'){
    var start2=rnd(1,3),grense=start2+rnd(2,5),steg2=rnd(1,2);
    var ant=Math.floor((grense-start2)/steg2)+(((grense-start2)%steg2===0)?1:0);
    return{type:'While-løkke',input:'tall',
      spm:'<code>i='+start2+'; while i<='+grense+': print(i); i+='+steg2+'</code><br>Hvor mange tall skrives ut?',
      prefix:'=',fasit:ant,steg:'Verdier: '+start2+' til '+grense+' med steg '+steg2+' → <strong>'+ant+' tall</strong>'};
  } else {
    var tall=rnd(2,5),fak=1;for(var i=1;i<=tall;i++)fak*=i;
    return{type:'Hva beregnes?',input:'flervalg',
      spm:'<code>res=1; for i in range(1,'+( tall+1)+'): res*=i</code><br>Hva beregnes?',
      valg:bland([tall+'! = '+fak,'Sum 1 til '+tall,''+tall+'^2 = '+tall*tall,''+(tall*2)]),
      fasit:tall+'! = '+fak,steg:tall+'! = <strong>'+fak+'</strong>'};
  }
}

function startOkt(){
  document.getElementById('startOv').style.display='none';
  document.getElementById('sluttOv').classList.remove('vis');
  akt=0;poeng=0;riktige=0;streak=0;maxStreak=0;tot=0;fp=[];svart=false;
  oppdaterVUI();oppdaterStats();byggFP();nesteOpp();
}
function nesteOpp(){
  if(akt>=OKT){visSlutt();return;}
  svart=false;naa=lagOppgave();renderOpp(naa);oppdaterFP();
}
function renderOpp(o){
  var k=document.getElementById('oppKort');k.className='opp-kort';
  document.getElementById('oppNr').textContent='Oppgave '+(akt+1)+' av '+OKT;
  document.getElementById('oppType').textContent=o.type||'–';
  document.getElementById('spm').innerHTML=o.spm;
  document.getElementById('fb').className='fb';
  document.getElementById('nesteB').className='neste-b';
  var sr=document.getElementById('svarOmr');sr.innerHTML='';
  if(o.input==='tall'){
    var w=document.createElement('div');w.className='svar-wrap';
    w.innerHTML='<span class="svar-prefix">'+(o.prefix||'=')+'</span><input class="svar-input" id="sI" type="text" placeholder="?" autocomplete="off">';
    sr.appendChild(w);
    document.getElementById('sjekk').disabled=false;
    document.getElementById('sjekk').onclick=function(){sjekkTall();};
    setTimeout(function(){var i=document.getElementById('sI');if(i){i.focus();i.onkeydown=function(e){if(e.key==='Enter'&&!svart)sjekkTall();};};},80);
  } else if(o.input==='flervalg'){
    var g=document.createElement('div');g.className='flervalg';g.id='fvG';
    o.valg.forEach(function(v){
      var b=document.createElement('button');b.className='fv';b.textContent=v;
      b.onclick=function(){g.querySelectorAll('.fv').forEach(function(x){x.classList.remove('vl');});b.classList.add('vl');document.getElementById('sjekk').disabled=false;document.getElementById('sjekk').onclick=function(){sjekkFV();};}
      g.appendChild(b);
    });
    sr.appendChild(g);
    document.getElementById('sjekk').disabled=true;
  }
}
function sjekkTall(){
  if(svart)return;svart=true;
  var i=document.getElementById('sI');if(!i)return;
  var v=i.value.trim().replace(',','.');
  var tol=naa.tol||0.06;
  var ok;
  if(typeof naa.fasit==='string'&&isNaN(naa.fasit)){ok=v.replace(/\s/g,'')===(naa.fasit+'').replace(/\s/g,'');}
  else{ok=!isNaN(v)&&Math.abs(parseFloat(v)-parseFloat(naa.fasit))<tol;}
  i.className='svar-input '+(ok?'ri':'fe');i.disabled=true;
  visFeedback(ok);
}
function sjekkFV(){
  if(svart)return;svart=true;
  var vl=document.querySelector('#fvG .fv.vl');if(!vl)return;
  var ok=vl.textContent===naa.fasit;
  document.querySelectorAll('#fvG .fv').forEach(function(b){
    b.disabled=true;
    if(b.textContent===naa.fasit)b.classList.add('rv');
    else if(b.classList.contains('vl'))b.classList.add('fv2');
  });
  visFeedback(ok);
}
function visFeedback(ok){
  document.getElementById('sjekk').disabled=true;
  var k=document.getElementById('oppKort');k.classList.add(ok?'rk':'fk');
  if(ok){riktige++;streak++;if(streak>maxStreak)maxStreak=streak;poeng+=10+Math.min(streak-1,5)*2;fp.push('r');}
  else{streak=0;fp.push('f');}
  tot++;akt++;oppdaterStats();oppdaterFP();
  var fb=document.getElementById('fb');fb.className='fb vis';
  fb.innerHTML='<div class="fb-boks '+(ok?'ri':'fe')+'">'+(ok?'✓ Riktig!'+(streak>2?' 🔥 '+streak+' på rad!':''):'✗ Fasit: <strong>'+(naa.fasit)+'</strong>')+'<div class="steg"><strong>Løsning:</strong> '+naa.steg+'</div></div>';
  document.getElementById('nesteB').className='neste-b vis';
  if(ok)setTimeout(function(){if(svart)nesteOpp();},1800);
}
function oppdaterStats(){
  document.getElementById('stP').textContent=poeng;document.getElementById('stR').textContent=riktige;
  document.getElementById('stS').textContent=streak;document.getElementById('stT').textContent=akt+'/'+OKT;
}
function byggFP(){var w=document.getElementById('fpW');w.innerHTML='';for(var i=0;i<OKT;i++){var d=document.createElement('div');d.className='fp';d.id='fp'+i;w.appendChild(d);}}
function oppdaterFP(){for(var i=0;i<OKT;i++){var e=document.getElementById('fp'+i);if(!e)continue;e.className='fp'+(fp[i]==='r'?' rfp':fp[i]==='f'?' ffp':i===akt-1&&!svart?' afp':'');}}
function settV(v,btn){vanskel=v;document.querySelectorAll('#startOv .vb').forEach(function(b){b.className='vb'+(b===btn?' ak '+(v===1?'en':v===2?'mi':'va'):'');});}
function byttV(v){vanskel=v;oppdaterVUI();}
function oppdaterVUI(){[1,2,3].forEach(function(v){var b=document.getElementById('vr'+v);b.className='vb'+(v===vanskel?' ak '+(v===1?'en':v===2?'mi':'va'):'');}); }
function visSlutt(){
  var pct=Math.round(riktige/OKT*100);
  var e=pct>=90?'🏆':pct>=70?'🌟':pct>=50?'👍':'💪';
  var t=pct>=90?'Utmerket!':pct>=70?'Bra jobbet!':pct>=50?'Godkjent!':'Øv mer!';
  document.getElementById('slE').textContent=e;document.getElementById('slT').textContent=t;
  document.getElementById('slS').innerHTML='<strong>'+riktige+'</strong> av <strong>'+OKT+'</strong> riktige ('+pct+' %)<br>Poeng: <strong>'+poeng+'</strong> · Beste streak: <strong>'+maxStreak+' 🔥</strong>';
  document.getElementById('sluttOv').classList.add('vis');
}
oppdaterVUI();byggFP();oppdaterStats();
</script>
</body>
</html>
