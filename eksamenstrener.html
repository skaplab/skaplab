<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eksamenstrener · Matematikk 10. klasse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --bg2: #16161e;
  --bg3: #1e1e2a;
  --border: rgba(255,255,255,.07);
  --text: #e8e8f0;
  --dim: #888899;
  --accent: #e8b84b;
  --accent2: #5b8dd9;
  --green: #5bc98e;
  --red: #e05c6e;
  --orange: #e8874b;
  --font-d: 'Playfair Display', serif;
  --font-b: 'Source Sans 3', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:16px;}

/* ── HEADER ── */
#header{
  background:linear-gradient(135deg, #16161e 0%, #1a1a28 100%);
  border-bottom:1px solid var(--border);
  padding:16px 24px;
  display:flex;align-items:center;gap:16px;
}
#header .logo{
  font-family:var(--font-d);font-size:1.5rem;font-weight:900;
  color:var(--accent);letter-spacing:-0.5px;
}
#header .undertittel{
  font-size:.8rem;color:var(--dim);
}
#header .spacer{flex:1;}
#header .stats{
  display:flex;gap:16px;font-size:.82rem;
}
#header .stats span{color:var(--dim);}
#header .stats b{color:var(--accent);}
#back-link{font-size:.8rem;color:var(--dim);text-decoration:none;margin-right:8px;}
#back-link:hover{color:var(--text);}

/* ── MODUS-VELGER ── */
#modus-velger{
  display:flex;gap:0;border-bottom:2px solid var(--border);
  padding:0 24px;background:var(--bg2);
}
.modus-tab{
  padding:12px 24px;font-size:.88rem;font-weight:600;
  color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .15s;background:none;border-top:none;
  border-left:none;border-right:none;font-family:var(--font-b);
}
.modus-tab.aktiv{color:var(--accent);border-bottom-color:var(--accent);}
.modus-tab:hover{color:var(--text);}

/* ── PROGRESS BAR ── */
#progress-wrap{padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);}
#progress-info{display:flex;justify-content:space-between;font-size:.78rem;color:var(--dim);margin-bottom:6px;}
#progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .4s;}

/* ── HOVED-LAYOUT ── */
#app{
  display:grid;
  grid-template-columns:220px 1fr;
  min-height:calc(100vh - 130px);
}

/* ── OPPGAVE-LISTE (venstre) ── */
#liste{
  background:var(--bg2);border-right:1px solid var(--border);
  padding:12px 8px;overflow-y:auto;
}
.liste-seksjon{
  font-size:.65rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:var(--dim);padding:10px 8px 4px;
}
.liste-knapp{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:7px 10px;border-radius:7px;
  background:transparent;border:1px solid transparent;
  color:var(--dim);cursor:pointer;font-size:.8rem;
  font-family:var(--font-b);text-align:left;
  transition:all .12s;
}
.liste-knapp:hover{background:rgba(255,255,255,.04);color:var(--text);}
.liste-knapp.aktiv{background:rgba(232,184,75,.07);border-color:rgba(232,184,75,.2);color:var(--accent);}
.liste-knapp.besvart{background:rgba(91,201,142,.06);border-color:rgba(91,201,142,.15);color:var(--green);}
.liste-knapp.feil{background:rgba(224,92,110,.06);border-color:rgba(224,92,110,.15);color:var(--red);}
.oppg-nr{font-size:.7rem;width:20px;flex-shrink:0;font-family:var(--font-d);font-weight:700;}
.oppg-ikon{font-size:.75rem;width:14px;flex-shrink:0;}
.oppg-merking{
  font-size:.62rem;padding:1px 5px;border-radius:6px;
  margin-left:auto;flex-shrink:0;
}
.merking-lavt{background:rgba(91,201,142,.15);color:var(--green);}
.merking-viktig{background:rgba(232,184,75,.15);color:var(--accent);}

/* ── OPPGAVE-PANEL (høyre) ── */
#panel{
  padding:28px 36px;max-width:800px;
}
.oppg-header{
  display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;
}
.oppg-badge{
  background:var(--accent);color:#000;
  font-family:var(--font-d);font-weight:700;font-size:.9rem;
  padding:4px 12px;border-radius:6px;white-space:nowrap;flex-shrink:0;
}
.oppg-tittel{
  font-family:var(--font-d);font-size:1.4rem;font-weight:700;
  line-height:1.2;color:var(--text);
}
.oppg-meta{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.meta-tag{
  font-size:.74rem;padding:3px 10px;border-radius:10px;
  border:1px solid rgba(255,255,255,.1);color:var(--dim);
}
.meta-tag.del1{background:rgba(91,133,217,.1);border-color:rgba(91,133,217,.25);color:var(--accent2);}
.meta-tag.del2{background:rgba(232,135,75,.1);border-color:rgba(232,135,75,.25);color:var(--orange);}
.meta-poeng{background:rgba(232,184,75,.08);border-color:rgba(232,184,75,.25);color:var(--accent);}
.merking-badge-stor{
  font-size:.72rem;padding:3px 9px;border-radius:10px;
}

/* Oppgavetekst */
.oppg-tekst{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:20px 24px;margin-bottom:20px;
  font-size:.95rem;line-height:1.7;white-space:pre-line;
}
.oppg-tekst .tall{
  font-family:var(--font-d);color:var(--accent);
}
.instruksjon{
  font-size:.82rem;color:var(--dim);padding:10px 14px;
  background:rgba(255,255,255,.03);border-radius:8px;
  border-left:3px solid rgba(255,255,255,.1);
  margin-bottom:18px;line-height:1.5;
}
.del2-info{
  background:rgba(232,135,75,.06);border:1px solid rgba(232,135,75,.2);
  border-radius:8px;padding:10px 14px;margin-bottom:18px;
  font-size:.82rem;color:var(--orange);line-height:1.5;
}

/* ── SVARBOKS ── */
.svar-seksjon{margin-bottom:16px;}
.svar-label{font-size:.78rem;color:var(--dim);margin-bottom:6px;}
.svar-input{
  width:100%;padding:12px 16px;
  background:rgba(255,255,255,.06);
  border:2px solid rgba(255,255,255,.12);
  border-radius:10px;color:var(--text);
  font-family:var(--font-b);font-size:1rem;
  outline:none;transition:border-color .15s;
  resize:vertical;min-height:44px;
}
.svar-input:focus{border-color:var(--accent);}
.svar-input.riktig{border-color:var(--green);background:rgba(91,201,142,.06);}
.svar-input.feil{border-color:var(--red);background:rgba(224,92,110,.06);}

/* Sann/Usann */
.sann-usann-grid{display:flex;flex-direction:column;gap:8px;}
.su-rad{
  display:flex;align-items:center;gap:12px;
  background:var(--bg3);border-radius:8px;padding:10px 14px;
  border:1px solid var(--border);
}
.su-tekst{flex:1;font-size:.88rem;line-height:1.4;}
.su-knapper{display:flex;gap:6px;flex-shrink:0;}
.su-btn{
  padding:5px 14px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;
  font-size:.78rem;font-family:var(--font-b);transition:all .12s;
}
.su-btn:hover{background:rgba(255,255,255,.06);}
.su-btn.valgt-sann{background:rgba(91,201,142,.15);border-color:var(--green);color:var(--green);}
.su-btn.valgt-usann{background:rgba(224,92,110,.15);border-color:var(--red);color:var(--red);}

/* Knapper */
.knapp-rad{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.sjekk-btn{
  padding:12px 28px;font-family:var(--font-d);font-size:1rem;font-weight:700;
  background:var(--accent);color:#000;border:none;border-radius:10px;
  cursor:pointer;transition:filter .15s;
}
.sjekk-btn:hover{filter:brightness(1.1);}
.sjekk-btn:disabled{opacity:.35;cursor:default;}
.hopp-btn{
  padding:12px 20px;font-family:var(--font-b);font-size:.88rem;
  background:transparent;color:var(--dim);
  border:1px solid rgba(255,255,255,.12);border-radius:10px;
  cursor:pointer;transition:all .15s;
}
.hopp-btn:hover{color:var(--text);border-color:rgba(255,255,255,.25);}
.neste-btn{
  padding:12px 24px;font-family:var(--font-d);font-size:.95rem;font-weight:700;
  background:var(--green);color:#000;border:none;border-radius:10px;
  cursor:pointer;display:none;transition:filter .15s;
}
.neste-btn:hover{filter:brightness(1.08);}

/* Feedback */
.fb{
  padding:12px 16px;border-radius:10px;font-size:.88rem;
  line-height:1.5;display:none;margin-top:12px;
}
.fb.riktig{background:rgba(91,201,142,.1);border:1px solid rgba(91,201,142,.3);color:var(--green);display:block;}
.fb.feil{background:rgba(224,92,110,.1);border:1px solid rgba(224,92,110,.3);color:var(--red);display:block;}
.fb.delvis{background:rgba(232,184,75,.08);border:1px solid rgba(232,184,75,.25);color:var(--accent);display:block;}

/* Fasit-visning */
.fasit-boks{
  background:var(--bg3);border:1px solid rgba(91,201,142,.2);
  border-radius:10px;padding:14px 18px;margin-top:12px;
  font-size:.86rem;line-height:1.6;display:none;
}
.fasit-boks.vis{display:block;}
.fasit-tittel{color:var(--green);font-weight:700;margin-bottom:6px;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;}

/* ── RESULTAT-PANEL ── */
#resultat{display:none;padding:40px;max-width:700px;}
.resultat-tittel{font-family:var(--font-d);font-size:2.5rem;font-weight:900;margin-bottom:8px;}
.resultat-score{
  font-family:var(--font-d);font-size:4rem;font-weight:900;
  color:var(--accent);line-height:1;margin:16px 0;
}
.resultat-karakter{
  display:inline-block;padding:8px 24px;
  background:rgba(232,184,75,.12);border:2px solid var(--accent);
  border-radius:12px;font-family:var(--font-d);font-size:1.8rem;
  font-weight:700;color:var(--accent);margin-bottom:24px;
}
.resultat-detaljer{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;
}
.res-kort{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;
}
.res-kort .tall{font-family:var(--font-d);font-size:1.6rem;font-weight:700;color:var(--accent2);}
.res-kort .label{font-size:.78rem;color:var(--dim);margin-top:2px;}
.ny-økt-btn{
  padding:14px 32px;font-family:var(--font-d);font-size:1rem;font-weight:700;
  background:var(--accent);color:#000;border:none;border-radius:10px;
  cursor:pointer;margin-right:12px;
}

/* ── RESPONSIV ── */
@media(max-width:700px){
  #app{grid-template-columns:1fr;}
  #liste{display:none;}
  #panel{padding:16px;}
}

.kode-blokk{
  background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:14px 18px;margin-bottom:14px;
  overflow-x:auto;
}
.kode-blokk pre{margin:0;}
.kode-blokk code{
  font-family:'Courier New',Courier,monospace;font-size:.88rem;
  color:#a8d8a8;line-height:1.6;white-space:pre;
}
</style>
</head>
<body>

<div id="header">
  <a href="index.html" id="back-link">← SkapLab</a>
  <div>
    <div class="logo">📝 Eksamenstrener</div>
    <div class="undertittel">Matematikk 10. klasse · LK20</div>
  </div>
  <div class="spacer"></div>
  <div class="stats">
    <span>✅ <b id="st-poeng">0</b>/<b id="st-max">0</b> poeng</span>
    <span>📋 <b id="st-besvart">0</b> besvart</span>
    <span>🏆 Runde <b id="st-runde">1</b></span>
  </div>
</div>

<div id="modus-velger">
  <button class="modus-tab aktiv" onclick="byttDel(1,this)">Del 1 – Uten hjelpemidler</button>
  <button class="modus-tab" onclick="byttDel(2,this)">Del 2 – Med hjelpemidler</button>
  <button class="modus-tab" onclick="byttDel(0,this)">Fullt sett</button>
</div>

<div id="progress-wrap">
  <div id="progress-info">
    <span id="prog-tekst">Oppgave 1 av 7</span>
    <span id="prog-pst">0%</span>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
</div>

<div id="app">
  <div id="liste"></div>
  <div id="panel"></div>
</div>

<div id="resultat">
  <div class="resultat-tittel">Ferdig! 🎉</div>
  <div class="resultat-score" id="res-score">0 / 0</div>
  <div class="resultat-karakter" id="res-karakter">Karakter 3</div>
  <div class="resultat-detaljer">
    <div class="res-kort"><div class="tall" id="res-del1">0/0</div><div class="label">Del 1</div></div>
    <div class="res-kort"><div class="tall" id="res-del2">0/0</div><div class="label">Del 2</div></div>
    <div class="res-kort"><div class="tall" id="res-pst">0%</div><div class="label">Prosentpoeng</div></div>
    <div class="res-kort"><div class="tall" id="res-ganger">1</div><div class="label">Ganger brukt</div></div>
  </div>
  <button class="ny-økt-btn" onclick="nyØkt()">🔀 Ny økt – nye oppgaver</button>
  <button class="hopp-btn" onclick="gåTilResultat(false)">Se gjennomgang</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// EKSAMENSTRENER 10. KLASSE LK20
// Oppgave-generatorer — Del 1 og Del 2
// ══════════════════════════════════════════════════════════════════

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndF(a,b,d){return parseFloat((Math.random()*(b-a)+a).toFixed(d));}
function plukk(arr){return arr[rnd(0,arr.length-1)];}

// ══════════════════════════════════════════════════════════════════
// DEL 1 — OPPGAVE 1: LIKNINGSSYSTEM
// ══════════════════════════════════════════════════════════════════

var KONTEKSTER_LIKN = [
  {vare1:'sjokolade', vare2:'flaske vann', sted:'kiosken'},
  {vare1:'barnebillett', vare2:'voksenbillett', sted:'kinoen'},
  {vare1:'bagett', vare2:'kyllingsalat', sted:'kantina'},
  {vare1:'kaffe', vare2:'juice', sted:'kafeen'},
  {vare1:'elevbillett', vare2:'lærerbillett', sted:'museet'},
  {vare1:'stor pizza', vare2:'liten pizza', sted:'pizzastedet'},
  {vare1:'bok', vare2:'notatblokk', sted:'bokhandelen'},
  {vare1:'dagpass', vare2:'timespass', sted:'treningssenteret'},
];

function genLikningssystem() {
  var k = plukk(KONTEKSTER_LIKN);
  // Generer pris1 og pris2 slik at løsningen alltid er pene heltall
  var p1 = rnd(8,30), p2 = rnd(5, p1-1);
  // Lag to situasjoner
  var a1=rnd(2,4), b1=rnd(1,3);
  var a2=rnd(1,a1-1), b2=b1+rnd(1,2);
  var sum1 = a1*p1 + b1*p2;
  var sum2 = a2*p1 + b2*p2;
  return {
    type:'del1_likn', del:1, nr:'1', merking:'viktig',
    poeng:2, maxPoeng:2,
    k:k, p1:p1, p2:p2, a1:a1, b1:b1, a2:a2, b2:b2,
    fasit: p1,
    spørsmål: `Noen kjøper varer i ${k.sted}.\n\n` +
      `Situasjon 1: ${a1} ${k.vare1} og ${b1} ${k.vare2} koster ${sum1} kroner.\n` +
      `Situasjon 2: ${a2} ${k.vare1} og ${b2} ${k.vare2} koster ${sum2} kroner.\n\n` +
      `Hva koster én ${k.vare1}?`,
    instruksjon: 'Sett opp to likninger og løs dem. Vis framgangsmåten.',
    løsningssteg: [
      `La x = pris ${k.vare1}, y = pris ${k.vare2}`,
      `Likning 1: ${a1}x + ${b1}y = ${sum1}`,
      `Likning 2: ${a2}x + ${b2}y = ${sum2}`,
      `Løs: x = ${p1} kroner`
    ],
    kommentar: `Du er på rett vei hvis du setter opp to likninger med to ukjente.`,
    svarType: 'tall', enhet: 'kroner',
    tol: 0,
  };
}

// ══════════════════════════════════════════════════════════════════
// DEL 1 — OPPGAVE 2: TALLMØNSTER
// ══════════════════════════════════════════════════════════════════

function genTallmønster() {
  // Typer: kors (n²+4n), ramme (4n+4 for ytre), rektangel n(n+1)
  var typer = [
    { navn:'kors', formel: n => n*n + 4*n,
      formeltekst: 'n² + 4n',
      beskrivelse: 'Et kors med n² kvadrater i midten og fire armer med n kvadrater'},
    { navn:'rektangel', formel: n => n*(n+1),
      formeltekst: 'n · (n + 1)',
      beskrivelse: 'Rektangel der bredde = n og lengde = n+1'},
    { navn:'trapp', formel: n => n*(n+1)/2,
      formeltekst: 'n·(n+1)/2',
      beskrivelse: 'Trappemønster med 1+2+3+...+n kvadrater'},
  ];
  var t = plukk(typer);
  var sekvens = [1,2,3,4,5].map(n => t.formel(n));
  return {
    type:'del1_mønster', del:1, nr:'2', merking:'viktig',
    poeng:3, maxPoeng:3,
    mønster: t,
    sekvens: sekvens,
    spørsmål: `Se på tallmønsteret nedenfor:\n\nFigur 1: ${sekvens[0]} · Figur 2: ${sekvens[1]} · Figur 3: ${sekvens[2]} · Figur 4: ${sekvens[3]}\n\n` +
      `a) Hva er antall kvadrater i figur 5? (1 poeng)\n` +
      `b) Lag en formel for antall kvadrater i figur n. (2 poeng)`,
    instruksjon: 'Del a): Tell eller beregn. Del b): Finn mønsteret og skriv det med n.',
    fasitA: sekvens[4],
    fasitB: t.formeltekst,
    løsningssteg: [
      `Figur 5 = ${t.formel(5)} kvadrater`,
      `Mønster: ${t.beskrivelse}`,
      `Formel: A(n) = ${t.formeltekst}`
    ],
    kommentar: `Du er på rett vei hvis du ser at forskjellen mellom figurene øker jevnt.`,
    svarType: 'tall_og_formel',
    tol: 0,
  };
}

// ══════════════════════════════════════════════════════════════════
// DEL 1 — OPPGAVE 3: STATISTIKK / DIAGRAM (SANN/USANN)
// ══════════════════════════════════════════════════════════════════

function genStatistikkDiagram() {
  // Lag et realistisk datasett og 4 påstander (noen sanne, noen usanne)
  var kontekster = [
    { tema:'Søvntimer per natt blant 10.-klassinger',
      kategorier:['Under 6t','6-7t','7-8t','Over 8t'],
      verdier: [rnd(5,10), rnd(15,25), rnd(35,45), rnd(20,30)]
    },
    { tema:'Transportmiddel til skolen',
      kategorier:['Ganger','Sykler','Buss','Bil'],
      verdier: [rnd(20,30), rnd(25,35), rnd(20,30), rnd(10,20)]
    },
    { tema:'Favorittfag blant ungdomsskoleelever',
      kategorier:['Matematikk','Norsk','Kroppsøving','Kunst og håndverk'],
      verdier: [rnd(15,25), rnd(10,20), rnd(35,50), rnd(10,20)]
    },
  ];
  var k = plukk(kontekster);
  var tot = k.verdier.reduce((a,b)=>a+b,0);
  var pst = k.verdier.map(v => Math.round(v/tot*100));
  
  // Generer 4 påstander, 2 sanne og 2 usanne
  var idx0 = k.verdier.indexOf(Math.max(...k.verdier));
  var idx1 = k.verdier.indexOf(Math.min(...k.verdier));
  var påstander = [
    { tekst: `Mer enn halvparten svarte "${k.kategorier[idx0]}"`,
      sann: pst[idx0] > 50 },
    { tekst: `"${k.kategorier[idx1]}" ble valgt av færre enn 15%`,
      sann: pst[idx1] < 15 },
    { tekst: `Til sammen valgte ${pst[0]+pst[1]}% enten "${k.kategorier[0]}" eller "${k.kategorier[1]}"`,
      sann: true },
    { tekst: `"${k.kategorier[idx0]}" ble valgt av nøyaktig ${pst[idx0]}%`,
      sann: true },
  ];
  
  return {
    type:'del1_diagram', del:1, nr:'3', merking:'lavt',
    poeng:2, maxPoeng:2,

function genProsent() {
  var typer = [
    // Type A: regn ut prosent av antall
    function() {
      var kontekster = [
        'skåret mål', 'fikk riktig svar', 'stemte ja', 'møtte opp',
        'besto testen', 'fikk toppkarakter', 'valgte alternativ A',
      ];
      var hva = plukk(kontekster);
      var tot = plukk([20,25,40,50]);
      var ant = rnd(Math.floor(tot*0.3), Math.floor(tot*0.9));
      var pst = Math.round(ant/tot*100);
      return {
        spørsmål: `Av ${tot} deltakere ${hva} ${ant} stykker.\n\nHvor mange prosent ${hva}?`,
        fasit: pst, enhet:'%',
        løsning: `${ant} / ${tot} × 100 = ${pst}%`,
        kommentar: 'Del antallet på totalt og gange med 100.',
      };
    },
    // Type B: finn original verdi gitt prosent og ny verdi
    function() {
      var orig = plukk([80,100,120,150,200,250]);
      var prosent = plukk([10,15,20,25]);
      var økning = orig * prosent/100;
      var ny = orig + økning;
      return {
        spørsmål: `En pris økte med ${prosent}%. Den nye prisen er ${ny} kroner.\n\nHva var den opprinnelige prisen?`,
        fasit: orig, enhet:'kroner',
        løsning: `Ny pris = gammel × (1 + ${prosent}/100). Gammel = ${ny} / ${1+prosent/100} = ${orig}`,
        kommentar: 'Husk: prosenten regnes av den opprinnelige prisen, ikke den nye.',
      };
    },
  ];
  var t = plukk(typer)();
  return {
    type:'del1_prosent', del:1, nr:'5', merking:'viktig',
    poeng:2, maxPoeng:2,
    ...t,
    instruksjon: 'Vis utregningen.',
    svarType: 'tall', tol: 0.5,
  };
}

function genEksponentiell() {
  var type = plukk([0,1,2]);
  var n = rnd(2,4);
  
  if (type === 0) {
    // Bakterier dobler
    var start = plukk([500,1000,2000,5000]);
    var fasit = start * Math.pow(2, n);
    return {
      type:'del1_eksp', del:1, nr:'7', merking:'viktig',
      poeng:2, maxPoeng:2,
      spørsmål: `Det er ${start} bakterier i en koloni. Antallet dobler seg hvert døgn.\n\nHvor mange bakterier er det etter ${n} dager?`,
      instruksjon: 'Bruk vekstfaktor. Vis utregningen.',
      fasit: fasit, enhet:'bakterier',
      løsning: `${start} × 2^${n} = ${start} × ${Math.pow(2,n)} = ${fasit}`,
      kommentar: 'Du er på rett vei hvis du ganger med vekstfaktoren (2) for hvert døgn.',
      svarType:'tall', tol:0,
    };
  } else if (type === 1) {
    // Sparing med rente
    var start = plukk([5000,10000,20000,50000]);
    var p = plukk([2,3,4,5]);
    var vf = 1 + p/100;
    var fasit = Math.round(start * Math.pow(vf, n));
    return {
      type:'del1_eksp', del:1, nr:'7', merking:'viktig',
      poeng:2, maxPoeng:2,
      spørsmål: `${start} kroner settes i banken med ${p}% rente per år.\n\nHvor mye er det i banken etter ${n} år?`,
      instruksjon: 'Bruk vekstfaktor (1 + rente/100). Vis utregningen.',
      fasit: fasit, enhet:'kroner',
      løsning: `${start} × ${vf}^${n} = ${start} × ${Math.pow(vf,n).toFixed(4)} ≈ ${fasit} kr`,
      kommentar: `Vekstfaktor = 1 + ${p}/100 = ${vf}. Ganger med denne ${n} ganger.`,
      svarType:'tall', tol: fasit * 0.02,
    };
  } else {
    // Prosentvis nedgang (bilverdi)
    var start = plukk([80000,100000,120000,150000]);
    var p = plukk([10,12,15,20]);
    var vf = 1 - p/100;
    var fasit = Math.round(start * Math.pow(vf, n));
    return {
      type:'del1_eksp', del:1, nr:'7', merking:'viktig',
      poeng:2, maxPoeng:2,
      spørsmål: `En bil er verdt ${start.toLocaleString('no')} kroner. Verdien synker med ${p}% hvert år.\n\nHva er bilen verdt etter ${n} år?`,
      instruksjon: 'Bruk vekstfaktor (1 − nedgang/100). Vis utregningen.',
      fasit: fasit, enhet:'kroner',
      løsning: `${start} × ${vf}^${n} ≈ ${fasit} kr`,
      kommentar: `Vekstfaktor = 1 − ${p}/100 = ${vf}. Ganger med denne ${n} ganger.`,
      svarType:'tall', tol: fasit * 0.02,
    };
  }
}

function genStatistikkDel2() {
  var kontekster = [
    { tema:'mobilbruk per dag', g1:'Jenter', g2:'Gutter', enhet:'timer' },
    { tema:'søvntimer per natt', g1:'8. trinn', g2:'10. trinn', enhet:'timer' },
    { tema:'leksetid per dag', g1:'Gutter', g2:'Jenter', enhet:'minutter' },
    { tema:'matpenger per uke', g1:'Jenter', g2:'Gutter', enhet:'kroner' },
    { tema:'antall treningstimer per uke', g1:'Aktive', g2:'Lite aktive', enhet:'timer' },
  ];
  var k = plukk(kontekster);
  function lagData(n, snitt, spr) {
    var d = [];
    for (var i=0;i<n;i++) d.push(Math.max(1, Math.round(snitt + (Math.random()-0.5)*spr*2)));
    return d.sort(function(a,b){return a-b;});
  }
  var n = 10;
  var d1 = lagData(n, rnd(4,8), 2);
  var d2 = lagData(n, rnd(2,6), 2);
  function median(a) { var s=[].concat(a).sort(function(x,y){return x-y;}); return n%2===0?(s[n/2-1]+s[n/2])/2:s[Math.floor(n/2)]; }
  function gjsnitt(a) { return Math.round(a.reduce(function(x,y){return x+y;},0)/n*10)/10; }
  function typetall(a) {
    var teller={};a.forEach(function(v){teller[v]=(teller[v]||0)+1;});
    var maks=0,typ=a[0];
    Object.keys(teller).forEach(function(v){if(teller[v]>maks){maks=teller[v];typ=parseInt(v);}});
    return typ;
  }
  var sn1=gjsnitt(d1), me1=median(d1), ty1=typetall(d1);
  var sn2=gjsnitt(d2), me2=median(d2), ty2=typetall(d2);
  return {
    type:'del2_stat', del:2, nr:'5', merking:'viktig',
    poeng:4, maxPoeng:4,
    k, d1, d2, n,
    spørsmål:
      'En klasse har samlet data om ' + k.tema + ' (' + k.enhet + '):\n\n' +
      k.g1 + ': ' + d1.join(', ') + '\n' +
      k.g2 + ': ' + d2.join(', ') + '\n\n' +
      'Bruk dataene til å besvare:\n\n' +
      'a) Hva er gjennomsnittet for ' + k.g1 + '? Rund av til én desimal. (1 poeng)\n\n' +
      'b) Hva er medianen for ' + k.g1 + '? (1 poeng)\n\n' +
      'c) Hva er gjennomsnittet for ' + k.g2 + '? Rund av til én desimal. (1 poeng)\n\n' +
      'd) Hva er medianen for ' + k.g2 + '? (1 poeng)',
    instruksjon: 'Bruk kalkulator eller regneark. Sorter tallene for å finne medianen.',
    svarType: 'stat_abcd',
    fasitA: sn1, fasitB: me1, fasitC: sn2, fasitD: me2,
    løsning:
      k.g1 + ': Snitt = ' + sn1 + ', Median = ' + me1 + ', Typetall = ' + ty1 + '\n' +
      k.g2 + ': Snitt = ' + sn2 + ', Median = ' + me2 + ', Typetall = ' + ty2 + '\n' +
      'Sortert ' + k.g1 + ': ' + d1.join(', ') + '\n' +
      'Sortert ' + k.g2 + ': ' + d2.join(', '),
    kommentar: 'Median: sorter tallene, ta midterste (eller snitt av de to midterste ved partall antall).',
    tol: 0.15,
  };
}

  }

  var del2Info = o.del === 2
    ? '<div class="del2-info">🧮 Bruk gjerne kalkulator, GeoGebra eller Excel til å løse denne oppgaven. Skriv svaret ditt nedenfor.</div>'
    : '';

  var besvartInfo = state.svar[idx] ? renderFasit(o, state.svar[idx]) : '';

  panel.innerHTML =
    '<div class="oppg-header">' +
      '<div class="oppg-badge">Oppg. ' + (idx+1) + '</div>' +
      '<div class="oppg-tittel">' + temaLabel(o) + '</div>' +
    '</div>' +
    '<div class="oppg-meta">' + delBadge + '<span class="meta-tag meta-poeng">🏅 ' + o.maxPoeng + ' poeng</span>' + merkingHtml + '</div>' +
    del2Info +
    '<div class="oppg-tekst">' + (o.spørsmål || '') + '</div>' +
    '<div class="instruksjon">📌 ' + (o.instruksjon || '') + '</div>' +
    renderSvarBoks(o) +
    '<div class="knapp-rad">' +
      '<button class="sjekk-btn" id="sjekk-btn" onclick="sjekk(' + idx + ')"' + (state.svar[idx] ? ' disabled' : '') + '>✓ Sjekk svar</button>' +
      '<button class="hopp-btn" onclick="neste()">Hopp over →</button>' +
      '<button class="neste-btn" id="neste-btn" onclick="neste()" ' + (state.svar[idx] ? 'style="display:block"' : '') + '>Neste oppgave ▶</button>' +
    '</div>' +
    '<div class="fb" id="fb"></div>' +
    besvartInfo;

  oppdaterListe();
  oppdaterProgress();
}

function temaLabel(o) {
  var map = {
    'del1_likn': 'Likningssystem',
    'del1_mønster': 'Tallmønster',
    'del1_diagram': 'Statistikk og diagram',
    'del1_stign': 'Stigningstall',
    'del1_prosent': 'Prosent',
    'del1_volum': 'Volum og geometri',
    'del1_eksp': 'Eksponentiell vekst',
    'del2_eksp': 'Eksponentiell funksjon',
    'del2_sann': 'Sannsynlighet',
    'del2_pris': 'Prissammenligning',
    'del2_linf': 'Lineære funksjoner',
    'del2_stat': 'Statistikk og sentralmål',
  };
  return map[o.type] || o.type;
}

function renderSvarBoks(o) {
  var besvart = !!state.svar[o._idx];
  if (besvart) return '';

  if (o.svarType === 'sann_usann') {
    var html = '<div class="sann-usann-grid">';
    o.påstander.forEach(function(p,i){
      html += '<div class="su-rad"><div class="su-tekst">'+(i+1)+'. '+p.tekst+'</div>'
        +'<div class="su-knapper">'
        +'<button class="su-btn" id="su-'+i+'-s" onclick="velgSU('+i+',true)">Sann</button>'
        +'<button class="su-btn" id="su-'+i+'-u" onclick="velgSU('+i+',false)">Usann</button>'
        +'</div></div>';
    });
    return html + '</div>';
  }

  if (o.svarType === 'tall' || o.svarType === 'tekst') {
    return '<div class="svar-seksjon"><div class="svar-label">Svar:</div>'
      +'<input class="svar-input" id="svar-inp" type="'+(o.svarType==='tall'?'number':'text')+'" placeholder="Skriv svaret ditt her...">'
      +'</div>';
  }

  // Programmeringsoppgave — vis kode + inputfelt
  if (o.svarType === 'prog_ett_tall' || o.svarType === 'prog_to_tall' || o.svarType === 'prog_tekst_tall') {
    var html = '<div class="kode-blokk"><pre><code>'+o.kode+'</code></pre></div>'
      +'<div class="svar-seksjon"><div class="svar-label">Svar a):</div>'
      +'<input class="svar-input" id="prog-a" type="'+(o.fasitA_tekst?'text':'number')+'" placeholder="'+(o.fasitA_tekst?'Skriv svaret...':'Tall...')+'">'
      +'</div>';
    if (o.svarType === 'prog_to_tall') {
      html += '<div class="svar-seksjon"><div class="svar-label">Svar b):</div>'
        +'<input class="svar-input" id="prog-b" type="number" placeholder="Tall...">'
        +'</div>';
    }
    if (o.svarType === 'prog_tekst_tall') {
      html += '<div class="svar-seksjon"><div class="svar-label">Svar b) — forklar:</div>'
        +'<input class="svar-input" id="prog-b" type="text" placeholder="Forklar...">'
        +'</div>';
    }
    return html;
  }

  // Prissammenligning — 4 tall + 1 flervalg
  if (o.svarType === 'pris_tilbud') {
    var html = '<div class="svar-label">Regn ut pris per enhet for hvert tilbud:</div>'
      +'<div class="koeff-grid to">';
    for (var i=0;i<4;i++) {
      html += '<div class="koeff-felt"><label>Tilbud '+(i+1)+' (kr/stk)</label>'
        +'<input class="koeff-input" id="pris-'+i+'" type="number" step="0.01" placeholder="0,00"></div>';
    }
    html += '</div><div class="svar-seksjon" style="margin-top:10px"><div class="svar-label">Hvilket tilbud er billigst? (skriv 1, 2, 3 eller 4)</div>'
      +'<input class="svar-input" id="pris-best" type="number" min="1" max="4" placeholder="1-4" style="max-width:120px">'
      +'</div>';
    return html;
  }

  // Eksponentiell del 2 — tekst(a) + tall(b) + tall(c)
  if (o.svarType === 'eksp_abc') {
    return '<div class="svar-seksjon"><div class="svar-label">a) Forklar hva tallene betyr (kortfattet):</div>'
      +'<input class="svar-input" id="eksp-a" type="text" placeholder="Startverdi er..., vekstfaktor er..., x er...">'
      +'</div>'
      +'<div class="koeff-grid to" style="margin-top:8px">'
      +'<div class="koeff-felt"><label>b) Verdi etter '+o.år+' perioder</label>'
      +'<input class="koeff-input" id="eksp-b" type="number" step="1" placeholder="0"></div>'
      +'<div class="koeff-felt"><label>c) Antall perioder til dobling/halvering</label>'
      +'<input class="koeff-input" id="eksp-c" type="number" step="1" placeholder="0"></div>'
      +'</div>';
  }

  // Sannsynlighet — tre tall (a, b, c)
  if (o.svarType === 'sann_abc') {
    return '<div class="svar-label">Skriv svarene som desimaltall (f.eks. 0,25):</div>'
      +'<div class="koeff-grid">'
      +'<div class="koeff-felt"><label>Svar a)</label><input class="koeff-input" id="sann-a" type="number" step="0.01" placeholder="0,00"></div>'
      +'<div class="koeff-felt"><label>Svar b)</label><input class="koeff-input" id="sann-b" type="number" step="0.01" placeholder="0,00"></div>'
      +'<div class="koeff-felt"><label>Svar c)</label><input class="koeff-input" id="sann-c" type="number" step="0.01" placeholder="0,00"></div>'
      +'</div>';
  }

  // Statistikk — fire tall
  if (o.svarType === 'stat_abcd') {
    return '<div class="svar-label">Sentralmål — rund av til én desimal:</div>'
      +'<div class="koeff-grid to">'
      +'<div class="koeff-felt"><label>a) Snitt '+o.k.g1+'</label><input class="koeff-input" id="stat-a" type="number" step="0.1" placeholder="0,0"></div>'
      +'<div class="koeff-felt"><label>b) Median '+o.k.g1+'</label><input class="koeff-input" id="stat-b" type="number" step="0.5" placeholder="0,0"></div>'
      +'<div class="koeff-felt"><label>c) Snitt '+o.k.g2+'</label><input class="koeff-input" id="stat-c" type="number" step="0.1" placeholder="0,0"></div>'
      +'<div class="koeff-felt"><label>d) Median '+o.k.g2+'</label><input class="koeff-input" id="stat-d" type="number" step="0.5" placeholder="0,0"></div>'
      +'</div>';
  }

  // Lineære funksjoner — koeffisienter + brytningspunkt
  if (o.svarType === 'linf_abc') {
    return '<div class="svar-label">Funksjonskoeffisienter:</div>'
      +'<div class="koeff-grid to">'
      +'<div class="koeff-felt"><label>a₁ (Tilbud 1)</label><input class="koeff-input" id="linf-a1" type="number" step="0.01" placeholder="0"></div>'
      +'<div class="koeff-felt"><label>b₁ (Tilbud 1)</label><input class="koeff-input" id="linf-b1" type="number" step="1" placeholder="0"></div>'
      +'<div class="koeff-felt"><label>a₂ (Tilbud 2)</label><input class="koeff-input" id="linf-a2" type="number" step="0.01" placeholder="0"></div>'
      +'<div class="koeff-felt"><label>b₂ (Tilbud 2)</label><input class="koeff-input" id="linf-b2" type="number" step="1" placeholder="0"></div>'
      +'</div>'
      +(o.fasitC !== null ? '<div class="svar-seksjon" style="margin-top:8px"><div class="svar-label">c) Skjæringspunkt — antall '+o.k.xNavn+':</div>'
      +'<input class="svar-input" id="linf-c" type="number" step="1" placeholder="0" style="max-width:150px"></div>' : '');
  }

  // Fallback: åpent tekstfelt
  return '<div class="svar-seksjon"><div class="svar-label">Svar:</div>'
    +'<textarea class="svar-input" id="svar-inp" rows="3" placeholder="Skriv svaret ditt..."></textarea></div>';
}

var suValg = {};
function velgSU(i, sann) {
  suValg[i] = sann;
  var s = document.getElementById('su-' + i + '-s');
  var u = document.getElementById('su-' + i + '-u');
  if (s) { s.className = 'su-btn' + (sann ? ' valgt-sann' : ''); }
  if (u) { u.className = 'su-btn' + (!sann ? ' valgt-usann' : ''); }
}

// ══════════════════════════════════════════════════════════════════
// SJEKK
// ══════════════════════════════════════════════════════════════════

function sjekk(idx) {
  var o = state.oppgaver[idx];
  var fb = document.getElementById('fb');
  var poeng = 0, maxPoeng = o.maxPoeng;
  var melding = '', status = 'feil';

  function hentTall(id) {
    var el = document.getElementById(id);
    return el ? parseFloat(el.value.replace(',','.')) : NaN;
  }
  function hentTekst(id) {
    var el = document.getElementById(id);
    return el ? el.value.trim() : '';
  }
  function sjekkTall(val, fasit, tol) {
    if (isNaN(val)) return false;
    return Math.abs(val - fasit) <= (tol || 0.1);
  }

  // ── SANN/USANN ─────────────────────────────────────────────────
  if (o.svarType === 'sann_usann') {
    var riktige = 0;
    o.påstander.forEach(function(p,i) { if (suValg[i] === p.sann) riktige++; });
    poeng = riktige >= o.påstander.length ? 2 : riktige >= Math.ceil(o.påstander.length/2) ? 1 : 0;
    status = poeng===2?'riktig':poeng===1?'delvis':'feil';
    melding = poeng===2 ? '✓ Alle riktige!' : riktige+' av '+o.påstander.length+' riktige. '+o.kommentar;

  // ── ENKELT TALL ────────────────────────────────────────────────
  } else if (o.svarType === 'tall') {
    var v = hentTall('svar-inp');
    if (isNaN(v)) { fb.className='fb feil'; fb.textContent='Skriv inn et tall!'; return; }
    var ok = sjekkTall(v, o.fasit, o.tol);
    poeng = ok ? maxPoeng : 0;
    status = ok ? 'riktig' : 'feil';
    melding = ok ? '✓ Riktig!' : 'Ikke riktig. '+o.kommentar;

  // ── PROGRAMMERING ──────────────────────────────────────────────
  } else if (o.svarType === 'prog_ett_tall') {
    var va = o.fasitA_tekst ? hentTekst('prog-a') : hentTall('prog-a');
    var okA = o.fasitA_tekst
      ? (hentTekst('prog-a').length > 3)
      : sjekkTall(hentTall('prog-a'), o.fasitA, o.tolA||0);
    poeng = okA ? 2 : 0;
    status = okA ? 'riktig' : 'feil';
    melding = okA ? '✓ Riktig! Fasit: '+o.løsning : 'Fasit: '+o.løsning;

  } else if (o.svarType === 'prog_to_tall') {
    var okA2 = sjekkTall(hentTall('prog-a'), o.fasitA, o.tolA||0);
    var okB2 = sjekkTall(hentTall('prog-b'), o.fasitB, o.tolB||0);
    poeng = (okA2?1:0) + (okB2?1:0);
    status = poeng===2?'riktig':poeng===1?'delvis':'feil';
    melding = (okA2?'a) ✓ ':('a) Fasit: '+o.fasitA+' ')) + (okB2?'b) ✓':('b) Fasit: '+o.fasitB));

  } else if (o.svarType === 'prog_tekst_tall') {
    var fasitATekst = o.fasitA_tekst || '';
    var okA3 = fasitATekst
      ? hentTekst('prog-a') === fasitATekst || (o.erRettvinklet !== undefined &&
          hentTekst('prog-a').toLowerCase().includes(o.erRettvinklet ? 'rett' : 'ikke'))
      : sjekkTall(hentTall('prog-a'), o.fasitA, o.tolA||0);
    var okB3 = hentTekst('prog-b').length > 5;
    poeng = (okA3?1:0) + (okB3?1:0);
    status = poeng===2?'riktig':poeng===1?'delvis':'feil';
    melding = (okA3?'a) ✓ ':('a) Fasit: '+(fasitATekst||o.fasitA)+' '))
      + (okB3?'b) ✓ Bra forklaring!':'b) Skriv en forklaring.');

  // ── PRIS/TILBUD ────────────────────────────────────────────────
  } else if (o.svarType === 'pris_tilbud') {
    var priserRiktige = 0;
    o.tilbud.forEach(function(t,i) {
      var v = hentTall('pris-'+i);
      if (sjekkTall(v, t.pris, 0.1)) priserRiktige++;
    });
    var bestV = hentTall('pris-best');
    var bestOk = !isNaN(bestV) && bestV === o.fasitBest;
    poeng = priserRiktige + (bestOk?1:0);
    if (poeng > maxPoeng) poeng = maxPoeng;
    status = poeng===maxPoeng?'riktig':poeng>0?'delvis':'feil';
    melding = priserRiktige+'/'+o.tilbud.length+' priser riktige. '+(bestOk?'Beste tilbud ✓':'Beste tilbud: '+o.fasitBest)+'. '+o.kommentar;

  // ── EKSPONENTIELL ABC ──────────────────────────────────────────
  } else if (o.svarType === 'eksp_abc') {
    var tekA = hentTekst('eksp-a');
    var okA_e = tekA.length > 10;
    var okB_e = sjekkTall(hentTall('eksp-b'), o.fasitB, o.tol||50);
    var okC_e = sjekkTall(hentTall('eksp-c'), o.fasitC, 1);
    poeng = (okA_e?1:0) + (okB_e?1:0) + (okC_e?1:0);
    status = poeng===3?'riktig':poeng>0?'delvis':'feil';
    melding = 'a) '+(okA_e?'✓':('Skriv hva startverdi, vekstfaktor og x betyr.'))+' '
      +'b) '+(okB_e?'✓':('Fasit: '+o.fasitB.toLocaleString('no')))+' '
      +'c) '+(okC_e?'✓':('Fasit: '+o.fasitC+' perioder'));

  // ── SANNSYNLIGHET ABC ──────────────────────────────────────────
  } else if (o.svarType === 'sann_abc') {
    var okA_s = sjekkTall(hentTall('sann-a'), o.fasitA, o.tolA||0.02);
    var okB_s = sjekkTall(hentTall('sann-b'), o.fasitB, o.tolB||0.02);
    var okC_s = sjekkTall(hentTall('sann-c'), o.fasitC, o.tolC||0.02);
    poeng = (okA_s?1:0) + (okB_s?1:0) + (okC_s?1:0);
    status = poeng===3?'riktig':poeng>0?'delvis':'feil';
    melding = 'a) '+(okA_s?'✓':('Fasit: '+o.fasitA.toFixed(2)))+' '
      +'b) '+(okB_s?'✓':('Fasit: '+o.fasitB.toFixed(2)))+' '
      +'c) '+(okC_s?'✓':('Fasit: '+o.fasitC.toFixed(2)));

  // ── STATISTIKK ABCD ────────────────────────────────────────────
  } else if (o.svarType === 'stat_abcd') {
    var tol_s = o.tol || 0.15;
    var okA_st = sjekkTall(hentTall('stat-a'), o.fasitA, tol_s);
    var okB_st = sjekkTall(hentTall('stat-b'), o.fasitB, 0.5);
    var okC_st = sjekkTall(hentTall('stat-c'), o.fasitC, tol_s);
    var okD_st = sjekkTall(hentTall('stat-d'), o.fasitD, 0.5);
    poeng = (okA_st?1:0)+(okB_st?1:0)+(okC_st?1:0)+(okD_st?1:0);
    status = poeng===4?'riktig':poeng>0?'delvis':'feil';
    melding = 'a) '+(okA_st?'✓':('Fasit: '+o.fasitA))+' '
      +'b) '+(okB_st?'✓':('Fasit: '+o.fasitB))+' '
      +'c) '+(okC_st?'✓':('Fasit: '+o.fasitC))+' '
      +'d) '+(okD_st?'✓':('Fasit: '+o.fasitD));

  // ── LINEÆRE FUNKSJONER ─────────────────────────────────────────
  } else if (o.svarType === 'linf_abc') {
    var tol_l = o.tol || 0.1;
    var okA1 = sjekkTall(hentTall('linf-a1'), o.fasitA1, tol_l);
    var okB1 = sjekkTall(hentTall('linf-b1'), o.fasitB1, tol_l);
    var okA2 = sjekkTall(hentTall('linf-a2'), o.fasitA2, tol_l);
    var okB2 = sjekkTall(hentTall('linf-b2'), o.fasitB2, tol_l);
    var delABPoeng = ((okA1&&okB1)?1:0) + ((okA2&&okB2)?1:0);
    var okC_l = o.fasitC !== null ? sjekkTall(hentTall('linf-c'), o.fasitC, 1) : true;
    poeng = delABPoeng + (okC_l?2:0);
    if (poeng > maxPoeng) poeng = maxPoeng;
    status = poeng===maxPoeng?'riktig':poeng>0?'delvis':'feil';
    melding = 'f₁: a='+(okA1?'✓':o.fasitA1)+' b='+(okB1?'✓':o.fasitB1)+'. '
      +'f₂: a='+(okA2?'✓':o.fasitA2)+' b='+(okB2?'✓':o.fasitB2)+'. '
      +(o.fasitC!==null?'Skjæring: '+(okC_l?'✓':'Fasit: '+o.fasitC+' '+o.k.xNavn):'');

  } else {
    // Fallback åpen
    var txt = hentTekst('svar-inp');
    poeng = txt.length > 10 ? Math.ceil(maxPoeng * 0.5) : 0;
    status = poeng > 0 ? 'delvis' : 'feil';
    melding = poeng > 0 ? '📝 Registrert. '+o.kommentar : 'Skriv et svar.';
  }

  state.svar[idx] = { poeng: poeng, maxPoeng: maxPoeng, status: status, besvart: true };
  suValg = {};
  fb.className = 'fb ' + status;
  fb.innerHTML = melding;
  fb.insertAdjacentHTML('afterend', renderFasit(o, state.svar[idx]));

  var sjekkBtn = document.getElementById('sjekk-btn');
  var nesteBtn = document.getElementById('neste-btn');
  if (sjekkBtn) sjekkBtn.disabled = true;
  if (nesteBtn) nesteBtn.style.display = 'block';

  oppdaterStats();
  oppdaterListe();
  oppdaterProgress();
}

function renderFasit(o, svarInfo) {
  if (!svarInfo) return '';
  var løsning = o.løsning || (o.løsningssteg ? o.løsningssteg.join('\n') : '');
  return '<div class="fasit-boks vis">' +
    '<div class="fasit-tittel">📖 Fasit / fremgangsmåte</div>' +
    '<div style="white-space:pre-line;font-size:.86rem;line-height:1.7">' + løsning + '</div>' +
    '</div>';
}

// ══════════════════════════════════════════════════════════════════
// NAVIGASJON
// ══════════════════════════════════════════════════════════════════

function neste() {
  var n = state.gjeldende + 1;
  if (n >= state.oppgaver.length) {
    gåTilResultat(true);
  } else {
    renderOppgave(n);
  }
}

function gåTilOppgave(idx) {
  renderOppgave(idx);
}

function gåTilResultat(visDirekte) {
  var fp = lastFremgang();
  var antall = fp.antallGanger || 1;

  var totPoeng = 0, totMax = 0;
  var del1Poeng = 0, del1Max = 0;
  var del2Poeng = 0, del2Max = 0;

  state.oppgaver.forEach(function(o, i) {
    totMax += o.maxPoeng;
    if (o.del === 1) del1Max += o.maxPoeng;
    else del2Max += o.maxPoeng;
    if (state.svar[i]) {
      totPoeng += state.svar[i].poeng;
      if (o.del === 1) del1Poeng += state.svar[i].poeng;
      else del2Poeng += state.svar[i].poeng;
    }
  });

  var pst = totMax > 0 ? Math.round(totPoeng/totMax*100) : 0;
  var kar = pst >= 92 ? 6 : pst >= 79 ? 5 : pst >= 60 ? 4 : pst >= 41 ? 3 : pst >= 23 ? 2 : 1;

  // Lagre resultat
  fp.historikk = fp.historikk || [];
  fp.historikk.push({ dato: new Date().toISOString(), poeng: totPoeng, max: totMax, pst, karakter: kar });
  lagreFremgang(fp);

  document.getElementById('app').style.display = 'none';
  document.getElementById('modus-velger').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  var res = document.getElementById('resultat');
  res.style.display = 'block';

  document.getElementById('res-score').textContent = totPoeng + ' / ' + totMax;
  document.getElementById('res-karakter').textContent = 'Karakter ' + kar;
  document.getElementById('res-del1').textContent = del1Poeng + '/' + del1Max;
  document.getElementById('res-del2').textContent = del2Poeng + '/' + del2Max;
  document.getElementById('res-pst').textContent = pst + '%';
  document.getElementById('res-ganger').textContent = antall;
}

// ══════════════════════════════════════════════════════════════════
// UI-HJELPERE
// ══════════════════════════════════════════════════════════════════

function oppdaterListe() {
  var liste = document.getElementById('liste');
  liste.innerHTML = '';
  var del1 = state.oppgaver.filter(function(o){return o.del===1;});
  var del2 = state.oppgaver.filter(function(o){return o.del===2;});

  function renderSeksjon(label, oppgaver) {
    if (!oppgaver.length) return;
    var sek = document.createElement('div');
    sek.className = 'liste-seksjon';
    sek.textContent = label;
    liste.appendChild(sek);
    oppgaver.forEach(function(o) {
      var i = o._idx;
      var sv = state.svar[i];
      var knapp = document.createElement('button');
      knapp.className = 'liste-knapp' +
        (i===state.gjeldende?' aktiv':'') +
        (sv && sv.status==='riktig'?' besvart':'') +
        (sv && sv.status==='feil'?' feil':'');
      knapp.onclick = (function(idx){return function(){gåTilOppgave(idx);};})(i);

      var merkingHtml = '';
      if (o.merking==='lavt') merkingHtml='<span class="oppg-merking merking-lavt">🍎</span>';
      else if (o.merking==='viktig') merkingHtml='<span class="oppg-merking merking-viktig">⭐</span>';

      knapp.innerHTML =
        '<span class="oppg-nr">' + (i+1) + '.</span>' +
        '<span class="oppg-ikon">' + (sv ? (sv.status==='riktig'?'✓':sv.status==='delvis'?'~':'✗') : '○') + '</span>' +
        '<span>' + temaLabel(o) + '</span>' +
        merkingHtml;
      liste.appendChild(knapp);
    });
  }

  if (del1.length) renderSeksjon('Del 1 – uten hjelpemidler', del1);
  if (del2.length) renderSeksjon('Del 2 – med hjelpemidler', del2);
}

function oppdaterStats() {
  var totPoeng = 0, totMax = 0, besvart = 0;
  state.oppgaver.forEach(function(o, i) {
    totMax += o.maxPoeng;
    if (state.svar[i]) { totPoeng += state.svar[i].poeng; besvart++; }
  });
  document.getElementById('st-poeng').textContent = totPoeng;
  document.getElementById('st-max').textContent = totMax;
  document.getElementById('st-besvart').textContent = besvart;
}

function oppdaterProgress() {
  var tot = state.oppgaver.length;
  var besvart = Object.keys(state.svar).length;
  var pst = tot > 0 ? Math.round(besvart/tot*100) : 0;
  document.getElementById('prog-tekst').textContent = 'Oppgave ' + (state.gjeldende+1) + ' av ' + tot;
  document.getElementById('prog-pst').textContent = pst + '%';
  document.getElementById('progress-fill').style.width = pst + '%';
}

function byttDel(del, knapp) {
  document.querySelectorAll('.modus-tab').forEach(function(t){t.classList.remove('aktiv');});
  knapp.classList.add('aktiv');
  startØkt(del);
}

function nyØkt() {
  document.getElementById('app').style.display = 'grid';
  document.getElementById('modus-velger').style.display = 'flex';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('resultat').style.display = 'none';
  var fp = lastFremgang();
  fp.antallGanger = (fp.antallGanger || 0) + 1;
  lagreFremgang(fp);
  document.getElementById('st-runde').textContent = fp.antallGanger;
  startØkt(state.del);
}

function startØkt(del) {
  state.del = del;
  state.oppgaver = byggOppgaver(del);
  state.gjeldende = 0;
  state.svar = {};
  suValg = {};
  oppdaterStats();
  renderOppgave(0);
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', function() {
  var fp = lastFremgang();
  fp.antallGanger = (fp.antallGanger || 0) + 1;
  lagreFremgang(fp);
  document.getElementById('st-runde').textContent = fp.antallGanger;
  startØkt(1);
});

</script>
</body>
</html>
