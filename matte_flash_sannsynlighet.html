<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Flashcards: Sannsynlighet og statistikk</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f1a;--surface:#13152a;--card:#181b2e;--border:rgba(139,92,246,.12);--text:#eef0ff;--dim:rgba(238,240,255,.38);--accent:#a78bfa;--accent2:#38bdf8;--accent3:#34d399;--font-d:'Lora',serif;--font-b:'DM Sans',sans-serif;}
html{height:100%}body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(139,92,246,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.025) 1px,transparent 1px);background-size:32px 32px;}
nav{position:sticky;top:0;z-index:500;background:rgba(13,15,26,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;}
.nav-lnk{font-size:.8rem;color:var(--dim);text-decoration:none}.nav-lnk:hover{color:var(--text)}.nav-sep{color:rgba(255,255,255,.12)}
.nav-tittel{font-family:var(--font-d);font-size:.88rem;color:var(--accent)}
.wrapper{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:28px 20px 80px;}
.hero{text-align:center;padding:28px 0 24px}
.hero h1{font-family:var(--font-d);font-size:1.6rem;color:var(--text);margin-bottom:6px}
.hero p{font-size:.88rem;color:var(--dim)}
.teller-rad{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:.82rem;color:var(--dim);}
.teller-rad strong{color:var(--text)}
.fremgang{height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:24px;overflow:hidden;}
.fremgang-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s;}
/* FLIPCARD */
.scene{width:100%;perspective:1000px;margin-bottom:20px;cursor:pointer;}
.card{width:100%;min-height:260px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;width:100%;min-height:260px;backface-visibility:hidden;border-radius:20px;padding:32px 28px;display:flex;flex-direction:column;justify-content:center;}
.front{background:var(--card);border:1px solid var(--border);}
.front::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(139,92,246,.06),transparent);pointer-events:none;}
.back{background:var(--surface);border:1px solid rgba(56,189,248,.15);transform:rotateY(180deg);}
.back::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(56,189,248,.05),transparent);pointer-events:none;}
.flip-hint{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;}
.begrep{font-family:var(--font-d);font-size:1.5rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.3;}
.formel{font-size:1.05rem;color:var(--accent);font-family:var(--font-d);margin-bottom:8px;}
.kategori{font-size:.72rem;color:var(--dim);margin-top:auto}
.back-innhold{font-size:.9rem;line-height:1.8;color:rgba(238,240,255,.8)}
.back-innhold strong{color:var(--accent2)}
.eks{margin-top:10px;padding:10px 14px;background:rgba(56,189,248,.06);border-left:2px solid rgba(56,189,248,.2);border-radius:0 8px 8px 0;font-size:.82rem;color:var(--dim);}
/* Navigasjon */
.nav-rad{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px;}
.nb{padding:11px 22px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--dim);font-family:var(--font-b);font-size:.88rem;cursor:pointer;transition:all .18s;}
.nb:hover:not(:disabled){border-color:rgba(139,92,246,.35);color:var(--text);background:rgba(139,92,246,.07)}.nb:disabled{opacity:.3;cursor:default}
.nb.prim{background:rgba(139,92,246,.18);border-color:rgba(139,92,246,.3);color:var(--accent);font-weight:600}
.nb.prim:hover{background:rgba(139,92,246,.28)}
/* Sorteringsknapper */
.sort-rad{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.sort-btn{padding:6px 14px;border-radius:16px;font-size:.75rem;font-weight:600;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer;transition:all .18s;}
.sort-btn.ak{border-color:rgba(139,92,246,.3);color:var(--accent);background:rgba(139,92,246,.1)}
.sort-btn:hover{border-color:rgba(139,92,246,.25);color:var(--text)}
</style>
</head>
<body>
<nav>
<a href="matte_hub.html" class="nav-lnk">📐 Matematikk</a>
<span class="nav-sep">/</span>
<span class="nav-tittel">Flashcards: Sannsynlighet og statistikk</span>
</nav>
<div class="wrapper">
<div class="hero">
<h1>🃏 Flashcards: Sannsynlighet og statistikk</h1>
<p>Sannsynlighetsberegning og statistiske metoder</p>
</div>
<div class="sort-rad"><button class="sort-btn ak" data-kat="alle" onclick="filtrer('alle')">Alle</button><button class="sort-btn" data-kat="Sannsynlighet" onclick="filtrer('Sannsynlighet')">Sannsynlighet</button><button class="sort-btn" data-kat="Kombinatorikk" onclick="filtrer('Kombinatorikk')">Kombinatorikk</button><button class="sort-btn" data-kat="Statistikk" onclick="filtrer('Statistikk')">Statistikk</button></div>
<div class="teller-rad">
<span>Kort <span id="teller"><strong>1</strong></span></span>
<button class="nb" onclick="bland()" style="padding:5px 12px;font-size:.75rem">🔀 Bland</button>
</div>
<div class="fremgang"><div class="fremgang-fill" id="fpF"></div></div>
<div class="scene" onclick="flip()">
<div class="card" id="card">
<div class="face front">
<div class="flip-hint">👆 Klikk for å snu</div>
<div class="begrep" id="fBegrep"></div>
<div class="formel" id="fFormel"></div>
<div class="kategori" id="fKat"></div>
</div>
<div class="face back">
<div class="flip-hint">📖 Forklaring</div>
<div class="back-innhold" id="bInnhold"></div>
<div class="eks" id="bEks"></div>
</div>
</div>
</div>
<div class="nav-rad">
<button class="nb" id="forrige" onclick="nav(-1)">← Forrige</button>
<button class="nb prim" id="neste" onclick="nav(1)">Neste →</button>
</div>
</div>
<script>
var KORT=[], vis=[], aktivt=0;
function init(k){KORT=k;vis=k.map(function(_,i){return i;});oppdater();visKort();}
function visKort(){
  var k=KORT[vis[aktivt]];
  var c=document.getElementById('card');
  if(c.classList.contains('flipped'))c.classList.remove('flipped');
  document.getElementById('fBegrep').innerHTML=k.begrep||'';
  document.getElementById('fFormel').innerHTML=k.formel||'';
  document.getElementById('fKat').textContent=k.kategori||'';
  document.getElementById('bInnhold').innerHTML=k.forklaring||'';
  document.getElementById('bEks').innerHTML=k.eks?'Eks: '+k.eks:'';
  oppdater();
}
function flip(){document.getElementById('card').classList.toggle('flipped');}
function nav(d){aktivt+=d;if(aktivt<0)aktivt=vis.length-1;if(aktivt>=vis.length)aktivt=0;visKort();}
function oppdater(){
  var n=vis.length;
  document.getElementById('teller').innerHTML='<strong>'+(aktivt+1)+'</strong> / '+n;
  document.getElementById('fpF').style.width=((aktivt+1)/n*100)+'%';
  document.getElementById('forrige').disabled=false;
  document.getElementById('neste').disabled=false;
}
function bland(){vis=vis.slice().sort(function(){return Math.random()-.5;});aktivt=0;visKort();}
function filtrer(kat){
  if(kat==='alle'){vis=KORT.map(function(_,i){return i;});}
  else{vis=[];KORT.forEach(function(k,i){if(k.kategori===kat)vis.push(i);});}
  if(vis.length===0)vis=KORT.map(function(_,i){return i;});
  aktivt=0;
  document.querySelectorAll('.sort-btn').forEach(function(b){b.classList.toggle('ak',b.dataset.kat===kat);});
  visKort();
}
</script>
<script>init([
  {begrep:'Sannsynlighet',formel:'P(A) = gunstige / totale',forklaring:'Tall mellom 0 og 1 som angir hvor sannsynlig en hendelse er. 0=umulig, 1=sikker.',eks:'Kron på mynt: P=1/2=0,5',kategori:'Sannsynlighet'},
  {begrep:'Komplement',formel:'P(Aᶜ) = 1 − P(A)',forklaring:'Sannsynligheten for at hendelsen IKKE inntreffer.',eks:'P(regn)=0,3 → P(ikke regn)=0,7',kategori:'Sannsynlighet'},
  {begrep:'Multiplikasjonsregel (uavh.)',formel:'P(A∩B) = P(A)·P(B)',forklaring:'For uavhengige hendelser: sannsynligheten for at begge inntreffer.',eks:'To terninger: P(6,6)=1/36',kategori:'Sannsynlighet'},
  {begrep:'Addisjonsregel',formel:'P(A∪B)=P(A)+P(B)−P(A∩B)',forklaring:'Sannsynligheten for at A eller B inntreffer.',eks:'Kast en terning: P(2 eller 3)=2/6',kategori:'Sannsynlighet'},
  {begrep:'Betinget sannsynlighet',formel:'P(A|B) = P(A∩B)/P(B)',forklaring:'Sannsynligheten for A gitt at B allerede har inntruffet.',eks:'P(trukket ess | trekker fra 52 kort)=4/52',kategori:'Sannsynlighet'},
  {begrep:'Kombinatorikk',formel:'',forklaring:'Telle antall mulige utfall. Multiplikasjonsprinsippet: m · n · p · … muligheter.',eks:'3 skjorter og 4 bukser: 12 antrekk',kategori:'Kombinatorikk'},
  {begrep:'Permutasjon',formel:'nPr = n! / (n−r)!',forklaring:'Antall måter å ordne r elementer fra n, der rekkefølgen teller.',eks:'4 av 10 i rekke: 10·9·8·7=5040',kategori:'Kombinatorikk'},
  {begrep:'Gjennomsnitt',formel:'x̄ = Σxᵢ / n',forklaring:'Summen av alle verdiene delt på antallet. Sensitiv for ekstreme verdier.',eks:'(2+5+8+9)/4 = 6',kategori:'Statistikk'},
  {begrep:'Median',formel:'',forklaring:'Midterste verdi etter sortering. Robust mot ekstreme verdier (uteliggere).',eks:'2,3,5,7,9: median = 5',kategori:'Statistikk'},
  {begrep:'Typetall (modus)',formel:'',forklaring:'Verdien som forekommer flest ganger i datasettet.',eks:'3,5,5,7,8: typetall = 5',kategori:'Statistikk'},
  {begrep:'Standardavvik',formel:'',forklaring:'Mål for spredning – gjennomsnittlig avstand fra gjennomsnittet. Lavt: data er samlet.',eks:'σ = 2 betyr data typisk ±2 fra snitt',kategori:'Statistikk'},
  {begrep:'Kvartilavstand (IQR)',formel:'IQR = Q3 − Q1',forklaring:'Spredningen i midtre 50 % av dataene. Q1=nedre kvartil, Q3=øvre kvartil.',eks:'Q1=10, Q3=25 → IQR=15',kategori:'Statistikk'},
  {begrep:'Boksplott',formel:'',forklaring:'Diagram som viser min, Q1, median, Q3 og maks. Kompakt oppsummering av datasett.',eks:'Fin til å sammenligne to grupper',kategori:'Statistikk'},
  {begrep:'Relativ frekvens',formel:'f = antall ganger / totalt antall',forklaring:'Andelen av forsøk der en hendelse inntreffer. Nærmer seg P(A) ved mange forsøk.',eks:'500 av 1000 kast er kron: f=0,5',kategori:'Sannsynlighet'},
  {begrep:'Sannsynlighetstre',formel:'',forklaring:'Diagram som viser alle mulige utfall og sannsynligheter i et sammensatt forsøk.',eks:'To myntkast: kk, ks, sk, ss',kategori:'Sannsynlighet'},
  {begrep:'Representativt utvalg',formel:'',forklaring:'Et utvalg som er representativt for hele populasjonen. Nødvendig for generaliserbare konklusjoner.',eks:'Tilfeldig utvalg fra alle elever på skolen',kategori:'Statistikk'},
  {begrep:'Bias',formel:'',forklaring:'Systematisk skjevhet i utvalget som gir resultater som ikke representerer populasjonen.',eks:'Spørre bare fotballfans om favorittidrett',kategori:'Statistikk'},
  {begrep:'Histogram',formel:'',forklaring:'Søylediagram for kontinuerlig data i intervaller. Søylenes areal er proporsjonal med frekvensen.',eks:'Fordeling av karakterer 0–6',kategori:'Statistikk'},
]);</script>
