<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SkapLab – Flashcards – Sannsynlighet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d14;--bg2:#0f1320;--card:#141929;--card2:#1a2035;
  --text:#e8edff;--dim:#6b7a99;--bla:#60a5fa;--gron:#34d399;
  --gul:#fbbf24;--lilla:#a78bfa;--border:rgba(255,255,255,.07);
  --font-h:'Syne',sans-serif;--font-b:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;padding:0 0 60px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.hdr-back{color:var(--dim);text-decoration:none;font-size:.85rem;padding:5px 12px;border:1px solid var(--border);border-radius:20px}
.hdr-back:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.hdr-tittel{font-family:var(--font-h);font-size:1.1rem;font-weight:800;flex:1}
.hdr-teller{font-size:.8rem;color:var(--dim)}
.kontroller{max-width:1100px;margin:24px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.fil-btn{background:var(--card);border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:var(--font-b)}
.fil-btn.ak{background:rgba(96,165,250,.15);border-color:var(--bla);color:var(--bla)}
.fil-btn:hover{color:var(--text)}
.sok{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;font-size:.82rem;outline:none;min-width:220px;font-family:var(--font-b)}
.sok:focus{border-color:rgba(96,165,250,.4)}
.bland-btn{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);color:var(--bla);padding:6px 16px;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:var(--font-b)}
.bland-btn:hover{background:rgba(96,165,250,.2)}
.grid{max-width:1100px;margin:24px auto 0;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.flip-scene{perspective:900px;height:180px}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);cursor:pointer;border-radius:14px}
.flip-card.flippet{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;justify-content:space-between}
.flip-front{background:var(--card);border:1px solid var(--border)}
.flip-back{background:var(--card2);border:1px solid rgba(96,165,250,.2);transform:rotateY(180deg)}
.flip-front:hover{border-color:rgba(255,255,255,.15)}
.kort-topp{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.kort-nr{font-size:.68rem;color:var(--dim);font-weight:600}
.kort-kat{font-size:.68rem;background:rgba(96,165,250,.1);color:var(--bla);padding:2px 8px;border-radius:20px;font-weight:600}
.kort-begrep{font-family:var(--font-h);font-size:1.05rem;font-weight:800;color:var(--text);flex:1;display:flex;align-items:center;line-height:1.3}
.kort-formel{font-family:'Courier New',monospace;font-size:.82rem;color:var(--gron);background:rgba(52,211,153,.08);padding:4px 10px;border-radius:6px;margin-top:4px}
.kort-hint{font-size:.68rem;color:var(--dim);text-align:right}
.kort-forkl{font-size:.82rem;color:var(--text);line-height:1.55;flex:1}
.kort-eks{font-size:.74rem;color:var(--gul);margin-top:8px;font-style:italic}
.ingen{grid-column:1/-1;text-align:center;padding:40px;color:var(--dim)}
</style>
</head>
<body>
<div class="hdr">
  <a class="hdr-back" href="matte_hub.html">← Tilbake</a>
  <div class="hdr-tittel">🃏 Flashcards – Sannsynlighet</div>
  <span class="hdr-teller" id="teller"></span>
</div>
<div class="kontroller">
  <button class="fil-btn ak" data-kat="alle" onclick="filtrer('alle',this)">Alle</button>
  <button class="fil-btn" data-kat="Sannsynlighet" onclick="filtrer('Sannsynlighet',this)">Sannsynlighet</button>
  <button class="fil-btn" data-kat="Kombinatorikk" onclick="filtrer('Kombinatorikk',this)">Kombinatorikk</button>
  <button class="fil-btn" data-kat="Statistikk" onclick="filtrer('Statistikk',this)">Statistikk</button>
  <input class="sok" type="text" placeholder="Søk etter begrep..." oninput="sokFn(this.value)" id="sokInput">
  <button class="bland-btn" onclick="bland()">🔀 Bland</button>
</div>
<div class="grid" id="kortGrid">
  <div class="ingen" id="ingenTreff">Ingen begreper matcher søket.</div>
</div>
<script>

<script>
var ALLE_KORT = [];
var AKTIV_KAT = 'alle';
var FLIPPET = new Set();
var SOK = '';

function init(kortArr) {
  ALLE_KORT = kortArr;
  byggKort();
}

function byggKort() {
  var grid = document.getElementById('kortGrid');
  var tom  = document.getElementById('ingenTreff');
  grid.querySelectorAll('.flip-scene').forEach(function(el){el.remove();});

  var sok_l = SOK.toLowerCase();
  var synlige = ALLE_KORT.filter(function(k) {
    var katOk = AKTIV_KAT === 'alle' || k.kategori === AKTIV_KAT;
    var sokOk = !sok_l || (k.begrep||'').toLowerCase().includes(sok_l) || (k.forklaring||'').toLowerCase().includes(sok_l);
    return katOk && sokOk;
  });

  document.getElementById('teller').textContent = synlige.length + ' kort';
  tom.style.display = synlige.length === 0 ? 'block' : 'none';

  synlige.forEach(function(k, idx) {
    var nr = ALLE_KORT.indexOf(k);
    var flippet = FLIPPET.has(nr);
    var scene = document.createElement('div');
    scene.className = 'flip-scene';
    scene.style.animationDelay = (idx * 25) + 'ms';

    var formelHtml = k.formel ? '<div class="kort-formel">' + k.formel + '</div>' : '';
    var eksHtml    = k.eks    ? '<div class="kort-eks">Eks: ' + k.eks + '</div>' : '';

    scene.innerHTML =
      '<div class="flip-card' + (flippet ? ' flippet' : '') + '" onclick="flipKort(this,' + nr + ')">' +
        '<div class="flip-front">' +
          '<div class="kort-topp">' +
            '<span class="kort-nr">#' + (idx + 1) + '</span>' +
            '<span class="kort-kat">' + (k.kategori || '') + '</span>' +
          '</div>' +
          '<div class="kort-begrep">' + (k.begrep || '') + '</div>' +
          formelHtml +
          '<div class="kort-hint">Klikk for forklaring ▸</div>' +
        '</div>' +
        '<div class="flip-back">' +
          '<div class="kort-forkl">' + (k.forklaring || '') + '</div>' +
          eksHtml +
        '</div>' +
      '</div>';

    grid.appendChild(scene);
  });
}

function flipKort(el, nr) {
  el.classList.toggle('flippet');
  if (el.classList.contains('flippet')) FLIPPET.add(nr);
  else FLIPPET.delete(nr);
}

function filtrer(kat, btn) {
  AKTIV_KAT = kat;
  document.querySelectorAll('.fil-btn').forEach(function(b) {
    b.classList.toggle('ak', b.dataset.kat === kat);
  });
  byggKort();
}

function sokFn(v) {
  SOK = v;
  byggKort();
}

function bland() {
  ALLE_KORT = ALLE_KORT.slice().sort(function() { return Math.random() - .5; });
  byggKort();
}
</script>
