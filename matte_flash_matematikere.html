<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkapLab – Flashcards: 20 viktige matematikere</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f1a;--surface:#13152a;--card:#181b2e;--border:rgba(139,92,246,.12);--text:#eef0ff;--dim:rgba(238,240,255,.38);--accent:#a78bfa;--accent2:#38bdf8;--accent3:#34d399;--font-d:'Lora',serif;--font-b:'DM Sans',sans-serif;}
html{height:100%}body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(139,92,246,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.025) 1px,transparent 1px);background-size:32px 32px;}
nav{position:sticky;top:0;z-index:500;background:rgba(13,15,26,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;}
.nav-lnk{font-size:.8rem;color:var(--dim);text-decoration:none}.nav-lnk:hover{color:var(--text)}.nav-sep{color:rgba(255,255,255,.12)}
.nav-tittel{font-family:var(--font-d);font-size:.88rem;color:var(--accent)}
.wrapper{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:28px 20px 80px;}
.hero{text-align:center;padding:28px 0 24px}
.hero h1{font-family:var(--font-d);font-size:1.6rem;color:var(--text);margin-bottom:6px}
.hero p{font-size:.88rem;color:var(--dim)}
.teller-rad{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:.82rem;color:var(--dim);}
.teller-rad strong{color:var(--text)}
.fremgang{height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:24px;overflow:hidden;}
.fremgang-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s;}
/* FLIPCARD */
.scene{width:100%;perspective:1000px;margin-bottom:20px;cursor:pointer;}
.card{width:100%;min-height:260px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;width:100%;min-height:260px;backface-visibility:hidden;border-radius:20px;padding:32px 28px;display:flex;flex-direction:column;justify-content:center;}
.front{background:var(--card);border:1px solid var(--border);}
.front::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(139,92,246,.06),transparent);pointer-events:none;}
.back{background:var(--surface);border:1px solid rgba(56,189,248,.15);transform:rotateY(180deg);}
.back::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(56,189,248,.05),transparent);pointer-events:none;}
.flip-hint{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;}
.begrep{font-family:var(--font-d);font-size:1.5rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.3;}
.formel{font-size:1.05rem;color:var(--accent);font-family:var(--font-d);margin-bottom:8px;}
.kategori{font-size:.72rem;color:var(--dim);margin-top:auto}
.back-innhold{font-size:.9rem;line-height:1.8;color:rgba(238,240,255,.8)}
.back-innhold strong{color:var(--accent2)}
.eks{margin-top:10px;padding:10px 14px;background:rgba(56,189,248,.06);border-left:2px solid rgba(56,189,248,.2);border-radius:0 8px 8px 0;font-size:.82rem;color:var(--dim);}
/* Navigasjon */
.nav-rad{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px;}
.nb{padding:11px 22px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--dim);font-family:var(--font-b);font-size:.88rem;cursor:pointer;transition:all .18s;}
.nb:hover:not(:disabled){border-color:rgba(139,92,246,.35);color:var(--text);background:rgba(139,92,246,.07)}.nb:disabled{opacity:.3;cursor:default}
.nb.prim{background:rgba(139,92,246,.18);border-color:rgba(139,92,246,.3);color:var(--accent);font-weight:600}
.nb.prim:hover{background:rgba(139,92,246,.28)}
/* Sorteringsknapper */
.sort-rad{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.sort-btn{padding:6px 14px;border-radius:16px;font-size:.75rem;font-weight:600;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer;transition:all .18s;}
.sort-btn.ak{border-color:rgba(139,92,246,.3);color:var(--accent);background:rgba(139,92,246,.1)}
.sort-btn:hover{border-color:rgba(139,92,246,.25);color:var(--text)}
</style>
</head>
<body>
<nav>
<a href="matte_hub.html" class="nav-lnk">📐 Matematikk</a>
<span class="nav-sep">/</span>
<span class="nav-tittel">Flashcards: 20 viktige matematikere</span>
</nav>
<div class="wrapper">
<div class="hero">
<h1>🃏 Flashcards: 20 viktige matematikere</h1>
<p>Fra Euklid til Andrew Wiles</p>
</div>
<div class="sort-rad"><button class="sort-btn ak" data-kat="alle" onclick="filtrer('alle')">Alle</button><button class="sort-btn" data-kat="Antikken" onclick="filtrer('Antikken')">Antikken</button><button class="sort-btn" data-kat="Middelalder" onclick="filtrer('Middelalder')">Middelalder</button><button class="sort-btn" data-kat="1500–1800" onclick="filtrer('1500–1800')">1500–1800</button><button class="sort-btn" data-kat="1800-tallet" onclick="filtrer('1800-tallet')">1800-tallet</button><button class="sort-btn" data-kat="1900-tallet" onclick="filtrer('1900-tallet')">1900-tallet</button></div>
<div class="teller-rad">
<span>Kort <span id="teller"><strong>1</strong></span></span>
<button class="nb" onclick="bland()" style="padding:5px 12px;font-size:.75rem">🔀 Bland</button>
</div>
<div class="fremgang"><div class="fremgang-fill" id="fpF"></div></div>
<div class="scene" onclick="flip()">
<div class="card" id="card">
<div class="face front">
<div class="flip-hint">👆 Klikk for å snu</div>
<div class="begrep" id="fBegrep"></div>
<div class="formel" id="fFormel"></div>
<div class="kategori" id="fKat"></div>
</div>
<div class="face back">
<div class="flip-hint">📖 Forklaring</div>
<div class="back-innhold" id="bInnhold"></div>
<div class="eks" id="bEks"></div>
</div>
</div>
</div>
<div class="nav-rad">
<button class="nb" id="forrige" onclick="nav(-1)">← Forrige</button>
<button class="nb prim" id="neste" onclick="nav(1)">Neste →</button>
</div>
</div>
<script>

// ── SKAPLAB SPORING ──────────────────────────────────────────────
(function() {
  try {
    var _elev = null;
    try { _elev = JSON.parse(localStorage.getItem('skaplab_elev')); } catch(e) {}
    window._skaplab_logg = function(ressurs, km_kode, score_pst, antall, riktige) {
      if (!_elev || !_elev.id) return;
      fetch('https://cqzmzsqhuawpsvnjjzse.supabase.co/rest/v1/aktivitet', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j',
          'Authorization': 'Bearer sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j'
        },
        body: JSON.stringify({
          elev_id: _elev.id,
          ressurs: ressurs,
          km_kode: km_kode,
          score_pst: Math.round(score_pst || 0),
          antall_oppgaver: antall || null,
          riktige: riktige || null
        })
      }).catch(function() {});
    };
  } catch(e) {}
})();
// ─────────────────────────────────────────────────────────────────
var KORT=[], vis=[], aktivt=0;
function init(k){KORT=k;vis=k.map(function(_,i){return i;});oppdater();visKort();}
function visKort(){
  var k=KORT[vis[aktivt]];
  var c=document.getElementById('card');
  if(c.classList.contains('flipped'))c.classList.remove('flipped');
  document.getElementById('fBegrep').innerHTML=k.begrep||'';
  document.getElementById('fFormel').innerHTML=k.formel||'';
  document.getElementById('fKat').textContent=k.kategori||'';
  document.getElementById('bInnhold').innerHTML=k.forklaring||'';
  document.getElementById('bEks').innerHTML=k.eks?'Eks: '+k.eks:'';
  oppdater();
}
function flip(){document.getElementById('card').classList.toggle('flipped');}
function nav(d){aktivt+=d;if(aktivt<0)aktivt=vis.length-1;if(aktivt>=vis.length)aktivt=0;visKort();}
function oppdater(){
  var n=vis.length;
  document.getElementById('teller').innerHTML='<strong>'+(aktivt+1)+'</strong> / '+n;
  document.getElementById('fpF').style.width=((aktivt+1)/n*100)+'%';
  document.getElementById('forrige').disabled=false;
  document.getElementById('neste').disabled=false;
}
function bland(){vis=vis.slice().sort(function(){return Math.random()-.5;});aktivt=0;visKort();}
function filtrer(kat){
  if(kat==='alle'){vis=KORT.map(function(_,i){return i;});}
  else{vis=[];KORT.forEach(function(k,i){if(k.kategori===kat)vis.push(i);});}
  if(vis.length===0)vis=KORT.map(function(_,i){return i;});
  aktivt=0;
  document.querySelectorAll('.sort-btn').forEach(function(b){b.classList.toggle('ak',b.dataset.kat===kat);});
  visKort();
}

// Spor flashcard-besøk
window.addEventListener('load', function() {
  setTimeout(function() {
    window._skaplab_logg('flash_matematikere', 'MAT-ALG', 100, null, null);
  }, 3000); // Etter 3 sek - eleven har sett noe
});
</script>
<script>init([
  {begrep:'Euklid (ca. 300 f.Kr.)',formel:'',forklaring:'Gresk matematiker, far til geometrien. Skrev \"Elementer\" – et av tidenes mest innflytelsesrike matematikkverk med geometriske bevis.',eks:'Euklids algoritme for GCF brukes ennå',kategori:'Antikken'},
  {begrep:'Pythagoras (ca. 570–495 f.Kr.)',formel:'',forklaring:'Gresk matematiker og filosof. Kjent for Pythagoras\' setning om rettvinklede trekanter.',eks:'a²+b²=c² – bevist for alle rettvinklede trekanter',kategori:'Antikken'},
  {begrep:'Archimedes (ca. 287–212 f.Kr.)',formel:'',forklaring:'Gresk matematiker og ingeniør. Beregnet pi, formulerte prinsippet for oppdrift og fant arealformler.',eks:'π ≈ 22/7 (hans tilnærming)',kategori:'Antikken'},
  {begrep:'Al-Khwarizmi (ca. 780–850)',formel:'',forklaring:'Persisk matematiker, regnes som algebraens far. Ga navn til algoritmen (algoritme = latinisert Khwarizmi).',eks:'Boken \"Al-Jabr\" ga oss ordet algebra',kategori:'Middelalder'},
  {begrep:'Leonardo Fibonacci (1170–1250)',formel:'',forklaring:'Italiensk matematiker som spredte det hindu-arabiske tallsystemet i Europa og oppdaget Fibonacci-tallrekken.',eks:'1, 1, 2, 3, 5, 8, 13, … – i naturen!',kategori:'Middelalder'},
  {begrep:'René Descartes (1596–1650)',formel:'',forklaring:'Fransk filosof og matematiker. Oppfant koordinatsystemet (kartesiske koordinater) og forbandt algebra og geometri.',eks:'x- og y-aksene er oppkalt etter ham',kategori:'1500–1800'},
  {begrep:'Isaac Newton (1643–1727)',formel:'',forklaring:'Engelsk matematiker og fysiker. Co-oppfant differensialregning (kalkulus) og formulerte gravitasjonsloven.',eks:'f(x)=x² → f\'(x)=2x (derivasjon)',kategori:'1500–1800'},
  {begrep:'Gottfried Wilhelm Leibniz (1646–1716)',formel:'',forklaring:'Tysk matematiker. Oppfant kalkulus uavhengig av Newton og introduserte notasjonen dy/dx og ∫.',eks:'Leibniz-notasjonen brukes i matte i dag',kategori:'1500–1800'},
  {begrep:'Carl Friedrich Gauss (1777–1855)',formel:'',forklaring:'Tysk matematiker, \"matematikkens prins\". Bidro til tallteori, statistikk og normalfordelingen.',eks:'Gaussisk normalfordeling (klokkeform)',kategori:'1800-tallet'},
  {begrep:'Leonhard Euler (1707–1783)',formel:'',forklaring:'Sveitsisk matematiker, historiens mest produktive. Innførte e, i, π, f(x)-notasjon og Eulers formel.',eks:'e^(iπ)+1=0 – den vakreste likning',kategori:'1500–1800'},
  {begrep:'Emmy Noether (1882–1935)',formel:'',forklaring:'Tysk matematiker, kjent for banebrytende arbeid i abstrakt algebra og Noethers teorem i fysikk.',eks:'Et av de viktigste resultatene i teoretisk fysikk',kategori:'1900-tallet'},
  {begrep:'Alan Turing (1912–1954)',formel:'',forklaring:'Britisk matematiker og datamaskinpioner. Grunnla informatikken og knakk tyske koder under 2. verdenskrig.',eks:'Turing-maskinen er modellen bak alle datamaskiner',kategori:'1900-tallet'},
  {begrep:'Ada Lovelace (1815–1852)',formel:'',forklaring:'Britisk matematiker, regnes som verdens første programmerer. Skrev algoritmer for Babbages analytiske maskin.',eks:'Programmeringsspråket Ada er oppkalt etter henne',kategori:'1800-tallet'},
  {begrep:'Pierre de Fermat (1607–1665)',formel:'',forklaring:'Fransk matematiker. Kjent for Fermats lille teorem og Fermats siste teorem (bevist 1995 av Wiles).',eks:'xⁿ+yⁿ=zⁿ har ingen heltallsløsning for n>2',kategori:'1500–1800'},
  {begrep:'Blaise Pascal (1623–1662)',formel:'',forklaring:'Fransk matematiker. Grunnla sannsynlighetsteori med Fermat og konstruerte en av de første kalkuleringmaskinene.',eks:'Pascals trekant og binomialkoeffisienter',kategori:'1500–1800'},
  {begrep:'Bernhard Riemann (1826–1866)',formel:'',forklaring:'Tysk matematiker. Utviklet Riemann-geometrien (brukt i Einsteins relativitetsteori) og Riemann-hypotesen.',eks:'Riemanns hypotese er et av Millennium-problemene',kategori:'1800-tallet'},
  {begrep:'John Nash (1928–2015)',formel:'',forklaring:'Amerikansk matematiker. Vant Nobelprisen for spillteori (Nashs likevekt) og ble kjent gjennom filmen \"A Beautiful Mind\".',eks:'Nashs likevekt brukes i økonomi og biologi',kategori:'1900-tallet'},
  {begrep:'Sofya Kovalevskaya (1850–1891)',formel:'',forklaring:'Russisk matematiker, første kvinne med doktorgrad i matematikk. Bidro til differensialligninger og mekanikk.',eks:'Kovalevskaya-toppen i rigid-body-mekanikk',kategori:'1800-tallet'},
  {begrep:'Georg Cantor (1845–1918)',formel:'',forklaring:'Tysk matematiker som grunnla mengdeteorien og beviste at det finnes ulike \"størrelser\" av uendelighet.',eks:'Det er \"flere\" reelle enn rasjonale tall',kategori:'1800-tallet'},
  {begrep:'Andrew Wiles (f. 1953)',formel:'',forklaring:'Britisk matematiker som i 1995 bevis Fermats siste teorem etter 358 år – et av historiens største matematiske gjennombrudd.',eks:'Beviset er 129 sider langt og tok 7 år',kategori:'1900-tallet'},
]);</script>
</body>
</html>
