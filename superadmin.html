<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Superadmin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="core/design.css">
<style>
.admin-wrap { max-width:1100px; margin:0 auto; padding:20px; margin-top:var(--topnav-h); }
.stat-grid  { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
.stat-kort  { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.stat-tall  { font-family:var(--font-h); font-size:2rem; font-weight:900; color:var(--bla); line-height:1; }
.stat-tall.gul { color:var(--gul); }
.stat-tall.gron { color:var(--gron); }
.stat-lbl   { font-size:.74rem; color:var(--dim); margin-top:4px; }
.admin-sek  { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:16px; }
.filter-rad { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.filter-rad input, .filter-rad select { max-width:300px; }
.er-admin-badge { background:rgba(167,139,250,.15); color:var(--lilla); border:1px solid rgba(167,139,250,.3); padding:1px 7px; border-radius:4px; font-size:.68rem; font-weight:700; }
.aktiv-dot { width:8px; height:8px; border-radius:50%; display:inline-block; vertical-align:middle; }
.aktiv-dot.ja { background:var(--gron); }
.aktiv-dot.nei { background:var(--rod); }
@media(max-width:600px){ .stat-grid{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-logo" href="#">Skap<span>Lab</span></a>
  <span class="topnav-badge">Superadmin</span>
  <div class="topnav-right">
    <span class="topnav-bruker" id="sa-bruker"></span>
    <button class="btn btn-ghost btn-sm" onclick="loggUt()">Logg ut</button>
  </div>
</nav>

<div class="admin-wrap">

  <!-- Statistikk -->
  <div class="stat-grid">
    <div class="stat-kort"><div class="stat-tall" id="s-skoler">—</div><div class="stat-lbl">Aktive skoler</div></div>
    <div class="stat-kort"><div class="stat-tall" id="s-laerere">—</div><div class="stat-lbl">Lærere</div></div>
    <div class="stat-kort"><div class="stat-tall" id="s-klasser">—</div><div class="stat-lbl">Klasser</div></div>
    <div class="stat-kort"><div class="stat-tall" id="s-elever">—</div><div class="stat-lbl">Elever</div></div>
    <div class="stat-kort"><div class="stat-tall gul" id="s-aktivitet">—</div><div class="stat-lbl">Besøk (aktivitet)</div></div>
    <div class="stat-kort"><div class="stat-tall gron" id="s-xp">—</div><div class="stat-lbl">Total XP</div></div>
  </div>

  <!-- Faner -->
  <div class="fane-rad" style="margin-bottom:16px">
    <button class="fane-btn ak" data-sa="laerere">Lærere</button>
    <button class="fane-btn" data-sa="skoler">Skoler</button>
    <button class="fane-btn" data-sa="feilrapporter">Feilrapporter</button>
  </div>

  <!-- LÆRERE -->
  <div id="sa-laerere">
    <div class="admin-sek">
      <div class="kort-tittel" style="margin-bottom:12px">Alle lærere</div>
      <div class="filter-rad">
        <input type="search" id="laerer-sok" placeholder="Søk navn eller e-post…">
        <select id="laerer-skole-fil"><option value="">Alle skoler</option></select>
      </div>
      <div class="tabell-wrap">
        <table id="laerer-tabell">
          <thead><tr><th>Navn</th><th>E-post</th><th>Skole</th><th>Klasser</th><th>Admin</th><th></th></tr></thead>
          <tbody id="laerer-tbody"><tr><td colspan="6" class="laster-tekst"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- SKOLER -->
  <div id="sa-skoler" style="display:none">
    <div class="admin-sek">
      <div style="display:flex;align-items:center;margin-bottom:12px">
        <div class="kort-tittel">Alle skoler</div>
        <button class="btn btn-gron btn-sm" id="ny-skole-btn" style="margin-left:auto">+ Ny skole</button>
      </div>
      <div class="tabell-wrap">
        <table>
          <thead><tr><th>Navn</th><th>Kommune</th><th>Fylke</th><th>Lærere</th><th>Status</th><th></th></tr></thead>
          <tbody id="skole-tbody"><tr><td colspan="6" class="laster-tekst"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- FEILRAPPORTER -->
  <div id="sa-feilrapporter" style="display:none">
    <div class="admin-sek">
      <div class="kort-tittel" style="margin-bottom:12px">Feilrapporter</div>
      <div class="tabell-wrap">
        <table>
          <thead><tr><th>Tid</th><th>Side</th><th>Melding</th><th>Status</th><th></th></tr></thead>
          <tbody id="feil-tbody"><tr><td colspan="5" class="laster-tekst"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /admin-wrap -->

<div id="snack-kontainer"></div>

<!-- NY SKOLE MODAL -->
<div class="modal-bg" id="modal-ny-skole">
  <div class="modal modal-smal">
    <div class="modal-tittel">Ny skole</div>
    <button class="modal-lukk" data-lukk="modal-ny-skole">✕</button>
    <div class="felt"><label class="felt-lbl">Skolenavn</label><input type="text" id="ns-navn" placeholder="f.eks. Stovner ungdomsskole"></div>
    <div class="felt"><label class="felt-lbl">Kommune</label><input type="text" id="ns-kommune"></div>
    <div class="felt"><label class="felt-lbl">Fylke</label><input type="text" id="ns-fylke"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-sek" data-lukk="modal-ny-skole">Avbryt</button>
      <button class="btn btn-prim" id="ns-lagre-btn">Opprett</button>
    </div>
  </div>
</div>

<script>
window.SKAPLAB_CONFIG = {
  url: 'https://cqzmzsqhuawpsvnjjzse.supabase.co',
  key: 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j',
};
</script>
<script src="core/auth.js"></script>
<script src="core/api.js"></script>
<script>
'use strict';

const $id = id => document.getElementById(id);

function snack(tekst, type='ok') {
  const div=document.createElement('div');
  div.className=`snack snack-${type}`;
  div.textContent=tekst;
  $id('snack-kontainer').appendChild(div);
  setTimeout(()=>{div.style.opacity='0';div.style.transition='opacity .3s';setTimeout(()=>div.remove(),320);},3500);
}

function datoStr(iso) {
  if(!iso)return'—';
  return new Date(iso).toLocaleString('nb-NO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

async function loggUt() { await Auth.laerer.loggUt(); location.replace('laerer_login.html'); }

document.addEventListener('click', e=>{
  const lukk=e.target.closest('[data-lukk]');
  if(lukk) document.getElementById(lukk.dataset.lukk).classList.remove('vis');
  if(e.target.classList.contains('modal-bg')) e.target.classList.remove('vis');
});

/* ── Faner ─────────────────────────────────────────────── */
document.querySelectorAll('[data-sa]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-sa]').forEach(b=>b.classList.remove('ak'));
    ['laerere','skoler','feilrapporter'].forEach(f=>$id(`sa-${f}`).style.display='none');
    btn.classList.add('ak');
    $id(`sa-${btn.dataset.sa}`).style.display='block';
    if(btn.dataset.sa==='feilrapporter') lastFeilrapporter();
  });
});

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let _laerere=[], _skoler=[], _klasser=[];

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
async function init() {
  if(!Auth.laerer.erInnlogget()){location.replace('laerer_login.html');return;}
  try{
    const uid=await Auth.laerer.uid();
    const lData=await Api.laerere.hentEn(uid);
    const laerer=Array.isArray(lData)?lData[0]:lData;

    if(!laerer?.er_admin){
      document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:sans-serif;color:#e0e8ff;background:#07090f">
        <div style="font-size:2rem">🔒</div><div style="font-size:1.1rem;font-weight:700">Ingen tilgang</div>
        <div style="color:rgba(255,255,255,.5);font-size:.85rem">Du er ikke superadmin.</div>
        <a href="laerer_login.html" style="color:#60a5fa">← Tilbake</a></div>`;
      return;
    }

    $id('sa-bruker').textContent=laerer.fullt_navn||'';

    // Hent alt parallelt
    const [lRes,sRes,kRes,eRes,aktRes,xpRes] = await Promise.all([
      Api.laerere.hentAlle(),
      Api.skoler.hentAlleInkludertInaktive(),
      Api._kall('/klasser?select=id,navn,laerer_id',{method:'GET'}),
      Api._kall('/elever?aktiv=eq.true&select=id,klasse_id',{method:'GET'}),
      Api.aktivitet.hentAntall(5000).catch(()=>[]),
      Api._kall('/adaptiv_progresjon?select=xp',{method:'GET'}).catch(()=>[]),
    ]);

    _laerere=lRes||[];
    _skoler=sRes||[];
    _klasser=Array.isArray(kRes)?kRes:[];
    const elever=Array.isArray(eRes)?eRes:[];
    const aktivitet=Array.isArray(aktRes)?aktRes:[];
    const xpData=Array.isArray(xpRes)?xpRes:[];

    // Statistikk
    $id('s-skoler').textContent=_skoler.filter(s=>s.aktiv).length;
    $id('s-laerere').textContent=_laerere.length;
    $id('s-klasser').textContent=_klasser.length;
    $id('s-elever').textContent=elever.length;
    $id('s-aktivitet').textContent=aktivitet.length>=5000?'5000+':aktivitet.length;
    $id('s-xp').textContent=xpData.reduce((s,r)=>s+(r.xp||0),0).toLocaleString('nb-NO');

    fyllSkoleSel();
    byggLaererTabell(_laerere);
    byggSkoleTabell(_skoler);

  }catch(err){
    if(err?.type==='ingen_sesjon'||err?.type==='utlopt') location.replace('laerer_login.html');
    else snack('Feil: '+(err.message||''),'err');
  }
}

/* ── Skole-select i filter ──────────────────────────────── */
function fyllSkoleSel(){
  const sel=$id('laerer-skole-fil');
  _skoler.forEach(s=>{
    const o=document.createElement('option'); o.value=s.id; o.textContent=s.navn; sel.appendChild(o);
  });
}

/* ── Filter ─────────────────────────────────────────────── */
function filtrerLaerere(){
  const tekst=$id('laerer-sok').value.toLowerCase();
  const skoleId=$id('laerer-skole-fil').value;
  byggLaererTabell(_laerere.filter(l=>{
    const nm=(l.fullt_navn||'').toLowerCase().includes(tekst)||(l.epost||'').toLowerCase().includes(tekst);
    const sk=!skoleId||l.skole_id===skoleId;
    return nm&&sk;
  }));
}
$id('laerer-sok').addEventListener('input',filtrerLaerere);
$id('laerer-skole-fil').addEventListener('change',filtrerLaerere);

/* ── Bygg lærertabell ───────────────────────────────────── */
function byggLaererTabell(liste){
  const tbody=$id('laerer-tbody');
  if(!liste.length){tbody.innerHTML='<tr><td colspan="6" class="tom-tilstand">Ingen lærere funnet.</td></tr>';return;}
  tbody.innerHTML=liste.map(l=>{
    const skole=_skoler.find(s=>s.id===l.skole_id);
    const klAnt=_klasser.filter(k=>k.laerer_id===l.id).length;
    return`<tr>
      <td>${l.fullt_navn||'—'}</td>
      <td style="font-size:.8rem">${l.epost||'—'}</td>
      <td>${skole?.navn||'—'}</td>
      <td><span class="chip chip-graa">${klAnt}</span></td>
      <td>${l.er_admin?'<span class="er-admin-badge">Admin</span>':''}</td>
      <td style="display:flex;gap:4px">
        ${!l.er_admin
          ?`<button class="btn btn-lilla btn-sm" onclick="settAdmin('${l.id}','${l.fullt_navn}',true)">Gi admin</button>`
          :`<button class="btn btn-rod btn-sm" onclick="settAdmin('${l.id}','${l.fullt_navn}',false)">Fjern admin</button>`}
      </td>
    </tr>`;
  }).join('');
}

async function settAdmin(id,navn,gi){
  if(!confirm(`${gi?'Gi':'Fjern'} admin-tilgang ${gi?'til':'fra'} ${navn}?`))return;
  try{
    await Api.laerere.oppdater(id,{er_admin:gi});
    const idx=_laerere.findIndex(l=>l.id===id);
    if(idx>=0)_laerere[idx].er_admin=gi;
    byggLaererTabell(_laerere);
    snack(`${navn} er ${gi?'nå':'ikke lenger'} admin.`);
  }catch(e){snack(e.message||'Feil.','err');}
}

/* ── Bygg skoletabell ───────────────────────────────────── */
function byggSkoleTabell(liste){
  const tbody=$id('skole-tbody');
  if(!liste.length){tbody.innerHTML='<tr><td colspan="6" class="tom-tilstand">Ingen skoler.</td></tr>';return;}
  tbody.innerHTML=liste.map(s=>{
    const lAnt=_laerere.filter(l=>l.skole_id===s.id).length;
    return`<tr>
      <td>${s.navn}</td>
      <td>${s.kommune||'—'}</td>
      <td>${s.fylke||'—'}</td>
      <td><span class="chip chip-graa">${lAnt}</span></td>
      <td><span class="aktiv-dot ${s.aktiv?'ja':'nei'}"></span> ${s.aktiv?'Aktiv':'Inaktiv'}</td>
      <td>
        <button class="btn btn-sm ${s.aktiv?'btn-rod':'btn-gron'}" onclick="toggleSkole('${s.id}','${s.navn}',${s.aktiv})">
          ${s.aktiv?'Deaktiver':'Aktiver'}
        </button>
      </td>
    </tr>`;
  }).join('');
}

async function toggleSkole(id,navn,erAktiv){
  if(!confirm(`${erAktiv?'Deaktiver':'Aktiver'} skolen «${navn}»?`))return;
  try{
    await Api.skoler.oppdater(id,{aktiv:!erAktiv});
    const skole=_skoler.find(s=>s.id===id);
    if(skole)skole.aktiv=!erAktiv;
    byggSkoleTabell(_skoler);
    $id('s-skoler').textContent=_skoler.filter(s=>s.aktiv).length;
    snack(`${navn} er ${!erAktiv?'aktivert':'deaktivert'}.`);
  }catch(e){snack(e.message||'Feil.','err');}
}

/* ── Ny skole ────────────────────────────────────────────── */
$id('ny-skole-btn').addEventListener('click',()=>{
  $id('ns-navn').value=''; $id('ns-kommune').value=''; $id('ns-fylke').value='';
  $id('modal-ny-skole').classList.add('vis');
  setTimeout(()=>$id('ns-navn').focus(),50);
});
$id('ns-lagre-btn').addEventListener('click',async()=>{
  const navn=$id('ns-navn').value.trim();
  const kommune=$id('ns-kommune').value.trim();
  const fylke=$id('ns-fylke').value.trim();
  if(!navn||!kommune){snack('Fyll inn skolenavn og kommune.','warn');return;}
  try{
    const ny=await Api.skoler.opprett({navn,kommune,fylke,aktiv:true});
    const nySkole=Array.isArray(ny)?ny[0]:ny;
    if(nySkole){_skoler.push(nySkole);byggSkoleTabell(_skoler);fyllSkoleSel();$id('s-skoler').textContent=_skoler.filter(s=>s.aktiv).length;}
    $id('modal-ny-skole').classList.remove('vis');
    snack(`Skolen «${navn}» er opprettet.`);
  }catch(e){snack(e.message||'Feil.','err');}
});

/* ── Feilrapporter ───────────────────────────────────────── */
async function lastFeilrapporter(){
  const tbody=$id('feil-tbody');
  try{
    const data=await Api.feilrapporter.hentAlle(200);
    if(!data?.length){tbody.innerHTML='<tr><td colspan="5" class="tom-tilstand">Ingen feilrapporter.</td></tr>';return;}
    tbody.innerHTML=data.map(r=>`
      <tr>
        <td style="white-space:nowrap;font-size:.78rem">${datoStr(r.tidspunkt)}</td>
        <td style="font-size:.78rem">${r.side||'—'}</td>
        <td style="font-size:.8rem;max-width:300px;word-break:break-word">${r.melding||'—'}</td>
        <td><span class="chip ${r.status==='løst'?'chip-gron':r.status==='sett'?'chip-gul':'chip-rod'}">${r.status||'ny'}</span></td>
        <td>
          <select onchange="oppdaterFeilStatus('${r.id}',this.value)" style="font-size:.75rem;padding:3px 6px;width:auto;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:4px">
            <option value="ny"   ${r.status==='ny'   ?'selected':''}>Ny</option>
            <option value="sett" ${r.status==='sett' ?'selected':''}>Sett</option>
            <option value="løst" ${r.status==='løst' ?'selected':''}>Løst</option>
          </select>
        </td>
      </tr>`).join('');
  }catch(e){tbody.innerHTML=`<tr><td colspan="5" class="tom-tilstand">Feil: ${e.message}</td></tr>`;}
}

async function oppdaterFeilStatus(id,status){
  try{await Api.feilrapporter.oppdaterStatus(id,status); snack(`Status oppdatert til «${status}».`);}
  catch(e){snack(e.message||'Feil.','err');}
}

/* ── Start ───────────────────────────────────────────────── */
init();
</script>
</body>
</html>
