<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Superadmin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--bg2:#0b0d18;--bg3:#0d1020;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#e0e8ff;--dim:rgba(255,255,255,.42);--bla:#60a5fa;--gron:#34d399;--gul:#fbbf24;--rod:#f87171;--lilla:#a78bfa;--font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}
nav{height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.nav-logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);text-decoration:none;}
.nav-logo span{color:var(--rod);}
.spacer{flex:1;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font-h);font-size:.8rem;font-weight:700;transition:all .12s;}
.btn-sek{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border2);}
.btn-rod{background:rgba(248,113,113,.15);color:var(--rod);border:1px solid rgba(248,113,113,.25);}
.btn-gron{background:rgba(52,211,153,.15);color:var(--gron);border:1px solid rgba(52,211,153,.3);}
.btn-sm{padding:4px 9px;font-size:.72rem;}
main{max-width:1200px;margin:0 auto;padding:28px 20px;}
.tittel{font-family:var(--font-h);font-size:1.4rem;font-weight:900;margin-bottom:4px;}
.sub{color:var(--dim);font-size:.85rem;margin-bottom:24px;}
/* STATS */
.stats-rad{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.stat-boks{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-tall{font-family:var(--font-h);font-size:2rem;font-weight:900;margin-bottom:4px;}
.stat-lbl{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;}
/* SOK OG FILTER */
.kontroller{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.sok-input{flex:1;min-width:200px;padding:8px 12px;background:rgba(255,255,255,.05);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-b);font-size:.85rem;outline:none;}
.sok-input:focus{border-color:rgba(96,165,250,.5);}
.filter-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--dim);font-family:var(--font-h);font-size:.72rem;font-weight:700;cursor:pointer;}
.filter-btn.ak{background:rgba(96,165,250,.12);color:var(--bla);border-color:rgba(96,165,250,.3);}
/* TABS */
.tab-rad{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.tab-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--dim);font-family:var(--font-h);font-size:.78rem;font-weight:700;cursor:pointer;}
.tab-btn.ak{background:rgba(96,165,250,.12);color:var(--bla);border-color:rgba(96,165,250,.3);}
/* TABELL */
.tabell-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
thead th{padding:10px 12px;background:rgba(255,255,255,.05);font-family:var(--font-h);font-size:.65rem;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,.02);}
.status-aktiv{color:var(--gron);font-weight:700;font-size:.75rem;}
.status-inaktiv{color:var(--rod);font-size:.75rem;}
.handl{display:flex;gap:4px;}
code{font-family:var(--font-m);font-size:.72rem;background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;}
/* LASTER */
#laster{text-align:center;padding:60px;color:var(--dim);}
@media(max-width:800px){.stats-rad{grid-template-columns:repeat(3,1fr);}}</style>
</head>
<body>
<nav>
  <a href="laerer_app.html" class="nav-logo">Skap<span>Lab</span> Admin</a>
  <div class="spacer"></div>
  <span id="nav-bruker" style="font-size:.8rem;color:var(--dim);margin-right:8px;"></span>
  <button class="btn btn-sek" onclick="loggUt()">Logg ut</button>
</nav>
<main>
  <div class="tittel">⚙️ Superadmin</div>
  <div class="sub">Administrasjon av SkapLab — alle skoler, lærere og elever</div>

  <div id="laster">Laster data…</div>
  <div id="hoved" style="display:none;">

    <!-- STATISTIKK -->
    <div class="stats-rad">
      <div class="stat-boks"><div class="stat-tall" style="color:var(--bla);" id="s-skoler">—</div><div class="stat-lbl">Skoler totalt</div></div>
      <div class="stat-boks"><div class="stat-tall" style="color:var(--gron);" id="s-aktive">—</div><div class="stat-lbl">Aktive skoler</div></div>
      <div class="stat-boks"><div class="stat-tall" style="color:var(--lilla);" id="s-laerere">—</div><div class="stat-lbl">Lærere</div></div>
      <div class="stat-boks"><div class="stat-tall" style="color:var(--gul);" id="s-elever">—</div><div class="stat-lbl">Elever</div></div>
      <div class="stat-boks"><div class="stat-tall" style="color:var(--gron);" id="s-aktivitet">—</div><div class="stat-lbl">Aktiviteter</div></div>
    </div>

    <!-- TABS -->
    <div class="tab-rad">
      <button class="tab-btn ak" id="tab-skoler-btn" onclick="byttTab('skoler')">🏫 Skoler</button>
      <button class="tab-btn" id="tab-laerere-btn" onclick="byttTab('laerere')">👩‍🏫 Lærere</button>
    </div>

    <!-- SOK/FILTER -->
    <div class="kontroller">
      <input class="sok-input" type="text" id="sok-felt" placeholder="Søk…" oninput="filtrer()">
      <div id="filter-knapper" style="display:flex;gap:4px;">
        <button class="filter-btn ak" onclick="settFilter('alle',this)">Alle</button>
        <button class="filter-btn" onclick="settFilter('aktiv',this)">Aktive</button>
        <button class="filter-btn" onclick="settFilter('inaktiv',this)">Inaktive</button>
      </div>
    </div>

    <!-- SKOLE-TABELL -->
    <div id="panel-skoler">
      <div class="tabell-wrap">
        <table>
          <thead><tr>
            <th>Skole</th><th>Kommune</th><th>Lærere</th><th>Elever</th>
            <th>Aktiviteter</th><th>Sist aktiv</th><th>Status</th><th>Handlinger</th>
          </tr></thead>
          <tbody id="skole-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- LÆRER-TABELL -->
    <div id="panel-laerere" style="display:none;">
      <div class="tabell-wrap">
        <table>
          <thead><tr>
            <th>Navn</th><th>E-post</th><th>Skole</th><th>Klasser</th>
            <th>Elever</th><th>Opprettet</th><th>Handlinger</th>
          </tr></thead>
          <tbody id="laerer-tbody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /hoved -->
</main>

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,trenger_hjelp,hjelp_emne,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _delete: function(sti,tok){return fetch(API+sti,{method:'DELETE',headers:hdr(tok)}).then(function(r){return r.ok;});},
    _rpc: function(fn,params,tok){return fetch(API+'/rpc/'+fn,{method:'POST',headers:Object.assign(hdr(tok),{'Content-Type':'application/json'}),body:JSON.stringify(params)}).then(function(r){return r.json();});},
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>
<script>
var laerer = SkapLab.hentLaerer();
var token  = laerer ? laerer.access_token : null;
if (!laerer) location.href = 'laerer_login.html';

var alleData = [], alleLaerere = [], alleKlasser = [];
var aktivTab = 'skoler', aktivFilter = 'alle';

async function init() {
  // Vis bruker
  try {
    var me = await fetch(SkapLab.SUPABASE_URL+'/auth/v1/user',
      {headers:{'apikey':SkapLab.SUPABASE_KEY,'Authorization':'Bearer '+token}}).then(function(r){return r.json();});
    $('nav-bruker').textContent = me.email||'';
    // Sjekk admin
    var lR = await SkapLab._get('/laerere?id=eq.'+(me.id)+'&select=er_admin', token);
    if (!lR||!lR[0]||!lR[0].er_admin) { alert('Ikke tilgang.'); location.href='laerer_app.html'; return; }
  } catch(e) {}

  // Hent alle data parallelt
  var [sR, lR, kR, eR, aR] = await Promise.all([
    SkapLab._get('/skoler?select=id,navn,kommune,fylke,aktiv,opprettet&order=opprettet.desc', token).catch(function(){return [];}),
    SkapLab._get('/laerere?select=id,fullt_navn,epost,skole_id,er_admin,opprettet&order=opprettet.desc', token).catch(function(){return [];}),
    SkapLab._get('/klasser?select=id,navn,laerer_id', token).catch(function(){return [];}),
    SkapLab._get('/elever?select=id,klasse_id,aktiv', token).catch(function(){return [];}),
    SkapLab._get('/aktivitet?select=id,elev_id&limit=5000', token).catch(function(){return []}),
  ]);

  var skoler   = Array.isArray(sR)?sR:[];
  alleLaerere  = Array.isArray(lR)?lR:[];
  alleKlasser  = Array.isArray(kR)?kR:[];
  var elever   = Array.isArray(eR)?eR:[];
  var aktivitet= Array.isArray(aR)?aR:[];

  // Statistikk
  $('s-skoler').textContent    = skoler.length;
  $('s-aktive').textContent    = skoler.filter(function(s){return s.aktiv;}).length;
  $('s-laerere').textContent   = alleLaerere.length;
  $('s-elever').textContent    = elever.filter(function(e){return e.aktiv;}).length;
  $('s-aktivitet').textContent = aktivitet.length;

  // Bygg data per skole
  alleData = skoler.map(function(s) {
    var sl = alleLaerere.filter(function(l){return l.skole_id===s.id;});
    var sk = alleKlasser.filter(function(k){return sl.some(function(l){return l.id===k.laerer_id;});});
    var kIds = sk.map(function(k){return k.id;});
    var se = elever.filter(function(e){return kIds.indexOf(e.klasse_id)>=0;});
    var eIds = se.map(function(e){return e.id;});
    var sa = aktivitet.filter(function(a){return eIds.indexOf(a.elev_id)>=0;});
    return {skole:s, laerere:sl.length, klasser:sk.length, elever:se.length, aktivitet:sa.length};
  });

  $('laster').style.display  = 'none';
  $('hoved').style.display   = 'block';
  byggSkoleTabell();
  byggLaererTabell();
}

function $(id){return document.getElementById(id);}
function datoVis(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('nb-NO',{day:'numeric',month:'short',year:'2-digit'});}

function byttTab(tab) {
  aktivTab = tab;
  ['skoler','laerere'].forEach(function(t){
    $('tab-'+t+'-btn').classList.toggle('ak', t===tab);
    $('panel-'+t).style.display = t===tab ? '' : 'none';
  });
  // Juster filter-knapper
  var filterKnapper = $('filter-knapper');
  if (filterKnapper) filterKnapper.style.display = tab==='skoler' ? 'flex' : 'none';
  filtrer();
}

function settFilter(f, btn) {
  aktivFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('ak');});
  if (btn) btn.classList.add('ak');
  filtrer();
}

function filtrer() {
  var sok = ($('sok-felt').value||'').toLowerCase().trim();
  if (aktivTab==='skoler') {
    var rader = $('skole-tbody').querySelectorAll('tr');
    rader.forEach(function(tr) {
      var tekst = tr.textContent.toLowerCase();
      var aktiv = tr.dataset.aktiv;
      var sokOk = !sok || tekst.includes(sok);
      var filtOk = aktivFilter==='alle' || (aktivFilter==='aktiv'&&aktiv==='true') || (aktivFilter==='inaktiv'&&aktiv==='false');
      tr.style.display = sokOk && filtOk ? '' : 'none';
    });
  } else {
    var raderL = $('laerer-tbody').querySelectorAll('tr');
    raderL.forEach(function(tr) {
      var tekst = tr.textContent.toLowerCase();
      tr.style.display = !sok || tekst.includes(sok) ? '' : 'none';
    });
  }
}

function byggSkoleTabell() {
  var tbody = $('skole-tbody');
  tbody.innerHTML = '';
  alleData.forEach(function(d) {
    var s = d.skole;
    var tr = document.createElement('tr');
    tr.dataset.aktiv = s.aktiv;
    tr.innerHTML = '<td><strong>'+s.navn+'</strong></td>'
      +'<td style="color:var(--dim);">'+(s.kommune||'—')+', '+(s.fylke||'—')+'</td>'
      +'<td style="text-align:center;">'+d.laerere+'</td>'
      +'<td style="text-align:center;">'+d.elever+'</td>'
      +'<td style="text-align:center;">'+d.aktivitet+'</td>'
      +'<td style="color:var(--dim);font-size:.78rem;">'+datoVis(s.opprettet)+'</td>'
      +'<td><span class="'+(s.aktiv?'status-aktiv':'status-inaktiv')+'">'+(s.aktiv?'✅ Aktiv':'⏸ Inaktiv')+'</span></td>'
      +'<td><div class="handl">'
        +(s.aktiv
          ? '<button class="btn btn-rod btn-sm" data-id="'+s.id+'" onclick="toggleAktiv(this,false)">Deaktiver</button>'
          : '<button class="btn btn-gron btn-sm" data-id="'+s.id+'" onclick="toggleAktiv(this,true)">Aktiver</button>')
        +'<button class="btn btn-rod btn-sm" data-id="'+s.id+'" data-navn="'+s.navn+'" onclick="slettSkole(this)">🗑 Slett</button>'
        +'</div></td>';
    tbody.appendChild(tr);
  });
}

function byggLaererTabell() {
  var tbody = $('laerer-tbody');
  tbody.innerHTML = '';
  alleLaerere.forEach(function(l) {
    var skole = alleData.find(function(d){return d.skole.id===l.skole_id;});
    var kl = alleKlasser.filter(function(k){return k.laerer_id===l.id;}).length;
    var tr = document.createElement('tr');
    tr.innerHTML = '<td><strong>'+l.fullt_navn+'</strong>'+(l.er_admin?' <code>admin</code>':'')+'</td>'
      +'<td style="color:var(--dim);">'+l.epost+'</td>'
      +'<td style="color:var(--dim);">'+(skole?skole.skole.navn:'—')+'</td>'
      +'<td style="text-align:center;">'+kl+'</td>'
      +'<td style="text-align:center;">—</td>'
      +'<td style="color:var(--dim);font-size:.78rem;">'+datoVis(l.opprettet)+'</td>'
      +'<td><button class="btn btn-rod btn-sm" data-id="'+l.id+'" data-epost="'+l.epost+'" onclick="slettLaerer(this)">🗑 Slett</button></td>';
    tbody.appendChild(tr);
  });
}

async function toggleAktiv(btn, settAktiv) {
  var id = btn.dataset.id;
  try {
    var resp = await fetch(SkapLab.SUPABASE_URL+'/rest/v1/skoler?id=eq.'+id, {
      method: 'PATCH',
      headers: Object.assign({'Content-Type':'application/json','Prefer':'return=minimal'}, SkapLab._hdr(token)),
      body: JSON.stringify({aktiv: settAktiv})
    });
    if (!resp.ok) throw new Error('Status '+resp.status+' (mangler UPDATE-policy for skoler?)');
    var d = alleData.find(function(x){return x.skole.id===id;});
    if (d) d.skole.aktiv = settAktiv;
    byggSkoleTabell();
  } catch(e) { alert('Feil: '+e.message); }
}

async function slettSkole(btn) {
  var id = btn.dataset.id;
  var navn = btn.dataset.navn;
  if (!confirm('SLETT skolen «'+navn+'»? Dette sletter alle tilknyttede lærere, klasser og elever.')) return;
  try {
    await SkapLab._delete('/skoler?id=eq.'+id, token);
    alleData = alleData.filter(function(d){return d.skole.id!==id;});
    byggSkoleTabell();
  } catch(e) { alert('Feil: '+e.message); }
}

async function slettLaerer(btn) {
  var id    = btn.dataset.id;
  var epost = btn.dataset.epost;
  if (!confirm('SLETT lærer «'+epost+'»? Dette sletter alle klasser, elever og data tilknyttet denne læreren.')) return;
  try {
    var res = await SkapLab._rpc('slett_bruker', {p_bruker_id: id}, token);
    if (res==='OK') {
      alleLaerere = alleLaerere.filter(function(l){return l.id!==id;});
      byggLaererTabell();
    } else {
      alert('Feil: '+JSON.stringify(res));
    }
  } catch(e) { alert('Feil: '+e.message); }
}

function loggUt() { SkapLab.laererLoggUt(); location.href='laerer_login.html'; }
init();
</script>
</body>
