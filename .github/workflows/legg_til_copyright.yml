name: Legg til copyright

on:
  workflow_dispatch:

jobs:
  copyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Legg til copyright
        run: |
          python3 << 'PYEOF'
          import os, glob
          C = '(c) 2025 SkapLab - Tommy Lykke Nordahl - Alle rettigheter forbeholdt'
          TAG = '<p style="font-size:.72rem;opacity:.4;text-align:center;">' + C + '</p>'
          for f in glob.glob('**/*.html', recursive=True):
              txt = open(f, encoding='utf-8', errors='ignore').read()
              if '2025 SkapLab' in txt:
                  continue
              if '</footer>' in txt:
                  txt = txt.replace('</footer>', TAG + '\n</footer>', 1)
              else:
                  txt = txt.replace('</body>', '<!-- ' + C + ' -->\n</body>', 1)
              open(f, 'w', encoding='utf-8').write(txt)
              print('OK: ' + f)
          PYEOF

      - name: Commit
        run: |
          git config user.name "SkapLab Bot"
          git config user.email "action@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Copyright lagt til"
          git push
