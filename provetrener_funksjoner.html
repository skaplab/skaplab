<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PrГёvetrener вҖ“ Funksjoner</title>

<style>
:root{
  --bg:#0f0f14;--bg2:#16161e;--bg3:#1e1e2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#e8e8f0;--dim:#888899;
  --accent:#e8b84b;--accent2:#5b8dd9;
  --green:#5bc98e;--red:#e05c6e;--orange:#e8874b;
  --font-d:'Playfair Display',serif;--font-b:'Source Sans 3',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:16px;}

/* HEADER */
#header{background:linear-gradient(135deg,#16161e 0%,#1a1a28 100%);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;}
#header .logo{font-family:var(--font-d);font-size:1.3rem;font-weight:900;color:var(--accent);}
#header .undertittel{font-size:.78rem;color:var(--dim);}
#header .spacer{flex:1;}
#header .stats{display:flex;gap:14px;font-size:.82rem;}
#header .stats span{color:var(--dim);}
#header .stats b{color:var(--accent);}
#back-link{font-size:.8rem;color:var(--dim);text-decoration:none;}
#back-link:hover{color:var(--text);}

/* TIDSVELGER MODAL */
#modal-tid{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
#modal-tid.vis{display:flex;}
.modal-kort{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:32px 28px;max-width:420px;width:100%;text-align:center;}
.modal-tittel{font-family:var(--font-d);font-size:1.4rem;color:var(--accent);margin-bottom:8px;}
.modal-sub{color:var(--dim);font-size:.88rem;margin-bottom:24px;line-height:1.5;}
.modal-knapper{display:flex;gap:10px;flex-direction:column;}
.modal-tid-btn{padding:13px 20px;border:1px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .15s;text-align:left;display:flex;align-items:center;gap:12px;}
.modal-tid-btn:hover{border-color:var(--accent);background:rgba(232,184,75,.07);color:var(--accent);}
.modal-tid-btn .tid-ikon{font-size:1.3rem;}
.modal-tid-btn .tid-info{display:flex;flex-direction:column;}
.modal-tid-btn .tid-label{font-weight:700;}
.modal-tid-btn .tid-ant{font-size:.76rem;color:var(--dim);}

/* PROGRESS */
#progress-wrap{padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:none;}
#progress-info{display:flex;justify-content:space-between;font-size:.76rem;color:var(--dim);margin-bottom:5px;}
#progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .4s;}
#tidtaker{padding:6px 24px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:.78rem;color:var(--dim);display:none;text-align:right;}
#tid-display{color:var(--orange);font-weight:700;font-size:.9rem;}
#tid-display.kritisk{color:var(--red);animation:blink 1s infinite;}
@keyframes blink{50%{opacity:.4;}}

/* LAYOUT */
#app{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 120px);}

/* LISTE */
#liste{background:var(--bg2);border-right:1px solid var(--border);padding:10px 6px;overflow-y:auto;}
.liste-knapp{display:flex;align-items:center;gap:7px;width:100%;padding:7px 9px;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--dim);cursor:pointer;font-size:.79rem;font-family:var(--font-b);text-align:left;transition:all .12s;}
.liste-knapp:hover{background:rgba(255,255,255,.04);color:var(--text);}
.liste-knapp.aktiv{background:rgba(232,184,75,.07);border-color:rgba(232,184,75,.2);color:var(--accent);}
.liste-knapp.ok{color:var(--green);}
.liste-knapp.ok .liste-ikon{color:var(--green);}
.liste-knapp.feil .liste-ikon{color:var(--red);}
.liste-ikon{font-size:.85rem;width:16px;text-align:center;}
.liste-poeng{margin-left:auto;font-size:.7rem;color:var(--dim);}

/* PANEL */
#panel{padding:28px 32px;max-width:800px;}
.oppg-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.oppg-badge{background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.25);color:var(--accent);padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700;}
.oppg-tittel{font-family:var(--font-d);font-size:1.1rem;color:var(--text);}
.oppg-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.meta-tag{font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:12px;border:1px solid;}
.meta-poeng{border-color:rgba(91,141,217,.3);color:var(--accent2);background:rgba(91,141,217,.07);}
.meta-niva{border-color:rgba(91,201,142,.3);color:var(--green);background:rgba(91,201,142,.07);}
.meta-niva.middels{border-color:rgba(232,135,75,.3);color:var(--orange);background:rgba(232,135,75,.07);}
.meta-niva.hard{border-color:rgba(224,92,110,.3);color:var(--red);background:rgba(224,92,110,.07);}
.oppg-tekst{font-size:.97rem;line-height:1.7;margin-bottom:16px;white-space:pre-line;}
.instruksjon{font-size:.82rem;color:var(--dim);border-left:3px solid var(--border2);padding-left:10px;margin-bottom:18px;line-height:1.5;}
.svar-wrap{margin-bottom:16px;}
.svar-label{font-size:.78rem;color:var(--dim);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

/* INPUT-TYPER */
.svar-inp{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:9px;font-size:.95rem;font-family:var(--font-b);width:160px;outline:none;}
.svar-inp:focus{border-color:rgba(232,184,75,.4);}
.svar-inp.wide{width:100%;max-width:400px;}
.svar-enhet{font-size:.85rem;color:var(--dim);margin-left:8px;}

/* FLERVALG */
.fv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:500px;}
.fv-btn{padding:11px 16px;border:1.5px solid var(--border2);border-radius:9px;background:var(--bg3);color:var(--text);cursor:pointer;font-size:.88rem;text-align:left;font-family:var(--font-b);transition:all .15s;line-height:1.4;}
.fv-btn:hover{border-color:rgba(232,184,75,.3);background:rgba(232,184,75,.05);}
.fv-btn.valgt{border-color:var(--accent);background:rgba(232,184,75,.1);color:var(--accent);}
.fv-btn.riktig-svar{border-color:var(--green);background:rgba(91,201,142,.1);color:var(--green);}
.fv-btn.feil-svar{border-color:var(--red);background:rgba(224,92,110,.1);color:var(--red);}

/* FLERLINJE */
.svar-textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px 14px;border-radius:9px;font-size:.9rem;font-family:var(--font-b);width:100%;max-width:560px;min-height:100px;outline:none;resize:vertical;line-height:1.5;}
.svar-textarea:focus{border-color:rgba(232,184,75,.4);}

/* SANN/USANN */
.su-rad{display:flex;align-items:center;gap:12px;margin-bottom:8px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;}
.su-tekst{flex:1;font-size:.88rem;line-height:1.4;}
.su-knapper{display:flex;gap:6px;}
.su-btn{padding:5px 14px;border:1px solid var(--border2);border-radius:7px;background:var(--bg2);color:var(--dim);cursor:pointer;font-size:.8rem;font-family:var(--font-b);transition:all .12s;}
.su-btn:hover{border-color:var(--accent);color:var(--accent);}
.su-btn.valgt-s{border-color:var(--accent2);background:rgba(91,141,217,.15);color:var(--accent2);}
.su-btn.valgt-u{border-color:var(--orange);background:rgba(232,135,75,.1);color:var(--orange);}
.su-btn.riktig{border-color:var(--green);background:rgba(91,201,142,.15);color:var(--green);}
.su-btn.gal{border-color:var(--red);background:rgba(224,92,110,.1);color:var(--red);}

/* SORTERING */
.sort-wrap{display:flex;flex-direction:column;gap:6px;max-width:380px;}
.sort-item{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;cursor:grab;font-size:.88rem;transition:background .12s;}
.sort-item:active{cursor:grabbing;}
.sort-item.dragging{opacity:.4;}
.sort-item.drag-over{border-color:var(--accent);background:rgba(232,184,75,.07);}
.sort-pil{display:flex;flex-direction:column;gap:2px;}
.sort-pil button{background:none;border:none;cursor:pointer;color:var(--dim);font-size:.75rem;padding:1px 4px;border-radius:3px;}
.sort-pil button:hover{background:rgba(255,255,255,.08);color:var(--text);}

/* KNAPPER */
.knapp-rad{display:flex;gap:10px;align-items:center;margin-top:20px;flex-wrap:wrap;}
.sjekk-btn{padding:11px 24px;background:var(--accent);color:#1a1a00;font-weight:700;border:none;border-radius:9px;cursor:pointer;font-size:.88rem;font-family:var(--font-b);transition:opacity .15s;}
.sjekk-btn:hover{opacity:.9;}
.sjekk-btn:disabled{opacity:.4;cursor:not-allowed;}
.neste-btn{display:none;padding:11px 22px;background:var(--accent2);color:#fff;font-weight:600;border:none;border-radius:9px;cursor:pointer;font-size:.88rem;font-family:var(--font-b);}
.neste-btn:hover{opacity:.9;}
.hopp-btn{padding:10px 18px;background:transparent;border:1px solid var(--border2);color:var(--dim);border-radius:9px;cursor:pointer;font-size:.82rem;font-family:var(--font-b);}
.hopp-btn:hover{color:var(--text);border-color:rgba(255,255,255,.25);}
.lever-btn{padding:13px 28px;background:linear-gradient(135deg,var(--green),#3ab87a);color:#0a1f0a;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-size:.95rem;font-family:var(--font-b);display:none;}
.lever-btn:hover{opacity:.9;}

/* FEEDBACK */
.fb{margin-top:12px;padding:11px 14px;border-radius:9px;font-size:.86rem;line-height:1.5;display:none;}
.fb.riktig{background:rgba(91,201,142,.1);border:1px solid rgba(91,201,142,.25);color:var(--green);}
.fb.delvis{background:rgba(232,135,75,.1);border:1px solid rgba(232,135,75,.25);color:var(--orange);}
.fb.feil{background:rgba(224,92,110,.1);border:1px solid rgba(224,92,110,.25);color:var(--red);}

/* FASIT */
.fasit-boks{margin-top:14px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;font-size:.85rem;line-height:1.7;color:var(--text);}
.fasit-tittel{font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);font-weight:700;margin-bottom:8px;}
.fasit-boks pre{font-family:var(--font-b);white-space:pre-wrap;}

/* RESULTAT */
#resultat{display:none;max-width:680px;margin:0 auto;padding:40px 32px;}
.resultat-tittel{font-family:var(--font-d);font-size:2rem;color:var(--accent);margin-bottom:6px;text-align:center;}
.resultat-score{font-size:3rem;font-weight:900;text-align:center;margin:12px 0;}
.resultat-pst{font-size:1.1rem;color:var(--dim);text-align:center;margin-bottom:28px;}
.resultat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.res-kort{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;text-align:center;}
.res-tall{font-size:1.6rem;font-weight:800;color:var(--accent);}
.res-lab{font-size:.75rem;color:var(--dim);margin-top:4px;}

/* GJENNOMGANG */
.gjennomgang-rad{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;padding:14px 16px;}
.gjennomgang-rad.ok{border-left:3px solid var(--green);}
.gjennomgang-rad.gal{border-left:3px solid var(--red);}
.gjennomgang-rad.delvis{border-left:3px solid var(--orange);}
.gjennomgang-spГёrsmГҘl{font-size:.84rem;color:var(--dim);margin-bottom:6px;}
.gjennomgang-ditt{font-size:.88rem;margin-bottom:2px;}
.gjennomgang-fasit{font-size:.85rem;color:var(--green);}

.ny-Гёkt-btn{display:block;width:100%;padding:14px;background:var(--accent);color:#1a1a00;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-size:.95rem;font-family:var(--font-b);margin-top:20px;margin-bottom:10px;}
.gjennomgang-btn{display:block;width:100%;padding:12px;background:transparent;border:1px solid var(--border2);color:var(--dim);border-radius:10px;cursor:pointer;font-size:.88rem;font-family:var(--font-b);}
.gjennomgang-btn:hover{color:var(--text);}
.resultat-overskrift{font-size:.8rem;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin-bottom:10px;margin-top:20px;font-weight:700;}

/* в”Җв”Җ MOBIL (max 700px) в”Җв”Җ */
@media(max-width:700px){
  #header{padding:10px 14px;gap:8px;flex-wrap:wrap;}
  #header .logo{font-size:1.1rem;}
  #header .stats{font-size:.75rem;gap:8px;}
  #header .undertittel{display:none;}
  #back-link{font-size:.75rem;}
  #tidtaker{padding:6px 14px;}
  .modal-kort{margin:16px;padding:22px 18px;}
  .modal-tittel{font-size:1.2rem;}
  #app{grid-template-columns:1fr;}
  #liste{display:none;}
  #panel{padding:16px 14px;max-width:100%;}
  .oppg-header{flex-wrap:wrap;gap:6px;}
  .oppg-spГёrsmГҘl{font-size:1rem;line-height:1.55;}
  .fv-grid{grid-template-columns:1fr;max-width:100%;}
  .fv-btn{padding:12px 14px;font-size:.9rem;}
  .su-rad{flex-direction:column;}
  .nav-knapper{gap:8px;}
  .nav-knapper button{padding:10px 14px;font-size:.85rem;flex:1;}
  #resultat{padding:16px 14px;}
  .resultat-score{font-size:2.2rem;}
  .resultat-grid{grid-template-columns:1fr 1fr;}
  .gjennomgang-rad{padding:12px 14px;}
  .ny-Гёkt-btn,.gjennomgang-btn{display:block;width:100%;margin-bottom:8px;}
  #progress-wrap{padding:8px 14px;}
}
@media(max-width:400px){
  #header .stats{display:none;}
  .fv-btn{padding:10px 12px;font-size:.85rem;}
  .resultat-grid{grid-template-columns:1fr;}
}
  #liste{display:none;}
  #panel{padding:18px 16px;}
  .fv-grid{grid-template-columns:1fr;}
  .resultat-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

    <button class="modal-tid-btn" onclick="startProve(60)"><div class="tid-ikon">вҸұ</div><div class="tid-info"><div class="tid-label">60 minutter</div><div class="tid-ant" id="ant-60">LasterвҖҰ</div></div></button>

<script>

// в”Җв”Җ SPORING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(function(){

    try { _elev = JSON.parse(localStorage.getItem('skaplab_elev')); } catch(e){}
    window._skaplab_logg = function(ressurs, km, score, ant, rik, fa, tot) {

      fetch('https://cqzmzsqhuawpsvnjjzse.supabase.co/rest/v1/aktivitet', {

// в”Җв”Җ HJELPEFUNKSJONER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndF(a,b,d){return parseFloat((Math.random()*(b-a)+a).toFixed(d||1));}
function plukk(arr){return arr[rnd(0,arr.length-1)];}
function bland(arr){return arr.slice().sort(function(){return Math.random()-.5;});}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function factorial(k){return k<=1?1:k*factorial(k-1);}
var KM_KODE='KM7';var RESSURS='provetrener_funksjoner';var UNDERTITTEL='Funksjoner';

// в”Җв”Җ OPPGAVEBANK: FUNKSJONER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function genKoordinater() {
  var pts=['A','B','C','D'];
  var coords=pts.map(function(){return [rnd(-6,6),rnd(-6,6)];});
  var idx=rnd(0,3);
  var p=coords[idx];
  return {type:'koord',tema:'Koordinatsystemet',poeng:1,nivГҘ:'lett',
    spГёrsmГҘl:'Punktet '+pts[idx]+' har koordinater ('+p[0]+', '+p[1]+').\n\nI hvilken kvadrant befinner punktet seg?',
    instruksjon:'Huskeregel: (+,+)=I, (вҖ“,+)=II, (вҖ“,вҖ“)=III, (+,вҖ“)=IV',
    svarType:'flervalg',
    alternativer:['1. kvadrant (++)','2. kvadrant (вҖ“+)','3. kvadrant (вҖ“вҖ“)','4. kvadrant (+вҖ“)','PГҘ en akse'],
    fasitIdx:p[0]>0&&p[1]>0?0:p[0]<0&&p[1]>0?1:p[0]<0&&p[1]<0?2:p[0]>0&&p[1]<0?3:4,
    lГёsning:'('+p[0]+', '+p[1]+'): '+(p[0]>0&&p[1]>0?'1. kvadrant':p[0]<0&&p[1]>0?'2. kvadrant':p[0]<0&&p[1]<0?'3. kvadrant':'4. kvadrant')};
}

function genFunksjonsverdi() {
  var a=rnd(2,8), b=rnd(0,10);
  var x=plukk([1,2,3,4,5,-1,-2]);
  var fx=a*x+b;
  return {type:'fv',tema:'Funksjonsuttrykk вҖ“ finne funksjonsverdi',poeng:1,nivГҘ:'lett',
    spГёrsmГҘl:'Funksjonen er gitt ved:\nf(x) = '+a+'x + '+b+'\n\nFinn f('+x+')',
    instruksjon:'Sett x = '+x+' inn i funksjonsuttrykket.',
    svarType:'tall',fasit:fx,tol:0,
    lГёsning:'f('+x+') = '+a+'В·('+x+') + '+b+' = '+a*x+' + '+b+' = '+fx};
}

function genStigningstall() {
  var x1=rnd(-3,0), y1=rnd(-5,5);
  var a=plukk([-3,-2,-1,1,2,3]);
  var b=rnd(0,8);
  var x2=x1+rnd(2,5);
  var y2=a*x2+b;
  y1=a*x1+b;
  return {type:'stign',tema:'Stigningstall',poeng:2,nivГҘ:'middels',
    spГёrsmГҘl:'En linje gГҘr gjennom punktene\nP('+x1+', '+y1+') og Q('+x2+', '+y2+').\n\nFinne stigningstallet.',
    instruksjon:'Stigningstall: a = (yвӮӮ вҖ“ yвӮҒ) / (xвӮӮ вҖ“ xвӮҒ)',
    svarType:'tall',fasit:a,tol:0,
    lГёsning:'a = ('+y2+' вҖ“ '+y1+') / ('+x2+' вҖ“ '+x1+')\n= '+(y2-y1)+' / '+(x2-x1)+' = '+a};
}

function genFunksjonsuttrykk() {
  var a=plukk([-3,-2,-1,1,2,3]), b=rnd(-5,8);
  var x1=rnd(1,4), y1=a*x1+b;
  var x2=x1+rnd(2,4), y2=a*x2+b;
  return {type:'futtrykk',tema:'Lage funksjonsuttrykk',poeng:2,nivГҘ:'middels',
    spГёrsmГҘl:'En rett linje gГҘr gjennom:\nP('+x1+', '+y1+') og Q('+x2+', '+y2+')\n\nFinn funksjonsuttrykket y = ax + b.',
    instruksjon:'1. Finn a = (yвӮӮвҖ“yвӮҒ)/(xвӮӮвҖ“xвӮҒ)\n2. Sett inn ett punkt for ГҘ finne b.',
    svarType:'tekst',fasitTekst:'y = '+a+'x + '+b,
    lГёsning:'a = '+(y2-y1)+'/'+(x2-x1)+' = '+a+'\nb: '+y1+' = '+a+'В·'+x1+' + b вҶ’ b = '+b+'\ny = '+a+'x + '+b};
}

function genFraGraf() {
  var a=plukk([1,2,-1,-2]), b=rnd(0,6);
  var pts=[[1,a+b],[2,2*a+b],[3,3*a+b]];
  return {type:'fragraf',tema:'Lese av funksjoner fra tabell',poeng:2,nivГҘ:'middels',
    spГёrsmГҘl:'Tabellen viser verdier for en lineГҰr funksjon:\n\nx | '+pts.map(function(p){return p[0];}).join(' | ')+'\ny | '+pts.map(function(p){return p[1];}).join(' | ')+'\n\nFinn funksjonsuttrykket.',
    instruksjon:'Finn stigningstallet fra tabellen, deretter konstantleddet.',
    svarType:'tekst',fasitTekst:'y = '+a+'x + '+b,
    lГёsning:'Differanse i y: '+(pts[1][1]-pts[0][1])+' per steg i x\na = '+a+'\nFor x=1: '+a+' + b = '+pts[0][1]+' вҶ’ b = '+b+'\ny = '+a+'x + '+b};
}

function genNullpunkt() {
  var a=rnd(1,5), b=rnd(1,10);
  var x0=-b/a;
  return {type:'nullp',tema:'Nullpunkt',poeng:2,nivГҘ:'middels',
    spГёrsmГҘl:'Finn nullpunktet til funksjonen:\n\nf(x) = '+a+'x + '+b,
    instruksjon:'Sett f(x) = 0 og lГёs for x.',
    svarType:'tall',fasit:x0,tol:0.05,
    lГёsning:a+'x + '+b+' = 0\n'+a+'x = вҖ“'+b+'\nx = вҖ“'+b+'/'+a+' = '+x0.toFixed(2)};
}

function genFunksjonsoppg() {
  var kontekster=[
    function(){var pris=plukk([15,18,20,25,30]);
      var x=rnd(4,12);
      return {sp:'Lotte betaler '+pris+' kr per kg epler.\nFunksjonsuttrykket er f(x) = '+pris+'x.\n\nHvor mye betaler hun for '+x+' kg?',
        fasit:pris*x,lГёsn:pris+' Г— '+x+' = '+pris*x+' kr'};},
    function(){var fast=rnd(20,80),per=rnd(5,15),t=rnd(3,10);

    svarType:'tall',fasit:k.fasit,tol:0,lГёsning:k.lГёsn};
}

function genSkjГҰring() {
  var a1=rnd(1,3), b1=rnd(1,8);
  var a2=-rnd(1,3), b2=b1+rnd(2,10);

    spГёrsmГҘl:'Finn skjГҰringspunktet mellom:\nf(x) = '+a1+'x + '+b1+'\ng(x) = '+a2+'x + '+b2,
    instruksjon:'Sett f(x) = g(x) og lГёs for x. Finn deretter y.',
    svarType:'flertall',labels:['x-koordinat','y-koordinat'],
    fasitArr:[x,y],
    lГёsning:a1+'x + '+b1+' = '+a2+'x + '+b2+'\n'+(a1-a2)+'x = '+(b2-b1)+'\nx = '+x.toFixed(2)+', y = '+y.toFixed(2)};
}

// в”Җв”Җ TALL: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function genHandletur() {
  var varer = [
    {navn:'brГёd', pris:rnd(25,45)},
    {navn:'melk', pris:rnd(18,28)},
    {navn:'ost', pris:rnd(55,95)},
    {navn:'epler', pris:rnd(30,55)},
  ];
  var utvalg = bland(varer).slice(0,3);
  var ant = utvalg.map(function(){return rnd(1,4);});
  var sum = utvalg.reduce(function(s,v,i){return s+v.pris*ant[i];},0);
  var betalt = Math.ceil(sum/50)*50;
  var rest = betalt-sum;
  var tekst = utvalg.map(function(v,i){return ant[i]+' '+v.navn+' Г  '+v.pris+' kr';}).join(', ');
  return {type:'handletur',tema:'Sammensatt tallregning',nivГҘ:'middels',poeng:3,
    spГёrsmГҘl:'Du kjГёper: '+tekst+'.\n\nDu betaler med '+betalt+' kr.\n\na) Sett opp og regn ut totalkostnaden.\nb) Hvor mye fГҘr du igjen?',
    instruksjon:'Regn ut delkostnad for hver vare, summer, finn resten.',
    svarType:'flertall',labels:['a) Totalkostnad (kr)','b) Tilbake (kr)'],
    fasitArr:[sum,rest],
    lГёsning:'Totalt: '+utvalg.map(function(v,i){return ant[i]+'Г—'+v.pris+'='+ant[i]*v.pris;}).join(' + ')+' = '+sum+' kr\nTilbake: '+betalt+' вҖ“ '+sum+' = '+rest+' kr'};
}

function genFartsRegning() {
  var v1=rnd(60,90), t1=rndF(0.5,2.5,1);
  var v2=rnd(90,120), t2=rndF(0.5,2.0,1);
  var d1=parseFloat((v1*t1).toFixed(1));
  var d2=parseFloat((v2*t2).toFixed(1));
  var dtot=parseFloat((d1+d2).toFixed(1));
  var ttot=parseFloat((t1+t2).toFixed(1));
  var vsnitt=parseFloat((dtot/ttot).toFixed(1));
  return {type:'fart_sammensatt',tema:'Fart, tid og strekning вҖ“ sammensatt',nivГҘ:'krevende',poeng:4,
    spГёrsmГҘl:'En bil kjГёrer '+v1+' km/t i '+t1+' time'+(t1!==1?'r':'')+', deretter '+v2+' km/t i '+t2+' time'+(t2!==1?'r':'')+'.\n\na) Finn total strekning.\nb) Finn gjennomsnittsfarten for hele turen.',
    instruksjon:'Strekning = fart Г— tid for hvert delstrekk. Gjsn. fart = total strekning / total tid.',
    svarType:'flertall',labels:['a) Total strekning (km)','b) Gjennomsnittsfart (km/t)'],
    fasitArr:[dtot,vsnitt],
    lГёsning:'Del 1: '+v1+'Г—'+t1+'='+d1+' km\nDel 2: '+v2+'Г—'+t2+'='+d2+' km\nTotalt: '+dtot+' km\nGjsn. fart: '+dtot+'/'+ttot+'='+vsnitt+' km/t'};
}

function genProsentEndring() {
  var start=rnd(200,1000);
  var opp=rnd(10,40);
  var ned=rnd(5,30);
  var etter_opp=parseFloat((start*(1+opp/100)).toFixed(0));
  var etter_ned=parseFloat((etter_opp*(1-ned/100)).toFixed(1));
  return {type:'pst_endring',tema:'Prosentvis endring вҖ“ to steg',nivГҘ:'krevende',poeng:3,
    spГёrsmГҘl:'En aksje er verdt '+start+' kr.\nDen stiger med '+opp+'% den fГёrste mГҘneden.\nSГҘ faller den med '+ned+'% den neste mГҘneden.\n\na) Hva er kursen etter fГёrste mГҘneden?\nb) Hva er kursen etter andre mГҘneden?\nc) Er aksjen mer eller mindre verdt enn utgangspunktet?',
    instruksjon:'Bruk vekstfaktor for hvert steg: ny verdi = gammel Г— (1 Вұ prosent/100)',
    svarType:'flertall',labels:['a) Etter mnd 1 (kr)','b) Etter mnd 2 (kr)'],
    fasitArr:[etter_opp,etter_ned],
    lГёsning:'Etter mnd 1: '+start+'Г—'+(1+opp/100).toFixed(2)+'='+etter_opp+' kr\nEtter mnd 2: '+etter_opp+'Г—'+(1-ned/100).toFixed(2)+'='+etter_ned+' kr\n'+(etter_ned<start?'Mindre ('+parseFloat((etter_ned-start).toFixed(1))+' kr)':'Mer ('+parseFloat((etter_ned-start).toFixed(1))+' kr)')};
}

function genPotensFlertrinns() {
  var a=rnd(2,4),b=rnd(2,3),c=rnd(2,3);
  var del1=Math.pow(a,b);
  var del2=Math.pow(del1,c);
  return {type:'potens_f',tema:'Potensregler вҖ“ flertrinns',nivГҘ:'middels',poeng:2,
    spГёrsmГҘl:'Regn ut:\n\n('+a+'^'+b+')^'+c,
    instruksjon:'Bruk regelen (aвҒҝ)бөҗ = aвҒҝбөҗ: gang eksponentene.',
    svarType:'tall',fasit:del2,tol:0,
    lГёsning:'('+a+'^'+b+')^'+c+' = '+a+'^('+(b*c)+') = '+del2};
}

function genSammensattArealOmkrets() {
  var l=rnd(8,20),b=rnd(5,12);
  var r=rnd(2,4);
  var A_rekt=l*b, O_rekt=2*(l+b);
  var A_sir=parseFloat((3.14*r*r).toFixed(2));

  return {type:'areal_o',tema:'Areal вҖ“ sammensatt figur',nivГҘ:'krevende',poeng:3,

    instruksjon:'A(halvsirkel) = ПҖГ—rВІ/2',
    svarType:'flertall',labels:['a) Rektangel (cmВІ)','b) Halvsirkel (cmВІ)','c) Totalt (cmВІ)'],
    fasitArr:[A_rekt, parseFloat((A_sir/2).toFixed(2)), parseFloat((A_rekt+A_sir/2).toFixed(2))],
    lГёsning:'A(rekt)='+l+'Г—'+b+'='+A_rekt+' cmВІ\nA(halvsirkel)=3.14Г—'+r+'ВІ/2='+A_sir+'/2='+A_sir/2+'cmВІ\nTotalt='+(A_rekt+A_sir/2).toFixed(2)+' cmВІ'};

// в”Җв”Җ ALGEBRA: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function genForenkleSammensatt() {
  var a=rnd(2,5),b=rnd(1,4),c=rnd(1,3),d=rnd(2,6);
  // a(bx+c) вҖ“ d(bxвҖ“a) = abx+ac вҖ“ dbx+da = (ab-db)x + (ac+da)
  var koeffX=a*b-d*b, konst=a*c+d*a;
  return {type:'forenkle_s',tema:'Forenkle sammensatte algebrauttrykk',nivГҘ:'krevende',poeng:3,
    spГёrsmГҘl:'Forenkle:\n\n'+a+'('+b+'x + '+c+') вҖ“ '+d+'('+b+'x вҖ“ '+a+')',
    instruksjon:'Gange ut begge parentesene, deretter samle like ledd.',
    svarType:'tekst',fasitTekst:koeffX+'x + '+konst,
    lГёsning:a+'Г—'+b+'x + '+a+'Г—'+c+' вҖ“ '+d+'Г—'+b+'x + '+d+'Г—'+a+'\n= '+a*b+'x + '+a*c+' вҖ“ '+d*b+'x + '+d*a+'\n= '+koeffX+'x + '+konst};
}

function genAlgebraOgTall() {
  var a=rnd(2,5),b=rnd(1,8),x=rnd(2,6),y=rnd(1,5);
  var val=a*x*x+b*y;
  return {type:'alg_tall',tema:'Beregn algebraisk uttrykk',nivГҘ:'middels',poeng:2,
    spГёrsmГҘl:'Beregn verdien av:\n\n'+a+'xВІ + '+b+'y\n\nnГҘr x = '+x+' og y = '+y,
    instruksjon:'Sett inn verdiene og bruk riktig regnerekkefГёlge (potens fГёrst).',
    svarType:'tall',fasit:val,tol:0,
    lГёsning:a+'В·'+x+'ВІ + '+b+'В·'+y+' = '+a+'В·'+x*x+' + '+b*y+' = '+a*x*x+' + '+b*y+' = '+val};
}

function genToLeddsuttrykk() {
  var a=rnd(2,7),b=rnd(1,6),c=rnd(2,5),d=rnd(1,5);
  // (ax+b)(cx+d) = acxВІ+(ad+bc)x+bd
  var ac=a*c, mid=a*d+b*c, bd=b*d;
  return {type:'toledd',tema:'Gange to tochsuttrykk (foil)',nivГҘ:'krevende',poeng:3,
    spГёrsmГҘl:'Gange ut og forenkle:\n\n('+a+'x + '+b+')('+c+'x + '+d+')',
    instruksjon:'Bruk FOIL: (a+b)(c+d) = ac + ad + bc + bd',
    svarType:'tekst',fasitTekst:ac+'xВІ + '+mid+'x + '+bd,
    lГёsning:'F: '+a+'xВ·'+c+'x = '+ac+'xВІ\nO: '+a+'xВ·'+d+' = '+a*d+'x\nI: '+b+'В·'+c+'x = '+b*c+'x\nL: '+b+'В·'+d+' = '+bd+'\n= '+ac+'xВІ + '+mid+'x + '+bd};
}

function genAlgebraFraVirkelighet() {
  var pris_stk=rnd(12,30),fast=rnd(20,80),ant=rnd(5,15);
  var total=pris_stk*ant+fast;
  return {type:'alg_virkelig',tema:'Sette opp og bruke algebraisk uttrykk',nivГҘ:'krevende',poeng:3,
    spГёrsmГҘl:'En taxi koster '+fast+' kr i startpris og '+pris_stk+' kr per km.\n\na) Sett opp funksjonsuttrykket f(x) for turen.\nb) Hva koster en tur pГҘ '+ant+' km?\nc) Hvor langt kan du kjГёre for '+total*2+' kr?',
    instruksjon:'a) f(x) = pris_per_kmВ·x + startpris\nb) Sett inn x\nc) LГёs likning',
    svarType:'flertall',labels:['b) Kostnad (kr)','c) Avstand (km)'],
    fasitArr:[total,(total*2-fast)/pris_stk],
    lГёsning:'f(x)='+pris_stk+'x+'+fast+'\nb) f('+ant+')='+pris_stk+'Г—'+ant+'+'+fast+'='+total+' kr\nc) '+pris_stk+'x+'+fast+'='+total*2+' вҶ’ x='+(total*2-fast)+'/'+pris_stk+'='+(total*2-fast)/pris_stk+' km'};
}

// в”Җв”Җ LIKNINGER: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function genLikningOgSjekk() {
  var a=rnd(3,8),b=rnd(2,a-1),c=rnd(5,25),x=rnd(2,8);
  var c_val=a*x-b*x+c;
  return {type:'lik_sjekk',tema:'LГёse og sjekke likning',nivГҘ:'middels',poeng:3,
    spГёrsmГҘl:'LГёs likningen:\n\n'+a+'x вҖ“ '+b+'x + '+c+' = '+c_val+'\n\nSett deretter prГёve pГҘ svaret.',
    instruksjon:'Samle x-leddene, lГёs for x, kontrollregn.',
    svarType:'tall',fasit:x,tol:0,enhet:'(x = ?)',
    lГёsning:(a-b)+'x = '+c_val+' вҖ“ '+c+' = '+(c_val-c)+'\nx = '+(c_val-c)+'/'+(a-b)+' = '+x+'\nSjekk: '+a+'В·'+x+' вҖ“ '+b+'В·'+x+' + '+c+' = '+(a*x-b*x+c)+' = '+c_val+' вң“'};
}

function genTekstOgLikning() {
  var eldre=rnd(8,15),diff=rnd(3,10);
  var totAlder=eldre*2+diff;
  var yngre=eldre-diff;
  return {type:'tekst_lik',tema:'Tekstoppgave вҖ“ alderslikning',nivГҘ:'krevende',poeng:3,
    spГёrsmГҘl:'Sofie er '+diff+' ГҘr eldre enn broren sin.\nTilsammen er de '+totAlder+' ГҘr gamle.\n\nSett opp en likning og finn alderen til begge.',

function genLikningssettFlertrinns() {

// в”Җв”Җ FUNKSJONER: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function genFunksjonsanalyse() {
  var a=plukk([-3,-2,-1,1,2,3]),b=rnd(-5,8);

    instruksjon:'Nullpunkt: sett f(x)=0. Funksjonsverdi: sett inn x.',
    svarType:'flertall',labels:['a) Nullpunkt x =','b) f('+x_test+') ='],
    fasitArr:[x0,y_test],
    lГёsning:'a) '+a+'x+'+b+'=0 вҶ’ x='+x0.toFixed(2)+'\nb) f('+x_test+')='+a+'В·'+x_test+'+'+b+'='+y_test+'\nc) '+(y_test>0?'Positiv':'Negativ')};
}

function genLinFunkFraData() {
  var a=plukk([-2,-1,1,2,3]),b=rnd(-4,8);
  var x1=rnd(0,3),x2=x1+rnd(2,4);

  var x3=rnd(x2+1,x2+5);
  var y3=a*x3+b;

    spГёrsmГҘl:'En lineГҰr funksjon gГҘr gjennom punktene P('+x1+', '+y1+') og Q('+x2+', '+y2+').\n\na) Finn stigningstallet a.\nb) Finn konstantleddet b.\nc) Hva er y nГҘr x = '+x3+'?',
    instruksjon:'a = (yвӮӮвҖ“yвӮҒ)/(xвӮӮвҖ“xвӮҒ), deretter b = yвӮҒ вҖ“ aВ·xвӮҒ',
    svarType:'flertall',labels:['a) Stigningstall a','b) Konstantledd b','c) y nГҘr x='+x3],

}

function genToFunksjoner() {
  var a1=rnd(1,3),b1=rnd(2,10);
  var a2=-rnd(1,3),b2=b1+rnd(5,20);
  var xS=parseFloat(((b2-b1)/(a1-a2)).toFixed(2));
  var yS=parseFloat((a1*xS+b1).toFixed(2));
  return {type:'tofunk',tema:'To funksjoner вҖ“ skjГҰringspunkt og sammenligning',nivГҘ:'krevende',poeng:4,
    spГёrsmГҘl:'f(x) = '+a1+'x + '+b1+'\ng(x) = '+a2+'x + '+b2+'\n\na) Finn skjГҰringspunktet mellom grafene.\nb) For hvilke x-verdier er f(x) > g(x)?',

    lГёsning:a1+'x+'+b1+'='+a2+'x+'+b2+'\n'+(a1-a2)+'x='+(b2-b1)+'\nx='+xS+', y='+yS+'\nb) f(x)>g(x) nГҘr x'+(a1>a2?'>':'<')+xS};
}

// в”Җв”Җ GEOMETRI: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function genVolumOgOverflate() {

}

// в”Җв”Җ STATISTIKK: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function genKomplettStatistikk() {
  var n=rnd(6,9);
  var tall=Array.from({length:n},function(){return rnd(4,24);}).sort(function(a,b){return a-b;});
  var sum=tall.reduce(function(a,b){return a+b;},0);
  var gjsn=parseFloat((sum/n).toFixed(2));
  var mid=Math.floor(n/2);
  var median=n%2===0?(tall[mid-1]+tall[mid])/2:tall[mid];
  var vv=tall[tall.length-1]-tall[0];
  var typetall=tall[Math.floor(n/3)];
  return {type:'stat_komplett',tema:'SentralmГҘl og spredningsmГҘl вҖ“ komplett analyse',nivГҘ:'krevende',poeng:4,
    spГёrsmГҘl:'Datasettet er:\n'+tall.join(', ')+'\n\nFinn:\na) Gjennomsnitt\nb) Median\nc) Variasjonsbredde',
    instruksjon:'Gjsn = sum/n. Median = midterste (etter sortering). VV = max вҖ“ min.',
    svarType:'flertall',labels:['a) Gjennomsnitt','b) Median','c) Variasjonsbredde'],
    fasitArr:[gjsn,median,vv],
    lГёsning:'Sortert: '+tall.join(', ')+'\nGjsn: '+sum+'/'+n+'='+gjsn+'\nMedian: '+median+'\nVV: '+tall[tall.length-1]+' вҖ“ '+tall[0]+' = '+vv};
}

function genFrekvensRelativ() {

    spГёrsmГҘl:total+' elever fikk disse karakterene:\n'+kats.map(function(k,i){return k+': '+ants[i];}).join(', ')+'\n\na) Finn relativ frekvens for A i prosent.\nb) Finn relativ frekvens for D.\nc) Hva er summen av alle relative frekvenser?',
    instruksjon:'Relativ frekvens = antall / totalt Г— 100%',
    svarType:'flertall',labels:['a) A-frekvens (%)','b) D-frekvens (%)'],
    fasitArr:[parseFloat((ants[0]/total*100).toFixed(1)),parseFloat((ants[3]/total*100).toFixed(1))],
    lГёsning:'a) '+ants[0]+'/'+total+'Г—100='+parseFloat((ants[0]/total*100).toFixed(1))+'%\nb) '+ants[3]+'/'+total+'Г—100='+parseFloat((ants[3]/total*100).toFixed(1))+'%\nc) 100% alltid'};
}

// в”Җв”Җ SANNSYNLIGHET: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function genSannsynlOgKomplement() {

function genFlereTrekk() {

    instruksjon:'c) P(A og B) = P(A) Г— P(B|A)',
    svarType:'flertall',labels:['a) P(1. rГёd)','b) P(2. rГёd | 1. rГёd)','c) P(begge rГёde)'],

// в”Җв”Җ ГҳKONOMI: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function genRentesRente() {
  var K=rnd(5,20)*1000, r=plukk([4,5,6,7,8]), n=rnd(3,6);
  var enkel=parseFloat((K+K*r*n/100).toFixed(0));
  var rente=parseFloat((K*Math.pow(1+r/100,n)).toFixed(0));

    spГёrsmГҘl:'Du setter inn '+K.toLocaleString('no')+' kr med '+r+'% rente per ГҘr i '+n+' ГҘr.\n\na) Beregn sluttsummen med enkel rente.\nb) Beregn sluttsummen med rentes rente (vekstfaktor).\nc) Hva er forskjellen?',
    instruksjon:'Enkel: K+KВ·rВ·n/100. Rentes: KВ·(1+r/100)^n',
    svarType:'flertall',labels:['a) Enkel rente (kr)','b) Rentes rente (kr)'],
    fasitArr:[enkel,rente],
    lГёsning:'a) '+K+'+'+K+'Г—'+r+'/100Г—'+n+'='+enkel+' kr\nb) '+K+'Г—'+(1+r/100).toFixed(2)+'^'+n+'вүҲ'+rente+' kr\nForskjell: '+(rente-enkel)+' kr'};
}

function genBudsjettAnalyse() {
  var inntekt=rnd(30,60)*1000;
  var utgifter={husleie:rnd(8,16)*1000,mat:rnd(4,7)*1000,transport:rnd(2,4)*1000,klГҰr:rnd(1,3)*1000};
  var tot_ut=Object.values(utgifter).reduce(function(a,b){return a+b;},0);
  var rest=inntekt-tot_ut;
  var spar_pst=parseFloat((rest/inntekt*100).toFixed(1));
  return {type:'budsjett_analyse',tema:'Budsjettanalyse',nivГҘ:'krevende',poeng:4,
    spГёrsmГҘl:'MГҘnedsinntekt: '+inntekt.toLocaleString('no')+' kr\nHusleie: '+utgifter.husleie.toLocaleString('no')+' kr\nMat: '+utgifter.mat.toLocaleString('no')+' kr\nTransport: '+utgifter.transport.toLocaleString('no')+' kr\nKlГҰr: '+utgifter.klГҰr.toLocaleString('no')+' kr\n\na) Finn totale utgifter.\nb) Finn hva som er igjen.\nc) Finn spareprosenten (rest / inntekt Г— 100).',
    instruksjon:'Summer alle utgifter, trekk fra inntekt, regn prosent.',
    svarType:'flertall',labels:['a) Totale utgifter (kr)','b) Rest (kr)','c) Spareprosent (%)'],
    fasitArr:[tot_ut,rest,spar_pst],
    lГёsning:'Utgifter: '+tot_ut.toLocaleString('no')+' kr\nRest: '+rest.toLocaleString('no')+' kr\nSpareprosent: '+spar_pst+'%'};
}

// в”Җв”Җ MГ…LING: NYE FLERTRINNS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function genFartOgTidSammensatt() {

function genEnhetsomgjГёringKjede() {

function byggProve(minutter) {
  var enkle=[genKoordinater, genFunksjonsverdi, genFunksjonsoppg, genFraGraf, genStigningstall, genNullpunkt, genFunksjonsuttrykk, genSkjГҰring];
  var ft=[genFunksjonsanalyse, genLinFunkFraData, genToFunksjoner];
  var ant=minutter<=45?15:minutter<=60?20:27;
  var n_ft=Math.min(ft.length,Math.ceil(ant/3));
  var n_e=ant-n_ft;
  var vft=bland(ft).slice(0,n_ft);
  var ve=bland(enkle).slice(0,Math.min(n_e,enkle.length));
  while(ve.length+vft.length<ant) vft.push(plukk(ft));
  return bland(vft.concat(ve)).map(function(fn,i){var o=fn();o._idx=i;return o;});
}
// в”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
var state = {
  oppgaver: [],
  svar: {},
  gjeldende: 0,
  minutter: 0,
  tidIgjen: 0,
  tidtakerInt: null,
  suValg: {},
  fvValg: {},
  dragSrc: null,
};

// oppdaterAntModal genereres per emne

function startProve(min) {
  document.getElementById('modal-tid').classList.remove('vis');
  state.minutter = min;
  state.oppgaver = byggProve(min);
  state.svar = {};
  state.gjeldende = 0;
  state.suValg = {};
  state.fvValg = {};

  document.getElementById('st-tot').textContent = state.oppgaver.length;
  document.getElementById('prv-undertittel').textContent = UNDERTITTEL+' В· '+min+' min';
  document.getElementById('app').style.display = 'grid';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('resultat').style.display = 'none';

  // Start tidtaker
  state.tidIgjen = min * 60;
  document.getElementById('tidtaker').style.display = 'block';
  oppdaterTid();
  state.tidtakerInt = setInterval(function() {
    state.tidIgjen--;
    oppdaterTid();
    if (state.tidIgjen <= 0) {
      clearInterval(state.tidtakerInt);
      leverProve();
    }
  }, 1000);

  renderOppgave(0);
}

function oppdaterTid() {
  var m = Math.floor(state.tidIgjen/60);
  var s = state.tidIgjen % 60;
  var el = document.getElementById('tid-display');
  el.textContent = m+':'+(s<10?'0':'')+s;
  el.classList.toggle('kritisk', state.tidIgjen <= 120);
}

// в”Җв”Җ RENDER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderOppgave(idx) {
  state.gjeldende = idx;
  var o = state.oppgaver[idx];
  var panel = document.getElementById('panel');
  var besvart = !!state.svar[idx];

  var nivГҘHtml = '';
  var cls = o.nivГҘ==='krevende'?'hard':o.nivГҘ==='middels'?'middels':'';
  var emo = o.nivГҘ==='lett'?'рҹҚҺ':o.nivГҘ==='middels'?'вӯҗ':'рҹ”Ҙ';
  nivГҘHtml = '<span class="meta-tag meta-niva '+cls+'">'+emo+' '+(o.nivГҘ||'lett')+'</span>';

  var fasitHtml = besvart ? renderFasit(o, state.svar[idx]) : '';

  panel.innerHTML =
    '<div class="oppg-header">'+
      '<div class="oppg-badge">Oppg. '+(idx+1)+'</div>'+
      '<div class="oppg-tittel">'+(o.tema||o.type)+'</div>'+
    '</div>'+
    '<div class="oppg-meta">'+
      '<span class="meta-tag meta-poeng">рҹҸ… '+o.poeng+' '+(o.poeng===1?'poeng':'poeng')+'</span>'+
      nivГҘHtml+
    '</div>'+
    '<div class="oppg-tekst">'+(o.spГёrsmГҘl||'')+'</div>'+
    '<div class="instruksjon">рҹ“Ң '+(o.instruksjon||'')+'</div>'+
    (besvart ? '' : renderSvarBoks(o))+
    '<div class="knapp-rad">'+
      '<button class="sjekk-btn" id="sjekk-btn" onclick="sjekk('+idx+')"'+(besvart?' disabled':'')+'>вң“ Sjekk svar</button>'+
      '<button class="hopp-btn" onclick="neste()">Hopp over вҶ’</button>'+
      (idx===state.oppgaver.length-1 ? '<button class="lever-btn" id="lever-btn" style="display:block" onclick="leverProve()">рҹ“© Lever prГёven</button>' : '')+
      '<button class="neste-btn" id="neste-btn" onclick="neste()"'+(besvart?'style="display:block"':'')+'>Neste в–¶</button>'+
    '</div>'+
    '<div class="fb" id="fb"></div>'+
    fasitHtml;

  // Lever-knapp synlig pГҘ siste etter besvart
  oppdaterListe();
  oppdaterProgress();
}

function renderSvarBoks(o) {
  if (o.svarType === 'tall') {
    return '<div class="svar-wrap"><div class="svar-label">Ditt svar</div>'+
      '<input type="number" step="any" class="svar-inp" id="svar-inp" placeholder="SvarвҖҰ" onkeydown="if(event.key===\'Enter\')sjekk(state.gjeldende)">'+
      (o.enhet?'<span class="svar-enhet">'+o.enhet+'</span>':'')+
      '</div>';
  }
  if (o.svarType === 'tekst') {
    return '<div class="svar-wrap"><div class="svar-label">Ditt svar</div>'+
      '<input type="text" class="svar-inp wide" id="svar-tekst" placeholder="SvarвҖҰ">'+
      '</div>';
  }
  if (o.svarType === 'flertall') {
    var html = '<div class="svar-wrap"><div class="svar-label">Dine svar</div>';
    o.labels.forEach(function(lbl,i){
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'+
        '<span style="font-size:.82rem;color:var(--dim);min-width:150px;">'+lbl+'</span>'+
        '<input type="number" step="any" class="svar-inp" id="svar-inp-'+i+'" placeholder="вҖҰ">'+
        '</div>';
    });
    return html+'</div>';
  }
  if (o.svarType === 'flervalg') {
    if (!state.fvValg[state.gjeldende]) state.fvValg[state.gjeldende] = null;
    var html = '<div class="svar-wrap fv-grid">';
    o.alternativer.forEach(function(alt,i){
      html += '<button class="fv-btn" id="fv-'+i+'" onclick="velgFV('+i+')">'+alt+'</button>';
    });
    return html+'</div>';
  }
  return '';
}

function velgFV(i) {
  var idx = state.gjeldende;
  state.fvValg[idx] = i;
  var btns = document.querySelectorAll('.fv-btn');
  btns.forEach(function(b,j){ b.classList.toggle('valgt', j===i); });
}

function renderFasit(o) {
  if (!o.lГёsning) return '';
  return '<div class="fasit-boks">'+
    '<div class="fasit-tittel">рҹ“– FremgangsmГҘte</div>'+
    '<pre>'+(o.lГёsning||'')+'</pre>'+
    '</div>';
}

// в”Җв”Җ SJEKK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function sjekk(idx) {
  var o = state.oppgaver[idx];
  var fb = document.getElementById('fb');
  var poeng = 0, maxPoeng = o.poeng;
  var status = 'feil', melding = '';

  function hentTall(id){var el=document.getElementById(id);return el?parseFloat(el.value.replace(',','.')):NaN;}
  function hentTekst(id){var el=document.getElementById(id);return el?el.value.trim():'';}
  function sjekkTall(v,f,tol){return !isNaN(v) && Math.abs(v-f)<=(tol||0.05);}

  if (o.svarType === 'tall') {
    var v = hentTall('svar-inp');
    if (isNaN(v)){fb.style.display='block';fb.className='fb feil';fb.textContent='Skriv inn et tall!';return;}
    var ok = sjekkTall(v, o.fasit, o.tol);
    poeng = ok ? maxPoeng : 0;
    status = ok ? 'riktig' : 'feil';
    melding = ok ? 'вң“ Riktig! Svaret er '+o.fasit+(o.enhet?' '+o.enhet:'')+' вң“'
               : 'вң— Ikke riktig. Fasit: '+o.fasit+(o.enhet?' '+o.enhet:'')+'. Se fremgangsmГҘten under.';
    state.svar[idx] = {status, poeng, ditt: v};
  }

  else if (o.svarType === 'tekst') {
    var t = hentTekst('svar-tekst').toLowerCase();
    var fasitLow = (o.fasitTekst||'').toLowerCase();
    var ok2 = t.includes(fasitLow.replace(/\s/g,'')) || t===fasitLow;
    poeng = ok2 ? maxPoeng : 0;
    status = ok2 ? 'riktig' : 'feil';
    melding = ok2 ? 'вң“ Riktig!' : 'вң— Fasit: '+o.fasitTekst;
    state.svar[idx] = {status, poeng, ditt: t};
  }

  else if (o.svarType === 'flervalg') {
    var valgt = state.fvValg[idx];
    if (valgt === null || valgt === undefined){fb.style.display='block';fb.className='fb feil';fb.textContent='Velg et svar!';return;}
    var korrektIdx = o.fasitIdx !== undefined ? o.fasitIdx : o.alternativer.indexOf(o.alternativer.find(function(a){return String(a)===String(o.fasit);}));
    var okFV = valgt === korrektIdx;
    poeng = okFV ? maxPoeng : 0;
    status = okFV ? 'riktig' : 'feil';
    melding = okFV ? 'вң“ Riktig!' : 'вң— Riktig svar: '+o.alternativer[korrektIdx];
    // Marker knapper
    document.querySelectorAll('.fv-btn').forEach(function(btn,j){
      btn.disabled = true;
      if (j===korrektIdx) btn.className='fv-btn riktig-svar';
      else if (j===valgt) btn.className='fv-btn feil-svar';
    });
    state.svar[idx] = {status, poeng, ditt: o.alternativer[valgt], fasit: o.alternativer[korrektIdx]};
  }

  else if (o.svarType === 'flertall') {
    poeng = 0;
    state.svar[idx] = {status:'delvis', poeng:0, ditt:'вҖ”'};
    melding = 'Se fremgangsmГҘten under og vurder selv.';
    status = 'delvis';
  }

  fb.style.display = 'block';
  fb.className = 'fb '+status;
  fb.textContent = melding;

  // Vis neste-knapp
  var neste = document.getElementById('neste-btn');
  if (neste) neste.style.display = 'block';
  var sjekkBtn = document.getElementById('sjekk-btn');
  if (sjekkBtn) sjekkBtn.disabled = true;

  // Legg til fasit
  var fasitDiv = document.createElement('div');
  fasitDiv.innerHTML = renderFasit(o);
  document.getElementById('panel').appendChild(fasitDiv);

  oppdaterStats();
  oppdaterListe();
}

function neste() {
  var n = state.gjeldende + 1;
  if (n >= state.oppgaver.length) leverProve();
  else renderOppgave(n);
}

// в”Җв”Җ LEVER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function leverProve() {
  clearInterval(state.tidtakerInt);
  document.getElementById('app').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';

  var totPoeng=0, totMax=0, riktige=0;
  state.oppgaver.forEach(function(o,i){
    totMax += o.poeng;
    var sv = state.svar[i];
    if (sv){ totPoeng += sv.poeng; if(sv.status==='riktig') riktige++; }
  });
  var pst = totMax>0 ? Math.round(100*totPoeng/totMax) : 0;

  // Karakterkalkulator
  function poengTilKarakter(p) {
    if (p>=90) return {kar:'6',tekst:'Fremragende',farge:'#60d0a0'};
    if (p>=77) return {kar:'5',tekst:'Meget godt',farge:'#5b8dd9'};
    if (p>=63) return {kar:'4',tekst:'Godt',farge:'#e8b84b'};
    if (p>=50) return {kar:'3',tekst:'Nokorlunde',farge:'#e8874b'};
    if (p>=37) return {kar:'2',tekst:'LГҘg kompetanse',farge:'#e05c6e'};
    return {kar:'1',tekst:'SvГҰrt lГҘg kompetanse',farge:'#c03050'};
  }
  var kInfo = poengTilKarakter(pst);

  // Logg
  try { if(window._skaplab_logg) window._skaplab_logg(RESSURS,KM_KODE,pst,state.oppgaver.length,riktige,state.oppgaver.length,state.oppgaver.length); } catch(e){}

  // Render resultat
  var html = '<div class="resultat-tittel">PrГёve levert! рҹҺү</div>'+
    '<div class="resultat-score">'+totPoeng+' / '+totMax+' poeng</div>'+
    '<div class="resultat-pst">'+pst+'% riktig</div>'+
    '<div style="margin:16px auto 20px;max-width:320px;background:rgba(255,255,255,.04);border:1.5px solid '+kInfo.farge+';border-radius:14px;padding:16px 20px;text-align:center;">'+
      '<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:'+kInfo.farge+';margin-bottom:6px;">Karakterestimat</div>'+
      '<div style="font-size:3.2rem;font-weight:900;color:'+kInfo.farge+';line-height:1;font-family:var(--font-d)">'+kInfo.kar+'</div>'+
      '<div style="font-size:.85rem;color:rgba(255,255,255,.6);margin-top:6px;">'+kInfo.tekst+'</div>'+
      '<div style="font-size:.7rem;color:rgba(255,255,255,.3);margin-top:10px;border-top:1px solid rgba(255,255,255,.07);padding-top:8px;">'+
        '1: &lt;37% В· 2: 37вҖ“49% В· 3: 50вҖ“62% В· 4: 63вҖ“76% В· 5: 77вҖ“89% В· 6: 90%+'+
      '</div>'+
    '</div>'+
    '<div class="resultat-grid">'+
      '<div class="res-kort"><div class="res-tall">'+riktige+'</div><div class="res-lab">Riktige</div></div>'+
      '<div class="res-kort"><div class="res-tall">'+(state.oppgaver.length-riktige)+'</div><div class="res-lab">Galt/hoppet</div></div>'+
      '<div class="res-kort"><div class="res-tall">'+state.minutter+' min</div><div class="res-lab">Tid</div></div>'+
    '</div>'+
    '<div class="resultat-overskrift">Gjennomgang</div>';

  state.oppgaver.forEach(function(o,i){
    var sv = state.svar[i];
    var cls = sv ? sv.status : 'gal';
    var ditt = sv ? (sv.ditt !== undefined ? sv.ditt : 'вҖ”') : '(ikke besvart)';
    var fasit = o.svarType==='flervalg' ? (sv && sv.fasit || o.alternativer[o.fasitIdx||0]) : (o.fasit||o.fasitTekst||'Se lГёsning');
    html += '<div class="gjennomgang-rad '+(cls==='riktig'?'ok':cls==='delvis'?'delvis':'gal')+'">'+
      '<div class="gjennomgang-spГёrsmГҘl">Oppg. '+(i+1)+': '+(o.tema||o.type)+'</div>'+
      '<div class="gjennomgang-ditt">Ditt svar: <b>'+ditt+'</b></div>'+
      (cls!=='riktig'?'<div class="gjennomgang-fasit">вң“ Fasit: '+fasit+'</div>':'')+
    '</div>';
  });

  html += '<button class="ny-Гёkt-btn" onclick="location.reload()">рҹ”Җ Ny prГёve</button>'+
    '<button class="gjennomgang-btn" onclick="history.back()">вҶҗ Tilbake til matte-hub</button>';

  var res = document.getElementById('resultat');
  res.innerHTML = html;
  res.style.display = 'block';
}

// в”Җв”Җ STATS OG NAVIGASJON в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function oppdaterStats() {
  var totPoeng=0, totMax=0, besvart=0;
  state.oppgaver.forEach(function(o,i){
    totMax += o.poeng;
    if(state.svar[i]){besvart++;totPoeng+=state.svar[i].poeng;}
  });
  document.getElementById('st-poeng').textContent = totPoeng;
  document.getElementById('st-max').textContent = totMax;
  document.getElementById('st-besvart').textContent = besvart;
}

function oppdaterProgress() {
  var n = state.oppgaver.length;
  var idx = state.gjeldende;
  var pst = Math.round(100*(idx+1)/n);
  document.getElementById('prog-tekst').textContent = 'Oppgave '+(idx+1)+' av '+n;
  document.getElementById('prog-pst').textContent = pst+'%';
  document.getElementById('progress-fill').style.width = pst+'%';
}

function oppdaterListe() {
  var liste = document.getElementById('liste');
  var html = '';
  state.oppgaver.forEach(function(o,i){
    var sv = state.svar[i];
    var ikon = sv ? (sv.status==='riktig'?'вң…':sv.status==='delvis'?'рҹҹЎ':'вқҢ') : (i===state.gjeldende?'в–¶':'в—Ӣ');
    var cls = 'liste-knapp'+(i===state.gjeldende?' aktiv':'')+(sv?sv.status==='riktig'?' ok':' feil':'');
    html += '<button class="'+cls+'" onclick="renderOppgave('+i+')">'+
      '<span class="liste-ikon">'+ikon+'</span>'+
      '<span>Oppg. '+(i+1)+'</span>'+
      '<span class="liste-poeng">'+(sv?sv.poeng+'/'+o.poeng:'_/'+o.poeng)+'</span>'+
    '</button>';
  });
  liste.innerHTML = html;
}

// в”Җв”Җ START в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
oppdaterAntModal();

function oppdaterAntModal(){[45,60,90].forEach(function(m){var ant=m<=45?15:m<=60?20:27;document.getElementById('ant-'+m).textContent=ant+' oppgaver В· ca. '+m+' min';});}
oppdaterAntModal();
</script></body></html>
