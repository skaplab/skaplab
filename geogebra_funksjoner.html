<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoGebra – Funksjoner · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
<style>
:root{
  --bg:#06101e;--card:#131f35;--border:rgba(255,255,255,.08);
  --accent:#ffd700;--green:#4ade80;--red:#f87171;
  --text:#e8f0ff;--dim:#7a90b0;
  --font-h:'Fredoka One',cursive;--font-b:'Nunito',sans-serif;
  --nav-h:44px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-b);}
#topbar{height:var(--nav-h);display:flex;align-items:center;gap:8px;padding:0 16px;
  background:rgba(6,16,30,.95);border-bottom:1px solid var(--border);font-size:.8rem;flex-shrink:0;z-index:100;}
#topbar a{color:var(--dim);text-decoration:none;}
#topbar a:hover{color:var(--text);}
#topbar span.sep{color:rgba(255,255,255,.2);}
#topbar span.tittel{color:var(--text);font-weight:600;}
#topbar .spacer{flex:1;}
.otabs{display:flex;gap:4px;overflow-x:auto;max-width:50vw;}
.otab{padding:4px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:transparent;color:var(--dim);cursor:pointer;font-size:.72rem;
  font-family:var(--font-b);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.otab.aktiv{background:rgba(255,215,0,.12);border-color:var(--accent);color:var(--accent);}
.otab.løst{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green);}
.topbar-stats{display:flex;gap:10px;font-size:.76rem;color:var(--dim);margin-left:8px;white-space:nowrap;}
.topbar-stats b{color:var(--accent);font-family:var(--font-h);}
.grp-tabs{display:flex;gap:3px;flex-wrap:wrap;padding:5px 12px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);}
.grp-tab{padding:3px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.08);
  background:transparent;color:var(--dim);cursor:pointer;font-size:.72rem;
  font-family:var(--font-b);transition:all .15s;white-space:nowrap;}
.grp-tab.aktiv{background:rgba(255,215,0,.1);border-color:var(--accent);color:var(--accent);}
#app{display:flex;height:calc(100vh - var(--nav-h) - 34px);overflow:hidden;}
#ggb-wrap{flex:1;min-width:0;background:#fff;position:relative;}
#ggb-container{width:100%;height:100%;}
#panel{width:300px;flex-shrink:0;background:var(--bg);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;}
.fremdrift{display:flex;gap:5px;justify-content:center;padding:10px 0 4px;}
.fp{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .3s;}
.fp.aktiv{background:var(--accent);}
.fp.løst{background:var(--green);}
.oppg-boks{padding:14px;border-bottom:1px solid var(--border);}
.oppg-label{font-size:.68rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.oppg-tekst{font-size:.88rem;line-height:1.6;margin-bottom:8px;}
.oppg-tekst strong{color:var(--accent);}
.oppg-hint{font-size:.74rem;color:var(--dim);line-height:1.5;background:rgba(255,255,255,.04);border-radius:6px;padding:7px 10px;}
.svar-boks{padding:14px;flex:1;}
.svar-label{font-size:.74rem;color:var(--dim);margin-bottom:8px;}
.slider-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.sval{background:rgba(255,255,255,.05);border-radius:7px;padding:8px;text-align:center;}
.sval-n{font-family:var(--font-h);font-size:1.3rem;color:var(--accent);}
.sval-l{font-size:.66rem;color:var(--dim);}
.koeff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.koeff-grid.to{grid-template-columns:1fr 1fr;}
.koeff-felt{display:flex;flex-direction:column;gap:4px;}
.koeff-felt label{font-size:.7rem;color:var(--dim);text-align:center;}
.koeff-input{height:40px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  border-radius:7px;color:var(--text);font-family:var(--font-h);font-size:1.1rem;
  text-align:center;outline:none;transition:border-color .15s;width:100%;}
.koeff-input:focus{border-color:var(--accent);}
.sjekk-btn{width:100%;padding:11px;font-family:var(--font-h);font-size:1rem;
  background:var(--accent);color:#000;border:none;border-radius:9px;cursor:pointer;transition:all .15s;}
.sjekk-btn:hover{filter:brightness(1.08);}
.sjekk-btn:disabled{opacity:.4;cursor:default;}
.fb{margin-top:8px;padding:9px 12px;border-radius:8px;font-size:.8rem;line-height:1.5;display:none;}
.fb.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);display:block;}
.fb.feil{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);display:block;}
.fb.nesten{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);color:var(--accent);display:block;}
.neste-btn{width:100%;padding:9px;font-family:var(--font-h);font-size:.92rem;
  background:var(--green);color:#000;border:none;border-radius:8px;cursor:pointer;display:none;margin-top:6px;}
@media(max-width:680px){
  html,body{overflow:auto;}
  #app{flex-direction:column;height:auto;}
  #ggb-wrap{height:60vw;min-height:280px;flex:none;}
  #panel{width:100%;border-left:none;border-top:1px solid var(--border);}
  .otabs{max-width:80vw;}
}
</style>
</head>
<body>
<div id="topbar">
  <a href="index.html">🏠</a>
  <span class="sep">/</span>
  <a href="matte_hub.html">Matematikk</a>
  <span class="sep">/</span>
  <span class="tittel">📈 GeoGebra – Funksjoner</span>
  <div class="spacer"></div>
  <div class="otabs" id="oppg-tabs"></div>
  <div class="topbar-stats">
    <span>✅ <b id="st-løst">0</b></span>
    <span>🎯 <b id="st-forsøk">0</b></span>
  </div>
</div>
<div class="grp-tabs" id="grp-tabs"></div>
<div id="app">
  <div id="ggb-wrap">
    <div id="ggb-container"></div>
  </div>
  <div id="panel">
    <div class="fremdrift" id="fremdrift"></div>
    <div class="oppg-boks">
      <div class="oppg-label" id="oppg-label">Oppgave</div>
      <div class="oppg-tekst" id="oppg-tekst">Laster GeoGebra…</div>
      <div class="oppg-hint" id="oppg-hint"></div>
    </div>
    <div class="svar-boks" id="svar-boks"></div>
  </div>
</div>
<script>
// ══════════════════════════════════════════════════════════════════
// OPPGAVE-SAMLING 3: Avgrensning, ekstremalpunkt, x/y-verdier
// og skjæringspunkt – med GeoGebra-kommandoer for sjekk
// ══════════════════════════════════════════════════════════════════

var OPPGAVER = [

// ── GRUPPE 1: AVGRENSE GRAF ────────────────────────────────────────

{
  id: 'avg1',
  gruppe: 'Avgrense graf',
  tittel: '1 · Avgrens f(x) = x²',
  type: 'avgrens',
  tekst: 'Bruk sliderne <strong>a</strong> og <strong>b</strong> til å avgrense grafen <strong>f(x) = x²</strong> slik at den bare vises for <strong>−2 ≤ x ≤ 3</strong>.',
  hint: 'Dra slider a til −2 og slider b til 3. Grafen skal bare vises mellom disse verdiene.',
  ggbKommandoer: [
    'ZoomIn(-4, -1, 5, 12)',
    'a = Slider(-5, 0, 0.5)',
    'b = Slider(0, 5, 0.5)',
    'SetValue(a, -4)',
    'SetValue(b, 4)',
    'bakgrunn(x) = x^2',
    'SetColor(bakgrunn, "LightGray")',
    'SetLineStyle(bakgrunn, 1)',
    'SetLineThickness(bakgrunn, 1)',
    'f(x) = If(x >= a && x <= b, x^2)',
    'SetColor(f, "Blue")',
    'SetLineThickness(f, 3)',
    'ShowLabel(a, true)',
    'ShowLabel(b, true)',
  ],
  fasitA: -2, fasitB: 3,
  sliderVis: ['a', 'b'],
  sliderLabels: ['a (venstre grense)', 'b (høyre grense)'],
  sjekk: function(ggb) {
    var a = ggb.getValue('a'), b = ggb.getValue('b');
    var ok = Math.abs(a - (-2)) < 0.3 && Math.abs(b - 3) < 0.3;
    var nesten = Math.abs(a - (-2)) < 0.8 || Math.abs(b - 3) < 0.8;
    return {
      ok: ok, nesten: !ok && nesten,
      melding: ok
        ? '✓ Riktig! Grafen vises for −2 ≤ x ≤ 3.'
        : 'a = ' + a.toFixed(1) + ' (skal være −2), b = ' + b.toFixed(1) + ' (skal være 3).'
    };
  }
},

{
  id: 'avg2',
  gruppe: 'Avgrense graf',
  tittel: '2 · Avgrens f(x) = 2ˣ',
  type: 'avgrens',
  tekst: 'Avgrens grafen <strong>f(x) = 2ˣ</strong> slik at den bare vises for <strong>−3 ≤ x ≤ 4</strong>.',
  hint: 'Dra slider a til −3 og slider b til 4.',
  ggbKommandoer: [
    'ZoomIn(-5, -1, 6, 18)',
    'a = Slider(-5, 0, 0.5)',
    'b = Slider(0, 6, 0.5)',
    'SetValue(a, -4)',
    'SetValue(b, 5)',
    'bakgrunn(x) = 2^x',
    'SetColor(bakgrunn, "LightGray")',
    'SetLineStyle(bakgrunn, 1)',
    'f(x) = If(x >= a && x <= b, 2^x)',
    'SetColor(f, "Purple")',
    'SetLineThickness(f, 3)',
  ],
  fasitA: -3, fasitB: 4,
  sliderVis: ['a', 'b'],
  sliderLabels: ['a (venstre grense)', 'b (høyre grense)'],
  sjekk: function(ggb) {
    var a = ggb.getValue('a'), b = ggb.getValue('b');
    var ok = Math.abs(a - (-3)) < 0.3 && Math.abs(b - 4) < 0.3;
    return {
      ok: ok, nesten: !ok && (Math.abs(a-(-3))<0.8 || Math.abs(b-4)<0.8),
      melding: ok ? '✓ Riktig! Grafen vises for −3 ≤ x ≤ 4.'
                  : 'a = ' + a.toFixed(1) + ' (skal være −3), b = ' + b.toFixed(1) + ' (skal være 4).'
    };
  }
},

// ── GRUPPE 2: EKSTREMALPUNKT ───────────────────────────────────────

{
  id: 'eks1',
  gruppe: 'Ekstremalpunkt',
  tittel: '3 · Dra til toppunktet',
  type: 'dra_punkt',
  tekst: 'Grafen viser <strong>f(x) = −x² + 4x − 1</strong>. <strong>Dra punkt E</strong> langs grafen til toppunktet. Bruk så "Sjekk svar".',
  hint: 'GeoGebra beregner toppunktet med TurningPoint(f). Dra E til høyest mulig punkt på grafen.',
  ggbKommandoer: [
    'ZoomIn(-1, -3, 5, 5)',
    'f(x) = -x^2 + 4x - 1',
    'SetColor(f, "Blue")',
    'SetLineThickness(f, 3)',
    'T = TurningPoint(f)',
    'SetVisible(T, false)',
    'E = Point(f)',
    'SetColor(E, "Orange")',
    'SetPointSize(E, 7)',
    'ShowLabel(E, true)',
  ],
  fasitX: 2, fasitY: 3,
  sjekk: function(ggb) {
    var ex = ggb.getXcoord('E'), ey = ggb.getYcoord('E');
    var tx = ggb.getXcoord('T'), ty = ggb.getYcoord('T');
    if (isNaN(ex)) return { ok:false, nesten:false, melding:'Dra punkt E til toppunktet på grafen!' };
    var ok = Math.abs(ex - tx) < 0.2 && Math.abs(ey - ty) < 0.2;
    var nesten = Math.abs(ex - tx) < 0.6;
    if (ok) {
      ggb.setVisible('T', true);
      ggb.setColor('T', 0, 200, 0);
      ggb.setPointSize('T', 6);
    }
    return {
      ok: ok, nesten: !ok && nesten,
      melding: ok
        ? '✓ Riktig! Toppunkt T(' + tx.toFixed(1) + ', ' + ty.toFixed(1) + '). x = −b/(2a) = 2, f(2) = 3.'
        : 'E er i (' + ex.toFixed(2) + ', ' + ey.toFixed(2) + '). Dra lenger mot toppen! Toppunktet er i x = 2.'
    };
  }
},

{
  id: 'eks2',
  gruppe: 'Ekstremalpunkt',
  tittel: '4 · Dra til bunnpunktet',
  type: 'dra_punkt',
  tekst: 'Grafen viser <strong>f(x) = x² − 6x + 5</strong>. <strong>Dra punkt E</strong> langs grafen til bunnpunktet.',
  hint: 'Bunnpunktet er det laveste punktet på parabelen. x = −b/(2a) = 6/2 = 3.',
  ggbKommandoer: [
    'ZoomIn(-1, -6, 7, 8)',
    'f(x) = x^2 - 6x + 5',
    'SetColor(f, "Blue")',
    'SetLineThickness(f, 3)',
    'T = TurningPoint(f)',
    'SetVisible(T, false)',
    'E = Point(f)',
    'SetColor(E, "Orange")',
    'SetPointSize(E, 7)',
    'ShowLabel(E, true)',
  ],
  fasitX: 3, fasitY: -4,
  sjekk: function(ggb) {
    var ex = ggb.getXcoord('E'), ey = ggb.getYcoord('E');
    var tx = ggb.getXcoord('T'), ty = ggb.getYcoord('T');
    if (isNaN(ex)) return { ok:false, nesten:false, melding:'Dra punkt E til bunnpunktet på grafen!' };
    var ok = Math.abs(ex - tx) < 0.2 && Math.abs(ey - ty) < 0.2;
    if (ok) { ggb.setVisible('T', true); ggb.setColor('T', 0, 200, 0); ggb.setPointSize('T', 6); }
    return {
      ok: ok, nesten: !ok && Math.abs(ex-tx)<0.6,
      melding: ok
        ? '✓ Riktig! Bunnpunkt T(' + tx.toFixed(1) + ', ' + ty.toFixed(1) + ').'
        : 'E er i (' + ex.toFixed(2) + ', ' + ey.toFixed(2) + '). Dra lenger mot bunnen! Bunnpunkt x = 3.'
    };
  }
},

{
  id: 'eks3',
  gruppe: 'Ekstremalpunkt',
  tittel: '5 · To ekstremalpunkt',
  type: 'dra_to_punkt',
  tekst: 'Grafen viser <strong>f(x) = x³ − 3x</strong>. Funksjonen har <strong>to ekstremalpunkt</strong>. Dra punkt <strong>E1</strong> til lokalt maksimum og <strong>E2</strong> til lokalt minimum.',
  hint: 'Derivér: f\'(x) = 3x² − 3 = 0 → x = ±1. Maks i x = −1, min i x = 1.',
  ggbKommandoer: [
    'ZoomIn(-3, -4, 3, 4)',
    'f(x) = x^3 - 3x',
    'SetColor(f, "Blue")',
    'SetLineThickness(f, 3)',
    'Tmaks = Extremum(f, -3, 0)',
    'Tmin = Extremum(f, 0, 3)',
    'SetVisible(Tmaks, false)',
    'SetVisible(Tmin, false)',
    'E1 = Point(f)',
    'E2 = Point(f)',
    'SetColor(E1, "Orange")',
    'SetColor(E2, "Green")',
    'SetPointSize(E1, 7)',
    'SetPointSize(E2, 7)',
    'ShowLabel(E1, true)',
    'ShowLabel(E2, true)',
  ],
  sjekk: function(ggb) {
    var e1x = ggb.getXcoord('E1'), e1y = ggb.getYcoord('E1');
    var e2x = ggb.getXcoord('E2'), e2y = ggb.getYcoord('E2');
    var maks = { x: -1, y: 2 }, min = { x: 1, y: -2 };
    // Sjekk begge kombinasjoner (E1=maks,E2=min ELLER E1=min,E2=maks)
    var ok1 = Math.abs(e1x-maks.x)<0.2 && Math.abs(e2x-min.x)<0.2;
    var ok2 = Math.abs(e1x-min.x)<0.2 && Math.abs(e2x-maks.x)<0.2;
    var ok = ok1 || ok2;
    var nesten = (Math.abs(e1x-maks.x)<0.5 || Math.abs(e1x-min.x)<0.5);
    if (ok) {
      ggb.setVisible('Tmaks', true); ggb.setColor('Tmaks', 0, 200, 0); ggb.setPointSize('Tmaks', 6);
      ggb.setVisible('Tmin', true);  ggb.setColor('Tmin', 0, 200, 0);  ggb.setPointSize('Tmin', 6);
    }
    return {
      ok: ok, nesten: !ok && nesten,
      melding: ok
        ? '✓ Riktig! Maks i (−1, 2) og min i (1, −2). f\'(x) = 3x² − 3 = 0 → x = ±1.'
        : 'E1: (' + e1x.toFixed(2)+', '+e1y.toFixed(2)+'), E2: ('+e2x.toFixed(2)+', '+e2y.toFixed(2)+'). Hint: x = ±1.'
    };
  }
},

// ── GRUPPE 3: FINN X VED GITT Y ────────────────────────────────────

{
  id: 'xy1',
  gruppe: 'Finn x ved gitt y',
  tittel: '6 · Dra til y = 5 (to svar)',
  type: 'dra_to_y',
  tekst: 'Grafen viser <strong>f(x) = x² − 4</strong> og linjen <strong>y = 5</strong>. Dra punkt <strong>E1</strong> og <strong>E2</strong> til de to skjæringspunktene.',
  hint: 'GeoGebra beregner skjæringspunktene med Intersect(f, yLinje). x² − 4 = 5 → x = ±3.',
  ggbKommandoer: [
    'ZoomIn(-5, -6, 5, 8)',
    'f(x) = x^2 - 4',
    'SetColor(f, "Blue")',
    'SetLineThickness(f, 3)',
    'yLinje: y = 5',
    'SetColor(yLinje, "Red")',
    'SetLineStyle(yLinje, 1)',
    'S = Intersect(f, yLinje)',
    'SetVisible(S, false)',
    'E1 = Point(f)',
    'E2 = Point(f)',
    'SetColor(E1, "Orange")',
    'SetColor(E2, "Orange")',
    'SetPointSize(E1, 7)',
    'SetPointSize(E2, 7)',
    'ShowLabel(E1, true)',
    'ShowLabel(E2, true)',
  ],
  fasitY: 5,
  sjekk: function(ggb) {
    var e1y = ggb.getYcoord('E1'), e2y = ggb.getYcoord('E2');
    var e1x = ggb.getXcoord('E1'), e2x = ggb.getXcoord('E2');
    var xVals = [e1x, e2x].sort(function(a,b){return a-b;});
    var ok = Math.abs(e1y - 5) < 0.3 && Math.abs(e2y - 5) < 0.3
          && Math.abs(xVals[0] - (-3)) < 0.3 && Math.abs(xVals[1] - 3) < 0.3;
    var nesten = Math.abs(e1y - 5) < 0.7 || Math.abs(e2y - 5) < 0.7;
    if (ok) {
      ggb.setVisible('S', true);
      ggb.setColor('S', 0, 200, 0);
      ggb.setPointSize('S', 6);
    }
    return {
      ok: ok, nesten: !ok && nesten,
      melding: ok
        ? '✓ Riktig! Skjæringspunktene er (−3, 5) og (3, 5). x² − 4 = 5 → x = ±3.'
        : 'E1 y=' + e1y.toFixed(2) + ', E2 y=' + e2y.toFixed(2) + '. Begge skal ligge på y = 5.'
    };
  }
},

{
  id: 'xy2',
  gruppe: 'Finn x ved gitt y',
  tittel: '7 · Finn x der f(x) = 7',
  type: 'dra_en_y',
  tekst: 'Grafen viser <strong>f(x) = 2x + 1</strong> og linjen <strong>y = 7</strong>. Dra punkt <strong>E</strong> til skjæringspunktet.',
  hint: '2x + 1 = 7 → x = 3. Skjæringspunktet er (3, 7).',
  ggbKommandoer: [
    'ZoomIn(-2, -3, 6, 10)',
    'f(x) = 2x + 1',
    'SetColor(f, "Blue")',
    'SetLineThickness(f, 3)',
    'yLinje: y = 7',
    'SetColor(yLinje, "Red")',
    'SetLineStyle(yLinje, 1)',
    'S = Intersect(f, yLinje)',
    'SetVisible(S, false)',
    'E = Point(f)',
    'SetColor(E, "Orange")',
    'SetPointSize(E, 7)',
    'ShowLabel(E, true)',
  ],
  fasitX: 3, fasitY: 7,
  sjekk: function(ggb) {
    var ex = ggb.getXcoord('E'), ey = ggb.getYcoord('E');
    var ok = Math.abs(ex - 3) < 0.2 && Math.abs(ey - 7) < 0.2;
    if (ok) { ggb.setVisible('S', true); ggb.setColor('S', 0, 200, 0); ggb.setPointSize('S', 6); }
    return {
      ok: ok, nesten: !ok && Math.abs(ey-7)<0.5,
      melding: ok ? '✓ Riktig! Skjæringspunkt (3, 7). 2·3 + 1 = 7.'
                  : 'E er i (' + ex.toFixed(2) + ', ' + ey.toFixed(2) + '). Dra E til y = 7.'
    };
  }
},

// ── GRUPPE 4: FINN Y VED GITT X ────────────────────────────────────

{
  id: 'yx1',
  gruppe: 'Finn y ved gitt x',
  tittel: '8 · Dra til x = 4',
  type: 'dra_en_x',
  tekst: 'Grafen viser <strong>f(x) = x² − 3x + 2</strong> og den vertikale linjen <strong>x = 4</strong>. Dra punkt <strong>E</strong> til skjæringspunktet mellom grafen og x = 4.',
  hint: 'f(4) = 16 − 12 + 2 = 6. Punktet er (4, 6).',
  ggbKommandoer: [
    'ZoomIn(-1, -2, 6, 10)',
    'f(x) = x^2 - 3x + 2',
    'SetColor(f, "Blue")',
    'SetLineThickness(f, 3)',
    'xLinje: x = 4',
    'SetColor(xLinje, "Orange")',
    'SetLineStyle(xLinje, 1)',
    'P = (4, f(4))',
    'SetVisible(P, false)',
    'E = Point(f)',
    'SetColor(E, "Orange")',
    'SetPointSize(E, 7)',
    'ShowLabel(E, true)',
  ],
  fasitX: 4, fasitY: 6,

var ggbAPI = null;

function initGGB() {
  var wrap = document.getElementById('ggb-wrap');
  var containerWidth = wrap.offsetWidth || Math.round(window.innerWidth * 0.70) || 700;
  var containerHeight = wrap.offsetHeight || Math.round(window.innerHeight - 44) || 600;
  var params = {
    appName: 'graphing',
    width: containerWidth,
    height: containerHeight,
    showToolBar: true,
    showAlgebraInput: true,
    showMenuBar: true,
    enableRightClick: true,
    enableShiftDragZoom: true,
    showZoomButtons: true,
    enableFileFeatures: false,
    enableUndoRedo: true,
    language: 'no',
    appletOnLoad: function(api) {
      ggbAPI = api;
      lastOppgave(gjeldende);
    }
  };
  try {
    var applet = new GGBApplet(params, true);
    applet.inject('ggb-container');
  } catch(e) {
    document.getElementById('ggb-container').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:560px;color:#f87171;font-size:.9rem;padding:20px;text-align:center;">⚠️ Kunne ikke laste GeoGebra. Sjekk internettforbindelsen.</div>';
  }
}

function getGGB() {
  if (ggbAPI) return ggbAPI;
  if (window.ggbApplet) return window.ggbApplet;
  return null;
}

var gjeldende = 0;
var løste = [];
var forsøk = 0;

function lastOppgave(idx) {
  if (!løste.length) løste = new Array(OPPGAVER.length).fill(false);
  var o = OPPGAVER[idx];
  var ggb = getGGB();
  if (!ggb) { setTimeout(function(){lastOppgave(idx);}, 300); return; }
  ggb.newConstruction();
  o.ggbKommandoer.forEach(function(cmd) {
    // Rut ugyldige evalCommand-strenger til JS API
    var svMatch = cmd.match(/^SetVisible\(([^,]+),\s*(true|false)\)$/);
    if (svMatch) { ggb.setVisible(svMatch[1].trim(), svMatch[2]==='true'); return; }
    var spMatch = cmd.match(/^SetPointSize\(([^,]+),\s*(\d+)\)$/);
    if (spMatch) { ggb.setPointSize(spMatch[1].trim(), parseInt(spMatch[2])); return; }
    try { ggb.evalCommand(cmd); } catch(e) { console.warn('GGB cmd:', cmd, e.message||e); }
  });
  document.getElementById('oppg-label').textContent = o.gruppe + ' · ' + o.tittel;
  document.getElementById('oppg-tekst').innerHTML = o.tekst;
  document.getElementById('oppg-hint').textContent = o.hint;
  byggSvarBoks(o);
  oppdaterFB('', '');
  oppdaterFremdrift();
  oppdaterStats();
}

function byggSvarBoks(o) {
  var boks = document.getElementById('svar-boks');
  var html = '';
  var draTyper = ['dra_punkt','dra_to_punkt','dra_en_y','dra_to_y','dra_en_x','dra_en_punkt'];

  if (o.type === 'avgrens' || o.type === 'slider') {
    var vis = o.sliderVis || ['a','b'];
    var labs = o.sliderLabels || vis;
    html = '<div class="svar-label">Nåværende verdier:</div><div class="slider-info">';
    vis.forEach(function(v,i){ html += '<div class="sval"><div class="sval-n" id="vis-'+v+'">–</div><div class="sval-l">'+(labs[i]||v)+'</div></div>'; });
    html += '</div>';
    startSliderPolling(vis);
  } else if (draTyper.indexOf(o.type) >= 0) {
    html = '<div class="svar-label" style="margin-bottom:10px;line-height:1.5;">Dra det/de oransje punktet/ene i GeoGebra til riktig posisjon, trykk deretter Sjekk svar.</div>';
  } else if (o.type === 'regresjon') {
    html = '<div class="svar-label">Les av fra GeoGebra og skriv inn:</div>'
      +(o.inputIds.length===3?'<div class="koeff-grid">':'<div class="koeff-grid to">');
    o.inputLabels.forEach(function(lbl,i){ html += '<div class="koeff-felt"><label>'+lbl+'</label><input class="koeff-input" id="'+o.inputIds[i]+'" type="number" step="0.1" placeholder="?"></div>'; });
    html += '</div>';
  } else if (o.type === 'input_abc') {
    html = '<div class="svar-label">Skriv inn koeffisientene:</div><div class="koeff-grid">'
      +'<div class="koeff-felt"><label>a</label><input class="koeff-input" id="inp-a" type="number" step="0.5" placeholder="?"></div>'
      +'<div class="koeff-felt"><label>b</label><input class="koeff-input" id="inp-b" type="number" step="0.5" placeholder="?"></div>'
      +'<div class="koeff-felt"><label>c</label><input class="koeff-input" id="inp-c" type="number" step="0.5" placeholder="?"></div>'
      +'</div>';
  } else if (o.type === 'input_xy') {
    html = '<div class="svar-label">Skriv inn koordinatene:</div><div class="koeff-grid to">'
      +'<div class="koeff-felt"><label>'+(o.inputLabels[0]||'x')+'</label><input class="koeff-input" id="inp-x" type="number" step="0.5" placeholder="?"></div>'
      +'<div class="koeff-felt"><label>'+(o.inputLabels[1]||'y')+'</label><input class="koeff-input" id="inp-y" type="number" step="0.5" placeholder="?"></div>'
      +'</div>';
  }
  html += '<button class="sjekk-btn" id="sjekk-btn" onclick="sjekk()">✓ Sjekk svar</button>';
  html += '<div class="fb" id="fb"></div>';
  html += '<button class="neste-btn" id="neste-btn" onclick="nesteOppgave()">Neste oppgave ▶</button>';
  boks.innerHTML = html;
  boks.querySelectorAll('input').forEach(function(inp){
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter') sjekk(); });
  });
}

var pollingTimer = null;
function startSliderPolling(vars) {
  vars = vars || ['a','b'];
  clearInterval(pollingTimer);
  pollingTimer = setInterval(function() {
    var ggb = getGGB();
    if (!ggb) return;
    try {
      vars.forEach(function(v) {
        var val = ggb.getValue(v);
        var el = document.getElementById('vis-'+v);
        if (el) el.textContent = isNaN(val) ? '–' : val.toFixed(2);
      });
    } catch(e) {}
  }, 300);
}

function sjekk() {
  var ggb = getGGB();
  if (!ggb) return;
  var o = OPPGAVER[gjeldende];
  forsøk++;
  oppdaterStats();
  var res = o.sjekk(ggb);
  if (res.ok) {
    løste[gjeldende] = true;
    oppdaterFB('ok', res.melding);
    document.getElementById('sjekk-btn').disabled = true;
    document.getElementById('neste-btn').style.display = 'block';
    oppdaterFremdrift();
    oppdaterStats();
    clearInterval(pollingTimer);
    var tab = document.getElementById('tab-'+gjeldende);
    if (tab) tab.className = 'otab løst';
  } else if (res.nesten) {
    oppdaterFB('nesten', res.melding);
  } else {
    oppdaterFB('feil', res.melding);
  }
}

function oppdaterFB(type, tekst) {
  var fb = document.getElementById('fb');
  if (!fb) return;
  if (!type) { fb.className='fb'; fb.innerHTML=''; return; }
  fb.className = 'fb '+type;
  fb.innerHTML = tekst;
}

function gåTilOppgave(idx) {
  clearInterval(pollingTimer);
  gjeldende = idx;
  document.querySelectorAll('.otab').forEach(function(t,i){
    t.className='otab'+(løste[i]?' løst':'')+(i===idx?' aktiv':'');
  });
  lastOppgave(idx);
}

function nesteOppgave() {
  var neste = gjeldende+1;
  if (neste < OPPGAVER.length) gåTilOppgave(neste);
}

function oppdaterFremdrift() {
  var fp = document.getElementById('fremdrift');
  if (!fp) return;
  fp.innerHTML='';
  OPPGAVER.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='fp'+(løste[i]?' løst':i===gjeldende?' aktiv':'');
    fp.appendChild(d);
  });
}

function oppdaterStats() {
  var lc=løste.filter(Boolean).length;
  document.getElementById('st-løst').textContent=lc;
  document.getElementById('st-forsøk').textContent=forsøk;
}

function byggTabs() {
  if (!løste.length) løste=new Array(OPPGAVER.length).fill(false);
  var tabs=document.getElementById('oppg-tabs');
  if (!tabs) return;
  OPPGAVER.forEach(function(o,i){
    var btn=document.createElement('button');
    btn.id='tab-'+i;
    btn.className='otab'+(i===0?' aktiv':'');
    btn.textContent=o.tittel;
    btn.onclick=(function(idx){return function(){gåTilOppgave(idx);};})(i);
    tabs.appendChild(btn);
  });
}

function byggGruppeTabs() {
  var grupper=[];
  OPPGAVER.forEach(function(o){if(grupper.indexOf(o.gruppe)<0)grupper.push(o.gruppe);});
  var el=document.getElementById('grp-tabs');
  if(!el)return;
  var allBtn=document.createElement('button');
  allBtn.className='grp-tab aktiv';allBtn.textContent='Alle ('+OPPGAVER.length+')';
  allBtn.onclick=function(){filtrerGruppe(null,allBtn);};
  el.appendChild(allBtn);
  grupper.forEach(function(g){
    var n=OPPGAVER.filter(function(o){return o.gruppe===g;}).length;
    var btn=document.createElement('button');
    btn.className='grp-tab';btn.textContent=g+' ('+n+')';
    btn.onclick=(function(grp,b){return function(){filtrerGruppe(grp,b);};})(g,btn);
    el.appendChild(btn);
  });
}

function filtrerGruppe(grp,btn){
  document.querySelectorAll('.grp-tab').forEach(function(b){b.classList.remove('aktiv');});
  btn.classList.add('aktiv');
  for(var i=0;i<OPPGAVER.length;i++){if(!grp||OPPGAVER[i].gruppe===grp){gåTilOppgave(i);return;}}
}

function startApp(){byggTabs();byggGruppeTabs();oppdaterFremdrift();initGGB();}
window.addEventListener('DOMContentLoaded', startApp);
</script>
