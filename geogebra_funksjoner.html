<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoGebra – Funksjoner · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06101e;--surface:#0d1e30;--card:#131f35;
  --accent:#ffd700;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#c084fc;
  --text:#e8f0ff;--dim:#7a90b0;
  --font-h:'Fredoka One',cursive;--font-b:'Nunito',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}

nav{display:flex;align-items:center;gap:8px;padding:10px 20px;
    background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(255,255,255,.07);font-size:.82rem;}
nav a{color:var(--dim);text-decoration:none;}nav a:hover{color:var(--text);}
nav span{color:rgba(255,255,255,.2);}

.hero{text-align:center;padding:24px 20px 14px;}
.hero h1{font-family:var(--font-h);font-size:1.6rem;color:var(--accent);margin-bottom:6px;}
.hero p{color:var(--dim);font-size:.88rem;}

/* Oppgave-velger */
.oppg-tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:0 16px 16px;}
.otab{padding:6px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);
      background:transparent;color:var(--dim);cursor:pointer;font-size:.8rem;
      font-family:var(--font-b);transition:all .15s;}
.otab.aktiv{background:rgba(255,215,0,.1);border-color:var(--accent);color:var(--accent);}
.otab.løst{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green);}

.main{max-width:1100px;margin:0 auto;padding:0 16px 40px;display:grid;
      grid-template-columns:1fr 340px;gap:16px;align-items:start;}

/* GeoGebra-container */
#ggb-wrap{background:var(--card);border:1px solid rgba(255,255,255,.08);
          border-radius:14px;overflow:hidden;min-height:560px;}
#ggb-container{width:100%;height:560px;}

/* Høyre panel */
#panel{display:flex;flex-direction:column;gap:10px;position:sticky;top:80px;}

.oppg-boks{background:var(--card);border:1px solid rgba(255,255,255,.08);
           border-radius:12px;padding:16px;}
.oppg-label{font-size:.72rem;color:var(--accent);font-weight:700;
            text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.oppg-tekst{font-size:.95rem;line-height:1.6;margin-bottom:10px;}
.oppg-tekst strong{color:var(--accent);}
.oppg-hint{font-size:.78rem;color:var(--dim);line-height:1.5;
           background:rgba(255,255,255,.04);border-radius:6px;padding:7px 10px;}

/* Svar-seksjon */
.svar-boks{background:var(--card);border:1px solid rgba(255,255,255,.08);
           border-radius:12px;padding:14px;}
.svar-label{font-size:.78rem;color:var(--dim);margin-bottom:8px;}

/* Input for oppgave 2 */
.koeff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.koeff-felt{display:flex;flex-direction:column;gap:4px;}
.koeff-felt label{font-size:.72rem;color:var(--dim);text-align:center;}
.koeff-input{height:36px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
             border-radius:7px;color:var(--text);font-family:var(--font-h);font-size:1rem;
             text-align:center;outline:none;transition:border-color .15s;width:100%;}
.koeff-input:focus{border-color:var(--accent);}
.koeff-input.ok{border-color:var(--green);}
.koeff-input.feil{border-color:var(--red);}

/* Slider-info */
.slider-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.sval{background:rgba(255,255,255,.05);border-radius:7px;padding:8px 10px;text-align:center;}
.sval-n{font-family:var(--font-h);font-size:1.3rem;color:var(--accent);}
.sval-l{font-size:.7rem;color:var(--dim);}

/* Sjekk-knapp */
.sjekk-btn{width:100%;padding:10px;font-family:var(--font-h);font-size:1rem;
           background:var(--accent);color:#000;border:none;border-radius:9px;
           cursor:pointer;transition:all .15s;}
.sjekk-btn:hover{filter:brightness(1.08);}
.sjekk-btn:disabled{opacity:.4;cursor:default;}

/* Tilbakemelding */
.fb{margin-top:8px;padding:9px 12px;border-radius:8px;font-size:.83rem;
    line-height:1.5;display:none;}
.fb.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);
       color:var(--green);display:block;}
.fb.feil{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);
         color:var(--red);display:block;}
.fb.nesten{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
           color:var(--accent);display:block;}

/* Fremdrift */
.fremdrift{display:flex;gap:6px;justify-content:center;margin-bottom:4px;}
.fp{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;}
.fp.aktiv{background:var(--accent);}
.fp.løst{background:var(--green);}

/* Stats */
.stats{display:flex;gap:12px;justify-content:center;font-size:.8rem;}
.stat-n{font-family:var(--font-h);font-size:1.1rem;color:var(--accent);}

/* Neste-knapp */
.neste-btn{width:100%;padding:8px;font-family:var(--font-h);font-size:.92rem;
           background:var(--green);color:#000;border:none;border-radius:8px;
           cursor:pointer;display:none;margin-top:6px;}

/* Responsiv */
@media(max-width:700px){
  .main{grid-template-columns:1fr;}
  #ggb-container{height:450px;}
}
</style>
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
</head>
<body>

<nav>
  <a href="index.html">🏠 SkapLab</a>
  <span>/</span>
  <a href="matte_hub.html">📐 Matematikk</a>
  <span>/</span>
  <span style="color:var(--text)">GeoGebra – Funksjoner</span>
</nav>

<div class="hero">
  <h1>📈 Funksjoner med GeoGebra</h1>
  <p>Utforsk funksjoner interaktivt. Juster parametre og se resultatet i grafen.</p>
</div>

<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 16px 12px;">
  <div class="fremdrift" id="fremdrift"></div>
  <div class="stats">
    <span>✅ Løst: <span class="stat-n" id="st-løst">0</span></span>
    <span>🎯 Forsøk: <span class="stat-n" id="st-forsøk">0</span></span>
  </div>
</div>

<div class="oppg-tabs" id="oppg-tabs"></div>

<div class="main">
  <div id="ggb-wrap">
    <div id="ggb-container"></div>
  </div>
  <div id="panel">
    <div class="oppg-boks">
      <div class="oppg-label" id="oppg-label">Oppgave</div>
      <div class="oppg-tekst" id="oppg-tekst">Laster...</div>
      <div class="oppg-hint" id="oppg-hint"></div>
    </div>
    <div class="svar-boks" id="svar-boks">
      <!-- Fylles dynamisk -->
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// OPPGAVER
// ══════════════════════════════════════════════
var OPPGAVER = [

  // ── 1. LINEÆR MED SLIDERS ──────────────────
  {
    id: 'lin1',
    tittel: '1 · Lineær funksjon',
    type: 'slider',
    tekst: 'Juster <strong>a</strong> (stigningstall) og <strong>b</strong> (konstantledd) slik at linjen <strong>f(x) = ax + b</strong> går gjennom punktene <strong>A(1, 4)</strong> og <strong>B(3, 8)</strong>.',
    hint: 'Tips: Stigningstall = (y₂-y₁)/(x₂-x₁). Sjekk at f(1) = 4 og f(3) = 8.',
    ggbKommandoer: [
      'SetAxesRatio(1,1)',
      'ZoomIn(-2, -2, 6, 12)',
      'a = Slider(-5, 5, 0.5)',
      'b = Slider(-10, 10, 0.5)',
      'f(x) = a*x + b',
      'SetColor(f, "Blue")',
      'SetLineThickness(f, 3)',
      'A = (1, 4)',
      'B = (3, 8)',
      'SetColor(A, "Red")',
      'SetColor(B, "Red")',
      'SetPointSize(A, 6)',
      'SetPointSize(B, 6)',
      'SetLabelStyle(A, 1)',
      'SetLabelStyle(B, 1)',
      'ShowLabel(A, true)',
      'ShowLabel(B, true)',
    ],
    sjekk: function(ggb) {
      var a = ggb.getValue('a');
      var b = ggb.getValue('b');
      var f1 = a*1 + b;
      var f3 = a*3 + b;
      var ok = Math.abs(f1 - 4) < 0.1 && Math.abs(f3 - 8) < 0.1;
      var nesten = Math.abs(f1 - 4) < 0.6 && Math.abs(f3 - 8) < 0.6;
      return {
        ok: ok,
        nesten: !ok && nesten,
        melding: ok
          ? 'Riktig! f(x) = ' + a + 'x + ' + b + '. Stigningstall a = ' + a + ', konstantledd b = ' + b + '.'
          : 'f(1) = ' + f1.toFixed(2) + ' (skal være 4), f(3) = ' + f3.toFixed(2) + ' (skal være 8). Juster litt mer!'
      };
    }
  },

  // ── 2. PARABEL – INPUT ──────────────────────
  {
    id: 'par1',
    tittel: '2 · Parabel – toppunkt',
    type: 'input_abc',
    tekst: 'Skriv inn <strong>a</strong>, <strong>b</strong> og <strong>c</strong> slik at parabelen <strong>f(x) = ax² + bx + c</strong> har toppunkt i <strong>(2, 5)</strong> og går gjennom <strong>(0, 1)</strong>.',
    hint: 'Tips: Toppunkt x = −b/(2a). Sett inn (2,5) og (0,1) i funksjonsuttrykket.',
    ggbKommandoer: [
      'ZoomIn(-2, -2, 6, 10)',
      'T = (2, 5)',
      'P = (0, 1)',
      'SetColor(T, "Red")',
      'SetColor(P, "Green")',
      'SetPointSize(T, 6)',
      'SetPointSize(P, 6)',
      'ShowLabel(T, true)',
      'ShowLabel(P, true)',
    ],
    sjekk: function(ggb) {
      var a = parseFloat(document.getElementById('inp-a').value.replace(',','.'));
      var b = parseFloat(document.getElementById('inp-b').value.replace(',','.'));
      var c = parseFloat(document.getElementById('inp-c').value.replace(',','.'));
      if (isNaN(a) || isNaN(b) || isNaN(c)) return {ok:false, nesten:false, melding:'Fyll inn alle verdier!'};

      // Oppdater grafen
      ggb.evalCommand('f(x) = (' + a + ')*x^2 + (' + b + ')*x + (' + c + ')');
      ggb.setColor('f', 0, 100, 255);
      ggb.setLineThickness('f', 3);

      var f0 = a*0*0 + b*0 + c;
      var toppX = -b/(2*a);
      var toppY = a*toppX*toppX + b*toppX + c;
      var ok = Math.abs(toppX - 2) < 0.1 && Math.abs(toppY - 5) < 0.1 && Math.abs(f0 - 1) < 0.1;
      var nesten = Math.abs(toppX - 2) < 0.3 && Math.abs(toppY - 5) < 0.3;
      return {
        ok: ok,
        nesten: !ok && nesten,
        melding: ok
          ? 'Riktig! f(x) = ' + a + 'x² + ' + b + 'x + ' + c + '. Toppunkt: (' + toppX.toFixed(1) + ', ' + toppY.toFixed(1) + ').'
          : 'Toppunkt: (' + toppX.toFixed(2) + ', ' + toppY.toFixed(2) + ') — skal være (2, 5). f(0) = ' + f0.toFixed(2) + ' — skal være 1.'
      };
    }
  },

  // ── 3. LINEÆR MED SLIDERS – VANSKELIGERE ────
  {
    id: 'lin2',
    tittel: '3 · Stigningstall og skjæring',
    type: 'slider',
    tekst: 'Juster <strong>a</strong> og <strong>b</strong> slik at linjen er <strong>parallell med g(x) = 3x</strong> og skjærer y-aksen i <strong>y = −2</strong>.',
    hint: 'Parallelle linjer har samme stigningstall. y-akseskjæring er b = f(0).',
    ggbKommandoer: [
      'ZoomIn(-3, -8, 5, 10)',
      'a = Slider(-6, 6, 0.5)',
      'b = Slider(-8, 8, 0.5)',
      'f(x) = a*x + b',
      'g(x) = 3*x',
      'SetColor(f, "Blue")',
      'SetColor(g, "Orange")',
      'SetLineThickness(f, 3)',
      'SetLineThickness(g, 2)',
      'SetLineStyle(g, 1)',
    ],
    sjekk: function(ggb) {
      var a = ggb.getValue('a');
      var b = ggb.getValue('b');
      var ok = Math.abs(a - 3) < 0.1 && Math.abs(b - (-2)) < 0.1;
      var nesten = (Math.abs(a - 3) < 0.4 || Math.abs(b - (-2)) < 0.4);
      return {
        ok: ok,
        nesten: !ok && nesten,
        melding: ok
          ? 'Riktig! f(x) = 3x − 2. Stigningstall = 3 (parallell med g), b = −2.'
          : 'a = ' + a + ' (skal være 3), b = ' + b + ' (skal være −2).'
      };
    }
  },

  // ── 4. NULLPUNKT – FINN OG MARKER ───────────
  {
    id: 'null1',
    tittel: '4 · Finn nullpunktene',
    type: 'nullpunkt',
    tekst: 'Funksjonen <strong>f(x) = x² − 4</strong> er tegnet. Klikk (eller skriv inn) <strong>begge nullpunktene</strong> på x-aksen.',
    hint: 'Nullpunkt: sett f(x) = 0. x² = 4 → x = ±2.',
    ggbKommandoer: [
      'ZoomIn(-4, -5, 4, 5)',
      'f(x) = x^2 - 4',
      'SetColor(f, "Blue")',
      'SetLineThickness(f, 3)',
    ],
    sjekk: function(ggb) {
      var x1 = parseFloat(document.getElementById('np-x1').value.replace(',','.'));
      var x2 = parseFloat(document.getElementById('np-x2').value.replace(',','.'));
      if (isNaN(x1) || isNaN(x2)) return {ok:false, nesten:false, melding:'Skriv inn begge nullpunktene!'};
      var vals = [x1, x2].sort(function(a,b){return a-b;});
      var ok = Math.abs(vals[0] - (-2)) < 0.15 && Math.abs(vals[1] - 2) < 0.15;
      var nesten = Math.abs(vals[0] - (-2)) < 0.4 || Math.abs(vals[1] - 2) < 0.4;
      // Vis punkter i GeoGebra
      ggb.evalCommand('N1 = (' + x1 + ', 0)');
      ggb.evalCommand('N2 = (' + x2 + ', 0)');
      ggb.setColor('N1', ok ? 0 : 255, ok ? 200 : 0, 0);
      ggb.setColor('N2', ok ? 0 : 255, ok ? 200 : 0, 0);
      ggb.setPointSize('N1', 6);
      ggb.setPointSize('N2', 6);
      return {
        ok: ok,
        nesten: !ok && nesten,
        melding: ok
          ? 'Riktig! Nullpunktene er x = −2 og x = 2. f(x) = (x+2)(x−2).'
          : 'x₁ = ' + x1 + ', x₂ = ' + x2 + '. Sjekk: f(−2) = ' + ((-2)*(-2)-4) + ', f(2) = ' + (4-4) + '. Nullpunktene er x = ±2.'
      };
    }
  },

  // ── 5. PARABEL – SLIDER ─────────────────────
  {
    id: 'par2',
    tittel: '5 · Parabel med sliders',
    type: 'slider',
    tekst: 'Juster <strong>a</strong> slik at parabelen <strong>f(x) = ax²</strong> går gjennom punktet <strong>C(2, 12)</strong>.',
    hint: 'Sett inn x=2, y=12: 12 = a·4 → a = 3.',
    ggbKommandoer: [
      'ZoomIn(-4, -2, 4, 16)',
      'a = Slider(-5, 5, 0.25)',
      'f(x) = a*x^2',
      'C = (2, 12)',
      'SetColor(f, "Blue")',
      'SetColor(C, "Red")',
      'SetLineThickness(f, 3)',
      'SetPointSize(C, 6)',
      'ShowLabel(C, true)',
    ],
    sjekk: function(ggb) {
      var a = ggb.getValue('a');
      var f2 = a * 4;
      var ok = Math.abs(f2 - 12) < 0.2;
      var nesten = Math.abs(f2 - 12) < 0.8;
      return {
        ok: ok,
        nesten: !ok && nesten,
        melding: ok
          ? 'Riktig! a = ' + a + '. f(2) = ' + a + '·4 = ' + f2.toFixed(1) + ' = 12 ✓'
          : 'f(2) = ' + a + '·4 = ' + f2.toFixed(2) + '. Skal være 12. Juster a!'
      };
    }
  },

];

// ══════════════════════════════════════════════
// TILSTAND
// ══════════════════════════════════════════════
var ggbApp = null;
var ggbKlar = false;
var gjeldende = 0;
var løste = new Array(OPPGAVER.length).fill(false);
var forsøk = 0;

// ══════════════════════════════════════════════
// GEOGEBRA OPPSETT
// ══════════════════════════════════════════════
var ggbAPI = null;

function initGGB() {
  var containerWidth = document.getElementById('ggb-container').offsetWidth || 520;
  var params = {
    appName: 'graphing',
    width: containerWidth,
    height: 560,
    showToolBar: true,
    showAlgebraInput: true,
    showMenuBar: true,
    enableRightClick: true,
    enableShiftDragZoom: true,
    showZoomButtons: true,
    enableFileFeatures: false,
    enableUndoRedo: true,
    language: 'no',
    appletOnLoad: function(api) {
      ggbAPI = api;
      ggbKlar = true;
      lastOppgave(gjeldende);
    }
  };
  try {
    var applet = new GGBApplet(params, true);
    applet.inject('ggb-container');
  } catch(e) {
    document.getElementById('ggb-container').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:560px;color:#f87171;font-size:.9rem;padding:20px;text-align:center;">⚠️ Kunne ikke laste GeoGebra. Sjekk internettforbindelsen.</div>';
  }
}

function getGGB() {
  if (ggbAPI) return ggbAPI;
  if (window.ggbApplet) return window.ggbApplet;
  return null;
}

// ══════════════════════════════════════════════
// OPPGAVE-LASTING
// ══════════════════════════════════════════════
function lastOppgave(idx) {
  var o = OPPGAVER[idx];
  var ggb = getGGB();
  if (!ggb) { setTimeout(function(){lastOppgave(idx);}, 300); return; }

  // Rydd GeoGebra
  ggb.newConstruction();

  // Kjør kommandoer
  o.ggbKommandoer.forEach(function(cmd) {
    try { ggb.evalCommand(cmd); } catch(e) {}
  });

  // Oppdater UI
  document.getElementById('oppg-label').textContent = o.tittel;
  document.getElementById('oppg-tekst').innerHTML = o.tekst;
  document.getElementById('oppg-hint').textContent = o.hint;

  byggSvarBoks(o);
  oppdaterFB('', '');
  oppdaterFremdrift();
  oppdaterStats();
}

function byggSvarBoks(o) {
  var boks = document.getElementById('svar-boks');
  var html = '';

  if (o.type === 'slider') {
    html = '<div class="svar-label">Nåværende verdier (fra sliders i GeoGebra):</div>' +
      '<div class="slider-info">' +
      '<div class="sval"><div class="sval-n" id="vis-a">–</div><div class="sval-l">a (stigningstall)</div></div>' +
      '<div class="sval"><div class="sval-n" id="vis-b">–</div><div class="sval-l">b (konstantledd)</div></div>' +
      '</div>';
    // Start polling for slider-verdier
    startSliderPolling();
  } else if (o.type === 'input_abc') {
    html = '<div class="svar-label">Skriv inn koeffisientene:</div>' +
      '<div class="koeff-grid">' +
      '<div class="koeff-felt"><label>a</label><input class="koeff-input" id="inp-a" type="number" step="0.5" placeholder="?"></div>' +
      '<div class="koeff-felt"><label>b</label><input class="koeff-input" id="inp-b" type="number" step="0.5" placeholder="?"></div>' +
      '<div class="koeff-felt"><label>c</label><input class="koeff-input" id="inp-c" type="number" step="0.5" placeholder="?"></div>' +
      '</div>';
  } else if (o.type === 'nullpunkt') {
    html = '<div class="svar-label">Skriv inn nullpunktene (x-verdier):</div>' +
      '<div class="koeff-grid">' +
      '<div class="koeff-felt"><label>x₁</label><input class="koeff-input" id="np-x1" type="number" step="0.5" placeholder="?"></div>' +
      '<div class="koeff-felt"><label>x₂</label><input class="koeff-input" id="np-x2" type="number" step="0.5" placeholder="?"></div>' +
      '<div></div>' +
      '</div>';
  }

  html += '<button class="sjekk-btn" id="sjekk-btn" onclick="sjekk()">✓ Sjekk svar</button>';
  html += '<div class="fb" id="fb"></div>';
  html += '<button class="neste-btn" id="neste-btn" onclick="nesteOppgave()">Neste oppgave ▶</button>';

  boks.innerHTML = html;

  // Enter-tast
  boks.querySelectorAll('input').forEach(function(inp) {
    inp.addEventListener('keydown', function(e) { if(e.key==='Enter') sjekk(); });
  });
}

var pollingTimer = null;
function startSliderPolling() {
  clearInterval(pollingTimer);
  pollingTimer = setInterval(function() {
    var ggb = getGGB();
    if (!ggb) return;
    try {
      var a = ggb.getValue('a');
      var b = ggb.getValue('b');
      var visA = document.getElementById('vis-a');
      var visB = document.getElementById('vis-b');
      if (visA) visA.textContent = isNaN(a) ? '–' : a.toFixed(2);
      if (visB) visB.textContent = isNaN(b) ? '–' : b.toFixed(2);
    } catch(e) {}
  }, 300);
}

// ══════════════════════════════════════════════
// SJEKKLOGIKK
// ══════════════════════════════════════════════
function sjekk() {
  var ggb = getGGB();
  if (!ggb) return;
  var o = OPPGAVER[gjeldende];
  forsøk++;
  oppdaterStats();

  var res = o.sjekk(ggb);

  if (res.ok) {
    løste[gjeldende] = true;
    oppdaterFB('ok', res.melding);
    document.getElementById('sjekk-btn').disabled = true;
    document.getElementById('neste-btn').style.display = 'block';
    oppdaterFremdrift();
    oppdaterStats();
    clearInterval(pollingTimer);
    // Merk fanen som løst
    var tab = document.getElementById('tab-' + gjeldende);
    if (tab) { tab.className = 'otab løst'; }
  } else if (res.nesten) {
    oppdaterFB('nesten', res.melding);
  } else {
    oppdaterFB('feil', res.melding);
  }
}

function oppdaterFB(type, tekst) {
  var fb = document.getElementById('fb');
  if (!fb) return;
  if (!type) { fb.className = 'fb'; fb.innerHTML = ''; return; }
  fb.className = 'fb ' + type;
  fb.innerHTML = tekst;
}

// ══════════════════════════════════════════════
// NAVIGASJON
// ══════════════════════════════════════════════
function gåTilOppgave(idx) {
  clearInterval(pollingTimer);
  gjeldende = idx;
  document.querySelectorAll('.otab').forEach(function(t,i) {
    t.className = 'otab' + (løste[i] ? ' løst' : '') + (i === idx ? ' aktiv' : '');
  });
  lastOppgave(idx);
}

function nesteOppgave() {
  var neste = gjeldende + 1;
  if (neste < OPPGAVER.length) gåTilOppgave(neste);
}

// ══════════════════════════════════════════════
// UI-HJELP
// ══════════════════════════════════════════════
function oppdaterFremdrift() {
  var fp = document.getElementById('fremdrift');
  if (!fp) return;
  fp.innerHTML = '';
  OPPGAVER.forEach(function(o, i) {
    var d = document.createElement('div');
    d.className = 'fp' + (løste[i] ? ' løst' : i === gjeldende ? ' aktiv' : '');
    fp.appendChild(d);
  });
}

function oppdaterStats() {
  var løstCount = løste.filter(Boolean).length;
  document.getElementById('st-løst').textContent = løstCount;
  document.getElementById('st-forsøk').textContent = forsøk;
}

function byggTabs() {
  var tabs = document.getElementById('oppg-tabs');
  OPPGAVER.forEach(function(o, i) {
    var btn = document.createElement('button');
    btn.id = 'tab-' + i;
    btn.className = 'otab' + (i === 0 ? ' aktiv' : '');
    btn.textContent = o.tittel;
    btn.onclick = (function(idx){ return function(){ gåTilOppgave(idx); }; })(i);
    tabs.appendChild(btn);
  });
}

// ══════════════════════════════════════════════
// START
// ══════════════════════════════════════════════
// Last GeoGebra dynamisk og vent til den er klar
function startApp() {
  byggTabs();
  oppdaterFremdrift();
  var script = document.createElement('script');
  script.src = 'https://www.geogebra.org/apps/deployggb.js';
  script.onload = function() {
    // Liten forsinkelse for at GGBApplet skal registrere seg globalt
    setTimeout(initGGB, 100);
  };
  script.onerror = function() {
    document.getElementById('ggb-container').innerHTML =
      '<div style="padding:20px;color:#f87171;text-align:center">' +
      '⚠️ Kunne ikke laste GeoGebra. Sjekk internettforbindelsen.</div>';
  };
  document.head.appendChild(script);
}
window.addEventListener('DOMContentLoaded', startApp);
</script>
</body>
