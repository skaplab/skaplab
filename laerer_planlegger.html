<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Planlegger</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--bg2:#0b0d18;--bg3:#0e1120;--border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);--text:#e0e8ff;--dim:rgba(255,255,255,.42);
  --bla:#60a5fa;--gron:#34d399;--gul:#fbbf24;--rod:#f87171;--lilla:#a78bfa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}

/* NAV */
nav{height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:30;}
.nav-logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);text-decoration:none;}
.nav-sep{color:var(--dim);}
.nav-akt{font-size:.82rem;color:var(--dim);}
.spacer{flex:1;}
.nav-lnk{font-size:.8rem;color:var(--dim);text-decoration:none;}
.nav-lnk:hover{color:var(--text);}
.eks-btn{padding:6px 14px;background:var(--bla);color:#000;border:none;
  border-radius:8px;font-family:var(--font-h);font-size:.78rem;font-weight:800;cursor:pointer;}

/* UKE-NAVIGATOR */
#uke-nav{display:flex;gap:6px;padding:14px 20px;overflow-x:auto;
  background:var(--bg2);border-bottom:1px solid var(--border);
  scrollbar-width:thin;}
.uke-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border2);
  background:transparent;color:var(--dim);font-family:var(--font-h);font-size:.78rem;
  font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.uke-btn:hover{color:var(--text);}
.uke-btn.ak{background:rgba(96,165,250,.15);color:var(--bla);border-color:rgba(96,165,250,.4);}
.uke-btn.har-plan::after{content:'●';font-size:.5rem;color:var(--gron);
  vertical-align:super;margin-left:3px;}

/* LAYOUT */
#app{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px - 53px);overflow:hidden;}

/* VENSTRE: KM-VELGER */
#km-panel{background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
.km-panel-hdr{padding:14px 16px;border-bottom:1px solid var(--border);}
.km-panel-tittel{font-family:var(--font-h);font-size:.9rem;font-weight:800;color:var(--bla);margin-bottom:10px;}
.fag-rad{display:flex;gap:4px;margin-bottom:8px;}
.fag-btn{flex:1;padding:6px 4px;border-radius:7px;border:1.5px solid var(--border2);
  background:transparent;color:var(--dim);font-size:.75rem;font-family:var(--font-h);
  font-weight:700;cursor:pointer;transition:all .15s;}
.fag-btn.ak.mat{background:rgba(139,92,246,.2);color:#c4b5fd;border-color:rgba(139,92,246,.4);}
.fag-btn.ak.nat{background:rgba(52,211,153,.15);color:var(--gron);border-color:rgba(52,211,153,.4);}
.fag-btn.ak.prg{background:rgba(96,165,250,.15);color:var(--bla);border-color:rgba(96,165,250,.4);}
#trinn-wrap{display:flex;gap:4px;}
.trinn-btn2{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--dim);font-size:.72rem;font-family:var(--font-h);
  font-weight:700;cursor:pointer;}
.trinn-btn2.ak{background:rgba(251,191,36,.15);color:var(--gul);border-color:rgba(251,191,36,.4);}
#km-liste{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;}
.km-item{padding:10px 12px;border-radius:9px;border:1px solid var(--border);
  margin-bottom:6px;cursor:pointer;transition:all .15s;}
.km-item:hover{border-color:var(--border2);background:rgba(255,255,255,.03);}
.km-item.valgt{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3);}
.km-item.planlagt{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.05);}
.km-item-topp{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.km-kode{font-size:.65rem;font-family:var(--font-m);background:rgba(255,255,255,.07);
  padding:2px 7px;border-radius:5px;}
.res-badge{font-size:.62rem;background:rgba(96,165,250,.15);color:var(--bla);
  padding:1px 6px;border-radius:4px;margin-left:auto;}
.planlagt-badge{font-size:.62rem;color:var(--gron);margin-left:2px;}
.km-item-tekst{font-size:.78rem;color:var(--dim);line-height:1.4;}
.km-item:hover .km-item-tekst, .km-item.valgt .km-item-tekst{color:var(--text);}

/* MIDT: RESSURSER + PLANKNAPP */
#res-panel{background:var(--bg3);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;width:280px;}
.res-panel-hdr{padding:14px 16px;border-bottom:1px solid var(--border);}
.res-panel-tittel{font-family:var(--font-h);font-size:.85rem;font-weight:800;margin-bottom:4px;}
.res-panel-sub{font-size:.72rem;color:var(--dim);}
#plan-knapp-wrap{padding:10px 14px;border-bottom:1px solid var(--border);}
.plan-btn{width:100%;padding:9px;border-radius:9px;border:none;cursor:pointer;
  font-family:var(--font-h);font-size:.8rem;font-weight:800;transition:all .15s;}
.plan-btn.legg-til{background:rgba(52,211,153,.2);color:var(--gron);}
.plan-btn.legg-til:hover{background:rgba(52,211,153,.3);}
.plan-btn.fjern{background:rgba(248,113,113,.15);color:var(--rod);}
#res-liste{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;}
.res-item{display:flex;flex-direction:column;gap:4px;padding:10px 12px;
  border-radius:9px;border:1px solid var(--border);margin-bottom:6px;
  text-decoration:none;color:var(--text);transition:all .15s;}
.res-item:hover{border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.05);}
.res-tittel{font-size:.83rem;font-weight:600;line-height:1.3;}
.res-fil{font-size:.65rem;font-family:var(--font-m);color:var(--dim);}
.res-pil{font-size:.7rem;color:var(--bla);}
.res-tom{padding:20px;text-align:center;color:var(--dim);font-size:.82rem;}

/* HØYRE: PLAN-TABELLEN */
#plan-panel{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.plan-tabs{display:flex;gap:4px;padding:12px 16px 0;background:var(--bg2);
  border-bottom:1px solid var(--border);}
.tab-btn{padding:8px 16px;border-radius:9px 9px 0 0;border:none;cursor:pointer;
  font-family:var(--font-h);font-size:.8rem;font-weight:700;color:var(--dim);
  background:transparent;transition:all .15s;}
.tab-btn.ak{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-bottom:none;}
#tab-plan, #tab-periode{flex:1;overflow-y:auto;padding:16px;}
.plan-tom{text-align:center;padding:60px 20px;color:var(--dim);font-size:.88rem;line-height:1.8;}
.plan-overskrift{font-family:var(--font-h);font-size:1rem;font-weight:800;
  margin-bottom:14px;color:var(--bla);}
.plan-kort-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.plan-kort{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:14px;display:flex;flex-direction:column;gap:8px;}
.plan-km-kode{font-size:.65rem;font-family:var(--font-m);background:rgba(255,255,255,.07);
  padding:2px 8px;border-radius:5px;width:fit-content;color:var(--bla);}
.plan-km-tekst{font-size:.82rem;line-height:1.45;flex:1;}
.plan-notat{font-size:.75rem;color:var(--gul);padding:5px 8px;
  background:rgba(251,191,36,.08);border-radius:6px;}
.plan-res-liste{display:flex;flex-direction:column;gap:4px;}
.plan-res-link{font-size:.72rem;color:var(--bla);text-decoration:none;
  padding:3px 7px;background:rgba(96,165,250,.08);border-radius:5px;}
.plan-res-link:hover{background:rgba(96,165,250,.15);}
.plan-kort-bunn{display:flex;gap:6px;margin-top:4px;}
.plan-mini-btn{flex:1;padding:5px;border:1px solid var(--border2);border-radius:7px;
  background:transparent;color:var(--dim);font-size:.72rem;cursor:pointer;}
.plan-mini-btn:hover{color:var(--text);}
.plan-mini-btn.fjern-btn{flex:0 0 32px;color:var(--rod);}

/* PERIODEVISNING */
.periode-tabell{width:100%;border-collapse:collapse;font-size:.78rem;}
.periode-tabell th{padding:6px 10px;background:var(--bg2);border:1px solid var(--border);
  font-family:var(--font-h);font-size:.72rem;white-space:nowrap;}
.periode-tabell td{padding:5px 10px;border:1px solid var(--border);vertical-align:top;}
.periode-tabell tr:hover td{background:rgba(255,255,255,.02);}

@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height:auto; }
  #km-panel { max-height: 320px; border-right:none; border-bottom:1px solid var(--border); }
  #res-panel { display:none; }
}
@media print {
  nav, #uke-nav, #km-panel, #res-panel, .plan-tabs, .tab-btn, .plan-mini-btn { display:none!important; }
  body { background:#fff; color:#111; }
  .periode-tabell th { background:#eee; color:#111; border-color:#ccc; }
  .periode-tabell td { border-color:#ccc; }
  #tab-plan { display:none!important; }
  #tab-periode { display:block!important; }
}
</style>

  <a href="index.html" class="nav-logo">SkapLab</a>

<div id="app">
  <!-- VENSTRE: KM-LISTE -->

      <div class="km-panel-tittel">Kompetansemål</div>

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,
    // Sporing
    loggAktivitet:     loggAktivitet,
    // Internals (for dashboard)
    _api:  API,
    _hdr:  hdr,
    _get:  get,
    _post: post,
    _patch: patch,
    SUPABASE_URL: SUPABASE_URL,
    SUPABASE_KEY: SUPABASE_KEY
  };

})();

</script>
<script>

var lid    = laerer ? ((laerer.user && laerer.user.id) || laerer.id || '') : null;
if (!laerer) { location.href = 'laerer_login.html'; }

// ── LOKALT DATALAG ────────────────────────────────────────────────
var PLAN_KEY = 'skaplab_plan_v1';

function lastPlan() {
  try { return JSON.parse(localStorage.getItem(PLAN_KEY) || '{}'); } catch(e) { return {}; }
}
function lagrePlan(plan) {
  localStorage.setItem(PLAN_KEY, JSON.stringify(plan));
}

// ── STATE ─────────────────────────────────────────────────────────
var plan = lastPlan();
var aktivUke  = parseInt(new URLSearchParams(location.search).get('uke') || getUkeNr());
var aktivFag  = 'mat';
var aktivTrinn = '8';
var valgtKM   = null;

function getUkeNr() {
  var d = new Date(), jan1 = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
}

// ── UI-BYGGING ────────────────────────────────────────────────────
function byggUI() {
  byggUkeNavigasjon();
  byggFagvelger();
  byggPlanTabell();
  visKMliste();
}

function byggUkeNavigasjon() {
  var el = document.getElementById('uke-nav');
  if (!el) return;
  var html = '';
  for (var u = Math.max(1, aktivUke-3); u <= Math.min(53, aktivUke+8); u++) {
    var harInnhold = plan[u] && Object.keys(plan[u]).length > 0;
    html += '<button class="uke-btn' + (u===aktivUke?' ak':'') + (harInnhold?' har-plan':'') + '" onclick="byttUke('+u+')">Uke '+u+'</button>';
  }
  el.innerHTML = html;
}

function byttUke(u) {
  aktivUke = u;
  byggUI();
}

function byggFagvelger() {
  ['mat','nat','prg'].forEach(function(fag) {
    var btn = document.getElementById('fag-'+fag);
    if (btn) btn.classList.toggle('ak', fag===aktivFag);
  });
  var trinnWrap = document.getElementById('trinn-wrap');
  if (trinnWrap) trinnWrap.style.display = aktivFag==='mat' ? 'flex' : 'none';
}

function byttFag(fag) {
  aktivFag = fag;
  valgtKM = null;
  byggFagvelger();
  visKMliste();
  visRessurser(null);
}

function byttTrinn(t) {
  aktivTrinn = t;
  [8,9,10].forEach(function(n) {
    var b = document.getElementById('trinn-'+n);
    if (b) b.classList.toggle('ak', String(n)===t);
  });
  visKMliste();
}

// ── KM-LISTE ──────────────────────────────────────────────────────
function visKMliste() {
  var el = document.getElementById('km-liste');
  if (!el) return;
  var liste = getAktivKMListe();
  var ukePlan = plan[aktivUke] || {};
  el.innerHTML = '';
  liste.forEach(function(km) {
    var er_planlagt = ukePlan[km[0]];
    var har_res = RES_PER_KM[km[0]] && RES_PER_KM[km[0]].length > 0;
    var div = document.createElement('div');
    div.className = 'km-item' + (er_planlagt?' planlagt':'') + (km[0]===valgtKM?' valgt':'');
    div.innerHTML =
      '<div class="km-item-topp">'
      +'<span class="km-kode">'+km[0]+'</span>'
      +(har_res?'<span class="res-badge">'+RES_PER_KM[km[0]].length+'</span>':'')
      +(er_planlagt?'<span class="planlagt-badge">✓ Uke '+aktivUke+'</span>':'')
      +'</div>'
      +'<div class="km-item-tekst">'+km[1]+'</div>';
    div.onclick = function() { velgKM(km[0]); };
    el.appendChild(div);
  });
}

function getAktivKMListe() {
  if (aktivFag === 'nat') return KM_DATA.nat;
  if (aktivFag === 'prg') return KM_DATA.prg;
  return KM_DATA['mat'+aktivTrinn] || [];
}

function velgKM(km) {
  valgtKM = km;
  visKMliste();
  visRessurser(km);
  visPlanKnapp(km);
}

// ── RESSURSVISNING ────────────────────────────────────────────────
function visRessurser(km) {
  var el = document.getElementById('res-liste');
  var tomEl = document.getElementById('res-tom');
  if (!el) return;
  if (!km || !RES_PER_KM[km] || !RES_PER_KM[km].length) {
    el.innerHTML = '';
    if (tomEl) tomEl.style.display = km ? 'block' : 'none';
    return;
  }
  if (tomEl) tomEl.style.display = 'none';
  el.innerHTML = '';
  RES_PER_KM[km].forEach(function(res) {
    var div = document.createElement('a');
    div.href = res.fil;
    div.target = '_blank';
    div.className = 'res-item';
    div.innerHTML =
      '<div class="res-tittel">'+res.t+'</div>'
      +'<div class="res-fil">'+res.fil+'</div>'
      +'<div class="res-pil">Åpne →</div>';
    el.appendChild(div);
  });
}

function visPlanKnapp(km) {
  var el = document.getElementById('plan-knapp-wrap');
  if (!el || !km) return;
  var ukePlan = plan[aktivUke] || {};
  var erPlanlagt = !!ukePlan[km];
  el.innerHTML = erPlanlagt
    ? '<button class="plan-btn fjern" onclick="fjernFraPlan(\''+km+'\')">✗ Fjern fra uke '+aktivUke+'</button>'
    : '<button class="plan-btn legg-til" onclick="leggTilPlan(\''+km+'\')">+ Legg til i uke '+aktivUke+'</button>';
}

// ── PLAN-TABELLEN ─────────────────────────────────────────────────
function byggPlanTabell() {
  var el = document.getElementById('plan-tabell');
  if (!el) return;
  var ukePlan = plan[aktivUke] || {};
  var koder = Object.keys(ukePlan);
  if (!koder.length) {
    el.innerHTML = '<div class="plan-tom">Ingen emner planlagt for uke '+aktivUke+'.<br>Velg kompetansemål til venstre og trykk "+ Legg til".</div>';
    return;
  }
  var html = '<div class="plan-overskrift">Uke '+aktivUke+'</div><div class="plan-kort-grid">';
  koder.forEach(function(km) {
    var info = ukePlan[km];
    var res = RES_PER_KM[km] || [];
    html += '<div class="plan-kort">'
      +'<div class="plan-km-kode">'+km+'</div>'
      +'<div class="plan-km-tekst">'+info.tekst+'</div>'
      +(info.notat?'<div class="plan-notat">📝 '+info.notat+'</div>':'')
      +'<div class="plan-res-liste">'
      + res.slice(0,2).map(function(r){return '<a href="'+r.fil+'" target="_blank" class="plan-res-link">'+r.t+'</a>';}).join('')
      +'</div>'
      +'<div class="plan-kort-bunn">'
      +'<button class="plan-mini-btn" onclick="redigerNotat(\''+km+'\')">📝 Notat</button>'
      +'<button class="plan-mini-btn fjern-btn" onclick="fjernFraPlan(\''+km+'\')">✗</button>'
      +'</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── PLAN-HANDLINGER ───────────────────────────────────────────────
function leggTilPlan(km) {
  if (!plan[aktivUke]) plan[aktivUke] = {};
  var liste = getAktivKMListe();
  var kmInfo = liste.find(function(k) { return k[0]===km; });
  plan[aktivUke][km] = { tekst: kmInfo ? kmInfo[1] : km, fag: aktivFag, trinn: aktivTrinn, notat: '' };
  lagrePlan(plan);
  byggUI();
}

function fjernFraPlan(km) {
  if (plan[aktivUke]) { delete plan[aktivUke][km]; lagrePlan(plan); }
  byggUI();
}

function redigerNotat(km) {
  var naavarende = plan[aktivUke] && plan[aktivUke][km] ? plan[aktivUke][km].notat || '' : '';
  var nytt = prompt('Notat for ' + km + ':', naavarende);
  if (nytt !== null && plan[aktivUke] && plan[aktivUke][km]) {
    plan[aktivUke][km].notat = nytt;
    lagrePlan(plan);
    byggPlanTabell();
  }
}

// ── PERIODEVISNING ─────────────────────────────────────────────────
function visPeriode() {
  var el = document.getElementById('periode-innhold');
  if (!el) return;
  var html = '<table class="periode-tabell"><thead><tr><th>KM</th><th>Kompetansemål</th>';
  // Vis neste 12 uker
  var uker = [];
  for (var u = aktivUke; u <= Math.min(activUke+11, 53); u++) uker.push(u);
  uker.forEach(function(u) { html += '<th>Uke '+u+'</th>'; });
  html += '</tr></thead><tbody>';

  // Finn alle planlagte KM
  var alleKM = {};
  uker.forEach(function(u) {
    if (plan[u]) Object.keys(plan[u]).forEach(function(km) { alleKM[km] = plan[u][km]; });
  });

  Object.keys(alleKM).sort().forEach(function(km) {
    html += '<tr><td><code>'+km+'</code></td><td>'+alleKM[km].tekst+'</td>';
    uker.forEach(function(u) {
      html += '<td style="text-align:center">' + (plan[u] && plan[u][km] ? '●' : '') + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── EKSPORT ───────────────────────────────────────────────────────
function eksporterPDF() {
  document.getElementById('periode-seksjon').style.display = 'block';
  visPeriode();
  setTimeout(function() { window.print(); }, 300);
}

function visTab(tab) {
  ['tab-plan','tab-periode'].forEach(function(t) {
    var el = document.getElementById(t);
    if (el) el.style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('ak', b.dataset.tab===tab);
  });
  if (tab==='tab-periode') visPeriode();
}

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  byggUI();
  visTab('tab-plan');
});
