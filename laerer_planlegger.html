<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkapLab – Planlegger</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--bg2:#0b0d18;--bg3:#0e1120;--border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);--text:#e0e8ff;--dim:rgba(255,255,255,.42);
  --bla:#60a5fa;--gron:#34d399;--gul:#fbbf24;--rod:#f87171;--lilla:#a78bfa;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);}

nav{height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;
  background:rgba(7,9,15,.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:30;}
.nav-logo{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--bla);text-decoration:none;}
.nav-sep{color:var(--dim);}
.nav-akt{font-size:.82rem;color:var(--dim);}
.spacer{flex:1;}
.nav-lnk{font-size:.8rem;color:var(--dim);text-decoration:none;}
.nav-lnk:hover{color:var(--text);}
.eks-btn{padding:6px 14px;background:var(--bla);color:#000;border:none;
  border-radius:8px;font-family:var(--font-h);font-size:.78rem;font-weight:800;cursor:pointer;}

/* UKE-NAVIGATOR */
#uke-nav{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;
  background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:thin;}
.uke-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border2);
  background:transparent;color:var(--dim);font-family:var(--font-h);font-size:.78rem;
  font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.uke-btn:hover{color:var(--text);}
.uke-btn.ak{background:rgba(96,165,250,.15);color:var(--bla);border-color:rgba(96,165,250,.4);}
.uke-btn.har-plan::after{content:'●';font-size:.45rem;color:var(--gron);vertical-align:super;margin-left:3px;}

/* HOVED-LAYOUT: 3 kolonner */
#app{display:grid;grid-template-columns:280px 260px 1fr;
  height:calc(100vh - 52px - 45px);overflow:hidden;}

/* KM-PANEL (venstre) */
#km-panel{background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
.km-panel-hdr{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.km-panel-tittel{font-family:var(--font-h);font-size:.88rem;font-weight:800;color:var(--bla);margin-bottom:10px;}
.fag-rad{display:flex;gap:4px;margin-bottom:8px;}
.fag-btn{flex:1;padding:6px 4px;border-radius:7px;border:1.5px solid var(--border2);
  background:transparent;color:var(--dim);font-size:.72rem;font-family:var(--font-h);
  font-weight:700;cursor:pointer;transition:all .15s;}
.fag-btn.ak.mat{background:rgba(139,92,246,.2);color:#c4b5fd;border-color:rgba(139,92,246,.4);}
.fag-btn.ak.nat{background:rgba(52,211,153,.15);color:var(--gron);border-color:rgba(52,211,153,.4);}
.fag-btn.ak.prg{background:rgba(96,165,250,.15);color:var(--bla);border-color:rgba(96,165,250,.4);}
#trinn-wrap{display:flex;gap:4px;}
.trinn-btn2{padding:3px 9px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--dim);font-size:.7rem;font-family:var(--font-h);
  font-weight:700;cursor:pointer;transition:all .15s;}
.trinn-btn2.ak{background:rgba(251,191,36,.15);color:var(--gul);border-color:rgba(251,191,36,.4);}
#km-liste{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;}
.km-item{padding:8px 10px;border-radius:8px;border:1px solid var(--border);
  margin-bottom:5px;cursor:pointer;transition:all .15s;}
.km-item:hover{border-color:var(--border2);background:rgba(255,255,255,.03);}
.km-item.valgt{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3);}
.km-item.planlagt{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.05);}
.km-item-topp{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.km-kode{font-size:.63rem;font-family:var(--font-m);background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;}
.res-badge{font-size:.6rem;background:rgba(96,165,250,.15);color:var(--bla);padding:1px 5px;border-radius:4px;margin-left:auto;}
.planlagt-badge{font-size:.7rem;color:var(--gron);}
.km-item-tekst{font-size:.75rem;color:var(--dim);line-height:1.35;}
.km-item:hover .km-item-tekst,.km-item.valgt .km-item-tekst{color:var(--text);}

/* RESSURS-PANEL (midt) */
#res-panel{background:var(--bg3);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
.res-panel-hdr{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.res-panel-tittel{font-family:var(--font-h);font-size:.85rem;font-weight:800;margin-bottom:2px;}
.res-panel-sub{font-size:.7rem;color:var(--dim);}
#res-liste{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;}
.res-velg-hint{padding:20px;text-align:center;color:var(--dim);font-size:.8rem;line-height:1.6;}
.res-item{padding:10px 12px;border-radius:9px;border:1px solid var(--border);margin-bottom:8px;background:rgba(255,255,255,.02);}
.res-item-hoved{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.res-type-ikon{font-size:1.1rem;flex-shrink:0;}
.res-info{flex:1;min-width:0;}
.res-tittel{font-size:.8rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-fil{margin-top:2px;}
.res-type-label{font-size:.6rem;font-family:var(--font-h);font-weight:700;
  color:var(--bla);background:rgba(96,165,250,.1);padding:1px 5px;border-radius:4px;}
.res-apne-btn{font-size:.75rem;color:var(--dim);text-decoration:none;padding:3px 6px;
  border:1px solid var(--border);border-radius:5px;flex-shrink:0;}
.res-apne-btn:hover{color:var(--bla);border-color:rgba(96,165,250,.3);}
.res-dag-rad{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.res-dag-label{font-size:.65rem;color:var(--dim);margin-right:2px;}
.res-dag-btn{padding:3px 7px;border-radius:6px;border:1px solid var(--border2);background:transparent;
  color:var(--dim);font-size:.68rem;font-family:var(--font-h);font-weight:700;cursor:pointer;transition:all .15s;}
.res-dag-btn:hover{background:rgba(52,211,153,.15);color:var(--gron);border-color:rgba(52,211,153,.3);}

/* PLAN-PANEL (høyre) */
#plan-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.plan-tabs{display:flex;gap:4px;padding:10px 14px 0;background:var(--bg2);
  border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{padding:7px 14px;border-radius:9px 9px 0 0;border:none;cursor:pointer;
  font-family:var(--font-h);font-size:.78rem;font-weight:700;color:var(--dim);
  background:transparent;transition:all .15s;}
.tab-btn.ak{background:var(--bg);color:var(--text);border:1px solid var(--border);border-bottom:none;}
#tab-plan{flex:1;overflow-y:auto;padding:12px 14px;}
#tab-periode{flex:1;overflow-y:auto;padding:12px 14px;}

/* UKEPLAN MED DAGER */
#ukeplan-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.dag-kolonne{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  display:flex;flex-direction:column;min-height:200px;}
.dag-hdr{padding:8px 10px;font-family:var(--font-h);font-size:.8rem;font-weight:800;
  border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.dag-antall{font-size:.62rem;background:rgba(96,165,250,.15);color:var(--bla);
  padding:1px 6px;border-radius:5px;}
.dag-liste{flex:1;padding:6px;display:flex;flex-direction:column;gap:5px;}
.dag-tom{text-align:center;color:var(--dim);font-size:.72rem;padding:16px 0;}
.dag-res-kort{background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:8px;padding:7px 8px;display:flex;align-items:flex-start;gap:7px;}
.dag-res-nr{width:18px;height:18px;border-radius:4px;background:rgba(96,165,250,.2);
  color:var(--bla);font-family:var(--font-h);font-size:.65rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.dag-res-info{flex:1;min-width:0;}
.dag-res-tittel{font-size:.72rem;font-weight:600;color:var(--text);text-decoration:none;
  display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dag-res-tittel:hover{color:var(--bla);}
.dag-res-km{font-size:.6rem;font-family:var(--font-m);color:var(--dim);margin-top:2px;}
.dag-res-btn-wrap{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.dag-flytt{background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);
  font-size:.65rem;cursor:pointer;padding:1px 4px;line-height:1;}
.dag-flytt:hover{color:var(--text);}
.dag-fjern{background:none;border:1px solid rgba(248,113,113,.2);border-radius:4px;
  color:var(--rod);font-size:.65rem;cursor:pointer;padding:1px 4px;line-height:1;margin-top:2px;}

/* PERIODEPLAN */
.periode-tabell{width:100%;border-collapse:collapse;font-size:.76rem;}
.periode-tabell th{padding:7px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);
  font-family:var(--font-h);font-size:.7rem;white-space:nowrap;color:var(--dim);}
.periode-tabell td{padding:6px 10px;border:1px solid var(--border);vertical-align:top;}
.per-link{display:block;color:var(--bla);text-decoration:none;font-size:.72rem;
  padding:2px 0;line-height:1.4;}
.per-link:hover{text-decoration:underline;}

@media(max-width:1100px){
  #app{grid-template-columns:250px 230px 1fr;}
}
@media(max-width:800px){
  #app{grid-template-columns:1fr;grid-template-rows:auto auto 1fr;height:auto;}
  #km-panel,#res-panel{max-height:280px;border-right:none;border-bottom:1px solid var(--border);}
  #ukeplan-grid{grid-template-columns:repeat(2,1fr);}
}
@media print{
  nav,#uke-nav,#km-panel,#res-panel,.plan-tabs,#tab-plan{display:none!important;}
  #app{display:block;height:auto;}
  #plan-panel{overflow:visible;}
  #tab-periode{display:block!important;overflow:visible;}
  body{background:#fff!important;color:#111!important;}
  .periode-tabell th{background:#eee!important;color:#333!important;border-color:#ccc!important;}
  .periode-tabell td{border-color:#ccc!important;color:#111!important;}
  .per-link{color:#333!important;}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">SkapLab</a>
  <span class="nav-sep">/</span>
  <span class="nav-akt">📅 Planlegger</span>
  <div class="spacer"></div>
  <a href="laerer_dashboard.html" class="nav-lnk">← Dashboard</a>
  <button class="eks-btn" onclick="eksporterPDF()">🖨️ Skriv ut periodeplan</button>
</nav>
<div id="uke-nav"></div>
<div id="app">
  <!-- VENSTRE: KM -->
  <div id="km-panel">
    <div class="km-panel-hdr">
      <div class="km-panel-tittel">Kompetansemål</div>
      <div class="fag-rad">
        <button class="fag-btn mat ak" id="fag-mat" onclick="byttFag('mat')">📐 Matte</button>
        <button class="fag-btn nat" id="fag-nat" onclick="byttFag('nat')">🔬 Natur</button>
        <button class="fag-btn prg" id="fag-prg" onclick="byttFag('prg')">💻 Prog</button>
      </div>
      <div id="trinn-wrap">
        <button class="trinn-btn2 ak" id="trinn-8" onclick="byttTrinn('8')">8. trinn</button>
        <button class="trinn-btn2" id="trinn-9" onclick="byttTrinn('9')">9. trinn</button>
        <button class="trinn-btn2" id="trinn-10" onclick="byttTrinn('10')">10. trinn</button>
      </div>
    </div>
    <div id="km-liste"></div>
  </div>
  <!-- MIDT: RESSURSER -->
  <div id="res-panel">
    <div class="res-panel-hdr">
      <div class="res-panel-tittel">Ressurser</div>
      <div class="res-panel-sub">Velg KM, trykk dag for å legge til</div>
    </div>
    <div id="res-liste"><div class="res-velg-hint">Velg et kompetansemål for å se ressurser.</div></div>
  </div>
  <!-- HØYRE: UKEPLAN -->
  <div id="plan-panel">
    <div class="plan-tabs">
      <button class="tab-btn ak" data-tab="tab-plan" onclick="visTab('tab-plan')">📅 Ukeplan</button>
      <button class="tab-btn" data-tab="tab-periode" onclick="visTab('tab-periode')">📊 Periodeplan</button>
    </div>
    <div id="tab-plan"><div id="ukeplan-grid"></div></div>
    <div id="tab-periode" style="display:none;"><div id="periode-tabell-wrap"></div></div>
  </div>
</div>

<script>
// skaplab_auth.js - SkapLab autentisering
(function () {
  'use strict';

  // ── KONFIGURASJON ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://cqzmzsqhuawpsvnjjzse.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mmihFKY7S7bqdbOw9ZNORg_8jxMzZ9j';
  var API = SUPABASE_URL + '/rest/v1';
  var SESSION_NØKKEL = 'skaplab_elev';
  var LAERER_NØKKEL  = 'skaplab_laerer';

  // ── HJELPEFUNKSJONER ───────────────────────────────────────────
  function hdr(token) {
    var h = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY)
    };
    return h;
  }

  function post(sti, data, token) {
    return fetch(API + sti, {
      method: 'POST',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  function get(sti, token) {
    return fetch(API + sti, {
      headers: hdr(token)
    }).then(function (r) { return r.json(); });
  }

  function patch(sti, data, token) {
    return fetch(API + sti, {
      method: 'PATCH',
      headers: Object.assign(hdr(token), { 'Prefer': 'return=representation' }),
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // Supabase Auth-endepunkt
  function auth(sti, data) {
    return fetch(SUPABASE_URL + '/auth/v1/' + sti, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify(data)
    }).then(function (r) { return r.json(); });
  }

  // ── ELEV-INNLOGGING ────────────────────────────────────────────
  async function elevLoggInn(kode) {
    try {
      var resp = await fetch(
        API + '/elever?innloggingskode=eq.' + kode + '&aktiv=eq.true' +
        '&select=id,fullt_navn,klasse_id,klasser(navn,trinn,skoler(navn))',
        { headers: hdr() }
      );
      var data = await resp.json();
      if (!data || data.length === 0) return { ok: false, feil: 'Feil kode' };
      var elev = data[0];
      // Bruk localStorage slik at sesjonen deles mellom faner
      localStorage.setItem(SESSION_NØKKEL, JSON.stringify({...elev, _lagret: Date.now()}));
      return { ok: true, elev: elev };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  function elevLoggUt() {
    localStorage.removeItem(SESSION_NØKKEL);
    sessionStorage.removeItem(SESSION_NØKKEL);
  }

  function hentElev() {
    try {
      var data = localStorage.getItem(SESSION_NØKKEL);
      if (!data) return null;
      var elev = JSON.parse(data);
      // Utløp etter 8 timer (skoledagen)
      if (elev._lagret && Date.now() - elev._lagret > 8*60*60*1000) {
        localStorage.removeItem(SESSION_NØKKEL);
        return null;
      }
      return elev;
    } catch (e) { return null; }
  }

  function erElevInnlogget() {
    return hentElev() !== null;
  }

  // ── LÆRER-INNLOGGING (via Supabase Auth) ──────────────────────
  async function laererLoggInn(epost, passord) {
    try {
      var resp = await auth('token?grant_type=password', {
        email: epost, password: passord
      });

      if (resp.error) return { ok: false, feil: resp.error.message };
      if (!resp.access_token) return { ok: false, feil: 'Ingen token i respons: ' + JSON.stringify(resp) };
      sessionStorage.setItem(LAERER_NØKKEL, JSON.stringify(resp));
      return { ok: true, token: resp.access_token };
    } catch (e) {
      return { ok: false, feil: 'Tilkoblingsfeil' };
    }
  }

  async function laererLoggUt() {
    var l = hentLaerer();
    if (l) {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + l.access_token }
      });
    }
    sessionStorage.removeItem(LAERER_NØKKEL);
  }

  function hentLaerer() {
    try {
      var data = sessionStorage.getItem(LAERER_NØKKEL);
      if (!data) return null;
      var parsed = JSON.parse(data);
      // Returner null KUN om det er en tydelig feilrespons uten token
      if (parsed && !parsed.access_token && (parsed.error_code || parsed.error)) {
        console.log('Ugyldig sesjon i storage:', JSON.stringify(Object.keys(parsed)));
        return null;
      }
      return parsed;
    } catch (e) { return null; }
  }

  function erLaererInnlogget() {
    var sess = hentLaerer();
    // Sjekk at sesjonen er gyldig - ikke bare en feilmelding
    return sess !== null && 
           sess.access_token !== undefined && 
           sess.access_token !== null &&
           !sess.error_code;  // Fang opp Supabase-feilresponser
  }

  // ── AKTIVITETSSPORING ─────────────────────────────────────────
  /**
   * Logg aktivitet for innlogget elev.
   * @param {string} ressurs    - f.eks. 'mattequiz_Algebra'
   * @param {string} kmKode     - f.eks. 'MAT-ALG'
   * @param {number} scorePst   - 0–100
   * @param {number} antall     - antall oppgaver totalt
   * @param {number} riktige    - antall riktige svar
   */
  async function loggAktivitet(ressurs, kmKode, scorePst, antall, riktige) {
    var elev = hentElev();
    if (!elev) return;  // ikke logget inn, gjør ingenting

    try {
      await post('/aktivitet', {
        elev_id:         elev.id,
        ressurs:         ressurs,
        km_kode:         kmKode,
        score_pst:       Math.round(scorePst),
        antall_oppgaver: antall || null,
        riktige:         riktige || null
      });
    } catch (e) {
      // Sporing feiler stille — ikke forstyrr spillopplevelsen
    }
  }

  // ── NAVIGASJONSBJELKE ─────────────────────────────────────────
  // Viser innlogget bruker øverst på siden om inkludert
  function visInnloggetBruker() {
    var elev = hentElev();
    if (!elev) return;

    var wrap = document.getElementById('skaplab-bruker-strip');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'skaplab-bruker-strip';
      wrap.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;z-index:1000;' +
        'background:rgba(10,14,28,0.95);border-top:1px solid rgba(255,255,255,0.1);' +
        'padding:6px 16px;display:flex;align-items:center;gap:12px;' +
        'font-family:DM Sans,sans-serif;font-size:.75rem;color:rgba(255,255,255,0.6);';
      document.body.appendChild(wrap);
    }

    var skoleNavn = (elev.klasser && elev.klasser.skoler)
      ? elev.klasser.skoler.navn : '';
    var klasseNavn = elev.klasser ? elev.klasser.navn : '';

    wrap.innerHTML =
      '<span>👤 <strong style="color:#fff">' + (elev.fullt_navn || 'Elev') + '</strong>' +
      (klasseNavn ? ' · ' + klasseNavn : '') +
      (skoleNavn ? ' · ' + skoleNavn : '') + '</span>' +
      '<span style="flex:1"></span>' +
      '<a href="elev_portal.html" style="color:#60a5fa;text-decoration:none;">Min side</a>' +
      '<button onclick="SkapLab.elevLoggUt();location.reload();" ' +
      'style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);' +
      'padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.72rem;">Logg ut</button>';
  }

  // Kjør automatisk ved sideinnlasting
  document.addEventListener('DOMContentLoaded', visInnloggetBruker);

  // ── EKSPORTER ─────────────────────────────────────────────────
  window.SkapLab = {
    // Elev
    elevLoggInn:       elevLoggInn,
    elevLoggUt:        elevLoggUt,
    hentElev:          hentElev,
    erElevInnlogget:   erElevInnlogget,
    // Lærer
    laererLoggInn:     laererLoggInn,
    laererLoggUt:      laererLoggUt,
    hentLaerer:        hentLaerer,
    erLaererInnlogget: erLaererInnlogget,

var laerer = SkapLab.hentLaerer();
var token  = laerer ? laerer.access_token : null;
var lid    = laerer ? ((laerer.user&&laerer.user.id)||laerer.id||'') : null;
if (!laerer) { location.href = 'laerer_login.html'; }

var UKEDAGER = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag'];
var PLAN_KEY  = 'skaplab_plan_v2';

function lastPlan() { try { return JSON.parse(localStorage.getItem(PLAN_KEY)||'{}'); } catch(e){ return {}; } }
function lagrePlan(p) { localStorage.setItem(PLAN_KEY, JSON.stringify(p)); }

var plan      = lastPlan();
var aktivUke  = parseInt(new URLSearchParams(location.search).get('uke') || getUkeNr());
var aktivFag  = 'mat';
var aktivTrinn = '8';
var valgtKM   = null;

function getUkeNr() {
  var d = new Date(), jan1 = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-jan1)/86400000 + jan1.getDay()+1)/7);
}

// ── UKE-NAVIGASJON ────────────────────────────────────────────────
function byggUkeNav() {
  var el = document.getElementById('uke-nav');
  if (!el) return;
  var html = '';
  for (var u = Math.max(1,aktivUke-3); u <= Math.min(53,aktivUke+8); u++) {
    var harPlan = plan[u] && Object.values(plan[u]).some(function(dag){ return dag && dag.length; });
    html += '<button class="uke-btn'+(u===aktivUke?' ak':'')+(harPlan?' har-plan':'')+'" onclick="byttUke('+u+')">Uke '+u+'</button>';
  }
  el.innerHTML = html;
}

function byttUke(u) { aktivUke = u; byggUI(); }

// ── FAGVELGER ─────────────────────────────────────────────────────
function byggFagvelger() {
  ['mat','nat','prg'].forEach(function(fag) {
    var btn = document.getElementById('fag-'+fag);
    if (btn) btn.classList.toggle('ak', fag===aktivFag);
  });
  var tw = document.getElementById('trinn-wrap');
  if (tw) tw.style.display = aktivFag==='mat'?'flex':'none';
}
function byttFag(fag) { aktivFag=fag; valgtKM=null; byggFagvelger(); visKMliste(); visRessurser(null); }
function byttTrinn(t) {
  aktivTrinn=t;
  [8,9,10].forEach(function(n){ var b=document.getElementById('trinn-'+n); if(b) b.classList.toggle('ak',String(n)===t); });
  visKMliste();
}

// ── KM-LISTE ──────────────────────────────────────────────────────
function visKMliste() {
  var el = document.getElementById('km-liste');
  if (!el) return;
  var liste = getAktivKMListe();
  el.innerHTML = '';
  liste.forEach(function(km) {
    var harRes = RES_PER_KM[km[0]] && RES_PER_KM[km[0]].length;
    var erPlanlagt = erKMPlanlagtDenneUke(km[0]);
    var div = document.createElement('div');
    div.className = 'km-item'+(km[0]===valgtKM?' valgt':'')+(erPlanlagt?' planlagt':'');
    div.innerHTML = '<div class="km-item-topp"><span class="km-kode">'+km[0]+'</span>'
      +(harRes?'<span class="res-badge">'+RES_PER_KM[km[0]].length+'</span>':'')
      +(erPlanlagt?'<span class="planlagt-badge">✓</span>':'')+'</div>'
      +'<div class="km-item-tekst">'+km[1]+'</div>';
    div.onclick = function(){ velgKM(km[0]); };
    el.appendChild(div);
  });
}

function getAktivKMListe() {
  if (aktivFag==='nat') return KM_DATA.nat;
  if (aktivFag==='prg') return KM_DATA.prg;
  return KM_DATA['mat'+aktivTrinn]||[];
}

function erKMPlanlagtDenneUke(km) {
  if (!plan[aktivUke]) return false;
  return UKEDAGER.some(function(dag){ return plan[aktivUke][dag] && plan[aktivUke][dag].some(function(r){ return r.km===km; }); });
}

function velgKM(km) { valgtKM=km; visKMliste(); visRessurser(km); }

// ── RESSURSVISNING ────────────────────────────────────────────────
function resIkon(r) {
  if (r.indexOf('mengde')>=0) return '🏋️';
  if (r.indexOf('quiz')>=0) return '🧪';
  if (r.indexOf('flipcard')>=0||r.indexOf('flash')>=0) return '🃏';
  if (r.indexOf('spill')>=0||r.indexOf('battleship')>=0||r.indexOf('kanon')>=0) return '🎮';
  if (r.indexOf('lab')>=0) return '🔬';
  return '📖';
}
function resType(r) {
  if (r.indexOf('mengde')>=0) return 'Mengdetrening';
  if (r.indexOf('quiz')>=0) return 'Quiz';
  if (r.indexOf('flipcard')>=0||r.indexOf('flash')>=0) return 'Teorikort';
  if (r.indexOf('spill')>=0||r.indexOf('battleship')>=0||r.indexOf('kanon')>=0) return 'Spill';
  if (r.indexOf('lab')>=0) return 'Lab';
  return 'Leksjon';
}

function visRessurser(km) {
  var el = document.getElementById('res-liste');
  var tom = document.getElementById('res-tom');
  if (!el) return;
  if (!km||!RES_PER_KM[km]||!RES_PER_KM[km].length) {
    el.innerHTML = '<div class="res-velg-hint">'+(km?'Ingen ressurser tagget til dette KM ennå.':'Velg et kompetansemål for å se ressurser.')+'</div>';
    return;
  }
  var sortert = RES_PER_KM[km].slice().sort(function(a,b){
    return (a.r.indexOf('mengde')>=0?0:1)-(b.r.indexOf('mengde')>=0?0:1);
  });
  el.innerHTML = '';
  sortert.forEach(function(res) {
    var ikon = resIkon(res.r), type = resType(res.r);
    var div = document.createElement('div');
    div.className = 'res-item';
    div.innerHTML =
      '<div class="res-item-hoved">'
        +'<span class="res-type-ikon">'+ikon+'</span>'
        +'<div class="res-info">'
          +'<div class="res-tittel">'+res.t+'</div>'
          +'<div class="res-fil"><span class="res-type-label">'+type+'</span></div>'
        +'</div>'
        +'<a href="'+res.fil+'" target="_blank" class="res-apne-btn" title="Åpne">↗</a>'
      +'</div>'
      +'<div class="res-dag-rad">'
        +'<span class="res-dag-label">Legg til:</span>'
        +UKEDAGER.map(function(dag){ return '<button class="res-dag-btn" onclick="leggTilDag(\''+km+'\','+JSON.stringify(res)+',\''+dag+'\')">'+dag.slice(0,3)+'</button>'; }).join('')
      +'</div>';
    el.appendChild(div);
  });
}

function leggTilDag(km, res, dag) {
  if (!plan[aktivUke]) plan[aktivUke] = {};
  if (!plan[aktivUke][dag]) plan[aktivUke][dag] = [];
  // Unngå duplikat
  if (!plan[aktivUke][dag].find(function(r){ return r.r===res.r; })) {
    var liste = getAktivKMListe();
    var kmInfo = liste.find(function(k){ return k[0]===km; });
    plan[aktivUke][dag].push({ r:res.r, t:res.t, fil:res.fil, km:km, kmTekst:kmInfo?kmInfo[1]:km });
    lagrePlan(plan);
    byggUkeplan();
    visKMliste();
    // Visuell bekreftelse på knappen
    var btns = document.querySelectorAll('.res-dag-btn');
    btns.forEach(function(btn){ if(btn.textContent===dag.slice(0,3)&&btn.closest('.res-item').querySelector('.res-tittel').textContent===res.t){ btn.style.background='rgba(52,211,153,.3)'; btn.style.color='var(--gron)'; setTimeout(function(){ btn.style.background=''; btn.style.color=''; },1200); } });
  }
}

// ── UKEPLAN (DAGER) ──────────────────────────────────────────────
function byggUkeplan() {
  var el = document.getElementById('ukeplan-grid');
  if (!el) return;
  var ukePlan = plan[aktivUke] || {};
  el.innerHTML = '';
  UKEDAGER.forEach(function(dag) {
    var ressurser = ukePlan[dag] || [];
    var dagEl = document.createElement('div');
    dagEl.className = 'dag-kolonne';
    dagEl.innerHTML = '<div class="dag-hdr">'+dag+'<span class="dag-antall">'+(ressurser.length||'')+'</span></div>';
    var liste = document.createElement('div');
    liste.className = 'dag-liste';
    if (!ressurser.length) {
      liste.innerHTML = '<div class="dag-tom">—</div>';
    } else {
      ressurser.forEach(function(res, i) {
        var kort = document.createElement('div');
        kort.className = 'dag-res-kort';
        kort.innerHTML =
          '<div class="dag-res-nr">'+(i+1)+'</div>'
          +'<div class="dag-res-info">'
            +'<a href="'+res.fil+'" target="_blank" class="dag-res-tittel">'+res.t+'</a>'
            +'<div class="dag-res-km">'+res.km+'</div>'
          +'</div>'
          +'<div class="dag-res-btn-wrap">'
            +(i>0?'<button class="dag-flytt" onclick="flyttRes(\''+dag+'\','+i+',-1)" title="Opp">↑</button>':'')
            +(i<ressurser.length-1?'<button class="dag-flytt" onclick="flyttRes(\''+dag+'\','+i+',1)" title="Ned">↓</button>':'')
            +'<button class="dag-fjern" onclick="fjernResFraDag(\''+dag+'\','+i+')" title="Fjern">×</button>'
          +'</div>';
        liste.appendChild(kort);
      });
    }
    dagEl.appendChild(liste);
    el.appendChild(dagEl);
  });
}

function flyttRes(dag, idx, retning) {
  var res = plan[aktivUke] && plan[aktivUke][dag];
  if (!res) return;
  var ny = idx + retning;
  if (ny<0||ny>=res.length) return;
  var tmp = res[idx]; res[idx]=res[ny]; res[ny]=tmp;
  lagrePlan(plan);
  byggUkeplan();
}

function fjernResFraDag(dag, idx) {
  if (plan[aktivUke] && plan[aktivUke][dag]) {
    plan[aktivUke][dag].splice(idx,1);
    lagrePlan(plan);
    byggUkeplan();
    visKMliste();
  }
}

function byggPeriodeplan() {
  var el = document.getElementById('periode-tabell-wrap');
  if (!el) return;
  var html = '<table class="periode-tabell"><thead><tr><th>Dag</th>';
  var uker = [];
  for (var u=aktivUke; u<=Math.min(aktivUke+7,53); u++) uker.push(u);
  uker.forEach(function(u){ html+='<th>Uke '+u+'</th>'; });
  html += '</tr></thead><tbody>';
  UKEDAGER.forEach(function(dag){
    html += '<tr><td><strong>'+dag+'</strong></td>';
    uker.forEach(function(u){
      var res = (plan[u]&&plan[u][dag])||[];
      html += '<td>'+(res.map(function(r){ return '<a href="'+r.fil+'" class="per-link">'+r.t+'</a>'; }).join('<br>')||'')+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function visTab(tab) {
  ['tab-plan','tab-periode'].forEach(function(t){
    var e=document.getElementById(t); if(e) e.style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('ak',b.dataset.tab===tab); });
  if (tab==='tab-periode') byggPeriodeplan();
}

function eksporterPDF() {
  visTab('tab-periode');
  byggPeriodeplan();
  setTimeout(function(){ window.print(); }, 300);
}

function byggUI() {
  byggUkeNav();
  byggFagvelger();
  visKMliste();
  byggUkeplan();
}

window.addEventListener('load', function(){ byggUI(); visTab('tab-plan'); });

</script>
