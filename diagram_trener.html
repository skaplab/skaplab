<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagramtrener · SkapLab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f14;--bg2:#16161e;--bg3:#1e1e2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#e8e8f0;--dim:#888899;
  --accent:#5bc98e;--accent2:#5b8dd9;--gold:#e8b84b;
  --red:#e05c6e;--orange:#e8874b;
  --font-d:'Playfair Display',serif;
  --font-b:'Source Sans 3',sans-serif;
  --font-m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:16px;}
#header{background:linear-gradient(135deg,#16161e,#1a1e2a);border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:12px;}
.logo{font-family:var(--font-d);font-size:1.4rem;font-weight:900;color:var(--gold);}
.undertittel{font-size:.78rem;color:var(--dim);}
.spacer{flex:1;}
.header-stat{font-size:.82rem;color:var(--dim);}
.header-stat b{color:var(--gold);}
a.tilbake{font-size:.78rem;color:var(--dim);text-decoration:none;}
a.tilbake:hover{color:var(--text);}
#prog-wrap{padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;}
#prog-bar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--gold));border-radius:3px;transition:width .4s;}
#prog-tekst{font-size:.76rem;color:var(--dim);white-space:nowrap;}
#app{display:grid;grid-template-columns:200px 1fr 220px;min-height:calc(100vh - 98px);}
#sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:10px 6px;overflow-y:auto;}
.grp-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--dim);padding:10px 8px 4px;}
.oppg-knapp{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:7px;
  background:transparent;border:1px solid transparent;color:var(--dim);cursor:pointer;
  font-size:.8rem;font-family:var(--font-b);text-align:left;transition:all .12s;}
.oppg-knapp:hover{background:rgba(255,255,255,.04);color:var(--text);}
.oppg-knapp.aktiv{background:rgba(232,184,75,.07);border-color:rgba(232,184,75,.2);color:var(--gold);}
.oppg-knapp.fullfort{background:rgba(91,201,142,.06);border-color:rgba(91,201,142,.15);color:var(--accent);}
.oppg-knapp.feil{background:rgba(224,92,110,.06);border-color:rgba(224,92,110,.15);color:var(--red);}
.merking-lavt{font-size:.6rem;padding:1px 5px;border-radius:5px;margin-left:auto;
  background:rgba(91,201,142,.15);color:var(--accent);}
.merking-viktig{font-size:.6rem;padding:1px 5px;border-radius:5px;margin-left:auto;
  background:rgba(232,184,75,.15);color:var(--gold);}
#panel{padding:24px 28px;overflow-y:auto;max-width:820px;}
.oppg-gruppe{font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;color:var(--accent2);font-weight:700;margin-bottom:4px;}
.oppg-tittel{font-family:var(--font-d);font-size:1.4rem;font-weight:700;line-height:1.2;}
.oppg-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.meta-tag{font-size:.72rem;padding:3px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.1);color:var(--dim);}
.meta-poeng{background:rgba(232,184,75,.08);border-color:rgba(232,184,75,.25);color:var(--gold);}
.intro-boks{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;margin:14px 0;font-size:.9rem;line-height:1.6;}
.diagram-wrap{margin:14px 0;}
.svar-seksjon{margin:12px 0;}
.svar-label{font-size:.78rem;color:var(--dim);margin-bottom:6px;}
.svar-input{width:100%;max-width:160px;padding:10px 14px;background:rgba(255,255,255,.06);
  border:2px solid rgba(255,255,255,.12);border-radius:9px;color:var(--text);
  font-family:var(--font-m);font-size:1rem;outline:none;transition:border-color .15s;}
.svar-input:focus{border-color:var(--gold);}
.svar-input.riktig{border-color:var(--accent);background:rgba(91,201,142,.06);}
.svar-input.galt{border-color:var(--red);background:rgba(224,92,110,.06);}
.fv-grid{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.fv-alt{display:block;width:100%;padding:10px 14px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);
  cursor:pointer;text-align:left;font-family:var(--font-b);font-size:.86rem;transition:all .12s;}
.fv-alt:hover{background:rgba(255,255,255,.08);}
.fv-alt.fv-valgt{background:rgba(232,184,75,.08);border-color:rgba(232,184,75,.3);color:var(--gold);}
.fv-alt.fv-riktig{background:rgba(91,201,142,.1);border-color:rgba(91,201,142,.4);color:var(--accent);}
.fv-alt.fv-galt{background:rgba(224,92,110,.08);border-color:rgba(224,92,110,.3);color:var(--red);}
.fv-begr{font-size:.78rem;color:var(--dim);margin-top:5px;line-height:1.5;}
.knapp-rad{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.sjekk-btn{padding:11px 26px;font-family:var(--font-d);font-size:.95rem;font-weight:700;
  background:var(--gold);color:#000;border:none;border-radius:9px;cursor:pointer;transition:filter .15s;}
.sjekk-btn:hover{filter:brightness(1.08);}
.sjekk-btn:disabled{opacity:.3;cursor:default;}
.neste-btn{padding:11px 22px;font-family:var(--font-d);font-size:.9rem;font-weight:700;
  background:var(--accent2);color:#fff;border:none;border-radius:9px;cursor:pointer;display:none;}
.reset-btn{padding:11px 18px;font-size:.85rem;font-family:var(--font-b);
  background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.1);border-radius:9px;cursor:pointer;}
.fb{padding:12px 16px;border-radius:9px;font-size:.86rem;line-height:1.5;display:none;margin-top:12px;white-space:pre-line;}
.fb.riktig{background:rgba(91,201,142,.1);border:1px solid rgba(91,201,142,.3);color:var(--accent);display:block;}
.fb.delvis{background:rgba(232,184,75,.08);border:1px solid rgba(232,184,75,.25);color:var(--gold);display:block;}
.fb.feil{background:rgba(224,92,110,.1);border:1px solid rgba(224,92,110,.3);color:var(--red);display:block;}
.fasit-boks{background:var(--bg3);border:1px solid rgba(91,201,142,.15);border-radius:9px;
  padding:12px 16px;margin-top:10px;font-size:.84rem;line-height:1.7;display:none;white-space:pre-line;}
.fasit-boks.vis{display:block;}
.fasit-tittel{color:var(--accent);font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;}
#hint-panel{background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:20px 14px;position:sticky;top:0;height:calc(100vh - 98px);overflow:hidden;}
#hint-knapp{background:none;border:none;cursor:pointer;font-size:2.4rem;line-height:1;padding:8px;
  border-radius:50%;transition:transform .15s,background .15s;
  display:flex;align-items:center;justify-content:center;width:60px;height:60px;flex-shrink:0;}
#hint-knapp:hover{background:rgba(255,255,255,.07);transform:scale(1.08);}
#hint-knapp.aktiv{background:rgba(232,184,75,.12);}
#hint-innhold{width:100%;margin-top:14px;overflow-y:auto;flex:1;}
#hint-innhold.hint-skjult{display:none;}
#hint-innhold.hint-synlig{display:block;}
.hint-steg{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.hint-nr{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:rgba(232,184,75,.15);
  color:var(--gold);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
.hint-tekst{font-size:.8rem;color:var(--dim);line-height:1.5;}
#resultat{display:none;padding:40px;max-width:600px;}
.res-tittel{font-family:var(--font-d);font-size:2rem;font-weight:900;margin-bottom:8px;}
.res-score{font-family:var(--font-d);font-size:3.5rem;font-weight:900;color:var(--gold);line-height:1;margin:14px 0;}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.res-kort{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.res-tall{font-family:var(--font-d);font-size:1.5rem;font-weight:700;color:var(--accent2);}
.res-label{font-size:.76rem;color:var(--dim);margin-top:2px;}
.ny-btn{padding:13px 30px;font-family:var(--font-d);font-size:.95rem;font-weight:700;
  background:var(--gold);color:#000;border:none;border-radius:9px;cursor:pointer;}
.tekst-svar{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);
  font-family:var(--font-b);font-size:.88rem;resize:vertical;min-height:70px;}
</style>

  <a href="index.html" class="tilbake">← SkapLab</a>
  <div>

<div id="app">
  <div id="sidebar"></div>

    <div style="padding:60px 40px;text-align:center;color:var(--dim)">

<script>

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function plukk(arr){return arr[Math.floor(Math.random()*arr.length)];}
function bland(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}


// ══════════════════════════════════════════════════════════════════
// FORMEL-PARSER FOR PSEUDO-REGNEARK
// Støtter norsk og engelsk Excel-syntaks
// ══════════════════════════════════════════════════════════════════


// ══════════════════════════════════════════════════════════════════
// SVG-KOORDINATSYSTEM — GENERATOR
// Tegner koordinatsystem med 1-3 funksjoner
// ══════════════════════════════════════════════════════════════════

var DIAGRAM_FARGER = ['#5b8dd9', '#e8874b', '#5bc98e', '#e05c6e', '#a78bfa'];
var DIAGRAM_NAVN   = ['f', 'g', 'h'];

function pentIntervall(range, ønsketAntall) {
    var rå = range / ønsketAntall;
    var exp = Math.floor(Math.log10(rå));
    var mant = rå / Math.pow(10, exp);
    var nice = mant < 1.5 ? 1 : mant < 3.5 ? 2 : mant < 7.5 ? 5 : 10;
    return nice * Math.pow(10, exp);
  }

function lagKoordinatsystem(opts) {
  // opts: { funksjoner: [{a,b,type:'lin'|'exp'}], xMin, xMax, yMin, yMax, bredde, høyde, merkPunkter }
  var W = opts.bredde || 480, H = opts.høyde || 340;
  var pad = { v: 32, h: 44, t: 20, b: 36 };
  var xMin = opts.xMin || 0, xMax = opts.xMax || 80;
  var yMin = opts.yMin || 0, yMax = opts.yMax || 10000;

  // Skalering
  function sx(x) { return pad.h + (x - xMin) / (xMax - xMin) * (W - pad.h - pad.v); }
  function sy(y) { return H - pad.b - (y - yMin) / (yMax - yMin) * (H - pad.t - pad.b); }

  // Pene akse-intervaller
  var xInt = pentIntervall(xMax - xMin, 6);
  var yInt = pentIntervall(yMax - yMin, 5);

  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" '
    + 'style="width:100%;max-width:' + W + 'px;background:#1a1a28;border-radius:10px;display:block">';

  // Rutenett
  svg += '<g stroke="rgba(255,255,255,.07)" stroke-width="0.5">';
  for (var gx = Math.ceil(xMin/xInt)*xInt; gx <= xMax; gx += xInt) {
    var lx = sx(gx);
    svg += '<line x1="' + lx + '" y1="' + pad.t + '" x2="' + lx + '" y2="' + (H-pad.b) + '"/>';
  }
  for (var gy = Math.ceil(yMin/yInt)*yInt; gy <= yMax; gy += yInt) {
    var ly = sy(gy);
    svg += '<line x1="' + pad.h + '" y1="' + ly + '" x2="' + (W-pad.v) + '" y2="' + ly + '"/>';
  }
  svg += '</g>';

  // Akser
  svg += '<line x1="' + pad.h + '" y1="' + pad.t + '" x2="' + pad.h + '" y2="' + (H-pad.b) + '" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>';
  svg += '<line x1="' + pad.h + '" y1="' + (H-pad.b) + '" x2="' + (W-pad.v) + '" y2="' + (H-pad.b) + '" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>';

  // X-akse merker
  svg += '<g fill="rgba(255,255,255,.55)" font-size="10" text-anchor="middle" font-family="JetBrains Mono,monospace">';
  for (var mx = Math.ceil(xMin/xInt)*xInt; mx <= xMax; mx += xInt) {
    var mxp = sx(mx);
    svg += '<text x="' + mxp + '" y="' + (H-pad.b+14) + '">' + mx + '</text>';
    svg += '<line x1="' + mxp + '" y1="' + (H-pad.b-2) + '" x2="' + mxp + '" y2="' + (H-pad.b+2) + '" stroke="rgba(255,255,255,.4)" stroke-width="1"/>';
  }
  svg += '</g>';

  // Y-akse merker
  svg += '<g fill="rgba(255,255,255,.55)" font-size="10" text-anchor="end" font-family="JetBrains Mono,monospace">';
  for (var my = Math.ceil(yMin/yInt)*yInt; my <= yMax; my += yInt) {
    if (my === 0 && yMin === 0) continue;
    var myp = sy(my);
    var myLabel = my >= 1000 ? (my/1000).toFixed(my%1000===0?0:1) + 'k' : String(my);
    svg += '<text x="' + (pad.h-5) + '" y="' + (myp+3) + '">' + myLabel + '</text>';
    svg += '<line x1="' + (pad.h-2) + '" y1="' + myp + '" x2="' + (pad.h+2) + '" y2="' + myp + '" stroke="rgba(255,255,255,.4)" stroke-width="1"/>';
  }
  svg += '</g>';

  // Akse-etiketter
  svg += '<text x="' + (W-pad.v+2) + '" y="' + (H-pad.b+4) + '" fill="rgba(255,255,255,.5)" font-size="11" font-family="JetBrains Mono,monospace">x</text>';
  svg += '<text x="' + (pad.h-2) + '" y="' + (pad.t-4) + '" fill="rgba(255,255,255,.5)" font-size="11" text-anchor="middle" font-family="JetBrains Mono,monospace">y</text>';

  // Funksjoner
  (opts.funksjoner || []).forEach(function(fn, fi) {
    var farge = DIAGRAM_FARGER[fi % DIAGRAM_FARGER.length];

    if (fn.type === 'lin') {
      // Rett linje: finn x-verdier ved yMin og yMax
      var punkter = [];
      for (var px = xMin; px <= xMax; px += (xMax-xMin)/200) {
        var py = fn.a * px + fn.b;
        if (py >= yMin && py <= yMax) punkter.push([sx(px), sy(py)]);
      }
      if (punkter.length > 1) {
        svg += '<polyline points="' + punkter.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ')
          + '" fill="none" stroke="' + farge + '" stroke-width="2.5" stroke-linecap="round"/>';
      }
      // Funksjonsnavn ved høyre kant
      var yVedXMax = fn.a * xMax + fn.b;
      if (yVedXMax >= yMin && yVedXMax <= yMax) {
        svg += '<text x="' + (sx(xMax)-4) + '" y="' + (sy(yVedXMax)-5) + '" fill="' + farge
          + '" font-size="12" text-anchor="end" font-family="sans-serif" font-weight="600">'
          + (fn.navn || DIAGRAM_NAVN[fi]) + '(x)</text>';
      }

    } else if (fn.type === 'exp') {
      var ptExp = [];
      for (var ex = xMin; ex <= xMax; ex += (xMax-xMin)/300) {
        var ey = fn.a * Math.pow(fn.b, ex);
        if (ey >= yMin && ey <= yMax * 1.05) ptExp.push([sx(ex), sy(Math.min(ey, yMax))]);
      }
      if (ptExp.length > 1) {
        svg += '<polyline points="' + ptExp.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ')
          + '" fill="none" stroke="' + farge + '" stroke-width="2.5" stroke-linecap="round"/>';
        svg += '<text x="' + (ptExp[ptExp.length-1][0]-4) + '" y="' + (ptExp[ptExp.length-1][1]-6) + '" fill="' + farge
          + '" font-size="12" text-anchor="end" font-family="sans-serif" font-weight="600">'
          + (fn.navn || DIAGRAM_NAVN[fi]) + '(x)</text>';
      }
    }
  });

  // Merkede punkter
  if (opts.merkPunkter) {
    opts.merkPunkter.forEach(function(pt) {
      var px = sx(pt.x), py = sy(pt.y);
      var farge = pt.farge || 'white';
      svg += '<circle cx="' + px + '" cy="' + py + '" r="5" fill="' + farge + '" stroke="#1a1a28" stroke-width="2"/>';
      if (pt.label) {
        var lx = px + (pt.labelOffset ? pt.labelOffset[0] : 10);
        var ly = py + (pt.labelOffset ? pt.labelOffset[1] : -8);
        svg += '<text x="' + lx + '" y="' + ly + '" fill="' + farge
          + '" font-size="11" font-family="JetBrains Mono,monospace">' + pt.label + '</text>';
      }
    });
  }

  // Leggende
  if (opts.visLegend !== false && (opts.funksjoner||[]).length > 1) {
    var lx = pad.h + 8, ly = pad.t + 10;
    (opts.funksjoner || []).forEach(function(fn, fi) {
      var farge = DIAGRAM_FARGER[fi];
      var navn = fn.navn || DIAGRAM_NAVN[fi];
      svg += '<rect x="' + lx + '" y="' + (ly-8) + '" width="16" height="3" fill="' + farge + '" rx="1"/>';
      svg += '<text x="' + (lx+20) + '" y="' + ly + '" fill="rgba(255,255,255,.75)" font-size="11" font-family="sans-serif">'
        + navn + '(x)</text>';
      ly += 18;
    });
  }

  svg += '</svg>';
  return svg;
}


// ══════════════════════════════════════════════════════════════════
// DIAGRAM-OPPGAVER — 4 typer
// ══════════════════════════════════════════════════════════════════

var DIAGRAM_OPPGAVER = [

// ── DIAG 1: LES AV SKJÆRINGSPUNKT ────────────────────────────────
{
  id: 'diag1', gruppe: 'Diagram', tittel: 'Les av skjæringspunkt',
  merking: 'viktig', poeng: 3, maxPoeng: 3,

  generer: function() {
    // f(x) = a1*x + b1,  g(x) = a2*x + b2
    // Skjæring: a1*x+b1 = a2*x+b2 → x = (b2-b1)/(a1-a2)
    // Velg slik at skjæring er pent heltall mellom 10 og 60
    var skj = rnd(10,60);
    var a1 = rnd(2,8)*10;        // stigningstall f (kr/enhet)
    var b2 = rnd(1,5)*1000;      // konstantledd g
    var a2 = rnd(1, a1/10 - 1)*10;  // a2 < a1 slik at de møtes
    var b1 = 0;
    // skj = (b2-b1)/(a1-a2) → b2 = skj*(a1-a2)
    b2 = skj * (a1 - a2);

    var yVedSkj = a1 * skj + b1;
    var xMax = Math.ceil(skj * 1.6 / 10) * 10;
    var yMax = Math.ceil((a1 * xMax) / 1000) * 1000;

    var kontekster = [
      { fn1: 'Tilbud A', fn2: 'Tilbud B', enhet: 'elever', yEnhet: 'kr' },
      { fn1: 'Plan A',   fn2: 'Plan B',   enhet: 'km',     yEnhet: 'kr' },
      { fn1: 'Senter X', fn2: 'Senter Y', enhet: 'måneder', yEnhet: 'kr' },
      { fn1: 'Leverandør 1', fn2: 'Leverandør 2', enhet: 'kWh', yEnhet: 'kr' },
    ];
    var k = plukk(kontekster);

    return {
      a1:a1, b1:b1, a2:a2, b2:b2, skj:skj, yVedSkj:yVedSkj,
      xMax:xMax, yMax:yMax, k:k,
      svg: lagKoordinatsystem({
        funksjoner: [
          { type:'lin', a:a1, b:b1, navn:k.fn1 },
          { type:'lin', a:a2, b:b2, navn:k.fn2 },
        ],
        xMin:0, xMax:xMax, yMin:0, yMax:yMax,
        merkPunkter: [{x:skj, y:yVedSkj, label:'?', farge:'#e8b84b', labelOffset:[8,-10]}],
      }),
    };
  },

  spørsmål: function(d) {
    return 'Diagrammet viser to pristilbud som funksjon av antall ' + d.k.enhet + '.\n\n'
      + d.k.fn1 + ': f(x) = ' + d.a1 + 'x\n'
      + d.k.fn2 + ': g(x) = ' + d.a2 + 'x + ' + d.b2.toLocaleString('no') + '\n\n'
      + 'a) Les av diagrammet: ved hvor mange ' + d.k.enhet + ' er tilbudene like dyre? (1 poeng)\n\n'
      + 'b) Regn ut og bekreft svaret algebraisk: sett f(x) = g(x). (1 poeng)\n\n'
      + 'c) Hvilket tilbud er billigst for mer enn ' + d.skj + ' ' + d.k.enhet + '? (1 poeng)';
  },

  svarType: 'diag_skj',
  fasit: function(d) { return { skj: d.skj, billigst: d.a2 < d.a1 ? 1 : 0 }; },
  løsning: function(d) {
    return d.a1 + 'x = ' + d.a2 + 'x + ' + d.b2.toLocaleString('no')
      + '\n(' + d.a1 + ' - ' + d.a2 + ')x = ' + d.b2.toLocaleString('no')
      + '\nx = ' + d.b2 + ' / ' + (d.a1-d.a2) + ' = ' + d.skj
      + '\nb) Ved ' + d.skj + ' ' + d.k.enhet + ' er begge ' + d.yVedSkj.toLocaleString('no') + ' kr'
      + '\nc) For x > ' + d.skj + ': ' + (d.a2 < d.a1 ? d.k.fn2 : d.k.fn1) + ' er billigst (lavere stigningstall)';
  },
  hint: [
    'Se der de to grafene krysser hverandre — det er skjæringspunktet.',
    'Les av x-verdien (horisontal akse) ved krysningspunktet.',
    'b) Algebraisk: sett f(x) = g(x) og løs for x.',
    'c) Etter skjæring: den med lavest stigningstall vokser saktere → billigst.',
  ],
},

// ── DIAG 2: TRE TILBUD ────────────────────────────────────────────
{
  id: 'diag2', gruppe: 'Diagram', tittel: 'Sammenlign tre tilbud',
  merking: 'viktig', poeng: 4, maxPoeng: 4,

  generer: function() {
    // Tilbud 1: fast pris per enhet (ingen konstantledd)
    // Tilbud 2: lavere stigningstall + konstantledd
    // Tilbud 3: enda lavere stigning + høyt konstantledd (best ved mange)
    var a1 = rnd(10,20)*10;
    var a2 = rnd(5,9)*10;
    var b2 = rnd(1,4)*1000;
    var a3 = rnd(2,4)*10;
    var b3 = rnd(4,8)*1000;

    // Skjæring 1-2: x12 = b2/(a1-a2)
    var x12 = Math.round(b2 / (a1-a2));
    // Skjæring 2-3: x23 = (b3-b2)/(a2-a3)
    var x23 = Math.round((b3-b2) / (a2-a3));

    var xMax = Math.max(x12, x23) + 20;
    xMax = Math.ceil(xMax / 10) * 10;
    var yMax = Math.ceil(a1 * xMax / 1000) * 1000;

    var kontekster = [
      { t1:'Tilbud 1', t2:'Tilbud 2', t3:'Tilbud 3', enhet:'elever' },
      { t1:'Plan A',   t2:'Plan B',   t3:'Plan C',   enhet:'måneder' },
      { t1:'Alternativ A', t2:'Alternativ B', t3:'Alternativ C', enhet:'km' },
    ];
    var k = plukk(kontekster);

    return {
      a1,b1:0,a2,b2,a3,b3,x12,x23,xMax,yMax,k,
      svg: lagKoordinatsystem({
        funksjoner: [
          { type:'lin', a:a1, b:0,  navn:k.t1 },
          { type:'lin', a:a2, b:b2, navn:k.t2 },
          { type:'lin', a:a3, b:b3, navn:k.t3 },
        ],
        xMin:0, xMax:xMax, yMin:0, yMax:yMax,
        merkPunkter: [
          { x:x12, y:a1*x12, label:'A', farge:'#e8b84b', labelOffset:[6,-10] },
          { x:x23, y:a2*x23+b2, label:'B', farge:'#e8b84b', labelOffset:[6,-10] },
        ],
      }),
    };
  },

  spørsmål: function(d) {
    return 'Diagrammet viser tre tilbud som funksjon av antall ' + d.k.enhet + '.\n\n'
      + 'a) Les av punkt A: ved ca. hvor mange ' + d.k.enhet + ' er ' + d.k.t1 + ' og ' + d.k.t2 + ' like dyre? (1 poeng)\n\n'
      + 'b) Les av punkt B: ved ca. hvor mange ' + d.k.enhet + ' er ' + d.k.t2 + ' og ' + d.k.t3 + ' like dyre? (1 poeng)\n\n'
      + 'c) Hvilket tilbud passer best for ' + Math.round(d.x12/2) + ' ' + d.k.enhet + '? (1 poeng)\n\n'
      + 'd) Hvilket tilbud passer best for ' + (d.x23 + 15) + ' ' + d.k.enhet + '? (1 poeng)';
  },

  svarType: 'diag_tre',
  fasit: function(d) {
    var xLite = Math.round(d.x12/2);
    var xMange = d.x23 + 15;
    // Finn billigste ved xLite og xMange
    function pris(x, a, b) { return a*x+b; }
    var priserLite = [pris(xLite,d.a1,0), pris(xLite,d.a2,d.b2), pris(xLite,d.a3,d.b3)];
    var priserMange = [pris(xMange,d.a1,0), pris(xMange,d.a2,d.b2), pris(xMange,d.a3,d.b3)];
    var billigstLite = priserLite.indexOf(Math.min.apply(null,priserLite)) + 1;
    var billigstMange = priserMange.indexOf(Math.min.apply(null,priserMange)) + 1;
    return { x12: d.x12, x23: d.x23, billigstLite: billigstLite, billigstMange: billigstMange };
  },
  løsning: function(d) {
    var f = this.fasit(d);
    return 'A: skjæring ved x ≈ ' + d.x12 + '\nB: skjæring ved x ≈ ' + d.x23
      + '\nc) Tilbud ' + f.billigstLite + '\nd) Tilbud ' + f.billigstMange;
  },
  hint: [
    'Finn punkt A der to grafer krysser — les av x-aksen.',
    'Finn punkt B der to andre grafer krysser — les av x-aksen.',
    'For få enheter: se hvilken graf er lavest til venstre.',
    'For mange enheter: se hvilken graf er lavest til høyre.',
  ],
},

// ── DIAG 3: LINEÆR VS EKSPONENTIELL ──────────────────────────────
{
  id: 'diag3', gruppe: 'Diagram', tittel: 'Lineær vs eksponentiell',
  merking: '', poeng: 3, maxPoeng: 3,

  generer: function() {
    var a_lin = rnd(200,800);   // stigning lineær
    var b_lin = rnd(500,2000);  // konstantledd lineær
    var a_exp = rnd(500,1500);  // startverdi eksponentiell
    var b_exp = 1 + rnd(3,8)/100; // vekstfaktor 1.03 - 1.08

    // Hvilken er f og hvilken er g? Tilfeldig
    var linErF = Math.random() > 0.5;
    var xMax = 40;
    var yMax = Math.max(a_lin*xMax+b_lin, a_exp*Math.pow(b_exp,xMax)) * 1.05;
    yMax = Math.ceil(yMax / 1000) * 1000;

    // Flervalg-alternativ for "hvilken er eksponentiell"
    var riktig = linErF ? 'g(x) er eksponentiell' : 'f(x) er eksponentiell';
    var alts = [riktig,
      linErF ? 'f(x) er eksponentiell' : 'g(x) er eksponentiell',
      'Begge er eksponentielle',
      'Begge er lineære',
    ];
    alts = bland(alts);
    var riktigIdx = alts.indexOf(riktig);

    return {
      a_lin, b_lin, a_exp, b_exp, linErF, xMax, yMax,
      riktig, alts, riktigIdx,
      svg: lagKoordinatsystem({
        funksjoner: linErF
          ? [ { type:'lin', a:a_lin, b:b_lin, navn:'f' },
              { type:'exp', a:a_exp, b:b_exp, navn:'g' } ]
          : [ { type:'exp', a:a_exp, b:b_exp, navn:'f' },
              { type:'lin', a:a_lin, b:b_lin, navn:'g' } ],
        xMin:0, xMax:xMax, yMin:0, yMax:yMax,
        visLegend: false,
      }),
    };
  },

  spørsmål: function(d) {
    return 'Se på de to grafene f(x) og g(x) i koordinatsystemet.\n\n'
      + 'a) Hvilken av grafene er eksponentiell? (1 poeng)\n\n'
      + 'b) Forklar med egne ord hva som kjennetegner en eksponentiell funksjon grafisk. (1 poeng)\n\n'
      + 'c) Den eksponentielle funksjonen starter på ca. '
      + (d.linErF ? d.a_exp.toLocaleString('no') : d.a_exp.toLocaleString('no'))
      + '. Hva er den omtrentlige vekstfaktoren? (1 poeng)';
  },

  svarType: 'diag_exp',
  fasit: function(d) {
    return { riktigIdx: d.riktigIdx, vekstfaktor: Math.round(d.b_exp*100)/100, alts: d.alts };
  },
  løsning: function(d) {
    return 'Eksponentiell: ' + d.riktig
      + '\nKjennetegn: kurven buer oppover (akselererende vekst) — ikke rett linje'
      + '\nVekstfaktor ≈ ' + Math.round(d.b_exp*100)/100;
  },
  hint: [
    'Lineær funksjon = rett linje. Eksponentiell = kurvet linje som buer oppover.',
    'Den eksponentielle vokser saktere i starten, raskere mot slutten.',
    'Vekstfaktor: les av to nærliggende y-verdier og finn forholdet (y₂/y₁).',
  ],
},

// ── DIAG 4: LES AV STIGNINGSTALL ─────────────────────────────────

      + '\nBetyr: for hver ' + d.k.xNavn.replace(/er$/,'') + ' øker '
      + d.k.yNavn + ' med ' + d.stign;

  hint: [
    'Stigningstall = (y₂ - y₁) / (x₂ - x₁)',
    'Bruk de to merkede punktene.',
    'Positiv verdi = grafen stiger. Høyere tall = brattere.',
  ],
},

// ── DIAG 5: SØYLEDIAGRAM ─────────────────────────────────────────
{
  id: 'diag5', gruppe: 'Diagram', tittel: 'Les av søylediagram',
  merking: 'lavt', poeng: 3, maxPoeng: 3,

  generer: function() {
    var kontekster = [
      { tema:'Antall elever som deltar i ulike fritidsaktiviteter',
        kategorier:['Fotball','Håndball','Svømming','Dans','Ingen'],
        yEtikett:'Antall elever' },
      { tema:'Gjennomsnittlig skjermtid per dag (minutter)',
        kategorier:['8. trinn','9. trinn','10. trinn','Voksen'],
        yEtikett:'Minutter' },
      { tema:'Antall solgte varer per ukedag',
        kategorier:['Man','Tir','Ons','Tor','Fre'],
        yEtikett:'Antall solgt' },
      { tema:'Temperatur (°C) kl. 12 hver dag',
        kategorier:['Man','Tir','Ons','Tor','Fre','Lør','Søn'],
        yEtikett:'Grader (°C)' },
    ];
    var k = plukk(kontekster);
    var n = k.kategorier.length;
    var verdier = [];
    for (var i=0;i<n;i++) verdier.push(rnd(20,90)*5);
    var maks = Math.max.apply(null, verdier);
    var min = Math.min.apply(null, verdier);
    var maksCat = k.kategorier[verdier.indexOf(maks)];
    var minCat  = k.kategorier[verdier.indexOf(min)];
    var sum = verdier.reduce(function(a,b){return a+b;},0);
    var snitt = Math.round(sum/n);

    // SVG søylediagram
    var W=480, H=300, padL=50, padB=36, padT=20, padR=16;
    var grafW = W-padL-padR, grafH = H-padT-padB;
    var yMax = Math.ceil(maks*1.15/50)*50;
    var barW = Math.floor(grafW/n*0.6);
    var barGap = Math.floor(grafW/n);

    function sy(v){ return padT + grafH - (v/yMax)*grafH; }
    function sx(i){ return padL + i*barGap + barGap/2 - barW/2; }

    var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" '
      +'style="width:100%;max-width:'+W+'px;background:#1a1a28;border-radius:10px;display:block">';

    // Y-akse merker
    var yInt = pentIntervall(yMax, 5);
    svg += '<g stroke="rgba(255,255,255,.07)" stroke-width="0.5">';
    for (var gy=0;gy<=yMax;gy+=yInt) {
      var lyy = sy(gy);
      svg += '<line x1="'+padL+'" y1="'+lyy+'" x2="'+(W-padR)+'" y2="'+lyy+'"/>';
    }
    svg += '</g>';
    svg += '<g fill="rgba(255,255,255,.5)" font-size="10" text-anchor="end" font-family="JetBrains Mono,monospace">';
    for (var my2=0;my2<=yMax;my2+=yInt) {
      svg += '<text x="'+(padL-4)+'" y="'+(sy(my2)+3)+'">'
        +(my2>=1000?(my2/1000).toFixed(1)+'k':my2)+'</text>';
    }
    svg += '</g>';

    // Søyler
    var farger = ['#5b8dd9','#e8874b','#5bc98e','#e05c6e','#a78bfa','#e8b84b','#5dcaa5'];
    verdier.forEach(function(v,i) {
      var x=sx(i), y=sy(v), h2=grafH-(y-padT);
      svg += '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+h2+'" fill="'+farger[i%farger.length]+'" rx="3" opacity="0.85"/>';
      svg += '<text x="'+(x+barW/2)+'" y="'+(y-5)+'" fill="'+farger[i%farger.length]+'" font-size="10" text-anchor="middle" font-family="JetBrains Mono,monospace">'+v+'</text>';
    });

    // X-akse etiketter
    svg += '<g fill="rgba(255,255,255,.6)" font-size="10" text-anchor="middle" font-family="sans-serif">';
    k.kategorier.forEach(function(kat,i) {
      svg += '<text x="'+(sx(i)+barW/2)+'" y="'+(H-padB+14)+'">'+kat+'</text>';
    });
    svg += '</g>';

    // Akser
    svg += '<line x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(H-padB)+'" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>';
    svg += '<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>';
    svg += '<text x="'+padL+'" y="'+(padT-5)+'" fill="rgba(255,255,255,.5)" font-size="11" font-family="sans-serif">'+k.yEtikett+'</text>';
    svg += '</svg>';

    return { k, verdier, maks, min, maksCat, minCat, sum, snitt, svg };
  },

  spørsmål: function(d) {
    return d.k.tema+'.\n\n'
      +'a) Hvilken kategori har høyest verdi, og hva er verdien? (1 poeng)\n\n'
      +'b) Hva er differansen mellom høyeste og laveste verdi? (1 poeng)\n\n'
      +'c) Hva er gjennomsnittet? Rund av til nærmeste hele tall. (1 poeng)';
  },
  svarType: 'søyle_abc',
  fasit: function(d) { return { maks:d.maks, diff:d.maks-d.min, snitt:d.snitt }; },
  løsning: function(d) {
    return 'a) '+d.maksCat+': '+d.maks
      +'\nb) '+d.maks+' − '+d.min+' = '+(d.maks-d.min)
      +'\nc) ('+d.verdier.join('+')+') / '+d.verdier.length+' = '+d.snitt;
  },
  hint: ['Les av høyden på søylene.',
    'Differanse = høyeste minus laveste.',
    'Gjennomsnitt = sum av alle / antall kategorier.'],
},

// ── DIAG 6: EKSPONENTIELL AVLESNING ──────────────────────────────
{
  id: 'diag6', gruppe: 'Diagram', tittel: 'Les av eksponentiell vekst',
  merking: 'viktig', poeng: 3, maxPoeng: 3,

  generer: function() {
    var startVerdier = [500,1000,2000,5000,10000];
    var vfAlts = [1.1, 1.15, 1.2, 1.25, 1.3];
    var sv = plukk(startVerdier);
    var vf = plukk(vfAlts);
    var xMax = 10;
    var kontekster = [
      {xNavn:'år', yNavn:'bakterier', intro:'En bakteriekultur vokser eksponentielt.'},
      {xNavn:'år', yNavn:'kr', intro:'En investering vokser med fast prosent per år.'},
      {xNavn:'måneder', yNavn:'brukere', intro:'Antall brukere i en app vokser eksponentielt.'},
    ];
    var k = plukk(kontekster);

    // Finn to merkede punkter
    var x1 = 2, x2 = 5;
    var y1 = Math.round(sv * Math.pow(vf,x1));
    var y2 = Math.round(sv * Math.pow(vf,x2));
    var yMax = Math.ceil(sv*Math.pow(vf,xMax)*1.05/1000)*1000;

    var svg = lagKoordinatsystem({
      funksjoner:[{type:'exp', a:sv, b:vf, navn:'f'}],
      xMin:0, xMax:xMax, yMin:0, yMax:yMax,
      merkPunkter:[
        {x:0,  y:sv, label:'(0, '+sv.toLocaleString('no')+')',  farge:'#5bc98e', labelOffset:[8,-10]},
        {x:x1, y:y1, label:'('+x1+', '+y1.toLocaleString('no')+')', farge:'#5bc98e', labelOffset:[8,14]},
      ],
    });

    // Omtrentlig vekstfaktor fra de to punktene
    var vfBeregnet = Math.round(Math.pow(y1/sv, 1/x1)*100)/100;

    return {k, sv, vf, vfBeregnet, x1, y1, x2, y2, xMax, yMax, svg};
  },

  spørsmål: function(d) {
    return d.k.intro+'\n\nTo punkter er merket på grafen: (0, '+d.sv.toLocaleString('no')+') og ('+d.x1+', '+d.y1.toLocaleString('no')+').\n\n'
      +'a) Hva er startverdien f(0)? (1 poeng)\n\n'
      +'b) Regn ut den omtrentlige vekstfaktoren fra de to punktene. (1 poeng)\n\n'
      +'c) Hva er f('+d.x2+')? Bruk vekstfaktoren du fant. (1 poeng)';
  },
  svarType: 'eksp_avles',
  fasit: function(d) {
    return { sv:d.sv, vf:d.vfBeregnet, y2:Math.round(d.sv*Math.pow(d.vfBeregnet,d.x2)) };
  },
  løsning: function(d) {
    var vf = d.vfBeregnet;
    var y2 = Math.round(d.sv*Math.pow(vf,d.x2));
    return 'a) f(0) = '+d.sv.toLocaleString('no')
      +'\nb) vf = ³√('+d.y1.toLocaleString('no')+'/'+d.sv.toLocaleString('no')+') = '+vf
      +'\nc) f('+d.x2+') = '+d.sv.toLocaleString('no')+' · '+vf+'^'+d.x2+' ≈ '+y2.toLocaleString('no');
  },
  hint: [
    'Startverdi = verdien der x = 0 (der grafen krysser y-aksen).',
    'Vekstfaktor: vf = (y₁/y₀)^(1/x₁)',
    'f(x) = startverdi · vekstfaktor^x',
  ],
},

// ── DIAG 7: LES AV KONSTANTLEDD ──────────────────────────────────
{
  id: 'diag7', gruppe: 'Diagram', tittel: 'Konstantledd og funksjonsutrykk',
  merking: 'viktig', poeng: 3, maxPoeng: 3,

  generer: function() {
    var a = rnd(2,8)*50;
    var b = rnd(1,6)*500;
    var x1 = rnd(2,5), x2 = x1 + rnd(3,6);
    var y1 = a*x1+b, y2 = a*x2+b;
    var xMax = x2+3;
    var yMax = Math.ceil((a*xMax+b)/500+1)*500;

    var kontekster = [
      {xNavn:'km', yNavn:'kr', intro:'En taxa tar en startpris pluss pris per km.'},
      {xNavn:'måneder', yNavn:'kr', intro:'Et treningssenter tar innmeldingsavgift pluss månedspris.'},
      {xNavn:'timer', yNavn:'kr', intro:'En håndverker tar en fastpris pluss timepris.'},
      {xNavn:'enheter', yNavn:'kr', intro:'En produksjonslinje har faste kostnader pluss variabel kostnad.'},
    ];
    var k = plukk(kontekster);

    // Flervalg for funksjonsutrykk
    var riktigFn = 'f(x) = '+a+'x + '+b;
    var feilAlts = [
      'f(x) = '+a+'x',
      'f(x) = '+(a+50)+'x + '+b,
      'f(x) = '+a+'x + '+(b+500),
    ];
    feilAlts = bland(feilAlts).slice(0,3);
    var alts = bland([riktigFn].concat(feilAlts));
    var riktigIdx = alts.indexOf(riktigFn);

    var svg = lagKoordinatsystem({
      funksjoner:[{type:'lin', a:a, b:b, navn:'f'}],
      xMin:0, xMax:xMax, yMin:0, yMax:yMax,
      merkPunkter:[
        {x:0,  y:b,  label:'(0, '+b+')',  farge:'#e8b84b', labelOffset:[8,-10]},
        {x:x1, y:y1, label:'('+x1+', '+y1+')', farge:'#5bc98e', labelOffset:[8,14]},
        {x:x2, y:y2, label:'('+x2+', '+y2+')', farge:'#5bc98e', labelOffset:[8,-10]},
      ],
    });

    return {k, a, b, x1, y1, x2, y2, alts, riktigIdx, svg};
  },

  spørsmål: function(d) {
    return d.k.intro+'\n\nGrafen viser prisen som funksjon av antall '+d.k.xNavn+'.\n'
      +'Tre punkter er merket: (0, '+d.b+'), ('+d.x1+', '+d.y1+') og ('+d.x2+', '+d.y2+').\n\n'
      +'a) Hva er konstantleddet (startprisen)? (1 poeng)\n\n'
      +'b) Regn ut stigningstallet. (1 poeng)\n\n'
      +'c) Velg riktig funksjonsuttrykk. (1 poeng)';
  },
  svarType: 'kl_abc',
  fasit: function(d) { return {b:d.b, a:d.a, riktigIdx:d.riktigIdx, alts:d.alts}; },
  løsning: function(d) {
    return 'a) Konstantledd = '+d.b+' (y-verdi når x = 0)'
      +'\nb) a = ('+d.y2+' − '+d.y1+') / ('+d.x2+' − '+d.x1+') = '+(d.y2-d.y1)+'/'+(d.x2-d.x1)+' = '+d.a
      +'\nc) '+d.alts[d.riktigIdx];
  },
  hint: [
    'Konstantledd = der grafen krysser y-aksen (x = 0).',
    'Stigningstall = (y₂ − y₁) / (x₂ − x₁)',
    'Funksjonsuttrykk: f(x) = stigningstall · x + konstantledd',
  ],
},

// ── DIAG 8: PROPORSJONALITET ──────────────────────────────────────

// ── DIAG 11: ABSOLUTT OG RELATIV ENDRING ─────────────────────────
{
  id: 'diag11', gruppe: 'Diagram', tittel: 'Absolutt og relativ endring',
  merking: 'viktig', poeng: 3, maxPoeng: 3,

  generer: function() {
    var kontekster = [
      { tema:'Antall turister (i tusen)', xNavn:'år', yNavn:'turister (tusen)' },
      { tema:'Omsetning i en butikk (kr)', xNavn:'år', yNavn:'kr' },
      { tema:'Antall abonnenter', xNavn:'kvartal', yNavn:'abonnenter' },
      { tema:'Strømforbruk (kWh)', xNavn:'måned', yNavn:'kWh' },
    ];
    var k = plukk(kontekster);
    var x1 = rnd(2,4), x2 = x1 + rnd(3,6);
    var y1 = rnd(4,12)*500;
    var endr = rnd(1,5)*100 * (Math.random()>0.3?1:-1);
    var y2 = y1 + endr;
    if (y2 < 200) { endr = Math.abs(endr); y2 = y1 + endr; }
    var xMax = x2 + 2;
    var yMin = 0;
    var yMax = Math.ceil(Math.max(y1,y2)*1.3/500)*500;
    var abs_endr = y2 - y1;
    var rel_endr = Math.round(abs_endr/y1*1000)/10; // én desimal

    var svg = lagKoordinatsystem({
      funksjoner: [{ type:'lin', a:(y2-y1)/(x2-x1), b:y1-(y2-y1)/(x2-x1)*x1, navn:'f' }],
      xMin:0, xMax:xMax, yMin:0, yMax:yMax,
      merkPunkter: [
        { x:x1, y:y1, label:'('+x1+', '+y1+')', farge:'#5b8dd9', labelOffset:[8,-12] },
        { x:x2, y:y2, label:'('+x2+', '+y2+')', farge:'#e8874b', labelOffset:[8,14] },
      ],
    });
    return { k, x1, y1, x2, y2, abs_endr, rel_endr, xMax, yMax, svg };
  },

  spørsmål: function(d) {
    return d.k.tema+' er avlest i to punkter på grafen:\n'
      +'('+d.x1+', '+d.y1+') og ('+d.x2+', '+d.y2+').\n\n'
      +'a) Hva er den absolutte endringen fra '+d.x1+' til '+d.x2+'? (1 poeng)\n\n'
      +'b) Hva er den relative endringen i prosent? Én desimal. (1 poeng)\n\n'
      +'c) Er endringen en økning eller nedgang? (1 poeng)';
  },
  svarType: 'endr_abc',
  fasit: function(d) {
    return { abs: d.abs_endr, rel: d.rel_endr, retning: d.abs_endr >= 0 ? 0 : 1 };
  },
  løsning: function(d) {
    return 'a) Absolutt endring: '+d.y2+' − '+d.y1+' = '+d.abs_endr
      +'\nb) Relativ endring: '+d.abs_endr+' / '+d.y1+' × 100 = '+d.rel_endr+' %'
      +'\nc) '+(d.abs_endr>=0?'Økning':'Nedgang');
  },
  hint: [
    'Absolutt endring = y₂ − y₁ (bare differansen).',
    'Relativ endring = (y₂ − y₁) / y₁ × 100 %',
    'Positivt tall = økning. Negativt = nedgang.',
  ],
},

// ── DIAG 12: SEKTORDIAGRAM ────────────────────────────────────────
{
  id: 'diag12', gruppe: 'Diagram', tittel: 'Les av sektordiagram',
  merking: 'lavt', poeng: 3, maxPoeng: 3,

  generer: function() {
    var kontekster = [
      { tema:'Transportmidler til skolen',
        kategorier:['Sykkel','Buss','Gange','Bil','Annet'] },
      { tema:'Favorittfag',
        kategorier:['Matematikk','Norsk','Naturfag','Engelsk','Gym'] },
      { tema:'Bruk av fritid',
        kategorier:['Skjerm','Sport','Venner','Lekser','Annet'] },
      { tema:'Energikilder i Norge',
        kategorier:['Vannkraft','Vindkraft','Solenergi','Gass','Annet'] },
    ];
    var k = plukk(kontekster);
    var n = k.kategorier.length;

    // Generer prosentandeler som summerer til 100
    var deler = [];
    var rest = 100;
    for (var i=0;i<n-1;i++) {
      var max_del = rest - (n-1-i)*5;
      var del = rnd(10, Math.min(45, max_del));
      deler.push(del);
      rest -= del;
    }
    deler.push(rest);
    // Bland litt
    deler = bland(deler);

    var maks = Math.max.apply(null, deler);
    var min  = Math.min.apply(null, deler);
    var maksCat = k.kategorier[deler.indexOf(maks)];
    var minCat  = k.kategorier[deler.indexOf(min)];

    // SVG sektordiagram
    var W=380, H=300, cx=160, cy=150, r=110;
    var farger=['#5b8dd9','#e8874b','#5bc98e','#e05c6e','#a78bfa','#e8b84b'];
    var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" '
      +'style="width:100%;max-width:'+W+'px;background:#1a1a28;border-radius:10px;display:block">';

    var startVinkel = -Math.PI/2;
    deler.forEach(function(del,i) {
      var vinkel = del/100 * 2*Math.PI;
      var sluttVinkel = startVinkel + vinkel;
      var x1s = cx + r*Math.cos(startVinkel);
      var y1s = cy + r*Math.sin(startVinkel);
      var x2s = cx + r*Math.cos(sluttVinkel);
      var y2s = cy + r*Math.sin(sluttVinkel);
      var storBue = vinkel > Math.PI ? 1 : 0;
      svg += '<path d="M'+cx+','+cy+' L'+x1s.toFixed(1)+','+y1s.toFixed(1)
        +' A'+r+','+r+' 0 '+storBue+',1 '+x2s.toFixed(1)+','+y2s.toFixed(1)+' Z" '
        +'fill="'+farger[i]+'" stroke="#1a1a28" stroke-width="2" opacity="0.88"/>';
      // Prosentlabel midt i sektoren
      var midVinkel = startVinkel + vinkel/2;
      var labelR = r*0.65;
      var lx = cx + labelR*Math.cos(midVinkel);
      var ly = cy + labelR*Math.sin(midVinkel);
      if (del >= 10) {
        svg += '<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" fill="white" '
          +'font-size="12" text-anchor="middle" font-family="JetBrains Mono,monospace" font-weight="600">'+del+'%</text>';
      }
      startVinkel = sluttVinkel;
    });

    // Leggende
    var lx = cx + r + 14, ly = 60;
    deler.forEach(function(del,i) {
      svg += '<rect x="'+lx+'" y="'+(ly-10)+'" width="12" height="12" fill="'+farger[i]+'" rx="2"/>';
      svg += '<text x="'+(lx+16)+'" y="'+ly+'" fill="rgba(255,255,255,.75)" font-size="11" font-family="sans-serif">'
        +k.kategorier[i]+'</text>';
      ly += 18;
    });
    svg += '</svg>';

    return { k, deler, maks, min, maksCat, minCat, svg };
  },

  spørsmål: function(d) {
    return d.k.tema+' — sektordiagrammet viser fordelingen i prosent.\n\n'
      +'a) Hvilken kategori er størst, og hva er andelen? (1 poeng)\n\n'
      +'b) Hva er differansen mellom størst og minst andel? (1 poeng)\n\n'
      +'c) Kategoriene «'+d.k.kategorier[0]+'» og «'+d.k.kategorier[1]+'» til sammen — hva er den samlede andelen? (1 poeng)';
  },
  svarType: 'sektor_abc',
  fasit: function(d) {
    return { maks:d.maks, diff:d.maks-d.min, sum01:d.deler[0]+d.deler[1] };
  },
  løsning: function(d) {
    return 'a) '+d.maksCat+': '+d.maks+'%'
      +'\nb) '+d.maks+' − '+d.min+' = '+(d.maks-d.min)+' prosentpoeng'
      +'\nc) '+d.deler[0]+' + '+d.deler[1]+' = '+(d.deler[0]+d.deler[1])+'%';
  },
  hint: [
    'Les prosentandelen direkte fra sektoren.',
    'Differanse = størst % minus minst %.',
    'Legg bare sammen de to angitte sektorene.',
  ],
},

// ── DIAG 13: DOBBELT LINJEDIAGRAM ────────────────────────────────
{
  id: 'diag13', gruppe: 'Diagram', tittel: 'Dobbelt linjediagram',
  merking: 'viktig', poeng: 4, maxPoeng: 4,

  generer: function() {
    var kontekster = [
      { tema:'Temperatur (°C) i to byer over måneder',
        xNavn:'Måned', yNavn:'°C', kurve1:'By A', kurve2:'By B',
        xLabels:['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'] },
      { tema:'Ukentlig trening (timer) for to elever over uker',
        xNavn:'Uke', yNavn:'Timer', kurve1:'Elev A', kurve2:'Elev B',
        xLabels:['1','2','3','4','5','6','7','8'] },
      { tema:'Salg (enheter) for to produkter',
        xNavn:'Kvartal', yNavn:'Enheter', kurve1:'Produkt 1', kurve2:'Produkt 2',
        xLabels:['K1','K2','K3','K4'] },
    ];
    var k = plukk(kontekster);
    var n = k.xLabels.length;
    var v1=[], v2=[];
    for (var i=0;i<n;i++) {
      v1.push(rnd(5,40)*5);
      v2.push(rnd(5,40)*5);
    }

    // Finn maks, min, skjæring (omtrentlig)
    var maks1=Math.max.apply(null,v1), maks2=Math.max.apply(null,v2);
    var yMax=Math.ceil(Math.max(maks1,maks2)*1.2/20)*20;

    // Finn om kurvene krysser
    var krysser=false, kryssIdx=-1;
    for (var j=0;j<n-1;j++) {
      if ((v1[j]-v2[j])*(v1[j+1]-v2[j+1])<0) { krysser=true; kryssIdx=j; break; }
    }

    // SVG — diskret linjediagram
    var W=480, H=300, padL=46, padB=40, padT=20, padR=16;
    var grafW=W-padL-padR, grafH=H-padT-padB;
    var xStep=grafW/(n-1);
    function sy(v){ return padT+grafH-(v/yMax)*grafH; }
    function sxi(i){ return padL+i*xStep; }

    var yInt=pentIntervall(yMax,5);
    var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" '
      +'style="width:100%;max-width:'+W+'px;background:#1a1a28;border-radius:10px;display:block">';

    // Rutenett
    svg+='<g stroke="rgba(255,255,255,.07)" stroke-width="0.5">';
    for (var gy=0;gy<=yMax;gy+=yInt) svg+='<line x1="'+padL+'" y1="'+sy(gy)+'" x2="'+(W-padR)+'" y2="'+sy(gy)+'"/>';
    svg+='</g>';

    // Y-akse
    svg+='<g fill="rgba(255,255,255,.5)" font-size="10" text-anchor="end" font-family="JetBrains Mono,monospace">';
    for (var my=0;my<=yMax;my+=yInt)
      svg+='<text x="'+(padL-4)+'" y="'+(sy(my)+3)+'">'+my+'</text>';
    svg+='</g>';

    // X-labels
    svg+='<g fill="rgba(255,255,255,.55)" font-size="10" text-anchor="middle" font-family="sans-serif">';
    k.xLabels.forEach(function(lab,i){ svg+='<text x="'+sxi(i)+'" y="'+(H-padB+14)+'">'+lab+'</text>'; });
    svg+='</g>';

    // Akser
    svg+='<line x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(H-padB)+'" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>';
    svg+='<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>';

    // Linjer
    [[v1,'#5b8dd9',k.kurve1],[v2,'#e8874b',k.kurve2]].forEach(function(linje){
      var pts=linje[0].map(function(v,i){return sxi(i).toFixed(1)+','+sy(v).toFixed(1);}).join(' ');
      svg+='<polyline points="'+pts+'" fill="none" stroke="'+linje[1]+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
      linje[0].forEach(function(v,i){
        svg+='<circle cx="'+sxi(i)+'" cy="'+sy(v)+'" r="3.5" fill="'+linje[1]+'" stroke="#1a1a28" stroke-width="1.5"/>';
      });
    });

    // Leggende
    [[k.kurve1,'#5b8dd9'],[k.kurve2,'#e8874b']].forEach(function(l,i){
      var lx2=padL+8+i*110;
      svg+='<rect x="'+lx2+'" y="'+(padT+2)+'" width="16" height="3" fill="'+l[1]+'" rx="1"/>';
      svg+='<text x="'+(lx2+20)+'" y="'+(padT+8)+'" fill="rgba(255,255,255,.8)" font-size="11" font-family="sans-serif">'+l[0]+'</text>';
    });

    svg+='</svg>';

    // Spørsmål-data: maks i begge, hvilken er høyest totalt, krysser de?
    var sumA=v1.reduce(function(a,b){return a+b;},0);
    var sumB=v2.reduce(function(a,b){return a+b;},0);
    var høyestTotalt = sumA>sumB?0:1; // 0=kurve1, 1=kurve2

    var idxMaks1=v1.indexOf(maks1), idxMaks2=v2.indexOf(maks2);

    return { k, n, v1, v2, maks1, maks2, idxMaks1, idxMaks2,
             yMax, krysser, kryssIdx, høyestTotalt, sumA, sumB, svg };
  },

  spørsmål: function(d) {
    return d.k.tema+'.\n\n'
      +'a) Hva er høyeste verdi for '+d.k.kurve1+', og ved hvilken '+d.k.xNavn.toLowerCase()+'? (1 poeng)\n\n'
      +'b) Hva er høyeste verdi for '+d.k.kurve2+', og ved hvilken '+d.k.xNavn.toLowerCase()+'? (1 poeng)\n\n'
      +'c) Hvilken kurve har høyest samlet sum? (1 poeng)\n\n'
      +'d) Krysser de to kurvene hverandre? (1 poeng)';
  },
  svarType: 'dobbel_abcd',
  fasit: function(d) {
    return {

// ── DIAG 14: TABELL → LINEÆR ELLER EKSPONENTIELL ─────────────────
{
  id: 'diag14', gruppe: 'Diagram', tittel: 'Tabell: lineær eller eksponentiell?',
  merking: 'viktig', poeng: 4, maxPoeng: 4,

  generer: function() {
    var erLin = Math.random() > 0.5;
    var xVerdier = [0,1,2,3,4,5];
    var a, b, yVerdier, formel;

    if (erLin) {
      a = rnd(3,9)*10;
      b = rnd(2,8)*100;
      yVerdier = xVerdier.map(function(x){ return a*x+b; });
      formel = 'f(x) = '+a+'x + '+b;
    } else {
      b = rnd(3,8)*100;
      var vf = 1 + rnd(2,5)*0.1;  // 1.2 – 1.5
      yVerdier = xVerdier.map(function(x){ return Math.round(b*Math.pow(vf,x)); });
      formel = 'f(x) = '+b+' · '+vf+'^x';
      a = vf; // brukt som vf
    }

    // Kontekster
    var kontekster = [
      { xNavn:'År', yNavn:'Verdi (kr)', tema:'vekst over tid' },
      { xNavn:'Dag', yNavn:'Antall', tema:'utvikling' },
      { xNavn:'Uke', yNavn:'Brukere', tema:'brukervekst' },
    ];
    var k = plukk(kontekster);

    // Tabell HTML (lages som SVG-lignende display)
    var W=480, H=120;
    var colW = Math.floor((W-40)/xVerdier.length);
    var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" '
      +'style="width:100%;max-width:'+W+'px;background:#1a1a28;border-radius:10px;display:block">';
    // Header
    svg+='<rect x="20" y="15" width="'+colW+'" height="32" fill="rgba(255,255,255,.06)" rx="4"/>';
    svg+='<text x="'+(20+colW/2)+'" y="36" fill="rgba(255,255,255,.7)" font-size="12" text-anchor="middle" font-family="sans-serif">'+k.xNavn+'</text>';
    svg+='<rect x="20" y="52" width="'+colW+'" height="32" fill="rgba(91,141,217,.1)" rx="4"/>';
    svg+='<text x="'+(20+colW/2)+'" y="73" fill="rgba(91,141,217,.9)" font-size="12" text-anchor="middle" font-family="sans-serif">'+k.yNavn+'</text>';
    xVerdier.forEach(function(x,i) {
      var cx2=20+(i+1)*colW;
      svg+='<rect x="'+cx2+'" y="15" width="'+colW+'" height="32" fill="rgba(255,255,255,.03)" rx="4"/>';
      svg+='<text x="'+(cx2+colW/2)+'" y="36" fill="rgba(255,255,255,.85)" font-size="13" text-anchor="middle" font-family="JetBrains Mono,monospace">'+x+'</text>';
      svg+='<rect x="'+cx2+'" y="52" width="'+colW+'" height="32" fill="rgba(91,141,217,.06)" rx="4"/>';
      svg+='<text x="'+(cx2+colW/2)+'" y="73" fill="#5b8dd9" font-size="12" text-anchor="middle" font-family="JetBrains Mono,monospace">'+yVerdier[i].toLocaleString('no')+'</text>';
    });
    // Differanse-rad
    var differanser=[];
    for(var di=1;di<yVerdier.length;di++) differanser.push(yVerdier[di]-yVerdier[di-1]);
    var forholdstall=[];
    for(var fi=1;fi<yVerdier.length;fi++) forholdstall.push(Math.round(yVerdier[fi]/yVerdier[fi-1]*100)/100);
    var diff_lik = differanser.every(function(d){ return d===differanser[0]; });
    var forh_lik = forholdstall.every(function(f){ return Math.abs(f-forholdstall[0])<0.01; });
    svg+='<text x="25" y="105" fill="rgba(255,255,255,.35)" font-size="10" font-family="sans-serif">Δy:</text>';
    differanser.forEach(function(d,i){
      svg+='<text x="'+(20+(i+1.5)*colW)+'" y="105" fill="rgba(255,255,255,.35)" font-size="10" text-anchor="middle" font-family="JetBrains Mono,monospace">'+d+'</text>';
    });
    svg+='</svg>';

    // Flervalg for type
    var riktigType = erLin ? 'Lineær' : 'Eksponentiell';
    var typeAlts = ['Lineær','Eksponentiell'];
    var riktigTypeIdx = typeAlts.indexOf(riktigType);

    // Beregn neste verdi (x=6)
    var nesteX = 6;
    var nesteY = erLin ? a*nesteX+b : Math.round(b*Math.pow(a,nesteX));

    return { k, erLin, xVerdier, yVerdier, differanser, forholdstall,
             diff_lik, forh_lik, formel, a, b, riktigType, typeAlts,
             riktigTypeIdx, nesteX, nesteY, svg };
  },

  spørsmål: function(d) {
    return 'Tabellen viser '+d.k.tema+' over '+d.k.xNavn.toLowerCase()+' 0–5.\n\n'
      +'a) Beregn differansen mellom påfølgende y-verdier (Δy). Er de like? (1 poeng)\n\n'
      +'b) Er funksjonen lineær eller eksponentiell? Begrunn med tallene fra tabellen. (1 poeng)\n\n'
      +'c) Hva er '+(d.erLin?'stigningstallet':'vekstfaktoren')+'? (1 poeng)\n\n'
      +'d) Hva er neste verdi (ved '+d.k.xNavn.toLowerCase()+' = '+d.nesteX+')? (1 poeng)';
  },
  svarType: 'tabell_abcd',
  fasit: function(d) {
    return {
      diff_lik: d.diff_lik, riktigTypeIdx: d.riktigTypeIdx,
      typeAlts: d.typeAlts,
      parameter: d.erLin ? d.a : Math.round(d.forholdstall[0]*100)/100,
      nesteY: d.nesteY,
    };
  },
  løsning: function(d) {
    var f=this.fasit(d);
    return 'a) Δy: '+d.differanser.join(', ')+(d.diff_lik?' (like — lineær!!)':' (ikke like)')
      +'\nb) '+d.riktigType+(d.erLin
        ?' — like differanser → lineær'
        :' — fast forholdstall '+Math.round(d.forholdstall[0]*100)/100+' → eksponentiell')
      +'\nc) '+(d.erLin?'Stigningstall = '+d.a:'Vekstfaktor = '+Math.round(d.forholdstall[0]*100)/100)
      +'\nd) f('+d.nesteX+') = '+d.nesteY.toLocaleString('no');
  },
  hint: [
    'd) Beregn y₂ − y₁, y₃ − y₂ osv. — er de like? Da er det lineært.',
    'Eksponentiell: sjekk forholdstallet y₂/y₁, y₃/y₂ — er de like?',
    'Lineær: neste verdi = forrige + Δy. Eksponentiell: neste = forrige × vekstfaktor.',
  ],
},

      +'<button class="fv-alt'+(state.flervalgValg[o.id]===0?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'" data-idx="0" onclick="velgFV(this)">Økning</button>'
      +'<button class="fv-alt'+(state.flervalgValg[o.id]===1?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'" data-idx="1" onclick="velgFV(this)">Nedgang</button>'
      +'</div></div>';
  }
  if (o.svarType === 'sektor_abc') {
    return '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'
      +'<div class="svar-seksjon"><div class="svar-label">a) Størst andel (%):</div>'
      +'<input class="svar-input" id="svar-maks" type="number" step="1" placeholder="0"'+(låst?' readonly':'')+' style="max-width:100px"></div>'
      +'<div class="svar-seksjon"><div class="svar-label">b) Differanse (pp):</div>'
      +'<input class="svar-input" id="svar-diff" type="number" step="1" placeholder="0"'+(låst?' readonly':'')+' style="max-width:100px"></div>'
      +'<div class="svar-seksjon"><div class="svar-label">c) Sum to første (%):</div>'
      +'<input class="svar-input" id="svar-sum01" type="number" step="1" placeholder="0"'+(låst?' readonly':'')+' style="max-width:100px"></div>'
      +'</div>';
  }
  if (o.svarType === 'dobbel_abcd') {
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'
      +'<div class="svar-seksjon"><div class="svar-label">a) Maks '+d.k.kurve1+' (verdi):</div>'
      +'<input class="svar-input" id="svar-maks1" type="number" step="1" placeholder="0"'+(låst?' readonly':'')+'></div>'
      +'<div class="svar-seksjon"><div class="svar-label">a) ...ved '+d.k.xNavn+' nr:</div>'
      +'<input class="svar-input" id="svar-idx1" type="number" step="1" placeholder="0"'+(låst?' readonly':'')+'></div>'
      +'<div class="svar-seksjon"><div class="svar-label">b) Maks '+d.k.kurve2+' (verdi):</div>'
      +'<input class="svar-input" id="svar-maks2" type="number" step="1" placeholder="0"'+(låst?' readonly':'')+'></div>'
      +'<div class="svar-seksjon"><div class="svar-label">b) ...ved '+d.k.xNavn+' nr:</div>'
      +'<input class="svar-input" id="svar-idx2" type="number" step="1" placeholder="0"'+(låst?' readonly':'')+'></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      +'<div class="svar-seksjon"><div class="svar-label">c) Høyest samlet:</div>'
      +'<div class="fv-grid">'
      +'<button class="fv-alt'+(state.flervalgValg[o.id+'_c']===0?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'_c" data-idx="0" onclick="velgFV(this)">'+d.k.kurve1+'</button>'
      +'<button class="fv-alt'+(state.flervalgValg[o.id+'_c']===1?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'_c" data-idx="1" onclick="velgFV(this)">'+d.k.kurve2+'</button>'
      +'</div></div>'
      +'<div class="svar-seksjon"><div class="svar-label">d) Krysser kurvene?</div>'
      +'<div class="fv-grid">'
      +'<button class="fv-alt'+(state.flervalgValg[o.id+'_d']===0?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'_d" data-idx="0" onclick="velgFV(this)">Ja</button>'
      +'<button class="fv-alt'+(state.flervalgValg[o.id+'_d']===1?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'_d" data-idx="1" onclick="velgFV(this)">Nei</button>'
      +'</div></div></div>';
  }
  if (o.svarType === 'tabell_abcd') {
    var ft=o.fasit(d);
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'
      +'<div class="svar-seksjon"><div class="svar-label">a) Er differansene like?</div>'
      +'<div class="fv-grid">'
      +'<button class="fv-alt'+(state.flervalgValg[o.id+'_a']===0?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'_a" data-idx="0" onclick="velgFV(this)">Ja, like</button>'
      +'<button class="fv-alt'+(state.flervalgValg[o.id+'_a']===1?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'_a" data-idx="1" onclick="velgFV(this)">Nei, ulike</button>'
      +'</div></div>'
      +'<div class="svar-seksjon"><div class="svar-label">b) Funksjontype:</div>'
      +'<div class="fv-grid">'
      +'<button class="fv-alt'+(state.flervalgValg[o.id]===0?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'" data-idx="0" onclick="velgFV(this)">Lineær</button>'
      +'<button class="fv-alt'+(state.flervalgValg[o.id]===1?' fv-valgt':'')+'"'+(låst?' disabled':'')+' data-oppg="'+o.id+'" data-idx="1" onclick="velgFV(this)">Eksponentiell</button>'
      +'</div></div>'
      +'<div class="svar-seksjon"><div class="svar-label">c) '+(d.erLin?'Stigningstall':'Vekstfaktor')+':</div>'
      +'<input class="svar-input" id="svar-param" type="number" step="0.01" placeholder="0"'+(låst?' readonly':'')+'></div>'
      +'<div class="svar-seksjon"><div class="svar-label">d) f('+d.nesteX+'):</div>'
      +'<input class="svar-input" id="svar-neste" type="number" step="1" placeholder="0"'+(låst?' readonly':'')+'></div>'
      +'</div>';
  }
  return '';
}

function velgFV(btn) {
  var oppg = btn.dataset.oppg;
  var idx = parseInt(btn.dataset.idx);
  state.flervalgValg[oppg] = idx;
  document.querySelectorAll('.fv-alt[data-oppg="'+oppg+'"]').forEach(function(b,i) {
    b.className = 'fv-alt' + (i===idx?' fv-valgt':'');
  });
}

function sjekkSvar() {
  var id = state.gjeldende;
  var o = DIAGRAM_OPPGAVER.find(function(x){return x.id===id;});
  var d = state.data[id];
  var f = o.fasit(d);
  var poeng = 0, max = o.maxPoeng, fb = '', status = 'feil';

  function hentTall(elId) {
    var el = document.getElementById(elId);
    return el ? parseFloat(el.value.replace(',','.')) : NaN;
  }
  function tol(v, fasit, t) { return !isNaN(v) && Math.abs(v-fasit) <= (t||2); }

  if (o.svarType === 'diag_skj') {
    var okA = tol(hentTall('svar-skj'), f.skj, 3);
    var okC = state.flervalgValg[id] === f.billigst;
    document.querySelectorAll('.fv-alt[data-oppg="'+id+'"]').forEach(function(b,i){
      b.className='fv-alt '+(i===f.billigst?'fv-riktig':(i===state.flervalgValg[id]?'fv-galt':''));
    });
    var elA = document.getElementById('svar-skj');
    if (elA) elA.className='svar-input '+(okA?'riktig':'galt');
    poeng = (okA?2:0)+(okC?1:0);
    fb = 'a) '+(okA?'✓ Skjæring ved x='+f.skj:'Fasit: x = '+f.skj)+' · c) '+(okC?'✓ Riktig!':'Se fasit nedenfor');

  } else if (o.svarType === 'diag_tre') {
    var okA2 = tol(hentTall('svar-a'), f.x12, 5);
    var okB2 = tol(hentTall('svar-b'), f.x23, 5);
    var okC2 = state.flervalgValg[id+'_c'] === f.billigstLite-1;
    var okD2 = state.flervalgValg[id+'_d'] === f.billigstMange-1;
    ['c','d'].forEach(function(del) {
      var fv = del==='c'?f.billigstLite-1:f.billigstMange-1;
      document.querySelectorAll('.fv-alt[data-oppg="'+id+'_'+del+'"]').forEach(function(b,i){
        b.className='fv-alt '+(i===fv?'fv-riktig':(i===state.flervalgValg[id+'_'+del]?'fv-galt':''));
      });
    });
    ['svar-a','svar-b'].forEach(function(el,i){
      var e=document.getElementById(el);
      if(e) e.className='svar-input '+(i===0?okA2:okB2?'riktig':'galt');
    });
    poeng=(okA2?1:0)+(okB2?1:0)+(okC2?1:0)+(okD2?1:0);
    fb='a) '+(okA2?'✓':'Fasit: '+f.x12)+' · b) '+(okB2?'✓':'Fasit: '+f.x23)
      +' · c) '+(okC2?'✓':'Tilbud '+f.billigstLite)+' · d) '+(okD2?'✓':'Tilbud '+f.billigstMange);

  } else if (o.svarType === 'diag_exp') {
    var okFV = state.flervalgValg[id] === f.riktigIdx;
    document.querySelectorAll('.fv-alt[data-oppg="'+id+'"]').forEach(function(b,i){
      b.className='fv-alt '+(i===f.riktigIdx?'fv-riktig':(i===state.flervalgValg[id]?'fv-galt':''));
    });
    var bTekst = (document.getElementById('svar-b-tekst')||{value:''}).value.trim();
    var okB3 = bTekst.length > 8;
    var vfVal = hentTall('svar-vf');
    var okC3 = tol(vfVal, f.vekstfaktor, 0.05);
    poeng=(okFV?1:0)+(okB3?1:0)+(okC3?1:0);
    fb='a) '+(okFV?'✓ '+f.alts[f.riktigIdx]:'Fasit: '+f.alts[f.riktigIdx])+'\nb) '+(okB3?'✓':'Skriv: «Kurven buer oppover, veksten akselererer»')+'\nc) '+(okC3?'✓ Vekstfaktor ≈ '+f.vekstfaktor:'Fasit: ≈ '+f.vekstfaktor);

  } else if (o.svarType === 'søyle_abc') {
    var f5=o.fasit(d);
    var okA=tol(hentTall('svar-maks'),f5.maks,0);
    var okB=tol(hentTall('svar-diff'),f5.diff,0);
    var okC=tol(hentTall('svar-snitt'),f5.snitt,1);
    ['svar-maks','svar-diff','svar-snitt'].forEach(function(id2,i){
      var el=document.getElementById(id2); if(el) el.className='svar-input '+([okA,okB,okC][i]?'riktig':'galt');
    });
    poeng=(okA?1:0)+(okB?1:0)+(okC?1:0);
    fb='a) '+(okA?'✓':f5.maks)+' · b) '+(okB?'✓':f5.diff)+' · c) '+(okC?'✓':f5.snitt);

  } else if (o.svarType === 'eksp_avles') {
    var f6=o.fasit(d);
    var okA6=tol(hentTall('svar-sv'),f6.sv,0);
    var okB6=tol(hentTall('svar-vf'),f6.vf,0.03);
    var okC6=tol(hentTall('svar-y2'),f6.y2,f6.y2*0.05);
    ['svar-sv','svar-vf','svar-y2'].forEach(function(id2,i){
      var el=document.getElementById(id2); if(el) el.className='svar-input '+([okA6,okB6,okC6][i]?'riktig':'galt');
    });
    poeng=(okA6?1:0)+(okB6?1:0)+(okC6?1:0);
    fb='a) '+(okA6?'✓':'Fasit: '+f6.sv.toLocaleString('no'))+' · b) '+(okB6?'✓':'Fasit: '+f6.vf)+' · c) '+(okC6?'✓':'Fasit: '+f6.y2.toLocaleString('no'));

  } else if (o.svarType === 'kl_abc') {
    var f7=o.fasit(d);
    var okA7=tol(hentTall('svar-b'),f7.b,0);
    var okB7=tol(hentTall('svar-a'),f7.a,0);
    var okC7=state.flervalgValg[o.id]===f7.riktigIdx;
    document.querySelectorAll('.fv-alt[data-oppg="'+id+'"]').forEach(function(btn,i){
      btn.className='fv-alt '+(i===f7.riktigIdx?'fv-riktig':(i===state.flervalgValg[id]?'fv-galt':''));
    });
    ['svar-b','svar-a'].forEach(function(id2,i){
      var el=document.getElementById(id2); if(el) el.className='svar-input '+([okA7,okB7][i]?'riktig':'galt');
    });
    poeng=(okA7?1:0)+(okB7?1:0)+(okC7?1:0);
    fb='a) '+(okA7?'✓':'Fasit: '+f7.b)+' · b) '+(okB7?'✓':'Fasit: '+f7.a)+' · c) '+(okC7?'✓':'Fasit: '+f7.alts[f7.riktigIdx]);

  } else if (o.svarType === 'prop_abc') {
    var f8=o.fasit(d);
    var okA8=state.flervalgValg[o.id+'_a']===0; // f(x) er proporsjonal
    var okB8=state.flervalgValg[o.id]===f8.riktigIdx;
    var okC8=tol(hentTall('svar-k'),f8.k,0);
    document.querySelectorAll('.fv-alt[data-oppg="'+id+'_a"]').forEach(function(btn,i){
      btn.className='fv-alt '+(i===0?'fv-riktig':(i===state.flervalgValg[id+'_a']?'fv-galt':''));
    });
    document.querySelectorAll('.fv-alt[data-oppg="'+id+'"]').forEach(function(btn,i){
      btn.className='fv-alt '+(i===f8.riktigIdx?'fv-riktig':(i===state.flervalgValg[id]?'fv-galt':''));
    });
    var elK=document.getElementById('svar-k'); if(elK) elK.className='svar-input '+(okC8?'riktig':'galt');
    poeng=(okA8?1:0)+(okB8?1:0)+(okC8?1:0);
    fb='a) '+(okA8?'✓':'Fasit: f(x)')+' · b) '+(okB8?'✓':'Se fasit')+' · c) k = '+(okC8?'✓':f8.k);

  } else if (o.svarType === 'endr_abc') {
    var fe=o.fasit(d);
    var okA=tol(hentTall('svar-abs'),fe.abs,Math.max(1,Math.abs(fe.abs)*0.02));
    var okB=tol(hentTall('svar-rel'),fe.rel,0.5);
    var okC=state.flervalgValg[id]===fe.retning;
    ['svar-abs','svar-rel'].forEach(function(eid,i){var el=document.getElementById(eid);if(el)el.className='svar-input '+([okA,okB][i]?'riktig':'galt');});
    document.querySelectorAll('.fv-alt[data-oppg="'+id+'"]').forEach(function(b,i){b.className='fv-alt '+(i===fe.retning?'fv-riktig':(i===state.flervalgValg[id]?'fv-galt':''));});
    poeng=(okA?1:0)+(okB?1:0)+(okC?1:0);
    fb='a) '+(okA?'✓':fe.abs)+' · b) '+(okB?'✓':fe.rel+'%')+' · c) '+(okC?'✓':(fe.retning===0?'Økning':'Nedgang'));

  } else if (o.svarType === 'sektor_abc') {
    var fs=o.fasit(d);
    var okA=tol(hentTall('svar-maks'),fs.maks,0);
    var okB=tol(hentTall('svar-diff'),fs.diff,0);
    var okC=tol(hentTall('svar-sum01'),fs.sum01,0);
    ['svar-maks','svar-diff','svar-sum01'].forEach(function(eid,i){var el=document.getElementById(eid);if(el)el.className='svar-input '+([okA,okB,okC][i]?'riktig':'galt');});
    poeng=(okA?1:0)+(okB?1:0)+(okC?1:0);
    fb='a) '+(okA?'✓':fs.maks+'%')+' · b) '+(okB?'✓':fs.diff+'pp')+' · c) '+(okC?'✓':fs.sum01+'%');

  } else if (o.svarType === 'dobbel_abcd') {
    var fd=o.fasit(d);
    var okA1=tol(hentTall('svar-maks1'),fd.maks1,0);
    var okA2=tol(hentTall('svar-idx1'),fd.idxMaks1,0);
    var okB1=tol(hentTall('svar-maks2'),fd.maks2,0);
    var okB2=tol(hentTall('svar-idx2'),fd.idxMaks2,0);
    var okC=state.flervalgValg[id+'_c']===fd.høyest;
    var okD=state.flervalgValg[id+'_d']===fd.krysser;
    ['_c','_d'].forEach(function(suf,si){
      var fv2=si===0?fd.høyest:fd.krysser;
      document.querySelectorAll('.fv-alt[data-oppg="'+id+suf+'"]').forEach(function(b,i){b.className='fv-alt '+(i===fv2?'fv-riktig':(i===state.flervalgValg[id+suf]?'fv-galt':''));});
    });
    ['svar-maks1','svar-idx1','svar-maks2','svar-idx2'].forEach(function(eid,i){var el=document.getElementById(eid);if(el)el.className='svar-input '+([okA1,okA2,okB1,okB2][i]?'riktig':'galt');});
    poeng=(okA1&&okA2?1:0)+(okB1&&okB2?1:0)+(okC?1:0)+(okD?1:0);
    fb='a) '+(okA1&&okA2?'✓':'Fasit: '+fd.maks1+' ved '+d.k.xLabels[fd.idxMaks1])
      +' · b) '+(okB1&&okB2?'✓':'Fasit: '+fd.maks2+' ved '+d.k.xLabels[fd.idxMaks2])
      +' · c) '+(okC?'✓':'Se fasit')+' · d) '+(okD?'✓':(fd.krysser===0?'Ja':'Nei'));

  } else if (o.svarType === 'tabell_abcd') {
    var ft=o.fasit(d);
    var okA=state.flervalgValg[id+'_a']===(ft.diff_lik?0:1);
    var okB=state.flervalgValg[id]===ft.riktigTypeIdx;
    var okC=tol(hentTall('svar-param'),ft.parameter,d.erLin?0:0.05);
    var okD=tol(hentTall('svar-neste'),ft.nesteY,d.erLin?0:ft.nesteY*0.03);
    ['_a'].forEach(function(suf){
      var fv3=ft.diff_lik?0:1;
      document.querySelectorAll('.fv-alt[data-oppg="'+id+suf+'"]').forEach(function(b,i){b.className='fv-alt '+(i===fv3?'fv-riktig':(i===state.flervalgValg[id+suf]?'fv-galt':''));});
    });
    document.querySelectorAll('.fv-alt[data-oppg="'+id+'"]').forEach(function(b,i){b.className='fv-alt '+(i===ft.riktigTypeIdx?'fv-riktig':(i===state.flervalgValg[id]?'fv-galt':''));});
    ['svar-param','svar-neste'].forEach(function(eid,i){var el=document.getElementById(eid);if(el)el.className='svar-input '+([okC,okD][i]?'riktig':'galt');});
    poeng=(okA?1:0)+(okB?1:0)+(okC?1:0)+(okD?1:0);
    fb='a) '+(okA?'✓':(ft.diff_lik?'Like':'Ulike'))+' · b) '+(okB?'✓':ft.typeAlts[ft.riktigTypeIdx])
      +' · c) '+(okC?'✓':ft.parameter)+' · d) '+(okD?'✓':ft.nesteY.toLocaleString('no'));

  } else if (o.svarType === 'diag_stign') {
    var okA4 = tol(hentTall('svar-stign'), f.stign, 0);
    var elS = document.getElementById('svar-stign');
    if(elS) elS.className='svar-input '+(okA4?'riktig':'galt');
    var bTekst4 = (document.getElementById('svar-stign-b')||{value:''}).value.trim();
    var okB4 = bTekst4.length > 8;
    poeng=(okA4?1:0)+(okB4?1:0);
    fb='a) '+(okA4?'✓ Stigningstall = '+f.stign:'Fasit: a = '+f.stign)+' · b) '+(okB4?'✓':'Skriv forklaring');
  }

  status = poeng===max?'riktig':poeng>0?'delvis':'feil';
  state.svar[id] = { poeng, maxPoeng:max, status };
  var fp = lastFremgang(); fp.svar = state.svar; lagreFremgang(fp);

  var fbEl = document.getElementById('fb');
  fbEl.className='fb '+status;
  fbEl.textContent = fb;
  fbEl.insertAdjacentHTML('afterend', lagFasitHTML(o, d));

  document.getElementById('sjekk-btn').disabled=true;
  document.getElementById('neste-btn').style.display='block';
  oppdaterStats(); byggSidebar();
}

function lagFasitHTML(o, d) {
  return '<div class="fasit-boks vis"><div class="fasit-tittel">📖 Fasit og fremgangsmåte</div>'
    + o.løsning(d) + '</div>';
}

function visHint(o) {
  hintSynlig=false;
  var k=document.getElementById('hint-knapp'), i=document.getElementById('hint-innhold');
  if(k) k.className='';
  if(!i) return;
  i.className='hint-skjult';
  var html='<div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:10px">Fremgangsmåte</div>';
  (o.hint||[]).forEach(function(h,idx){
    html+='<div class="hint-steg"><div class="hint-nr">'+(idx+1)+'</div><div class="hint-tekst">'+h+'</div></div>';
  });
  i.innerHTML=html;
}

function toggleHint() {
  hintSynlig=!hintSynlig;
  document.getElementById('hint-innhold').className=hintSynlig?'hint-synlig':'hint-skjult';
  document.getElementById('hint-knapp').className=hintSynlig?'aktiv':'';
}

function nesteOppgave() {
  var idx=DIAGRAM_OPPGAVER.findIndex(function(x){return x.id===state.gjeldende;});
  if(idx<DIAGRAM_OPPGAVER.length-1) visOppgave(DIAGRAM_OPPGAVER[idx+1].id);
  else visResultat();
}

function nullstill() {
  var id=state.gjeldende;
  delete state.data[id]; delete state.svar[id];
  delete state.flervalgValg[id];
  delete state.flervalgValg[id+'_c']; delete state.flervalgValg[id+'_d'];
  delete state.flervalgValg[id+'_a'];
  var fp=lastFremgang(); fp.svar=state.svar; lagreFremgang(fp);
  visOppgave(id);
}

function nyRunde() {
  state={gjeldende:null,data:{},svar:{},flervalgValg:{}};
  var fp=lastFremgang(); fp.svar={}; lagreFremgang(fp);
  document.getElementById('resultat').style.display='none';
  document.getElementById('app').style.display='grid';
  document.getElementById('prog-wrap').style.display='flex';
  byggSidebar(); oppdaterStats();
}

function visResultat() {
  var tot=0,max=0;
  DIAGRAM_OPPGAVER.forEach(function(o){max+=o.maxPoeng;var sv=state.svar[o.id];if(sv)tot+=sv.poeng;});
  document.getElementById('res-score').textContent=tot+' / '+max;
  document.getElementById('res-fullfort').textContent=Object.keys(state.svar).length+'/'+DIAGRAM_OPPGAVER.length;
  document.getElementById('res-pst').textContent=max>0?Math.round(tot/max*100)+'%':'0%';
  document.getElementById('app').style.display='none';
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('resultat').style.display='block';
}

function oppdaterStats() {
  var tot=0,full=0;
  DIAGRAM_OPPGAVER.forEach(function(o){var sv=state.svar[o.id];if(sv){tot+=sv.poeng;full++;}});
  document.getElementById('st-poeng').textContent=tot;
  document.getElementById('st-fullfort').textContent=full;
}
function oppdaterProgress(o) {
  var idx=DIAGRAM_OPPGAVER.findIndex(function(x){return x.id===o.id;});
  var full=Object.keys(state.svar).length;
  document.getElementById('prog-tekst').textContent='Oppgave '+(idx+1)+' av '+DIAGRAM_OPPGAVER.length;
  document.getElementById('prog-fill').style.width=Math.round(full/DIAGRAM_OPPGAVER.length*100)+'%';
}


// Spor fullfoering ved scroll til bunn
(function() {
  var _sporet = false;
  function sjekkScroll() {
    if (_sporet) return;
    if (window.scrollY + window.innerHeight >= document.body.scrollHeight - 100) {
      _sporet = true;
      window._skaplab_logg('diagram_trener', 'MAT-STAT', 100, 1, 1, 1, 1);
      window.removeEventListener('scroll', sjekkScroll);
    }
  }
  window.addEventListener('scroll', sjekkScroll);
  setTimeout(function() {
    if (!_sporet) { _sporet=true; window._skaplab_logg('diagram_trener', 'MAT-STAT', 80, 1, 1, 1, 1); }
  }, 60000);
})();

</script>
